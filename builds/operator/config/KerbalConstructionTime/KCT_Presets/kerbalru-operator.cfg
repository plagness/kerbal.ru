// kerbal.ru — мягкий пресет KCT для сборки «Оператор».
// Вижен: «Долгая игра / много полётов» — очередь сборки даёт РИТМ программы,
// но без брутальных таймингов RP-1: без таймера исследований (наука — целевой пилар,
// большое дерево CTT не должно стопориться), без времени реконструкции пада и апгрейда
// зданий, ускоренная постройка (×0.5) и двойной стартовый темп → параллельные линии рано.
// Пуск никогда не блокируется наглухо — rush-build за деньги встроен в KCT.
KCT_Preset
{
	name = kerbal.ru «Оператор» (мягкий)
	shortName = kerbalru
	description = Мягкий KCT под сборку «Оператор»: очередь сборки для ритма программы, БЕЗ таймеров исследований/реконструкции/апгрейда зданий, ускоренная постройка. Rush-build за деньги доступен всегда.
	author = kerbal.ru
	allowDeletion = True
	career = True
	science = True
	sandbox = True
	KCT_Preset_General
	{
		Enabled = True
		BuildTimes = True
		ReconditioningTimes = False
		TechUnlockTimes = False
		KSCUpgradeTimes = False
		Simulations = False
		SimulationCosts = True
		RequireVisitsForSimulations = False
		TechUpgrades = True
		SharedUpgradePool = False
		StartingPoints = 30,30,90
	}
	KCT_Preset_Time
	{
		OverallMultiplier = 0.5
		BuildEffect = 1
		InventoryEffect = 100
		ReconditioningEffect = 1728
		MaxReconditioning = 345600
		RolloutReconSplit = 0.25
	}
	KCT_Preset_Formula
	{
		NodeFormula = 2^([N]+1) / 86400
		UpgradeFundsFormula = min(2^([N]+4) * 1000, 1024000)
		UpgradeScienceFormula = min(2^([N]+2) * 1.0, 512)
		ResearchFormula = [N]*0.5/86400
		EffectivePartFormula = min([c]/([I] + ([B]*([U]+1))), [c])*[MV]*[PV]
		ProceduralPartFormula = (([c]-[A]) + ([A]*10/max([I],1))) / max([B]*([U]+1),1) *[MV]*[PV]
		BPFormula = ([E]^(1/2))*2000*[O]
		KSCUpgradeFormula = ([C]^(1/2))*1000*[O]
		ReconditioningFormula = min([M]*[O]*[E], [X])*abs([RE]-[S]) / ([LM]-[L]+1)
		BuildRateFormula = (([I]+1)*0.05*[N] + max(0.1-[I], 0))*sign(2*[L]-[I]+1)
		SimCostFormula = max([C]/50000 * min([PM]/[KM], 80) * ([S]/10 + 1) * ([A]/10 + 1) * ([L]^0.5) * 100, 500)
		KerbinSimCostFormula = max([C]/50000 * ([L]^0.5) * 10, 100)
		UpgradeResetFormula = 2*([N]+1)
		InventorySaleFormula = ([V]+[P] / 10000)^(0.5)
		RolloutCostFormula = 0
		NewLaunchPadCostFormula = 100000*([N]^3)
	}
	KCT_Preset_Part_Variables
	{
		Part_Variables
		{
		}
		Module_Variables
		{
		}
	}
}
