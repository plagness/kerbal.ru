// kerbal.ru «Оператор» — заполнение пустых узлов Community Tech Tree.
// Философия: Ванила+, БЕЗ KSPIE (конфликт с Near Future power + SystemHeat).
// Пустые узлы наполняем УЖЕ СТОЯЩИМИ подходящими деталями (перенос на выделенный узел).
// Все имена деталей сверены по ModuleManager.ConfigCache. Патчи :FINAL — применяются последними
// (поверх сломанных/дефолтных раскладок модов). Доноры-узлы после переноса не пустеют.
// Узлы massive*/gigantic* от SpaceY НЕ трогаем — SpaceY скрывает их (hideEmpty=True).
// Электро-трио + микроволновка закрываются модом Beamed Power (см. ctt-fill-beamed.cfg после установки).

// ── Энергетика / физика / радиаторы ─────────────────────────────
@PART[radiator-microchannel-2]:FINAL        { @TechRequired = exoticRadiators }       // HeatControl топ-микроканальный (деплой)
@PART[radiator-microchannel-fixed-1]:FINAL  { @TechRequired = exoticRadiators }       // HeatControl топ (фикс)
@PART[vasimr-25]:FINAL { @TechRequired = exoticPlasmaPropulsion }                     // NFP топ-VASIMR
@PART[pit-25]:FINAL    { @TechRequired = exoticPlasmaPropulsion }                     // NFP топ-PIT
@PART[nfe-reactor-25-2]:FINAL  { @TechRequired = expNuclearPower }                    // NFE реактор (живой, пост-SystemHeat)
@PART[nfe-reactor-375-1]:FINAL { @TechRequired = exoticNuclearPower }                 // NFE топ-реактор
@PART[fft-antimatter-factory-1]:FINAL { @TechRequired = ultraHighEnergyPhysics }      // FFT фабрика антиматерии (тематично)
// электро-трио (силовые системы) — конденсаторы NFE + передатчик Beamed Power
@PART[capacitor-25]:FINAL           { @TechRequired = highPowerElectricalSystems }    // NFE топ-конденсатор
@PART[DischargeCapacitor]:FINAL     { @TechRequired = experimentalElectricalSystems } // NFE разрядный конденсатор
@PART[bpLargeTransmitterDish]:FINAL { @TechRequired = exoticElectricalSystems }       // Beamed Power передатчик (силовая передача)

// ── Наука / командные / посадочные ──────────────────────────────
@PART[restock-pod-sphere-1]:FINAL { @TechRequired = simpleCommandModules }            // ReStock+ сферический под
@PART[Knes_Crew_Pod_09375]:FINAL  { @TechRequired = simpleCommandModules }            // Knes мини-капсула
@PART[sspx-adjusting-base-5-1]:FINAL        { @TechRequired = specializedLanders }    // SSPX регулируемая база
@PART[sspx-adjusting-base-cradle-5-1]:FINAL { @TechRequired = specializedLanders }    // SSPX база-колыбель
@PART[KKAOSS_Central_Hub]:FINAL             { @TechRequired = specializedLanders }    // KPBS центральный хаб базы
@PART[sspx-core-375-1]:FINAL   { @TechRequired = specializedCommandCenters }          // SSPX «Harbour» центр управления
@PART[sspx-cupola-375-1]:FINAL { @TechRequired = specializedCommandCenters }          // SSPX купол-командник
@PART[StnSciLab]:FINAL    { @TechRequired = scientificOutposts }                      // Station Science лаборатория
@PART[StnSciZoo]:FINAL    { @TechRequired = scientificOutposts }                      // Station Science зоо-отсек
@PART[StnSciCyclo]:FINAL  { @TechRequired = appliedHighEnergyPhysics }                // Station Science циклотрон
@PART[StnSciSpectro]:FINAL{ @TechRequired = highEnergyScience }                       // Station Science спектрометрон

// ── Большие ракеты / аэро / живучесть (фикс бага SpaceY — устаревшие имена деталей) ──
@PART[syx-tank-1000-*]:FINAL    { @TechRequired = colossalRocketry }                  // SpaceY-Expanded 10м баки
@PART[syx-plate-1000-*]:FINAL   { @TechRequired = colossalRocketry }                  // 10м структура
@PART[syx-adapt-1000-*]:FINAL   { @TechRequired = colossalRocketry }                  // 10м переходники
@PART[syx-decoupler-1000]:FINAL { @TechRequired = colossalRocketry }                  // 10м декаплер
@PART[syx-separator-1000]:FINAL { @TechRequired = colossalRocketry }                  // 10м сепаратор
@PART[wingShuttleDelta]:FINAL   { @TechRequired = advAerospaceEngineering }           // сток Big-S шаттл-крыло
@PART[wingShuttleElevon1]:FINAL { @TechRequired = advAerospaceEngineering }
@PART[wingShuttleElevon2]:FINAL { @TechRequired = advAerospaceEngineering }
@PART[wingShuttleRudder]:FINAL  { @TechRequired = advAerospaceEngineering }
@PART[wingShuttleStrake]:FINAL  { @TechRequired = advAerospaceEngineering }
@PART[LaunchEscapeSystem]:FINAL   { @TechRequired = enhancedSurvivability }           // сток САС
@PART[restock-engine-les-2]:FINAL { @TechRequired = enhancedSurvivability }           // ReStock+ САС
@PART[radialDrogue]:FINAL         { @TechRequired = enhancedSurvivability }           // тормозной парашют

// ── Добыча / переработка / робо / производство ──────────────────
@PART[KKAOSS_Greenhouse_g]:FINAL { @TechRequired = recycling }                        // KPBS теплица (Soil→Snacks)
@PART[KKAOSS_LS_container_greenhouse]:NEEDS[Snacks]:FINAL { @TechRequired = recycling }
@PART[SMX_3mStackDrill]:FINAL    { @TechRequired = resourceExploitation }             // SMX большой бур
@PART[SMX_Size3ISRU]:FINAL       { @TechRequired = resourceExploitation }             // SMX большой ISRU
@PART[SMX_Size3OreTank]:FINAL    { @TechRequired = resourceExploitation }
@PART[SMX_Mk3ISRURefinery]:FINAL { @TechRequired = resourceExploitation }
@PART[SMX_Radialklaw]:FINAL   { @TechRequired = experimentalActuators }               // SMX клешня-захват
@PART[SMX_AsteroidPort]:FINAL { @TechRequired = experimentalActuators }
@PART[SMX_PoddedDeployableWheelL]:FINAL { @TechRequired = experimentalMotors }        // SMX тяжёлое роверное колесо
@PART[ELRocketBuilder]:NEEDS[ExtraPlanetaryLaunchpads]:FINAL { @TechRequired = offworldManufacturing }  // EPL стапель ракет
@PART[ELLathe]:NEEDS[ExtraPlanetaryLaunchpads]:FINAL         { @TechRequired = offworldManufacturing }  // EPL станок
