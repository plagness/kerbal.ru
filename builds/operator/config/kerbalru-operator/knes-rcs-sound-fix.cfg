// kerbal.ru «Оператор» — фикс странного закольцованного звука Knes RCS.
// Проблема: RCS-детали Knes (особенно Diamant _Knes_RCS_Bump_roll, их на ракете ~11 шт)
// в EFFECTS.running крутят РАКЕТНЫЙ клип sound_rocket_mini с loop=true. При старте SAS/RCS
// постоянно стабилизируют ракету → десяток закольцованных «мини-ракетных» звуков сливаются
// в странный громкий дрон.
// Фикс: убираем закольцованный АУДИО у RCS-деталей (визуальный выхлоп MODEL_MULTI_PARTICLE
// оставляем). Главные двигатели не трогаем. :FINAL — поверх мода. Отсутствие узла = no-op.

@PART[_Knes_RCS_Bump_roll|_Knes_RCS_Bump_tank|_Knes_RCS_3way|_Knes_ATV_RCS_A|_Knes_ATV_RCS_B|_Knes_Control_LowProfile_RCS_0625]:FINAL
{
	@EFFECTS
	{
		@running
		{
			!AUDIO_MULTI_POOL {}
			!AUDIO {}
		}
	}
}
