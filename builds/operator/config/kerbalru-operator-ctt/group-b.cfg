// ============================================================================
// kerbal.ru — сборка «Оператор» — наполнение пустых узлов CTT (ГРУППА B)
// Наука + командные/посадочные узлы.
//
// ЗАЧЕМ: перечисленные узлы CTT в «Операторе» пусты, потому что задуманные
// разработчиками наполнители либо не ставятся (KSPIE — отвергнут), либо мод
// раскладывает детали по стоковым узлам и не трогает эти CTT-узлы
// (StationScienceContinued 2.6 не содержит CTT-патча вообще).
//
// РЕШЕНИЕ: поднимаем УЖЕ УСТАНОВЛЕННЫЕ, тематически подходящие детали в
// профильные узлы. Каждая правка изолирована (:NEEDS-гарды), :FINAL — чтобы
// перебить собственные CTT-патчи модов (KPBS, SSPX, NFS, ReStock+).
//
// Баланс: Vanilla+. Тиры узлов (cost): simpleCommandModules 90,
// specializedLanders/Centers 1000, scientificOutposts 1500,
// highEnergyScience 2250, appliedHighEnergyPhysics 4000.
// ============================================================================


// ---- simpleCommandModules (90) — «простые командные модули, первые шаги» ----
// Пусто: NFS-капсулы слишком тяжёлые (heavy*), стоковые простые поды сидят в
// стоке. Кладём самые простые ранние капсулы (сейчас на start — редундантны,
// стоковый Mk1 остаётся стартовым).
@PART[restock-pod-sphere-1]:NEEDS[CommunityTechTree,ReStockPlus]:FINAL { @TechRequired = simpleCommandModules }   // ReStock+ SP-1 «шар»
@PART[Knes_Crew_Pod_09375]:NEEDS[CommunityTechTree,Knes]:FINAL       { @TechRequired = simpleCommandModules }   // Knes мини-капсула 0.9375м


// ---- specializedLanders (1000) — «специализированные посадочные модули» ----
// Пусто: единственный житель (NFS Mk4) ушёл в heavyLanders; стоковые lander can
// НЕ трогаем (сильный сдвиг). Кладём посадочно-базовые модули (KPBS/SSPX).
@PART[sspx-adjusting-base-5-1]:NEEDS[CommunityTechTree,StationPartsExpansionRedux]:FINAL        { @TechRequired = specializedLanders }  // SSPX регулируемая база BZ-4
@PART[sspx-adjusting-base-cradle-5-1]:NEEDS[CommunityTechTree,StationPartsExpansionRedux]:FINAL { @TechRequired = specializedLanders }  // SSPX опора базы BR-4
@PART[KKAOSS_Central_Hub]:NEEDS[CommunityTechTree,PlanetaryBaseInc]:FINAL                       { @TechRequired = specializedLanders }  // KPBS центральный хаб базы (6 крю)


// ---- specializedCommandCenters (1000) — «командные центры, не просто капсулы» ----
// Пусто: NFS-командники разложены по heavy*-узлам, SSPX-командцентры сидят низко
// (metaMaterials/advScienceTech). Поднимаем крупные командные модули SSPX.
@PART[sspx-core-375-1]:NEEDS[CommunityTechTree,StationPartsExpansionRedux]:FINAL   { @TechRequired = specializedCommandCenters }  // SSPX «Harbour» Station Control Centre
@PART[sspx-cupola-375-1]:NEEDS[CommunityTechTree,StationPartsExpansionRedux]:FINAL { @TechRequired = specializedCommandCenters }  // SSPX 3.75м купол-обзор


// ---- scientificOutposts (1500) — «базы, целиком посвящённые науке» ----
// Пусто: лаборатории модов сидят в стоковых/родительских узлах. Собираем сюда
// научные базы-лаборатории (Station Science + KPBS + SSPX).
@PART[StnSciLab]:NEEDS[CommunityTechTree,StationScience]:FINAL                  { @TechRequired = scientificOutposts }  // TH-NKR Research Lab
@PART[StnSciZoo]:NEEDS[CommunityTechTree,StationScience]:FINAL                  { @TechRequired = scientificOutposts }  // Zoology Bay
@PART[KKAOSS_Science_g]:NEEDS[CommunityTechTree,PlanetaryBaseInc]:FINAL         { @TechRequired = scientificOutposts }  // KPBS Tundra science lab
@PART[sspx-lab-375-1]:NEEDS[CommunityTechTree,StationPartsExpansionRedux]:FINAL { @TechRequired = scientificOutposts }  // SSPX «Fate» Deep-Space Lab


// ---- highEnergyScience (2250) — «наука внутри ускорителя частиц» ----
// Пусто: задуман под KSPIE (отвергнут). Единственный установленный ускоритель
// частиц — Cyclotron из Station Science. Тематическое попадание в яблочко.
@PART[StnSciCyclo]:NEEDS[CommunityTechTree,StationScience]:FINAL   { @TechRequired = highEnergyScience }  // D-ZZY Cyclotron
@PART[StnSciSpectro]:NEEDS[CommunityTechTree,StationScience]:FINAL { @TechRequired = highEnergyScience }  // WT-SIT Spectrometron (анализ Kuarq'ов)


// ---- appliedHighEnergyPhysics (4000) — «прикладная физика высоких энергий» ----
// Пусто: задуман под KSPIE (отвергнут). Кладём два самых продвинутых
// Kuarq-эксперимента Station Science (работают на Cyclotron из узла-родителя).
@PART[StnSciExperiment4]:NEEDS[CommunityTechTree,StationScience]:FINAL { @TechRequired = appliedHighEnergyPhysics }  // Eccentric Kuarqs
@PART[StnSciExperiment6]:NEEDS[CommunityTechTree,StationScience]:FINAL { @TechRequired = appliedHighEnergyPhysics }  // Kuarq bio-activity
