		#LOC_ROEngines_ROE-A7_description = Двигатель баллистической ракеты малой дальности PGM-11 Redstone (SRBM). Изначально спроектирован под этанол/LOX (A-6), позже адаптирован под Hydyne/LOx (A-7) — на ~6% выше характеристики (но токсичнее) — для Jupiter-C/Juno I. Когда Redstone адаптировали из Jupiter-C для пилотируемых полётов по программе Mercury (носитель Mercury-Redstone, MRLV), A-7 вернули на эталокс, приняв чуть худшие характеристики ради снижения токсичности. Управление вектором тяги (TVC) обеспечивали угольные лопатки в струе, а дополнительную ориентацию — поворотные стабилизаторы в хвостовом отсеке. Диаметр: 1,77 м.
