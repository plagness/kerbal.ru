		#LOC_ROEngines_ROE-RD107_tags = r7, rd107, 107, rd, rd-107, soyuz, vostok, sputnik, semyorka
		#LOC_ROEngines_ROE-RD108_title = RD-108 Series
		#LOC_ROEngines_ROE-RD108_description = Core engine for the R-7 Semyorka and its derivatives, including the Sputnik, Luna, Voskhod, Vostok, Soyuz, and Molniya launch vehicles.  Differs from the booster engine series (RD-107) with a lower chamber pressure, thrust, and a wider vernier layout.  Powers the R-7 family core through a very long (roughly) five minute burn that starts on the pad alongside the boosters. Diameter: [1.85 m].
