		#LOC_ROEngines_ROE-RD107_title = RD-107 Series
		#LOC_ROEngines_ROE-RD107_description = Booster engine for the R-7 Semyorka and its derivatives, including the Sputnik, Luna, Voskhod, Vostok, Soyuz, and Molniya launch vehicles. Differs from the core engine series (RD-108) with a higher chamber pressure, thrust, and smaller vernier layout. The R-7 family core was supplemented for (roughly) two minutes by four strap-on boosters powered by these engines. Diameter: [1.85 m].
