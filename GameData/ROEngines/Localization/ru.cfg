		#LOC_ROEngines_ROE-LR105_title = Серия LR105
		#LOC_ROEngines_ROE-LR105_description = Маршевый керолокс-двигатель газогенераторного цикла для ракеты Atlas. Как и стартовые двигатели Atlas (LR89), он запускается на земле, но после ~2 минут полёта ускорители сбрасываются, и центральный блок Atlas продолжает разгон под тягой маршевого двигателя (и верньеров для крена и точной коррекции). Финальная версия LR105 (как и LR89) использует узлы RS-27 для повышения характеристик. Как маршевый двигатель, LR105 имеет сравнительно низкий УИ на уровне моря, но чуть лучший в вакууме — впрочем, разница в обоих случаях куда меньше, чем между ускорителем и двигателем верхней ступени. Диаметр: [1,5 м].
