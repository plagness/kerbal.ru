		#LOC_ROEngines_ROE-AJ260FLA_description = The AJ-260 was the largest rocket motor to ever be tested. This is the Full Length version of the engine that has a gross mass of more than 1600 tons and provides a thrust of 35,391 kN for more than 2 minutes. This version was te be used as an alternative to the Saturn IB and as booster motors for Apollo Applications launch vehicles. This is the radially attached version to be used as a Solid Rocket Booster. [Diameter: 6.6 m]
