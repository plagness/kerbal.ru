		#LOC_ROEngines_ROE-SNTPPFE100_title = abc
		#LOC_ROEngines_ROE-SNTPPFE100_description = Серия «SNTP-PFE» — реактор мощностью 1000 МВт. Реактор — с засыпным слоем из гранул урана в карбидной оболочке, встроенных в графитовый стержень, через который проходит водород. Это даёт плотность мощности до 40 МВт/л. Активная зона допускает до пяти запусков. Встроенная композитная защита из вольфрама, бора и гидрида лития включена, вся сборка охлаждается регенеративно. Второй контур пропускает отработанные газы через малый теплодвигатель, снижая потери топлива и питая генератор. Двигатель следует крепить в трёх-шести метрах от ближайшего топливного бака. Топливо должно экранировать экипаж; при работе экипаж должен находиться в десяти-пятнадцати метрах от двигателя. Доп. экранирование, например бак с водой или плотное топливо, может немного снизить это расстояние. Впечатляющие характеристики для такого размера (площадь среза сопла Ae=100, темп. камеры=2720, идеальный УИ=991, мощность реактора=1054MW(th), ТТВ=13.94, давление в камере=6800kPa, запусков=5, масса с интегральной защитой=1.504tons). Сопло — несъёмное, абляционного охлаждения, из намотанного угле-углеродного композита.
