		#LOC_ROEngines_ROE-AJ260SLA_description = The AJ-260 was the largest rocket motor to ever be tested. This is the Short Length version that was a 21.6 x 6.6 meter behemoth that, when fully loaded, weighed more than 842 tons. It was capable of providing over 15,000 kN of thrust for 120 seconds. Ultimately the program was cancelled but not before three test firings where the engines performed exactly to specifications. This is the radially attached version to be used as a Solid Rocket Booster. [Diameter: 6.6 m]
