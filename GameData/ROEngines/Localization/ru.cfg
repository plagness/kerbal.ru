		#LOC_ROEngines_ROE-SNTPPFE100_title = SNTP-PFE 100
		#LOC_ROEngines_ROE-SNTPPFE100_manufacturer = Универсальный
		#LOC_ROEngines_ROE-SNTPPFE100_description = Серия «SNTP-PFE» — реактор мощностью 1000 МВт. Реактор использует наполнитель на основе гранул карбида урана в графитовом стержне, через который пропускается водород, что обеспечивает удельную мощность до 40 МВт/л. Активная зона допускает до пяти запусков. Встроена композитная радиационная защита из вольфрама, бора и гидрида лития, вся конструкция охлаждается регенеративно. Вторичный контур пропускает отработавшие газы через небольшую тепловую машину для минимизации потерь топлива и питания генератора. Двигатель следует устанавливать на расстоянии от трёх до шести метров от ближайшего топливного бака. Топливо должно экранировать экипаж; места экипажа при работающем двигателе должны находиться на расстоянии десяти-пятнадцати метров от него. Дополнительная защита (бак с водой или плотное топливо) может немного сократить это расстояние. Двигатель показывает впечатляющие характеристики для своего размера (площадь среза сопла=100, температура камеры=2720, идеальный удельный импульс=991, мощность реактора=1054 МВт(тепл.), тяговооружённость=13,94, давление в камере=6800 кПа, число запусков=5, масса с учётом встроенной теневой защиты=1,504 т). Сопло — фиксированное, абляционного охлаждения, из намотанного угле-углеродного композита.
