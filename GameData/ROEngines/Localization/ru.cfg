		#LOC_ROEngines_ROE-RD58_description = Первый в мире керолоксовый вакуумный двигатель замкнутого цикла. S1.5400 служил верхней ступенью Р-7, а RD-58 (модернизация) — верхней ступенью/ДУ ориентации для многих советских и российских носителей и кораблей (Протон, Н1, Зенит, Буран...). S1.5400 создан для блока Л — финальной ступени «Молнии» на Р-7, для запуска спутников связи и межпланетных зондов. В отличие от прежних ступеней, он допускал перезапуск (для апогейного манёвра «Молнии»). Обозначение — 11Д33, улучшённая версия — 11Д33М. RD-58 — развитие 11Д33М с более высокими характеристиками (11Д58); применяется на многих носителях РФ, включая нынешние «Протон» и «Зенит». В отличие от водородных ступеней, керолоксовые меньше страдают от испарения и занимают меньше объёма, но имеют ниже удельный импульс. Диаметр: [2.0 м].
