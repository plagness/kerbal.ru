		#LOC_ROEngines_ROE-A7_title = NAA-75-110 A-Series
		#LOC_ROEngines_ROE-A7_description = The power plant of the PGM-11 Redstone Short Range Ballistic Missile (SRBM). Originally designed for Ethanol/LOX (A-6) it was later adapted to use Hydyne/LOx (A-7) with approximately 6% higher performance (yet more toxic) for use in Jupiter-C / Juno I. When the Redstone was adapted from Jupiter-C for manned use under the Project Mercury (Mercury-Redstone Launch Vehicle - MRLV), the A-7 was switched back to Ethalox, accepting a slightly lower performance for the lack of toxicity. Thrust Vector Control (TVC) was provided by carbon thrust vanes and additional attitude control was provided by actuating fins placed in the guidance section. Diameter: 1.77 m.
		#LOC_ROEngines_ROE-A7_manufacturer = North American Aviation (NAA)
