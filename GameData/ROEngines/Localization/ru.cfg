		#LOC_ROEngines_ROE-AJ10Adv_title = AJ10 (продвинутая версия)
		#LOC_ROEngines_ROE-AJ10Adv_description = Малый вытеснительный гиперголиевый двигатель верхней ступени. Потомок первого жидкостного двигателя США, серия AJ10 — пожалуй, самая долгоживущая линейка двигателей: она стояла на первой американской ракете-носителе спутников Vanguard, на CSM Apollo и даже в проекте служебного модуля Orion. Здесь представлена продвинутая версия AJ10 с удлинённым соплом и возможностью перезапуска. Использовался на Transtage как AJ10-138; похожие модели под индексом -118 стояли на верхних ступенях Delta F и Delta K.
