		#LOC_ROEngines_ROE-AJ10-transtar_title = AJ10 Transtar Engine
		#LOC_ROEngines_ROE-AJ10-transtar_description = Proposed pump-fed upgrade for the AJ10. Developed in the 1980s as a high performance upper stage and tug. Based heavily on shuttle OMS, using the same nozzle and combustion chamber, with turbomachinery installed in place of pressure-fed system. Tested, but never flew, as program was cancelled following the Challenger disaster. Diameter: [1.17 m].
