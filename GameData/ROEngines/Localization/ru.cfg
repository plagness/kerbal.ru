		#LOC_ROEngines_ROE-KTDU425A_title = Серия S1.5400/РД-58
		#LOC_ROEngines_ROE-KTDU425A_description = Первый в мире вакуумный керолокс-ЖРД замкнутого цикла. S1.5400 использовался как верхняя ступень Р-7, а РД-58 (модернизация) — как верхняя ступень/ДУ ориентации на многих советских и российских носителях и КА («Протон», Н-1, «Зенит», «Буран»...). S1.5400 создавался для блока Л — финальной ступени «Молнии» на базе Р-7, запускавшей спутники связи и межпланетные зонды. В отличие от прежних верхних ступеней, он допускал повторный запуск (для апогейного манёвра вывода «Молний» на конечную орбиту). Двигатель получил обозначение 11Д33. Модернизация 11Д33М показала чуть лучшие характеристики. РД-58 — производная 11Д33М с более высокими характеристиками (11Д58); используется на многих российских носителях, включая «Протон» и «Зенит» и поныне. По сравнению с гидролоксом керолокс меньше страдает от выкипания и требует меньший объём (керосин плотнее жидкого водорода), но даёт куда меньший удельный импульс. Диаметр: [2,0 м].
