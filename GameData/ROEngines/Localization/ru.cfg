		#LOC_ROEngines_ROE-AJ10-transtar_tags = aj10, transtar, shuttle, space, oms
		#LOC_ROEngines_ROE-AJ10Adv_title = AJ10 Series (Advanced)
		#LOC_ROEngines_ROE-AJ10Adv_description = Small pressure-fed hypergolic upper stage engine. Derivative of the first US liquid rocket engine, the AJ10 series is perhaps the longest-lived of any engine series, a part of the US's first satellite launch vehicle, Vanguard, the Apollo CSM, and even one projected Orion service module. This represents advanced era AJ10s with a nozzle extension and restart capability. Used on Transtage as AJ10-138; similar models but back with the -118 designation were used on the Delta F and Delta K upper stages.
		#LOC_ROEngines_ROE-AJ10Adv_manufacturer = Aerojet
		#LOC_ROEngines_ROE-AJ10Adv_tags = aj10, aj, 10, aj-10, 138, aj10-138, transtage, 118, delta f, k, 118f, 118k
