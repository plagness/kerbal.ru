		#LOC_ROEngines_ROE-AJ10Early_title = AJ10 (ранняя версия)
		#LOC_ROEngines_ROE-AJ10Early_description = Малый вытеснительный гиперголиевый двигатель верхней ступени. Потомок первого жидкостного двигателя США, серия AJ10 — пожалуй, самая долгоживущая линейка двигателей: она стояла на первой американской ракете-носителе спутников Vanguard, на CSM Apollo и даже в проекте служебного модуля Orion. Это исходная версия для второй ступени Vanguard / Able / Delta, без возможности перезапуска.
