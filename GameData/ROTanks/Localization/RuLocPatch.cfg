// are no-ops in this modpack (RealismOverhaul is always active) — the titles above
// never reach the player. These patches target the surviving derived part names
// instead. Their %description is a separate, shared RealismOverhaul template
// (GameData/RealismOverhaul/RO_RealFuels_PartConfigs.cfg) reused across many mods,
