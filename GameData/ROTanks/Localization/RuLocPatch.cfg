// --- Wall-type variants ---
// RealismOverhaul (RO_SuggestedMods/ROMods/ROTanks.cfg) clones each base tank part
// above into these derived parts at :BEFORE[RealismOverhaul], then deletes the base
// part (!PART[ROT-*]:HAS[#wantROTankTypes,~roTankType]:BEFORE[RealismOverhaul] {}).
