    ru
    {
        #RSS_Site_woomera_name = AU - Вумера
        #RSS_Site_woomera_desc = Зона запуска 5 (LA5) — действующая площадка полигона RAAF Woomera, основа боевых возможностей комплекса Woomera Range. Изначально LA5 использовалась для британских экспериментальных пусков, включая первый и (на 2015 год) единственный спутниковый запуск Великобритании. Площадка включала три пусковых стола: с них выполнено 22 пуска зондирующих ракет Black Knight и четыре пуска носителя Black Arrow. Из четырёх пусков Black Arrow два были орбитальными: первый, 2 сентября 1970 года, закончился неудачей, второй, 28 октября 1971 года, — успехом, выведя спутник Prospero на низкую околоземную орбиту.
        #RSS_Site_ca_churchill_name = CA - Черчилл
        #RSS_Site_ca_churchill_desc = Ракетный полигон Черчилл использовался с 1954 года для суборбитальных пусков зондирующих ракет с целью изучения верхней атмосферы. Оттуда выполнено свыше 3500 суборбитальных пусков. В 1994 году компания Akjuit Aerospace заключила 30-летнюю аренду с целью создать первый в мире коммерческий космодром.
        #RSS_Site_jiuquan_name = CN - Цзюцюань
        #RSS_Site_jiuquan_desc = Космодром Цзюцюань (酒泉衛星發射中心, JSLC) — китайский космодром в пустыне Гоби, примерно в 1600 км от Пекина. Входит в состав космического города Дунфэн (База 10). Хотя географически расположен в хошуне Эцзин-Ци аймака Алашань Внутренней Монголии, назван по ближайшему городу — Цзюцюань в провинции Ганьсу.
        #RSS_Site_taiyuan_name = CN - Тайюань
        #RSS_Site_taiyuan_desc = Космодром Тайюань (太原衛星發射中心, TSLC), также известный как База 25, — китайский космический и оборонный полигон. Расположен в уезде Кэлань, Синьчжоу, провинция Шаньси; второй из трёх космодромов КНР, основан в марте 1966 года, полностью введён в строй в 1968-м. Находится на высоте 1500 метров, сухой климат делает его удобным для пусков. Разведка США ошибочно называет его «Ракетно-космическим испытательным центром Ушай», хотя город Ушай находится далеко от полигона. Здесь запускают метеорологические, ресурсные и научные спутники на носителях Long March на солнечно-синхронные орбиты, а также испытывают МБР и БРПЛ. Полигон имеет технический центр и центр управления полётами, связан двумя железнодорожными ветками с линией Нинъу-Кэлань.
        #RSS_Site_wenchang_name = CN - Вэньчан
        #RSS_Site_wenchang_desc = Космодром Вэньчан (文昌衛星發射中心, WSLC) в Вэньчане, остров Хайнань, КНР — бывший центр суборбитальных испытаний. Четвёртый и самый южный космодром Китая. Выбран из-за низкой широты (всего 19° к северу от экватора), что существенно увеличивает полезную нагрузку — важно для пилотируемой программы, орбитальной станции и исследований дальнего космоса.
        #RSS_Site_xichang_name = CN - Сичан
        #RSS_Site_xichang_desc = Космодром Сичан (西昌衛星發射中心, XSLC) — китайский космодром примерно в 64 км северо-западнее Сичана, Ляншань-Ийского автономного округа в Сычуани. Действует с 1984 года, запускает мощные ракеты с геостационарными спутниками связи и метеонаблюдения. Известен китайско-европейским сотрудничеством: в декабре 2003 года отсюда запущен первый из двух научных спутников Double Star. Китай заявлял об интересе к новым международным запускам с этой площадки.
        #RSS_Site_hammaguir_name = DZ - Хаммагир
        #RSS_Site_hammaguir_desc = С 1947 по 1967 год близ Хаммагира действовал ракетный полигон Франции: с него запускали зондирующие ракеты и в 1965-1967 годах — носитель «Diamant». В 1965 году отсюда запущен первый французский спутник Astérix.
        #RSS_Site_kourou_name = FR - Куру
        #RSS_Site_kourou_desc = Гвианский космический центр (Centre spatial guyanais, CSG) — франко-европейский космодром у города Куру во Французской Гвиане, действует с 1968 года. Пуски отсюда проводят ЕКА, французское космическое агентство CNES и коммерческая компания Arianespace. Отсюда ЕКА отправляет грузы к МКС на автоматических кораблях ATV. Площадка выбрана в 1964 году под космодром Франции; в 1975 году Франция предложила ЕКА разделить Куру. Коммерческие пуски покупают и неевропейские компании. ЕКА покрывает две трети годового бюджета космодрома и финансировало модернизацию под носители Ariane.
        #RSS_Site_palmachim_name = IL - Пальмахим
        #RSS_Site_palmachim_desc = Авиабаза Пальмахим — израильский военный объект и космодром у городов Ришон-ле-Цион и Явне на Средиземном море, назван по одноимённому кибуцу на побережье. На базе размещены вертолётные и беспилотные эскадрильи ВВС Израиля, отсюда же пускают ракеты Arrow. Пальмахим — главный космодром Израиля: носитель Shavit запускают в ретроградном направлении над морем с координат 31°53'04″с.ш. 34°40'49″в.д., чтобы обломки падали в воду, а не над соседними странами. Здесь же испытывают баллистические ракеты Jericho.
        #RSS_Site_satish_dhawan_name = IN - Сатиш Дхаван
        #RSS_Site_satish_dhawan_desc = Космический центр Сатиш Дхаван (полигон Шрихарикота, SHAR) — космодром Индийской организации космических исследований (ISRO) в Шрихарикоте, Андхра-Прадеш. Переименован в 2002 году в честь экс-главы ISRO Сатиша Дхавана. Сейчас имеет два пусковых стола: второй, универсальный (под все носители ISRO), построен в 2005 году, что позволило проводить несколько пусков в год. SHAR станет главной базой индийской пилотируемой программы; третий стол строится специально под пилотируемый полёт к 2017 году.
        #RSS_Site_semnan_name = IR - Семнан
        #RSS_Site_semnan_desc = 4 февраля 2008 года, при первом пуске суборбитальной ракеты Kavoshgar-1 (Safir-класс), Иран представил свой первый космодром 35.234°с.ш. 53.921°в.д. в Семнане. Комплекс включает подземный центр управления, станцию слежения и пусковой стол.
        #RSS_Site_tanegashima_name = JP - Танэгасима
        #RSS_Site_tanegashima_desc = Космический центр Танэгасима (種子島宇宙センター, TNSC) — японский центр космических разработок на острове Танэгасима, в 115 км южнее Кюсю. Основан в 1969 году с созданием агентства NASDA, сейчас управляется JAXA. Здесь собирают, испытывают, запускают и отслеживают спутники, а также проводят огневые испытания ракетных двигателей. Крупнейший космический центр Японии.
        #RSS_Site_uchinoura_name = JP - Утиноура
        #RSS_Site_uchinoura_desc = Космический центр Утиноура (内之浦宇宙空間観測所) — космодром близ города Кимоцуки, префектура Кагосима. До создания JAXA в 2003 году назывался Космическим центром Кагосима. Отсюда запускали все научные спутники Японии до списания носителей M-V в 2006 году. Используется для суборбитальных пусков и носителя Epsilon. Есть антенны для связи с межпланетными станциями.
        #RSS_Site_sohae_name = KP - Сохэ
        #RSS_Site_sohae_desc = Космодром Сохэ (서해위성발사장) — ракетный полигон в уезде Чхорсан провинции Пхёнан-Пукто, КНДР.
        #RSS_Site_naro_name = KR - Наро
        #RSS_Site_naro_desc = Космический центр Наро (나로우주센터) — южнокорейский космодром в уезде Кохын провинции Чолла-Намдо, управляется государственным KARI.
        #RSS_Site_baikonur_name = KZ - Байконур
        #RSS_Site_baikonur_desc = Космодром «Байконур» — первый и крупнейший действующий космодром мира, в пустынной степи Казахстана, в 200 км восточнее Аральского моря, севернее Сырдарьи, у станции Тюратам, на высоте 90 метров. Казахстан сдаёт его в аренду России (до 2050 года), управляют «Роскосмос» и Воздушно-космические силы РФ. Арендованная территория — эллипс 90×85 км с космодромом в центре. Построен СССР в конце 1950-х как база космической программы. Сегодня «Байконур» — оживлённый космодром: ежегодно отсюда стартуют коммерческие, военные и научные миссии, а также все пилотируемые российские полёты.
        #RSS_Site_omelek_name = MH - Омелек
        #RSS_Site_omelek_desc = Омелек долго использовался США для небольших исследовательских пусков благодаря изоляции в южной части Тихого океана; последний правительственный пуск — в 1996 году. После 2000 года близость к экватору и радарная инфраструктура привлекли SpaceX, обновившую площадку и сделавшую её основной к 2006 году: тогда начались пуски Falcon 1. Планировался и Falcon 1e, но в 2012 году SpaceX свернула проект ради Falcon 9. Рассматривалась модернизация под Falcon 9: по манифесту на декабрь 2010 года Омелек (Кваджалейн) числился возможной площадкой для нескольких пусков, первый — в 2012 году.
        #RSS_Site_mahia_name = NZ - Махия
