        #RSS_Site_kasputin_yar_name = RU - Капустин Яр
        #RSS_Site_kasputin_yar_desc = Капустин Яр — российский ракетный полигон в Астраханской области, между Волгоградом и Астраханью; ныне город Знаменск. Основан в СССР 13 мая 1946 года, поначалу использовал немецкие технологии, материалы и специалистов. Здесь испытывали военные ракеты, а также запускали спутники и зондирующие ракеты.
        #RSS_Site_plesetsk_name = RU - Плесецк
        #RSS_Site_plesetsk_desc = Космодром «Плесецк» — в Мирном, Архангельская область, в 800 км севернее Москвы и 200 км южнее Архангельска; существует с 1957 года. Изначально — полигон МБР Р-7, позже отсюда запускали спутники на Р-7 и других носителях. Из-за высокой широты пригоден лишь для некоторых орбит (особенно «Молния»), поэтому долго оставался второстепенным — большинство пусков шло с Байконура в Казахской ССР. После распада СССР Байконур стал платной заграничной территорией, и с 2000-х активность «Плесецка» заметно выросла.
        #RSS_Site_svobodny_name = RU - Свободный/Восточный
        #RSS_Site_svobodny_desc = Космодромы Свободный и Восточный объединены в один сайт, так как расположены практически в одном месте, а KSCSwitcher их не различает. Восточный — российский космодром на 51-й параллели в Амурской области; Свободный — прежний полигон там же, изначально ракетная база Свободный-18 РВСН. Его выбрали заменой Байконуру после распада СССР и обретения Казахстаном независимости, но в 2007 году развитие свернули в пользу нового космодрома «Восточный». Площадку у станции Ледяная десятилетиями использовала 27-я ракетная дивизия РВСН. 1 марта 1996 года указом президента Ельцина статус космодрома закреплён официально.
        #RSS_Site_yasny_name = RU - Ясный
        #RSS_Site_yasny_desc = Домбаровский — военный аэродром в 6 км северо-западнее посёлка Домбаровский, близ Ясного, Оренбургская область. Служил ВВС СССР, затем России; здесь базируются истребители-перехватчики и позиция МБР, приспособленная под коммерческие спутниковые пуски.
        #RSS_Site_esrange_name = Космический центр Esrange — ракетный полигон и исследовательский центр в 40 км восточнее Кируны, на севере Швеции. База для научных исследований: высотные аэростаты, изучение полярных сияний, пуски зондирующих ракет, слежение за спутниками. Находится в 200 км севернее Полярного круга среди дикой природы, что идеально для этих задач.
        #RSS_Site_brownsville_name = US - Браунсвилл
        #RSS_Site_brownsville_desc = Частный космодром SpaceX строится в посёлке Бока-Чика близ Браунсвилла, Техас, для исключительного использования компанией. Цель — собственная площадка под плотный график пусков и жёсткие окна запуска. Станет первым частным орбитальным космодромом, для носителей Falcon 9, Falcon Heavy и многоразовых суборбитальных ракет. Илон Маск ожидает отправку коммерческих астронавтов из Южного Техаса, а в будущем — пуски к Марсу.
        #RSS_Site_cape_canaveral_name = US - Мыс Канаверал
        #RSS_Site_cape_canaveral_desc = Космический центр имени Кеннеди (KSC) — объект NASA, обслуживающий стартовый комплекс LC-39, построенный под Saturn V — крупнейший и самый мощный носитель в истории, для лунной программы «Аполлон». Назван в честь Кеннеди президентом Джонсоном вскоре после его гибели в 1963 году. С конца программы «Аполлон» в 1972 году LC-39 обеспечивал все пилотируемые полёты NASA: Skylab (1973), «Союз-Аполлон» (1974) и программу Space Shuttle (1981-2011). Здесь же садились шаттлы при подходящей погоде. KSC также управляет беспилотными пусками гражданской космической программы США с трёх стартов на соседней станции Мыс Канаверал. Здание вертикальной сборки (VAB) — четвёртое по объёму строение в мире, а на момент постройки в 1965 году было крупнейшим.
        #RSS_Site_kodiak_name = US - Кадьяк
        #RSS_Site_kodiak_desc = Пусковой комплекс Кадьяк (KLC) — коммерческий космодром для суб- и орбитальных пусков, принадлежит Alaska Aerospace Corporation, госкорпорации штата Аляска. Расположен на острове Кадьяк. С открытия в 1998 году проведено 16 пусков, в основном для правительства США.
        #RSS_Site_vandenburg_name = US - Ванденберг
        #RSS_Site_vandenburg_desc = Авиабаза Ванденберг ВВС США — в 14,8 км северо-западнее Ломпока, Калифорния, под юрисдикцией 30-го космического крыла Космического командования ВВС. Испытательный полигон Минобороны: выводит спутники на полярные орбиты одноразовыми носителями (Pegasus, Taurus, Minotaur, Atlas V, Delta IV, теперь и Falcon SpaceX). Персонал также обслуживает программу оценки МБР LGM-30G Minuteman III. Часть стартовых площадок арендует SpaceX (SLC-4E), а 100 акров (40 га) с 1995 года сдано калифорнийскому космодрому. Названа в честь генерала Хойта Ванденберга, экс-начальника штаба ВВС.
        #RSS_Site_wallops_name = US - Уоллопс
        #RSS_Site_wallops_desc = Лётный центр Уоллопс на восточном побережье Вирджинии, примерно в 160 км северо-восточнее Норфолка, управляется Центром Годдарда (Гринбелт, Мэриленд) как ракетный полигон для научных миссий NASA и других федеральных агентств. Оснащён для пусков десятков типов зондирующих ракет, малых суборбитальных и орбитальных носителей, высотных аэростатов с научными приборами, а также лётных испытаний авиатехники, включая беспилотники. С основания в 1945 году отсюда проведено свыше 16000 пусков — ради данных о лётных характеристиках аппаратов и знаний о верхней атмосфере и космосе.
        #RSS_Site_whitesands_name = US - Уайт-Сэндс
        #RSS_Site_whitesands_desc = Космическая гавань Уайт-Сэндс (WSSH) — взлётно-посадочная полоса для шаттлов, полигон ракетных испытаний и основная площадка NASA для тренировки пилотов на Shuttle Training Aircraft и T-38 Talon. С полосами, навигацией, освещением и центром управления служила запасным местом посадки шаттлов. Входит в состав полигона White Sands Test Facility, в 50 км западнее Аламогордо, Нью-Мексико, в границах ракетного полигона White Sands Missile Range.
    }
}
