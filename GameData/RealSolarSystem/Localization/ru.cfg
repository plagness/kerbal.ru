        //Celestial body descriptions (shown in Tracking Station / body info panel)

        #RSS_Sun_desc = Солнце — жёлтый карлик спектрального класса G2V главной последовательности.

        #RSS_Ceres_desc = Церера — крупнейший объект пояса астероидов, на который приходится около трети его массы. Это первое открытое тело пояса астероидов, и оно настолько велико, что имеет сферическую форму. Церера классифицируется как карликовая планета и лишь немного уступает по размеру Плутону. Сейчас её облетает зонд Dawn.

        #RSS_Earth_desc = «Бледно-голубая точка», дом для более чем восьми миллиардов людей и триллионов других форм жизни всех форм и размеров. Земля — вот где ты находишься в нашей системе, наш дом. Пока что это единственное известное нам место во всей необъятной вселенной.

        #RSS_Moon_desc = Луна — единственный спутник Земли, крупная серая и довольно безжизненная глыба. Это единственное, помимо Земли, тело, на которое ступала нога человека и которое хотя бы ненадолго становилось для людей домом.

        #RSS_Jupiter_desc = Юпитер — крупнейшая планета Солнечной системы, газовый гигант. Один только Юпитер почти в два с половиной раза массивнее всех остальных планет системы вместе взятых. Состоящий в основном из водорода и гелия с загадочным каменным ядром из тяжёлых элементов, Юпитер представляет собой уникальную и прекрасную картину из слоёв облаков с впечатляющим штормом, который, возможно, бушует уже более трёх столетий. У Юпитера как минимум шестьдесят семь спутников, включая четыре крупных «галилеевых луны» — одна из них по диаметру превосходит саму планету Меркурий.

        #RSS_Io_desc = Ио — ближайшая к Юпитеру из галилеевых лун и четвёртый по величине спутник Солнечной системы; как и другие галилеевы луны, названа в честь одной из возлюбленных Зевса. Ио — самое геологически активное тело Солнечной системы, что сказывается и на других спутниках Юпитера. Зафиксированы извержения, выбросы которых поднимаются на высоту до пятисот километров. Ио состоит из силикатных пород с ядром из сульфида железа, а её характерный облик создают равнины, покрытые серой и диоксидом серы.

        #RSS_Europa_desc = Европа — наименьшая из четырёх галилеевых лун, лишь немного уступающая по размеру нашей Луне. Это каменистый спутник, поверхность которого в основном состоит из водяного льда. Предполагается, что под этой ледяной коркой скрывается океан жидкой воды — и, возможно, жизнь в его глубинах.

        #RSS_Ganymede_desc = Ганимед — крупнейший спутник Солнечной системы, третья по счёту галилеева луна Юпитера. Жидкое железное ядро Ганимеда создаёт собственную, хоть и слабую, магнитосферу.

        #RSS_Callisto_desc = Каллисто — четвёртая из галилеевых лун и второй по величине спутник в системе Юпитера. У Каллисто очень разреженная атмосфера, состоящая в основном из углекислого газа, и довольно активная ионосфера.

        #RSS_Mars_desc = Красная планета. Названный в честь римского бога войны, Марс — четвёртая планета и вторая по величине снизу в Солнечной системе. Красноватый цвет ему придают большие запасы оксида железа на поверхности. У Марса очень разреженная атмосфера и множество кратеров, напоминающих лунные. Также на Марсе находится вторая по высоте известная гора Солнечной системы.

        #RSS_Phobos_desc = Один из двух естественных спутников Марса, Фобос назван в честь греческого бога, олицетворявшего ужас. Фобос — более крупный и близкий к Марсу из двух спутников.

        #RSS_Deimos_desc = Второй естественный спутник Марса, Деймос назван в честь брата-близнеца Фобоса, олицетворявшего страх.

        #RSS_Mercury_desc = Первая планета от Солнца. Меркурий — самая маленькая и самая быстрая планета Солнечной системы. С Земли её иногда можно увидеть рано утром или вечером. Из-за перепадов температуры от нестерпимого жара до лютого холода задерживаться на этой планете надолго точно не захочется.

        #RSS_Neptune_desc = Нептун — восьмая и самая дальняя от Солнца планета системы. Он четвёртый по диаметру и третий по массе среди планет. Среди газовых планет Нептун обладает наибольшей плотностью.

        #RSS_Triton_desc = Тритон — крупнейший спутник Нептуна, уникальный среди больших лун Солнечной системы своей обратной орбитой вокруг планеты.

        #RSS_Pluto_desc = Недавно исключённый из списка планет, Плутон получил статус «малой планеты». Это крупнейший объект пояса Койпера и вторая по массе известная карликовая планета. Плутон состоит в основном из камня и льда и довольно мал.

        #RSS_Charon_desc = Харон — крупнейший спутник Плутона; они связаны взаимным приливным захватом, поэтому всегда обращены друг к другу одной стороной.

        #RSS_Saturn_desc = Сатурн — шестая планета от Солнца, названная в честь римского бога земледелия; газовый гигант с уникальной системой колец. Под слоем газа, состоящего в основном из водорода, скрывается каменное ядро с раскалёнными недрами.

        #RSS_Mimas_desc = Мимас (не путать с вымышленным «Минмасом») — ближайший к Сатурну крупный спутник и самое маленькое тело Солнечной системы, сохраняющее сферическую форму. И да, это точно не Звезда Смерти.

        #RSS_Enceladus_desc = Энцелад — шестой по величине спутник Сатурна, покрытый чистым свежим льдом; даже в полдень температура поверхности не превышает 75 К. Его главная особенность — богатые водой гейзеры, бьющие из криовулканов южной полярной области.

        #RSS_Tethys_desc = Тефия — спутник Сатурна среднего размера, около 1060 км в поперечнике, назван в честь титаниды Тефии из греческой мифологии.

        #RSS_Dione_desc = Диона диаметром 1122 км — 15-й по величине спутник Солнечной системы, массивнее всех известных спутников меньшего размера вместе взятых. Открыта Джованни Кассини в 1684 году.

        #RSS_Rhea_desc = Рея — второй по величине спутник Сатурна и девятый по величине спутник Солнечной системы. Это самое маленькое тело системы, для которого подтверждено гидростатическое равновесие.

        #RSS_Titan_desc = Титан — крупнейший спутник Сатурна. Это единственный известный спутник с плотной атмосферой и единственное, помимо Земли, тело, где обнаружены явные признаки устойчивых поверхностных жидкостей.

        #RSS_Iapetus_desc = Япет — самый удалённый крупный спутник в системе Сатурна; благодаря наклону орбиты с его поверхности видны кольца Сатурна. Вдоль экватора Япета тянется гигантский хребет, придающий спутнику причудливую, похожую на грецкий орех форму.

        #RSS_Uranus_desc = Уран — седьмая планета от Солнца, названная в честь греческого бога неба; во многом схож с соседним Нептуном. Уран иногда выделяют в отдельную категорию — «ледяные гиганты». Его атмосфера похожа на атмосферы Юпитера и Сатурна, но отличается более высоким содержанием воды, аммиака и метана. Кроме того, у Урана самая холодная атмосфера среди планет — около 49 К.

        #RSS_Ariel_desc = Ариэль — четвёртый по величине из 27 известных спутников Урана. Его орбита и вращение лежат в экваториальной плоскости Урана, почти перпендикулярной орбите самой планеты, из-за чего на Ариэле наблюдается крайне выраженная смена сезонов.

        #RSS_Umbriel_desc = Умбриэль — спутник Урана, открытый Уильямом Ласселлом 24 октября 1851 года одновременно с Ариэлем; назван в честь персонажа поэмы Александра Поупа «Похищение локона». Умбриэль состоит в основном изо льда со значительной долей камня и, вероятно, разделён на каменное ядро и ледяную мантию. Его поверхность — самая тёмная среди спутников Урана и, судя по всему, сформирована в основном ударными кратерами. Однако наличие каньонов указывает на раннюю внутреннюю активность, которая могла когда-то полностью обновить более древнюю поверхность спутника.

        #RSS_Titania_desc = Титания — крупнейший спутник Урана и восьмой по величине спутник Солнечной системы, её диаметр 1578 км. Открыта Уильямом Гершелем в 1787 году, названа в честь королевы фей из шекспировского «Сна в летнюю ночь». Её орбита проходит внутри магнитосферы Урана.

        #RSS_Oberon_desc = Оберон, также известный как Уран IV, — самый удалённый из крупных спутников Урана. Второй по размеру и массе среди спутников Урана и девятый по массе спутник Солнечной системы. Открыт Уильямом Гершелем в 1787 году, назван в честь мифического короля фей из шекспировского «Сна в летнюю ночь». Его орбита частично выходит за пределы магнитосферы Урана.

        #RSS_Miranda_desc = Миранда, или Уран V, — самый маленький и ближайший к планете из пяти круглых спутников Урана. Как и другие крупные луны Урана, Миранда вращается почти в экваториальной плоскости планеты. Поскольку Уран обращается вокруг Солнца «лёжа на боку», орбита Миранды почти перпендикулярна эклиптике, и на спутнике наблюдается такая же крайняя смена сезонов. При диаметре всего 470 км Миранда — одно из самых маленьких тел Солнечной системы, сохраняющих сферическую форму под собственной гравитацией. Среди тел в гидростатическом равновесии меньше неё только сатурнианский Мимас.

        #RSS_Venus_desc = Этот прекрасный объект — вторая планета от Солнца. Названная в честь богини любви и красоты, Венера — один из самых ярких объектов ночного неба. Хотя её называют планетой-«сестрой» Земли, спутников у Венеры нет, и она одиноко обращается вокруг нашей звезды.

        #RSS_Vesta_desc = Веста — второе по массе и размеру тело пояса астероидов после карликовой планеты Церера, на неё приходится около 9% массы всего пояса. Веста немного крупнее Паллады, но значительно массивнее неё. Это последняя сохранившаяся каменная протопланета (с дифференцированными недрами) из тех, что когда-то образовали планеты земной группы. Столкновения один-два миллиарда лет назад отправили в космос множество осколков Весты, оставив два гигантских кратера, занимающих большую часть южного полушария. Обломки этих событий падали на Землю в виде HED-метеоритов (говардиты-эвкриты-диогениты), ставших богатым источником сведений о Весте.


