		#LOC_kerbalru_ROCapsules_ROC-MercuryRetroBDB_description = Тормозной двигатель «Меркурия» для схода с орбиты. Установите 3 штуки на ретропакет «Меркурия». Они запускались последовательно с интервалом в пять секунд. <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-MercuryRetropackBDB_title = Ретропакет «Меркурия»
		#LOC_kerbalru_ROCapsules_ROC-MercuryRetropackBDB_description = Металлический поддон крепится под теплозащитой «Меркурия» для установки тормозных РДТТ. Отделение освобождает стяжки, отсоединяя пакет от капсулы перед входом в атмосферу. Это чисто конструктивный элемент — двигателей нет. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionCM_title = Командный модуль «Орион»
		#LOC_kerbalru_ROCapsules_ROC-OrionCM_description = Главный жилой отсек корабля «Орион». Здесь размещены резервное жизнеобеспечение, системы входа в атмосферу и личный груз. Капсула вмещает четырёх астронавтов и пригодна для многократного использования. В этом варианте — серебристое покрытие теплозащиты. <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-OrionCover1_title = Обтекатель СМ «Орион» - 1
		#LOC_kerbalru_ROCapsules_ROC-OrionCover1_description = Этот обтекатель защищает корпус СМ от воздушного потока при старте. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionCover2_title = Обтекатель СМ «Орион» - 2
		#LOC_kerbalru_ROCapsules_ROC-OrionCover2_description = Этот обтекатель защищает корпус СМ от воздушного потока при старте. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionCover3_title = Обтекатель ЕСМ «Орион» - 3
		#LOC_kerbalru_ROCapsules_ROC-OrionCover3_description = Этот обтекатель защищает корпус СМ от воздушного потока при старте. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionESM_title = Европейский служебный модуль «Ориона»
		#LOC_kerbalru_ROCapsules_ROC-OrionESM_description = Служебный модуль «Ориона» несёт топливо и окислитель для основной двигательной установки, а также системы жизнеобеспечения, батареи и всё нужное для долгих орбитальных операций. <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-OrionEUSDecoupler_title = Разделитель «Ориона»
		#LOC_kerbalru_ROCapsules_ROC-OrionEUSDecoupler_description = Разделитель для отделения «Ориона» от SLS. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionForwardHS_title = Передняя теплозащита и стыковочный узел «Ориона»
		#LOC_kerbalru_ROCapsules_ROC-OrionForwardHS_description = Основной стыковочный узел «Ориона», тормозной парашют и защита основного парашюта. Имеет серебристое покрытие теплозащиты. Примечание: лепестки стыковки без коллайдеров, узел совместим со стандартным NASA Docking System. <b><color=green>From ROCapsules mod</color></b>
