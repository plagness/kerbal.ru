		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule1_title = D-2 Block I Mission Module
		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule1_description = The basic D-2 mission module, containing an airlock, life support supplies, and extended battery power, but no docking capability. Contains life support supplies, and extended battery power. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule2_title = D-2 Block II Mission Module
		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule2_description = Upgraded D-2 mission module with docking port attachment. Contains life support supplies, and extended battery power. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Parachute_title = D-2 Parachute
		#LOC_kerbalru_ROCapsules_ROC-D2Parachute_description = Landing parachute system for the D-2 descent capsule. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2RCS_title = D-2 Service Module RCS block
		#LOC_kerbalru_ROCapsules_ROC-D2RCS_description = 3-thruster RCS block for roll control and translation, placed in 4 way symmetry around vessel center of mass. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-D2ServiceModule_title = D-2 Service Module
		#LOC_kerbalru_ROCapsules_ROC-D2ServiceModule_description = Service Module for D-2 vehicle, carries fuel and other vital systems. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Skirt1_title = D-2 4-engine Skirt Section
		#LOC_kerbalru_ROCapsules_ROC-D2Skirt1_description = Skirt section for the attachment of 4 engines, for missions requiring high levels of thrust. Originally this was proposed for redundancy and so quick aborts could be performed on circumlunar flights. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-D2Skirt2_title = D-2 1-engine Skirt Section
		#LOC_kerbalru_ROCapsules_ROC-D2Skirt2_description = Propulsion/Service Module Skirt for Block II vehicle, with reduced mass and mounting for single engine, suitable for LEO operations. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-D2Solar_title = D-2 Solar Array
		#LOC_kerbalru_ROCapsules_ROC-D2Solar_description = Deployable solar arrays for extended orbital missions. Solar Panels degrade, affecting the power output over time.  Check this effect in the PAW. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaAdapterBigMoroz_title = Dynasoar Aft Bay
		#LOC_kerbalru_ROCapsules_ROC-DynaAdapterBigMoroz_description = The aft bay and adapter for Dynasoar, containing liquid hydrogen and liquid oxygen for the fuel cells, space for extra supplies and equipment, and a crew tube. Rated for high altitude hypersonic flight, but decouple before reentry. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaAntenna_title = DynaSoar Telemetry Antenna
		#LOC_kerbalru_ROCapsules_ROC-DynaAntenna_description = A surface mount Telemetry Antenna. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaBayMoroz_title = Dynasoar Cargo Bay
		#LOC_kerbalru_ROCapsules_ROC-DynaBayMoroz_description = Cargo bay for Dynasoar, to carry extra equipment, a payload, or bring something back... <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaButtMoroz_title = Dynasoar Equipment Compartment
		#LOC_kerbalru_ROCapsules_ROC-DynaButtMoroz_description = The rear compartment of the Dynasoar glider, containing the fuel cells, batteries, avionics, and a very cramped crew passthrough. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-DynaCabinMoroz_title = Dynasoar Crew Cabin
		#LOC_kerbalru_ROCapsules_ROC-DynaCabinMoroz_description = Crew cabin for Dynasoar. Holds 2 passengers, and some extra life support equipment and supplies Supports a crew of two for up to maximum 5 days of active operations but it will require fuel cells. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaCockpitMoroz_title = Dynasoar Cockpit
		#LOC_kerbalru_ROCapsules_ROC-DynaCockpitMoroz_description = Dynasoar cockpit. Dynasoar (short for "Dynamic Soarer") was an early USAF spaceplane, intended to function as a station tender, reconnaissance craft, and nuclear bomber. Designed for "Dynamic Soaring", dipping deep into the atmosphere and using aerodynamic manuevers to skip back out, or change it's orbit. This would have allowed it to make passes as low as 50 km for precision reconnaissance or bombing before returning to orbit. For reentry, a slightly negative perigee is recommended.  Supports a crew of one for up to 35 hours of active operations. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-DynaCrewTubeMoroz_title = Dyna Crew Tube
		#LOC_kerbalru_ROCapsules_ROC-DynaCrewTubeMoroz_description = Crew tube to allow for installation of a docking port in the dynasoar cargo bay <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaDockingArms_title = DynaSoar Docking Arms
		#LOC_kerbalru_ROCapsules_ROC-DynaDockingArms_description = DynaSoar Docking arms. Attach them on the front left node of the DynaSoar body. Don’t forget to jettison them before reentry. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaDockingSystem_title = DynaSoar Docking Rod
		#LOC_kerbalru_ROCapsules_ROC-DynaDockingSystem_description = Docking rod for the DynaSoar. This is where the docking arms attach. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaElevonMoroz_title = Dynasoar Elevon
		#LOC_kerbalru_ROCapsules_ROC-DynaElevonMoroz_description = Dynasoar elevons <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaRudderMoroz_title = Dynasoar Vertical Stabilizer
		#LOC_kerbalru_ROCapsules_ROC-DynaRudderMoroz_description = Vertical stabilizers for Dynasoar. Place with a slight inward angle for better stability <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaShieldMoroz_title = Dynasoar Windows Cover
		#LOC_kerbalru_ROCapsules_ROC-DynaShieldMoroz_description = A large aerodynamic Heatshield to protect your cockpit. Decouple before landing. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaSkidFront_title = Dynasoar Fore Skid
		#LOC_kerbalru_ROCapsules_ROC-DynaSkidFront_description = Attach this under the nose. Don’t forget to add this to the GEAR Action group so you can toggle it with the G key. Fiddle with the skid controls at your own risk since they function correctly as is. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaSkidRear_title = Dynasoar Aft Skid
		#LOC_kerbalru_ROCapsules_ROC-DynaSkidRear_description = Attach these under each wing. Don’t forget to add them to the GEAR Action group so you can toggle them with the G key. Fiddle with the skid controls at your own risk since they function correctly as is. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-DynaWingMoroz_title = Dynasoar Wing
		#LOC_kerbalru_ROCapsules_ROC-DynaWingMoroz_description = Wings for Dynasoar spaceplane. Place flush with the bottom of the fuselage. Contains RCS ports for roll control. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-GeminiAntenna_title = Gemini Antenna
		#LOC_kerbalru_ROCapsules_ROC-GeminiAntenna_description = This is a proposed high gain antenna for Gemini upgrades. It is meant to be mounted on the Gemini rendezvous and recovery section. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-GeminiBEquipmentSection_title = Gemini B Adapter Module
		#LOC_kerbalru_ROCapsules_ROC-GeminiBEquipmentSection_description = The lower half of the Gemini-B adapter, with batteries and separation motors. Decoupler detaches the bottom node. Designed for the MOL program, it was tested uncrewed, but the program was cancelled before any manned launches. <b><color=green>From ROCapsules mod</color></b> Plume configured by RealPlume.
		#LOC_kerbalru_ROCapsules_ROC-GeminiBRetrogradeSection_title = Gemini B Retro Module
		#LOC_kerbalru_ROCapsules_ROC-GeminiBRetrogradeSection_description = A hollow structural adapter with mounting points for 4 retrorockets, and a passage for crew. Hold ALT to make attaching the retrorockets easier. Decoupler detaches the bottom node (adapter module). Designed for the MOL program, it was tested uncrewed, but the program was cancelled before any manned launches. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-GeminiFlightPack_title = Gemini Flight Pack
		#LOC_kerbalru_ROCapsules_ROC-GeminiFlightPack_description = Decoupler, and flight pack for Winged Gemini.\t This pack has a decoupler on the bottom to jettison spent fuel tanks or engines. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-GeminiFlightPackContSurf_title = Gemini Flight Pack Control Surface
		#LOC_kerbalru_ROCapsules_ROC-GeminiFlightPackContSurf_description = It's not really a control surface, its more of a metal slat that deflects some of the air that goes by. Goes on the Gemini Flight Pack over the holes. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-GeminiWing_title = Gemini Wings
		#LOC_kerbalru_ROCapsules_ROC-GeminiWing_description = The Winged Gemini experiment was designed so that Gemini could land on a runway. It would have greatly reduced the cost of recovery, but it was so unstable and hard to control in tests that it was abandoned. See if you can do better! Keep the AoA high during reentry, and then drop the nose to keep your speed up. Atmosphereic Autopilot or other fly-by-wire mods strongly recommended. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-GeminiWingContSurf_title = Gemini Wing Control Surface
		#LOC_kerbalru_ROCapsules_ROC-GeminiWingContSurf_description = Put two of these stubby little control surfaces on the bottom of the Gemini wing. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-LEMLMAEBDB_title = Lunar Module Ascent Engine (LMAE)
		#LOC_kerbalru_ROCapsules_ROC-LEMLMDEBDB_title = Lunar Module Descent Engine (LMDE)
		#LOC_kerbalru_ROCapsules_ROC-LEMRover_title = Apollo Lunar Roving Vehicle (LRV)
		#LOC_kerbalru_ROCapsules_ROC-LEMRover_description = This 4-wheeled buggy can be attached to the side of the Apollo LM descent stage, allowing extended exploration on the surface of the Moon. <#ef7b06> AUTHOR'S NOTE: Due to its unstable nature, you should always quicksave and quickload before attempting to board the LRV.</color> <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-LFVBDB_title = Lunar Flying Vehicle
		#LOC_kerbalru_ROCapsules_ROC-LFVBDB_description = The Lunar Flying Vehicle was designed to greatly extend the range from the LEM that can be explored. <#ef7b06> AUTHOR'S NOTE: Store inside the LM Descent Stage Assembly's inventory (requires manually placing in a slot), and deploy by placing on the surface with an engineer. After boarding, select "Control From Here" in the PAW to align forward vector with the engines.</color> <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryAirbrakeBDB_title = Mercury M-ASF Destabilizing Flap
		#LOC_kerbalru_ROCapsules_ROC-MercuryAirbrakeBDB_description = This small airbrake prevents the Mercury from stabilizing in a "nose-first" orientation during reentry. Attach to the offset node on the Mercury Antenna/Drogue Chute unit. Once in orbit, click the brakes action group to extend it for the rest of the mission. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryCMBDB_title = Mercury Capsule
		#LOC_kerbalru_ROCapsules_ROC-MercuryCMBDB_description = The first American spacecraft. Carrying a single astronaut, it can be launched suborbital on a Redstone or into orbit on Atlas LV3B. Supports a crew of one for up to maximum 35 hours of active operations but it will require you to change the resources. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerAtlasBDB_title = Mercury-Atlas Adapter
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerAtlasBDB_description = Interstage for separating the Mercury capsule from an Atlas rocket. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerBDB_title = Mercury Redstone Adapter
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerBDB_description = Decoupler for separating the Mercury capsule from a Redstone rocket. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryHS_title = Mercury Heatshield
		#LOC_kerbalru_ROCapsules_ROC-MercuryHS_description = Small 1.89m heatshield for the Mercury capsule. Place underneath, before adding the retropack. Does not include a fairing. Comes with a built in airbag for a nice comfy landing. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryLESBDB_title = Mercury Launch Escape System
		#LOC_kerbalru_ROCapsules_ROC-MercuryLESBDB_description = This solid rocket tower is designed to wrench the command pod up and away from a malfunctioning rocket. Use only in case of emergency. WARNING: Staging the LES will also decouple it from the bottom node, in order to dispose of it after launch. Map the engine to the ABORT action group for emergency use. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryNoseCapBDB_title = Mercury M-DCAM Nose Unit
		#LOC_kerbalru_ROCapsules_ROC-MercuryNoseCapBDB_description = This nose cap for the Mercury capsule includes the drogue chute and the main antenna. It has an attach node for a destabilizing flap. The latter might not accomplish much but its theorized to help self orient a reentering craft and its nice to have. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryParachuteBDB_title = Mercury M-ASD Main Parachute
		#LOC_kerbalru_ROCapsules_ROC-MercuryParachuteBDB_description = Main parachute for the Mercury capsule. Attach to the node in the recovery section. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryPosigradeBDB_title = Mercury Posigrade Kick Motor
		#LOC_kerbalru_ROCapsules_ROC-MercuryPosigradeBDB_description = This tiny solid rocket motor was originally used to push a Mercury away from its Atlas booster. We're sure you'll think of even more uses for it. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-MercuryRCS2BDB_title = Mercury Landing and Control Module
		#LOC_kerbalru_ROCapsules_ROC-MercuryRCS2BDB_description = This part contains four way RCS thrusters to help orient the Mercury capsule and the main parachute. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-MercuryRCSBDB_title = Mercury Landing and Control Module (DEPRECATED)
		#LOC_kerbalru_ROCapsules_ROC-MercuryRCSBDB_description = <b>(DEPRECATED BY RO)</b> This part contains four way RCS thrusters to help orient the Mercury capsule and the main parachute. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-MercuryRetroBDB_title = Mercury Retro (TE-M-316)
		#LOC_kerbalru_ROCapsules_ROC-MercuryRetroBDB_description = The Mercury retro motor, intended to deorbit the capsule. Place 3 on the Mercury Retropack. These were fired in sequence at five second intervals. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-MercuryRetropackBDB_title = Mercury Retropack
		#LOC_kerbalru_ROCapsules_ROC-MercuryRetropackBDB_description = This metal tub attaches to the bottom of the Mercury heatshield, allowing retro solids to be mounted. Decoupling will release the straps to separate from the capsule for reentry. Note that this is purely a structural unit - no propulsion is included. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionCM_title = Orion Command Module
		#LOC_kerbalru_ROCapsules_ROC-OrionCM_description = The main crew compartment for the Orion spacecraft. Secondary life support, reentry systems and personal cargo spaces are located there. The capsule houses four astronauts and can be used multiple times. This variant uses a silver coating for thermal protection. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-OrionCover1_title = Orion SM Fairing - 1
		#LOC_kerbalru_ROCapsules_ROC-OrionCover1_description = This shroud protects the fragile exterior of the SM from the high speed airflow around the rocket during launch. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionCover2_title = Orion SM Fairing - 2
		#LOC_kerbalru_ROCapsules_ROC-OrionCover2_description = This shroud protects the fragile exterior of the SM from the high speed airflow around the rocket during launch. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionCover3_title = Orion ESM Fairing - 3
		#LOC_kerbalru_ROCapsules_ROC-OrionCover3_description = This shroud protects the fragile exterior of the SM from the high speed airflow around the rocket during launch. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionESM_title = Orion European Service Module
		#LOC_kerbalru_ROCapsules_ROC-OrionESM_description = The service module of the Orion spacecraft contains fuel and oxidizer for the main propulsion system, life support, electrical batteries and everything else needed for extended orbital operations. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-OrionEUSDecoupler_title = Orion Decoupler
		#LOC_kerbalru_ROCapsules_ROC-OrionEUSDecoupler_description = Decoupler for separating Orion from the SLS. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionForwardHS_title = Orion Forward Heat Shield and Docking Port
		#LOC_kerbalru_ROCapsules_ROC-OrionForwardHS_description = Orion main docking port, drogue parachute and main parachute shield. This one is equipped with a silver coating for thermal protection. Note: The docking petals do not have colliders, so this port should be able to dock with the stock NASA Docking System <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionHS_title = Orion Heatshield
		#LOC_kerbalru_ROCapsules_ROC-OrionHS_description = An ablative heat shield that goes on the bottom of the Orion pod. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionLAS_title = Orion LAS and BPC
		#LOC_kerbalru_ROCapsules_ROC-OrionLAS_description = Launch Escape System and Boost Protective Cover for the Orion spacecraft. Jettison by decoupling, use by assigning the escape motor and the decoupler on service module to the "abort" action group. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionParachute_title = Orion Main Parachute
		#LOC_kerbalru_ROCapsules_ROC-OrionParachute_description = The primary parachute for the Orion spacecraft. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionRCS_title = Orion RCS Thrusters
		#LOC_kerbalru_ROCapsules_ROC-OrionRCS_description = RCS thruster blocks for the Orion Service Module. 4 of them are placed on the service module, 45 degrees off the spacecraft's principal axes. <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-OrionSolar_title = Orion Solar Panels
		#LOC_kerbalru_ROCapsules_ROC-OrionSolar_description = Solar panels for the Orion. Solar Panels degrade, affecting the power output over time.  Check this effect in the PAW. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VoskhodAirlock_title = Voskhod Airlock
		#LOC_kerbalru_ROCapsules_ROC-VoskhodAirlock_description = The Voskhod Airlock will allow for your crew to perform an EVA from the Voskhod airlock. Attach this to the node on the side of the Voskhod capsule. Transfer your crew memeber inside and perform your EVA. Be sure to decouple this before re-entry. <b><color=green>From ROCapsules mod</color></b> Plume configured by RealPlume.
		#LOC_kerbalru_ROCapsules_ROC-VoskhodCapsule_title = Voskhod Descent Module
		#LOC_kerbalru_ROCapsules_ROC-VoskhodCapsule_description = The Voskhod SA Descent Module was a re-purposed version of the Vostok SA. It was retrofitted to allow for an Airlock attachment for EVA and even to fit 3 cosmonauts. However, with 3 cosmonauts, there was not enough room to wear pressure suits. The SA stands for Spuskaemiy Apparat (Descent System) and was designed as a ballistic reentry capsule. [Diameter 2.3 m] <b><color=green>From ROCapsules mod</color></b> Plume configured by RealPlume. <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroBooster_title = Voskhod Retro Package
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroBooster_description = Voskhod backup retro unit. Attach above the Voskhod Capsule on top of the Voskhod Retro Decoupler. <b><color=green>From ROCapsules mod</color></b> Plume configured by RealPlume.
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroDecoupler_title = Voskhod Retro Decoupler
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroDecoupler_description = Place this above the Descent Module to decoupler the additional retro booster. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokCapsule_title = Vostok Descent Module
		#LOC_kerbalru_ROCapsules_ROC-VostokCapsule_description = The Vostok SA Descent Module was the first spacecraft to carry humans into space when Yuri Gagarin flew on April 12, 1961. The SA stands for Spuskaemiy Apparat (Descent System) and was designed as a ballistic reentry capsule. [Diameter 2.3 m] <b><color=green>From ROCapsules mod</color></b> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokDecoupler_title = Vostok/Voskhod Decoupler
		#LOC_kerbalru_ROCapsules_ROC-VostokDecoupler_description = Place this between the Descent Module and the Service Module to decouple the Capsule for reentry. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokParachute_title = Vostok/Voskhod Parachute
		#LOC_kerbalru_ROCapsules_ROC-VostokParachute_description = When Yuri Gagarin returned to Earth after the first maiden spaceflight, he ejected from the capsule and parachuted to the ground. It was not until later versions of the capsule was the Parachute added. Connect this to the open part of the capsule <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokService_title = Vostok/Voskhod/Zenit Service Module
		#LOC_kerbalru_ROCapsules_ROC-VostokService_description = A service module with batteries a simple de-orbit engine that has only 1 ignition. This is the same service module that you use for Vostok, Voskhod, and Zenit. Attach the Decoupler to the Descent Module first and attach this to the bottom of the Descent Module. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-ZenitCapsule_title = Zenit Descent Module (Improved Film Camera)
		#LOC_kerbalru_ROCapsules_ROC-ZenitCapsule_description = The Zenit Descent Module was developed in parallel with the Vostok Descent Module, for photoreconnaissance use. Placing the camera equipment in a pressurized capsule made development much easier, and the cameras and film could be recovered together, reducing cost. Historically used as a spy satellite, but for our peaceful RP-1 purposes, these represent the earliest weather satellite photos. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_TOWER_SV_title = Saturn V Launch Tower
		#LOC_kerbalru_ROCapsules_TOWER_SV_description = The Mobile Launch Pad (MLP) and Launch Umbilical Tower (LUT) for the Saturn V launch vehicle. <b><color=green>From DECQ_SaturnV mod</color></b>
	}
