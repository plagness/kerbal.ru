		#LOC_kerbalru_ROCapsules_ROC-D2Parachute_description = Парашютная система посадки спускаемой капсулы D-2. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2RCS_title = Блок РСУ служебного модуля D-2
		#LOC_kerbalru_ROCapsules_ROC-D2RCS_description = Блок РСУ с 3 двигателями для крена и трансляции, устанавливается с симметрией 4 вокруг центра масс. <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-D2ServiceModule_title = Служебный модуль D-2
		#LOC_kerbalru_ROCapsules_ROC-D2ServiceModule_description = Служебный модуль D-2 с топливом и другими важными системами. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Skirt1_title = Юбка D-2 (4 двигателя)
		#LOC_kerbalru_ROCapsules_ROC-D2Skirt1_description = Юбка для крепления 4 двигателей — для миссий с высокой тягой. Изначально предложена для резервирования и быстрого аварийного прерывания при облёте Луны. <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-D2Skirt2_title = Юбка D-2 (1 двигатель)
