		#LOC_kerbalru_ROCapsules_ROC-GeminiFlightPackContSurf_description = Не совсем рулевая поверхность — скорее металлическая пластина, отклоняющая набегающий воздух. Устанавливается на лётный блок Джемини поверх отверстий. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-GeminiWing_title = Крылья Джемини
		#LOC_kerbalru_ROCapsules_ROC-GeminiWing_description = Эксперимент «Крылатый Джемини» должен был сажать корабль на полосу. Это удешевило бы спасение, но модель оказалась настолько неустойчивой и трудноуправляемой в тестах, что проект закрыли. Попробуйте добиться большего! Держите высокий AoA при входе, затем опустите нос, чтобы сохранить скорость. Рекомендуются Atmospheric Autopilot или другие fly-by-wire моды. <b><color=green>From ROCapsules mod</color></b>
