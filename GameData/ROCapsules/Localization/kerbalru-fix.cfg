		#LOC_kerbalru_ROCapsules_ROC-MercuryParachuteBDB_description = Основной парашют капсулы «Меркурий». Крепится к узлу в секции спасения. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryPosigradeBDB_title = Разгонный двигатель «Меркурия»
		#LOC_kerbalru_ROCapsules_ROC-MercuryPosigradeBDB_description = Этот маленький РДТТ изначально отталкивал «Меркурий» от ступени Атлас. Уверены, вы найдёте ему и другие применения. <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i>
