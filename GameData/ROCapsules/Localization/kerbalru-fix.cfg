		#LOC_kerbalru_ROCapsules_ROC-CSTNoseCone_description = Защитный обтекатель стыковочного узла NASA на CST-100 Starliner. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-CSTParachute_title = Парашютный блок CST-100
		#LOC_kerbalru_ROCapsules_ROC-CSTParachute_description = Парашютный блок командного модуля CST-100 «Starliner». <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-CSTRS88_title = Двигатели аварийного спасения CST-100 (LAE)
		#LOC_kerbalru_ROCapsules_ROC-CSTRS88_description = Система аварийного спасения корабля CST-100 «Starliner». Четыре двигателя RS-88 (гиперголиевый вариант). <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-CSTSM_title = Служебный модуль CST-100
		#LOC_kerbalru_ROCapsules_ROC-CSTSM_description = Служебный модуль корабля CST-100 «Starliner». Солнечные панели деградируют, снижая выработку энергии со временем. Проверьте этот эффект в PAW. <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-D2AJ10-133_title = AJ10-133-LH
		#LOC_kerbalru_ROCapsules_ROC-D2AJ10-133_description = Вариант AJ10 на жидком водороде и кислороде, предложен для корабля GE D-2 в программе «Аполлон». <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-D2Adaptor_title = Переходник экрана D-2
		#LOC_kerbalru_ROCapsules_ROC-D2Adaptor_description = Разделитель, соединяющий основание спускаемого модуля D-2 с двигательным модулем. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Antenna_title = Остронаправленная антенна D-2
		#LOC_kerbalru_ROCapsules_ROC-D2Antenna_description = Раскладная тарельчатая антенна под аэродинамическим обтекателем. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Block1LES_title = Двигатель спасения D-2 Block I
		#LOC_kerbalru_ROCapsules_ROC-D2Block1LES_description = Двигатель спасения для конфигурации D-2 Block I. Крепится к разделителю с симметрией 4x у основания аппарата. <b><color=green>From ROCapsules mod</color></b> Шлейф настроен через RealPlume.
		#LOC_kerbalru_ROCapsules_ROC-D2Block1LESDecoupler_title = Разделитель двигателя спасения D-2 Block I
		#LOC_kerbalru_ROCapsules_ROC-D2Block1LESDecoupler_description = Разделитель для двигателей спасения D-2 Block I. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Block2LES_title = Система аварийного спасения D-2 Block II
		#LOC_kerbalru_ROCapsules_ROC-D2Block2LES_description = Носовая система аварийного спасения для аппарата D-2 Block II. Устанавливается над присоединённым стыковочным узлом. <b><color=green>From ROCapsules mod</color></b> Шлейф настроен через RealPlume.
		#LOC_kerbalru_ROCapsules_ROC-D2Block2Nosecone_title = Носовой обтекатель D-2 Block II
		#LOC_kerbalru_ROCapsules_ROC-D2Block2Nosecone_description = Простой обтекатель для беспилотных запусков. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2CM_title = Спускаемый модуль D-2
		#LOC_kerbalru_ROCapsules_ROC-D2CM_description = Проект 1961 года — пилотируемый корабль для полёта на Луну, уступивший более известному CSM «Аполлон». По компоновке D-2 сильно напоминает более поздний «Союз»: двигательный модуль, спускаемая капсула и отделяемый бытовой модуль обеспечивают эффективное использование объёма и широкий спектр миссий, включая облёт Луны. Экипаж 3 человека, автономность до 14 суток, но потребуются топливные элементы. <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2DockDrogue_title = Стыковочный конус D-2
		#LOC_kerbalru_ROCapsules_ROC-D2DockDrogue_description = Небольшой стыковочный узел типа штырь-конус для перехода экипажа, подходит для простых станций. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2DockProbe_title = Стыковочный штырь D-2
		#LOC_kerbalru_ROCapsules_ROC-D2DockProbe_description = Небольшой стыковочный узел типа штырь-конус для перехода экипажа, подходит для простых станций. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Interstage_title = Межступень D-2 Block I
		#LOC_kerbalru_ROCapsules_ROC-D2Interstage_description = Разделитель 4м-4м, соединяющий корабль D-2 с ракетой-носителем. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Interstage2_title = Межступень D-2 3м
		#LOC_kerbalru_ROCapsules_ROC-D2Interstage2_description = Разделитель 3м-3м, соединяющий корабль D-2 Block II с ракетой-носителем. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2Interstage3_title = Межступень D-2 4м
		#LOC_kerbalru_ROCapsules_ROC-D2Interstage3_description = Разделитель 3м-4м, соединяющий корабль D-2 Block II с ракетой-носителем. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule1_title = Бытовой модуль D-2 Block I
		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule1_description = Базовый бытовой модуль D-2 со шлюзом, запасом СЖО и батареями повышенной ёмкости, но без стыковочного узла. Включает запас СЖО и батареи повышенной ёмкости. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule2_title = Бытовой модуль D-2 Block II
		#LOC_kerbalru_ROCapsules_ROC-D2MissionModule2_description = Улучшенный бытовой модуль D-2 со стыковочным узлом. Включает запас СЖО и батареи повышенной ёмкости. <b><color=green>From ROCapsules mod</color></b>
