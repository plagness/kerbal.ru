		#LOC_kerbalru_ROCapsules_ROC-AgenaFairing_description = Половины обтекателя стыковочной мишени «Аджена». <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-AgenaPort_title = Стыковочный узел мишени «Джемини-Аджена»
		#LOC_kerbalru_ROCapsules_ROC-AgenaPort_description = Этот стыковочный узел предназначен для захвата стыковочного механизма носового обтекателя «Джемини». Простое механическое соединение не позволяет переводить экипаж, но надёжно соединяет два корабля для стыковки или совместного полёта. Электроразъёмы и приборная панель над узлом позволяют экипажу управлять пристыкованным кораблём. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-CSTCM_title = Командный модуль CST-100
		#LOC_kerbalru_ROCapsules_ROC-CSTCM_description = Командный модуль коммерческого пилотируемого корабля CST-100 «Starliner» (COTS). Рассчитан на повторное использование до 10 раз. Экипаж 7 человек, автономность 2 дня. <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-CSTHS_title = Теплозащитный экран CST-100
		#LOC_kerbalru_ROCapsules_ROC-CSTHS_description = Теплозащитный экран командного модуля CST-100 «Starliner». <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-CSTNDSActive_title = Стыковочный узел NASA (Активный)
		#LOC_kerbalru_ROCapsules_ROC-CSTNDSActive_description = Стыковочный узел NASA (NDS) — механизм стыковки американских пилотируемых кораблей, включая Orion (Multi-Purpose Crew Vehicle) и корабли Commercial Crew. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-CSTNDSPassive_title = Стыковочный узел NASA (Пассивный)
		#LOC_kerbalru_ROCapsules_ROC-CSTNDSPassive_description = Стыковочный узел NASA (NDS) — механизм стыковки американских пилотируемых кораблей, включая Orion (Multi-Purpose Crew Vehicle) и корабли Commercial Crew. <b><color=green>From ROCapsules mod</color></b>
