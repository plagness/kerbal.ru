		#LOC_kerbalru_ROCapsules_ROC-GeminiBRetrogradeSection_description = Полый переходник с креплением для 4 тормозных двигателей и проходом для экипажа. Зажмите ALT для удобного крепления двигателей. Декаплер отделяет нижний узел (переходный модуль). Создан для программы MOL; испытан беспилотно, но программу отменили до пилотируемых пусков. <b><color=green>From ROCapsules mod</color></b>
