		#LOC_kerbalru_ROCapsules_ROC-DynaCockpitMoroz_description = Кокпит Dynasoar. Dynasoar (сокращение от «Dynamic Soarer») — ранний космоплан USAF, предназначенный для снабжения станций, разведки и ядерных бомбардировок. Рассчитан на «динамическое парение» — глубокое погружение в атмосферу с аэродинамическими манёврами для возврата на орбиту или её изменения. Это позволяло снижаться до 50 км для точной разведки или бомбардировки перед возвратом на орбиту. Для входа рекомендуется слегка отрицательный перигей. Экипаж 1 человек, автономность до 35 часов. <b><color=green>From ROCapsules mod</color></b> <i>Шлейф и звук от Waterfall.</i>
