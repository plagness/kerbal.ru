		#LOC_kerbalru_ROCapsules_ROC-MercuryHS_description = Небольшая теплозащита 1.89м для капсулы «Меркурий». Устанавливается снизу, перед креплением ретропакета. Обтекатель не входит в комплект. Имеет встроенную подушку безопасности для мягкой посадки. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryLESBDB_title = Система аварийного спасения «Меркурия»
		#LOC_kerbalru_ROCapsules_ROC-MercuryLESBDB_description = Эта твердотопливная башня отрывает командный отсек от аварийной ракеты. Используйте только в экстренной ситуации. ВНИМАНИЕ: активация ступени также отделит САС от нижнего узла, чтобы сбросить её после старта. Назначьте двигатель на группу действий ABORT для экстренного использования. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryNoseCapBDB_title = Носовой блок «Меркурий» M-DCAM
		#LOC_kerbalru_ROCapsules_ROC-MercuryNoseCapBDB_description = Носовой обтекатель капсулы «Меркурий» включает тормозной парашют и основную антенну. Есть узел крепления для дестабилизирующего щитка. Он не особо эффективен, но теоретически помогает ориентировать спускаемый аппарат — и это приятный бонус. <b><color=green>From ROCapsules mod</color></b>
