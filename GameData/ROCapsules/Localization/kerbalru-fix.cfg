		#LOC_kerbalru_ROCapsules_ROC-MercuryRCS2BDB_description = Содержит четыре двигателя RCS для ориентации капсулы «Меркурий» и основного парашюта. <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i>
