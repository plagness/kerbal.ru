		#LOC_kerbalru_ROCapsules_ROC-LEMRover_description = Этот 4-колёсный багги крепится сбоку к посадочной ступени LM «Аполлон» для расширенных исследований Луны. Из-за нестабильности механики рекомендуется сохраняться перед посадкой в LRV. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-LFVBDB_title = Лунный летающий аппарат
		#LOC_kerbalru_ROCapsules_ROC-LFVBDB_description = Лунный летающий аппарат создан для существенного увеличения дальности исследования от LEM. Храните в инвентаре посадочной ступени LM (нужно вручную поместить в слот), разворачивайте на поверхности с инженером. После посадки внутрь выберите «Control From Here» в PAW, чтобы выровнять вектор вперёд по двигателям. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryAirbrakeBDB_title = Дестабилизирующий щиток «Меркурий» M-ASF
		#LOC_kerbalru_ROCapsules_ROC-MercuryAirbrakeBDB_description = Этот небольшой аэродинамический тормоз не даёт «Меркурию» стабилизироваться «носом вперёд» при входе в атмосферу. Крепится к смещённому узлу на блоке антенны/тормозного парашюта «Меркурия». На орбите активируйте группу действий «тормоза», чтобы выпустить его до конца миссии. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryCMBDB_title = Капсула «Меркурий»
		#LOC_kerbalru_ROCapsules_ROC-MercuryCMBDB_description = Первый американский космический корабль. Несёт одного астронавта, запускается суборбитально на Redstone или на орбиту на Атлас LV3B. Экипаж 1 человек, до 35 часов активной работы, но потребуется вручную менять ресурсы. <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerAtlasBDB_title = Переходник Меркурий-Атлас
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerAtlasBDB_description = Межступенчатый переходник для отделения капсулы «Меркурий» от ракеты Атлас. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerBDB_title = Переходник Меркурий-Redstone
		#LOC_kerbalru_ROCapsules_ROC-MercuryDecouplerBDB_description = Разделитель для отделения капсулы «Меркурий» от ракеты Redstone. <b><color=green>From ROCapsules mod</color></b>
