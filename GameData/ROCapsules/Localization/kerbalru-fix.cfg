		#LOC_kerbalru_ROCapsules_ROC-D2CM_title = D-2 Descent Module
		#LOC_kerbalru_ROCapsules_ROC-D2CM_description = 1961 proposed design for a manned spacecraft to take humans to the moon, but passed over in favour of the familiar Apollo CSM. Remarkably similar to the later Soyuz in design, the D-2 consists of a propulsion module, descent capsule, and a detachable mission module, providing efficient use of space and capability for a wide range of missions, including circumlunar flights. Supports a crew of three for up to maximum 14 days of active operations but it will require fuel cells. <b><color=green>From ROCapsules mod</color></b> <i>Plume and sound from Waterfall.</i> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
