		#LOC_kerbalru_ROCapsules_ROC-OrionLAS_title = САС и BPC «Ориона»
		#LOC_kerbalru_ROCapsules_ROC-OrionLAS_description = Система аварийного спасения и защитный кожух корабля «Орион». Сбрасывается отделением; назначьте двигатель САС и разделитель СМ на группу действий "abort". <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionParachute_title = Основной парашют «Ориона»
		#LOC_kerbalru_ROCapsules_ROC-OrionParachute_description = Главный парашют корабля «Орион». <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-OrionRCS_title = Двигатели RCS «Ориона»
		#LOC_kerbalru_ROCapsules_ROC-OrionRCS_description = Блоки двигателей RCS для служебного модуля «Ориона». 4 блока установлены на СМ под углом 45° к главным осям корабля. <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-OrionSolar_title = Солнечные панели «Ориона»
		#LOC_kerbalru_ROCapsules_ROC-OrionSolar_description = Солнечные панели для «Ориона». Панели деградируют, снижая выработку энергии со временем. Смотрите этот эффект в PAW. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VoskhodAirlock_title = Шлюз «Восхода»
		#LOC_kerbalru_ROCapsules_ROC-VoskhodAirlock_description = Шлюз «Восхода» позволяет экипажу выполнить EVA через этот шлюз. Крепится к узлу сбоку капсулы «Восход». Переведите члена экипажа внутрь и выполните EVA. Обязательно отстыкуйте перед входом в атмосферу. <b><color=green>From ROCapsules mod</color></b> Эффекты настроены через RealPlume.
		#LOC_kerbalru_ROCapsules_ROC-VoskhodCapsule_title = Спускаемый аппарат «Восход»
		#LOC_kerbalru_ROCapsules_ROC-VoskhodCapsule_description = СА «Восхода» — переработанная версия СА «Востока». Дорабатывался для крепления шлюза EVA и размещения 3 космонавтов. Однако с 3 космонавтами не хватало места для скафандров. СА означает Спускаемый Аппарат — баллистическая капсула для входа в атмосферу. [Диаметр 2.3 м] <b><color=green>From ROCapsules mod</color></b> Эффекты настроены через RealPlume. <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroBooster_title = Тормозной блок «Восхода»
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroBooster_description = Резервный тормозной блок «Восхода». Крепится сверху капсулы «Восход», над тормозным разделителем. <b><color=green>From ROCapsules mod</color></b> Эффекты настроены через RealPlume.
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroDecoupler_title = Тормозной разделитель «Восхода»
		#LOC_kerbalru_ROCapsules_ROC-VoskhodRetroDecoupler_description = Устанавливается над спускаемым аппаратом для отделения тормозного блока. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokCapsule_title = Спускаемый аппарат «Восток»
		#LOC_kerbalru_ROCapsules_ROC-VostokCapsule_description = СА «Востока» — первый корабль с человеком на борту: Юрий Гагарин полетел 12 апреля 1961 года. СА означает Спускаемый Аппарат — баллистическая капсула для входа в атмосферу. [Диаметр 2.3 м] <b><color=green>From ROCapsules mod</color></b> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokDecoupler_title = Разделитель «Восток/Восход»
		#LOC_kerbalru_ROCapsules_ROC-VostokDecoupler_description = Устанавливается между спускаемым аппаратом и служебным модулем для отделения капсулы перед входом в атмосферу. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokParachute_title = Парашют «Восток/Восход»
		#LOC_kerbalru_ROCapsules_ROC-VostokParachute_description = После первого полёта Юрий Гагарин катапультировался из капсулы и приземлился на парашюте. Парашют появился только в поздних версиях капсулы. Крепится к открытой части капсулы. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_ROC-VostokService_title = Служебный модуль «Восток/Восход/Зенит»
		#LOC_kerbalru_ROCapsules_ROC-VostokService_description = Служебный модуль с батареями и простым тормозным двигателем на 1 запуск. Тот же модуль используется для «Востока», «Восхода» и «Зенита». Сначала прикрепите разделитель к спускаемому аппарату, затем этот модуль — снизу. <b><color=green>From ROCapsules mod</color></b> <i>Эффекты и звук от Waterfall.</i>
		#LOC_kerbalru_ROCapsules_ROC-ZenitCapsule_title = Спускаемый аппарат «Зенит» (улучшенная фотокамера)
		#LOC_kerbalru_ROCapsules_ROC-ZenitCapsule_description = СА «Зенита» разрабатывался параллельно с СА «Востока» для фоторазведки. Размещение камер в герметичной капсуле упростило разработку и позволило вернуть камеры с плёнкой вместе, снизив затраты. Исторически — разведывательный спутник, но в мирном RP-1 это ранние снимки погоды. <b><color=green>From ROCapsules mod</color></b>
		#LOC_kerbalru_ROCapsules_TOWER_SV_title = Стартовая башня «Сатурн V»
		#LOC_kerbalru_ROCapsules_TOWER_SV_description = Мобильная стартовая платформа (МСП) и пусковая башня (LUT) для ракеты «Сатурн V». <b><color=green>From DECQ_SaturnV mod</color></b>
	}
}
