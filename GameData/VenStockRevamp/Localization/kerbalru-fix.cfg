	{
		#LOC_kerbalru_VenStockRevamp_1x3SPanels_description = Extendable Level 1 solar panel. 0.63m^2. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_1x3WPanels_description = Extendable Level 2 solar panel. 2.28m^2. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_45DegreeRCS_title = RCS Quad, 45deg (275/445 N class)
		#LOC_kerbalru_VenStockRevamp_45DegreeRCS_description = A generic RCS quad with 45degree side-thruster orientation. Use this for attitude control or translation/ullage for medium stages and spacecraft (when using NTO/MMH, same performance as the Apollo SM quads). <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From Ven Stock Revamp mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_VenStockRevamp_HeavyRcs_title = RCS Quad (550/890 N class)
		#LOC_kerbalru_VenStockRevamp_HeavyRcs_description = A generic RCS quad. Use this for attitude control or translation/ullage for large stages and spacecraft. Note that the thrust per nozzle is only half the thrust class, but two nozzles fire in each direction. <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From Ven Stock Revamp mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_VenStockRevamp_InlineRCS_title = Inline RCS block (138/223 N class)
		#LOC_kerbalru_VenStockRevamp_InlineRCS_description = A generic inline RCS block. Use this for orientation on small capsules and probes. <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From Ven Stock Revamp mod</color></b> <i>Plume and sound from Waterfall.</i>
		#LOC_kerbalru_VenStockRevamp_KerbCan_title = 1.25m Crew Carrier
		#LOC_kerbalru_VenStockRevamp_KerbCan_description = One-person inline crew hab section for spaceplanes. Rated for suborbital reentries. X-15 class. <b><color=green>From Ven Stock Revamp mod</color></b> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_VenStockRevamp_LGLadderUtility_title = MK III Mobility Enhancer
		#LOC_kerbalru_VenStockRevamp_LGLadderUtility_description = The MK III Mobility Enhancer, known in some circles as a "ladder", is a state-of-the-art vertical mobility device, allowing your intrepid crew to scamper around the exterior of your ship like highly caffeinated rodents. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_LargeOMS_title = Astris
		#LOC_kerbalru_VenStockRevamp_MK1Cargobay_title = 1.25m Cargo Bay
		#LOC_kerbalru_VenStockRevamp_MK2VApod_title = TKS VA Command Module
		#LOC_kerbalru_VenStockRevamp_MK2VApod_description = The VA command module is part of the TKS/FGB spacecraft. It can be attached either to the FGB module of the TKS, to the front section of the Almaz station or to both. In the latter case, the station could be launched manned with the crew riding to orbit inside the VA capsule. The crew would be able to exit and enter the VA capsule in orbit via a hatch in the heat shield located at the bottom of the craft. Supports three crew for one day. Center of mass can be offset to allow lifting reentry (toggle Descent Mode). <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_MedLadderUtility_title = MK II Mobility Enhancer
		#LOC_kerbalru_VenStockRevamp_MedLadderUtility_description = The MK II Mobility Enhancer, known in some circles as a "ladder", is a state-of-the-art vertical mobility device, allowing your intrepid crew to scamper around the exterior of your ship like highly caffeinated rodents. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SMLadderUtility_title = MK I Mobility Enhancer
		#LOC_kerbalru_VenStockRevamp_SMLadderUtility_description = The MK I Mobility Enhancer, known in some circles as a "ladder", is a state-of-the-art vertical mobility device, allowing your intrepid crew to scamper around the exterior of your ship like highly caffeinated rodents. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_ShieldCapLarge_title = Mk2 Pod Protective Cover
		#LOC_kerbalru_VenStockRevamp_ShieldCapLarge_description = Aerodynamic cover for the Mk2 Command Module. Provides protection from the aerodynamic forces inside the dense parts of the atmosphere and from the LES exhaust in the case of an emergency. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SmallPointLight_title = MK 4 Point Light
		#LOC_kerbalru_VenStockRevamp_SmallPointLight_description = A small lamp made to light up everything, whether you like it or not. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SmallSpotLight_title = MK 3 Mini Spotlight
		#LOC_kerbalru_VenStockRevamp_SmallSpotLight_description = A miniature version of the large MK1 spotlight that's perfect for small rovers; or for the more adventurous, a large headlamp. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SmallStripLight_title = MK 5 Strip Light
		#LOC_kerbalru_VenStockRevamp_SmallStripLight_description = A small strip light ideally used as aircraft navigation lights.  We can't stop you from trying to light up your house with em', but you will fail. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SnubOtron_title = Separation Motor (Small)
		#LOC_kerbalru_VenStockRevamp_SnubOtron_description = Small solid motor use to help separate one stage from another or perform ullage. Best used with others. Smaller and less advanced than the radial separation motor. <b><color=green>From Stock (RO Config) mod</color></b> Plume configured by RealPlume.
		#LOC_kerbalru_VenStockRevamp_rtgMini_title = SNAP-3B Series RTG (Pu238)
		#LOC_kerbalru_VenStockRevamp_rtgMini_description = The SNAP-3 series were the first radioisotope thermoelectric generators (RTGs) to ever operate in space, as part of the Transit system (precursor to the current GPS system). Very low overall efficiency, with target power generation of 2.4 watts. Plutonium-238 variant, with lower power but much longer life. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_smallRadialDecoupler_description = A small radial decoupler. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_stationHubLarge_title = Extra-Large Rockomax HubMax Multi-Point Connector
		#LOC_kerbalru_VenStockRevamp_stationHubLarge_description = After the fervorous response from fans, Rockomax has decide to up the ante with the Extra-Large Rockomax HubMax Multi-Point Connector, seamlessly integrating 2.5 meter parts on a very large hub. Unfortunately, no one died of shock that day. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCube3way_title = Cubic Octagonal Strut Three Way Connector
		#LOC_kerbalru_VenStockRevamp_strutCube3way_description = New from Strutco! A new connector that connects at right angles, and in two directions! Radical! <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCube90_title = Cubic Octagonal Strut Angle Connector
		#LOC_kerbalru_VenStockRevamp_strutCube90_description = New from Strutco! A new connector that connects at right angles! Brilliant! <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeLarge_title = Cubic Octagonal Strut Mk IV
		#LOC_kerbalru_VenStockRevamp_strutCubeLarge_description = Now you can strut the gaps between your dreams.  The Cubic Octagonal Strut MK IV is here! <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeMedium_title = Cubic Octagonal Strut Mk III
		#LOC_kerbalru_VenStockRevamp_strutCubeMedium_description = A Cubic Octagonal Strut that's even longer! Use multiple struts no longer! With these ultra-light extensions, you can now strut all the things! <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeMountingPlate_title = Cubic Octagonal Strut Slim Mounting Plate
		#LOC_kerbalru_VenStockRevamp_strutCubeMountingPlate_description = A slim strut perfect for mounting things on other things! <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeOCTOAdapter_title = Cubic Octagonal Strut Octagonal Adapter
		#LOC_kerbalru_VenStockRevamp_strutCubeOCTOAdapter_description = An adapter that connects your Standard C.O.S. into the standard Octagonal frame. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeS0Adapter_title = Cubic Octagonal Strut 0.625m Adapter
		#LOC_kerbalru_VenStockRevamp_strutCubeS0Adapter_description = An adapter that connects your Standard C.O.S. into the standard 0.625m frame. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeSmall_title = Cubic Octagonal Strut Mk II
		#LOC_kerbalru_VenStockRevamp_strutCubeSmall_description = Despite its title, the Small Cubic Octagonal Strut is actually longer than its smaller cousin! <b><color=green>From Stock (RO Config) mod</color></b>
	}
	ru
	{
		#LOC_kerbalru_VenStockRevamp_1x3SPanels_description = Раскладная солнечная панель уровня 1. 0.63m^2. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_1x3WPanels_description = Раскладная солнечная панель уровня 2. 2.28m^2. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_45DegreeRCS_title = Блок RCS, 45° (класс 275/445 Н)
		#LOC_kerbalru_VenStockRevamp_45DegreeRCS_description = Типовой блок RCS с соплами под 45°. Служит для ориентации, линейных манёвров и поджатия топлива на средних ступенях и КА (при NTO/MMH — как у блоков Apollo SM). <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From Ven Stock Revamp mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_VenStockRevamp_HeavyRcs_title = Блок RCS (класс 550/890 Н)
		#LOC_kerbalru_VenStockRevamp_HeavyRcs_description = Типовой блок RCS. Для ориентации, линейных манёвров и поджатия топлива на крупных ступенях и КА. Тяга каждого сопла — половина класса, но в каждую сторону бьют два сопла. <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From Ven Stock Revamp mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_VenStockRevamp_InlineRCS_title = Встроенный блок RCS (класс 138/223 Н)
		#LOC_kerbalru_VenStockRevamp_InlineRCS_description = Типовой встроенный блок RCS. Для ориентации небольших капсул и зондов. <b><color=red> RCS requires High-Pressure tanks to function.</color></b> <b><color=green>From Ven Stock Revamp mod</color></b> <i>Шлейф и звук от Waterfall.</i>
		#LOC_kerbalru_VenStockRevamp_KerbCan_title = Отсек экипажа 1.25m
		#LOC_kerbalru_VenStockRevamp_KerbCan_description = Одноместный встроенный отсек экипажа для космопланов. Для суборбитальных спусков. Класс X-15. <b><color=green>From Ven Stock Revamp mod</color></b> <b><color=red>THIS PART DOESN'T ALLOW EVA!</color></b>
		#LOC_kerbalru_VenStockRevamp_LGLadderUtility_title = Усилитель подвижности MK III
		#LOC_kerbalru_VenStockRevamp_LGLadderUtility_description = Усилитель подвижности MK III, известный также как «лестница» — современное устройство для перемещения по корпусу корабля. Экипаж носится по обшивке, как перекормленные кофеином грызуны. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_LargeOMS_title = Astris
		#LOC_kerbalru_VenStockRevamp_MK1Cargobay_title = Грузовой отсек 1.25m
		#LOC_kerbalru_VenStockRevamp_MK2VApod_title = Командный модуль ВА ТКС
		#LOC_kerbalru_VenStockRevamp_MK2VApod_description = Командный модуль ВА — часть комплекса ТКС/ФГБ. Крепится к модулю ФГБ комплекса ТКС, к переходному отсеку станции «Алмаз» или сразу к обоим. Во втором случае станцию можно выводить с экипажем на борту — прямо в капсуле ВА. Экипаж переходит в капсулу и обратно на орбите через люк в теплозащитном экране в нижней части аппарата. Рассчитан на трёх человек на сутки. Центр масс можно смещать для планирующего спуска (режим Descent Mode). <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_MedLadderUtility_title = Усилитель подвижности MK II
		#LOC_kerbalru_VenStockRevamp_MedLadderUtility_description = Усилитель подвижности MK II, известный также как «лестница» — современное устройство для перемещения по корпусу корабля. Экипаж носится по обшивке, как перекормленные кофеином грызуны. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SMLadderUtility_title = Усилитель подвижности MK I
		#LOC_kerbalru_VenStockRevamp_SMLadderUtility_description = Усилитель подвижности MK I, известный также как «лестница» — современное устройство для перемещения по корпусу корабля. Экипаж носится по обшивке, как перекормленные кофеином грызуны. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_ShieldCapLarge_title = Защитный кожух капсулы Mk2
		#LOC_kerbalru_VenStockRevamp_ShieldCapLarge_description = Аэродинамический кожух для командного модуля Mk2. Защищает от аэродинамических нагрузок в плотных слоях атмосферы и от выхлопа САС при аварии. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SmallPointLight_title = Точечный фонарь MK 4
		#LOC_kerbalru_VenStockRevamp_SmallPointLight_description = Маленькая лампа, которая осветит всё — нравится вам это или нет. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SmallSpotLight_title = Мини-прожектор MK 3
		#LOC_kerbalru_VenStockRevamp_SmallSpotLight_description = Уменьшенная версия большого прожектора MK1. Идеален для малых роверов, а для смелых — как налобный фонарь. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SmallStripLight_title = Лента подсветки MK 5
		#LOC_kerbalru_VenStockRevamp_SmallStripLight_description = Небольшая лента подсветки — обычно как навигационные огни самолёта. Мы не запретим пробовать осветить ею весь дом, но не выйдет. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_SnubOtron_title = Двигатель разделения (малый)
		#LOC_kerbalru_VenStockRevamp_SnubOtron_description = Небольшой твердотопливный двигатель для разделения ступеней или поджатия топлива. Лучше использовать несколько сразу. Слабее и проще радиального двигателя разделения. <b><color=green>From Stock (RO Config) mod</color></b> Шлейф настроен через RealPlume.
		#LOC_kerbalru_VenStockRevamp_rtgMini_title = РИТЭГ серии SNAP-3B (Pu238)
		#LOC_kerbalru_VenStockRevamp_rtgMini_description = Серия SNAP-3 — первые РИТЭГи, работавшие в космосе, в составе системы Transit (предшественник GPS). Очень низкий КПД, целевая мощность 2.4 Вт. Вариант на плутонии-238: меньше мощность, но намного дольше ресурс. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_smallRadialDecoupler_description = Небольшой радиальный разделитель. <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_stationHubLarge_title = Огромный многоточечный коннектор Rockomax HubMax
		#LOC_kerbalru_VenStockRevamp_stationHubLarge_description = После бурной реакции фанатов Rockomax решила поднять ставки — огромный многоточечный коннектор Rockomax HubMax бесшовно объединяет детали 2.5 метра на очень большом хабе. К счастью, в тот день никто не умер от шока. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCube3way_title = Кубическая восьмигранная стойка: тройник
		#LOC_kerbalru_VenStockRevamp_strutCube3way_description = Новинка от Strutco! Новый коннектор — под прямым углом сразу в двух направлениях! Круто! <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCube90_title = Кубическая восьмигранная стойка: уголок
		#LOC_kerbalru_VenStockRevamp_strutCube90_description = Новинка от Strutco! Новый коннектор под прямым углом! Блестяще! <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeLarge_title = Кубическая восьмигранная стойка Mk IV
		#LOC_kerbalru_VenStockRevamp_strutCubeLarge_description = Теперь можно укрепить зазор между мечтами. Кубическая восьмигранная стойка MK IV уже здесь! <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeMedium_title = Кубическая восьмигранная стойка Mk III
		#LOC_kerbalru_VenStockRevamp_strutCubeMedium_description = Кубическая восьмигранная стойка стала ещё длиннее! Хватит городить несколько стоек! С этими сверхлёгкими удлинителями укрепляйте что угодно! <b><color=green>From Stock (RO Config) mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeMountingPlate_title = Кубическая восьмигранная стойка: тонкая монтажная плата
		#LOC_kerbalru_VenStockRevamp_strutCubeMountingPlate_description = Тонкая стойка — отлично крепит что угодно к чему угодно! <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeOCTOAdapter_title = Кубическая восьмигранная стойка: восьмигранный переходник
		#LOC_kerbalru_VenStockRevamp_strutCubeOCTOAdapter_description = Переходник для подключения стандартной C.O.S. к стандартной восьмигранной раме. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeS0Adapter_title = Кубическая восьмигранная стойка: переходник 0.625m
		#LOC_kerbalru_VenStockRevamp_strutCubeS0Adapter_description = Переходник для подключения стандартной C.O.S. к стандартной раме 0.625m. <b><color=green>From Ven Stock Revamp mod</color></b>
		#LOC_kerbalru_VenStockRevamp_strutCubeSmall_title = Кубическая восьмигранная стойка Mk II
		#LOC_kerbalru_VenStockRevamp_strutCubeSmall_description = Несмотря на название, малая кубическая восьмигранная стойка на деле длиннее своей меньшей «сестры»! <b><color=green>From Stock (RO Config) mod</color></b>
	}
}
