		#LOC_kerbalru_rp1_strat_lockedScientist_title = Launch a SciSat First
		#LOC_kerbalru_rp1_strat_lockedScientist_desc = Some scientists will unlock once you complete the suborbital return or first low space biological experimentation contracts, and the rest after you complete either the First Scientific Satellite contract or the First Scientific Satellite (1000 kg) contract.

		#LOC_kerbalru_rp1_strat_lockedEngineer_title = Research Basic Rocketry First
		#LOC_kerbalru_rp1_strat_lockedEngineer_desc = Chief Designers will unlock when you research Basic Rocketry.

		#LOC_kerbalru_rp1_strat_lockedFlightDirector_title = Reach 25km Crewed or Survivability tech First
		#LOC_kerbalru_rp1_strat_lockedFlightDirector_desc = Flight Directors will unlock once you reach 25 km with a crewed vessel or when you research Crew Survivability.

		#LOC_kerbalru_rp1_strat_lockedContractor_title = Research MatSci First
		#LOC_kerbalru_rp1_strat_lockedContractor_desc = Some contractors will unlock when you research Post-War Materials Science, and the rest when you research Early Human Spaceflight Materials Science.

