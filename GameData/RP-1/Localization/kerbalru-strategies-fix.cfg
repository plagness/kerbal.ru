		#LOC_kerbalru_rp1_strat_deptMainContractor_desc = Подрядчик/КБ, отвечающий за значительный объём техники

		#LOC_kerbalru_rp1_strat_deptContractor1_title = Подрядчик 1
		#LOC_kerbalru_rp1_strat_deptContractor1_desc = Подрядчик/КБ, отвечающий за технику
		#LOC_kerbalru_rp1_strat_deptContractor2_title = Подрядчик 2

		// ===== Leader bios: title + desc =====
		#LOC_kerbalru_rp1_strat_bio_chelomey_title = Владимир Челомей
		#LOC_kerbalru_rp1_strat_bio_chelomey_desc = Владимир Николаевич Челомей — советский конструктор украинского происхождения. Челомей создал первый советский пульсирующий воздушно-реактивный двигатель и разработал серию ракет УР, включая УР-500 «Протон». «Протон» — вторая по числу пусков ракета в мире, лишь недавно уступившая первое место Falcon 9. Челомей также сыграл ключевую роль в создании орбитальных станций «Алмаз», ставших основой для станций «Салют», «Мир» и модуля «Звезда».

		#LOC_kerbalru_rp1_strat_bio_korolev_title = Сергей Королёв
		#LOC_kerbalru_rp1_strat_bio_korolev_desc = Сергей Королёв работал в советском ракетостроении с 1945 года до своей смерти в 1966-м. Он был главным конструктором ракетной техники СССР на протяжении всей космической гонки, отвечая за всё — от миссий «Спутник» до полёта Гагарина и станций «Луна». Он также начал работу над гигантской лунной ракетой Н-1, хотя умер до начала её испытаний. Королёва критиковали за то, что его соперничество с Владимиром Челомеем мешало работе, а его конструкторский подход считали одной из причин провала Н-1. И всё же он был дважды заслуженно удостоен звания Героя Социалистического Труда — высшей награды СССР за трудовые и культурные достижения. Учитывая, что в 1938 году его отправили в ГУЛАГ по ложному обвинению, это было меньшее, что могла сделать для него страна.

		#LOC_kerbalru_rp1_strat_bio_rosen_title = Милтон Розен
		#LOC_kerbalru_rp1_strat_bio_vonbraun_title = Вернер фон Браун

		#LOC_kerbalru_rp1_strat_bio_dhawan_title = Сатиш Дхаван
		#LOC_kerbalru_rp1_strat_bio_dhawan_desc = Индийский математик и авиакосмический инженер, доктор Сатиш Дхаван был третьим председателем ISRO, где руководил разработкой ракет-носителей SLV (Satellite Launch Vehicle) и PSLV (Polar Satellite Launch Vehicle). Он был известен тем, что лично брал на себя ответственность за неудачи, отдавая коллективу всю славу за успехи. В то же время он занимал пост директора Индийского института науки, где исследовал теорию пограничного слоя и другие аэродинамические явления.

		#LOC_kerbalru_rp1_strat_bio_glushkoEngineer_title = Валентин Глушко
		#LOC_kerbalru_rp1_strat_bio_glushkoEngineer_desc = Валентин Петрович Глушко — советский конструктор украинского происхождения, разработчик ракетных двигателей советской космической программы в разгар космической гонки между США и СССР. Он известен созданием одних из лучших двигателей в истории, включая РД-107/108, самый мощный из когда-либо построенных ракетных двигателей РД-170, а также РД-253, применявшийся на «Протоне». Его главным заблуждением было неверие в пригодность пары кислород-водород как топлива для космических двигателей.

		#LOC_kerbalru_rp1_strat_bio_yangel_title = Михаил Янгель
		#LOC_kerbalru_rp1_strat_bio_yangel_desc = Михаил Кузьмич Янгель — советский конструктор, уроженец Иркутской области, ведущий разработчик ракетной программы СССР. Янгель отвечал за создание ракет-носителей «Космос», «Циклон» и «Днепр», созданных на базе межконтинентальных баллистических ракет. Он одним из первых начал применять долгохранимые высококипящие компоненты топлива.

		#LOC_kerbalru_rp1_strat_bio_bossart_title = Чарли Боссарт
		#LOC_kerbalru_rp1_strat_bio_bossart_desc = Карел «Чарли» Боссарт — новаторский конструктор ракет, создатель МБР «Атлас». Его достижения стоят в одном ряду с достижениями Вернера фон Брауна и Сергея Королёва. К сожалению, большая часть его работы выполнялась для ВВС США и была засекречена, поэтому его заслуги малоизвестны.

		#LOC_kerbalru_rp1_strat_bio_faget_title = Макс Фаже
		#LOC_kerbalru_rp1_strat_bio_faget_desc = Максим «Макс» Фаже — американский инженер-механик, уроженец Британского Гондураса (Белиза). Фаже спроектировал корабль «Меркурий» и внёс вклад в создание последующих кораблей «Джемини» и «Аполлон», а также «Спейс шаттла».

		#LOC_kerbalru_rp1_strat_bio_morgan_title = Мэри Шерман Морган
		#LOC_kerbalru_rp1_strat_bio_morgan_desc = Мэри Шерман Морган — американский химик и специалист по ракетному топливу, разрабатывавшая взрывчатые вещества во время Второй мировой войны, а затем занимавшаяся высококипящими компонентами топлива во время космической гонки. В 1957 году она изобрела жидкое топливо «Гидин» — смесь несимметричного диметилгидразина и диэтилентриамина в пропорции 60/40, дававшую значительное преимущество в характеристиках перед этанолом. Поскольку топливо предполагалось использовать в паре с жидким кислородом, она в шутку предложила название «Бейгл», отчего двигатели описывались бы как работающие на паре «бейгл-керосин». К сожалению, армия США отвергла это шутливое название. «Гидин» использовался в ракете Jupiter-C, которая вывела на орбиту первый спутник США — Explorer 1.

		#LOC_kerbalru_rp1_strat_bio_valcleaver_title = Артур Валентайн Кливер
		#LOC_kerbalru_rp1_strat_bio_valcleaver_desc = Артур «Вэл Кливер» — британский авиакосмический инженер, работавший в de Havilland в начале 1950-х, отвечавший за разработку первых британских ракетных авиадвигателей «Spectre» и «Sprite». Позже он занимался модернизированными вариантами двигателя Spectre, которые впоследствии применялись на прототипах ракет Blue Steel. В 1956 году он перешёл в Rolls-Royce на должность главного конструктора по ракетным двигателям. Под его руководством были разработаны двигатели RZ.2 и RZ.20 для ракеты Blue Streak. Оба считались весьма передовыми на тот момент и позже применялись на первой ступени ракеты Europa-1.

		#LOC_kerbalru_rp1_strat_bio_narayanan_title = Намби Нараянан
		#LOC_kerbalru_rp1_strat_bio_narayanan_desc = Намби Нараянан — индийский авиакосмический инженер, возглавивший группу, которая приобрела у Франции технологию двигателя Viking и на её основе создала собственный двигатель Vikas, широко применяемый в ISRO по сей день. Он также руководил криогенным направлением, где работал над такими двигателями, как CE-20 — газогенераторный кислородно-водородный двигатель, применяемый на ракете GSLV Mk. III.

		#LOC_kerbalru_rp1_strat_bio_gurevich_title = Михаил Гуревич
		#LOC_kerbalru_rp1_strat_bio_gurevich_desc = Михаил Иосифович Гуревич — советский авиаконструктор, вместе с Артёмом Микояном основавший военное авиационное КБ «Микоян и Гуревич» (МиГ). Бюро прославилось истребителями, скоростными перехватчиками и многоцелевыми боевыми самолётами, составлявшими основу советских ВВС на протяжении всей холодной войны. Бюро разработало 170 проектов, из которых 94 пошли в серию. Всего в стране было выпущено 45 000 самолётов МиГ, из них 11 000 — на экспорт. Последним самолётом, над которым Гуревич лично работал перед выходом на пенсию, стал МиГ-25, впервые поднявшийся в воздух в 1964 году.

		#LOC_kerbalru_rp1_strat_bio_brill_title = Ивонн Брилл
		#LOC_kerbalru_rp1_strat_bio_brill_desc = Ивонн Маделейн Брилл — канадско-американский инженер по ракетным и реактивным двигательным установкам. Она изобрела экономичный по расходу топлива ракетный двигатель, который и сегодня удерживает спутники на орбите. За свою карьеру она участвовала в широком спектре национальных космических программ США, включая NASA и Международную организацию морской спутниковой связи.

		#LOC_kerbalru_rp1_strat_bio_kjohnson_title = Кэтрин Джонсон
		#LOC_kerbalru_rp1_strat_bio_kjohnson_desc = Кэтрин Джонсон — американский математик, чьи расчёты орбитальной механики, выполненные во время работы в NASA, сыграли решающую роль в успехе первых и последующих пилотируемых полётов США. За 33 года работы в NASA и его предшественнике она заслужила репутацию мастера сложных ручных расчётов и стояла у истоков использования компьютеров для этих задач. Космическое агентство отметило её «историческую роль одной из первых афроамериканских женщин, работавших учёным в NASA».

		#LOC_kerbalru_rp1_strat_bio_love_title = Бетти Лав
		#LOC_kerbalru_rp1_strat_bio_love_desc = Бетти Лав — инженер и «компьютер» (вычислитель), работавшая в NACA на Станции скоростных исследований авиабазы Мурок. Она сыграла ключевую роль в расчётах данных для самолёта X-1 и участвовала в разработке и испытаниях всех экспериментальных самолётов серии X — от X-1 до X-15.

		#LOC_kerbalru_rp1_strat_bio_parsons_title = Джек Парсонс
		#LOC_kerbalru_rp1_strat_bio_parsons_desc = Джон «Джек» Парсонс — американский инженер-ракетчик и химик. Работая в Калифорнийском технологическом институте (Caltech), Парсонс стал одним из главных основателей и Лаборатории реактивного движения (JPL), и корпорации Aerojet Engineering. Он изобрёл первый ракетный двигатель на литьевом составном твёрдом топливе и внёс огромный вклад в развитие как жидкостных, так и твердотопливных ракет. В разгар маккартизма Парсонса обвинили в шпионаже, после чего он лишился возможности работать в ракетостроении.

		#LOC_kerbalru_rp1_strat_bio_vanallen_title = Джеймс Ван Аллен
		#LOC_kerbalru_rp1_strat_bio_vanallen_desc = Джеймс Алфред Ван Аллен — американский учёный-космофизик из Университета Айовы. Он стоял у истоков магнитосферных исследований в космосе. Радиационные пояса Ван Аллена названы в его честь после того, как он обнаружил их при помощи счётчиков Гейгера–Мюллера на спутниках 1958 года (Explorer 1, Explorer 3 и Pioneer 3) в рамках Международного геофизического года. Ван Аллен возглавил научное сообщество в деле оснащения космических спутников исследовательской аппаратурой.

		#LOC_kerbalru_rp1_strat_bio_vonkarman_title = Теодор фон Карман
		#LOC_kerbalru_rp1_strat_bio_vonkarman_desc = Теодор фон Карман — венгеро-американский математик, авиакосмический инженер и физик, работавший преимущественно в области аэронавтики и астронавтики. Он совершил ряд ключевых прорывов в аэродинамике, в частности в описании сверхзвуковых и гиперзвуковых течений воздуха. Его считают выдающимся теоретиком аэродинамики XX века. Изучая высотный полёт, он рассчитал, что скорость, необходимая крылу для создания достаточной подъёмной силы, на высоте 82 км сравнивается с орбитальной скоростью. Это значение округлили до 100 км — так появилась линия Кармана, считающаяся границей космоса.

		#LOC_kerbalru_rp1_strat_bio_sarabhai_title = Викрам Сарабхаи
		#LOC_kerbalru_rp1_strat_bio_sarabhai_desc = Викрам Амбалал Сарабхаи, которого во всём мире считают отцом индийской космической программы, в 1947 году основал Физическую исследовательскую лабораторию, изучавшую космические лучи и свойства верхних слоёв атмосферы. Позднее лаборатория расширилась, включив теоретическую и радиофизику. Он руководил проектом создания первого индийского искусственного спутника «Ариабхата», запущенного на ракете «Космос-3М» в рамках программы «Интеркосмос». Он также основал ISRO и начал работу над ракетой SLV, но, к сожалению, умер до её завершения.

		#LOC_kerbalru_rp1_strat_bio_qian_title = Цянь Сюэсэнь
		#LOC_kerbalru_rp1_strat_bio_qian_desc = Китайский авиакосмический инженер и кибернетик, внёсший значительный вклад в аэродинамику и заложивший основы инженерной кибернетики. Он стал основателем Китайской академии космических технологий и, в частности, совершил прорыв в методах входа в атмосферу при доставке полезной нагрузки, известных как траектория Цянь Сюэсэня.

		#LOC_kerbalru_rp1_strat_bio_vbarmin_title = Владимир Бармин
		#LOC_kerbalru_rp1_strat_bio_vbarmin_desc = Владимир Павлович Бармин — выдающийся советский учёный в области механики и ракетной техники. Наиболее известен как конструктор первого в мире ракетного стартового комплекса на Байконуре. Впоследствии он также спроектировал стартовые сооружения для ракет Н-1 и «Энергия».

		#LOC_kerbalru_rp1_strat_bio_gagarin_title = Юрий Гагарин
		#LOC_kerbalru_rp1_strat_bio_gagarin_desc = Юрий Алексеевич Гагарин — советский лётчик и космонавт, ставший первым человеком, побывавшим в космосе. На корабле «Восток-1» Гагарин совершил один виток вокруг Земли 12 апреля 1961 года. Достигнув этой ключевой вехи космической гонки, он стал всемирно известен и был удостоен множества наград и званий, включая звание Героя Советского Союза — высшую награду своей страны.

		#LOC_kerbalru_rp1_strat_bio_hickam_title = Гомер Хикам
		#LOC_kerbalru_rp1_strat_bio_hickam_desc = Гомер Хэдли Хикам-младший — американский писатель, ветеран войны во Вьетнаме и бывший инженер NASA, готовивший первых японских астронавтов. За время работы в NASA Хикам занимался проектированием космических аппаратов и подготовкой экипажей. В его специализацию входила подготовка астронавтов к работе с научной аппаратурой и выходам в открытый космос. Он также готовил экипажи для многих миссий Spacelab и «Спейс шаттла», включая вывод на орбиту телескопа «Хаббл», первые две ремонтные миссии к «Хабблу», Spacelab-J (первые японские астронавты) и ремонтную миссию к спутнику Solar Max. Сегодня Хикам возглавляет совет директоров Космического и ракетного центра США (Space Camp) в Хантсвилле, штат Алабама.

		#LOC_kerbalru_rp1_strat_bio_kraft_title = Крис Крафт
		#LOC_kerbalru_rp1_strat_bio_kraft_desc = Кристофер Колумбус Крафт-младший — американский авиакосмический инженер NASA, сыгравший ключевую роль в создании Центра управления полётами агентства и формировании его организации и культуры. Его ученик Глинн Ланни в 1998 году сказал: «Центр управления сегодня... — это отражение Криса Крафта».

		#LOC_kerbalru_rp1_strat_bio_kranz_title = Джин Кранц
		#LOC_kerbalru_rp1_strat_bio_kranz_desc = Юджин Фрэнсис «Джин» Кранц — американский авиакосмический инженер, второй главный флайт-директор NASA, руководивший полётами программ «Джемини» и «Аполлон», включая первую посадку на Луну — «Аполлон-11». Он руководил успешными действиями Центра управления полётами по спасению экипажа «Аполлона-13». Его характерными чертами были короткая стрижка «ёжиком» и щегольские «полётные» жилеты разных фасонов и материалов, которые для его смен шила жена, Марта Кранц.\n\nОн придумал фразу «жёсткость и компетентность», ставшую известной как «Правило Кранца». Кранцу посвящены фильмы, документальные картины, книги и статьи. Он — лауреат Президентской медали Свободы. По результатам опроса Space Foundation в 2010 году Кранц занял 2-е место в списке самых популярных героев космоса.

		#LOC_kerbalru_rp1_strat_bio_slayton_title = Дик Слейтон
		#LOC_kerbalru_rp1_strat_bio_slayton_desc = Дональд Кент «Дик» Слейтон — лётчик ВВС США, авиационный инженер и лётчик-испытатель, вошедший в число первых семи астронавтов NASA по программе «Меркурий». Впоследствии стал первым руководителем Отдела астронавтов NASA и директором по управлению лётными экипажами, отвечая за назначение экипажей NASA.

		#LOC_kerbalru_rp1_strat_bio_kalam_title = Абдул Калам
		#LOC_kerbalru_rp1_strat_bio_kalam_desc = Калам был руководителем проекта ракеты-носителя SLV, выведшей спутник «Рохини» на низкую околоземную орбиту, а также PSLV, ставшей одной из основных рабочих ракет-носителей ISRO. Многочисленные заслуги Абдул Калама перед ISRO, а также в области медицинских технологий, привели к его избранию 11-м президентом Индии — и хотя эта должность в основном представительская, сам факт избрания говорит о масштабе его популярности.

		#LOC_kerbalru_rp1_strat_bio_orgIlyushin_title = ОКБ Ильюшина
		#LOC_kerbalru_rp1_strat_bio_orgIlyushin_desc = Основанное ещё в СССР, ОКБ Ильюшина разрабатывало и строило разнообразные самолёты как военного, так и гражданского назначения. Во время Второй мировой войны здесь создали Ил-2 — самый массовый серийный самолёт в истории. После войны бюро создало первый советский широкофюзеляжный авиалайнер и выпускало грузовые самолёты в огромных количествах: например, Ил-76 способен нести 40 тонн груза, и таких машин было построено почти тысяча. Ильюшин впоследствии вошёл в состав Объединённой авиастроительной корпорации вместе с другими российскими авиапроизводителями.

		#LOC_kerbalru_rp1_strat_bio_orgOkb1_title = ОКБ-1 Королёва
		#LOC_kerbalru_rp1_strat_bio_orgOkb1_desc = Советские ОКБ (опытно-конструкторские бюро) были государственными учреждениями, разрабатывавшими и создававшими опытные образцы техники для военных и космических нужд. Официально они не имели названий, только номера, но неформально к номеру добавлялось имя первого главного конструктора.\n\nОКБ-1, изначально возглавляемое Королёвым, было ключевым звеном советской космической программы, ответственным за «Спутник-1» и первый пилотируемый полёт «Восток-1». После смерти Королёва бюро получило название ЦКБЭМ (Центральное конструкторское бюро экспериментального машиностроения). Из-за постоянных задержек программы Н-1 руководителя ЦКБЭМ Василия Мишина сменил Валентин Глушко, и ЦКБЭМ было преобразовано в НПО «Энергия» с включением в его состав КБ «Энергомаш» (ОКБ-456). С тех пор «Энергия» разработала станцию «Мир», корабль «Буран» и российский сегмент МКС. После распада СССР предприятие было преобразовано в корпорацию и сегодня называется РКК «Энергия» имени С. П. Королёва.

		#LOC_kerbalru_rp1_strat_bio_orgOkb52_title = ОКБ-52 Челомея
		#LOC_kerbalru_rp1_strat_bio_orgOkb52_desc = ОКБ-52 было основано в 1944 году для производства военных самолётов. В 1950-х годах под руководством Владимира Челомея бюро перешло к разработке крылатых ракет, МБР, а затем и широкого спектра космической техники. ОКБ-52 создало серию ракет УР (Универсальная ракета), включая УР-500 (впоследствии известную как «Протон»), один из первых военных спутников и часть модулей станции «Мир». Здесь также разрабатывались концепции многоразового крылатого космического корабля и пилотируемого лунного посадочного модуля, которые, впрочем, так и не были построены. В 1966 году бюро переименовали в Центральное конструкторское бюро машиностроения, а в 1983-м — в НПО машиностроения.

		#LOC_kerbalru_rp1_strat_bio_orgOkb276_title = ОКБ-276 Кузнецова
		#LOC_kerbalru_rp1_strat_bio_orgOkb276_desc = ОКБ-276 — советское конструкторское бюро, разрабатывавшее турбинные и ракетные двигатели. Бюро создало двигатели для ракеты Н-1. Все двигатели бюро (и турбинные, и ракетные) имеют индекс «НК» — в честь Николая Кузнецова, его первого главного конструктора. В 2009 году правительство России решило объединить ряд двигателестроительных предприятий Самарской области в единое юридическое лицо, названное АО «Кузнецов» — в честь конструкторского бюро.

		#LOC_kerbalru_rp1_strat_bio_orgOkb456_title = ОКБ-456 Глушко
		#LOC_kerbalru_rp1_strat_bio_orgOkb456_desc = ОКБ-456 под руководством Валентина Глушко создавало двигатели для целого ряда советских ракет. В 1967 году бюро было переименовано в НПО «Энергомаш». Двигатели ОКБ-456 стояли на первой советской баллистической ракете Р-1, а также на «Спутнике», «Протоне» и «Энергии». После падения железного занавеса «Энергомаш» стал разрабатывать двигатели и для американских ракет — например, РД-180 для Atlas V и РД-181 для Antares.\n\nДвигатели «Энергомаша» имеют особую систему обозначений: РД-1XX работают на жидком кислороде, РД-2XX — на долгохранимых компонентах, РД-3XX — на фторе, РД-4XX и РД-6XX — ядерные, РД-5XX — на перекиси водорода, а РД-7XX — трёхкомпонентные.

		#LOC_kerbalru_rp1_strat_bio_orgAerojet_desc = Aerojet — компания, производившая двигательные установки для ракет и снарядов. Она разработала AJ-10 — одно из самых долгоживущих семейств двигателей, ракеты Aerobee и Titan, а также конкурировала с Rocketdyne за право поставлять двигатели для Saturn V, хотя Rocketdyne выиграла контракт на все нижние ступени. Aerojet выросла из встречи 1936 года, на которой Теодор фон Карман и ряд профессоров и студентов Caltech, включая Фрица Цвикки и Джека Парсонса, обсуждали тему космических полётов. Их первая конструкция была испытана 16 августа 1941 года — небольшой твердотопливный двигатель, закреплённый под фюзеляжем самолёта, — и позволила вдвое сократить длину разбега; ВВС армии США заказали экспериментальную партию. Компания добилась больших успехов на заре космонавтики, но, как и многие американские ракетные фирмы, сократила штат в конце 1980-х — начале 1990-х. Рост возобновился в начале 2000-х, а в 2012 году компания приобрела Rocketdyne.

		#LOC_kerbalru_rp1_strat_bio_orgAec_title = Комиссия по атомной энергии США
		#LOC_kerbalru_rp1_strat_bio_orgAec_desc = Комиссия по атомной энергии — государственное агентство США, курировавшее мирное использование ядерных технологий по мере их перехода в гражданские руки. После общественных протестов из-за вопросов безопасности и загрязнения комиссия была упразднена в 1975 году, а её функции перешли Комиссии по ядерному регулированию и Министерству энергетики.

		#LOC_kerbalru_rp1_strat_bio_orgBellAircraft_desc = Bell разработала X-1 — первый сверхзвуковой самолёт, а также ряд истребителей и вертолётов. Компания также участвовала в создании систем РСУ для «Меркурия» и X-15. Она построила тренировочный аппарат для отработки посадки на Луну (известный как «летающая кровать»), двигатель взлётной ступени лунного модуля «Аполлона», а также предложила довольно сумасбродную идею лунного спасательного аппарата, управляемого наклоном тела пилота.

		#LOC_kerbalru_rp1_strat_bio_orgMcDonnell_desc = McDonnell (впоследствии McDonnell Douglas) построила капсулы «Меркурий» и «Джемини», а также множество известных самолётов — как гражданских, так и военных.

		#LOC_kerbalru_rp1_strat_bio_orgDouglasAircraft_desc = Douglas начала работу в 1921 году как авиастроительная компания, но после Второй мировой войны занялась ракетами и геофизическими ракетами. Её самолёты были в основном гражданскими или военно-транспортными, так что для постройки самолётов серии X она не подойдёт. Все самолёты с индексом DC-, включая весьма успешный DC-8, были построены именно ею. В космонавтике компания создала ракету Thor и ступень S-IVB, служившую второй ступенью Saturn IB и третьей ступенью Saturn V.

		#LOC_kerbalru_rp1_strat_bio_orgJpl_desc = Лаборатория реактивного движения (JPL) при Калифорнийском технологическом институте создала многие флагманские межпланетные миссии NASA: «Вояджер-1» и «Вояджер-2», программу «Сервейер», «Пионер-3» и «Пионер-4», множество марсоходов и программу «Рейнджер». В последнее время лаборатория работала над миссией «Юнона» к Юпитеру, марсоходом «Персеверанс» и вертолётом «Индженьюити» на Марсе, а также готовит запуск аппарата «Психея» к одноимённому астероиду.

		#LOC_kerbalru_rp1_strat_bio_orgRocketdyne_desc = Rocketdyne спроектировала большинство американских жидкостных ракетных двигателей — от модернизаций двигателя A-4 до разработки J-2 и F-1 для Saturn V. Компания первой освоила пару кислород-водород и создала RS-25 (SSME). На фоне сокращения бюджета космической программы после «Аполлона» компания была вынуждена постепенно сокращаться и после нескольких слияний была куплена Aerojet, образовав Aerojet Rocketdyne.

