		#LOC_kerbalru_rp1_strat_deptEngineering_title = Главный конструктор
		#LOC_kerbalru_rp1_strat_deptEngineering_desc = Глава инженерной службы космической программы.

		#LOC_kerbalru_rp1_strat_deptFlightDirector_title = Флайт-директор
		#LOC_kerbalru_rp1_strat_deptFlightDirector_desc = Глава Центра управления полётами.

		#LOC_kerbalru_rp1_strat_deptScience_title = Главный учёный
		#LOC_kerbalru_rp1_strat_deptScience_desc = Глава научной службы космической программы.

