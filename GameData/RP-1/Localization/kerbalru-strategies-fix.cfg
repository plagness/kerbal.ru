// английский текст в полях title/desc/effectTitle/effectDescription/headName вместо #LOC-ключей.
// Не редактируем оригиналы — добавляем новые ключи здесь и патчим поля через
// kerbalru-strategies-patch.cfg (см. правило bypass-патча, docs/MAINTAINING.md).
Localization
{
	en-us
	{
		// ===== Departments.cfg =====
		#LOC_kerbalru_rp1_strat_deptProgram_title = Select Programs
		#LOC_kerbalru_rp1_strat_deptProgram_desc = This is where programs can be activated or, if all requirements are met, completed.
		#LOC_kerbalru_rp1_strat_deptProgram_headName = Program Office
		#LOC_kerbalru_rp1_strat_deptHeadNameEmpty = <No Leader Yet>

		#LOC_kerbalru_rp1_strat_deptAdmin_title = Administration
		#LOC_kerbalru_rp1_strat_deptAdmin_desc = The leader of the space program.

		#LOC_kerbalru_rp1_strat_deptEngineering_title = Chief Designer
		#LOC_kerbalru_rp1_strat_deptEngineering_desc = The head of engineering for the space program.

		#LOC_kerbalru_rp1_strat_deptFlightDirector_title = Flight Director
		#LOC_kerbalru_rp1_strat_deptFlightDirector_desc = The head of Mission Control.

		#LOC_kerbalru_rp1_strat_deptScience_title = Chief Scientist
		#LOC_kerbalru_rp1_strat_deptScience_desc = The head of space science for the space program.

		#LOC_kerbalru_rp1_strat_deptMainContractor_title = Main Contractor
		#LOC_kerbalru_rp1_strat_deptMainContractor_desc = A contractor/design bureau responsible for a large amount of hardware

		#LOC_kerbalru_rp1_strat_deptContractor1_title = Contractor 1
		#LOC_kerbalru_rp1_strat_deptContractor1_desc = A contractor/design bureau responsible for hardware
		#LOC_kerbalru_rp1_strat_deptContractor2_title = Contractor 2

		// ===== Leader bios: title + desc (dedup shared between files where identical) =====
		#LOC_kerbalru_rp1_strat_bio_chelomey_title = Vladimir Chelomey
		#LOC_kerbalru_rp1_strat_bio_chelomey_desc = Vladimir Nikolayevich Chelomey was a Soviet engineer of Ukrainian ethnicity. Chelomey invented the first Soviet pulse jet engine and created the UR-XXX series of rockets which included the UR-500 Proton. The Proton is the second most flown rocket in the world, only recently losing the distinction of #1 to the Falcon 9. Chelomey was also instrumental in working on the Almaz Space Stations which became the basis of the Salyut, Mir, and Zvezda space stations.

		#LOC_kerbalru_rp1_strat_bio_korolev_title = Sergei Korolev
		#LOC_kerbalru_rp1_strat_bio_korolev_desc = Sergei Korolev worked in Soviet rocketry from 1945 until his death in 1966. He was the USSR's lead rocket engineer throughout the space race, designing everything from the Sputnik missions to Gagarin's flight and the Luna probes. He also began work on the massive N1 Moon rocket, though he died before testing began. He was criticized for letting his rivalry with Vladamir Chelomey get in the way of his work and his design approach was blamed for the failure of the N1. Still, it was well-deserved when he was twice honored as Hero of Socialist Labour, the highest award for cultural and industrial accomplishments in the Soviet Union. Considering they sent him to the Gulag in 1938 on false charges, this was the least they could do.

		#LOC_kerbalru_rp1_strat_bio_rosen_title = Milton Rosen
		#LOC_kerbalru_rp1_strat_bio_vonbraun_title = Wernher von Braun

		#LOC_kerbalru_rp1_strat_bio_dhawan_title = Satish Dhawan
		#LOC_kerbalru_rp1_strat_bio_dhawan_desc = An Indian mathematician and aerospace engineer, Dr. Satish Dhawan was the third chairman of ISRO, where he oversaw the development of Satellite Launch Vehicle (SLV) and Polar Satellite Launch Vehicle (PSLV). He was noted for taking personal responsibility for failures while allowing the team to take credit for successes. During this time he was also the director of the Indian Institute of Science, where he researched boundary layer theory and other aerodynamic phenomena.

		#LOC_kerbalru_rp1_strat_bio_glushkoEngineer_title = Valentin Glushko
		#LOC_kerbalru_rp1_strat_bio_glushkoEngineer_desc = Valentin Petrovich Glushko was a Soviet engineer of Ukrainian ethnicity and the designer of rocket engines in the Soviet space program during the heights of the Space Race between United States and the former Soviet Union. He is known for designing some of the best engines the world has ever seen, including the RD-107/108, the most powerful rocket engine ever built, the RD-170, and the RD-253 used on the Proton Rocket. His major fault was not believing that hydrolox was a suitable propellant for a space engine.

		#LOC_kerbalru_rp1_strat_bio_yangel_title = Mikhail Yangel
		#LOC_kerbalru_rp1_strat_bio_yangel_desc = Mikhail Kuzmich Yangel was a Soviet engineer born in Irkutsk who was the leading designer in the missile program of the former Soviet Union. Yangel was responsible for developing the Kosmos, Tsyklon, and Dnepr space launch vehicles, derived from ICBM missiles. He was a pioneer of using storable hypergolic fuels.

		#LOC_kerbalru_rp1_strat_bio_bossart_title = Charlie Bossart
		#LOC_kerbalru_rp1_strat_bio_bossart_desc = Karel (Charlie) Bossart was an innovative rocket designer and creator of the Atlas ICBM. His achievements rank alongside those of Wernher von Braun and Sergei Korolev. Unfortunately, most of his work was for the United States Air Force and therefore classified, so his achievements are not widely known.

		#LOC_kerbalru_rp1_strat_bio_faget_title = Max Faget
		#LOC_kerbalru_rp1_strat_bio_faget_desc = Maxime (Max) Faget was a Belizean-born American mechanical engineer. Faget was the designer of the Mercury spacecraft, and contributed to the later Gemini and Apollo spacecraft as well as the Space Shuttle.

		#LOC_kerbalru_rp1_strat_bio_morgan_title = Mary Sherman Morgan
		#LOC_kerbalru_rp1_strat_bio_morgan_desc = Mary Sherman Morgan was a U.S. chemist and rocket fuel scientist who developed explosives during WWII, and then worked on hypergolic propellants during the Space Race. She invented the liquid fuel Hydyne in 1957, a 60/40 mix of unsymmetrical dimethylhydrazine and diethylenetriamine that offered a significant performance advantage over ethanol. Because it would be pared with liquid oxygen, she thought Bagel would be a fun name, which would lead to engines being described as using Bagel-LOX. Unfortunately, the U.S. Army rejected this whimsical name. Hydyne powered the Jupiter-C rocket that launched the United States' first satellite, Explorer 1.

		#LOC_kerbalru_rp1_strat_bio_valcleaver_title = Arthur Valentine Cleaver
		#LOC_kerbalru_rp1_strat_bio_valcleaver_desc = Arthur "Val Cleaver" was a British aerospace engineer working for de Havilland in the early 1950s, responsible for overseeing the development of the early British rocket plane engines, "Spectre" and "Sprite". He later worked to develop upgraded variants of the Spectre engine that went on to power the prototypes of Blue Steel missiles. In 1956 he took a job with Rolls-Royce as their Chief Rocket Propulsion Engineer. Under his guidance the development of the RZ.2 and RZ.20 took place, built to power the Blue Streak missile. Both were considered highly advanced engines at the time and they went on to power the first stage of Europa 1.

		#LOC_kerbalru_rp1_strat_bio_narayanan_title = Nambi Narayanan
		#LOC_kerbalru_rp1_strat_bio_narayanan_desc = Nambi Narayanan is an Indian aerospace engineer who was responsible for leading the team that acquired the technology for the Viking engine from the French and indigenizing it into the Vikas engine, which is used extensively by ISRO to this day. He is also the head of the cryogenics department where he worked on engines such as the CE-20, a gas-generator hydrolox engine used on the GLSV Mk. III.

		#LOC_kerbalru_rp1_strat_bio_gurevich_title = Mikhail Gurevich
		#LOC_kerbalru_rp1_strat_bio_gurevich_desc = Mikhail Iosifovich Gurevich was a Soviet aircraft designer who cofounded the Mikoyan-Gurevich military aviation bureau along with Artem Mikoyan. The bureau is famous for its fighter aircraft, rapid interceptors, and multirole combat aircraft which were staples of the Soviet Air Forces throughout the Cold War. The bureau designed 170 projects of which 94 were made in series. In total, 45,000 MiG aircraft have been manufactured domestically, of which 11,000 aircraft were exported. The last plane which Gurevich personally worked on before his retirement was the MiG-25, which first flew in 1964.

		#LOC_kerbalru_rp1_strat_bio_brill_title = Yvonne Brill
		#LOC_kerbalru_rp1_strat_bio_brill_desc = Yvonne Madelaine Brill was a Canadian-American rocket and jet propulsion engineer. She is responsible for inventing the fuel-efficient rocket thruster that keeps satellites in orbit today. During her career she was involved in a broad range of national space programs in the United States, including NASA and the International Maritime Satellite Organization.

		#LOC_kerbalru_rp1_strat_bio_kjohnson_title = Katherine Johnson
		#LOC_kerbalru_rp1_strat_bio_kjohnson_desc = Katherine Johnson was an American mathematician whose calculations of orbital mechanics as a NASA employee were critical to the success of the first and subsequent U.S. crewed spaceflights. During her 33-year career at NASA and its predecessor, she earned a reputation for mastering complex manual calculations and helped pioneer the use of computers to perform the tasks. The space agency noted her "historical role as one of the first African-American women to work as a NASA scientist".

		#LOC_kerbalru_rp1_strat_bio_love_title = Betty Love
		#LOC_kerbalru_rp1_strat_bio_love_desc = Betty Love was an engineer and computer that worked for NACA at the High Speed Research Station at Muroc Air Force Base. She was instrumental in computing the data for the X-1 aircraft. She was involved in developing and working with all experimental X-Planes from the X-1 to the X-15.

		#LOC_kerbalru_rp1_strat_bio_parsons_title = Jack Parsons
		#LOC_kerbalru_rp1_strat_bio_parsons_desc = John Parsons was an American rocket engineer, and chemist. Associated with the California Institute of Technology (Caltech), Parsons was one of the principal founders of both the Jet Propulsion Laboratory and the Aerojet Engineering Corporation. He invented the first rocket engine to use a castable, composite rocket propellant, and pioneered the advancement of both liquid-fuel and solid-fuel rockets. Amid McCarthyism, Parsons was accused of espionage and left unable to work in rocketry.

		#LOC_kerbalru_rp1_strat_bio_vanallen_title = James Van Allen
		#LOC_kerbalru_rp1_strat_bio_vanallen_desc = James Alfred Van Allen was an American space scientist at the University of Iowa. He was instrumental in establishing the field of magnetospheric research in space. The Van Allen radiation belts were named after him, following his discovery using Geiger–Müller tube instruments on the 1958 satellites (Explorer 1, Explorer 3, and Pioneer 3) during the International Geophysical Year. Van Allen led the scientific community in putting scientific research instruments on space satellites.

		#LOC_kerbalru_rp1_strat_bio_vonkarman_title = Theodore von Kármán
		#LOC_kerbalru_rp1_strat_bio_vonkarman_desc = Theodore von Kármán was a Hungarian-American mathematician, aerospace engineer, and physicist who was active primarily in the fields of aeronautics and astronautics. He was responsible for many key advances in aerodynamics, notably on supersonic and hypersonic airflow characterization. He is regarded as an outstanding aerodynamic theoretician of the 20th century. When looking into high-altitude flight, he calculated that the speed required to produce enough lift for a airplane to stay aloft would be the same as orbital speed at 82 kilometers altitude. This was then rounded to 100 kilometers and is why the Karman line is considered the boundary of space.

		#LOC_kerbalru_rp1_strat_bio_sarabhai_title = Vikram Sarabhai
		#LOC_kerbalru_rp1_strat_bio_sarabhai_desc = Internationally regarded as the Father of the Indian Space Program, Vikram Ambalal Sarabhai founded the Physical Research Laboratory in 1947, performing research into cosmic rays and the properties of the upper atmosphere. Later the lab expanded to include Theoretical and Radio physics. He headed a project to build India's first artificial satellite, Aryabhata, launched on a Kosmos-3M as part of Interkosmos. He also founded ISRO and began work on the SLV, but unfortunately died before it could be completed.

		#LOC_kerbalru_rp1_strat_bio_qian_title = Qian Xuesen
		#LOC_kerbalru_rp1_strat_bio_qian_desc = A Chinese aerospace engineer and cyberneticist who made significant contributions to the field of aerodynamics and established engineering cybernetics. He was the founding father of China Academy of Space Technology, notably made a breakthrough in an innovative reentry method for payload delivery known as Qian Xuesen Trajectory.

		#LOC_kerbalru_rp1_strat_bio_vbarmin_title = Vladimir Barmin
		#LOC_kerbalru_rp1_strat_bio_vbarmin_desc = Vladimir Pavlovich Barmin was an outstanding Soviet scientist in the field of mechanics and rocket engineering. Barmin is best known for designing the first rocket Launch Complex in the world at Baikonur. He also went on to design the launch facilities for the N1 and Energia rockets.

		#LOC_kerbalru_rp1_strat_bio_gagarin_title = Yuri Gagarin
		#LOC_kerbalru_rp1_strat_bio_gagarin_desc = Yuri Alekseyevich Gagarin was a Soviet pilot and cosmonaut who became the first human to journey into outer space. Traveling in the Vostok 1 capsule, Gagarin completed one orbit of Earth on 12 April 1961. By achieving this major milestone in the Space Race he became an international celebrity, and was awarded many medals and titles, including Hero of the Soviet Union, his nation's highest honour.

		#LOC_kerbalru_rp1_strat_bio_hickam_title = Homer Hickam
		#LOC_kerbalru_rp1_strat_bio_hickam_desc = Homer Hadley Hickam Jr. is an American author, Vietnam War veteran, and a former NASA engineer who trained the first Japanese astronauts. During his NASA career, Hickam worked in spacecraft design and crew training. His specialties at NASA included training astronauts on science payloads and extravehicular activities. He also trained astronaut crews for many Spacelab and Space Shuttle missions, including the Hubble Space Telescope deployment mission, the first two Hubble repair missions, Spacelab-J (the first Japanese astronauts), and the Solar Max repair mission. Mr. Hickam is currently the board chair of the U. S. Space & Rocket Center (Space Camp) in Huntsville, Alabama.

		#LOC_kerbalru_rp1_strat_bio_kraft_title = Chris Kraft
		#LOC_kerbalru_rp1_strat_bio_kraft_desc = Christopher Columbus Kraft Jr. was an American aerospace and NASA engineer who was instrumental in establishing the agency's Mission Control Center and shaping its organization and culture. His protégé Glynn Lunney said in 1998: "the Control Center today ... is a reflection of Chris Kraft".

		#LOC_kerbalru_rp1_strat_bio_kranz_title = Gene Kranz
		#LOC_kerbalru_rp1_strat_bio_kranz_desc = Eugene Francis "Gene" Kranz is an American aerospace engineer who served as NASA's second Chief Flight Director, directing missions of the Gemini and Apollo programs, including the first lunar landing mission, Apollo 11. He directed the successful efforts by the Mission Control team to save the crew of Apollo 13. He characteristically wore a close-cut flattop hairstyle and the dapper "mission" vests (waistcoats) of different styles and materials made by his wife, Marta Kranz, for his Flight Director missions.\n\nHe coined the phrase "tough and competent", which became known as the "Kranz Dictum". Kranz has been the subject of movies, documentary films, and books and periodical articles. Kranz is a recipient of a Presidential Medal of Freedom. In a 2010 Space Foundation survey, Kranz was ranked as the #2 most popular space hero.

		#LOC_kerbalru_rp1_strat_bio_slayton_title = Deke Slayton
		#LOC_kerbalru_rp1_strat_bio_slayton_desc = Donald Kent "Deke" Slayton was a United States Air Force pilot, aeronautical engineer, and test pilot who was selected as one of the original NASA Mercury Seven astronauts. He went on to become NASA's first Chief of the Astronaut Office and Director of Flight Crew Operations, responsible for NASA crew assignments.

		#LOC_kerbalru_rp1_strat_bio_kalam_title = Abdul Kalam
		#LOC_kerbalru_rp1_strat_bio_kalam_desc = Kalam was the project director for the Satellite Launch Vehicle (SLV), which put the Rohini satellite into low earth orbit, as well as the Polar Satellite Launch Vehicle (PSLV), which turned into one of ISRO's workhorse launch vehicles. Abdul Kalam's many contributions to ISRO, as well as to medical technology, lead to him being elected the 11th President of India, which, while mostly an advisory role, is an indication of the extent of his popularity.

		#LOC_kerbalru_rp1_strat_bio_orgIlyushin_title = Ilyushin Design Bureau
		#LOC_kerbalru_rp1_strat_bio_orgIlyushin_desc = Starting out under the Soviet Union, Ilyushin designed and built a variety of aircraft for both military and civilian applications. During WWII, they built the IL-2, the most produced aircraft of all time. Post-war, they created the first Soviet wide-body airliner and produced cargo aircraft in incredible volumes. For example, the Il-76 is capable of carrying 40 tons of cargo and Ilyushin built almost a thousand of them. Ilyushin has been merged with other Russian aircraft manufacturers to create the United Aircraft Corporation.

		#LOC_kerbalru_rp1_strat_bio_orgOkb1_title = OKB-1 Korolev
		#LOC_kerbalru_rp1_strat_bio_orgOkb1_desc = Soviet ОКБs (OKB translates roughly to "Experimental Design Bureau") were state-run institutions that would design and prototype things for military and space applications. Officially, they were numbered, not named, but informally their first chief designer's name was added to the name.\n\nОКБ-1, originally run by Korolev, was a big part of the Soviet space program, responsible for Sputnik 1 and the first crewed spaceflight of Vostok 1. After Korolev's death it was named ЦБКЭМ (TsKBEM, "Central Design Bureau of Experimental Mechanical Engineering"). Due to constant delays of N-1 rocket program, the head of ЦБКЭМ, Vasily Mishin was replaced with Valentin Glushko, and ЦБКЭМ was reformed into НПО "Энергия" (NPO Energia, "Research and production association Energia") with the inclusion of Design Bureau Energomash (OKB-456). Since then Energia have designed Mir station, Buran spacecraft and Russian Orbital Segment of the ISS. After the fall of the Soviet Union it was reformed into a corporation and is now called Korolev Rocket and Space Corporation Energia.

		#LOC_kerbalru_rp1_strat_bio_orgOkb52_title = OKB-52 Chelomey
		#LOC_kerbalru_rp1_strat_bio_orgOkb52_desc = ОКБ-52 was founded in 1944 to produce military aircraft. In the 50s, under the leadership of Vladimir Chelomey it began producing cruise missiles, ICBMs and then a wide variety of space technologies. OKB 52 developed the УР (Universal Rocket) series of rockets including the UR-500 (later known as Proton), one of the first military satellites, and some parts of the Mir space station. They also created concepts for a reusable winged spacecraft and for a crewed lunar lander, but these were never built. In 1966 it was renamed "Central Design Bureau of machine manufacturing" and in 1983 into NPO Mashinostroyeniya, Research and production association of machine manufacturing.

		#LOC_kerbalru_rp1_strat_bio_orgOkb276_title = OKB-276 Kuznetsov
		#LOC_kerbalru_rp1_strat_bio_orgOkb276_desc = ОКБ-276 was a soviet engine design bureau building turbine engines and rocket engines. The bureau developed engines for the N1 rocket. All engines developed by the bureau (both turbine and rocket) have the prefix "NK" for Nikolay Kuznetsov, its first chief designer. In 2009 the Russian government decided to consolidate a number of engine-making companies in the Samara region under a new legal entity. This was named JSC Kuznetsov, after the design bureau.

		#LOC_kerbalru_rp1_strat_bio_orgOkb456_title = OKB-456 Glushko
		#LOC_kerbalru_rp1_strat_bio_orgOkb456_desc = Led by Valentin Glushko, ОКБ-456 created engines for a variety of Soviet rockets. It was renamed into NPO Energomash in 1967. The first Soviet ballistic missile, the R-1, was powered by ОКБ-456 engines, as were Sputnik, Proton, and Energia. After the Iron Curtain fell, Energomash went on to design engines for American rockets as well, like the RD-180 for the Atlas-5 and RD-181 for Antares. \n\nEngines designed by Energomash have a specific naming convention. RD-1XX use liquid oxygen, RD-2XX storables, RD-3XX fluorine, RD-4XX and RD-6XX nuclear, RD-5XX hydrogen peroxide, and RD-7XX tripropellant.

		#LOC_kerbalru_rp1_strat_bio_orgAerojet_desc = Aerojet was a rocket and missile propulsion company. They developed the AJ-10, one of the longest lasting engine families out there, the Aerobee and Titan rockets, and competed with Rocketdyne to provide engines for the Saturn V, though Rocketdyne won for all of the lower stages. Aerojet developed from a 1936 meeting with Theodore von Kármán and a number of Caltech professors and students, including Fritz Zwicky and Jack Parsons, all of whom were interested in the topic of spaceflight. Their first design was tested on August 16, 1941, consisting of a small solid-fuel motor attached to the bottom of a plane. Takeoff distance was shortened by half, and the USAAF placed an order for experimental production versions. They saw a lot of success in the early days of spaceflight, but, like many U.S. rocket companies, they downsized during during the late 80s and early 90s. They started to grow again in the early 2000s and bought Rocketdyne in 2012.

		#LOC_kerbalru_rp1_strat_bio_orgAec_title = Atomic Energy Commission
		#LOC_kerbalru_rp1_strat_bio_orgAec_desc = The Atomic Energy Commission was a government agency that managed the peaceful use of nuclear technology as it started to move into civilian hands. After public protest over safety and contamination, it was dissolved in 1975 and succeeded by the Nuclear Regulatory Commission and the Department of Energy.

		#LOC_kerbalru_rp1_strat_bio_orgBellAircraft_desc = Bell developed the X-1, the first supersonic aircraft, as well as a variety of fighter aircraft and helicopters. They also contributed to the RCS systems for Mercury and the X-15. They built the Lunar Landing Research Vehicle (aka Flying Bedstead), the ascent engine for the Apollo LM, and were responsible for the rather harebrained idea of a lunar escape vehicle controlled by leaning.

		#LOC_kerbalru_rp1_strat_bio_orgMcDonnell_desc = McDonnell (later McDonnell-Douglas) built the Mercury and Gemini capsules, as well as many famous aircraft, both civilian and military.

		#LOC_kerbalru_rp1_strat_bio_orgDouglasAircraft_desc = Douglas started out in 1921 as an aircraft manufacturer, but after WW2, they started producing missiles and sounding rockets. Their aircraft were mostly civilian or military transport, so they won't help you build X-planes. All of the aircraft starting with DC- were built by them, including the quite successful DC-8. In spaceflight, they built the Thor rocket and the S-IVB stage, which was the second stage of the Saturn IB and third stage of the Saturn V.

		#LOC_kerbalru_rp1_strat_bio_orgJpl_desc = The Jet Propulsion Laboratory at the California Institute of Technology created many of the flagship interplanetary probe missions of NASA. Voyager 1 and 2, the Surveyor programs, Pioneer 3 and 4, a wide variety of Martian rovers, and the Ranger program. More recently, they worked on Juno mission to Jupiter, the Perseverance rover and Ingenuity helicopter on Mars, and they are planning to launch the Psyche spacecraft to the asteroid of the same name.

		#LOC_kerbalru_rp1_strat_bio_orgRocketdyne_desc = Rocketdyne designed most U.S. liquid rocket engines, from designing upgrades to the A-4 engine to developing the J-2 and F-1 for the Saturn V. They pioneered hydrolox and developed the RS-25 (SSME). During the post-Apollo budget cuts to the space program, they were slowly forced to downsize and, after a couple mergers, were bought by Aerojet, forming Aerojet-Rocketdyne.

		// ===== Locked-strategy placeholders =====
		#LOC_kerbalru_rp1_strat_lockedAdmin_title = Reach the Karman Line First
