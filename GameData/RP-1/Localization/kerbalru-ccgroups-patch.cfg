// kerbal.ru — перевод displayName групп контрактов RP-1 (CONTRACT_GROUP).
// Все группы физически ВЛОЖЕНЫ в CONTRACT_GROUP[RP0] (RP-1/Contracts/Groups.cfg),
// поэтому Module Manager требует вложенного пути: плоский @CONTRACT_GROUP[<name>]
// на корневом уровне их НЕ находит (корневой узел там только один — RP0).
// Ключи (en-us побайтово + ru) — в kerbalru-ccgroups-fix.cfg.
// Родительскую группу RP0 (displayName = RP-1) не трогаем: это бренд.
@CONTRACT_GROUP[RP0]:FINAL
{
	@CONTRACT_GROUP[Milestones]
	{
		%displayName = #LOC_kerbalru_ccgroup_Milestones_displayName
	}
	@CONTRACT_GROUP[SuborbRocketDev]
	{
		%displayName = #LOC_kerbalru_ccgroup_SuborbRocketDev_displayName
