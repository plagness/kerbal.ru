		#LOC_kerbalru_rp1_contract_landingEnceladus_description = <b>Program: Saturnine Moon Landings<br>Type: <color=green>Required</color></b><br><br>Send a craft to land on Enceladus and return science data back to Earth.
		#LOC_kerbalru_rp1_contract_landingEnceladus_completedMessage = Mission Success! You have safely landed on Enceladus and returned valuable science data from the surface.
