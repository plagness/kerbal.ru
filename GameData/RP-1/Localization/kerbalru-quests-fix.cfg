		#LOC_kerbalru_rp1_contract_DeimosLandingCrew_title = Deimos Landing (Crewed)
		#LOC_kerbalru_rp1_contract_DeimosLandingCrew_synopsis = Send a crew to land on the surface of Deimos and return home safely
		#LOC_kerbalru_rp1_contract_DeimosLandingCrew_description = <b>Program: Crewed Mars Exploration<br>Type: <color=blue>Optional</color></b><br><br>Some of our scientists and engineers believe that we should land humans on Deimos as part of the mission architecture for Mars.&br;&br;Design a mission that will successfully land at least two humans on Deimos and return safely to Earth.
		#LOC_kerbalru_rp1_contract_DeimosLandingCrew_completedMessage = Congratulations! Landing on Deimos is an amazing accomplishment!
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsOrbit_title = First Crewed Mars Orbit
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsOrbit_synopsis = Fly the first Crewed Mars Orbit mission
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsOrbit_description = <b>Program: Crewed Mars Exploration<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch a craft that can carry at least four crew into orbit around Mars and return them safely to Earth.
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsOrbit_completedMessage = Congratulations on safely returning the first humans to orbit around Mars!
		#LOC_kerbalru_rp1_contract_CollectCrewedMarsSurfaceScience_title = Collect Crewed Mars Surface Science
		#LOC_kerbalru_rp1_contract_CollectCrewedMarsSurfaceScience_synopsis = Collect Crewed Martian Surface Science
		#LOC_kerbalru_rp1_contract_CollectCrewedMarsSurfaceScience_description = <b>Program: Crewed Mars Exploration<br>Type: <color=green>Required</color></b><br><br>Perform geologic field work while on the martian surface. Obtain surface samples and perform deep core drilling to return to Earth.
		#LOC_kerbalru_rp1_contract_CollectCrewedMarsSurfaceScience_completedMessage = This is loads of data! Scientists are extremely happy with the results of your efforts.
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsLanding_title = First Crewed Mars Landing
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsLanding_synopsis = Send a crew of 2 to land on the surface of Mars and return home safely
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsLanding_description = <b>Program: Crewed Mars Exploration<br>Type: <color=green>Required</color></b><br><br>We want to put "Boots on the Ground" and explore the surface of Mars with humans. This mission will be the most ambitious, complex and expensive mission ever undertaken by our space agency.&br;&br;Design a mission that will successfully land at least two humans on Mars, stay for at least 30 days and return safely to Earth.
		#LOC_kerbalru_rp1_contract_FirstCrewedMarsLanding_completedMessage = Congratulations! Human beings have set foot on another planet in our Solar System. The monumental task that you have accomplished is something to be proud of!
		#LOC_kerbalru_rp1_contract_MarsVenusFlybyCrewed_title = Mars Opposition Venus Flyby (Crewed)
		#LOC_kerbalru_rp1_contract_MarsVenusFlybyCrewed_synopsis = Perform a Venus Flyby during the outbord or inbound leg of the Mars journey during an Opposition-class mission. This contract can be performed during the optional Mars Flyby contract, or as part of the required Mars Orbit.
		#LOC_kerbalru_rp1_contract_MarsVenusFlybyCrewed_description = <b>Program: Crewed Mars Exploration<br>Type: <color=blue>Optional</color></b><br><br>To reduce total radiation exposure to Crew, a gravity assist from Venus has been proposed as part of an Opposition-Class missions to the Red Planet. This trajectory also reduces the overall Delta-V requirements neeeded for a faster interplanetary transfer compared to a direct-to-Mars approach.
		#LOC_kerbalru_rp1_contract_MarsVenusFlybyCrewed_completedMessage = Congratulations on leveraging the gravitational pull of Venus! You have demontrated the use of a gravity assist to reduce delta-V requirements for a mission craft.
		#LOC_kerbalru_rp1_contract_PhobosLandingCrew_title = Phobos Landing (Crewed)
		#LOC_kerbalru_rp1_contract_PhobosLandingCrew_synopsis = Send a crew to land on the surface of Phobos and return home safely
		#LOC_kerbalru_rp1_contract_PhobosLandingCrew_description = <b>Program: Crewed Mars Exploration<br>Type: <color=blue>Optional</color></b><br><br>Some of our scientists and engineers believe that we should land humans on Phobos as part of the mission architecture for Mars. They expect landing on Phobos will be similar to how we landed on our own Moon.&br;&br;Design a mission that will successfully land at least two humans on Phobos and return safely to Earth.
		#LOC_kerbalru_rp1_contract_PhobosLandingCrew_completedMessage = Congratulations! Landing on Phobos is an amazing accomplishment!
		#LOC_kerbalru_rp1_contract_CrewedMarsLandingRepeat_title = Crewed Mars Landing
		#LOC_kerbalru_rp1_contract_CrewedMarsLandingRepeat_synopsis = Send a crew of 2 to land on the surface of Mars and return home safely
		#LOC_kerbalru_rp1_contract_CrewedMarsLandingRepeat_description = <b>Program: Crewed Mars Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and launch a spacecraft with at least two crew members to land on Mars. Explore the area for at least 30 days and then return safely to Earth.
		#LOC_kerbalru_rp1_contract_CrewedMarsLandingRepeat_completedMessage = Congratulations, the crew has returned safely from their mission on Mars!
		#LOC_kerbalru_rp1_contract_MarsRoboticSampleReturn_title = Mars Robotic Sample Return
		#LOC_kerbalru_rp1_contract_MarsRoboticSampleReturn_synopsis = Send an uncrewed craft to land on Mars and return the surface samples to Earth. This can be performed as a standalone mission, or built into the crewed architecture, utilizing a sample recovery in orbit.
		#LOC_kerbalru_rp1_contract_MarsRoboticSampleReturn_description = <b>Program: Crewed Mars Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe to land on Mars, gather surface samples, and return to Earth.
		#LOC_kerbalru_rp1_contract_MarsRoboticSampleReturn_completedMessage = Congratulations! Our scientists can learn a lot more about the make-up of the planet by studying the physical samples that you have returned.
		#LOC_kerbalru_rp1_contract_CrewedPhobosLandingSurfaceScience_title = Crewed Phobos Landing and Surface Science
		#LOC_kerbalru_rp1_contract_CrewedPhobosLandingSurfaceScience_synopsis = Collect Crewed Phobos Surface Science
		#LOC_kerbalru_rp1_contract_CrewedPhobosLandingSurfaceScience_description = <b>Program: Crewed Mars Exploration<br>Type: <color=green>Required</color></b><br><br>Send astronauts to Phobos to demonstrate key technologies that will be needed for future crewed Mars Landings. Obtain various surface samples from Phobos and remain for the specified duration.
		#LOC_kerbalru_rp1_contract_CrewedPhobosLandingSurfaceScience_completedMessage = This is loads of data! Scientists are extremely happy with the results of your efforts.
		#LOC_kerbalru_rp1_contract_first_MarsFlybyCrewed_title = Flyby Mars (Crewed)
		#LOC_kerbalru_rp1_contract_first_MarsFlybyCrewed_synopsis = Send a crewed vessel on a flyby of Mars
		#LOC_kerbalru_rp1_contract_first_MarsFlybyCrewed_description = <b>Program: Crewed Mars Exploration<br>Type: <color=blue>Optional</color></b><br><br>In preparation of a Mars orbit and a longer mission duration, we want to send a crew on a free-return fly-by of Mars to test components of the orbital mission architecture. Design, build and launch a mission that sends at least two humans on a flyby of Mars and return them home safely to Earth.&br;&br;<color=green>NOTE: This contract will become unavailable once the Crewed Mars Orbit contract is accepted or completed.</color>
		#LOC_kerbalru_rp1_contract_first_MarsFlybyCrewed_completedMessage = Congratulations! Humans have laid their own eyes on Mars for the first time!
		#LOC_kerbalru_rp1_contract_flybyVesta_title = Vesta Flyby
		#LOC_kerbalru_rp1_contract_flybyVesta_synopsis = Flyby Vesta closer than 20,000 km and transmit science
		#LOC_kerbalru_rp1_contract_flybyVesta_description = <b>Program: Small Bodies Flyby<br>Type: <color=green>Required</color></b><br><br>Create a probe and send it to flyby Vesta within 20,000 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyVesta_completedMessage = Congratulations on the flyby! The data is coming in now.
		#LOC_kerbalru_rp1_contract_flybyMercury_title = Mercury Flyby
		#LOC_kerbalru_rp1_contract_flybyMercury_synopsis = Flyby Mercury closer than 20,000 km and transmit science
		#LOC_kerbalru_rp1_contract_flybyMercury_description = <b>Program: Small Bodies Flyby<br>Type: <color=green>Required</color></b><br><br>Create a probe and send it to flyby Mercury within 20,000 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyMercury_completedMessage = Congratulations on the flyby! The data is coming in now.
		#LOC_kerbalru_rp1_contract_flybyCeres_title = Ceres Flyby
		#LOC_kerbalru_rp1_contract_flybyCeres_synopsis = Flyby Ceres closer than 20,000 km and transmit science
		#LOC_kerbalru_rp1_contract_flybyCeres_description = <b>Program: Small Bodies Flyby<br>Type: <color=green>Required</color></b><br><br>Create a probe and send it to flyby Ceres within 20,000 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyCeres_completedMessage = Congratulations on the flyby! The data is coming in now.
		#LOC_kerbalru_rp1_contract_Rendezvous_title = First Rendezvous
		#LOC_kerbalru_rp1_contract_Rendezvous_synopsis = Perform the First Rendezvous of two craft in space
		#LOC_kerbalru_rp1_contract_Rendezvous_description = <b>Program: Advanced Crewed Orbit<br>Type: <color=green>Required</color></b><br><br>The first successful rendezvous between two spacecraft was when Gemini 6 and 7 met in 1965. Wally Schirra maneuvered Gemini 6 to within 30 cm of Gemini 7, close enough and precise enough to prove that docking two craft together in space was possible. Using your own knowledge of orbital mechanics, bring two craft to within 100 meters of each other while in orbit around Earth. At least one of the spacecraft must be a new launch.
		#LOC_kerbalru_rp1_contract_Rendezvous_completedMessage = Congratulations! By accomplishing the first rendezvous, it opens up the possibilities of what we can do while in orbit.
		#LOC_kerbalru_rp1_contract_first_EVA_title = First EVA
		#LOC_kerbalru_rp1_contract_first_EVA_synopsis = Perform a spacewalk during an orbital mission (with report), then return safe.
		#LOC_kerbalru_rp1_contract_first_EVA_description = <b>Program: Advanced Crewed Orbit<br>Type: <color=green>Required</color></b><br><br>Performing the first EVA provides valuable insight into future spacesuit, rather than flight suit, design. It also highlights future technologies that need development for EVA. Launch a spacecraft into orbit with least one crewmember aboard, perform a spacewalk while recording observations, and immediately transmit them home. Then, return the crew to Earth after at least one full orbit with a perigee above 150 km. Historically, the first spacewalk was performed from a Soviet Voskhod 2 (1965, 5.7 tons, modified Molniya) followed a few months later by a spacewalk from a U.S. Gemini capsule (1965, 3.8 tons, Gemini Titan II).
		#LOC_kerbalru_rp1_contract_first_EVA_completedMessage = A spacewalk, and then a safe return. Excellent work!
		#LOC_kerbalru_rp1_contract_OrbitalFlight2_title = Orbital Flight with Maneuvers and 2+ Crew
		#LOC_kerbalru_rp1_contract_OrbitalFlight2_synopsis = Fly a two-plus-person LEO Orbital mission.
		#LOC_kerbalru_rp1_contract_OrbitalFlight2_description = <b>Program: Advanced Crewed Orbit<br>Type: <color=blue>Optional</color></b><br><br>Putting two people into space in the same capsule opens the door to a range of new activities and opportunities. Such a spacecraft must remain in orbit with its crew @/DurationText days and return them safely to Earth. Only two spacecraft were ever specifically created for this task, the Soviet Voskhod 2, a refit of the 3-seat Voskhod 1 (1965, 5.7 tons, modified Molniya) and the U.S. Gemini (1965, 3.2 - 3.8 tons, Gemini-Titan II).<br><br><color=yellow>NOTE: Once you've completed this contract, Orbital Flight (One Crew) contracts will become unavailable. If you have both this and the Orbital Flight (One Crew) contract accepted, completing this will cause that contract to fail.</color>&br;&br;<b>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_OrbitalFlight2_completedMessage = Crew alive and well after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_first_Docking_title = First Docking
		#LOC_kerbalru_rp1_contract_first_Docking_synopsis = Perform the first docking of two vessels in orbit of Earth
		#LOC_kerbalru_rp1_contract_first_Docking_description = <b>Program: Advanced Crewed Orbit<br>Type: <color=red>CAPSTONE</color></b><br><br>Perform the first docking between two spacecraft. Historically, this was first done on March 16, 1966 with Gemini 8. Neil Armstrong and David Scott docked to an Agena target vehicle, before a stuck thruster on the Gemini spacecraft caused a near-disaster and the mission was aborted.
		#LOC_kerbalru_rp1_contract_first_Docking_completedMessage = Nice Work! We have achieved hard lock!
		#LOC_kerbalru_rp1_contract_OrbitalFlight3_title = Orbital Flight with at Least Three Crew
		#LOC_kerbalru_rp1_contract_OrbitalFlight3_synopsis = Fly a three-person LEO Orbital mission.
		#LOC_kerbalru_rp1_contract_OrbitalFlight3_description = <b>Program: Advanced Crewed Orbit<br>Type: <color=blue>Optional</color></b><br><br>The goal and realization of putting three (or more) crew on orbit at the same time begins the era of the space taxi and ready access to LEO. Depending on the politics and economy of the originating nation, these craft will either be noted predecessors to later craft or become so ubiquitous and reliable in the role that they are still flying 50 years after their first. These craft should be able to support at least three crew and prove that they can stay in orbit for @/DurationText days. The Soviet Voskhod 1 (1964, 5.3 tons, modified Molniya) and Soyuz (1967, 6.5 tons, Soyuz), and the U.S. Apollo CSM (1968, 14.7 - 21 tons for LEO, Saturn 1B) are examples of these craft.&br;&br;<b>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_OrbitalFlight3_completedMessage = Crew alive and well after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_MarsOrbitRepeatable_title = Mars Orbital Science Probe
		#LOC_kerbalru_rp1_contract_MarsOrbitRepeatable_synopsis = Send an uncrewed probe into orbit around Mars
		#LOC_kerbalru_rp1_contract_MarsOrbitRepeatable_description = <b>Program: Early Inner Planet Probes or Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into a scientifically useful orbit of Mars.&br;The flexible parameters of this contract allow you to choose either a high inclination orbit for maximum surface coverage, or an orbit coplanar with the moons for repeated flybys.
		#LOC_kerbalru_rp1_contract_MarsOrbitRepeatable_completedMessage = Congratulations! We can continue to gather data from the new satellite.
		#LOC_kerbalru_rp1_contract_roverMarsRepeatable_title = Mars Rover
		#LOC_kerbalru_rp1_contract_roverMarsRepeatable_synopsis = Send a rover to explore the surface of Mars
		#LOC_kerbalru_rp1_contract_roverMarsRepeatable_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and send a rover to the surface of Mars and visit the different areas marked by our scientists.&br;&br;We suggest landing your rover as close as possible to the first marker.
		#LOC_kerbalru_rp1_contract_roverMarsRepeatable_completedMessage = Congratulations, our rover has returned important scientific data.
		#LOC_kerbalru_rp1_contract_landingDeimos_title = Deimos Landing
		#LOC_kerbalru_rp1_contract_landingDeimos_synopsis = Send an uncrewed probe to land or touch down for a moment on Deimos
		#LOC_kerbalru_rp1_contract_landingDeimos_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Deimos and transmit a science report from the surface. This contract can be completed 2 times.
		#LOC_kerbalru_rp1_contract_landingDeimos_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_flybyDeimos_title = Deimos Flyby
		#LOC_kerbalru_rp1_contract_flybyDeimos_synopsis = Flyby Deimos closer than 45 km
		#LOC_kerbalru_rp1_contract_flybyDeimos_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Create a probe and send it to flyby Deimos within 45 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyDeimos_completedMessage = Congratulations on the flyby!
		#LOC_kerbalru_rp1_contract_orbitMars_title = Mars Orbit
		#LOC_kerbalru_rp1_contract_orbitMars_synopsis = Send an uncrewed probe into orbit around Mars
		#LOC_kerbalru_rp1_contract_orbitMars_description = <b>Program: Early Inner Planet Probes<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into an orbit of Mars.
		#LOC_kerbalru_rp1_contract_orbitMars_completedMessage = Congratulations! We can continue to gather data from the new satellite.
		#LOC_kerbalru_rp1_contract_samplesPhobos_title = Phobos Sample Return
		#LOC_kerbalru_rp1_contract_samplesPhobos_synopsis = Send an uncrewed craft to land on Phobos and return the science to Earth.
		#LOC_kerbalru_rp1_contract_samplesPhobos_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe to land on Phobos, gather science, and bring something back to Earth for study. This is a sample return missions so you cannot just transmit the data back, it needs to be physically returned.
		#LOC_kerbalru_rp1_contract_samplesPhobos_completedMessage = Congratulations! Our scientists can learn a lot more about the make-up of the planet by studying the physical samples that you have returned.
		#LOC_kerbalru_rp1_contract_probeMars_title = Mars Atmospheric Probe
		#LOC_kerbalru_rp1_contract_probeMars_synopsis = Send an uncrewed probe into the Martian atmosphere and transmit science
		#LOC_kerbalru_rp1_contract_probeMars_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into the atmosphere of Mars and return scientific data.
		#LOC_kerbalru_rp1_contract_probeMars_completedMessage = Congratulations! Our scientists have learned valuable information about the makeup of the atmosphere.
		#LOC_kerbalru_rp1_contract_landingPhobos_title = Phobos Landing
		#LOC_kerbalru_rp1_contract_landingPhobos_synopsis = Send an uncrewed probe to land on Phobos
		#LOC_kerbalru_rp1_contract_landingPhobos_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Phobos and transmit a science report from the surface. This contract can be completed 2 times.
		#LOC_kerbalru_rp1_contract_landingPhobos_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_landingMars_title = Mars Landing
		#LOC_kerbalru_rp1_contract_landingMars_synopsis = Send an uncrewed probe to land on Mars
		#LOC_kerbalru_rp1_contract_landingMars_description = <b>Program: Mars Surface Exploration<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Mars and transmit a science report from the surface.
		#LOC_kerbalru_rp1_contract_landingMars_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_landingMarsRepeatable_title = Mars Landing
		#LOC_kerbalru_rp1_contract_landingMarsRepeatable_synopsis = Send an uncrewed probe to land on Mars
		#LOC_kerbalru_rp1_contract_landingMarsRepeatable_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Mars and transmit a science report from the surface. This contract can be completed as many times as you wish.
		#LOC_kerbalru_rp1_contract_landingMarsRepeatable_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_roverMars_title = Mars Rover
		#LOC_kerbalru_rp1_contract_roverMars_synopsis = Send a rover to explore the surface of Mars
		#LOC_kerbalru_rp1_contract_roverMars_description = <b>Program: Mars Surface Exploration<br>Type: <color=red>CAPSTONE</color></b><br><br>Design and send a rover to the surface of Mars and visit the different areas marked by our scientists.&br;&br;We suggest landing your rover as close as possible to the first marker.
		#LOC_kerbalru_rp1_contract_roverMars_completedMessage = Congratulations, our rover has returned important scientific data.
		#LOC_kerbalru_rp1_contract_flybyPhobos_title = Phobos Flyby
		#LOC_kerbalru_rp1_contract_flybyPhobos_synopsis = Flyby Phobos closer than 45 km
		#LOC_kerbalru_rp1_contract_flybyPhobos_description = <b>Program: Mars Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Create a probe and send it to flyby Phobos within 45 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyPhobos_completedMessage = Congratulations on the flyby!
		#LOC_kerbalru_rp1_contract_flybyMars_title = Mars Flyby
		#LOC_kerbalru_rp1_contract_flybyMars_synopsis = Flyby Mars closer than 20,000 km and transmit science
		#LOC_kerbalru_rp1_contract_flybyMars_description = <b>Program: Early Inner Planet Probes<br>Type: <color=green>Required</color></b><br><br>Create a probe and send it to flyby Mars within 20,000 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyMars_completedMessage = Congratulations on the flyby! The data is coming in now.
		#LOC_kerbalru_rp1_contract_MoonOrbitCrewedPolar_title = Crewed 28-day Lunar Polar Orbit
		#LOC_kerbalru_rp1_contract_MoonOrbitCrewedPolar_synopsis = Send crew to a polar orbit around the Moon, orbit for 28 days, and return
		#LOC_kerbalru_rp1_contract_MoonOrbitCrewedPolar_description = <b>Program: Early Lunar Habitation<br>Type: <color=blue>Optional</color></b><br><br>Design and launch a spacecraft with at least three crew members to enter a polar orbit at Moon for at least 28 days and return safely to Earth.
		#LOC_kerbalru_rp1_contract_MoonOrbitCrewedPolar_completedMessage = Crew alive and well after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_MoonSpaceStation3Month_title = 3 Month Lunar Orbital Stay
		#LOC_kerbalru_rp1_contract_MoonSpaceStation3Month_synopsis = Crew a lunar station for at least 90 days.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation3Month_description = <b>Program: Early Lunar Habitation<br>Type: <color=blue>Optional</color></b><br><br>Crew your lunar space station for at least 3 months.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation3Month_completedMessage = Congratulations! You have successfully crewed our lunar station for 90 days!
		#LOC_kerbalru_rp1_contract_MoonLandingCrew1Year_title = 12-month Crewed Lunar Stay
		#LOC_kerbalru_rp1_contract_MoonLandingCrew1Year_synopsis = Land a crew of three on the Moon for twelve months and return them safely to Earth
		#LOC_kerbalru_rp1_contract_MoonLandingCrew1Year_description = <b>Program: Early Lunar Habitation<br>Type: <color=blue>Optional</color></b><br><br>The time has come to prove the capabilities of our lunar infrastructure. Land <b>three</b> crew on the surface for twelve months, and bring them back home safely.<br><br>Previously landed infrastructure can be used, and a resupply mission can be sent if your mission profile requires it. This contract does not require a new set of crew to complete.
		#LOC_kerbalru_rp1_contract_MoonLandingCrew1Year_completedMessage = Congratulations! We have gone above and beyond expectations and stayed on the lunar surface for a year! Perhaps in the future, we can permanently inhabit the Moon.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation6Month_title = 6 Month Lunar Orbital Stay
		#LOC_kerbalru_rp1_contract_MoonSpaceStation6Month_synopsis = Crew a lunar station for at least 180 days.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation6Month_description = <b>Program: Early Lunar Habitation<br>Type: <color=blue>Optional</color></b><br><br>Crew your lunar space station for at least 6 months.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation6Month_completedMessage = Congratulations! You have successfully crewed our lunar station for 180 days!
		#LOC_kerbalru_rp1_contract_MoonSpaceStation_title = Moon Space Station
		#LOC_kerbalru_rp1_contract_MoonSpaceStation_synopsis = Launch a lunar space station and crew it for 1 Month
		#LOC_kerbalru_rp1_contract_MoonSpaceStation_description = <b>Program: Early Lunar Habitation<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a space station into lunar orbit, then crew it for 1 Month with at least three crew.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation_completedMessage = Congratulations! You have successfully launched and occupied our first lunar space station!
		#LOC_kerbalru_rp1_contract_MoonSpaceStation12Month_title = 12 Month Lunar Orbital Stay
		#LOC_kerbalru_rp1_contract_MoonSpaceStation12Month_synopsis = Crew a lunar station for at least 1 year.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation12Month_description = <b>Program: Early Lunar Habitation<br>Type: <color=blue>Optional</color></b><br><br>Crew your lunar space station for at least one year.
		#LOC_kerbalru_rp1_contract_MoonSpaceStation12Month_completedMessage = Congratulations! You have successfully crewed our lunar station for 1 year!
		#LOC_kerbalru_rp1_contract_first_spaceStation_title = First Space Station
		#LOC_kerbalru_rp1_contract_first_spaceStation_synopsis = Launch a space station and crew it for two weeks
		#LOC_kerbalru_rp1_contract_first_spaceStation_description = <b>Program: Earth Space Station<br>Type: <color=green>Required</color></b><br><br>Design, build, and launch a space station into Earth orbit, then crew it for two weeks with at least two crew.
		#LOC_kerbalru_rp1_contract_first_spaceStation_completedMessage = Congratulations! You have started your study of station habitation!
		#LOC_kerbalru_rp1_contract_secondGen_spaceStation_title = Second Generation Space Station
		#LOC_kerbalru_rp1_contract_secondGen_spaceStation_synopsis = Launch a larger space station with power generation, a science lab, and science experiments
		#LOC_kerbalru_rp1_contract_secondGen_spaceStation_description = <b>Program: Earth Space Station<br>Type: <color=red>CAPSTONE</color></b><br><br>Design, build, and launch a second generation space station into Earth orbit to research the effects of long duration space habitation over 2 years. This contract is based off of the Skylab and Second Generation Salyut space stations.
		#LOC_kerbalru_rp1_contract_secondGen_spaceStation_completedMessage = Congratulations! You have proven the viability of larger space stations in Earth Orbit.
		#LOC_kerbalru_rp1_contract_supplySecondGenerationStation_title = Second Generation Station Supply
		#LOC_kerbalru_rp1_contract_supplySecondGenerationStation_synopsis = Send supplies or crew to a station
		#LOC_kerbalru_rp1_contract_supplySecondGenerationStation_description = <b>Program: Earth Space Station<br>Type: <color=blue>Optional</color></b><br><br>Studying even longer durations of human spaceflight will necessitate rotating in fresh crew and replenishing supplies. Control a second generation space station, then send any needed crew and supplies so that it can continue its mission&br;&br;<b>Number of Phases Completed: @/index / @/maxCompletions</b>
		#LOC_kerbalru_rp1_contract_supplySecondGenerationStation_completedMessage = Congratulations! The station has been freshened up!
		#LOC_kerbalru_rp1_contract_CollectProtoStationScience_title = Collect Prototype Crewed Station Science
		#LOC_kerbalru_rp1_contract_CollectProtoStationScience_synopsis = Collect prototype station science
		#LOC_kerbalru_rp1_contract_CollectProtoStationScience_description = <b>Program: Crewed Orbit<br>Type: <color=green>Required</color></b><br><br>Humans staying in space for longer durations allows for different types of experiments from what we can do with unmanned probes. Utilize your stations to complete these experiments.  NOTE: You may have already collected some or all of this science. If you have, you won't need to collect it again.
		#LOC_kerbalru_rp1_contract_CollectProtoStationScience_completedMessage = This is loads of data! Scientists are extremely happy with the results of your efforts.
		#LOC_kerbalru_rp1_contract_prototype_spaceStation_launch_title = Prototype Space Station
		#LOC_kerbalru_rp1_contract_prototype_spaceStation_launch_synopsis = Launch a space station with the specified requirements
		#LOC_kerbalru_rp1_contract_prototype_spaceStation_launch_description = <b>Program: Earth Space Station<br>Type: <color=blue>Optional</color></b><br><br>After successfully launching your first Space Station, it is now time to launch another. Launch a Space Station with @/crewRequired crew, and have them stay on board to accumulate the next month worth of Long Term Habitation experimentation.&br;&br;<b>Number of Phases Completed: @/index / @/maxCompletions</b>
		#LOC_kerbalru_rp1_contract_prototype_spaceStation_launch_completedMessage = Congratulations! This prototype space station has met its requirements!
		#LOC_kerbalru_rp1_contract_CollectSecondGenerationStationScience_title = Collect Second Generation Station Science
		#LOC_kerbalru_rp1_contract_CollectSecondGenerationStationScience_synopsis = Collect second generation station science
		#LOC_kerbalru_rp1_contract_CollectSecondGenerationStationScience_description = <b>Program: Crewed Orbit<br>Type: <color=red>CAPSTONE</color></b><br><br>Humans staying in space for longer durations allows for different types of experiments from what we can do with unmanned probes. Utilize your stations to complete these experiments.  NOTE: You may have already collected some or all of this science. If you have, you won't need to collect it again.
		#LOC_kerbalru_rp1_contract_CollectSecondGenerationStationScience_completedMessage = This is loads of data! Scientists are extremely happy with the results of your efforts.
		#LOC_kerbalru_rp1_contract_supplyProtoStation_title = Prototype Space Station Supply
		#LOC_kerbalru_rp1_contract_supplyProtoStation_synopsis = Send supplies or crew to a station
		#LOC_kerbalru_rp1_contract_supplyProtoStation_description = <b>Program: Earth Space Station<br>Type: <color=blue>Optional</color></b><br><br>After successfully launching your first Space Station, it is now time to keep it working. Control a Space Station, then send any needed crew, life support, and research supplies to accumulate the next month worth of Long Term Habitation experimentation.&br;&br;<b>Number of Phases Completed: @/index / @/maxCompletions</b>
		#LOC_kerbalru_rp1_contract_supplyProtoStation_completedMessage = Congratulations! The station has been freshened up!
		#LOC_kerbalru_rp1_contract_FirstNavSat-SCA_title = First Navigational Satellite  // Based on Transit 1 through 4
		#LOC_kerbalru_rp1_contract_FirstNavSat-SCA_synopsis = Launch the first navigation satellite
		#LOC_kerbalru_rp1_contract_FirstNavSat-SCA_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>By measuring the Doppler shift of radio signals from a satellite in a known orbit, it is possible for a receiver on the ground to establish their location, which would have many applications both civilian and military. To test the principle and develop receiver equipment, it is necessary to have a test navigational satellite in orbit. <br>Historical example: Transit 1B (119 kg, Thor-Ablestar).<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_FirstNavSat-SCA_completedMessage = Congratulations! The satellite is in orbit and we have already begun to receive Doppler curves.
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3-SCA_title = Early Navigation Network (3 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3-SCA_synopsis = Launch a 3-satellite navigation network
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3-SCA_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>The previous launch of the first navigation satellite proved the theories that Doppler shift timing can be used to precisely locate a point or location on the surface of the Earth using satellites. Put that concept into operational use with the first rudimentary satellite navigation network.&br;&br;Build a navigation network with three NavSats that provide more frequent revisit rates than the single previous satellite. Make sure the satellites are spread around the Earth to provide reasonable coverage.&br;&br;<b><color=white>NOTE: You may choose only the 3-satellite or 4-satellite contract.</color></b><br><br><b><color=yellow>NOTE: The satellites will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3-SCA_completedMessage = Congratulations! The network is up and transmitting, and our shakedown testing is complete!
		#LOC_kerbalru_rp1_contract_EarlyNavSat-SCA_title = Commercial Navigation Satellite (Early)
		#LOC_kerbalru_rp1_contract_EarlyNavSat-SCA_synopsis = Launch a Navigation Satellite for a customer.
		#LOC_kerbalru_rp1_contract_EarlyNavSat-SCA_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>Now that satellite navigation technology has been proven, we need to launch more capable satellites to expand navigation coverage further around Earth. Our customers want their own satellite capabilities tailored to their specific needs. Launch new navigation satellites with the required specifications into the specified orbits.<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color></b><br><br><b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.<br><b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_EarlyComSat<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_EarlyNavSat-SCA_completedMessage = Success! The navigation satellite was launched into the proper orbit. Precision satellite-based navigation is one step closer to being a reality.
		#LOC_kerbalru_rp1_contract_FirstGEOSat-SCA_title = Geostationary Test Satellite
		#LOC_kerbalru_rp1_contract_FirstGEOSat-SCA_synopsis = Launch a test satellite into a Geostationary Orbit
		#LOC_kerbalru_rp1_contract_FirstGEOSat-SCA_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>Having a communication satellite that remains stationary relative to a satellite earth station means that the antenna wouldn't need to track movements to stay connected, and a constant line of sight can be maintained 24 hours a day. This would greatly simplify communication relay and mass transmission systems.<br><br>See the RP-1 wiki for more information on how to get to a geostationary orbit.<br>Historical example: Syncom 3 (39 kg, Thor-Delta) launched in August of 1964.<b>
		#LOC_kerbalru_rp1_contract_FirstGEOSat-SCA_completedMessage = Congratulations! The satellite is in orbit over a constant area.
		#LOC_kerbalru_rp1_contract_FirstGeosync-SCA_title = Geosynchronous Test Satellite
		#LOC_kerbalru_rp1_contract_FirstGeosync-SCA_synopsis = Launch a geosynchronous test satellite
		#LOC_kerbalru_rp1_contract_FirstGeosync-SCA_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>With an orbital period of an earth day, a satellite will remain above a constant longitude, appearing to drift north and south through the day. This orbit will be able to provide a constant line of sight for satellite earth stations at low latitudes, but at high latitudes it may still drift too far north or south to be used for portions of the day. However, forgoing an inclination change burn makes this orbit easier to get to than a proper geostationary orbit.<br><br>See the RP-1 wiki for more information on how to get to a geostationary orbit.<br>Historical example: Syncom 2 (36kg, Thor-Delta).
		#LOC_kerbalru_rp1_contract_FirstGeosync-SCA_completedMessage = Congratulations! The satellite is in orbit and connected to the satellite earth station.
		#LOC_kerbalru_rp1_contract_ProgramActive_title = First Low Orbit Communications Satellite
		#LOC_kerbalru_rp1_contract_ProgramActive_synopsis = Launch the first low orbit communication satellite
		#LOC_kerbalru_rp1_contract_ProgramActive_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>Communications around the globe are limited to line of sight because of the curvature of Earth. If we can launch a communications satellite into orbit, we can use it to transmit information to the opposite side of the world. Launching a satellite into an eccentric low earth orbit is a good place to start. It should be relatively easy with existing launch vehicles, and the high apogee will provide good lines of sight for a few minutes every orbit. However, providing global communications coverage with such a low orbit would require very many satellites.<br><br>Historical example: Telstar 1 (78kg, Thor-Delta).
		#LOC_kerbalru_rp1_contract_ProgramActive_completedMessage = Congratulations! Satellite communications will forever change communications around the globe.
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4-SCA_title = Early Navigation Network (4 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4-SCA_synopsis = Launch a 4-satellite navigation network
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4-SCA_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>The previous launch of the first navigation satellite proved the theories that Doppler shift timing can be used to precisely locate a point or location on the surface of the Earth using satellites. Put that concept into operational use with the first rudimentary satellite navigation network.<br><br>Build a navigation network with four NavSats that provide more frequent revisit rates than the single previous satellite. Make sure the satellites are spread around the Earth to provide reasonable coverage.&br;&br;<b><color=white>NOTE: You may choose only the 3-satellite or 4-satellite contract.</color></b><br><br><b><color=yellow>NOTE: The satellites will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4-SCA_completedMessage = Congratulations! The network is up and transmitting, and our shakedown testing is complete!
		#LOC_kerbalru_rp1_contract_FirstTundraSat-SCA_title = Tundra Orbit Test Satellite
		#LOC_kerbalru_rp1_contract_FirstTundraSat-SCA_synopsis = Launch a test satellite into a Tundra Orbit
		#LOC_kerbalru_rp1_contract_FirstTundraSat-SCA_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>A Tundra orbit is a highly elliptical geosynchronous orbit (note: not geostationary orbit) similar to a Molniya orbit, with a high inclination (usually near 63.4) and an orbital period of one sidereal day. A satellite placed in this orbit spends most of its time over a chosen area of the Earth, a phenomenon known as apogee dwell, allowing it to maintain a line of sight with satellite earth stations at a high latitude for about 8 hours a day. The ground track of a satellite in a tundra orbit is a closed figure eight.<br><br>See the RP-1 wiki for more information on how to get to a Tundra orbit.<br><br>Historical example: Sirius FM-1 (3,800kg, Proton-K)
		#LOC_kerbalru_rp1_contract_FirstTundraSat-SCA_completedMessage = Success! The Tundra orbit is highly eccentric and lets the satellite spend most of its time over a point in the high latitudes.
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-SCA_title = First Molniya Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-SCA_synopsis = Launch a satellite into a Molniya orbit
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-SCA_description = <b>Program: Early Commercial Applications<br><b>Type: <color=blue>Optional</color></b><br><br>A Molniya orbit is a type of highly elliptical orbit with an inclination of 63.4 degrees, an argument of perigee of -90 (270) degrees, and an orbital period of one half of a sidereal day. This orbit will cause the satellite to appear to remain nearly stationary in the sky for a short period at apogee. Combined with the high inclination, this orbit will allow a satellite to maintain a line of sight with satellite earth stations at a high latitude for about 6 hours a day.<br><br>See the RP-1 wiki for more information on how to get to a Molniya orbit.<br><br>Historical example: Molniya 1-1 (1,600kg, Molniya)
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-SCA_completedMessage = Success! The Molniya orbit is highly eccentric and allows the satellite to spend most of its time over the high latitudes.
		#LOC_kerbalru_rp1_contract_landingEnceladus_title = Enceladus Landing (Uncrewed)
