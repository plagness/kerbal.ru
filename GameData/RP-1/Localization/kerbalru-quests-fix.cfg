		#LOC_kerbalru_rp1_ts_RP0Level10TrackingStation_description = Технологии DSN уровня 9. Апгрейд станции слежения ставит охлаждаемый приёмник и оборудование Ka-диапазона, усиление DSN растёт примерно на 4.5 dB.
