		#LOC_kerbalru_rp1_contract_landingUmbriel_completedMessage = Mission Success! You have safely landed on Umbriel and returned valuable science data from the surface.
		#LOC_kerbalru_rp1_contract_landingMiranda_title = Miranda Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_landingMiranda_synopsis = Achieve a soft landing on Miranda and transmit science
		#LOC_kerbalru_rp1_contract_landingMiranda_description = <b>Program: Uranian Moon Landings<br>Type: <color=green>Required</color></b><br><br>Send a craft to land on Miranda and return science data back to Earth.
		#LOC_kerbalru_rp1_contract_landingMiranda_completedMessage = Mission Success! You have safely landed on Miranda and returned valuable science data from the surface.
		#LOC_kerbalru_rp1_contract_landingTitania_title = Titania Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_landingTitania_synopsis = Achieve a soft landing on Titania and transmit science
		#LOC_kerbalru_rp1_contract_landingTitania_description = <b>Program: Uranian Moon Landings<br>Type: <color=green>Required</color></b><br><br>Send a craft to land on Titania and return science data back to Earth.
		#LOC_kerbalru_rp1_contract_landingTitania_completedMessage = Mission Success! You have safely landed on Titania and returned valuable science data from the surface.
		#LOC_kerbalru_rp1_contract_landingAriel_title = Ariel Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_landingAriel_synopsis = Achieve a soft landing on Ariel and transmit science
		#LOC_kerbalru_rp1_contract_landingAriel_description = <b>Program: Uranian Moon Landings<br>Type: <color=green>Required</color></b><br><br>Send a craft to land on Ariel and return science data back to Earth.
		#LOC_kerbalru_rp1_contract_landingAriel_completedMessage = Mission Success! You have safely landed on Ariel and returned valuable science data from the surface.
		#LOC_kerbalru_rp1_contract_landingOberon_title = Oberon Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_landingOberon_synopsis = Achieve a soft landing on Oberon and transmit science
		#LOC_kerbalru_rp1_contract_landingOberon_description = <b>Program: Uranian Moon Landings<br>Type: <color=green>Required</color></b><br><br>Send a craft to land on Oberon and return science data back to Earth.
		#LOC_kerbalru_rp1_contract_landingOberon_completedMessage = Mission Success! You have safely landed on Oberon and returned valuable science data from the surface.
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane2_title = Orbital Spaceplane with Maneuvers and 2+ Crew
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane2_synopsis = Fly a two-plus-person LEO Orbital mission in a spaceplane.
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane2_description = <b>Program: Crewed Spaceplane Development<br>Type: <color=blue>Optional</color></b><br><br>Putting two people into space in the same spaceplane opens the door to a range of new activities and opportunities. Such a spacecraft must remain in orbit with its crew @/DurationText days and return them safely to Earth.&br;&br;<b><color=white>NOTE: You can not select this contract and 'Orbital Flight with Maneuvers and 2+ Crew' at the same time. If you select the other contract while this is active, this will automatically fail.</color></b>&br;&br;<b><color=yellow>NOTE: This contract requires a horizontal landing on the space center runway.</color> If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.</b>&br;&br;<b>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane2_completedMessage = Crew landed safely after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane3_title = Orbital Spaceplane with at Least Three Crew
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane3_synopsis = Fly a three-person LEO Orbital mission in a spaceplane.
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane3_description = <b>Program: Crewed Spaceplane Development<br>Type: <color=blue>Optional</color></b><br><br>The goal and realization of putting three (or more) crew on orbit at the same time begins the era of the space shuttle and ready access to LEO. These craft should be able to support at least three crew and prove that they can stay in orbit for @/DurationText days before returning to a runway landing. The U.S. Space Shuttle (1981, STS) performed this mission, while the Soviet Буран (1988, Energia) was designed to do the same but made only one, unmanned, orbital flight before cancellation.&br;&br;<b><color=white>NOTE: You can not select this contract and 'Orbital Flight with at Least Three Crew' at the same time. If you select the other contract while this is active, this will automatically fail.</color></b>&br;&br;<b><color=yellow>NOTE: This contract requires a horizontal landing on the space center runway.</color> If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.</b>&br;&br;<b>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane3_completedMessage = Crew landed safely after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane1_title = Orbital Spaceplane (One Crew)
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane1_synopsis = Fly a single-person LEO Orbital mission in a spaceplane.
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane1_description = <b>Program: Crewed Spaceplane Development<br>Type: <color=blue>Optional</color></b><br><br>Single-person orbital spaceplanes were not historically built, but a number of concepts were studied and X-20 Dyna-Soar (1966 planned, Titan III) even began construction, paving the way for later more capable vehicles. Design, build, and launch a spaceplane that remains for @/NoOfOrbits orbits and return the crew safely back to Earth.&br;&br;<b><color=white>NOTE: You can not select this contract and the Orbital Flight (One Crew) or Orbital Spaceplane with Maneuvers and 2+ Crew contract. If you select the other contract while this is active, this will automatically fail.</color></b>&br;&br;<b><color=yellow>NOTE: This contract requires a horizontal landing on the space center runway. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target. Make sure to plan your orbit to allow reentry in the right place.</color></b>&br;&br;<b>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_OrbitalSpaceplane1_completedMessage = Crew landed safely after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_CrewedSpaceplaneSuborbital_title = Suborbital Spaceplane Flight (Crewed)
		#LOC_kerbalru_rp1_contract_CrewedSpaceplaneSuborbital_synopsis = Send a crewed spaceplane on a suborbital flight
		#LOC_kerbalru_rp1_contract_CrewedSpaceplaneSuborbital_description = <b>Program: Crewed Spaceplane Development<br>Type: <color=blue>Optional</color></b><br><br>Crewed suborbital flights are used as a safer prelude to an orbital mission, for research, or to set non-orbital altitude records. Send any number of crew above @VesselGroup/ReachAlt/minAltitude meters and land on the runway to satisfy the requirements of this mission. Historical missions used the X-15 (1963, B-52), and SpaceShipOne (2004, White Knight).<b><color=white>NOTE: You can not select this contract and 'First Orbital Spaceplane Flight', 'X-Planes (Suborbital)', or 'Suborbital Flight (Crewed)' at the same time. If you select the other contract while this is active, this will automatically fail.</color></b>&br;&br;<b><color=yellow>NOTE: This contract requires a horizontal landing on the space center runway.</color> If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.</b>&br;&br;<b>Number of Contracts Completed: @index / @maxCompletions</b>
		#LOC_kerbalru_rp1_contract_CrewedSpaceplaneSuborbital_completedMessage = Congratulations! The crew has landed safely and we put another person in space.
		#LOC_kerbalru_rp1_contract_first_SpaceplaneOrbit_title = First Orbital Spaceplane Flight
		#LOC_kerbalru_rp1_contract_first_SpaceplaneOrbit_synopsis = Send a person into orbit and return safely to a runway landing
		#LOC_kerbalru_rp1_contract_first_SpaceplaneOrbit_description = <b>Program: Crewed Spaceplane Development<br>Type: <color=green>Required</color></b><br><br>Putting a human into orbit around the Earth is a major milestone in spaceplane development. Such a spaceplane needs to be capable of both extended operation in space, like traditional spacecraft, but also atmospheric flight at speeds up to 7 km/s. The task requires a reliable launch system and many hours of research and engineering to pull off. Single-person orbital spaceplanes were not historically built, but a number of concepts were studied and X-20 Dyna-Soar (1966 planned, Titan III) even began construction, paving the way for later more capable vehicles.&br;&br;<b><color=yellow>NOTE: Unlike capsule missions, this contract requires a horizontal landing on the space center runway.</color> If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.</b>&br;&br;<b>HINT: Launching slightly northwards (if in the Northern Hemisphere) instead of due East will put the launch site back under your track after a small number of orbits, reducing crossrange requirements.</b>&br;&br;<b><color=yellow>NOTE: Completing this contract will cause the 'Suborbital Spaceplane (Crewed)' contracts to become unavailable. If it is accepted then it will automatically fail.</color></b>
		#LOC_kerbalru_rp1_contract_first_SpaceplaneOrbit_completedMessage = Crew landed safely after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_first_SpaceplaneDocking_title = First Docking by Spaceplane
		#LOC_kerbalru_rp1_contract_first_SpaceplaneDocking_synopsis = Perform a docking of two vessels in orbit of Earth, then bring one back to a runway landing
		#LOC_kerbalru_rp1_contract_first_SpaceplaneDocking_description = <b>Program: Crewed Spaceplane Development<br>Type: <color=red>Capstone</color></b><br><br>A use for space shuttles is orbital servicing, docking to an existing satellite and performing repairs, like the Space Shuttle did to fix the Hubble Space Telescope. Docking is also necessary to bring crew to space stations. Perform the first docking between a spaceplane and another spacecraft.&br;&br;<b><color=white>NOTE: You can not select this contract and 'First Docking' at the same time. If you select the other contract while this is active, this will automatically fail.</color></b>&br;&br;<b><color=yellow>NOTE: This contract requires a horizontal landing on the space center runway.</color> If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.</b>
		#LOC_kerbalru_rp1_contract_first_SpaceplaneDocking_completedMessage = Nice Work! Docking capability will make our spaceplanes much more useful.
		#LOC_kerbalru_rp1_contract_SpaceplaneRendezvous_title = First Rendezvous by Spaceplane
		#LOC_kerbalru_rp1_contract_SpaceplaneRendezvous_synopsis = Perform the First Rendezvous of a spaceplane with another spacecraft
		#LOC_kerbalru_rp1_contract_SpaceplaneRendezvous_description = <b>Program: Crewed Spaceplane Development<br>Type: <color=green>Required</color></b><br><br>One mission planned for reconnaissance spaceplanes such as Dyna-Soar II was to rendezvous with and investigate satellites on orbit. Using your own knowledge of orbital mechanics, bring two craft to within 100 meters of each other while in orbit around Earth. At least one of the spacecraft must be a newly launched spaceplane which subsequently lands on the runway.&br;&br;<b><color=white>NOTE: You can not select this contract and 'First Rendezvous' at the same time. If you select the other contract while this is active, this will automatically fail.</color></b>&br;&br;<b><color=yellow>NOTE: This contract requires a horizontal landing on the space center runway.</color> If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.</b>
		#LOC_kerbalru_rp1_contract_SpaceplaneRendezvous_completedMessage = Congratulations! By accomplishing the first rendezvous, it opens up the possibilities of what our spaceplanes can do while in orbit.
		#LOC_kerbalru_rp1_contract_LunarImpactorOptional_title = Lunar Impactor
		#LOC_kerbalru_rp1_contract_LunarImpactorOptional_synopsis = Impact the surface of the Moon with a probe
		#LOC_kerbalru_rp1_contract_LunarImpactorOptional_description = <b>Program: Early Lunar Probes<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch a probe that impacts the surface of the Moon. Scientists at home will record their observations as a result of the impact. Due to the nature of the experiment, the impactor must have significant mass to it. The contract requires the impactor to have at least a 40 kg mass.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_LunarImpactorOptional_completedMessage = Congratulations on hitting the Moon! We're getting some great data here.
		#LOC_kerbalru_rp1_contract_LunarImpactor_title = First Lunar Impactor
		#LOC_kerbalru_rp1_contract_LunarImpactor_synopsis = Impact the surface of the Moon with a probe
		#LOC_kerbalru_rp1_contract_LunarImpactor_description = <b>Program: Early Lunar Probes<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch a probe that impacts the surface of the Moon. Scientists at home will record their observations as a result of the impact. Due to the nature of the experiment, the impactor must have significant mass to it. The contract requires the impactor to have at least a 40 kg mass.<br><br><color=white><b>After this contract has been completed, the 'Lunar Impactor (Uncrewed)' contract will become available.</b></color>
		#LOC_kerbalru_rp1_contract_LunarImpactor_completedMessage = Congratulations on hitting the Moon! We're getting some great data here.
		#LOC_kerbalru_rp1_contract_LunarOrbiterOptional_title = Lunar Orbiter (Uncrewed)
		#LOC_kerbalru_rp1_contract_LunarOrbiterOptional_synopsis = Achieve lunar orbit and transmit data
		#LOC_kerbalru_rp1_contract_LunarOrbiterOptional_description = <b>Program: Early Lunar Probes<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch a probe into lunar orbit (with a maximum apiselene of @/maxApText.Print() km) and successfully transmit or return some scientific data from the Moon's vicinity.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_LunarOrbiterOptional_completedMessage = Orbit confirmed, and we got some excellent new data!
		#LOC_kerbalru_rp1_contract_LunarOrbiter_title = First Lunar Orbiter (Uncrewed)
		#LOC_kerbalru_rp1_contract_LunarOrbiter_synopsis = Achieve lunar orbit and transmit data
		#LOC_kerbalru_rp1_contract_LunarOrbiter_description = <b>Program: Early Lunar Probes<br>Type: <color=red>CAPSTONE</color></b><br><br>Design and successfully launch a probe into lunar orbit (with a maximum apiselene of @/maxApText.Print() km) and successfully transmit or return some scientific data from the Moon's vicinity.</b><br><br><color=white><b>After this contract has been completed, the 'Lunar Orbiter (Uncrewed)' contract will become available.</b></color>
		#LOC_kerbalru_rp1_contract_LunarOrbiter_completedMessage = Orbit confirmed, and we got some excellent new data!
		#LOC_kerbalru_rp1_contract_LunarFlyby_title = Lunar Flyby (Uncrewed)
		#LOC_kerbalru_rp1_contract_LunarFlyby_synopsis = Send a craft on a flyby of the Moon and receive data
		#LOC_kerbalru_rp1_contract_LunarFlyby_description = <b>Program: Early Lunar Probes<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch a probe to flyby the Moon with a closest approach of no more than 5000 km, and successfully transmit or return some scientific data from the Moon's vicinity. &br;&br;<b>You may only complete this contract once</b> // Remove this note for experienced players at a later time!
		#LOC_kerbalru_rp1_contract_LunarFlyby_completedMessage = We got some great observations during the flyby, the data are very interesting indeed...
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicMach2_title = X-Planes (Mach 2 Supersonic)
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicMach2_synopsis = Fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minSpeed m/s in level flight and hold, then return safely.
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicMach2_description = <b>Program: X-Plane Research<br>Type: <color=green>Required</color></b><br><br>Design, build, and fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minSpeed m/s in level flight, then return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br><color=white><b>After this contract has been completed, the 'X-Planes (Supersonic) Optional' contracts will become available.</b></color><br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicMach2_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesKarman_title = X-Planes (Karman Line)
		#LOC_kerbalru_rp1_contract_XPlanesKarman_synopsis = Launch a crewed vessel to @/altitudeKm km.
		#LOC_kerbalru_rp1_contract_XPlanesKarman_description = <b>Program: X-Plane Research<br>Type: <color=red>CAPSTONE</color></b><br><br>Design, build, and launch a crewed rocket or plane to put a person into the high atmosphere above @/altitudeKm km and return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br><color=white><b>After this contract has been completed, the 'X-Planes (Suborbital)' contract will become available.</b></color><br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesKarman_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesHypersonic_title = X-Planes (Hypersonic)
		#LOC_kerbalru_rp1_contract_XPlanesHypersonic_synopsis = Launch a crewed vessel to @/minSpeedMPS m/s below 40km altitude.
		#LOC_kerbalru_rp1_contract_XPlanesHypersonic_description = <b>Program: X-Plane Research<br>Type: <color=green>Required</color></b><br><br>Design, build, and launch a crewed plane capable of hypersonic atmospheric flight of at least @/minSpeedMPS m/s below 40km and return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesHypersonic_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesHypersonicOptional_title = X-Planes (Hypersonic) Optional
		#LOC_kerbalru_rp1_contract_XPlanesHypersonicOptional_synopsis = Launch a crewed vessel to @/minSpeedMPS m/s for at least @/minDuration below 40km altitude.
		#LOC_kerbalru_rp1_contract_XPlanesHypersonicOptional_description = <b>Program: X-Plane Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a crewed plane capable of hypersonic atmospheric flight of at least @/minSpeedMPS m/s below 40km and return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesHypersonicOptional_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitudeOptional_title = X-Planes (High Altitude) - Optional
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitudeOptional_synopsis = Launch a crewed vessel to @/altitudeKm km.
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitudeOptional_description = <b>Program: X-Plane Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a crewed rocket or plane to put a person into the high atmosphere above @/altitudeKm km and return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br>This is a series of @maxCompletions contracts, of which @completions have been completed.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitudeOptional_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_RocketPlaneDevelopmentOptional_title = Experimental Rocketplanes - Optional
		#LOC_kerbalru_rp1_contract_RocketPlaneDevelopmentOptional_synopsis = Launch a crewed vessel to @/altitudeKm km.
		#LOC_kerbalru_rp1_contract_RocketPlaneDevelopmentOptional_description = <b>Program: X-Plane Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a crewed rocketplane to achieve an altitude of @/altitudeKm km, a velocity of @/velocity m/s and return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.<br><br><b><color="red">This contract will no longer be offered once you complete 'X-Planes (High Altitude)'!</color></b><br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_RocketPlaneDevelopmentOptional_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearch_title = X-Planes (Stratospheric Research)
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearch_synopsis = Fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minAltitude meters, then return safely.
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearch_description = <b>Program: X-Plane Research<br>Type: <color=green>Required</color></b><br><br>Future airliners may fly at unprecedented altitudes, and it is important to understand atmospheric behavior such as turbulence at high altitudes. In order to do this, design, build, and fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minAltitude meters in level subsonic flight, then return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearch_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalHigh_title = X-Planes (High Supersonic) Optional
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalHigh_synopsis = Fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minSpeed m/s in level flight and hold, then return safely.
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalHigh_description = <b>Program: X-Plane Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minSpeed m/s in level flight, then return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.<br><b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_XPlanesSupersonicOptional</b><br><br>This is a series of @maxCompletions contracts, of which @completions have been completed.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalHigh_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalLow_title = X-Planes (Low Supersonic) Optional
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalLow_synopsis = Fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minSpeed m/s in level flight and hold, then return safely.
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalLow_description = <b>Program: X-Plane Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minSpeed m/s in level flight, then return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br>This is a series of @maxCompletions contracts, of which @completions have been completed.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesSupersonicOptionalLow_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesSuborbital_title = X-Planes (Suborbital)
		#LOC_kerbalru_rp1_contract_XPlanesSuborbital_synopsis = Launch a crewed vessel to @/altitudeKm km.
		#LOC_kerbalru_rp1_contract_XPlanesSuborbital_description = <b>Program: X-Plane Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a crewed rocket or plane to put a person into the high atmosphere above @/altitudeKm km and return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.<br><br><b><color="red">This contract will no longer be offered once you complete 'Suborbital Flight (Crewed)'!</color></b><br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesSuborbital_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_BreakSoundBarrier_title = Break the Sound Barrier (Crewed)
		#LOC_kerbalru_rp1_contract_BreakSoundBarrier_synopsis = Fly a crewed craft to reach Mach 1 and maintain for at least 30 seconds.
		#LOC_kerbalru_rp1_contract_BreakSoundBarrier_description = <b>Program: X-Plane Research<br>Type: <color=green>Required</color></b><br><br>Design, build, and fly a crewed aircraft or rocket to attain Mach 1 and hold above it for 30 seconds. Vital to the development of new wing shapes and high-speed aerodynamics (the area rule, swept wings, mach tuck, and so on), breaching the sound barrier is a worthy scientific endeavor. Firsts include the U.S. Bell X-1 (1947), the Soviet Lavochkin La-176 (1948), and the British de Havilland DH.108 (1948).<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_BreakSoundBarrier_completedMessage = BOOM! Congratulations, you have broken the sound barrier!
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearchOptional_title = X-Planes (Stratospheric Research) Optional
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearchOptional_synopsis = Fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minAltitude meters, then return safely.
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearchOptional_description = <b>Program: X-Plane Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and fly a crewed jet aircraft to maintain @VesselGroup/HoldSituation/minAltitude meters in level flight, then return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesStratosphericResearchOptional_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitude_title = X-Planes (High Altitude)
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitude_synopsis = Launch a crewed vessel to @/altitudeKm km.
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitude_description = <b>Program: X-Plane Research<br>Type: <color=green>Required</color></b><br><br>Design, build, and launch a crewed rocket or plane to put a person into the high atmosphere above @/altitudeKm km and return home safely. Optionally, landing back at the runway will award extra reputation. If playing from the Cape, the Space Shuttle runway provided by the RSS-CanaveralHD mod is also a valid landing target.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_XPlanesHighAltitude_completedMessage = Congratulations on a successful flight!
		#LOC_kerbalru_rp1_contract_EOSCorona_title = Completed First Orbit Recovery
		#LOC_kerbalru_rp1_contract_EOSCorona_synopsis = Launch the first dedicated imagery satellite.
		#LOC_kerbalru_rp1_contract_EOSCorona_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>Taking photographic images from space, with a powerful enough lens, can provide highly detailed information about many things. When used for intelligence purposes, an eye in the sky is an invaluable tool for gathering information about geopolitical rivals. These types of satellites also have numerous peaceful purposes, including crop monitoring, observing deforestation, and providing indicators for areas requiring humanitarian aid. <b><color="yellow">Make sure your craft contains an Basic Film Camera, and a system to return the film for processing. Collection of all available science will require multiple launches due to film storage limitations onboard the vehicle.</color></b><br><br>Real life examples: Discoverer/Keyhole-1 (780kg, Thor-Agena)
		#LOC_kerbalru_rp1_contract_EOSCorona_completedMessage = Well done! Never before has so much of the Earth been photographed at one time. This new capability will change the way the world is viewed forever.
		#LOC_kerbalru_rp1_contract_EOSGrav1_title = Gravimetric Satellite
		#LOC_kerbalru_rp1_contract_EOSGrav1_synopsis = Launch the first dedicated geodetic satellite.
		#LOC_kerbalru_rp1_contract_EOSGrav1_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=blue>Optional</color></b><br><br> Launch a new satellite to measure the gravimetric field of earth and its effect on orbiting satellites.<br><br><b><color="green">Make sure your craft contains an Orbital Perturbation experiment. Launch it into an inclined orbit and return 2 months worth of science.</color></b><br><br>Historical example: ANNA 1B (161kg, Thor-Ablestar)
		#LOC_kerbalru_rp1_contract_EOSGrav1_completedMessage = Interesting, the gravity field of Earth is far less uniform than expected.
		#LOC_kerbalru_rp1_contract_EOSCoronaRep_title = Completed Dedicated Earth Imaging Satellite
		#LOC_kerbalru_rp1_contract_EOSCoronaRep_synopsis = Launch dedicated imagery satellites for longer missions.
		#LOC_kerbalru_rp1_contract_EOSCoronaRep_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=blue>Optional</color></b><br><br>With orbital imagery now a proven capability, send up a follow-on early-generation imagery satellite for a longer duration in orbit. This will allow the collection of far more data with repeat passes over the same points on the surface. <b><color="yellow">Make sure your craft contains an Improved Film Camera, and a system to return the film canister for processing. Collection of all available science will require multiple launches due to film storage limitations onboard the vehicle.</color></b><br><br><b>Number of Contracts Completed: @index / @maxCompletions</b><br><br>Historical example: CORONA/Keyhole-4 (1,500kg, Thor-Agena)
		#LOC_kerbalru_rp1_contract_EOSCoronaRep_completedMessage = Longterm imagery satellites are now a proven technology.
		#LOC_kerbalru_rp1_contract_EOSCosmicRay1_title = Cosmic Ray Satellite Beyond LEO
		#LOC_kerbalru_rp1_contract_EOSCosmicRay1_synopsis = Launch a Scientific Satellite into an eccentric orbit of Earth with Cosmic Ray Science experiment and an Early TV camera.
		#LOC_kerbalru_rp1_contract_EOSCosmicRay1_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>The satellite launched in the Early Satellites program returned valuable data about the space near Earth. Send a satellite to High Earth Orbit to detect cosmic rays so that we may better ascertain the shape and strength of the cosmic ray environment around Earth. Early scientific satellites also contained still-frame and video cameras to take photos of Earth from entirely new perspectives.&br;&br;<b><color="green">Make sure your craft contains a Cosmic Ray Science experiment (Geiger-Muller Counter or Scintillation Counter) and an Early TV camera. Between this and any other launches you must transmit 75% of Cosmic Ray Science and 75% of Visual Imaging from High Earth Orbit. Science does not have to be collected in only 1 flight.</color></b>&br;&br;Historical example: Explorer 6 (64kg, Thor-Able)
		#LOC_kerbalru_rp1_contract_EOSCosmicRay1_completedMessage = Congratulations! The satellite you sent into orbit has returned extremely valuable data that has helped characterize the cosmic ray environment around Earth.
		#LOC_kerbalru_rp1_contract_EOSCherenkov_title = Completed first cosmic ray satellite
		#LOC_kerbalru_rp1_contract_EOSCherenkov_synopsis = Launch a scientific satellite into an elliptical orbit with Cherenkov Counter experiment.
		#LOC_kerbalru_rp1_contract_EOSCherenkov_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>Launch a satellite into an elliptical orbit with a new cosmic ray detector called a Cherenkov counter. This device is a different type of cosmic ray detector specifically calibrated for high-energy particles like neutrinos. <br><br><b><color="green">Make sure your craft contains a Cherenkov Counter and return 75% of the available science from High Earth Orbit. Science does not have to be collected in only 1 flight.</color></b><br><br>Historical example: Explorer 11 (37kg, Juno II)
		#LOC_kerbalru_rp1_contract_EOSCherenkov_completedMessage = Congratulations! The satellite you sent into orbit has returned interesting results about the high-energy particle environment around Earth.
		#LOC_kerbalru_rp1_contract_EOSIRRad2_title = Completed first weather satellite
		#LOC_kerbalru_rp1_contract_EOSIRRad2_synopsis = Launch the first weather satellite with the Infrared Radiometry experiment and an Early TV camera.
		#LOC_kerbalru_rp1_contract_EOSIRRad2_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=blue>Optional</color></b><br><br>After the success of your first weather satellite, your government wants additional satellites available for more timely weather observations with better coverage of Earth. Launch an additional weather satellite to fulfill their request.<br><br><b><color="green">Make sure your craft contains an Infrared Radiometry 1 experiment and an Early TV camera. Science requirements can be met over multiple launches.</color></b><br><br>Historical examples: TIROS-2 through TIROS-8.
		#LOC_kerbalru_rp1_contract_EOSIRRad2_completedMessage = Success! The images provided from this satellite have proven that weather satellites can be extremely effective in helping meteorologists predict the weather.
		#LOC_kerbalru_rp1_contract_EOSIRRad3_title = Completed first additional weather satellite
		#LOC_kerbalru_rp1_contract_EOSIRRad3_synopsis = Launch the first weather satellite with the Infrared Radiometry experiment and an Early TV camera.
		#LOC_kerbalru_rp1_contract_EOSIRRad3_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=blue>Optional</color></b><br><br>After the success of your first weather satellite, your government wants additional satellites available for more timely weather observations with better coverage of Earth. Launch an additional weather satellite to fulfill their request.<br><br><<b><color="green">Make sure your craft contains an Infrared Radiometry 1 experiment and an Early TV camera. Science requirements can be met over multiple launches.</color></b><br><br>Historical example: TIROS-9.
		#LOC_kerbalru_rp1_contract_EOSIRRad3_completedMessage = Success! The images provided from this satellite have proven that weather satellites can be extremely effective in helping meteorologists predict the weather.
		#LOC_kerbalru_rp1_contract_EOSIRRad1_title = Infrared Radiometry Satellite
		#LOC_kerbalru_rp1_contract_EOSIRRad1_synopsis = Launch the first weather satellite with the Infrared Radiometry experiment and an Early TV camera.
		#LOC_kerbalru_rp1_contract_EOSIRRad1_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>Weather forecasting today would be impossible without the numerous weather satellites constantly observing our atmosphere from orbit. Launch the very first dedicated weather satellite to measure temperatures in the atmosphere and correlate those with real-time video.<br><br><b><color="green">Make sure your craft contains an Infrared Radiometer 1 experiment and an Early TV camera.</color></b><br><br>Historical example: TIROS-1 (120kg, Thor-Able)
		#LOC_kerbalru_rp1_contract_EOSIRRad1_completedMessage = Success! The images provided from this satellite have proven that weather satellites can be extremely effective in helping meteorologists predict the weather.
		#LOC_kerbalru_rp1_contract_EOSMagScan1_title = Completed first cosmic ray satellite
		#LOC_kerbalru_rp1_contract_EOSMagScan1_synopsis = Launch the first dedicated magnetometry satellite.
		#LOC_kerbalru_rp1_contract_EOSMagScan1_description = <b>Program: Early Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>Anyone that has ever used a compass is familiar with the magnetic fields that encapsulate Earth. Launch a satellite to better charaterize the strength and direction of the magnetic field, and determine how far into space its influence is felt.<br><br><b><color="green">Make sure your craft contains a Magnetic Scan experiment.  Launch it into an elliptical orbit and return 75% worth of science from both Low and High Earth Orbit.</color></b><br><br>Historical example: IMP-A (138kg, Thor-Delta)
		#LOC_kerbalru_rp1_contract_EOSMagScan1_completedMessage = Our scientists now better understand the magnetosphere surrounding Earth and, combined with previous data, have determined the existance of a standing shock wave in the solar wind around the magnetic field.
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4_title = Early Navigation Network (4 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4_synopsis = Launch a 4-satellite navigation network
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>The previous launch of the first navigation satellite proved the theories that Doppler shift timing can be used to precisely locate a point or location on the surface of the Earth using satellites. Put that concept into operational use with the first rudimentary satellite navigation network.<br><br>Build a navigation network with four NavSats that provide more frequent revisit rates than the single previous satellite. Make sure the satellites are spread around the Earth to provide reasonable coverage.&br;&br;<b><color=white>NOTE: You may choose only the 3-satellite or 4-satellite contract.</color></b><br><br><b><color=yellow>NOTE: The satellites will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork4_completedMessage = Congratulations! The network is up and transmitting, and our shakedown testing is complete!
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3_title = Early Navigation Network (3 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3_synopsis = Launch a 3-satellite navigation network
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>The previous launch of the first navigation satellite proved the theories that Doppler shift timing can be used to precisely locate a point or location on the surface of the Earth using satellites. Put that concept into operational use with the first rudimentary satellite navigation network.&br;&br;Build a navigation network with three NavSats that provide more frequent revisit rates than the single previous satellite. Make sure the satellites are spread around the Earth to provide reasonable coverage.&br;&br;<b><color=white>NOTE: You may choose only the 3-satellite or 4-satellite contract.</color></b><br><br><b><color=yellow>NOTE: The satellites will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_EarlyNavNetwork3_completedMessage = Congratulations! The network is up and transmitting, and our shakedown testing is complete!
		#LOC_kerbalru_rp1_contract_EarlyNavSat-CA_title = Commercial Navigation Satellite (Early)
		#LOC_kerbalru_rp1_contract_EarlyNavSat-CA_synopsis = Launch a Navigation Satellite for a customer.
		#LOC_kerbalru_rp1_contract_EarlyNavSat-CA_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>Now that satellite navigation technology has been proven, we need to launch more capable satellites to expand navigation coverage further around Earth. Our customers want their own satellite capabilities tailored to their specific needs. Launch new navigation satellites with the required specifications into the specified orbits.<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color></b><br><br><b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.<br><b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_EarlyComSat<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_EarlyNavSat-CA_completedMessage = Success! The navigation satellite was launched into the proper orbit. Precision satellite-based navigation is one step closer to being a reality.
		#LOC_kerbalru_rp1_contract_FirstComSat-CA_title = First Communications Satellite
		#LOC_kerbalru_rp1_contract_FirstComSat-CA_synopsis = Launch the first communication satellite
		#LOC_kerbalru_rp1_contract_FirstComSat-CA_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>Communications around the globe are limited to line of sight because of the curvature of Earth. If we can launch a communications satellite into orbit, we can use it to transmit information to the opposite side of the world.<br><br>Historical example: Telstar 1 (78kg, Thor-Delta)<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_FirstComSat-CA_completedMessage = Congratulations! Satellite communications will forever change communications around the globe.
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3-CA_title = Early Communications Network (3 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3-CA_synopsis = Launch a 3 satellite Communications Network
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3-CA_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>Now that you've demonstrated the ability of satellites to relay communications via one-off launches, it's time to create a network of them to provide full coverage of the Earth.<br><br>Launch a 3-satellite communication network where the satellites are sufficiently dispersed and in high enough orbits to provide near-complete coverage of the Earth's surface.<br><br><b><color=white>NOTE: You may choose only the 3-satellite or 4-satellite contract.</color></b><br><br><b><color=yellow>NOTE: The satellites will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3-CA_completedMessage = Congratulations! The network is up and transmitting, and our shake-out testing is complete!
		#LOC_kerbalru_rp1_contract_EarlyComSat-CA_title = Commercial Communications Satellite (Early)
		#LOC_kerbalru_rp1_contract_EarlyComSat-CA_synopsis = Launch a Communications Satellite for a customer.
		#LOC_kerbalru_rp1_contract_EarlyComSat-CA_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>Now that satellite communications technology has been proven, we need to launch more capable satellites to expand communication coverage further around Earth. Every major Telecom wants their own satellite capabilities tailored to their specific needs. Launch new communications satellites with the required specifications into the specified orbits.<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color><br><br>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.<br><b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_EarlyComSat<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_EarlyComSat-CA_completedMessage = Success! The communications satellite was launched into the proper orbit. Your customer is very happy.
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4-CA_title = Early Communications Network (4 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4-CA_synopsis = Launch a 4 satellite Communications Network
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4-CA_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>Now that you've demonstrated the ability of satellites to relay communications via one-off launches, it's time to create a network of them to provide full coverage of the Earth.<br><br>Launch a 4-satellite communication network where the satellites are sufficiently dispersed and in high enough orbits to provide near-complete coverage of the Earth's surface.<br><br><b><color=white>NOTE: You may choose only the 3-satellite or 4-satellite contract.</color></b><br><br><b><color=yellow>NOTE: The satellites will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4-CA_completedMessage = Congratulations! The network is up and transmitting, and our shake-out testing is complete!
		#LOC_kerbalru_rp1_contract_EarlyMolniyaSat_title = Molniya Communications Satellite (Early)
		#LOC_kerbalru_rp1_contract_EarlyMolniyaSat_synopsis = Launch a customer communication satellite into a Molniya orbit.
		#LOC_kerbalru_rp1_contract_EarlyMolniyaSat_description = <b>Program: Early Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>Now that satellite communications technology has been proven, launch more capable satellites to expand communication coverage further around Earth. Some customers want satellites that dwell longer over the higher latitudes using Molniya orbits. Launch a new communications satellite with the required specifications with the unique Molniya orbital parameters.<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color><br><br><b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_EarlyComSat<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_EarlyMolniyaSat_completedMessage = Success! The communications satellite was launched into the proper orbit. Your customer is very happy.
		#LOC_kerbalru_rp1_contract_FirstNavSat-CA_title = First Navigational Satellite  // Based on Transit 1 through 4
		#LOC_kerbalru_rp1_contract_FirstNavSat-CA_synopsis = Launch the first navigation satellite
		#LOC_kerbalru_rp1_contract_FirstNavSat-CA_description = <b>Program: Early Commercial Applications<br>Type: <color=green>Required</color></b><br><br>By measuring the Doppler shift of radio signals from a satellite in a known orbit, it is possible for a receiver on the ground to establish their location, which would have many applications both civilian and military. To test the principle and develop receiver equipment, it is necessary to have a test navigational satellite in orbit. <br>Historical example: Transit 1B (119 kg, Thor-Ablestar).<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_FirstNavSat-CA_completedMessage = Congratulations! The satellite is in orbit and we have already begun to receive Doppler curves.
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-CA_title = First Molniya Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-CA_synopsis = Launch a satellite into a Molniya orbit
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-CA_description = <b>Program: Early Commercial Applications<br><b>Type: <color=green>Required</color></b><br><br>A Molniya orbit is a type of highly elliptical orbit with an inclination of 63.4 degrees, an argument of perigee of -90 (270) degrees, and an orbital period of one half of a sidereal day. This keeps the satellite mostly to the northern hemisphere of the Earth. Place a satellite into a Molniya orbit.<br><br>There will be an orbit showing in the map view and tracking station. You do not have to place the satellite into this orbit, but it is instead meant to show you where your perigee and apogee should approximately be located, but more importantly, it shows the proper shape of the orbit.<br><br>Historical example: Molniya 1-1 (1,600kg, Molniya)<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat-CA_completedMessage = Success! The Molniya orbit is highly eccentric and allows the satellite to spend most of its time over the high latitudes.
		#LOC_kerbalru_rp1_contract_probeTitan_title = Titan Atmospheric Probe
		#LOC_kerbalru_rp1_contract_probeTitan_synopsis = Send an uncrewed probe into the Titan atmosphere and transmit science
		#LOC_kerbalru_rp1_contract_probeTitan_description = <b>Program: Saturn Observation<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into the atmosphere of Titan and will return scientific data.
		#LOC_kerbalru_rp1_contract_probeTitan_completedMessage = Congratulations! Our scientists have learned valuable information about the make-up of the atmosphere.
		#LOC_kerbalru_rp1_contract_orbitSaturn_Rep_title = Saturn Orbital Science Probe
		#LOC_kerbalru_rp1_contract_orbitSaturn_Rep_synopsis = Send an uncrewed probe into orbit around Saturn
		#LOC_kerbalru_rp1_contract_orbitSaturn_Rep_description = <b>Program: Saturn Observation<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into a scientifically useful orbit of Saturn.&br;The flexible parameters of this contract allow you to choose either a high inclination orbit for maximum surface coverage or an orbit coplanar with the moons for repeated flybys.
		#LOC_kerbalru_rp1_contract_orbitSaturn_Rep_completedMessage = Congratulations! We can continue to gather data from the new satellite.
		#LOC_kerbalru_rp1_program_EarlyXPlanes_title = X-Plane Research
		#LOC_kerbalru_rp1_program_EarlyXPlanes_description = This program tasks the space agency with the development of experimental aircraft to test aerodynamic behavior at velocities and altitudes previously unreachable by crewed craft.
		#LOC_kerbalru_rp1_program_EarlyXPlanes_objectivesPrettyText = Complete X-Planes (Mach 2 Supersonic) and X-Planes (Karman Line) contracts.
		#LOC_kerbalru_rp1_program_SuborbRocketDev_title = Early Rocket Development
		#LOC_kerbalru_rp1_program_SuborbRocketDev_description = The first step in developing orbit capable rockets. This programs requires progressively developing suborbital rockets with increasing capabilities.
		#LOC_kerbalru_rp1_program_SuborbRocketDev_objectivesPrettyText = Complete Karman Line, Reach a Suborbital Trajectory & Return (uncrewed), and Downrange Milestone (5000 km) contracts.
		#LOC_kerbalru_rp1_program_SuborbRocketResearch_title = Suborbital Research
		#LOC_kerbalru_rp1_program_SuborbRocketResearch_description = The goal of peaceful space exploration starts here, with rocketry missions that perform key experiments, such as taking high altitude photos and testing how biological creatures handle brief exposures to space and the rigors of rocket travel. You'll need to research the Early Science node to complete this program.
		#LOC_kerbalru_rp1_program_SuborbRocketResearch_objectivesPrettyText = Complete Karman Line, Film Return, Bio Return, and Advanced Bio Return contracts.
		#LOC_kerbalru_rp1_program_EarlySatellites_title = Early Satellites (Light)
		#LOC_kerbalru_rp1_program_EarlySatellites_description = The adage "What goes up must come down" is no longer the same truism in the age of satellites. Your space agency is tasked to put the first satellites in various orbits around the Earth, breaking the grip of terrestrial gravity. Completing this program will require Satellite Era Science and an orbit-capable launch vehicle.
		#LOC_kerbalru_rp1_program_EarlySatellites_objectivesPrettyText = Launch the first satellite, a science sat, an atmospheric analysis sat, the first sat in a polar orbit, and the first solar powered sat.
		#LOC_kerbalru_rp1_program_EarlySatellites-Heavy_title = Early Satellites (Heavy)
		#LOC_kerbalru_rp1_program_EarlySatellites-Heavy_description = The adage "What goes up must come down" is no longer the same truism in the age of satellites. Your space agency is tasked to put the first satellites in various orbits around the Earth, breaking the grip of terrestrial gravity. These contracts require larger payloads, but will ultimately be more lucrative. Completing this program will require Satellite Era Science and an orbit-capable launch vehicle that can lift 1 ton.
		#LOC_kerbalru_rp1_program_EarlySatellites-Heavy_objectivesPrettyText = Complete the First Satellite (30 kg), First Biological Satellite (400 kg) or First Polar Satellite (400 kg), and First Science Satellite (1000 kg) contracts.
		#LOC_kerbalru_rp1_program_EarthObservationScience1_title = Early Earth Observation Satellites
		#LOC_kerbalru_rp1_program_EarthObservationScience1_description = Now that you have proven the ability to send satellites into orbit, the next step is to send them into more useful orbits with more beneficial payloads. This program will focus on satellites for observing the Earth and the space environment around it. This will advance scientific knowledge of not just physical processes within our atmosphere, but also those in space, all of which influence our lives here on Earth.
		#LOC_kerbalru_rp1_program_EarthObservationScience1_objectivesPrettyText = Launch satellites to photograph the Earth, analyze weather, measure solar wind and cosmic rays, and determine the extent of the magnetosphere.
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications0_title = Early Commercial Applications
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications0_description = Although the earliest satellites were launched through government programs, commercial uses had been envisioned for a long time. Through this program, you will launch the earliest iterations of commercial-use satellites. With wildly varying needs, each satellite is dedicated to a specific requirement, typically with far more focused requirements than the earlier, broader scientific satellites. <br><color=red>Author's Note: These contracts will require a satellite relay to be maintained for ONE YEAR.</color>
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications0_objectivesPrettyText = Launch the first commercial-use satellites and build a satellite communication network.
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications1_title = First Generation Commercial Applications
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications1_description = Geosynchronous, Geostationary, Molniya, and Tundra orbits have the potential to improve satellite coverage and simplify ground antenna tracking. This program tasks you with testing these orbits, launching satellites into them for commercial customers, and creating a satellite network for communication.<br><color=red>Author's Note: These contracts will require a satellite relay to be maintained FOREVER.</color>
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications1_objectivesPrettyText = Complete a First Generation Commercial Satellite Communications Network.
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications2_title = Second Generation Commercial Applications
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications2_description = Geosynchronous, Geostationary, Molniya, and Tundra orbits have the potential to improve satellite coverage and simplify ground antenna tracking. This program tasks you with testing these orbits, launching satellites into them for commercial customers, and creating a satellite network for communication.<br><color=red>Author's Note: These contracts will require a satellite relay to be maintained FOREVER.</color>
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications2_objectivesPrettyText = Complete a Second Generation Commercial Satellite Communications Network.
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications3_title = Third Generation Commercial Applications
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications3_description = Geosynchronous, Geostationary, Molniya, and Tundra orbits have the potential to improve satellite coverage and simplify ground antenna tracking. This program tasks you with testing these orbits, launching satellites into them for commercial customers, and creating a satellite network for communication.<br><color=red>Author's Note: These contracts will require a satellite relay to be maintained FOREVER.</color>
		#LOC_kerbalru_rp1_program_SkoposCommercialApplications3_objectivesPrettyText = Complete a Third Generation Commercial Satellite Communications Network.
		#LOC_kerbalru_rp1_program_EarlyLunarProbes_title = Early Lunar Probes
		#LOC_kerbalru_rp1_program_EarlyLunarProbes_description = The Moon is the first stepping stone to exploring the solar system. More than a light-second away, operating a probe at that distance is a worthy first step. This program requires new technology and heavier launch vehicles to take your space program's first steps toward studying the Moon up close. Complete it by putting a probe into orbit around the Moon. This program will require Lunar Range Communications at a minimum, and will generally require upgrading Mission Control and the Tracking Station in order to plan your journey. Basic Avionics and Probes unlocks deep-space avionics, which will be essential if you need guided avionics at the Moon.
		#LOC_kerbalru_rp1_program_EarlyLunarProbes_objectivesPrettyText = Complete the lunar flyby, lunar impact, and lunar orbit contracts.
		#LOC_kerbalru_rp1_program_UncrewedLunarSurface_title = Uncrewed Lunar Surface Exploration
		#LOC_kerbalru_rp1_program_UncrewedLunarSurface_description = Landing uncrewed probes on the Moon is the next step in exploring the Solar System. Successfully landing on the Moon is a difficult problem to solve. You will need to develop even more capable launch vehicles to be able to launch a large enough payload. These uncrewed landings will give you the data you need to plan for your crewed landings to follow. You will need to research deeply-throttleable engines from the Early Landing node (recommended) or figure out how to perform a landing with RCS.
		#LOC_kerbalru_rp1_program_UncrewedLunarSurface_objectivesPrettyText = Land probes on the Moon.
		#LOC_kerbalru_rp1_program_CrewedOrbitEarly_title = Crewed Orbit
		#LOC_kerbalru_rp1_program_CrewedOrbitEarly_description = Sending machines to space as a proxy for human beings was never the final goal. This program requires you to safely put astronauts into orbit and return them to the Earth, proving that humanity can survive in the most hostile environment nature has given us the opportunity to explore. You will need to upgrade your Astronaut Complex to level three so you can train your astronauts for the rigors of spaceflight. Make sure you start to train your crew about a year before you launch.
		#LOC_kerbalru_rp1_program_CrewedOrbitEarly_objectivesPrettyText = Complete the program by putting an astronaut into orbit and returning them.
		#LOC_kerbalru_rp1_program_CrewedOrbitAdv_title = Advanced Crewed Orbit
		#LOC_kerbalru_rp1_program_CrewedOrbitAdv_description = Human spaceflight should involve more than mere spam in a can. Both the hardware and skills required for maneuvering, EVA, rendezvous, and docking must be tested if humans are to do more than exist in space as passengers. You will need to research Early Docking Procedures and Second Generation Capsules to complete this program.
		#LOC_kerbalru_rp1_program_CrewedOrbitAdv_objectivesPrettyText = Complete the program by successfully docking 2 craft.
		#LOC_kerbalru_rp1_program_EarlyInnerPlanetProbes_title = Early Inner Planet Probes
		#LOC_kerbalru_rp1_program_EarlyInnerPlanetProbes_description = This program tasks you with exploring Venus and Mars. Though these may be Earth's closest neighbors, the distance between us and them still averages in the hundreds of millions of kilometers. Staying in contact with these probes will require advances in communication technology. Maintaining functionality and power over such great distances and long times will present new challenges in spacecraft design.
		#LOC_kerbalru_rp1_program_EarlyInnerPlanetProbes_objectivesPrettyText = Orbit Venus and Mars.
		#LOC_kerbalru_rp1_program_CrewedLunar_title = Crewed Lunar Exploration
		#LOC_kerbalru_rp1_program_CrewedLunar_description = You are tasked with sending to the Moon, 240,000 miles away from the control station in Houston, a giant rocket more than 300 feet tall, made of new metal alloys, some of which have not yet been invented, capable of standing heat and stresses several times more than have ever been experienced, fitted together with a precision better than the finest watch, carrying all the equipment needed for propulsion, guidance, control, communications, food, and survival, on an untried mission, to an unknown celestial body, and then return it safely to earth, reentering the atmosphere at speeds of over 25,000 miles per hour, causing heat about half that of the temperature of the sun. Alternatively, this could be an opportunity for some command chair antics. But a proper rocket is probably your best bet. You will need to upgrade your astronaut complex to level five to plant a flag on the Moon and complete the first crewed landing contract.
		#LOC_kerbalru_rp1_program_CrewedLunar_objectivesPrettyText = Send crew to flyby, orbit, and land on the Moon.
		#LOC_kerbalru_rp1_program_EarlyEarthSpaceStation_title = Early Earth Space Stations
		#LOC_kerbalru_rp1_program_EarlyEarthSpaceStation_description = An Earth space station will enable long-term human exploration of space and provide benefits to people of Earth. This Program tasks you with the exploration of prototypal and later, more mature solutions for low earth orbit long term space habitat. You will have to complete long term experiments, recrew and refill your station(s) or send new ones when needed.
		#LOC_kerbalru_rp1_program_EarlyEarthSpaceStation_objectivesPrettyText = Complete the Multi-Week and Multi-Month Space Habitation experiments.
		#LOC_kerbalru_rp1_program_MarsSurfaceExp_title = Mars Surface Exploration
		#LOC_kerbalru_rp1_program_MarsSurfaceExp_description = Send probes to Mars to survey its atmosphere, land on the surface, and even drive around with a rover. The thin atmosphere of Mars is enough to produce quite a bit of reentry heating, but it's not thick enough to safely land with only parachutes.
		#LOC_kerbalru_rp1_program_MarsSurfaceExp_objectivesPrettyText = Complete the program by sending a rover to Mars.
		#LOC_kerbalru_rp1_program_VenusSurfaceExp_title = Venus Surface Exploration
		#LOC_kerbalru_rp1_program_VenusSurfaceExp_description = Send probes to Venus to see what the surface and atmosphere are really like. The dense clouds hide the surface from view, while the corrosive atmosphere and high heat present challenges for anything trying to descend to the surface. Keeping a probe operational for any length of time presents significant challenges. Even with heat-resistant materials, nothing seems able to survive for more than a few hours.
		#LOC_kerbalru_rp1_program_VenusSurfaceExp_objectivesPrettyText = Land a probe on Venus.
		#LOC_kerbalru_rp1_program_SmallBodiesFlyby_title = Small Bodies Flyby
		#LOC_kerbalru_rp1_program_SmallBodiesFlyby_description = Visit some of the smaller bodies in the Solar System. No probe has yet seen the surface of these bodies up close. Mars and Venus both have atmospheres and are far larger than these bodies. What does a small, rocky planet (or dwarf planet) with no atmosphere look like up close? Can we figure out how they formed? Do they have magnetic fields? Send probes to find out.
		#LOC_kerbalru_rp1_program_SmallBodiesFlyby_objectivesPrettyText = Do flybys of Mercury, Ceres, or Vesta. You will need to do at least two of the three.
		#LOC_kerbalru_rp1_program_MercuryExploration_title = Mercury Exploration
		#LOC_kerbalru_rp1_program_MercuryExploration_description = Mercury is the least explored of the inner planets, due to the difficulty of orbiting it. Send some probes there to find out more about it. Current data suggests that Mercury is tidally locked with the Sun. How will this affect its surface? Or did we just flyby it at remarkably synchronized times? Either way, sending probes to orbit and land on Mercury will provide fascinating data on the closest planet to the Sun.
		#LOC_kerbalru_rp1_program_MercuryExploration_objectivesPrettyText = Orbit and land on Mercury.
		#LOC_kerbalru_rp1_program_AsteroidExploration_title = Asteroid Exploration (WIP)
		#LOC_kerbalru_rp1_program_AsteroidExploration_description = Orbit Ceres and Vesta to study them. These dwarf planets were discovered in the first decade of the 19th century and named after a goddess of agriculture and a goddess of the hearth respectively. Their study can provide hints at a less mythical creation as well. As the Sun's accretion disk settled, the planets were formed, and so were Ceres and Vesta. These protoplanets are the largest bodies in the asteroid belt, and figuring out how they were formed will provide insight into the early Solar System. NOTE: Has some contracts, but they are unpolished.
		#LOC_kerbalru_rp1_program_AsteroidExploration_objectivesPrettyText = Orbit Ceres and Vesta.
		#LOC_kerbalru_rp1_program_JupiterObservation_title = Jupiter Observation
		#LOC_kerbalru_rp1_program_JupiterObservation_description = Jupiter presents many opportunities for exploration, but also many challenges: it requires almost the same amount of energy for a spacecraft to reach Jupiter from Earth's orbit as it does to lift it into orbit in the first place. Gravity assists can be used to save delta-v at the cost of flight duration. Once there, a rich and diverse system awaits any explorer. Along with the largest planet in the Solar System, the Jovian system is also home to the largest moon, Ganymede, a planetary-mass moon. This program will send uncrewed scientific probes to Jupiter and its moons.<br><br>Historically, Jupiter is the most-visited outer planet, with 9 missions having completed flybys or entered orbits, most notably by the Voyager missions in 1979 on their flybys towards the outer Solar System, and by the Juno orbiter whose mission continues today. Most recently, NASA's Europa Clipper mission departed in 2024 enroute to the Galilean moons.
		#LOC_kerbalru_rp1_program_JupiterObservation_objectivesPrettyText = Orbit Jupiter and flyby at least two Galilean moons.
		#LOC_kerbalru_rp1_program_SaturnObservation_title = Saturn Observation
		#LOC_kerbalru_rp1_program_SaturnObservation_description = Known for its photogenic rings, Saturn has long been a subject of observation and exploration. Visible from Earth with little more than a set of binoculars, Saturn's rings have intrigued observers for centuries. Further, with the highest number of moons in the entire Solar System, and more discovered with each additional mission, the Saturn system is a destination with extensive exploration opportunities. Titan, the largest moon of Saturn, may have an atmosphere conducive to life, while Enceladus is thought to contain liquid water below its icy exterior. Explore the Saturn system with uncrewed probes, analyzing the atmospheres of Saturn and Titan, and take a closer look at the larger moons of the system.<br><br>Historical missions to Saturn include flybys from Pioneer 11 and both Voyagers, while the Cassini orbiter mission operated from 2004 to 2017.
		#LOC_kerbalru_rp1_program_SaturnObservation_objectivesPrettyText = Send an orbiter to Saturn, an atmospheric probe to Titan or Saturn, and flyby two more moons in addition to Titan.
		#LOC_kerbalru_rp1_program_OuterPlanetFlyby_title = Outer Planet Flyby
		#LOC_kerbalru_rp1_program_OuterPlanetFlyby_description = What lies beyond Mars? These distant giants orbit far from the Sun. While Jupiter and Saturn can be seen with a hobbyist telescope, they cannot be closely studied from Earth. The immense mass of the gas giants means that, while they might not receive much sunlight, tidal forces can keep their many moons warm. There may even be liquid water somewhere out there. Send probes to survey these distant bodies. Gravity assists are highly recommended.
		#LOC_kerbalru_rp1_program_OuterPlanetFlyby_objectivesPrettyText = Flyby at least four of the outer planets.
		#LOC_kerbalru_rp1_program_OuterGasGiantSurvey_title = Outer Gas Giant Survey
		#LOC_kerbalru_rp1_program_OuterGasGiantSurvey_description = Pictures can help expand our knowledge of the outer Solar System, but scientific instruments and dwell times much longer than a hasty flyby are necessary to increase our understanding of these distant neighbors. Send orbiters to the two furthest gas giants and probe their atmospheres. While in the furthest reaches of our system, explore the moons of these giants as well. An upgraded Tracking Station and higher level comm tech will be necessary in order to receive scientific data over such great distances.
		#LOC_kerbalru_rp1_program_OuterGasGiantSurvey_objectivesPrettyText = Do this and that
		#LOC_kerbalru_rp1_program_PlutoLandings_title = Plutonian Landings
		#LOC_kerbalru_rp1_program_PlutoLandings_description = The only known double planetary system in the Solar System, Pluto and Charon have been tidally locked in orbit of each other in the darkest, coldest reaches of our system for eons. It is now time for you to land on them, quite possibly within a century of their discovery. Very little is known about these distant, icy worlds. Historically, even our most advanced probes have returned relatively little data compared to what we know about our closer neighbors. Explore the furthest reaches of the Solar System and land on this intriguing pair of dwarf planets.
		#LOC_kerbalru_rp1_program_PlutoLandings_objectivesPrettyText = Land on Pluto and Charon.
		#LOC_kerbalru_rp1_program_EarlyLunarHabitation_title = Early Lunar Habitation
		#LOC_kerbalru_rp1_program_EarlyLunarHabitation_description = We have landed men on the Moon, now we must prove that we can live and work on the lunar surface for extended periods of time. This research will be imperative to future long-term space habitation, including if we are ever to send men to Mars.
		#LOC_kerbalru_rp1_program_EarlyLunarHabitation_objectivesPrettyText = Send crew to stay on the Moon for long-term operations.
		#LOC_kerbalru_rp1_program_CrewedMarsExp_title = Crewed Mars Exploration
		#LOC_kerbalru_rp1_program_CrewedMarsExp_description = After long-term testing of the mental and physiological impact of micro-gravity on the human body in low earth orbit, we can pursue the challenge of exploring our neighboring planet: Mars. This program will task you with the challenge of sending the first humans on Mars. The program allows for the choice to either land crew for a Martian surface stay, or to send a crewed expedition to Phobos and obtain a Mars surface sample via a robotic survey.
		#LOC_kerbalru_rp1_program_CrewedMarsExp_objectivesPrettyText = Send crew to orbit Mars and land crew on either Phobos or Mars.
		#LOC_kerbalru_rp1_program_TargetedSats_title = Targeted Satellites (Deprecated)
		#LOC_kerbalru_rp1_program_TargetedSats_description = Once you have proven that you can send satellites into orbit, the next step is to send them into more useful orbits. The goal of this program is to put satellites with different payload requirements into specific and more challenging orbits. A geostationary orbit will require approximately 13,650 m/s of delta-v if launching from Cape Canaveral.
		#LOC_kerbalru_rp1_program_TargetedSats_objectivesPrettyText = Launch satellites to analyze weather and assist in navigation and reach a variety of specific orbits, including geostationary.
		#LOC_kerbalru_rp1_program_CommercialApplications1_title = Early Commercial Applications (Deprecated)
		#LOC_kerbalru_rp1_program_CommercialApplications1_description = Although the earliest satellites were launched through government programs, commercial uses had been envisioned for a long time. Through this program, you will launch the earliest iterations of commercial-use satellites. With wildly varying needs, each satellite is dedicated to a specific requirement, typically with far more focused requirements than the earlier, broader scientific satellites.
		#LOC_kerbalru_rp1_program_CommercialApplications1_objectivesPrettyText = Launch the first commercial-use satellites and build a satellite communication network.
		#LOC_kerbalru_rp1_program_CommNetwork_title = Communication Network (Deprecated)
		#LOC_kerbalru_rp1_program_CommNetwork_description = Communicating with our satellites, and eventually our crewed craft, can be difficult at times. Unless we have line of sight to a tracking station, communication isn't possible. This program tasks you with creating a communications network of 3 or 4 satellites that will provide much better communications coverage. Each satellite will require 125 units of ComSatPayload, and the orbits are fairly high.
		#LOC_kerbalru_rp1_program_CommNetwork_objectivesPrettyText = Create a network of either 3 or 4 communications satellites.
		#LOC_kerbalru_rp1_program_GEOCommNetwork_title = Geostationary Communication Network (Deprecated)
		#LOC_kerbalru_rp1_program_GEOCommNetwork_description = With geostationary orbits, satellites can be placed at specific spots over the equator where they will stay. This allows communications satellites to be put exactly where they will have the greatest benefit. This program tasks you with creating a 4-satellite Geostationary Network for communication. Each satellite will require 315 units of ComSatPayload.
		#LOC_kerbalru_rp1_program_GEOCommNetwork_objectivesPrettyText = Complete the Geostationary Communications Network.
		#LOC_kerbalru_rp1_program_CommercialApplications2_title = Advanced Commercial Applications (Deprecated)
		#LOC_kerbalru_rp1_program_CommercialApplications2_description = Geosynchronous, Geostationary, Molniya, and Tundra orbits have the potential to improve satellite coverage and simplify ground antenna tracking. This program tasks you with testing these orbits, launching satellites into them for commercial customers, and creating a 3 or 4 satellite Geostationary or Molniya Network for communication.
		#LOC_kerbalru_rp1_program_CommercialApplications2_objectivesPrettyText = Complete a Geostationary or Molniya Communications Network.
		#LOC_kerbalru_rp1_program_CrewedOrbit_title = Crewed Orbit (Deprecated)
		#LOC_kerbalru_rp1_program_CrewedOrbit_description = Sending machines to space as a proxy for human beings was never the final goal. This program requires you to safely put astronauts into orbit and return them, test a variety of crewed maneuvers, and prove that humanity can survive in the most hostile environment nature has given us the opportunity of exploring. You will need to research Early Docking Procedures and Second Generation Capsules to complete this program.
		#LOC_kerbalru_rp1_program_CrewedOrbit_objectivesPrettyText = Complete the program by successfully docking 2 craft.
		#LOC_kerbalru_rp1_tech_start_title = Start
		#LOC_kerbalru_rp1_tech_start_description = Start Node
		#LOC_kerbalru_rp1_tech_unlockParts_title = Starting Parts
		#LOC_kerbalru_rp1_tech_unlockParts_description = These are the parts that you start with.
		#LOC_kerbalru_rp1_tech_orphanParts_title = Non RP-1 Parts
		#LOC_kerbalru_rp1_tech_orphanParts_description = DO NOT UNLOCK THIS NODE UNLESS YOU KNOW WHAT YOU ARE DOING! These are the parts that are not placed in RP-1.
		#LOC_kerbalru_rp1_tech_ORPHANS_title = ORPHANS
		#LOC_kerbalru_rp1_tech_ORPHANS_description = ORPHANS
		#LOC_kerbalru_rp1_tech_supersonicDev_title = Supersonic Plane Development
		#LOC_kerbalru_rp1_tech_supersonicDev_description = Supersonic Plane Development (Post-War)
		#LOC_kerbalru_rp1_tech_supersonicFlightRP0_title = Supersonic Flight
		#LOC_kerbalru_rp1_tech_supersonicFlightRP0_description = Supersonic Flight (1950-1951)
		#LOC_kerbalru_rp1_tech_matureSupersonic_title = Mature Supersonic Flight
		#LOC_kerbalru_rp1_tech_matureSupersonic_description = Mature Supersonic Flight (1952-1957)
		#LOC_kerbalru_rp1_tech_highSpeedFlight_title = High Speed Flight
		#LOC_kerbalru_rp1_tech_highSpeedFlight_description = High Speed Flight (1958-1963)
		#LOC_kerbalru_rp1_tech_advancedJetEngines_title = Advanced Jet Engines
		#LOC_kerbalru_rp1_tech_advancedJetEngines_description = Advanced Jet Engines (1964-1969)
		#LOC_kerbalru_rp1_tech_efficientSupersonic_title = Efficient Supersonic Engines
		#LOC_kerbalru_rp1_tech_efficientSupersonic_description = Efficient Supersonic Engines (1970-1980)
		#LOC_kerbalru_rp1_tech_matureTurbofans_title = Mature Turbofans
		#LOC_kerbalru_rp1_tech_matureTurbofans_description = Mature Turbofans (1981-1985)
		#LOC_kerbalru_rp1_tech_refinedTurbofans_title = Refined Turbofans
		#LOC_kerbalru_rp1_tech_refinedTurbofans_description = Refined Turbofans (1986-1997)
