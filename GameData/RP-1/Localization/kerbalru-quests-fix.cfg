	{
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork3_title = Geostationary Communications Network (3 Satellites)
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork3_synopsis = Launch a 3 Satellite Geostationary Communications Network
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork3_description = <b>Program: Advanced Commercial Applications<br>Type: <color=green>Required</color></b><br><br>A geostationary satellite can provide continuous coverage for a large section of Earth, but to transmit everywhere requires more than one. Launch 3 satellites into geostationary orbits spaced 120 degrees apart. <br>Historical example: Syncom 4 (1-5) (1.3t, Shuttle Discovery) launched starting in August of 1984.<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork3_completedMessage = Congratulations! The satellites are in orbit and spaced to provide complete coverage.
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork4_title = Geostationary Communications Network (4 Satellites)
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork4_synopsis = Launch a 4 Satellite Geostationary Communications Network
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork4_description = <b>Program: Advanced Commercial Applications<br>Type: <color=green>Required</color></b><br><br>A geostationary satellite can provide continuous coverage for a large section of Earth, but to transmit to every longitude requires more than one. Launch 4 satellites into geostationary orbits spaced 90 degrees apart. <br>Historical example: Syncom 4 (1-5) (1.3t, Shuttle Discovery) launched starting in August of 1984.<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_GeoComSatNetwork4_completedMessage = Congratulations! The satellites are in orbit and spaced to provide complete coverage.
		#LOC_kerbalru_rp1_contract_FirstGeosync_title = Geosynchronous Test Satellite
		#LOC_kerbalru_rp1_contract_FirstGeosync_synopsis = Launch a geosynchronous test satellite
		#LOC_kerbalru_rp1_contract_FirstGeosync_description = <b>Program: Advanced Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>With an orbital period of an earth day, a satellite will remain above a constant longitude, appearing to drift north and south through the day. This will allow for constant connection to a ground station.<br>Historical example: Syncom 2 (39kg, Thor-Delta) launched in July of 1963.<b>
		#LOC_kerbalru_rp1_contract_FirstGeosync_completedMessage = Congratulations! The satellite is in orbit and connected to the groundstation.
		#LOC_kerbalru_rp1_contract_FirstGEOSat_title = Geostationary Test Satellite
		#LOC_kerbalru_rp1_contract_FirstGEOSat_synopsis = Launch a test satellite into a Geostationary Orbit
		#LOC_kerbalru_rp1_contract_FirstGEOSat_description = <b>Program: Advanced Commercial Applications<br>Type: <color=green>Required</color></b><br><br>Having a communication satellite that remains stationary relative to a ground station means that the antenna wouldn't need to track movements to stay connected. This would greatly simplify communication relay and mass transmission systems.<br>Historical example: Syncom 3 (39 kg, Thor-Delta) launched in August of 1964.<b>
		#LOC_kerbalru_rp1_contract_FirstGEOSat_completedMessage = Congratulations! The satellite is in orbit over a constant area.
		#LOC_kerbalru_rp1_contract_FirstTargetedGeo_title = Targeted Geostationary Satellite
		#LOC_kerbalru_rp1_contract_FirstTargetedGeo_synopsis = Launch a commercial geostationary satellite over the targeted point
		#LOC_kerbalru_rp1_contract_FirstTargetedGeo_description = <b>Program: Advanced Commercial Applications<br>Type: <color=green>Required</color></b><br><br>Now that we have shown the benefits of Geostationary orbits, launch a satellite to cover a specific ground area. <br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.<b>
		#LOC_kerbalru_rp1_contract_FirstTargetedGeo_completedMessage = Congratulations! The satellite has been placed in the customer's desired location.
		#LOC_kerbalru_rp1_contract_TundraRepeatComSats_title = Tundra Commercial Communications Satellite
		#LOC_kerbalru_rp1_contract_TundraRepeatComSats_synopsis = Launch a new Commercial Communications Satellite
		#LOC_kerbalru_rp1_contract_TundraRepeatComSats_description = <b>Program: Advanced Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>We have a customer requesting a new Communications Satellite over a specified area. Design a satellite within their specs and launch into a tundra orbit so that it loiters over the desired area for at least 8 consecutive hours.&br;&br;This contract can be completed as many times as you would like.&br;&br;<b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color></b>&br;&br;<b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_GEORepeatComSats<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_TundraRepeatComSats_completedMessage = Congratulations! The customer has reported the satellite is in the proper orbit.
		#LOC_kerbalru_rp1_contract_FirstTargetedMolniya_title = Targeted Molniya Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstTargetedMolniya_synopsis = Launch a commercial satellite into a Molniya orbit
		#LOC_kerbalru_rp1_contract_FirstTargetedMolniya_description = <b>Program: Advanced Commercial Applications<br><b>Type: <color=blue>Optional</color></b><br><br>A Molniya orbit is a type of highly elliptical orbit with an inclination of 63.4 degrees, an argument of perigee in the very high or low latitudes, and an orbital period of one half of a sidereal day. This causes it to spend most of its time over two areas on the ground at opposing longitudes. Place a commercial satellite into a Molniya orbit so that it loiters over the specified ground location for at least 6 consecutive hours.<br><br>Historical example: Molniya 1-1 (1,600kg, Molniya)<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_FirstTargetedMolniya_completedMessage = Success! The satellite is in orbit to loiter over the desired area.
		#LOC_kerbalru_rp1_contract_MolniyaNetwork3_title = Molniya Communications Network (3 Satellites)
		#LOC_kerbalru_rp1_contract_MolniyaNetwork3_synopsis = Launch a 3 Satellite Molniya Communications Network
		#LOC_kerbalru_rp1_contract_MolniyaNetwork3_description = <b>Program: Advanced Commercial Applications<br>Type: <color=green>Required</color></b><br><br>Geostationary satellites do not provide good coverage in the higher latitudes.  Molniya orbits loiter over those latitudes for longer periods, to provide constant coverage with fewer satellites. <br>Historical example: Molniya 1-1 (1.6t, Molniya 8K78) launched starting in April of  1965.<br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color><br><br><b><color=yellow>NOTE: Your orbit should have high eccentricity, an inclination of around 63 degrees, with your periapsis on the same or opposite longitude as the target (@/targetLon) in the opposite North/South hemisphere.</color><br><br><b><color=yellow>NOTE: If you are completing this with a single launch, you must separate the 3 vessels while in an orbit with a period of less than 6 hours or the payload requirement will not complete.  This is to ensure spacing of the network.</color>
		#LOC_kerbalru_rp1_contract_MolniyaNetwork3_completedMessage = Congratulations! The satellites are in orbit and spaced to provide complete coverage.
		#LOC_kerbalru_rp1_contract_FirstTargetedTundra_title = Targeted Tundra Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstTargetedTundra_synopsis = Launch a commercial satellite into the desired Tundra orbit
		#LOC_kerbalru_rp1_contract_FirstTargetedTundra_description = <b>Program: Advanced Commercial Applications<br><b>Type: <color=green>Required</color></b><br><br>A Tundra orbit is a highly elliptical geosynchronous orbit (note: not geostationary orbit) with a high inclination (usually near 63.4) and an orbital period of one sidereal day. A satellite placed in this orbit spends most of its time over a chosen area of the Earth, a phenomenon known as apogee dwell. Place the customer's satellite in a tundra orbit over the desired area. <br><br><b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color>
		#LOC_kerbalru_rp1_contract_FirstTargetedTundra_completedMessage = Success! The satellite is in orbit to loiter over the desired area.
		#LOC_kerbalru_rp1_contract_FirstTundraSat_title = First Tundra Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstTundraSat_synopsis = Launch a satellite into a Tundra Orbit
		#LOC_kerbalru_rp1_contract_FirstTundraSat_description = <b>Program: Targeted Satellites<br>Type: <color=red>CAPSTONE</color></b><br><br>A Tundra orbit is a highly elliptical geosynchronous orbit (note: not geostationary orbit) with a high inclination (usually near 63.4) and an orbital period of one sidereal day. A satellite placed in this orbit spends most of its time over a chosen area of the Earth, a phenomenon known as apogee dwell. The ground track of a satellite in a tundra orbit is a closed figure eight. The orbit in this contract is actually using data from the Sirius satellites, the only known satellites using a Tundra orbit.&br;&br;Place a satellite into a Tundra orbit.&br;&br;There will be an orbit showing in the map view and tracking station. You do not have to place the satellite into this orbit, but it is instead meant to show you where your perigee and apogee should approximately be located, but more importantly, it shows the proper shape of the orbit.
		#LOC_kerbalru_rp1_contract_FirstTundraSat_completedMessage = Success! The Tundra orbit is highly eccentric and let's the satellite spend most of its time over the high latitudes.
		#LOC_kerbalru_rp1_contract_GEORepeatComSats_title = Geostationary Commercial Communications Satellite
		#LOC_kerbalru_rp1_contract_GEORepeatComSats_synopsis = Launch a new Commercial Communications Satellite
		#LOC_kerbalru_rp1_contract_GEORepeatComSats_description = <b>Program: Advanced Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>We have a customer requesting a new Communications Satellite over a specified area. Design a satellite within their specs and launch into an orbit with the proper orbital parameters as outlined in the contract.&br;&br;This contract can be completed as many times as you would like.&br;&br;<b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color></b>&br;&br;<b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_GEORepeatComSats<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_GEORepeatComSats_completedMessage = Congratulations! The customer has reported the satellite is in the proper orbit.
		#LOC_kerbalru_rp1_contract_MolniyaRepeatComSats_title = Molniya Commercial Communications Satellite
		#LOC_kerbalru_rp1_contract_MolniyaRepeatComSats_synopsis = Launch a new Commercial Communications Satellite
		#LOC_kerbalru_rp1_contract_MolniyaRepeatComSats_description = <b>Program: Advanced Commercial Applications<br>Type: <color=blue>Optional</color></b><br><br>We have a customer requesting a new Communications Satellite over a specified area. Design a satellite within their specs and launch into an orbit so that it loiters over the specified ground target for at least 6 consecutive hours.&br;&br;This contract can be completed as many times as you would like.&br;&br;<b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color></b>&br;&br;<b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_GEORepeatComSats<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_MolniyaRepeatComSats_completedMessage = Congratulations! The customer has reported the satellite is in the proper orbit.
