		#LOC_kerbalru_rp1_contract_flybyOberon_description = <b>Program: Outer Gas Giant Survey<br>Type: <color=green>Required</color></b><br><br>Create a probe and send it to flyby Oberon within 9000 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyOberon_completedMessage = Congratulations on the flyby! The data is coming in now.
		#LOC_kerbalru_rp1_contract_flybyTriton_title = Triton Flyby
		#LOC_kerbalru_rp1_contract_flybyTriton_synopsis = Flyby Triton closer than 11,000 km and transmit science
		#LOC_kerbalru_rp1_contract_flybyTriton_description = <b>Program: Outer Gas Giant Survey<br>Type: <color=green>Required</color></b><br><br>Create a probe and send it to flyby Triton within 11,000 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyTriton_completedMessage = Congratulations on the flyby! The data is coming in now.
		#LOC_kerbalru_rp1_contract_MoonOrbiter_title = First Lunar Orbiter & Mapper (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonOrbiter_synopsis = Achieve lunar orbit and transmit imaging data
		#LOC_kerbalru_rp1_contract_MoonOrbiter_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch a probe into lunar orbit (with a maximum apiselene of @/maxApText.Print() km) and successfully transmit or return Visible Imaging 2 Science.<br><br><color=white><b>After this contract has been completed, the 'Lunar Orbiter & Mapper (Uncrewed)' contracts will become available.</b></color>
		#LOC_kerbalru_rp1_contract_MoonOrbiter_completedMessage = Orbit confirmed, and we got some excellent new data!
		#LOC_kerbalru_rp1_contract_MoonLandingFarSide_title = First Far Side Lunar Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonLandingFarSide_synopsis = Achieve a soft landing on the far side of the Moon and transmit science
		#LOC_kerbalru_rp1_contract_MoonLandingFarSide_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=red>CAPSTONE</color></b><br><br>Design and successfully launch a craft that can achieve a soft landing on the far side of the Moon and return science data back to Earth.<br><br>Lunar libration already allows us to see 59% of the Moon's surface, so we want you to land within 80° of the far side.<br><br><color=white><b>After this contract has been completed, the 'Far Side Lunar Landing (Uncrewed)' contract will become available.</b></color>
		#LOC_kerbalru_rp1_contract_MoonLandingFarSide_completedMessage = Mission Success! You have safely landed on the far side of the Moon and returned valuable science data from the surface. We now know that it is possible for a crewed craft to land there safely as well.
		#LOC_kerbalru_rp1_contract_MoonLandingOptional_title = Lunar Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonLandingOptional_synopsis = Achieve a soft landing on the Moon and transmit science
		#LOC_kerbalru_rp1_contract_MoonLandingOptional_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch a craft that can achieve a soft landing on the Moon and return science data back to Earth.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.</color>
		#LOC_kerbalru_rp1_contract_MoonLandingOptional_completedMessage = Mission Success! You have safely landed on the Moon and returned valuable science data from the surface. We now know that it is possible for a crewed craft to land there safely as well.
		#LOC_kerbalru_rp1_contract_MoonLandingFarSideOptional_title = Far Side Lunar Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonLandingFarSideOptional_synopsis = Achieve a soft landing on the far side of the Moon and transmit science
		#LOC_kerbalru_rp1_contract_MoonLandingFarSideOptional_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch a craft that can achieve a soft landing on the far side of the Moon and return science data back to Earth.<br><br>Lunar libration already allows us to see 59% of the Moon's surface, so we want you to land within 80° of the far side.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_MoonLandingFarSideOptional_completedMessage = Mission Success! You have safely landed on the far side of the Moon and returned valuable science data from the surface. We now know that it is possible for a crewed craft to land there safely as well.
		#LOC_kerbalru_rp1_contract_MoonLandingReturn_title = Lunar Landing & Sample Return (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonLandingReturn_synopsis = Launch a craft to achieve a soft landing on the Moon and return to Earth with the science
		#LOC_kerbalru_rp1_contract_MoonLandingReturn_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>You have successfully landed on the Moon, but our scientists need to know more information about the elements that make up the surface. Send a craft to land on the Moon and then return to Earth with scientific data from the Moon's surface.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_MoonLandingReturn_completedMessage = Mission Success! You have safely landed on the Moon and returned valuable science data from the surface. The samples that you returned will be studied for a long time into the future.
		#LOC_kerbalru_rp1_contract_MoonLanding_title = First Lunar Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonLanding_synopsis = Achieve a soft landing on the Moon and transmit science
		#LOC_kerbalru_rp1_contract_MoonLanding_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch a craft that can achieve a soft landing on the Moon and return science data back to Earth.<br><br><color=white><b>After this contract has been completed, the 'Lunar Landing (Uncrewed)' contract will become available.</b></color>
		#LOC_kerbalru_rp1_contract_MoonLanding_completedMessage = Mission Success! You have safely landed on the Moon and returned valuable science data from the surface. We now know that it is possible for a crewed craft to land there safely as well.
		#LOC_kerbalru_rp1_contract_MoonOrbiterOptional_title = Lunar Orbiter & Mapper (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonOrbiterOptional_synopsis = Achieve lunar orbit and transmit imaging data
		#LOC_kerbalru_rp1_contract_MoonOrbiterOptional_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch a probe into lunar orbit (with a maximum apiselene of @/maxApText.Print() km) and successfully transmit or return Visible Imaging 2 Science.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_MoonOrbiterOptional_completedMessage = Orbit confirmed, and we got some excellent new data!
		#LOC_kerbalru_rp1_contract_MoonRover_title = Lunar Rover (Uncrewed)
		#LOC_kerbalru_rp1_contract_MoonRover_synopsis = Launch a rover and inspect 3 locations on the Moon
		#LOC_kerbalru_rp1_contract_MoonRover_description = <b>Program: Uncrewed Lunar Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>A good way to explore more of the Moon is to send a rover to visit different places. Our scientists have picked three locations to inspect with a rover.<br><br>Design and successfully send a rover to the Moon and visit the marked waypoints.<br>It is recommended to use the Waypoint Manager mod for better navigation.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_MoonRover_completedMessage = Congratulations! Your rover took science readings from the areas that our scientists wanted to explore.
		#LOC_kerbalru_rp1_contract_Downrange6000_title = Downrange Milestone (6000 km)
		#LOC_kerbalru_rp1_contract_Downrange6000_synopsis = Travel 6000 km or more downrange with an uncrewed craft carrying @/missionPayload.Print() units of Sounding Payload.
		#LOC_kerbalru_rp1_contract_Downrange6000_description = <b>Program: Early Satellites (Light)<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a rocket that will travel 6000 km or more over ground while carrying @/missionPayload.Print() units of Sounding Payload. This challenge will require rather more delta-v than the 5000 km attempt. <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of launch vehicle development to tune your ascent profile and develop high-altitude staging methods. The current distance that your rocket has traveled can be seen in the contract parameters in the Contracts App display for this contract. It will update in real time. &br;&br;<b><color="green">@RP0:f3BadAdvice</color></b>
		#LOC_kerbalru_rp1_contract_Downrange6000_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_FirstSatellite_title = First Artificial Satellite
		#LOC_kerbalru_rp1_contract_FirstSatellite_synopsis = Launch the first satellite into orbit of Earth
		#LOC_kerbalru_rp1_contract_FirstSatellite_description = <b>Program: Early Satellites (Light)<br>Type: <color=green>Required</color></b><br><br>We need you to give Earth its first artificial satellite! Design, build, and launch a craft that will successfully place an object in orbit with a perigee of at least 150 km.&br;&br;You can accept other orbit contracts at the same time as this if want to do multiple things on your first orbital launch (for example, you could combine all four starting orbit contracts and launch a solar-powered polar science satellite).
		#LOC_kerbalru_rp1_contract_FirstSatellite_completedMessage = Congratulations on placing Earth's first artificial satellite in orbit!
		#LOC_kerbalru_rp1_contract_AtmoSat_title = Atmospheric Analysis Satellite
		#LOC_kerbalru_rp1_contract_AtmoSat_synopsis = Launch a Satellite to study the upper atmosphere
		#LOC_kerbalru_rp1_contract_AtmoSat_description = <b>Program: Early Satellites (Light)<br>Type: <color=green>Required</color></b><br><br>It would be great for all humans if we could find a way to better predict the weather. One of the first steps in this is to understand the properties of the upper atmosphere. Launch a satellite with a Barometer and Thermometer on it to study the upper atmosphere. Transmit the science back to the KSC for analysis. If you have already completed the temperature and pressure scan, click info -> forced run in order to complete this contract. &br;&br;This could be considered the first "Weather Satellite" and will open up new weather satellite opportunities.
		#LOC_kerbalru_rp1_contract_AtmoSat_completedMessage = Congratulations! The information returned from the satellite has allowed our scientists to make some more accurate predictions of the weather. Our next step is to get a camera into orbit.
		#LOC_kerbalru_rp1_contract_FirstScienceSat_title = First Scientific Satellite
		#LOC_kerbalru_rp1_contract_FirstScienceSat_synopsis = Launch a Scientific Satellite into an eccentric orbit of Earth with Cosmic Ray Science Experiments
		#LOC_kerbalru_rp1_contract_FirstScienceSat_description = <b>Program: Early Satellites (Light)<br>Type: <color=green>Required</color></b><br><br>Just putting an object in orbit is a stunt. Getting valuable scientific data from it is far more impressive.&br;&br;With the data returned from our sounding rockets, interesting radiation has been observed. We need you to send a scientific satellite into an eccentric orbit in order to study this data with more accuracy. Based on the best guesses of our scientists, having an apoapsis over 1500 km with a low periapsis will help us to learn more about the radiation surrounding Earth.&br;&br;<b><color="green">Make sure your craft contains a Cosmic Ray Science experiment (Geiger-Muller Counter or Scintillation Counter) as we will need at least one day's worth of science returned from it.</color></b>&br;&br;Real life examples: Object D (Sputnik 3), Explorer 1.&br;&br;<b>Accepting this contract will automatically accept the First Artificial Satellite contract as well.</b>
		#LOC_kerbalru_rp1_contract_FirstScienceSat_completedMessage = Congratulations! The satellite you sent into orbit has returned extremely valuable data that has proven the existence of the Van Allen Radiation Belts.
		#LOC_kerbalru_rp1_contract_FirstPolarSat_title = First Polar Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstPolarSat_synopsis = Launch a satellite into a Polar Orbit
		#LOC_kerbalru_rp1_contract_FirstPolarSat_description = <b>Program: Early Satellites (Light)<br>Type: <color=green>Required</color></b><br><br>A polar orbit is one in which a satellite passes above or nearly above both poles of the body being orbited on each revolution. It therefore has an inclination of (or very close to) 90 degrees to the equator. A satellite in a polar orbit will pass over the equator at a different longitude on each of its orbits. Place a satellite into a polar orbit so we can study the advantages in greater detail.
		#LOC_kerbalru_rp1_contract_FirstPolarSat_completedMessage = Mission Success! The satellite is orbiting at a high inclination and it is giving our scientists ideas of how we can use this type of orbit.
		#LOC_kerbalru_rp1_contract_FirstSunSyncSat_title = First Sun-Synchronous Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstSunSyncSat_synopsis = Launch a satellite into a sun-synchronous orbit
		#LOC_kerbalru_rp1_contract_FirstSunSyncSat_description = <b>Program: Early Satellites (Light)<br>Type: <color=blue>Optional</color></b><br><br>A sun-synchronous orbit is a geocentric orbit that combines altitude and inclination in such a way that the satellite passes over any given point of the planet's surface at the same local solar time. Such an orbit can place a satellite in constant sunlight and is useful for imaging, spy, and weather satellites.&br;&br;Place a satellite into a sun-synchronous orbit. Note that sun-synchronous orbits are often slightly retrograde, as is this orbit. You'll need to fly northwest from the launch pad and it will take more delta-v than a normal polar orbit.&br;&br;You can use an online orbit calculator to determine what kind of orbit will meet the eccentricity requirement, such as the one available from https://orbital-math.com/.
		#LOC_kerbalru_rp1_contract_FirstSunSyncSat_completedMessage = Success! True sun-synchronous orbits are not possible in KSP due to the equatorial bulge not being present. However, this is similar to what these orbits are.
		#LOC_kerbalru_rp1_contract_FirstSolarSat_title = First Solar-Powered Satellite
		#LOC_kerbalru_rp1_contract_FirstSolarSat_synopsis = Launch a solar-powered satellite
		#LOC_kerbalru_rp1_contract_FirstSolarSat_description = <b>Program: Early Satellites (Light)<br>Type: <color=green>Required</color></b><br><br>While batteries alone are good enough for simple satellites, they are insufficient for the greater energy demands of more complex systems. The first step towards that is to generate power to augment the supplied batteries. Launch a satellite into the specified orbit and demonstrate that it can generate more solar power than it consumes after a 2-week period in orbit.
		#LOC_kerbalru_rp1_contract_FirstSolarSat_completedMessage = Success! This is an important step in increasing the usefulness of our satellites in orbit.
		#LOC_kerbalru_rp1_contract_Downrange7500_title = Downrange Milestone (7500 km)
		#LOC_kerbalru_rp1_contract_Downrange7500_synopsis = Travel 7500 km or more downrange with an uncrewed craft carrying @/missionPayload.Print() units of Sounding Payload.
		#LOC_kerbalru_rp1_contract_Downrange7500_description = <b>Program: Early Satellites (Light)<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a rocket that will travel 7500 km or more over ground while carrying @/missionPayload.Print() units of Sounding Payload. This challenge will require rather more delta-v than the 6000 km attempt and will get you very close to an orbital capable rocket. <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of launch vehicle development to tune your ascent profile and develop high-altitude staging methods. The current distance that your rocket has traveled can be seen in the contract parameters in the Contracts App display for this contract. It will update in real time. &br;&br;<b><color="green">@RP0:f3BadAdvice</color></b>
		#LOC_kerbalru_rp1_contract_Downrange7500_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_RepeatMoonLandingCrew_title = Crewed Targeted Moon Landing
		#LOC_kerbalru_rp1_contract_RepeatMoonLandingCrew_synopsis = Land a crew on a specific biome on the Moon and return safely to Earth
		#LOC_kerbalru_rp1_contract_RepeatMoonLandingCrew_description = <b>Program: Crewed Lunar Exploration<br>Type: <color=red>CAPSTONE</color></b><br><br>Design and launch a spacecraft with at least two crew members and the capability to land at least one crew member at a specific location on the Moon. Explore the area for at least @/LandDur and then return safely to Earth.&br;&br;<b>Number of Contracts Completed: @index / @maxCompletions</b>
		#LOC_kerbalru_rp1_contract_RepeatMoonLandingCrew_completedMessage = Congratulations, the crew has returned safely from their mission on the Moon!
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewedDirect_title = First Human Moon Landing (Direct)
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewedDirect_synopsis = Land a crew on the Moon and Return them safely to Earth
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewedDirect_description = <b>Program: Crewed Lunar Exploration<br>Type: <color=green>Required</color></b><br><br>We are ready to finally put Humans on the surface of the Moon! Good luck to you in your design and execution of this complex mission!&br;&br;You must put at least two Humans on the Moon and return them safely to the Earth. You may not perform any dockings or this contract will fail. &br;&br;<color=green>NOTE: The contract asks you to plant a flag on the Moon. Be sure that you have updated your Astronaut Complex to level five to unlock that ability.</color>
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewedDirect_completedMessage = Congratulations! You have done it! Human beings have set foot on another planetary body for the first time in our history. This is a monumental occasion and you should be proud of your achievement!
		#LOC_kerbalru_rp1_contract_FirstCrewedLunarOrbit_title = First Crewed Lunar Orbit
		#LOC_kerbalru_rp1_contract_FirstCrewedLunarOrbit_synopsis = Fly the first Crewed Lunar Orbit mission
		#LOC_kerbalru_rp1_contract_FirstCrewedLunarOrbit_description = <b>Program: Crewed Lunar Exploration<br>Type: <color=green>Required</color></b><br><br>Design and launch a spacecraft with at least two crew members to orbit close to the Moon for at least 20 hours and return safely to Earth. You must also broadcast live TV during the mission, the experiment for which is unlocked in the Improved Communications technology node. Historically, Apollo 8 was the first to do this, flying to the Moon over Christmas, 1968.
		#LOC_kerbalru_rp1_contract_FirstCrewedLunarOrbit_completedMessage = Crew alive and well after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewed_title = First Human Moon Landing
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewed_synopsis = Land a crew on the Moon and Return them safely to Earth
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewed_description = <b>Program: Crewed Lunar Exploration<br>Type: <color=green>Required</color></b><br><br>We are ready to finally put Humans on the surface of the Moon! Good luck to you in your design and execution of this complex mission!&br;&br;You must bring two Humans to the Moon and put at least one Human on the Moon and return them safely to the Earth.&br;&br;<color=green>NOTE: The contract asks you to plant a flag on the Moon. Be sure that you have updated your Astronaut Complex to level five to unlock that ability.</color>
		#LOC_kerbalru_rp1_contract_first_MoonLandingCrewed_completedMessage = Congratulations! You have done it! Human beings have set foot on another planetary body for the first time in our history. This is a monumental occasion and you should be proud of your achievement!
		#LOC_kerbalru_rp1_contract_MoonExtendedStayCrew_title = Crewed Moon Landing & Rover Exploration
		#LOC_kerbalru_rp1_contract_MoonExtendedStayCrew_synopsis = Launch a craft with at least two crew, land one crew on the Moon, explore with a rover, and return home safely
		#LOC_kerbalru_rp1_contract_MoonExtendedStayCrew_description = <b>Program: Crewed Lunar Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and launch a spacecraft with at least two crew members with the ability to land one crew member on the Moon. This will be a targeted landing near a randomly generated waypoint. We will also require you to take a crewed rover to explore an additional two waypoints. Once you have explored the waypoints, return safely to Earth.&br;&br;<b>Number of Contracts Completed: @index / @maxCompletions</b>
		#LOC_kerbalru_rp1_contract_MoonExtendedStayCrew_completedMessage = Mission Success! You explored different parts of the Moon. But, even now, people are losing interest in our trips to the Moon. What is next for us?
		#LOC_kerbalru_rp1_contract_first_MoonFlybyCrewed_title = Crewed Lunar Flyby
		#LOC_kerbalru_rp1_contract_first_MoonFlybyCrewed_synopsis = Launch a crewed ship to flyby the Moon
		#LOC_kerbalru_rp1_contract_first_MoonFlybyCrewed_description = <b>Program: Crewed Lunar Exploration<br>Type: <color=green>Required</color></b><br><br>Design, build, and launch a crewed spacecraft into lunar space (with a periselene under 5000 km) and return safely to Earth.
		#LOC_kerbalru_rp1_contract_first_MoonFlybyCrewed_completedMessage = Crew alive and well after the mission--congratulations! The first humans to have seen the Moon from up close, this is an historic day!
		#LOC_kerbalru_rp1_contract_CrewedLunarOrbitRepeat_title = Crewed Lunar Orbit
		#LOC_kerbalru_rp1_contract_CrewedLunarOrbitRepeat_synopsis = Fly a Crewed Lunar Orbital mission
		#LOC_kerbalru_rp1_contract_CrewedLunarOrbitRepeat_description = <b>Program: Crewed Lunar Exploration<br>Type: <color=blue>Optional</color></b><br><br>Launch a crewed spacecraft into lunar orbit for a routine mission of the specified duration and return safely to Earth.&br;&br;<b>Number of Contracts Completed: @index / 2</b>
		#LOC_kerbalru_rp1_contract_CrewedLunarOrbitRepeat_completedMessage = Crew alive and well after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_landingPlutoRepeat_title = Pluto Landing
		#LOC_kerbalru_rp1_contract_landingPlutoRepeat_synopsis = Send an uncrewed probe to land on Pluto
		#LOC_kerbalru_rp1_contract_landingPlutoRepeat_description = <b>Program: Plutonian Landings<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Pluto and transmit a science report from the surface.
		#LOC_kerbalru_rp1_contract_landingPlutoRepeat_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_roverPluto_title = Pluto Rover
		#LOC_kerbalru_rp1_contract_roverPluto_synopsis = Send a rover to explore the surface of Pluto
		#LOC_kerbalru_rp1_contract_roverPluto_description = <b>Program: Plutonian Landings<br>Type: <color=blue>Optional</color></b><br><br>Design and send a rover to the surface of Pluto and visit the different areas marked by our scientists.&br;&br;We suggest landing your rover as close as possible to the first marker.
		#LOC_kerbalru_rp1_contract_roverPluto_completedMessage = Congratulations, our rover has returned important scientific data.
		#LOC_kerbalru_rp1_contract_landingPluto_title = Pluto Landing
		#LOC_kerbalru_rp1_contract_landingPluto_synopsis = Send an uncrewed probe to land on Pluto
		#LOC_kerbalru_rp1_contract_landingPluto_description = <b>Program: Plutonian Landings<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Pluto and transmit a science report from the surface.
		#LOC_kerbalru_rp1_contract_landingPluto_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_orbitPluto_title = Pluto Orbit
		#LOC_kerbalru_rp1_contract_orbitPluto_synopsis = Send an uncrewed probe into orbit around Pluto
		#LOC_kerbalru_rp1_contract_orbitPluto_description = <b>Program: Plutonian Landings<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into an orbit of Pluto.
		#LOC_kerbalru_rp1_contract_orbitPluto_completedMessage = Congratulations! We can continue to gather data from the new satellite.
		#LOC_kerbalru_rp1_contract_roverCharon_title = Charon Rover
		#LOC_kerbalru_rp1_contract_roverCharon_synopsis = Send a rover to explore the surface of Charon
		#LOC_kerbalru_rp1_contract_roverCharon_description = <b>Program: Plutonian Landings<br>Type: <color=blue>Optional</color></b><br><br>Design and send a rover to the surface of Charon and visit the different areas marked by our scientists.&br;&br;We suggest landing your rover as close as possible to the first marker.
		#LOC_kerbalru_rp1_contract_roverCharon_completedMessage = Congratulations, our rover has returned important scientific data.
		#LOC_kerbalru_rp1_contract_landingCharonRepeat_title = Charon Landing
		#LOC_kerbalru_rp1_contract_landingCharonRepeat_synopsis = Send an uncrewed probe to land on Charon
		#LOC_kerbalru_rp1_contract_landingCharonRepeat_description = <b>Program: Plutonian Landings<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Charon and transmit a science report from the surface.
		#LOC_kerbalru_rp1_contract_landingCharonRepeat_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_landingCharon_title = Charon Landing
