		#LOC_kerbalru_rp1_contract_landingCharon_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_landingUmbriel_title = Umbriel Landing (Uncrewed)
