		#LOC_kerbalru_rp1_program_VenusSurfaceExp_title = Освоение поверхности Венеры
		#LOC_kerbalru_rp1_program_VenusSurfaceExp_description = Отправьте зонды к Венере, чтобы узнать, какие там поверхность и атмосфера. Плотные облака скрывают поверхность от глаз, а едкая атмосфера и сильный жар мешают всему, что пытается спуститься к поверхности. Сохранить работоспособность зонда надолго — большая проблема. Даже с жаростойкими материалами ничто не выдерживает дольше нескольких часов.
		#LOC_kerbalru_rp1_program_VenusSurfaceExp_objectivesPrettyText = Посадите зонд на Венеру.
		#LOC_kerbalru_rp1_program_SmallBodiesFlyby_title = Облёт малых тел
		#LOC_kerbalru_rp1_program_SmallBodiesFlyby_description = Посетите некоторые малые тела Солнечной системы. Ни один зонд ещё не видел их поверхность вблизи. Марс и Венера оба крупнее этих тел и имеют атмосферу. Как выглядит вблизи маленькая скалистая планета (или карликовая планета) без атмосферы? Можем ли мы понять, как они образовались? Есть ли у них магнитные поля? Отправьте зонды, чтобы узнать.
		#LOC_kerbalru_rp1_program_SmallBodiesFlyby_objectivesPrettyText = Облетите Меркурий, Цереру или Весту — минимум два из трёх.
		#LOC_kerbalru_rp1_program_MercuryExploration_title = Исследование Меркурия
		#LOC_kerbalru_rp1_program_MercuryExploration_description = Меркурий — наименее изученная из внутренних планет из-за сложности выхода на орбиту вокруг него. Отправьте туда зонды, чтобы узнать больше. Текущие данные говорят, что Меркурий приливно захвачен Солнцем. Как это влияет на его поверхность? Или мы просто пролетали мимо в удивительно синхронные моменты? В любом случае, зонды на орбите и на поверхности Меркурия дадут увлекательные данные о ближайшей к Солнцу планете.
		#LOC_kerbalru_rp1_program_MercuryExploration_objectivesPrettyText = Орбита и посадка на Меркурий.
		#LOC_kerbalru_rp1_program_AsteroidExploration_title = Исследование астероидов (WIP)
		#LOC_kerbalru_rp1_program_AsteroidExploration_description = Выйдите на орбиту Цереры и Весты для их изучения. Эти карликовые планеты открыли в первом десятилетии XIX века и назвали в честь богини земледелия и богини домашнего очага соответственно. Их изучение также может дать подсказки о менее мифическом происхождении. Когда осел аккреционный диск Солнца, сформировались планеты, а также Церера и Веста. Эти протопланеты — крупнейшие тела пояса астероидов, и понимание их формирования даст представление о ранней Солнечной системе. ПРИМЕЧАНИЕ: есть контракты, но они не доработаны.
		#LOC_kerbalru_rp1_program_AsteroidExploration_objectivesPrettyText = Орбита Цереры и Весты.
		#LOC_kerbalru_rp1_program_JupiterObservation_title = Наблюдение Юпитера
		#LOC_kerbalru_rp1_program_JupiterObservation_description = Юпитер даёт множество возможностей для исследований, но и множество трудностей: чтобы долететь до Юпитера с орбиты Земли, аппарату требуется почти столько же энергии, сколько на сам вывод на орбиту. Гравитационные манёвры позволяют сэкономить дельта-v ценой увеличения длительности полёта. Там аппарата ждёт богатая и разнообразная система. Помимо того, что это крупнейшая планета Солнечной системы, система Юпитера — дом крупнейшего спутника, Ганимеда, спутника планетарной массы. Эта программа отправит беспилотные научные зонды к Юпитеру и его спутникам.<br><br>Исторически Юпитер — самая посещаемая из внешних планет: 9 миссий совершили облёты или вышли на орбиту, включая «Вояджеры» в 1979 году на пути к внешней Солнечной системе и орбитальный аппарат «Юнона», чья миссия продолжается сегодня. Совсем недавно, в 2024 году, зонд NASA Europa Clipper отправился к галилеевым спутникам.
		#LOC_kerbalru_rp1_program_JupiterObservation_objectivesPrettyText = Орбита Юпитера и облёт минимум двух галилеевых лун.
		#LOC_kerbalru_rp1_program_SaturnObservation_title = Наблюдение Сатурна
		#LOC_kerbalru_rp1_program_SaturnObservation_description = Сатурн с его фотогеничными кольцами давно служит объектом наблюдений и исследований. Видимые с Земли даже в простой бинокль, кольца Сатурна веками привлекали наблюдателей. К тому же, обладая наибольшим числом спутников во всей Солнечной системе — и это число растёт с каждой миссией — система Сатурна открывает огромные возможности для исследований. Титан, крупнейший спутник Сатурна, возможно, обладает атмосферой, пригодной для жизни, а под ледяной корой Энцелада предполагается жидкая вода. Исследуйте систему Сатурна беспилотными зондами, изучая атмосферы Сатурна и Титана, и присмотритесь ближе к более крупным спутникам системы.<br><br>Исторические миссии к Сатурну включают облёты «Пионера-11» и обоих «Вояджеров», а орбитальный аппарат «Кассини» работал с 2004 по 2017 год.
		#LOC_kerbalru_rp1_program_SaturnObservation_objectivesPrettyText = Отправьте орбитальный аппарат к Сатурну, атмосферный зонд к Титану или Сатурну и облетите ещё две луны, помимо Титана.
		#LOC_kerbalru_rp1_program_OuterPlanetFlyby_title = Облёт внешних планет
		#LOC_kerbalru_rp1_program_OuterPlanetFlyby_description = Что скрывается за Марсом? Эти далёкие гиганты обращаются вдали от Солнца. Юпитер и Сатурн видны в любительский телескоп, но с Земли их подробно не изучить. Огромная масса газовых гигантов означает, что, хотя солнечного света им достаётся мало, приливные силы согревают их многочисленные спутники. Где-то там может даже быть жидкая вода. Отправьте зонды исследовать эти далёкие тела. Гравитационные манёвры настоятельно рекомендуются.
		#LOC_kerbalru_rp1_program_OuterPlanetFlyby_objectivesPrettyText = Облетите минимум четыре внешние планеты.
		#LOC_kerbalru_rp1_program_OuterGasGiantSurvey_title = Съёмка внешних газовых гигантов
		#LOC_kerbalru_rp1_program_OuterGasGiantSurvey_description = Снимки расширяют знания о внешней Солнечной системе, но для настоящего понимания этих далёких соседей нужны научные приборы и время наблюдения гораздо дольше, чем беглый облёт. Отправьте орбитальные аппараты к двум самым дальним газовым гигантам и изучите их атмосферы. В самых дальних уголках системы также исследуйте спутники этих гигантов. Понадобятся улучшенная Станция слежения и связь более высокого уровня, чтобы получать научные данные на таких больших расстояниях.
		#LOC_kerbalru_rp1_program_OuterGasGiantSurvey_objectivesPrettyText = Do this and that
		#LOC_kerbalru_rp1_program_PlutoLandings_title = Плутонианские посадки
		#LOC_kerbalru_rp1_program_PlutoLandings_description = Единственная известная двойная планетная система Солнечной системы — Плутон и Харон — уже эоны обращаются друг вокруг друга в приливном захвате в самых тёмных и холодных уголках нашей системы. Теперь пора вам сесть на них, возможно, спустя всего век после их открытия. Об этих далёких ледяных мирах известно очень мало. Даже наши самые совершенные зонды исторически возвращали относительно немного данных по сравнению с более близкими соседями. Исследуйте самые дальние уголки Солнечной системы и сядьте на эту любопытную пару карликовых планет.
		#LOC_kerbalru_rp1_program_PlutoLandings_objectivesPrettyText = Сядьте на Плутон и Харон.
		#LOC_kerbalru_rp1_program_EarlyLunarHabitation_title = Обитание на Луне
		#LOC_kerbalru_rp1_program_EarlyLunarHabitation_description = Мы уже высадили людей на Луну, теперь нужно доказать, что мы можем жить и работать на её поверхности долгое время. Это исследование станет ключевым для будущего долгосрочного обитания в космосе, в том числе если мы когда-нибудь отправим людей на Марс.
		#LOC_kerbalru_rp1_program_EarlyLunarHabitation_objectivesPrettyText = Отправьте экипаж на Луну для долгосрочной работы.
		#LOC_kerbalru_rp1_program_CrewedMarsExp_title = Пилотируемое освоение Марса
		#LOC_kerbalru_rp1_program_CrewedMarsExp_description = После долгих испытаний влияния микрогравитации на психику и физиологию человека на низкой околоземной орбите можно взяться за исследование соседней планеты — Марса. Эта программа поручает вам отправить первых людей на Марс. Можно выбрать: высадить экипаж для пребывания на поверхности Марса, либо отправить пилотируемую экспедицию к Фобосу и получить образец с поверхности Марса с помощью робота.
		#LOC_kerbalru_rp1_program_CrewedMarsExp_objectivesPrettyText = Выведите экипаж на орбиту Марса и высадите на Фобос или Марс.
		#LOC_kerbalru_rp1_program_TargetedSats_title = Целевые спутники (устарело)
		#LOC_kerbalru_rp1_program_TargetedSats_description = Доказав способность выводить спутники на орбиту, следующий шаг — переход на более полезные орбиты. Цель этой программы — вывести спутники с разной нагрузкой на конкретные, более сложные орбиты. Геостационарная орбита требует около 13 650 м/с дельта-v при старте с мыса Канаверал.
		#LOC_kerbalru_rp1_program_TargetedSats_objectivesPrettyText = Запустите спутники для анализа погоды, навигации и достижения разных орбит, включая геостационарную.
		#LOC_kerbalru_rp1_program_CommercialApplications1_title = Первое коммерческое применение (устарело)
		#LOC_kerbalru_rp1_program_CommercialApplications1_description = Первые спутники запускались по государственным программам, но коммерческое применение задумывалось давно. Эта программа предусматривает запуск первых коммерческих спутников. Из-за сильно различающихся задач каждый спутник решает конкретную узкую задачу — гораздо более узкую, чем ранние, более широкие научные спутники.
		#LOC_kerbalru_rp1_program_CommercialApplications1_objectivesPrettyText = Запустите первые коммерческие спутники и постройте сеть спутниковой связи.
		#LOC_kerbalru_rp1_program_CommNetwork_title = Сеть связи (устарело)
		#LOC_kerbalru_rp1_program_CommNetwork_description = Связь с нашими спутниками, а позже и с пилотируемыми аппаратами, порой затруднена. Без прямой видимости станции слежения связь невозможна. Эта программа поручает создать сеть связи из 3 или 4 спутников для гораздо лучшего покрытия связью. Каждому спутнику нужно 125 единиц ComSatPayload, а орбиты довольно высокие.
		#LOC_kerbalru_rp1_program_CommNetwork_objectivesPrettyText = Создайте сеть из 3 или 4 спутников связи.
		#LOC_kerbalru_rp1_program_GEOCommNetwork_title = Геостационарная сеть связи (устарело)
		#LOC_kerbalru_rp1_program_GEOCommNetwork_description = Геостационарные орбиты позволяют размещать спутники в определённых точках над экватором, где они и остаются. Это позволяет ставить спутники связи именно там, где от них будет наибольшая польза. Эта программа поручает создать геостационарную сеть из 4 спутников связи. Каждому спутнику нужно 315 единиц ComSatPayload.
		#LOC_kerbalru_rp1_program_GEOCommNetwork_objectivesPrettyText = Создайте геостационарную сеть связи.
		#LOC_kerbalru_rp1_program_CommercialApplications2_title = Продвинутое коммерческое применение (устарело)
		#LOC_kerbalru_rp1_program_CommercialApplications2_description = Геосинхронные, геостационарные орбиты, орбиты Молния и Тундра способны улучшить покрытие спутниками и упростить наведение наземных антенн. Эта программа предусматривает испытание этих орбит, запуск спутников для коммерческих заказчиков и создание геостационарной или молниевской сети связи из 3 или 4 спутников.
		#LOC_kerbalru_rp1_program_CommercialApplications2_objectivesPrettyText = Создайте геостационарную или молниевскую сеть связи.
		#LOC_kerbalru_rp1_program_CrewedOrbit_title = Пилотируемая орбита (устарело)
		#LOC_kerbalru_rp1_program_CrewedOrbit_description = Отправка машин в космос вместо людей никогда не была конечной целью. Эта программа требует безопасно вывести астронавтов на орбиту и вернуть их, испытать разные пилотируемые манёвры и доказать, что человечество способно выжить в самой враждебной среде, которую природа позволила нам исследовать. Нужно исследовать «Ранние процедуры стыковки» и «Капсулы второго поколения» для завершения программы.
