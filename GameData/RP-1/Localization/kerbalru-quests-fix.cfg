		#LOC_kerbalru_rp1_contract_orbitUranus_synopsis = Send an uncrewed probe into orbit around Uranus
		#LOC_kerbalru_rp1_contract_orbitUranus_description = <b>Program: Outer Gas Giant Survey<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into an orbit of Uranus.
		#LOC_kerbalru_rp1_contract_orbitUranus_completedMessage = Congratulations! We can continue to gather data from the new satellite.
