		#LOC_kerbalru_rp1_contract_VenusOrbitRepeatable_description = <b>Program: Early Inner Planet Probes or Venus Surface Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into a scientifically useful orbit of Venus.
