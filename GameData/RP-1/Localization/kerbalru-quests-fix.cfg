		#LOC_kerbalru_rp1_contract_EOSCosmicRay1_description = <b>Программа: Первые спутники наблюдения Земли<br>Тип: <color=green>Обязательно</color></b><br><br>Спутник, запущенный по программе ранних спутников, вернул ценные данные об околоземном пространстве. Отправьте спутник на высокую орбиту Земли для обнаружения космических лучей, чтобы точнее определить форму и интенсивность их поля вокруг Земли. Ранние научные спутники также несли фото- и видеокамеры для съёмки Земли под новыми ракурсами.&br;&br;<b><color="green">Убедитесь, что аппарат несёт эксперимент по космическим лучам (счётчик Гейгера-Мюллера или сцинтилляционный счётчик) и раннюю ТВ-камеру. За этот и другие запуски передайте 75% данных по космическим лучам и 75% видеосъёмки с высокой орбиты Земли. Науку не обязательно собирать за один полёт.</color></b>&br;&br;Исторический пример: Explorer 6 (64 кг, Thor-Able)
