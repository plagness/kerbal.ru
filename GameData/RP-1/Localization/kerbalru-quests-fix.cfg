		#LOC_kerbalru_rp1_program_EarlyLunarProbes_description = Луна — первая ступень на пути к освоению Солнечной системы. Управлять зондом на расстоянии более световой секунды — уже достойная первая задача. Эта программа требует новых технологий и более тяжёлых ракет-носителей для первых шагов вашей космической программы к изучению Луны вблизи. Завершается выводом зонда на орбиту Луны. Программа как минимум требует Лунной дальней связи, а также обычно требует улучшения Центра управления полётами и Станции слежения для планирования полёта. «Базовая авионика и зонды» открывает авионику для дальнего космоса, необходимую для управляемых аппаратов у Луны.
		#LOC_kerbalru_rp1_program_EarlyLunarProbes_objectivesPrettyText = Выполните облёт, падение и выход на орбиту Луны.
		#LOC_kerbalru_rp1_program_UncrewedLunarSurface_title = Беспилотная посадка на Луну
		#LOC_kerbalru_rp1_program_UncrewedLunarSurface_description = Посадка беспилотных зондов на Луну — следующий шаг в освоении Солнечной системы. Успешная посадка на Луну — сложная задача. Понадобятся ещё более мощные ракеты-носители для запуска достаточно тяжёлой полезной нагрузки. Эти беспилотные посадки дадут данные для планирования последующих пилотируемых посадок. Нужно исследовать глубоко дросселируемые двигатели в узле «Ранняя посадка» (рекомендуется) или разобраться, как сесть на RCS.
		#LOC_kerbalru_rp1_program_UncrewedLunarSurface_objectivesPrettyText = Посадите зонды на Луну.
		#LOC_kerbalru_rp1_program_CrewedOrbitEarly_title = Пилотируемая орбита
		#LOC_kerbalru_rp1_program_CrewedOrbitEarly_description = Отправка машин в космос вместо людей никогда не была конечной целью. Эта программа требует безопасно вывести астронавтов на орбиту и вернуть их на Землю, доказав, что человечество способно выжить в самой враждебной среде, которую природа позволила нам исследовать. Нужно улучшить Комплекс астронавтов до третьего уровня, чтобы готовить экипаж к тяготам космического полёта. Начинайте подготовку экипажа примерно за год до запуска.
		#LOC_kerbalru_rp1_program_CrewedOrbitEarly_objectivesPrettyText = Выведите астронавта на орбиту и верните его.
		#LOC_kerbalru_rp1_program_CrewedOrbitAdv_title = Продвинутая пилотируемая орбита
		#LOC_kerbalru_rp1_program_CrewedOrbitAdv_description = Пилотируемая космонавтика — это больше, чем просто «консервы» на орбите. Нужно испытать технику и навыки маневрирования, выходов в открытый космос, сближения и стыковки, чтобы люди в космосе были не просто пассажирами. Для завершения программы нужно исследовать «Ранние процедуры стыковки» и «Капсулы второго поколения».
		#LOC_kerbalru_rp1_program_CrewedOrbitAdv_objectivesPrettyText = Успешно состыкуйте 2 аппарата.
		#LOC_kerbalru_rp1_program_EarlyInnerPlanetProbes_title = Зонды к внутренним планетам
		#LOC_kerbalru_rp1_program_EarlyInnerPlanetProbes_description = Программа поручает вам исследовать Венеру и Марс. Хотя это ближайшие соседи Земли, расстояние до них в среднем составляет сотни миллионов километров. Для связи с этими зондами понадобятся более совершенные технологии коммуникации. Поддержание работоспособности и питания на таких больших расстояниях и долгих сроках создаст новые вызовы в конструкции аппаратов.
		#LOC_kerbalru_rp1_program_EarlyInnerPlanetProbes_objectivesPrettyText = Орбита Венеры и Марса.
		#LOC_kerbalru_rp1_program_CrewedLunar_title = Пилотируемое освоение Луны
		#LOC_kerbalru_rp1_program_CrewedLunar_description = Вам поручено отправить к Луне, в 240 000 миль от центра управления в Хьюстоне, гигантскую ракету высотой более 300 футов, из новых металлических сплавов, некоторые из которых ещё не изобретены, способную выдержать нагрев и нагрузки в разы сильнее любых испытанных прежде, собранную с точностью выше, чем у лучших часов, несущую всё оборудование для двигателей, навигации, управления, связи, еды и выживания, в неизведанный полёт к неизвестному небесному телу, а затем благополучно вернуть её на Землю, входящую в атмосферу на скорости свыше 25 000 миль в час, с нагревом около половины температуры Солнца. Или же это шанс для акробатики в кресле пилота. Но надёжная ракета — ваш лучший вариант. Нужно улучшить комплекс астронавтов до пятого уровня, чтобы установить флаг на Луне и выполнить первый контракт пилотируемой посадки.
		#LOC_kerbalru_rp1_program_CrewedLunar_objectivesPrettyText = Отправьте экипаж в облёт, на орбиту и посадку на Луну.
		#LOC_kerbalru_rp1_program_EarlyEarthSpaceStation_title = Первые орбитальные станции
		#LOC_kerbalru_rp1_program_EarlyEarthSpaceStation_description = Околоземная космическая станция позволит людям надолго исследовать космос и принесёт пользу жителям Земли. Программа предусматривает создание сначала прототипов, а затем более зрелых решений для долговременного обитания на низкой околоземной орбите. Нужно проводить долгосрочные эксперименты, менять экипаж и пополнять запасы станции (станций) или отправлять новые при необходимости.
		#LOC_kerbalru_rp1_program_EarlyEarthSpaceStation_objectivesPrettyText = Выполните эксперименты многонедельного и многомесячного обитания.
		#LOC_kerbalru_rp1_program_MarsSurfaceExp_title = Освоение поверхности Марса
		#LOC_kerbalru_rp1_program_MarsSurfaceExp_description = Отправьте зонды на Марс — исследовать атмосферу, сесть на поверхность и даже покататься на марсоходе. Тонкая атмосфера Марса создаёт заметный нагрев при входе, но недостаточно плотная для безопасной посадки только на парашютах.
