		#LOC_kerbalru_rp1_contract_orbitVenus_completedMessage = Congratulations! We can continue to gather data from the new satellite.
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3_title = Early Communications Network (3 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3_synopsis = Launch a 3 satellite Communications Network
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3_description = <b>Program: Communication Network<br>Type: <color=green>Required</color></b><br><br>Mission control is tired of losing vessels and probes over the horizon, since they are rarely heard from again. We need to find a way to stay in constant communication with our probes.&br;&br;Build a communication network with three ComSats that has continuous connectivity to mission control.&br;&br;<b><color=white>NOTE: Make sure to only accept either the three or four satellite version of this contract (it's impossible to complete both).</color></b>
		#LOC_kerbalru_rp1_contract_EarlyComNetwork3_completedMessage = Congratulations! The network is up and transmitting, and our shake-out testing is complete!
		#LOC_kerbalru_rp1_contract_FirstWeatherSat_title = First Weather Satellite  // Basically it is TIROS 1
		#LOC_kerbalru_rp1_contract_FirstWeatherSat_synopsis = Launch the first weather satellite
		#LOC_kerbalru_rp1_contract_FirstWeatherSat_description = <b>Program: Targeted Satellites<br>Type: <color=green>Required</color></b><br><br>The Atmospheric Analysis Satellite that we launched was a good first step to understanding how the upper atmosphere affects the weather. However, our meteorologists want to see images of the clouds to better assess the situation.&br;&br;Launch our first official weather satellite into orbit.
		#LOC_kerbalru_rp1_contract_FirstWeatherSat_completedMessage = Success! The images provided from this satellite have proven that weather satellites can be extremely effective in helping meteorologists predict the weather.
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4_title = Early Communications Network (4 Satellites)
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4_synopsis = Launch a 4 satellite Communications Network
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4_description = <b>Program: Communication Network<br>Type: <color=green>Required</color></b><br><br>Mission control is tired of losing vessels and probes over the horizon, since they are rarely heard from again. We need to find a way to stay in constant communication with our probes.&br;&br;Build a communication network with four ComSats that has continuous connectivity to mission control.&br;&br;<b><color=white>NOTE: Make sure to only accept either the three or four satellite version of this contract (it's impossible to complete both).</color></b>
		#LOC_kerbalru_rp1_contract_EarlyComNetwork4_completedMessage = Congratulations! The network is up and transmitting, and our shake-out testing is complete!
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat_title = First Molniya Orbit Satellite
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat_synopsis = Launch a satellite into a Molniya Orbit
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat_description = <b>Program: Targeted Satellites<br>Type: <color=green>Required</color></b><br><br>A Molniya orbit is a type of highly elliptical orbit with an inclination of 63.4 degrees, an argument of perigee of -90 degrees, and an orbital period of one half of a sidereal day. Place a satellite into a Molniya orbit.&br;&br;There will be an orbit showing in the map view and tracking station. You do not have to place the satellite into this orbit, but it is instead meant to show you where your perigee and apogee should approximately be located, but more importantly, it shows the proper shape of the orbit.
		#LOC_kerbalru_rp1_contract_FirstMolniyaSat_completedMessage = Success! The Molniya orbit is highly eccentric and allows the satellite to spend most of its time over the high latitudes.
		#LOC_kerbalru_rp1_contract_FirstNavSat_title = First Navigational Satellite  // Based on Transit 1 through 4
		#LOC_kerbalru_rp1_contract_FirstNavSat_synopsis = Launch the first navigation satellite
		#LOC_kerbalru_rp1_contract_FirstNavSat_description = <b>Program: Targeted Satellites<br>Type: <color=green>Required</color></b><br><br>Through measuring the Doppler shift of radio signals transmitted from a satellite in a known orbit, it is possible for a receiver on the ground to establish their location, which would have many applications both civilian and military. To test the principle and develop receiver equipment, it is necessary to have a test navigational satellite in orbit. Be sure to include solar panels to generate power. Historically, the first experiments in satellite navigation were made with Transit 1B (119 kg, Thor-Ablestar).
		#LOC_kerbalru_rp1_contract_FirstNavSat_completedMessage = Congratulations! The satellite is in orbit and we have already begun to receive Doppler curves.
		#LOC_kerbalru_rp1_contract_EarlyComSat_title = Commercial Communications Satellite (Early)
		#LOC_kerbalru_rp1_contract_EarlyComSat_synopsis = Launch a Communications Satellite for a customer.
		#LOC_kerbalru_rp1_contract_EarlyComSat_description = <b>Program: Targeted Satellites</b> or <b>Comm Network<br>Type: <color=blue>Optional</color></b><br><br>Now that we have tested out the Communications Satellite Technology, there are many uses we have for these satellites. We have a customer that is requesting a new satellite. Launch a new communications Satellite into the specified orbit.&br;&br;<b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color></b><b><color=white>Removal Condition: Completion of a Commercial Communications Satellite contract</color></b>&br;&br;<b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_EarlyComSat<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_EarlyComSat_completedMessage = Success! The communications satellite was launched into the proper orbit. Your customer is very happy.
		#LOC_kerbalru_rp1_contract_ComTestSat_title = Communications Test Satellite
		#LOC_kerbalru_rp1_contract_ComTestSat_synopsis = Launch a Communications Test Satellite
		#LOC_kerbalru_rp1_contract_ComTestSat_description = <b>Program: Targeted Satellites</b> or <b>Comm Network<br>Type: <color=blue>Optional</color></b><br><br>There are groups that want to understand more about communications with satellites. Launch a new communications test satellite into the proper orbit. &br;&br;<b><color=yellow>NOTE: The satellite will be destroyed upon completion of the contract. This simulates transfer of the payload back to the customer.</color></b>&br;&br;<b><color=white>Removal Condition: Completion of a Communications Satellite (Early) contract</color></b>&br;&br;<b>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_ComTestSat<br>Number of Contracts Completed: @index / unlimited</b>
		#LOC_kerbalru_rp1_contract_ComTestSat_completedMessage = Success! We are learning more about space communications with every launch.
		#LOC_kerbalru_rp1_contract_FirstComSat_title = First Communications Satellite
		#LOC_kerbalru_rp1_contract_FirstComSat_synopsis = Launch the first communication satellite
		#LOC_kerbalru_rp1_contract_FirstComSat_description = <b>Program: Targeted Satellites<br>Type: <color=green>Required</color></b><br><br>Our communications around the globe are limited to line of sight because of the curvature of Earth. If we can launch a communications satellite into orbit, we can use it to transmit information to the opposite side of the world.
		#LOC_kerbalru_rp1_contract_FirstComSat_completedMessage = Congratulations! Satellite communications will be how humans communicate across the globe with each other.
