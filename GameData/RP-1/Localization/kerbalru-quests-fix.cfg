		#LOC_kerbalru_rp1_tech_scramjetEngines_description = Scramjet Engines (1998-2008)
		#LOC_kerbalru_rp1_tech_advancedTurbofans_title = Advanced Turbofans
		#LOC_kerbalru_rp1_tech_advancedTurbofans_description = Advanced Turbofans (2009-2028)
		#LOC_kerbalru_rp1_tech_experimentalAircraft_title = Experimental Aircraft Engines
		#LOC_kerbalru_rp1_tech_experimentalAircraft_description = Experimental Aircraft Engines (2028-2050)
