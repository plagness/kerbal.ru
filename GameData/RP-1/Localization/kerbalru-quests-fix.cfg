		#LOC_kerbalru_rp1_contract_probeNeptune_description = <b>Program: Outer Gas Giant Survey<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into the atmosphere of Neptune and will return scientific data.
		#LOC_kerbalru_rp1_contract_probeNeptune_completedMessage = Congratulations! Our scientists have learned valuable information about the make-up of the atmosphere.
		#LOC_kerbalru_rp1_contract_orbitUranus_Rep_title = Uranus Orbital Science Probe
		#LOC_kerbalru_rp1_contract_orbitUranus_Rep_synopsis = Send an uncrewed probe into orbit around Uranus
		#LOC_kerbalru_rp1_contract_orbitUranus_Rep_description = <b>Program: Outer Gas Giant Survey<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into a scientifically useful orbit of Uranus.&br;The flexible parameters of this contract allow you to choose either a high inclination orbit for maximum surface coverage, or an orbit coplanar with the moons for repeated flybys.
