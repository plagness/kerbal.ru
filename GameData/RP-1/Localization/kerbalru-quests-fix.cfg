		#LOC_kerbalru_rp1_contract_landingVenus_title = Venus Landing
		#LOC_kerbalru_rp1_contract_landingVenus_synopsis = Send an uncrewed probe to land on Venus
		#LOC_kerbalru_rp1_contract_landingVenus_description = <b>Program: Venus Surface Exploration<br>Type: <color=red>Capstone</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Venus and transmit a science report from the surface. &br;&br;It is very hot on Venus, so please be sure to account for this in the type of parachutes you choose to pack.
		#LOC_kerbalru_rp1_contract_landingVenus_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
