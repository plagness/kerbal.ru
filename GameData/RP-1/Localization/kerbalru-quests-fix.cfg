		#LOC_kerbalru_rp1_contract_flybyTitania_description = <b>Program: Outer Gas Giant Survey<br>Type: <color=green>Required</color></b><br><br>Create a probe and send it to flyby Titania within 7000 km. Make sure to transmit science from the flyby.
		#LOC_kerbalru_rp1_contract_flybyTitania_completedMessage = Congratulations on the flyby! The data is coming in now.
