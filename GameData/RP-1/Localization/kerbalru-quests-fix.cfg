		#LOC_kerbalru_rp1_contract_landingTitan_completedMessage = Mission Success! You have safely landed on Titan and returned valuable science data from the surface.
		#LOC_kerbalru_rp1_contract_landingMercury_title = Mercury Landing
		#LOC_kerbalru_rp1_contract_landingMercury_synopsis = Send an uncrewed probe to land on Mercury
		#LOC_kerbalru_rp1_contract_landingMercury_description = <b>Program: Mercury Exploration<br>Type: <color=red>CAPSTONE</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Mercury and transmit a science report from the surface.
		#LOC_kerbalru_rp1_contract_landingMercury_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_landingMercuryRepeatable_title = Mercury Landing
		#LOC_kerbalru_rp1_contract_landingMercuryRepeatable_synopsis = Send an uncrewed probe to land on Mercury
		#LOC_kerbalru_rp1_contract_landingMercuryRepeatable_description = <b>Program: Mercury Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will soft land on Mercury and transmit a science report from the surface.
		#LOC_kerbalru_rp1_contract_landingMercuryRepeatable_completedMessage = Congratulations! Landing a probe on another planetary body in our system is no easy feat! The science gathered from this lander will unlock some of the secrets of our Solar System.
		#LOC_kerbalru_rp1_contract_orbitMercury_Rep_title = Mercury Orbital Science Probe
		#LOC_kerbalru_rp1_contract_orbitMercury_Rep_synopsis = Send an uncrewed probe into high inclination orbit around Mercury
		#LOC_kerbalru_rp1_contract_orbitMercury_Rep_description = <b>Program: Mercury Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into a scientifically useful orbit of Mercury.
		#LOC_kerbalru_rp1_contract_orbitMercury_Rep_completedMessage = Congratulations! We can continue to gather data from the new satellite.
		#LOC_kerbalru_rp1_contract_orbitMercury_title = Mercury Orbit
		#LOC_kerbalru_rp1_contract_orbitMercury_synopsis = Send an uncrewed probe into orbit around Mercury
		#LOC_kerbalru_rp1_contract_orbitMercury_description = <b>Program: Mercury Exploration<br>Type: <color=green>Required</color></b><br><br>Design and successfully launch an uncrewed probe that will enter into an orbit of Mercury.
		#LOC_kerbalru_rp1_contract_orbitMercury_completedMessage = Congratulations! We can continue to gather data from the new satellite.
		#LOC_kerbalru_rp1_contract_roverMercury_title = Mercury Rover
		#LOC_kerbalru_rp1_contract_roverMercury_synopsis = Send a rover to explore the surface of Mercury
		#LOC_kerbalru_rp1_contract_roverMercury_description = <b>Program: Mercury Exploration<br>Type: <color=blue>Optional</color></b><br><br>Design and send a rover to the surface of Mercury and visit the different areas marked by our scientists.&br;&br;We suggest landing your rover as close as possible to the first marker.
		#LOC_kerbalru_rp1_contract_roverMercury_completedMessage = Congratulations, our rover has returned important scientific data.
		#LOC_kerbalru_rp1_contract_landingTriton_title = Triton Landing (Uncrewed)
		#LOC_kerbalru_rp1_contract_landingTriton_synopsis = Achieve a soft landing on Triton and transmit science
		#LOC_kerbalru_rp1_contract_landingTriton_description = <b>Program: Neptunian Moon Landings<br>Type: <color=green>Required</color></b><br><br>Send a craft to land on Triton and return science data back to Earth.
		#LOC_kerbalru_rp1_contract_landingTriton_completedMessage = Mission Success! You have safely landed on Triton and returned valuable science data from the surface.
		#LOC_kerbalru_rp1_contract_recordUncrewedAlt_title = Uncrewed Altitude Record of @uncrewedTargetAltitudeKM km.
		#LOC_kerbalru_rp1_contract_recordUncrewedAlt_synopsis = Set an uncrewed altitude record of @uncrewedTargetAltitudeKM km.
		#LOC_kerbalru_rp1_contract_recordUncrewedAlt_description = We want you to set a new uncrewed altitude record! Reach @uncrewedTargetAltitudeKM km.
		#LOC_kerbalru_rp1_contract_recordUncrewedAlt_completedMessage = Congratulations! You've set a new uncrewed altitude record!
		#LOC_kerbalru_rp1_contract_CrewedSuborbital_title = Suborbital Flight (Crewed)
		#LOC_kerbalru_rp1_contract_CrewedSuborbital_synopsis = Send a crewed vessel on a suborbital flight
		#LOC_kerbalru_rp1_contract_CrewedSuborbital_description = <b>Program: Crewed Orbit<br>Type: <color=blue>Optional</color></b><br><br>Crewed suborbital flights are used as a safer prelude to an orbital mission, for research, or to set non-orbital altitude records. Send any number of crew above @VesselGroup/ReachAlt/minAltitude meters to satisfy the requirements of this mission. Historical missions used the Mercury capsule (1961, Mercury-Redstone), the X-15 (1963, B-52), and SpaceShipOne (2004, White Knight).<b><color=white>NOTE: You can not select this contract and 'First Orbital Flight (Crewed') or 'X-Planes High' at the same time. If you select the other contract while this is active, this will automatically fail.</color></b>&br;&br;<b>Number of Contracts Completed: @index / @maxCompletions</b><br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_CrewedSuborbital_completedMessage = Congratulations! The crew has returned safely and we put another person in space.
		#LOC_kerbalru_rp1_contract_SuborbitalTestFlight_title = Suborbital Test Flight (Uncrewed)
		#LOC_kerbalru_rp1_contract_SuborbitalTestFlight_synopsis = Send an uncrewed test flight of a crewed vessel on a suborbital flight
		#LOC_kerbalru_rp1_contract_SuborbitalTestFlight_description = <b>Program: Crewed Orbit<br>Type: <color=blue>Optional</color></b><br><br>Before putting a crew in a capsule to send into space, it is a good idea to test the capsule on an uncrewed flight. Send a Crew Capsule, WITH NO CREW IN IT, above @VesselGroup/ReachAlt/minAltitude meters to satisfy the requirements of this mission. &br;&br;<b>Number of Contracts Completed: @index / @maxCompletions</b>
		#LOC_kerbalru_rp1_contract_SuborbitalTestFlight_completedMessage = Congratulations! The capsule has proven to work!
		#LOC_kerbalru_rp1_contract_first_OrbitCrewed_title = First Orbital Flight (Crewed)
		#LOC_kerbalru_rp1_contract_first_OrbitCrewed_synopsis = Send a person into orbit and return safely
		#LOC_kerbalru_rp1_contract_first_OrbitCrewed_description = <b>Program: Crewed Orbit<br>Type: <color=green>Required</color></b><br><br>Arguably one of the most important milestones a space program can achieve is putting a human into orbit around the Earth. The task requires a reliable launch system and many hours of research and engineering to pull off. Before committing to the goal, ensure you have the time to research, design, and build a craft capable of putting a human into a 150 km orbit for at least one full orbit. Single-person orbital spacecraft are fairly rare in history but serve an important role in proving future technologies and sending crew to space before rivals, with Mercury (1962, Atlas LV-3B) and Vostok (1961, Vostok-K) being the only examples.&br;&br;<b><color=yellow>NOTE: Completing this contract will cause the 'Suborbital Flight (Crewed)' contracts to become unavailable. If it is accepted then it will automatically fail.</color></b><br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_first_OrbitCrewed_completedMessage = Mission success! This is a most historic day, the first human to orbit the Earth has returned home safely!
		#LOC_kerbalru_rp1_contract_CollectCrewedScienceBasic_title = Collect Basic Crew Science
		#LOC_kerbalru_rp1_contract_CollectCrewedScienceBasic_synopsis = Collect all basic crew science
		#LOC_kerbalru_rp1_contract_CollectCrewedScienceBasic_description = <b>Program: Crewed Orbit<br>Type: <color=red>CAPSTONE</color></b><br><br>Human beings are capable of conducting a unique class of science experiments, one robotic spacecraft simply can't match. We'd like you to fly orbital missions in order to learn about human beings in space, what they can do, and how they perceive things around them. All these experiments were conducted historically during the Mercury and Vostok programs. As part of this science campaign, we also need you to fly at least one flight that lasts a day or more in orbit. NOTE: You may have already collected some or all of this science. If you have, you won't need to collect it again, but you do need to fly at least one whole-day (or more) duration crewed flight.<br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_CollectCrewedScienceBasic_completedMessage = This is loads of data! Scientists are extremely happy with the results of your efforts.
		#LOC_kerbalru_rp1_contract_OrbitalFlight1_title = Orbital Flight (One Crew)
		#LOC_kerbalru_rp1_contract_OrbitalFlight1_synopsis = Fly a single-person LEO Orbital mission.
		#LOC_kerbalru_rp1_contract_OrbitalFlight1_description = <b>Program: Crewed Orbit<br>Type: <color=blue>Optional</color></b><br><br>Single-person orbital spacecraft are fairly rare in history but serve an important role in proving future technologies, with Mercury (1962, 1.4 tons, Atlas LV-3B) and Vostok (1961, 4.7 tons, Vostok-K) being the only examples. Design, build, and launch one that remains for @/NoOfOrbits orbits and return the crew safely back to Earth.<b><br><br><color=yellow>NOTE: You can not complete this contract and the Orbital Flight with Maneuvers and 2+ Crew contract at the same time. Attempting to complete both in same flight will automatically fail this one.</color></b>&br;&br;<b>Number of Contracts Completed: @index / unlimited</b><br><br><b><color=green>Note: Astronauts must be trained before launch. There are two types of training, Proficiency Training and Mission Training. Astronauts need Proficiency Training for each crewed part on the vehicle they launch on and for each part that they will enter during their mission. Proficiency Training has to be done only ONCE and lasts FOREVER. Next is Mission Training for the part you intend to launch them in. Mission training must be performed before EVERY flight and will EXPIRE on use or if it goes unused too long. To begin training your astronauts, go to Training tab in the RP-1 window, accessible via the RP-1 icon in the toolbar.</color></b>
		#LOC_kerbalru_rp1_contract_OrbitalFlight1_completedMessage = Crew alive and well after the mission--congratulations!
		#LOC_kerbalru_rp1_contract_OrbitalTestFlightAnimal_title = Orbital Test Flight (Animal Crew)
		#LOC_kerbalru_rp1_contract_OrbitalTestFlightAnimal_synopsis = Send an animal on a test flight of a crewed vessel on an orbital flight
		#LOC_kerbalru_rp1_contract_OrbitalTestFlightAnimal_description = <b>Program: Crewed Orbit<br>Type: <color=blue>Optional</color></b><br><br>Before putting a crew in a capsule to send into space, it is a good idea to test the capsule with an advanced biological creature in it. Send a Crew Capsule WITH AN ANIMAL (one of the generated tourists) into orbit and return safely home. These animals are represented by tourists.<br><br>Can be completed @maxCompletions times.
		#LOC_kerbalru_rp1_contract_OrbitalTestFlightAnimal_completedMessage = Congratulations! The capsule has proven to work and the animal has returned safely.
		#LOC_kerbalru_rp1_contract_OrbitRecovery_title = Reach Orbit & Return Safely to Earth
		#LOC_kerbalru_rp1_contract_OrbitRecovery_synopsis = Recover a craft from an typical crewed orbit descent
		#LOC_kerbalru_rp1_contract_OrbitRecovery_description = <b>Program: Crewed Orbit<br>Type: <color=blue>Optional</color></b><br><br>Reentry is brutally hot and dangerous but it can be survivable with the right technology and equipment. We want you to design, build, and launch a craft that can survive a reentry and make a soft landing or splashdown on Earth after achieving a typical orbit (roughly 200 km). This is a step up in the testing to ensure that our equipment works under expected orbital mission parameters. Note that this contract will be unavailable after completing the first crewed orbit.
		#LOC_kerbalru_rp1_contract_OrbitRecovery_completedMessage = Congratulations! The craft has survived reentry, and engineers are examining it very keenly indeed.
		#LOC_kerbalru_rp1_contract_OrbitalTestFlight_title = Orbital Test Flight (Uncrewed)
		#LOC_kerbalru_rp1_contract_OrbitalTestFlight_synopsis = Send an uncrewed test flight of a crewed vessel on an orbital flight
		#LOC_kerbalru_rp1_contract_OrbitalTestFlight_description = <b>Program: Crewed Orbit<br>Type: <color=green>Required</color></b><br><br>Before putting a crew in a capsule to send into space, it is a good idea to test the capsule on an uncrewed flight. Send a Crew Capsule, WITH NO CREW IN IT, into orbit and return safely to Earth.
		#LOC_kerbalru_rp1_contract_OrbitalTestFlight_completedMessage = Congratulations! The capsule has proven to work!
		#LOC_kerbalru_rp1_contract_first_OrbitRecover_title = Reach Orbital Speed & Return Safely to Earth
		#LOC_kerbalru_rp1_contract_first_OrbitRecover_synopsis = Recover a craft from an orbital-velocity descent
		#LOC_kerbalru_rp1_contract_first_OrbitRecover_description = <b>Program: Crewed Orbit or Early Earth Observation Satellites<br>Type: <color=green>Required</color></b><br><br>Reentry is brutally hot and dangerous, but it can be survivable with the right technology and equipment. We want you to design, build, and launch a craft that can survive a reentry and make a soft landing or splashdown on Earth. Note that orbital-speed suborbital flights are acceptable as well. Historically this research started with weapon reentry vehicles for the newly developing ICBM forces but the research, and rockets, were quite applicable elsewhere; reconnaissance satellite recovery vessels, crewed capsules, and interplanetary landers have also withstood this crucible.
		#LOC_kerbalru_rp1_contract_first_OrbitRecover_completedMessage = Congratulations! The craft has survived reentry, and engineers are examining it very keenly indeed.
		#LOC_kerbalru_rp1_contract_recordCrewedDuration_title = Crewed Duration Record of @crewedTargetDuration
		#LOC_kerbalru_rp1_contract_recordCrewedDuration_synopsis = Set a crewed duration record of @crewedTargetDuration
		#LOC_kerbalru_rp1_contract_recordCrewedDuration_description = We want you to set a new space duration record! Keep your crew in space for at least @crewedTargetDuration and return home safely.
		#LOC_kerbalru_rp1_contract_recordCrewedDuration_completedMessage = Congratulations! You've set a new crewed duration record!
		#LOC_kerbalru_rp1_contract_recordCrewedAlt_title = Crewed Altitude Record of @crewedTargetAltitudeKM km.
		#LOC_kerbalru_rp1_contract_recordCrewedAlt_synopsis = Set a crewed altitude record of @crewedTargetAltitudeKM km.
		#LOC_kerbalru_rp1_contract_recordCrewedAlt_description = We want you to set a new crewed altitude record! Fly/rocket above @crewedTargetAltitudeKM km with crew aboard.
		#LOC_kerbalru_rp1_contract_recordCrewedAlt_completedMessage = Congratulations! You've set a new crewed altitude record!
		#LOC_kerbalru_rp1_contract_recordCrewedSpeed_title = Crewed Speed Record of @crewedTargetSpeed m/s.
		#LOC_kerbalru_rp1_contract_recordCrewedSpeed_synopsis = Set a crewed speed record of @crewedTargetSpeed m/s.
		#LOC_kerbalru_rp1_contract_recordCrewedSpeed_description = We want you to set a new crewed speed record! Fly/rocket above @crewedTargetSpeed m/s with crew aboard.
		#LOC_kerbalru_rp1_contract_recordCrewedSpeed_completedMessage = Congratulations! You've set a new crewed speed record!
		#LOC_kerbalru_rp1_contract_recordCrewedCount_title = Crew Count Record of @crewedTargetCount Crew
		#LOC_kerbalru_rp1_contract_recordCrewedCount_synopsis = Set a crew count record of @crewedTargetCount crew.
		#LOC_kerbalru_rp1_contract_recordCrewedCount_description = We want you to set a new crew count record! Have at least @crewedTargetCount crew on the same spacecraft/station at the same time.
		#LOC_kerbalru_rp1_contract_recordCrewedCount_completedMessage = Congratulations! You've set a new crew count record!
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBioOptional_title = Advanced Biological Suborbital Experiment
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBioOptional_synopsis = Launch a rocket with an advanced biological capsule and @payload units of Sounding Rocket Payload on a suborbital trajectory and recover them.
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBioOptional_description = <b>Program: Suborbital Research<br>Type: <color=blue>Optional</color></b><br><br>By training and launching a larger mammal in a capsule with recording instruments, we can test how astronauts might perform tasks under similar conditions. For instance, whether they'll be able to focus under the heavy G-loads, vibrations, and noise encountered during the launch into and recovery from orbit. <br>Carry an advanced biological capsule and @payload units of monitoring instrumentation on a suborbital trajectory, then recover the experiment.<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBioOptional_completedMessage = Well done! Our subject survived and our scientists are now examining it and the collected data!
		#LOC_kerbalru_rp1_contract_KarmanLine_title = Karman Line
		#LOC_kerbalru_rp1_contract_KarmanLine_synopsis = Pass the Karman line of 100 km with an uncrewed craft
		#LOC_kerbalru_rp1_contract_KarmanLine_description = <b>Program: Early Rocket Development or Suborbital Research<br>Type: <color=green>Required</color></b><br><br>The Karman line is the line at which the speed necessary to maintain altitude via lift is the same as the speed required for orbit. It's the traditional dividing line between the atmosphere and space (despite there being nonzero pressure well above it; Earth's atmosphere extends quite far indeed). We want you to send something above it!
		#LOC_kerbalru_rp1_contract_KarmanLine_completedMessage = Congratulations! You've reached space!
		#LOC_kerbalru_rp1_contract_first_FirstFlight_title = First Launch
		#LOC_kerbalru_rp1_contract_first_FirstFlight_synopsis = Launch a rocket or aircraft
		#LOC_kerbalru_rp1_contract_first_FirstFlight_description = <b>Program: Any starting program<br>Type: <color=blue>Optional</color></b><br><br>Congratulations on starting a new space program! For your first mission, you should launch your first vessel. Just design and build a vessel, roll it out to the pad (or the runway if it's an airplane), throttle up with "Z" and stage to take off! (And note all the records to break in the 'Active Contracts' tab. They update, so keep checking.) If you haven't already, look at the tutorial on the GitHub wiki for advice on this and other missions.
		#LOC_kerbalru_rp1_contract_first_FirstFlight_completedMessage = Congratulations! Your space program is off to a great start. Now it is time for some rocket science as you need to continue to go higher, faster, and farther.
		#LOC_kerbalru_rp1_contract_DistanceSoundingDifficult_title = Downrange Distance LV Development (Difficult)
		#LOC_kerbalru_rp1_contract_DistanceSoundingDifficult_synopsis = Launch a rocket with @/missionPayload.Print() units of Sounding Rocket Payload to a downrange distance of @/missionDistance.Print() km.
		#LOC_kerbalru_rp1_contract_DistanceSoundingDifficult_description = <b>Program: Early Rocket Development<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a rocket with @/missionPayload.Print() units of Sounding Rocket Payload to a downrange distance of @/missionDistance.Print() km. @RP0:soundingTankAdvice <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of Launch Vehicle development to utilize a gravity turn and tune your ascent profile and angle of attack. The current distance that your rocket has traveled can be seen in the contract parameters screen. It will update in real time. A better option is to use the MechJeb information called Downrange Distance. It can be added to any window using the Custom Window Editor and is found in the Flight Recorder section.<br><br><b><color="green">@RP0:f3BadAdvice</color></b><br><br>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_DistanceSounding</b>
		#LOC_kerbalru_rp1_contract_DistanceSoundingDifficult_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_SoundingRocketBio_title = First Low Space Biological Experimentation
		#LOC_kerbalru_rp1_contract_SoundingRocketBio_synopsis = Launch and recover a biological capsule and @payload units of scientific equipment from over @/altitudeKm km
		#LOC_kerbalru_rp1_contract_SoundingRocketBio_description = <b>Program: Suborbital Research<br>Type: <color=green>Required</color></b><br><br>Launching small mammals will prepare us for the monumental task of putting an astronaut into space. Carry a small biological capsule and @payload units of monitoring instrumentation above the Karman line, then recover the experiment. @RP0:soundingTankAdvice<br><br><color=white><b>After this contract has been completed, the 'Low Space Biological Experimentation' contract will become available.</b></color>
		#LOC_kerbalru_rp1_contract_SoundingRocketBio_completedMessage = Well done! Our scientists are now studying the sample to see the effects of the journey.
		#LOC_kerbalru_rp1_contract_Downrange_title = Downrange Milestone (5000 km)
		#LOC_kerbalru_rp1_contract_Downrange_synopsis = Travel 5000km or more downrange with an uncrewed craft carrying @/missionPayload.Print() units of Sounding Payload.
		#LOC_kerbalru_rp1_contract_Downrange_description = <b>Program: Early Rocket Development<br>Type: <color=red>CAPSTONE</color></b><br><br>Design, build, and launch a rocket that will travel 5000 km or more over ground while carrying @/missionPayload.Print() units of Sounding Payload. This challenge will require rather more delta-v than the 3000 km attempt. <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of launch vehicle development to tune your ascent profile and develop high-altitude staging methods. The current distance that your rocket has traveled can be seen in the contract parameters in the Contracts App display for this contract. It will update in real time. &br;&br;<b><color="green">@RP0:f3BadAdvice</color></b>
		#LOC_kerbalru_rp1_contract_Downrange_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_SuborbitalReturn_title = Reach a Suborbital Trajectory & Return (uncrewed)
		#LOC_kerbalru_rp1_contract_SuborbitalReturn_synopsis = Return a suborbital spacecraft safely to Earth
		#LOC_kerbalru_rp1_contract_SuborbitalReturn_description = <b>Program: Early Rocket Development<br>Type: <color=green>Required</color></b><br><br>As early as 1947 the U.S. was launching fruit flies into space on suborbital trajectories and recovering them, but it wasn't until 1951 that a monkey named Yorick and eleven mice were successfully recovered from an Aerobee flight. The Soviets preferred dogs and returned many from suborbital flights, the first two being Dezik and Tsygan in 1951 on top of an R-1. Although it is not a requirement to launch a biological capsule for this mission, it is a perfect opportunity to do so. Send a rocket out of the atmosphere (140 km) and return at least some of the craft back to Earth, intact, for study.
		#LOC_kerbalru_rp1_contract_SuborbitalReturn_completedMessage = Well Done! Our scientists are now studying the sample to see the reactions from the journey.
		#LOC_kerbalru_rp1_contract_DownrangeSoundingIntermediate_title = Downrange Distance LV Development (Intermediate)
		#LOC_kerbalru_rp1_contract_DownrangeSoundingIntermediate_synopsis = Launch a rocket with @/missionPayload.Print() units of Sounding Rocket Payload to a downrange distance of @/missionDistance.Print() km.
		#LOC_kerbalru_rp1_contract_DownrangeSoundingIntermediate_description = <b>Program: Early Rocket Development<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a rocket with @/missionPayload.Print() units of Sounding Rocket Payload to a downrange distance of @/missionDistance.Print() km. @RP0:soundingTankAdvice <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of Launch Vehicle development to utilize a gravity turn and tune your ascent profile and angle of attack. The current distance that your rocket has traveled can be seen in the contract parameters screen. It will update in real time. A better option is to use the MechJeb information called Downrange Distance. It can be added to any window using the Custom Window Editor and is found in the Flight Recorder section.<br><br><b><color="green">@RP0:f3BadAdvice</color></b><br><br>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_DistanceSounding</b>
		#LOC_kerbalru_rp1_contract_DownrangeSoundingIntermediate_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_DownrangeEarly_title = Downrange Milestone (3000 km)
		#LOC_kerbalru_rp1_contract_DownrangeEarly_synopsis = Travel 3000km or more downrange with an uncrewed craft
		#LOC_kerbalru_rp1_contract_DownrangeEarly_description = <b>Program: Early Rocket Development<br>Type: <color=green>Required</color></b><br><br>The challenge of orbit is not merely to go high, which has been shown by breaching the Karman line, but to achieve great horizontal speed. Design, build, and launch a rocket that will travel 3000 km or more over ground. Such a rocket is typically two stages (guided lower stage coupled with an unguided upper stage), has 6 km/s or more of delta-v, and is using upgraded engines, tanks, and/or avionics. Do this, and you will be halfway to orbit! <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of launch vehicle development to tune your ascent profile and develop high-altitude staging methods. The current distance that your rocket has traveled can be seen in the contract parameters in the Contracts App display for this contract. It will update in real time. &br;&br;<b><color="green">@RP0:f3BadAdvice</color></b>
		#LOC_kerbalru_rp1_contract_DownrangeEarly_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_SoundingIntermediate_title = Altitude Sounding Rocket (Intermediate)
		#LOC_kerbalru_rp1_contract_SoundingIntermediate_synopsis = Launch a sounding rocket with @/totalPayload.Print() units of payload to @/missionAltitude.Print() km.
		#LOC_kerbalru_rp1_contract_SoundingIntermediate_description = <b>Program: Suborbital Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a sounding rocket with @/totalPayload.Print() units of payload to @/missionAltitude.Print() km. @RP0:soundingTankAdvice<br><br>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_AltitudeSounding</b>
		#LOC_kerbalru_rp1_contract_SoundingIntermediate_completedMessage = Congratulations on a successful launch! The rocket has delivered the payload.
		#LOC_kerbalru_rp1_contract_SoundingDifficult_title = Altitude Sounding Rocket (Difficult)
		#LOC_kerbalru_rp1_contract_SoundingDifficult_synopsis = Launch a sounding rocket with @/totalPayload.Print() units of payload to @/missionAltitude.Print() km.
		#LOC_kerbalru_rp1_contract_SoundingDifficult_description = <b>Program: Suborbital Research<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a sounding rocket with @/totalPayload.Print() units of payload to @/missionAltitude.Print() km. @RP0:soundingTankAdvice<br><br>Once more than half of the expected days have been elapsed, the reward of this contract will slowly increase over time, but will be reset to 0 after each completion.&br;<b>Current reward is at @rewardFactorPercent % of its nominal value. Elapsed/Expected Days: @elapsedDays / @RP0:expectedDays_AltitudeSounding</b>
		#LOC_kerbalru_rp1_contract_SoundingDifficult_completedMessage = Congratulations on a successful launch! The rocket has delivered the payload.
		#LOC_kerbalru_rp1_contract_SoundingRocketBioOptional_title = Low Space Biological Experimentation
		#LOC_kerbalru_rp1_contract_SoundingRocketBioOptional_synopsis = Launch and recover a biological capsule and @payload units of scientific equipment from over @/altitudeKm km.
		#LOC_kerbalru_rp1_contract_SoundingRocketBioOptional_description = <b>Program: Suborbital Research<br>Type: <color=blue>Optional</color></b><br><br>Launching small mammals will prepare us for the monumental task of putting an astronaut into space. Carry a small biological capsule and @payload units of monitoring instrumentation above the Karman line, then recover the experiment. @RP0:soundingTankAdvice<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_SoundingRocketBioOptional_completedMessage = Well done! Our scientists are now studying the sample to see the effects of the journey.
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBio_title = First Advanced Biological Suborbital Experiment
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBio_synopsis = Launch a rocket with an advanced biological capsule and @payload units of Sounding Rocket Payload on a suborbital trajectory and recover them.
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBio_description = <b>Program: Suborbital Research<br>Type: <color=red>CAPSTONE</color></b><br><br>By training and launching a larger mammal in a capsule with recording instruments, we can test how astronauts might perform tasks under similar conditions. For instance, whether they'll be able to focus under the heavy G-loads, vibrations, and noise encountered during the launch into and recovery from orbit. <br>Carry an advanced biological capsule and @payload units of monitoring instrumentation on a suborbital trajectory, then recover the experiment.<br><br><color=white><b>After this contract has been completed, the 'Advanced Biological Suborbital Experiment' contract will become available.</b></color>
		#LOC_kerbalru_rp1_contract_SoundingRocketAdvancedBio_completedMessage = Well done! Our subject survived and our scientists are now examining it and the collected data!
		#LOC_kerbalru_rp1_contract_SoundingRocketFilm_title = First Low Space Film Return
		#LOC_kerbalru_rp1_contract_SoundingRocketFilm_synopsis = Launch a rocket with an early film camera above @/altitudeKm km and cover a downrange distance of @targetDistanceKM km, then return the film camera.
		#LOC_kerbalru_rp1_contract_SoundingRocketFilm_description = <b>Program: Suborbital Research<br>Type: <color=green>Required</color></b><br><br>V-2s launched by the U.S. from the White Sands Proving Grounds returned the first images of Earth from space. We need you to test emerging high-altitude photography technology. Design, build, and launch a rocket with a payload of bulky testing and stabilization equipment that will recover film imagery from just above the edge of space. @RP0:avionics50sAdvice<br><br><color=white><b>After this contract has been completed, 'Low Space Film Return' contract will become available.</b></color>
		#LOC_kerbalru_rp1_contract_SoundingRocketFilm_completedMessage = Excellent! Both the media and our scientists will be excited to see these lovely shots.
		#LOC_kerbalru_rp1_contract_SoundingRocketFilmOptional_title = Low Space Film Return
		#LOC_kerbalru_rp1_contract_SoundingRocketFilmOptional_synopsis = Launch a rocket with an early film camera above @/altitudeKm km and cover a downrange distance of @targetDistanceKM km, then return the film camera.
		#LOC_kerbalru_rp1_contract_SoundingRocketFilmOptional_description = <b>Program: Suborbital Research<br>Type: <color=blue>Optional</color></b><br><br>V-2s launched by the U.S. from the White Sands Proving Grounds returned the first images of Earth from space. We need you to test emerging high-altitude photography technology. Design, build, and launch a rocket with a payload of bulky testing and stabilization equipment that will recover film imagery from just above the edge of space. @RP0:avionics50sAdvice<br><br>This is a series of @maxCompletions contracts, of which @index have been completed.
		#LOC_kerbalru_rp1_contract_SoundingRocketFilmOptional_completedMessage = Excellent! Both the media and our scientists will be excited to see these lovely shots.
		#LOC_kerbalru_rp1_contract_FirstBioSat-Heavy_title = First Biological Satellite (400 kg)
		#LOC_kerbalru_rp1_contract_FirstBioSat-Heavy_synopsis = Launch a Bio Satellite into an eccentric orbit of Earth with an Advanced Biological Capsule.
		#LOC_kerbalru_rp1_contract_FirstBioSat-Heavy_description = <b>Program: Early Satellites (Heavy)<br>Type: <color=green>Required</color></b><br><br>Just putting an object in orbit is a stunt. Getting valuable scientific data from it is far more impressive.&br;&br;With the data returned from our sounding rockets, interesting radiation has been observed. We need you to send a scientific satellite into an eccentric orbit in order to study this data with more accuracy. Based on the best guesses of our scientists, having an apoapsis over 1500 km with a low periapsis will help us to learn more about the radiation surrounding Earth.&br;&br;<b><color="green">Make sure your craft contains an Advanced Biological Capsule Part and has a mass of at least 400 kg.</color></b>&br;&br;Real life examples: PS-2 (Sputnik 2)
		#LOC_kerbalru_rp1_contract_FirstBioSat-Heavy_completedMessage = Congratulations! The satellite you sent into orbit has returned extremely valuable data.
		#LOC_kerbalru_rp1_contract_FirstPolarSat-Heavy_title = First Polar Orbit Satellite (400 kg)
		#LOC_kerbalru_rp1_contract_FirstPolarSat-Heavy_synopsis = Launch a satellite into a Polar Orbit weighing at least 400 kg.
		#LOC_kerbalru_rp1_contract_FirstPolarSat-Heavy_description = <b>Program: Early Satellites (Heavy)<br>Type: <color=green>Required</color></b><br><br>A polar orbit is one in which a satellite passes above or nearly above both poles of the body being orbited on each revolution. It therefore has an inclination of (or very close to) 90 degrees to the equator. A satellite in a polar orbit will pass over the equator at a different longitude on each of its orbits. Place a satellite weighing at least 400 kg into a polar orbit so we can study the advantages in greater detail.
		#LOC_kerbalru_rp1_contract_FirstPolarSat-Heavy_completedMessage = Mission Success! The satellite is orbiting at a high inclination and it is giving our scientists ideas of how we can use this type of orbit.
		#LOC_kerbalru_rp1_contract_Downrange6000-Heavy_title = Downrange Milestone (6000 km)
		#LOC_kerbalru_rp1_contract_Downrange6000-Heavy_synopsis = Travel 6000 km or more downrange with an uncrewed craft carrying @/missionPayload.Print() units of Sounding Payload.
		#LOC_kerbalru_rp1_contract_Downrange6000-Heavy_description = <b>Program: Early Satellites (Heavy)<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a rocket that will travel 6000 km or more over ground while carrying @/missionPayload.Print() units of Sounding Payload. This challenge will require rather more delta-v than the 5000 km attempt. <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of launch vehicle development to tune your ascent profile and develop high-altitude staging methods. The current distance that your rocket has traveled can be seen in the contract parameters in the Contracts App display for this contract. It will update in real time. &br;&br;<b><color="green">@RP0:f3BadAdvice</color></b>
		#LOC_kerbalru_rp1_contract_Downrange6000-Heavy_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_Downrange7500-Heavy_title = Downrange Milestone (7500 km)
		#LOC_kerbalru_rp1_contract_Downrange7500-Heavy_synopsis = Travel 7500 km or more downrange with an uncrewed craft carrying @/missionPayload.Print() units of Sounding Payload.
		#LOC_kerbalru_rp1_contract_Downrange7500-Heavy_description = <b>Program: Early Satellites (Heavy)<br>Type: <color=blue>Optional</color></b><br><br>Design, build, and launch a rocket that will travel 7500 km or more over ground while carrying @/missionPayload.Print() units of Sounding Payload. This challenge will require rather more delta-v than the 6000 km attempt and will get you very close to an orbital capable rocket. <b><color="white">Your rocket must be suborbital (over 140 km) for the contract to be completed. @RP0:avionics50sAdvice</color></b> Perfecting this is part of launch vehicle development to tune your ascent profile and develop high-altitude staging methods. The current distance that your rocket has traveled can be seen in the contract parameters in the Contracts App display for this contract. It will update in real time. &br;&br;<b><color="green">@RP0:f3BadAdvice</color></b>
		#LOC_kerbalru_rp1_contract_Downrange7500-Heavy_completedMessage = Congratulations on a successful launch!
		#LOC_kerbalru_rp1_contract_FirstScienceSat-Heavy_title = First Scientific Satellite (1000 kg)
		#LOC_kerbalru_rp1_contract_FirstScienceSat-Heavy_synopsis = Launch a Scientific Satellite into an eccentric orbit of Earth with Cosmic Ray Science Experiments and a mass of at least 1000 kg.
		#LOC_kerbalru_rp1_contract_FirstScienceSat-Heavy_description = <b>Program: Early Satellites (Heavy)<br>Type: <color=green>Required</color></b><br><br>Just putting an object in orbit is a stunt. Getting valuable scientific data from it is far more impressive.&br;&br;With the data returned from our sounding rockets, interesting radiation has been observed. We need you to send a scientific satellite into an eccentric orbit in order to study this data with more accuracy. Based on the best guesses of our scientists, having an apoapsis over 1500 km with a low periapsis will help us to learn more about the radiation surrounding Earth.&br;&br;<b><color="green">Make sure your craft contains a Cosmic Ray Science experiment (Geiger-Muller Counter or Scintillation Counter) as we will need at least one day's worth of science returned from it. Be sure the mass of the craft is at least 1000 kg.</color></b>&br;&br;Real life examples: Object D (Sputnik 3)
		#LOC_kerbalru_rp1_contract_FirstScienceSat-Heavy_completedMessage = Congratulations! The satellite you sent into orbit has returned extremely valuable data that has proven the existence of the Van Allen Radiation Belts.
		#LOC_kerbalru_rp1_contract_FirstSatellite-Heavy_title = First Artificial Satellite (30 kg)
		#LOC_kerbalru_rp1_contract_FirstSatellite-Heavy_synopsis = Launch the first satellite into orbit of Earth
