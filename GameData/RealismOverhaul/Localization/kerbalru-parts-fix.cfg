Localization
{
	en-us
	{
		#LOC_kerbalru_RO_rangerSolarPanel_title = Ranger Solar Panel
		#LOC_kerbalru_RO_rangerSolarPanel_description = A hinged wing-like solar panel design that starts in an upright-folded position to better fit inside a fairing. Once deployed, it is locked into place and does not track the sun. Level 1, 1.4137m^2
		#LOC_kerbalru_RO_rangerSolarPanel_manufacturer = Jet Propulsion Laboratory

		#LOC_kerbalru_RO_FighterInlineCockpit_title = Jet Trainer Cockpit
		#LOC_kerbalru_RO_FighterInlineCockpit_description = A modern, streamlined, two-seater cockpit, designed for jet trainer aircraft. Max altitude 20 km.

		#LOC_kerbalru_RO_X1Cockpit_title = X-1 Cockpit
		#LOC_kerbalru_RO_X1Cockpit_description = A highly-streamlined cockpit for experimental planes. Rated for Mach 3 flight. Similar in role to the Bell X-1 Cockpit that was used to break the sound barrier.

		#LOC_kerbalru_RO_TinyTim_title = Tiny Tim Booster
		#LOC_kerbalru_RO_TinyTim_description = Small solid fueled booster originally used to power anti-shipping missiles during WW2. Used as the kick stage on the WAC Corporal, the USA's first sounding rocket, and reused in modified form for the Aerobee line of sounding rockets.
		#LOC_kerbalru_RO_TinyTim_manufacturer = CalTech

		#LOC_kerbalru_RO_probeVanguardXray_title = 20in X-Ray Detector
		#LOC_kerbalru_RO_probeVanguardXray_description = A small (0.5m) satellite designed to study the variation in solar X-ray radiation.
		#LOC_kerbalru_RO_probeVanguardXray_manufacturer = Naval Research Laboratory (NRL)

		#LOC_kerbalru_RO_probeAvionics0_81m_title = Able Avionics Package [0.813m]
		#LOC_kerbalru_RO_probeAvionics0_81m_description = An early avionics module capable of maintaining a pitch and roll program, used by small upper stages. Control lasts approximately a half hour. Allows full control over the vessel, up to the tonnage limit.
		#LOC_kerbalru_RO_probeAvionics0_81m_manufacturer = Honeywell Aerospace

		#LOC_kerbalru_RO_ROAdvCapsule_title = Advanced Command Pod
		#LOC_kerbalru_RO_ROAdvCapsule_description = A two-person pod. Features an offset Center of Mass to allow lifting reentry and an integrated bi-propellant Attitude Control System (ACS) for controlled reentries. Heat shield rated for LEO reentries.
		#LOC_kerbalru_RO_ROAdvCapsule_manufacturer = Generic

		#LOC_kerbalru_RO_OldFighterCockpit_title = P-40 Cockpit
		#LOC_kerbalru_RO_OldFighterCockpit_description = Basic single-seat inline cockpit.
	}
	ru
	{
		#LOC_kerbalru_RO_rangerSolarPanel_title = Солнечная панель «Ranger»
		#LOC_kerbalru_RO_rangerSolarPanel_description = Шарнирная солнечная панель крыльевого типа: в сложенном виде стоит вертикально для удобства размещения под обтекателем. После раскрытия фиксируется в одном положении и не отслеживает Солнце. Уровень 1, 1,4137 м².
		#LOC_kerbalru_RO_rangerSolarPanel_manufacturer = Лаборатория реактивного движения (JPL)

		#LOC_kerbalru_RO_FighterInlineCockpit_title = Кабина учебно-тренировочного самолёта
		#LOC_kerbalru_RO_FighterInlineCockpit_description = Современная обтекаемая двухместная кабина для учебно-тренировочных реактивных самолётов. Максимальная высота полёта — 20 км.

		#LOC_kerbalru_RO_X1Cockpit_title = Кабина X-1
		#LOC_kerbalru_RO_X1Cockpit_description = Максимально обтекаемая кабина для экспериментальных самолётов. Рассчитана на полёт со скоростью до 3М. По роли аналогична кабине Bell X-1, на котором впервые был преодолён звуковой барьер.

		#LOC_kerbalru_RO_TinyTim_title = Ускоритель «Tiny Tim»
		#LOC_kerbalru_RO_TinyTim_description = Небольшой твердотопливный ускоритель, изначально применявшийся в противокорабельных ракетах времён Второй мировой войны. Использовался как стартовый ускоритель на WAC Corporal — первой американской геофизической ракете, а также в изменённом виде на ракетах серии Aerobee.
		#LOC_kerbalru_RO_TinyTim_manufacturer = Caltech

		#LOC_kerbalru_RO_probeVanguardXray_title = 20-дюймовый рентгеновский детектор
		#LOC_kerbalru_RO_probeVanguardXray_description = Небольшой (0,5 м) спутник, предназначенный для изучения изменений солнечного рентгеновского излучения.
		#LOC_kerbalru_RO_probeVanguardXray_manufacturer = Военно-морская исследовательская лаборатория (NRL)

		#LOC_kerbalru_RO_probeAvionics0_81m_title = Авионика «Able» [0,813 м]
		#LOC_kerbalru_RO_probeAvionics0_81m_description = Ранний авионический модуль, способный выполнять программу по тангажу и крену; применялся на малых разгонных блоках. Работает около получаса. Даёт полный контроль над аппаратом в пределах ограничения по массе.
		#LOC_kerbalru_RO_probeAvionics0_81m_manufacturer = Honeywell Aerospace

		#LOC_kerbalru_RO_ROAdvCapsule_title = Продвинутая командная капсула
		#LOC_kerbalru_RO_ROAdvCapsule_description = Двухместная капсула. Смещённый центр масс обеспечивает планирующий спуск, встроенная двухкомпонентная система ориентации (ACS) — управляемый вход в атмосферу. Теплозащитный экран рассчитан на возврат с НОО.
		#LOC_kerbalru_RO_ROAdvCapsule_manufacturer = Универсальный

		#LOC_kerbalru_RO_OldFighterCockpit_title = Кабина P-40
		#LOC_kerbalru_RO_OldFighterCockpit_description = Простая одноместная кабина рядной компоновки.
	}
}
