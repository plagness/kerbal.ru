// ============================================================================
//  kerbalru-perf — ПРОФИЛЬ ПРОИЗВОДИТЕЛЬНОСТИ (вариант MAC: M1/Rosetta)
//  Канал B русификатора kerbal.ru. Кладётся в GameData/kerbalru-perf/.
//  Это MM-патчи НАШИХ настроек чужих визуал-модов (не сами моды).
//
//  Цель профиля mac (docs/PERFORMANCE.md §2.4–2.5, §3.2):
//    - режем самое дорогое на дохлом Apple OpenGL — РАЗРЕШЕНИЕ ТЕНЕЙ Scatterer
//      (8192 — один из самых дорогих параметров всей сборки);
//    - океан оставляем (визуально важен на взлёте с Земли), убираем лишь
//      каустику/лучи; сетку волн FFT снижаем 128→64;
//    - объёмные облака (layerVolume) НЕ трогаем — на 16 ГБ Mac они по силам
//      (док §2.5: mac = «оставить»), агрессивная резка — только deck-профиль;
//    - доключаем два перф-патча KSPCF (FewerSaves, SkipIndents).
//
//  ВСЕ имена узлов/ключей верифицированы по живой установке (см. пометки).
//  Значения — mac-колонки таблиц docs/PERFORMANCE.md §2.4–2.5, §3.2.
// ============================================================================


// ----------------------------------------------------------------------------
// 1) SCATTERER — GPU-тяжёлые эффекты
//    КОРНЕВОЙ узел верифицирован: "Scatterer_config" (НЕ "Scatterer"!)
//    по GameData/Scatterer/config/config.cfg (единственный такой узел в сборке).
//    Все ключи ниже присутствуют в этом узле — проверено построчно.
// ----------------------------------------------------------------------------
@Scatterer_config:FINAL
{
    // РАЗРЕШЕНИЕ ТЕНЕЙ: 8192 → 2048. Главный GPU/VRAM-выигрыш профиля.
    // Ключ верифицирован: config.cfg строка 44 "unifiedCamShadowResolutionOverride = 8192".
    // (dualCamShadowResolutionOverride уже =0 — второй путь неактивен, не трогаем.)
    @unifiedCamShadowResolutionOverride = 2048

    // Сетка Фурье океанских волн 128 → 64: грубее геометрия волн, дешевле.
    // Верифицирован: строка 52 "m_fourierGridSize = 128".
    @m_fourierGridSize = 64

    // Океанская каустика и подводные лучи — off (низкий-средний GPU-выигрыш,
    // почти незаметно на глаз). Океан-шейдеры на mac ОСТАВЛЯЕМ включёнными.
    // Верифицированы: строка 13 "oceanCaustics = True", строка 14 "oceanLightRays = True".
    @oceanCaustics = False
    @oceanLightRays = False

    // SMAA 2 → 1: чуть больше лесенки, дешевле пост-обработка.
    // Верифицирован: строка 32 "smaaQuality = 2".
    @smaaQuality = 1

    // terrainShadows уже = False (строка 39) — очень дорого, ДЕРЖИМ выключенным,
    // патч не нужен (оставлено как заметка).
}


// ----------------------------------------------------------------------------
// 2) EVE / RSSVE — объёмные облака (layerVolume)
//    На mac НЕ РЕЖЕМ (docs/PERFORMANCE.md §2.5, колонка Mac = «оставить»):
//    16 ГБ Mac тянет объёмку, а главный тормоз mac — тени (см. блок 1) и загрузка,
//    не овердро частиц. Консервативно: не ломаем визуал там, где выигрыш неясен.
//
//    Узлы для справки (ВЕРИФИЦИРОВАНЫ по
//    GameData/RSSVE/Configs/EVE_Configs/Clouds/RSSVE_Clouds_Config.cfg):
//      EVE_CLOUDS { OBJECT[EarthCloudsBase|MarsCloudsBase|TitanCloudsBase|VenusCloudsBase] { layerVolume {} } }
//    Они реально существуют (строки 94/251/551/664) — их режет deck-вариант.
//    Здесь патча нет намеренно.
// ----------------------------------------------------------------------------


// ----------------------------------------------------------------------------
// 3) KSPCommunityFixes — доключить перф-патчи
//    КОРНЕВОЙ узел верифицирован: "KSP_COMMUNITY_FIXES" (НЕ "KSPCommunityFixes"!)
//    по GameData/KSPCommunityFixes/Settings.cfg и по официальному примеру
//    GameData/KSPCommunityFixes/Extras/KSPCF_UserSettings.cfg.extra
//    (там патч-форма "@KSP_COMMUNITY_FIXES:AFTER[KSPCommunityFixes]").
//    :FINAL — чтобы перебить дефолт и любые патчи RO/RP-1 (у них тоже есть
//    KSPCommunityFixes.cfg). Оба ключа присутствуют и сейчас = false.
// ----------------------------------------------------------------------------
@KSP_COMMUNITY_FIXES:FINAL
{
    // Не писать автосейв при выходе из UI-зданий КЦ и удалении в Tracking Station.
    // Заметно меньше stutter в KSC-сцене. Верифицирован: Settings.cfg "FewerSaves = false".
    @FewerSaves = true

    // Пропускать отступы при записи сейвов/крафтов — быстрее запись, меньше
    // стоп-кадров при автосейве больших RP-1 сейвов.
    // Верифицирован: Settings.cfg "SkipIndentsOnSavesAndCraftFiles = false".
    @SkipIndentsOnSavesAndCraftFiles = true

    // Прим.: AsteroidAndCometDrillCache в этой сборке УЖЕ = true (проверено),
    // DisableManeuverTool УЖЕ = true — доключать нечего.
}
