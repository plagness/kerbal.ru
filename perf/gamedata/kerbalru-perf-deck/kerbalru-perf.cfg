// ============================================================================
//  kerbalru-perf — ПРОФИЛЬ ПРОИЗВОДИТЕЛЬНОСТИ (вариант DECK: слабый APU 15 Вт)
//  Также используется как generic-low (неизвестный Linux/Win десктоп):
//  консервативно-низкий, безопасный GPU-профиль без Deck-специфики питания.
//  Канал B русификатора kerbal.ru. Кладётся в GameData/kerbalru-perf/.
//
//  Цель профиля deck (docs/PERFORMANCE.md §2.4–2.5, §3.2):
//    - тени Scatterer в пол (8192→1024);
//    - ОКЕАН-ШЕЙДЕРЫ OFF целиком (плоский цвет воды) + пена/прозрачность off;
//    - объёмные облака (layerVolume) ВЫРЕЗАНЫ на Earth/Mars/Titan/Venus —
//      это овердро частиц на взлёте/посадке, самый заметный лаг на APU;
//    - low-res атмосфера, TAA off, SMAA вниз, затмения/тени колец off;
//    - те же два перф-патча KSPCF.
//
//  ВСЕ имена узлов/ключей верифицированы по живой установке (см. пометки).
//  Значения — deck-колонки таблиц docs/PERFORMANCE.md §2.4–2.5, §3.2.
// ============================================================================


// ----------------------------------------------------------------------------
// 1) SCATTERER — GPU-тяжёлые эффекты (режем сильнее всего)
//    КОРНЕВОЙ узел верифицирован: "Scatterer_config" (НЕ "Scatterer"!)
//    по GameData/Scatterer/config/config.cfg. Все ключи ниже присутствуют —
//    проверено построчно (номер строки указан у каждого).
// ----------------------------------------------------------------------------
@Scatterer_config:FINAL
{
    // РАЗРЕШЕНИЕ ТЕНЕЙ 8192 → 1024. Крупнейший GPU/VRAM-выигрыш. (строка 44)
    @unifiedCamShadowResolutionOverride = 1024

    // ОКЕАН-ШЕЙДЕРЫ OFF целиком: плоский цвет воды без волн/пены/преломления.
    // Высокий выигрыш на Deck (15 Вт APU). (строка 8 "useOceanShaders = True")
    @useOceanShaders = False

    // Пена и прозрачность/преломления воды off (океан всё равно выключен —
    // но гасим явно на случай включения океана пользователем). (строки 9,10)
    @oceanFoam = False
    @oceanTransparencyAndRefractions = False

    // Каустика и подводные лучи off. (строки 13,14)
    @oceanCaustics = False
    @oceanLightRays = False

    // Сетка Фурье волн 128 → 64. (строка 52)
    @m_fourierGridSize = 64

    // Low-res атмосферное рассеивание: half-res, мягче градиенты неба, дешевле.
    // (строка 54 "useLowResolutionAtmosphere = False")
    @useLowResolutionAtmosphere = True

    // Temporal AA off (чуть больше мерцания краёв, но дешевле). (строка 33)
    @useTemporalAntiAliasing = False

    // SMAA 2 → 1. (строка 32)
    @smaaQuality = 1

    // Затмения и тени колец off (косметика). (строки 26,27)
    @useEclipses = False
    @useRingShadows = False

    // terrainShadows уже = False (строка 39) — ДЕРЖИМ выключенным, патч не нужен.
}


// ----------------------------------------------------------------------------
// 2) EVE / RSSVE — ВЫРЕЗАЕМ объёмные облака (layerVolume)
//    Узлы ВЕРИФИЦИРОВАНЫ по
//    GameData/RSSVE/Configs/EVE_Configs/Clouds/RSSVE_Clouds_Config.cfg:
//      корень EVE_CLOUDS (строка 1) → OBJECT с name=<...>Base → блок layerVolume.
//    layerVolume присутствует ровно у 4 тел (проверено grep):
//      EarthCloudsBase (стр.94), MarsCloudsBase (стр.251),
//      TitanCloudsBase (стр.551), VenusCloudsBase (стр.664).
//    Удаление layerVolume безопасно: остаётся 2D-слой (как у Jupiter/Neptune/…,
//    у которых layerVolume и так нет).
//    @OBJECT[<name>] — MM индексирует OBJECT по полю name (у всех узлов оно есть).
// ----------------------------------------------------------------------------
@EVE_CLOUDS:FINAL
{
    @OBJECT[EarthCloudsBase]
    {
        !layerVolume {}                 // вырезать 3D-«клубы» у Земли (взлёт/посадка)
        @layer2D
        {
            @shadowMaterial { @_ShadowFactor = 0 }   // тень облаков на земле off (стр.91: 0.8)
        }
    }
    @OBJECT[MarsCloudsBase]
    {
        !layerVolume {}                 // Марс (стр.251)
        @layer2D
        {
            @shadowMaterial { @_ShadowFactor = 0 }   // (стр.248: 0.8)
        }
    }
    @OBJECT[TitanCloudsBase]
    {
        !layerVolume {}                 // Титан (стр.551)
        @layer2D
        {
            @shadowMaterial { @_ShadowFactor = 0 }   // (стр.548: 0.6)
        }
    }
    @OBJECT[VenusCloudsBase]
    {
        !layerVolume {}                 // Венера (стр.664)
        @layer2D
        {
            @shadowMaterial { @_ShadowFactor = 0 }   // (стр.661: 0.6)
        }
    }
}


// ----------------------------------------------------------------------------
// 3) KSPCommunityFixes — доключить перф-патчи
//    КОРНЕВОЙ узел верифицирован: "KSP_COMMUNITY_FIXES" (НЕ "KSPCommunityFixes"!)
//    по GameData/KSPCommunityFixes/Settings.cfg и официальному примеру
//    Extras/KSPCF_UserSettings.cfg.extra. :FINAL — перебить дефолт и патчи RO/RP-1.
// ----------------------------------------------------------------------------
@KSP_COMMUNITY_FIXES:FINAL
{
    @FewerSaves = true                          // Settings.cfg: было false — меньше stutter в КЦ
    @SkipIndentsOnSavesAndCraftFiles = true     // Settings.cfg: было false — быстрее запись сейвов
    // AsteroidAndCometDrillCache в сборке уже = true; DisableManeuverTool уже = true.
}
