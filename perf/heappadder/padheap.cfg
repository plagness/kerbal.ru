# padheap.cfg — kerbal.ru performance profile (channel A / HeapPadder)
#
# Назначение: заставить Mono держать больше свободной кучи, чтобы сборщик мусора
# (GC) срабатывал РЕЖЕ → меньше периодических stop-the-world микрофризов от
# Kerbalism и большого флота. См. docs/PERFORMANCE.md §3.1.
#
# ── РАСЧЁТ значения `total` ────────────────────────────────────────────────────
# `total` = сколько МЕГАБАЙТ памяти мод добавит к куче (по format.txt мода:
# "the last line is the total amount of memory (in megs) to be allocated").
#
#   HeapPadder default (4-8 ГБ ОЗУ) ........... total : 1024   (1 ГБ)
#   HeapPadder SuggestedFor_16g .............. total : 4096   (4 ГБ)  ← его авто-выбор на 16 ГБ!
#   НАШ выбор (RO/RSS на 16 ГБ ОБЩЕЙ памяти) . total :  512   (0.5 ГБ)
#
# Почему НЕ 4096 и не 1024:
# У этой сборки GameData ~7.6 ГБ, а на Mac M1 Pro 16 ГБ ОЗУ ДЕЛЯТСЯ с GPU и
# системой (unified memory). KSP-процесс под RSS уже держит 6-10 ГБ. Родной
# авто-пресет HeapPadder на 16 ГБ (4096 МБ) рассчитан на СТОКОВУЮ KSP с кучей
# свободной RAM — на нашей тяжёлой сборке он затолкает процесс в своп и станет
# ХУЖЕ. Поэтому берём консервативные 512 МБ (docs/PERFORMANCE.md §0, §3.1:
# "Начинать с ~512 МБ"). Диапазон здравого смысла — 512..768 МБ; поднимать до
# 768 только если по MemGraph видно высокий alloc rate И в Activity Monitor нет
# роста свопа. "Больше — лучше" здесь НЕ работает.
#
# ⚠️ ВАЖНО про формат (из "Config File Format.txt" мода): порядок и число строк
# менять НЕЛЬЗЯ — любое структурное изменение заставит мод проигнорировать файл
# и взять встроенный дефолт. Меняем ТОЛЬКО последнюю строку `total`. Ниже —
# штатная таблица блоков (идентична default_padheap.cfg / SuggestedFor_16g),
# тронут лишь `total`.
#
# Куда класть (после CKAN-install мода, ДО первого запуска игры):
#   HeapPadder → GameData/HeapPadder/PluginData/padheap.cfg
#   MemGraph   → GameData/MemGraph/PluginData/MemGraph/padheap.cfg
#   (формат один; путь зависит от того, какой мод поставлен — см. ckan-swaps.txt)
#
# Столбцы: <размер блока в байтах> : <вес/число блоков>. Последняя строка — total (МБ).
# ──────────────────────────────────────────────────────────────────────────────
