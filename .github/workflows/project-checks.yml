name: Project checks

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Unix installer
        run: bash -n install-ru.sh

      - name: Check PowerShell installer
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content install-ru.ps1 -Raw))

      - name: Check HTML JavaScript
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const html = fs.readFileSync('index.html', 'utf8');
          for (const match of html.matchAll(/<script>([\s\S]*?)<\/script>/g)) {
            new Function(match[1]);
          }
          const data = JSON.parse(fs.readFileSync('data/project.json', 'utf8'));
          const siteMods = data.site.modCatalog.map(mod => mod.id);
          if (siteMods.length !== data.inventory.kerbalRuMods) {
            throw new Error(`site catalog has ${siteMods.length} mods, expected ${data.inventory.kerbalRuMods}`);
          }
          for (const mod of siteMods) {
            if (!data.mods[mod]) throw new Error(`site mod has no project data: ${mod}`);
          }
          if (!html.includes("fetch('data/project.json'")) throw new Error('site does not load project data');
          if (!html.includes('renderModCatalog(data,active)')) throw new Error('site does not render the JSON mod catalog');
          if (!html.includes('renderInventory(data)')) throw new Error('site does not render the JSON inventory');
          if (!html.includes('[data-ui-translation]')) throw new Error('site does not render uiTranslation');
          console.log(`inline JavaScript, ${siteMods.length} dynamic mods and ${data.site.inventoryGroups.length} inventory groups: ok`);
          NODE

      - name: Check project data, Python and localization configs
        run: |
          python3 tools/sync_project_data.py --check
          python3 - <<'PY'
          import ast
          import re
          from pathlib import Path

          ast.parse(Path('tools/audit_ru_coverage.py').read_text(encoding='utf-8'))
          ast.parse(Path('tools/sync_project_data.py').read_text(encoding='utf-8'))
          ast.parse(Path('tools/bump_release.py').read_text(encoding='utf-8'))

          version = Path('VERSION').read_text(encoding='utf-8').strip()
          if not re.fullmatch(r'\d{2}\.[1-9]\d*', version):
              raise SystemExit(f'Invalid VERSION: {version!r}')

          configs = list(Path('GameData').rglob('*.cfg'))
          if not configs:
              raise SystemExit('No localization configs found')
          print(f'{len(configs)} localization configs found')
          PY

      - name: Validate localization structure
        run: python3 tools/validate_localization.py

      - name: Validate UI translation dictionaries
        run: python3 tools/ui-translator/validate_dict.py

      - name: Check local Markdown links
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          from urllib.parse import unquote

          missing = []
          for document in Path('.').rglob('*.md'):
              if '.git' in document.parts:
                  continue
              text = document.read_text(encoding='utf-8')
              for raw in re.findall(r'(?<!!)\[[^]]*\]\(([^)]+)\)', text):
                  target = raw.strip().split()[0].strip('<>')
                  if not target or target.startswith(('#', 'http://', 'https://', 'mailto:')):
                      continue
                  path_part = unquote(target.split('#', 1)[0].split('?', 1)[0])
                  resolved = (document.parent / path_part).resolve()
                  if not resolved.exists():
                      missing.append(f'{document}: {target}')
          if missing:
              raise SystemExit('Missing local links:\n' + '\n'.join(missing))
          print('local Markdown links: ok')
          PY
