		#LOC_ModularLaunchPads_AM_MLP_SoyuzLaunchBaseElevator_title = Soyuz Solo Crew Elevator with Hatches
		#LOC_ModularLaunchPads_AM_MLP_SoyuzLaunchBaseElevator_description = A separate version of the Soyuz Gantry crew elevator only. Elevator tower has 7 height options and two color options. The crew elevator pad's height, the walkway platform's height and platform extension's length can be adjusted with the deploy limit sliders. Optional transfer airlock can be turned on to allow crew boarding of a spacecraft inside a fairing via the crew transfer function. Hatches on the elevator car and at the bottom of the tower allow an alternate method of travel.
