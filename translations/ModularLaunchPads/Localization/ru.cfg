		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStand_title = Atlas Launch Stand
		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStand_description = A specialized launch stand for the Atlas SLV and derivatives from Bluedog Design Bureau, based on the real launch mount that the Atlas used. The stand has 8 color options, and the clamp arms and side umbilicals have 2 color options. The side umbilicals and Atlas pipe connectors can be toggled off for use with other 1.875m diameter rockets. The stand also has two manual generators that output electric charge and fuel resources. <b><color=green>From Modular Launch Pad mod</color></b>
		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStandAlt_title = Atlas Launch Stand Alternate
		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStandAlt_description = A modified version of the Atlas Launch Stand without a frame and with separately adjustable center and side section. The stand has 8 color options, and the clamp arms and side umbilicals have 2 color options. The side umbilicals and Atlas pipe connectors can be toggled off for use with other 1.875m diameter rockets. The stand also has two manual generators that output electric charge and fuel resources. <b><color=green>From Modular Launch Pad mod</color></b>
		#LOC_ModularLaunchPads_AM_MLP_LargeLaunchStand_title = Saturn IB Launch Stand
		#LOC_ModularLaunchPads_AM_MLP_LargeLaunchStand_description = A large launch stand styled after the concrete "stool" used at the original LC-34/37 for the Saturn I and IB rockets. Has switchable hold-down arm configurations in 4.25m, 3.75m, 3.125m, 2.5m and 1.875m. Integrated hold-down arms have switchable configurations, and can be turned off. Optional base block for the tower is available in four different positions. <b><color=green>From Modular Launch Pad mod</color></b>
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherBaseFree_title = Saturn Mobile Launcher Base - Free-Standing
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherBaseFree_description = This is the free-standing base for the Saturn Mobile Launcher. The base attaches to a free node in the center of a rocket's lower or core stage using the size 5 node at the top of the exhaust hole opening. The tower base section attaches to the size 5 node on the other end of the launcher base.  Includes a built-in decoupler and an elevator for crew access from the ground to the top deck. For best results, put the front legs so that they are inside the white part of the big circle on the VAB floor. No launch clamps are necessary. Includes a manually-activated generator for electric charge. The base's exhaust hole can be configured for three sizes of rockets: Saturn V (6.4/5.625m), SLS (5m) and the Saturn IB (4.25/3.75m), with various square and rectangular shapes for either single-core or tri-core rockets.  A variety of switchable hold-down arm support configurations are available, along with optional center-mount hold-down and Saturn V tail service mast attach nodes. <b><color=green>From Modular Launch Pad mod</color></b>
