		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerSwingArm8_description = Saturn Tower swing arm #8 for the Saturn V. This is the Service Module arm. It has only one size for 2.5m Apollo CSM parts. Two color options are available from the right-click menu.
