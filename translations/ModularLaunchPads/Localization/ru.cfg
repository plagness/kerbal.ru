		#LOC_ModularLaunchPads_AM_MLP_Delta4TowerArm1_title = Delta IV Swing Arm 1 - Core Tanks
		#LOC_ModularLaunchPads_AM_MLP_Delta4TowerArm1_description = Specialized animated swing arm for the Delta IV rocket. This is the lowest arm, which provides umbilicals for the core tanks. The arm's length and spread of the outer umbilical rails can be adjusted with the deploy limit sliders. The length of the umbilicals can also be separately adjusted, and the truss block spacers can be turned off as well, or the whole umbilical assembly can be turned off completely. The arm has 8 color options, and the two sets of arm pipes can be separately switched among 4 colors. Arm retraction is in only one direction.
