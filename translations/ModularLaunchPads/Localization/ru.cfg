		#LOC_ModularLaunchPads_AM_MLP_Atlas2UmbilicalArm1_title = Atlas-Centaur I/II Umbilical Arm 1
		#LOC_ModularLaunchPads_AM_MLP_Atlas2UmbilicalArm1_description = Animated retracting umbilical arm for the Atlas-Centaur I/II Service Tower. This is the upper arm, and the umbilicals are placed on the flared base of the 4m fairing that was also used with the Atlas V. Alternate straight-on umbilical ends are also available. This arm retracts to the left when looking at the rocket from the tower. The arm beam has 8 color options. The arm can be retracted either by manual toggling the animation or by staging.
