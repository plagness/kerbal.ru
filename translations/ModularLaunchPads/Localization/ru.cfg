		#LOC_ModularLaunchPads_AM_MLP_AtlasSepSideUmb_description = Separate standalone version of the Atlas Side Umbilical, for use with other launch bases and plates. The umbilical has 2 color options. The retraction animation can be be done manually or via staging.
		#LOC_ModularLaunchPads_AM_MLP_AtlasSepSideUmb_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_AtlasSepSideUmb_tags = atlas clamp pad base general hold cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmAgena_title = Atlas-Agena Umbilical Arm
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmAgena_description = Animated vertical retracting umbilical arm for the Atlas-Agena. Designed to mount on the Atlas-Agena Service Tower, but can be used with other towers as well. The arm's umbilical section has two height variants. It has four integrated animated drop umbilicals (with one being a pair), each with separate color options, and each can be turned off as well. Each umbilical is adjusted vertically and horizontally the associated deploy limit sliders. The arm also has 8 color options. The arm can be retracted either by manual toggling the animation or by staging. Use with the Atlas Launch Stand for best effect.
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmAgena_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmAgena_tags = atlas tower belle bossart swing cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur1_title = Centaur Separate Umbilical Arm 1 - Tall
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur1_description = Separate version of the tall animated vertical retracting umbilical arm for the Centaur upper stage used on the Atlas SLV-3 rocket, for attaching to the top plates or nodes of other towers. This arm normally straddled the Centaur tank-fairing junction. The arm beam has 8 color options. The arm can be retracted either by manual toggling the animation or by staging. The retractor device behind the arm can be toggled on/off.
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur1_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur1_tags = atlas inon tower bossart swing cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur2_title = Centaur Separate Umbilical Arm 2 - Short
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur2_description = Separate version of the short animated vertical retracting umbilical arm for the Centaur upper stage used on the Atlas SLV-3 rocket, for attaching to the top plates or nodes of other towers. This arm normally straddled the Centaur interstage-tank junction. The arm beam has 8 color options. The arm can be retracted either by manual toggling the animation or by staging. The retractor device behind the arm can be toggled on/off.
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur2_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur2_tags = atlas tower inon bossart swing cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower1_title = Atlas-Centaur Service Tower
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower1_description = A specialized single-piece service tower for the Atlas-SLV Centaur rocket. The tower section has 5 height options. The tower has 9 color options as well. Uses the separate Atlas-Centaur Umbilical Arms, which attaches to the node on the top of the tower.
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower1_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower1_tags = general atlas bossart centaur inon tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower2_title = Atlas-Centaur I/II Service Tower
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower2_description = A specialized single-piece service tower for the Atlas I and II rocket. The tower section has 4 height options and 9 color options as well. Uses the separate Atlas-Centaur I/II Umbilical Arms, which attach to the two nodes on the sides of the tower. The Atlas I/II Wind Damper Arm attaches to the lower center node. The uppermost node on the Mast 3 pipe is for a drop umbilical, there is a specialized Atlas I/II umbilical available but the general umbilicals will work also. There are also optional general arm attach nodes.
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower2_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_CentaurServiceTower2_tags = general atlas bossart centaur inon tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur_title = Atlas-Centaur Umbilical Arms
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur_description = Animated twin vertical retracting umbilical arms for the Centaur upper stage used on the Atlas SLV-3 rocket. The arms bracket the Centaur stage, with the bottom arm straddling the interdstage-tank division, and the upper arm stradding the tank-fairing junction. Designed to mount on the Atlas-Centaur Service Tower, but can be used with other towers as well. The whole arm frame assembly can be adjusted upward by using the offset gizmo for fine positioning. The upper tall arm (Arm 1) can be adjusted in both horizontal and vertical position using the deploy limit sliders. The lower flat arm can be adjusted horizontally with its slider. The arms and frame also have 8 color options. The arms can be retracted either by manual toggling the animation or by staging. Use with the Atlas Launch Stand for best effect.
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_AtlasUmbilicalArmCentaur_tags = atlas tower belle bossart swing cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorAtlasUmbilical_title = Crew Elevator Mercury-Atlas Umbilical
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorAtlasUmbilical_description = A special Mercury Spacecraft umbilical for the Mercury-Atlas Crew Elevator, which also doubled as the Launch Umbilical Tower. It attaches to the node on top of the pipe that sits just above the front platform of the elevator tower.  The umbilical can be adjusted in lenght with the deploy limit slider. Retraction can be done manually or via staging with Animated Decouplers.
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorAtlasUmbilical_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorAtlasUmbilical_tags = atlas bossart tower umbilical hermes mercury cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorAtlas_title = Crew Elevator Mercury-Atlas, with Hatch
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorAtlas_description = A crew access elevator for small manned spacecraft, inspired by the emergency egress and umbilical tower used for Mercury-Atlas and designed for the Tier 1 launch pad and the Atlas Launch Stand, but can be used with some other launch bases and stands.  The elevator tower is a fixed type, with 8 colors available. The stopping height of the elevator car is adjusted with a deploy limit slider. Use with the Mercury-Atlas Elevator Crew Walkway, which attaches to one of the front nodes, and flips up to retract. The separate Mercury Umbilical Mast attaches to a node on the front platform of the tower. Hatch on the elevator car allows an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorAtlas_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorAtlas_tags = atlas bossart mercury hermes tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorGemini_title = Crew Elevator Gemini, with Hatch
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorGemini_description = A crew access elevator for Gemini spacecraft, inspired by the erector used for the Titan II-Gemini. Designed for use with the mtaching Titan II Launch Stand, but also can be used with other Launch Stands, Plates and Bases.  The elevator tower fits around the Titan II or other rocket, with the access floor in the top white room fitting close to the capsule. Both the elevator car maximum height and the access floor height can be adjusted with their deploy limit sliders so they match up with each other. The elevator tower has three height variants, and is a downward rotating type, with an exterior elevator car. The front white panels on the tower can be retracted if desired. There is only one color option for the tower. Hatches on the elevator car allow an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorGemini_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorGemini_tags = titan prometheus gemini leo tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorMercury_title = Crew Elevator Mercury-Redstone, with Hatch
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorMercury_description = A crew access elevator for small manned spacecraft, inspired by the rollback gantry used for Mercury-Redstone and designed for the Tier 1 launch pad and the Redstone Launch Stand, but can be used with some other launch bases and stands.  The elevator tower is an animated rollback type, with 8 colors available. The stopping height of the elevator car is adjusted with a deploy limit slider. Hatch on the elevator car allows an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorMercury_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewElevatorMercury_tags = mercury hermes redstone etoh tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMercury_title = Crew Elevator Walkway Mercury-Atlas
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMercury_description = The flip-up crew access walkway for the Mercury-Atlas Crew Elevator. It also has optional mounts for use with the Mini and Small General Crew Elevators. It attaches to one of the front center nodes on the elevator tower. Has 8 color options and three configurations of the capsule hatch interface plate.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMercury_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMercury_tags = atlas bossart mercury hermes tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMini_title = Crew Elevator Walkway Mini
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMini_description = A short flip-up crew access walkway for the Mini General Crew Elevator. It attaches to one of the large center nodes on the elevator tower. Has 8 color options.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMini_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandCrewWalkwayMini_tags = atlas bossart mercury hermes tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_Delta4LaunchStand_title = Delta IV Launch Stand / 3.125m-2.5m
		#LOC_ModularLaunchPads_AM_MLP_Delta4LaunchStand_description = A specialty launch stand for the Delta IV rocket, both the single and triple-core versions. By default it is set up for the Delta IV from Bluedog Design Bureau, which has 3.125m diameter core tanks. By adjusting the positions and width of the umbilical masts and hold-down posts with the deploy limit sliders, tank sizes of 2.5m can be accomodated as well. The stand is designed to sit flush on the launch pad surface, so move the stand down until the dark band on the bottom of the large corner support columns is on or slightly extending into the floor of the VAB. The stand has two manual generators that output electric charge and fuel resources. Use with the Delta IV Service Tower for the full LC-37 Delta IV recreation.
		#LOC_ModularLaunchPads_AM_MLP_Delta4LaunchStand_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_Delta4LaunchStand_tags = clamp pad base general daleth cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerCore_title = Delta IV Modular Service Tower Core
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerCore_description = Stackable multi-height core section for the modular Delta IV service tower. It has six height options, and additional sections can be stacked by turning off the base frame. Optional side panels in three styles can be selected. The base frame has no colliders on it, so it can be pushed under the VAB floor to help align the tower with the Delta IV rocket.
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerCore_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerCore_tags = general daleth tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerTop_title = Delta IV Modular Service Tower Top
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerTop_description = Stackable top section for the modular Delta IV service tower. It has optional side panels in three styles. Both the Delta IV tower side detail and front truss structure can be toggled on or off. The attach node at top is for the Delta IV Swing Arm 3.
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerTop_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_Delta4ModTowerTop_tags = general daleth tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_Delta4ServiceTower_title = Delta IV Service Tower - Single Piece
		#LOC_ModularLaunchPads_AM_MLP_Delta4ServiceTower_description = A specialized service tower for the Delta IV, styled after the actual Delta IV Fixed Service Tower at the Cape. It has two height options, default Delta IV height and a 6m extended variant. The front part of the upper external trusswork can be turned off, which all replaces the default Delta IV swing arm nodes with 7 general-type nodes. The base frame has no colliders on it, so it can be pushed under the VAB floor to help align the tower with the Delta IV rocket.
		#LOC_ModularLaunchPads_AM_MLP_Delta4ServiceTower_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_Delta4ServiceTower_tags = general daleth tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStandRect_title = General Rectangular Launch Stand
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStandRect_description = A general rectangular node-attached launch clamp, intended for early career, that can accomodate rockets of 2.5m, 1.875m, 1.5m, 1.25m, 0.9375m and 0.625m diameters with two small side boosters. Center and optional outer hold-down support plates can be adjusted in length with their deploy limit sliders. There are different combinations of integrated hold-down bolts and clamp arms, each of which can be adjusted inwards with their deploy limit slider to align with the bottom of a tank or engine mount. The bolts can also be switched between short, tall and extended heights. The extended height bolts have an additional height adjust slider. The stand also has two manual generators that output electric charge and fuel resources.
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStandRect_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStandRect_tags = general clamp pad base cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStand_title = General Round Launch Stand
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStand_description = A general round node-attached launch clamp, intended for early career, that can accomodate rockets of 2.5m, 1.875m, 1.5m, 1.25m, 0.9375m and 0.625m diameters. The stand can be configured as the base flat ring or with a conical extension. Support plates for the integrated hold-downs are configured separately, allowing a mix of bolts and clamp arms. The hold-down bolts are non-animated and have 4 configurations and 3 heights, and can be adjusted inwards with their deploy limit slider to align with the bottom of a tank or engine mount. The extended height bolts have an additional height adjust slider. There are optional integrated side clamps available in different configurations, and are also adjusted with their deploy limit slider. The stand also has two manual generators that output electric charge and fuel resources.
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStand_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SmallLaunchStand_tags = general clamp pad base antares minotaur athena taurus falcon cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_JupiterPetalCover_title = Redstone Launch Stand Petal Cover / 1.5m
		#LOC_ModularLaunchPads_AM_MLP_JupiterPetalCover_description = Animated "petal" cover used for the deployed Jupiter IRBM sites. It is sized for 1.5m diameter rockets, namely the Jupiter from Bluedog Design Bureau. It attaches to an optional node in the Redstone Launch Stand; adjust the height until the base ring sits on the ground. The opening animation can be be done manually or via staging.
		#LOC_ModularLaunchPads_AM_MLP_JupiterPetalCover_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_JupiterPetalCover_tags = redstone stand jupiter juno chryslus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailLarge_title = Launch Rail 4 - Large Size
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailLarge_description = Add-on part for launch bases and stands that provides a rotatable launch rail for angled launching of rockets. This is the Large size rail, meant for larger rockets of size 1.25m and up.  Rockets are only surface-attached to the rail, and the rail has built-in a decoupler. The rail can also be switched between the default forward direction and reverse. Rotating the rail can be done with the B9PD switcher or optionally with Animated Attachment installed via the deploy limit slider animation.  The Animated Attachment method requires that the rail or launch base/stand be the root part in order to move the attached rocket. The rail part however can not be the root part after rotation or it will not decouple from the rocket. The rail can be rotated 100 degrees in the forward direction or 20 degrees in the reverse direction.
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailLarge_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailLarge_tags = general rail sounding cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMedium_title = Launch Rail 3 - Medium Size
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMedium_description = Add-on part for launch bases and stands that provides a rotatable launch rail for angled launching of rockets. This is the Medium size rail, meant for larger rockets of size 0.937m and up.  Rockets are only surface-attached to the rail, and the rail has built-in a decoupler. The rail can also be switched between the default forward direction and reverse. Rotating the rail can be done with the B9PD switcher or optionally with Animated Attachment installed via the deploy limit slider animation.  The Animated Attachment method requires that the rail or launch base/stand be the root part in order to move the attached rocket. The rail part however can not be the root part after rotation or it will not decouple from the rocket. The rail can be rotated 100 degrees in the forward direction or 20 degrees in the reverse direction.
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMedium_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMedium_tags = general sounding rail cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMini_title = Launch Rail 1 - Mini Size
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMini_description = Add-on part for launch bases and stands that provides a rotatable launch rail for angled launching of rockets. This is the Mini size rail (actually a rod), sized for 0.3125m and 0.625m rockets; the rod can be moved with the deploy limit slider.  Rockets can be only surface-attached to the rail, and the rail has a built-in decoupler. Rotating the rail can be done with the B9PD switcher or optionally with Animated Attachment installed via the deploy limit slider animation.  The Animated Attachment method requires that the rail or launch base/stand be the root part in order to move the attached rocket. The rail part however can not be the root part after rotation or it will not decouple from the rocket. The rail can be rotated 100 degrees in the forward direction or 20 degrees in the reverse direction.
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMini_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailMini_tags = general sounding rail cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailSmall_title = Launch Rail 2 - Small Size
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailSmall_description = Add-on part for launch bases and stands that provides a rotatable launch rail for angled launching of rockets. This is the Small size rail, meant for smaller rockets.  Rockets are only surface-attached to the rail, and the rail has built-in a decoupler. The rail can also be switched between the default forward direction and reverse. Rotating the rail can be done with the B9PD switcher or optionally with Animated Attachment installed via the deploy limit slider animation.  The Animated Attachment method requires that the rail or launch base/stand be the root part in order to move the attached rocket. The rail part however can not be the root part after rotation or it will not decouple from the rocket. The rail can be rotated 100 degrees in the forward direction or 20 degrees in the reverse direction.
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailSmall_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchRailSmall_tags = general rail sounding cck-modularlaunchpads
