		#LOC_ModularLaunchPads_AM_MLP_SoyuzLaunchBaseElevator_title = Отдельный лифт экипажа «Союз» с люками
		#LOC_ModularLaunchPads_AM_MLP_SoyuzLaunchBaseElevator_description = Отдельная версия только лифта экипажа фермы «Союз». Башня лифта имеет 7 вариантов высоты и два цвета. Высота площадки лифта, высота мостика и длина его удлинителя регулируются ползунками. Опциональный переходной шлюз позволяет посадку экипажа в корабль под обтекателем через функцию перевода экипажа. Люки в кабине лифта и у основания башни — альтернативный способ перемещения.
