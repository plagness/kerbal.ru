		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevator_title = Crew Elevator Large Base - 70m with Hatch
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevator_description = The base section for the Large General Crew Elevator tower with a 70m high elevator car. The separate elevator tower sections are attached to to the top. The base section has 8 color options and two toggleable styles of truss: General and Saturn types. Optional side panels in either 3 or 4-side configurations are also available. The elevator car's stopping height can be moved downward with the deploy limit slider. The elevator car can also be turned off. Hatch on the elevator car allows an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevator_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevator_tags = general pad launch stand tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeExt_title = Crew Elevator Large Side Extension
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeExt_description = A side-mount walkway extension section for the Large General Crew Elevator. It attaches to one of the center nodes on the front of a tower section, or onto the tower section's optional side nodes, or onto the top of a tower section. The top floor is accessible, and there are optional middle and bottom floors as well. The four walls can be independently switched off to creat different walkway types. The wall trusses have two switchable styles: General and Saturn types. Optional bottom brace beams can also be separately switched on. There are also 8 color options.
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeExt_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeExt_tags = pad launch stand general tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeSec1_title = Crew Elevator Large Section
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeSec1_description = A multi-height section for the Large General Crew Elevator tower, switchable between regular tower core and crew-access types. The section has 8 color options and two toggleable styles of truss: General and Saturn types. Optional side panels in multiple configurations are also available. The side pipes can also be turned off in different ways for use with the Extra Large General Crew Elevator.
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeSec1_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeSec1_tags = pad launch stand general tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeTop_title = Crew Elevator Large Top
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeTop_description = The top plate for the Large General Crew Elevator tower. The railings and an antenna mast can be toggled on or off.
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeTop_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_CrewElevatorLargeTop_tags = general base pad launch stand cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMini_title = Crew Elevator Mini Core with Hatch
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMini_description = The Core section of the Mini General Crew Elevator tower for use with all launch bases, with a 32.0m high elevator car. The core has three height options; add additional Mini Crew Elevator Tower Sections to increase the core's height. The front wall can be partial on, full on or off. Uses the Small General Crew Arm - Mini mount, the Mercury-Atlas Crew Walkway or the Mini Crew Walkway for crew access to a spacecraft. Also has 8 color options. Adjust the height of the elevator car downward with the deploy limit slider to match the height of the crew arm or walkway and to use with the Tier 1 launch pad. Hatch on the elevator car allows an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMini_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMini_tags = pad launch base stand tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMiniSec1_title = Crew Elevator Mini Section
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMiniSec1_description = Extra multi-height section for the Mini General Crew Elevator tower. Uses the Small General Crew Arm - Mini mount, the Mercury-Atlas Crew Walkway or the Mini Crew Walkway for crew access to a spacecraft. Also has 8 color options.
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMiniSec1_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorMiniSec1_tags = pad launch base stand tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorSmall_title = Crew Elevator Small Base with Hatch
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorSmall_description = The base section for the Small General Crew Elevator tower with a 50m high elevator car. The separate elevator tower sections are attached to to the top. The base section has 8 color options, and the front wall can be either partially turned off (leaving the horizontal beam), or fully removed, allowing a short elevator to be made for ground access to the deck of a launch base. The elevator car's stopping height can be moved downward with the deploy limit slider. The elevator car can also be turned off. Hatch on the elevator car allows an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorSmall_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevatorSmall_tags = general pad launch base stand tower cck-modularlaunchpads
