		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec1_description = Короткая 3-метровая секция для модульной версии башни «Титан II GLV» с опциональными деталями. Крепите секции-ядра к верху основания. У секции 3 опциональные площадки, опускаемые на 6м ползунками или отключаемые. Также можно включить конструктивную мачту-деталь и поднять её на 6м своим ползунком. Узлы кабель-мачт переключаются между типами «Титан II» и General.
