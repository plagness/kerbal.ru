		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewArm_title = Crew Access Arm Large - Large Mount
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewArm_description = The Large General Crew Access Arm with a mount sized for the Large General Crew Elevator, with three style variants. The arm can be retracted either to the right (default) or left (alternate) by toggling the swing direction button. There are 6 arm length variants, and the end section can be adjusted inward up to 2.5m with the deploy limit slider. The end section also has 3 types of pod hatch interfaces. There is also an optional "transfer airlock" that can be boarded and used to transfer crew to a spacecraft inside a fairing.
