		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerSwingArm0_description = Saturn Tower swing arm for the Saturn IB's first stage (called the S-IB). Two sizes for 3.75m and 4.25m tanks, and two color options are available from the right-click menu.
