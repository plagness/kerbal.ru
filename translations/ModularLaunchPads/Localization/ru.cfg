		#LOC_ModularLaunchPads_AM_MLP_ThorLaunchStand_description = Узловой зажим по образцу разных прижимных узлов ракет «Тор/Дельта/Дельта II», под ракеты диаметром 1.5м. Рассчитан вровень с землёй — опускайте, пока низ не окажется чуть ниже пола VAB. Три стиля: «Тор», «Дельта II» и мини с одними прижимными креплениями, 8 цветов. У каждого стиля три высоты прижимных болтов: короткая, высокая и сверхвысокая — последние две для вариантов с твердотопливными ускорителями. У болтов два положения: под двигатель BDB LR-79 (ранние «Тор» и «Дельта») или RS-27 (поздние «Дельта» и все «Дельта II»). Стенд имеет два ручных генератора: электроэнергии и топлива.
