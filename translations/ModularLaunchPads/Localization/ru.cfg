		#LOC_ModularLaunchPads_AM_MLP_TitanIILaunchStand_description = Специальный круглый узловой зажим на четырёх треногах для «Титан II» из Bluedog Design Bureau. Рассчитан вровень с верхом статической площадки — опускайте стенд, пока нижний край не окажется чуть ниже пола VAB. Прижимные болты на верхних блоках настраиваются под двигатель BDB LR-87 или стандартные баки 1.875м. Стенд имеет два ручных генератора: электроэнергии и топлива. Используйте с башней и лифтом «Титан II» для полной реконструкции LC-19.
