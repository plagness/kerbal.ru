		#LOC_ModularLaunchPads_AM_MLP_Delta4TowerArm2_description = Specialized animated swing arm for the Delta IV rocket. This is the middle arm, which provides umbilicals for the DCSS upper stage. The arm's length can be adjusted with the deploy limit slider. The length of the umbilical can also be adjusted.  The arm has 8 color options, and the two sets of arm pipes can be separately switched among 4 colors. Arm retraction is in only one direction.
