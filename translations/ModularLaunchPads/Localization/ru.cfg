		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevator2_title = Crew Elevator Extra Large Base - 130m with Hatch
		#LOC_ModularLaunchPads_AM_MLP_GeneralCrewElevator2_description = The base section for the Extra Large General Crew Elevator tower with a 130m high elevator car. The separate elevator tower sections are attached to to the top. The base section has 8 color options and optional side panels in multiple configurations; the panel color can also be changed. The elevator car's stopping height can be moved downward with the deploy limit slider. The elevator car can also be turned off. Hatch on the elevator car allows an alternate method of travel.
