		#LOC_ModularLaunchPads_AM_MLP_Delta4TowerArm3_title = Delta IV Swing Arm 3 - Fairing
		#LOC_ModularLaunchPads_AM_MLP_Delta4TowerArm3_description = Specialized animated swing arm for the Delta IV rocket. This is the upper arm, which provides umbilicals for the fairing. The arm's length and vertical angle can be adjusted with the deploy limit sliders. The length of the umbilical can also be adjusted.  The arm has 8 color options, and the two sets of arm pipes can be separately switched among 5 colors. Arm retraction is in only one direction.
		#LOC_ModularLaunchPads_AM_MLP_Delta4TowerArm3_manufacturer = Alphadyne Construction Group
