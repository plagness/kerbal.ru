		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6LaunchMount_title = Стартовое крепление SLC-6 Shuttle
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6LaunchMount_description = Малая стартовая база для «Шаттла», для небольших плоских площадок, по мотивам стартового крепления на площадке SLC-6 Ванденберга. База крепится к внешнему баку шаттла через большой центральный узел, требует свободного узла под центром бака для крепления. Обслуживающие башни крепятся к узлам по периметру базы. Прижимы ускорителей встроены в базу и регулируются ползунками. Хвостовые мачты шаттла крепятся по бокам квадратного выреза сопла — узлами или поверхностно. Вся база поворачивается переключателем, чтобы опоры стояли правильно.
