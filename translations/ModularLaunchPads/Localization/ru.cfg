		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerSwingArm7_description = Saturn Tower swing arm #7 for the Saturn V. This is the S-IVB Forward arm, which includes the LM umbilical. Two sizes for 3.75m and 4.25m tanks, and two color options are available from the right-click menu.
