		#LOC_ModularLaunchPads_AM_MLP_SoyuzLaunchBaseGantry_title = Soyuz Launch Base Gantry with Hatches
		#LOC_ModularLaunchPads_AM_MLP_SoyuzLaunchBaseGantry_description = Gantry arm assembly for the Soyuz Launch Base. Three color options are available.  It attaches to the auxiliary node in the center of the Soyuz base. There are multiple height options for the arms, and the full arms can be turned off so only the crew elevator is visible. The gantry platform stack has three height variants, and the whole stack can be moved down up to 2.4m with the deploy limit slider. The crew elevator pad's height, the walkway platform's height and platform extension's length can be adjusted with the deploy limit sliders. Optional transfer airlocks can be turned on to allow crew boarding of a spacecraft inside a fairing via the crew transfer function. Hatches on the elevator car and at the bottom of the tower allow an alternate method of travel.
