		#LOC_ModularLaunchPads_AM_MLP_VanguardLaunchStand_description = Специальный квадратный узловой зажим для «Авангарда» и «Скаута» из Bluedog Design Bureau. Центральный прижимной узел настраивается под закрытый двигатель BDB «Авангард» (2 типа), открытый двигатель/бак 0.9375м и бак 1.25м; узел можно отключить для других прижимов. Опциональные узлы для отдельной кабель-мачты «Редстоун» включаются по желанию. Стенд имеет два ручных генератора: электроэнергии и топлива. Используйте с башней «Авангард» для полной реконструкции LC-18A.
