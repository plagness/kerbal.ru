		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6LaunchMount_tags = площадка зажим sts платформа cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_title = Секция-ядро башни SLC-6 Shuttle
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_description = Нижняя секция-ядро башни SLC-6 Shuttle. Крепится к большому узлу сбоку от крепления SLC-6 Shuttle. Несколько вариантов высоты, два цвета. Боковой узел — для крепления интертанковой структуры SLC-6 Shuttle. Есть один лифт экипажа: сначала нужно опустить, затем можно поднимать. Максимальная высота остановки регулируется ползунком. Люк в кабине лифта — альтернативный способ перемещения.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_tags = площадка sts платформа cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_title = Секция экипажа башни SLC-6 Shuttle
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_description = Средняя секция экипажа башни SLC-6 Shuttle. Крепится к верху секции-ядра. Два варианта высоты доступа плюс опциональные дополнительные уровни ядра сверху. Включает регулируемый встроенный пол для совмещения с рукой экипажа SLC6 и орбитальным кораблём. Рука экипажа крепится к переднему узлу. Боковой узел — для интертанковой структуры SLC-6 Shuttle.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_tags = площадка sts платформа cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_title = Интертанковая структура башни SLC-6 Shuttle
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_description = Интертанковая структура для башни SLC-6 Shuttle. Крепится к одному из узлов на стороне башни напротив руки экипажа. Основная конструкция регулируется вбок ползунком. На ней устанавливалась только рука стравливания водорода, крепящаяся к узлу на конце конструкции.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_tags = площадка sts платформа cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_title = Верхняя мачта башни SLC-6 Shuttle
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_description = Мачта башни SLC-6 Shuttle. Крепится к узлу основания мачты верхней секции башни SLC-6. 2 цвета.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_manufacturer = Alphadyne Crane Systems
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_tags = башня общий пусковая sls fss cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_title = Верх башни SLC-6 Shuttle
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_description = Верхняя секция башни SLC-6 Shuttle. Крепится к верху секции экипажа. 3 варианта высоты, стандартная соответствует реальной башне. Основание мачты имеет 6 вариантов высоты, 4 из них соответствуют реальным. Рука стравливания LOX крепится к переднему верхнему узлу, мачта — к узлу на верху квадратного основания мачты.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_tags = площадка sts платформа cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_title = Рука доступа экипажа башни «Сатурн»
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_description = Рука доступа экипажа башни «Сатурн» для посадки в командный модуль. Длина руки рассчитана на модули 2.5м.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_tags = база площадка пусковая sarnus sls cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_title = Т-образный кран башни «Сатурн»
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_description = Отличительная черта башни «Сатурн» — этот Т-образный кран на самой вершине. Кран без функции подъёма груза, но поворачивается до 180° анимацией; установите предел поворота на 50 для поворота лишь на 90° в стартовое положение. При старте кран поворачивался на 90° по часовой стрелке. Также доступен серый вариант. Молниеотводная мачта сверху переключается между исходной мачтой «Сатурн» и новой мачтой «Шаттл» (впервые применённой при пуске ASTP «Сатурн IB»), либо отключается.
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_manufacturer = Alphadyne Crane Systems
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_tags = шаттл пусковая fss cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_title = «Milkstool» ПУ «Сатурн»
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_description = «Milkstool» — прозвище стенда, позволявшего «Сатурн IB-Аполлон» использовать стартовую кабельную башню «Сатурн V» на LC 39. С него стартовали три экипажа «Скайлэба» и корабль «Аполлон» по программе ЭПАС. В реальности он был серым, но доступен и альтернативный красный вариант. Крепите «Milkstool» к нижнему центральному узлу ракеты, затем базу пусковой установки — к нижнему узлу «Milkstool». Верхнее центральное кольцо переключает поддержку прижимных рук и расположение узлов. Есть встроенный разделитель для отделения «Milkstool» от ракеты при старте.
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_tags = база apollo sarnus sls cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_title = Хвостовая мачта пусковой установки «Сатурн»
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_description = Три такие хвостовые мачты располагались на базе пусковой установки, соединяясь с нижней частью ступени S-IC «Сатурн V», и отводились при старте. Их нужно ставить отдельно, крепя к узлам сразу за выходом пламени — две с одной стороны, одна с другой. Поверните их на 5° для правильного совмещения с S-IC.
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_tags = старт стенд площадка база прижим cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_title = Молниеотводная мачта башни «Сатурн»
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_description = Отдельная версия исходной молниеотводной мачты башни «Сатурн», крепившейся на Т-образном кране, для использования с другими башнями. На выбор красная или серая версия, монтажную плиту можно отключить.
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_manufacturer = Alphadyne Crane Systems
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_tags = sarnus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_title = Стартовый стенд «Milkstool» «Сатурн»
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_description = Автономная версия зажима «Milkstool» «Сатурн», с двумя вариантами высоты: обычный высокий и альтернативный короткий, оба с двумя цветами. Верхнее центральное кольцо переключает опорные площадки прижимных рук, регулируемые по горизонтали ползунком. Перила на кольце тоже можно отключить.
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_tags = база зажим apollo sarnus sls gojira tundra cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherClampBase_title = База ПУ «Сатурн»
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherClampBase_description = База мобильной пусковой установки «Сатурн». Крепится к свободному узлу в центре нижней или центральной ступени ракеты через узел размера 5 на верху выреза сопла. Секция основания башни крепится к узлу размера 5 на другом конце базы. Включает лифт для доступа экипажа с земли на верхнюю палубу. Для лучшего результата ставьте передние опоры внутри белой части большого круга на полу VAB. Включает генераторы электроэнергии и топлива с ручным запуском. Вырез сопла базы настраивается под три размера ракет: «Сатурн V» (6.4/5.625м), SLS (5м) и «Сатурн IB» (4.25/3.75м), с разными квадратными и прямоугольными формами для одно- или трёхблочных ракет. Доступны разные переключаемые конфигурации поддержки прижимных рук, а также опциональные узлы хвостовых мачт «Сатурн V».
