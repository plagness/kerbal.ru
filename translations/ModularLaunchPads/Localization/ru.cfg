		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerTopSection_title = Saturn Modular Tower Top Section
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerTopSection_description = The top section of the Saturn tower, with two color options: default red and alternate gray. An optional roof railing can be turned on if the hammerhead crane is not attached.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerTopSection_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerTopSection_tags = pad base launcher cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherFSSBase_title = Shuttle Modular FSS Tower Base, with Hatches
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherFSSBase_description = The base section for the Shuttle Launcher's Fixed Service Structure (FSS) tower. It ataches to a large node off to the side of the shuttle launcher base. Two different height variants allow it to be used with the stock Tier 2 launch pad or the LC-39 pad from KSC Extended. Base has two independent elevators with multiple height options; each elevator can alos be turned off. Elevators have to be brought down first, then can be raised. Adjust the maximum stopping height with the deploy limit slider. There are also optional side panels, with each side separately toggleable. Hatches on the elevator cars allow an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherFSSBase_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherFSSBase_tags = pad sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerMultiSection_title = Shuttle Modular FSS Tower Core Section
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerMultiSection_description = Modular multi-height core section of the Shuttle Launcher's FSS tower. Six heights of the section are available, each with two color options: default gray and alternate black and white. Nodes for attaching the Intertank Access Structure (only one is needed) are located on the right side of the tower core. There are also optional side panels, with each side separately toggleable.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerMultiSection_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerMultiSection_tags = pad base launcher sts buran spacex falcon cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewFloor_title = Shuttle Modular FSS Tower Crew Section Floor
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewFloor_description = A separate crew access floor for the crew access tower section of the Shuttle Launcher's FSS tower, used to provide access from the tower elevator to the crew access arm when a command pod's hatch does not align with the bottom of the crew access section. Attach the floor to the node in the elevator shaft of the crew access section, and adjust its height with the offset gizmo. The floor has three configurations: Shuttle Arm access, Rodan Arm access and Launch Platform access. The floor also has two color options, default gray and alternate black&white.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewFloor_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewFloor_tags = pad base launcher sts buran spacex falcon cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewSection_title = Shuttle Modular FSS Tower Crew Section
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewSection_description = Modular crew access section of the Shuttle Launcher's FSS tower, used to allow boarding of spacecraft via a crew access arm and the separate crew access floor. Section has two height options for greater room to align the arm and floor, and two color otions: default gray and alternate black and white. A separate crew access floor is attached to the node inside the section, which then can be moved up and down to align the floor with the elevator exit and the crew arm. There are also optional side panels, with each side separately toggleable.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewSection_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerCrewSection_tags = pad base launcher sts buran spacex falcon cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerTopSection_title = Shuttle Modular FSS Tower Top Section
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerTopSection_description = The top section of the Shuttle Launcher's FSS tower, with two color options: default gray and alternate black and white. A node for attaching the LOX Vent Arm (beanie cap) is located on mount rail on the front; the rail can also be turned off. There are also optional side panels, with each side separately toggleable.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerTopSection_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleTowerTopSection_tags = pad base launcher sts buran spacex falcon cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLaunchMount_title = Shuttle Launch Mount
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLaunchMount_description = Small size launch base for the Space Shuttle, made for smaller flat launch pads. The base attaches to the shuttle's External Tank via the large node in the center, and requires a free attach node below the center of the shuttle's External Tank in order to be attached.  Service towers are attached to the nodes around the outside of the mount. SRB hold-downs are integrated into the base and are adjusted with the deploy limit sliders. The shuttle tail service masts attach on the sides of the square main engine exhaust hole, either with the two nodes or by surface attach. The whole base can be rotated via the switcher to keep the support legs in the right place.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLaunchMount_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLaunchMount_tags = pad clamp sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherBaseClamp_title = Shuttle Launcher Platform Base
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherBaseClamp_description = This is the base for the Shuttle Launch Platform, and can be also used with an accurate SLS recreation. The base attaches to the shuttle's External Tank via the large node in the center, and requires a free attach node below the center of the shuttle's External Tank in order to be attached.  The base attaches to the SLS via the large attach node on the deck in the area of the SSME exhaust hole. The Fixed Service Structure Tower (FSS) base attaches to the large node off to the side of the launch base. The SLS tower base attaches to the 3rd large node opposite the SSME hole. There are 3 deck variants for different kinds of shuttle stacks and a 4th variant for the SLS. SRB hold-downs are integrated into the base and are adjusted with the deploy limit sliders. The shuttle tail service masts attach on the sides of the square main engine exhaust hole, either with the two nodes or by surface attach. The whole base can be rotated via the switcher to keep the support legs in the right place.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherBaseClamp_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherBaseClamp_tags = pad clamp sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSSHinge_title = Shuttle Rotating Service Structure Hinge
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSSHinge_description = The Hinge for the Shuttle Launcher Rotating Service Structure (RSS). The hinge attaches to a large node located on the FSS Tower's base section. The RSS itself is then attached to the hinge. The hinge has two color options, default gray and alternate black&white. The hinge details (the platforms and discs) can also be turned off.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSSHinge_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSSHinge_tags = pad launcher base sts platform tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSS_title = Shuttle Rotating Service Structure
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSS_description = The Rotating Service Structure (RSS) for the Shuttle Launcher Base, used to access and change out the orbiter's payload bay IRL; this version can not be used for that. It attaches to a large node located on the top of the RSS Hinge's central pole. The RSS support legs can be switched between the default height for the stock tier 3 pad and a shorter height for the larger LC-39 pad in Tundra's Space Center/KSC Extended. The RSS can be closed and rolled out via an animation...a slow animation, as this thing is huge after all!
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSS_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherRSS_tags = pad base sts platform tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherSRBHold_title = Shuttle Launcher SRB Hold-Down
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherSRBHold_description = Cosmetic hold-down assembly for the space shuttle's SRBs. These attach to the nodes in the launcher base's two SRB exhaust holes. Use mirror symmetry when attaching them to the nodes. They have animated retracting bolts.
