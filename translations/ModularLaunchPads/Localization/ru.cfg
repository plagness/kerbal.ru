		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStand_title = Стартовый стенд «Атлас»
		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStand_description = Специализированный стартовый стенд для РН «Атлас» и её вариантов из Bluedog Design Bureau, основан на реальном пусковом креплении «Атласа». У стенда 8 вариантов окраски, у зажимных рычагов и боковых кабель-мачт — по 2. Боковые кабель-мачты и трубопроводные разъёмы «Атласа» можно отключить для использования с другими ракетами диаметром 1,875 м. Стенд также имеет два ручных генератора электроэнергии и топлива. <b><color=green>Из мода Modular Launch Pad</color></b>
		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStandAlt_title = Стартовый стенд «Атлас» (альтернативный)
		#LOC_ModularLaunchPads_AM_MLP_AtlasLaunchStandAlt_description = Изменённая версия стартового стенда «Атлас» без рамы, с раздельно регулируемыми центральной и боковыми секциями. У стенда 8 вариантов окраски, у зажимных рычагов и боковых кабель-мачт — по 2. Боковые кабель-мачты и трубопроводные разъёмы «Атласа» можно отключить для использования с другими ракетами диаметром 1,875 м. Стенд также имеет два ручных генератора электроэнергии и топлива. <b><color=green>Из мода Modular Launch Pad</color></b>
		#LOC_ModularLaunchPads_AM_MLP_LargeLaunchStand_title = Стартовый стенд «Сатурн IB»
		#LOC_ModularLaunchPads_AM_MLP_LargeLaunchStand_description = Крупный стартовый стенд в стиле бетонного «табурета», использовавшегося на исторических площадках LC-34/37 для ракет «Сатурн I» и «Сатурн IB». Есть переключаемые конфигурации прижимных рычагов на 4,25 м, 3,75 м, 3,125 м, 2,5 м и 1,875 м. Встроенные прижимные рычаги переключаемы и могут отключаться. Опциональный базовый блок башни доступен в четырёх положениях. <b><color=green>Из мода Modular Launch Pad</color></b>
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherBaseFree_title = База мобильной пусковой установки «Сатурн» (отдельностоящая)
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherBaseFree_description = Отдельностоящая база мобильной пусковой установки «Сатурн». Крепится к свободному узлу в центре нижней или центральной ступени ракеты через узел размера 5 в верхней части выхлопного отверстия. Секция основания башни крепится к узлу размера 5 на другом конце базы установки. Включает встроенный отделитель и лифт для доступа экипажа с земли на верхнюю палубу. Для лучшего результата размещайте передние опоры так, чтобы они попадали в белую часть большого круга на полу VAB. Стартовые зажимы не нужны. Включает генератор электроэнергии с ручной активацией. Выхлопное отверстие базы настраивается под три размера ракет: «Сатурн V» (6,4/5,625 м), SLS (5 м) и «Сатурн IB» (4,25/3,75 м), с разными квадратными и прямоугольными формами для одноблочных и трёхблочных ракет. Доступны разные переключаемые конфигурации прижимных рычагов, а также опциональные узлы центрального прижима и хвостовой мачты обслуживания «Сатурн V». <b><color=green>Из мода Modular Launch Pad</color></b>
