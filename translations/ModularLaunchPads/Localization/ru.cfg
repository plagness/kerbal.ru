		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower1_title = Mini Modular Service Tower Type 1
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower1_description = A mini-size modular truss-type service tower for the launch stands and smaller rockets, with 3 height options. Additional tower sections can be stacked to create taller towers, with the base pad turned off.  There are also optional side panels available in multiple configurations. The tower section has 8 color options as well. Uses the separate Small Drop Umbilicals which are node-attached to the front of the tower.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower1_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower1_tags = general redstone vanguard jupiter juno thor delta scout cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower2_title = Mini Modular Service Tower Type 2
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower2_description = A mini-size modular pole-type service tower for the launch stands and smaller rockets, with 3 height options. There are 2 pole width options and 3 styles of pole details. The sections can be stacked in various ways to create taller towers, with the base pad disabled on the additional sections; the large size sections go on the bottom part of the tower. The tower sections have 8 color options as well. Uses the separate Small Drop Umbilicals which are node-attached to the front of the tower.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower2_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower2_tags = general minotaur athena taurus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower3_title = Mini Modular Service Tower Type 3
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower3_description = An alternate mini-size modular truss-type service tower for the launch stands and smaller rockets, with 3 height options. Additional tower sections can be stacked to create taller towers, with the base pad turned off.  There are also optional platforms available in multiple configurations. The tower section has 8 color options as well. Uses the separate Small Drop Umbilicals which are node-attached to the front of the tower.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower3_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower3_tags = titan prometheus thor delta cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower4_title = Mini Modular Service Tower Type 4
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower4_description = A mini-size modular truss-type service tower with two style variants. The tower section has 6 height options, and the base pad can be turned off, allowing multiple sections to be stacked for a taller tower. The front details can be toggled off in different ways to have a space for the Atlas-Agena Umbilical Arm to retract into. The tower section has 8 color options as well. Uses the separate Small Drop Umbilicals which are node-attached to the front of the tower.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower4_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandServiceTower4_tags = general atlas bossart agena belle centaur inon tower cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_RedstoneLaunchStand_title = Redstone Launch Stand / 1.25m, 1.5m
		#LOC_ModularLaunchPads_AM_MLP_RedstoneLaunchStand_description = A specialty round node-attached launch clamp designed for the Redstone rocket from Bluedog Design Bureau, but also with optional hold-down bolt positions for standard 1.25m and 1.5m fuel tanks. There is also an integrated version of the Redstone Umbilical Pole, available in 6 heights at either 1.25m and 1.5m tank positions. The pole is dropped with the launch clamp release. The stand has two manual generators that output electric charge and fuel resources.
		#LOC_ModularLaunchPads_AM_MLP_RedstoneLaunchStand_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_RedstoneLaunchStand_tags = clamp pad base redstone etoh jupiter juno vangaurd delta thor athena minotaur taurus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandSmallPole_title = Redstone Umbilical Pole
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandSmallPole_description = A separate version of the animated fallback umbilical pole from the Redstone Launch Stand.  The pole has 9 height options and the umbilical at the end has three length variants. Drop the pole either by manual toggling the animation or by staging.
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandSmallPole_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_LaunchStandSmallPole_tags = clamp pad base tower umbilical mercury hermes redstone etoh jupiter juno cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnLaunchStandPedestal_title = Saturn IB Launch Stand Tower Pedestal
		#LOC_ModularLaunchPads_AM_MLP_SaturnLaunchStandPedestal_description = The optional tower pedestal for the Saturn Launch Stand, upon which the service tower was mounted. It attaches to one of the nodes around the Saturn Launch Stand. It is not a launch clamp, so it only has a fixed height. There is a working ladder on the front side.
		#LOC_ModularLaunchPads_AM_MLP_SaturnLaunchStandPedestal_manufacturer = Alphadyne Construction Company
		#LOC_ModularLaunchPads_AM_MLP_SaturnLaunchStandPedestal_tags = base tower general pad saturn sarnus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ThorLaunchStand_title = Thor/Delta/Delta II Launch Stand / 1.5m
		#LOC_ModularLaunchPads_AM_MLP_ThorLaunchStand_description = Node-attached launch clamp styled after various hold-down assemblies used by the Thor/Delta/Delta II rockets, sized for 1.5m diameter rockets. It is designed to sit flush with the ground, so move it down so the bottom sits slightly below the VAB floor. It has three style variants: Thor type, Delta II type and a mini type with just the hold-down mounts, and 8 color options. Each style has three hold-down bolt height options: short, tall and extra-tall, the latter two for use with SRB-using Thor/Delta variants. The bolts have two position options, either for the BDB LR-79 engine (early Thors and Deltas) or the RS-27 engine (later Deltas and all Delta IIs). The stand has two manual generators that output electric charge and fuel resources.
		#LOC_ModularLaunchPads_AM_MLP_ThorLaunchStand_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ThorLaunchStand_tags = clamp pad base general delta thor jupiter juno athena minotaur taurus fenris daleth cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ThorServiceTowerFallback_title = Thor/Delta Service Tower - Fallback Type
		#LOC_ModularLaunchPads_AM_MLP_ThorServiceTowerFallback_description = Animated fallback tower for the Thor-Able/Delta rockets, though it was most used with the Able-derived upper stages (Able, Ablestar and Delta).  It has three integrated animated drop umbilicals, each with separate color options, and each can be turned off as well. Each umbilical is adjusted vertically and horizontally the associated deploy limit sliders. The tower also has 9 color options. The tower can be retracted either by manual toggling the animation or by staging. Use with the Thor/Delta Launch Stand for best effect.
		#LOC_ModularLaunchPads_AM_MLP_ThorServiceTowerFallback_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ThorServiceTowerFallback_tags = clamp pad base thor delta fenris daleth jupiter juno cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_Titan3LaunchStand_title = Titan III Launch Stand / 1.875m
		#LOC_ModularLaunchPads_AM_MLP_Titan3LaunchStand_description = A specialty launch stand for the Titan III and Titan IV, inspired by the real one.  The center section can be switched between Titan II style (flat) and Titan IV style (elevated). Integrated hold-down bolts in short and tall variants for both the core and side boosters can be adjusted with the deploy limit sliders or separately turned off. The 4-corner support columns and the side wheels can be separately turned on/off. Special attach nodes for the Titan III Auxiliary Mast and Service Tower are located on the stand proper; other attach nodes are also available. The stand also has two manual generators that output electric charge and fuel resources, and 8 color options are available.
		#LOC_ModularLaunchPads_AM_MLP_Titan3LaunchStand_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_Titan3LaunchStand_tags = clamp pad base Titan Prometheus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIILaunchStand_title = Titan II Launch Stand / 1.875m
		#LOC_ModularLaunchPads_AM_MLP_TitanIILaunchStand_description = A specialty round quad-tripod node-attached launch clamp designed for the Titan II rocket from Bluedog Design Bureau. It's meant to sit flush with the top of the static launch pad, so move the stand down until the bottom edge is just below the floor of the VAB. The hold-down bolts on the top blocks have configurations for the BDB LR-87 engine or standard 1.875m tanks. The stand has two manual generators that output electric charge and fuel resources. Use with the Titan II Service Tower and Titan II Crew Elevator for the full LC-19 recreation.
		#LOC_ModularLaunchPads_AM_MLP_TitanIILaunchStand_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIILaunchStand_tags = clamp pad base general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerMast_title = Titan II Service Tower Mast
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerMast_description = The antenna mast for the Titan II GLV Service Tower. It attaches to a small node on the top of the tower, on the top of the arm mount rail.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerMast_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerMast_tags = general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModBase_title = Titan II Modular Service Tower Base
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModBase_description = The base section for the modular version of the Titan II GLV Service Tower. Attach the tower core sections to the top of the base.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModBase_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModBase_tags = general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec1_title = Titan II Modular Service Tower Detail Section
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec1_description = The 3m short section for the modular version of the Titan II GLV Service Tower with optional details. Attach the tower core sections to the top of the base. The section has 3 optional platforms that can be moved down up to 6m using the deploy limit sliders, or be turned off. A structural detail pole also can be turned on and moved up 6m with its deploy limit slider. Umbilical attach nodes can be toggled between the Titan II Tower and General types.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec1_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec1_tags = general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec2_title = Titan II Modular Service Tower Core Section
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec2_description = The multi-height core section for the modular version of the Titan II GLV Service Tower. Attach the tower core sections to the top of the base. There are 4 height options for the core section. Umbilical attach nodes can be toggled between the Titan II Tower and General types.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec2_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModSec2_tags = general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModTop_title = Titan II Modular Service Tower Top
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModTop_description = The top section for the modular version of the Titan II GLV Service Tower. Attach to the top node of a core section. Umbilical attach node can be toggled between the Titan II Tower and General types. There is also an attach node on top of the umbilical mount rail for the Titan II Tower Mast.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModTop_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerModTop_tags = general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerSingle_title = Titan II Service Tower - Single Piece
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerSingle_description = A single-piece version of the Titan II GLV Service Tower, sized and customized for the Bluedog Design Bureaau Titan II GLV rocket. Uses separate Titan II Tower umbilicals or the General Umbilicals. Use with the Titan II Launch Stand for the full LC-19 recreation.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerSingle_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerSingle_tags = general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem_title = Titan II Umbilical Gemini - Straight Style
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem_description = A special Gemini Spacecraft umbilical for the Titan II GLV Service Tower. It attaches to the top of the large angled arm style of the Titan II Tower Umbilical. Umbilical pipe is adjustable in length using the deploy limit slider.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem_tags = tower umbilical titan prometheus gemini leo cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical_title = Titan II Umbilical - Straight Style
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical_description = A custom umbilical for the Titan II GLV Service Tower, with three switchable arm styles. For reference, from the top down, there were two large angled arms, then two large straight arms, then a small beam arm, then at the bottom another large straight arm. The separate Gemini Spacecraft umbilical attaches to the top of the large angled arm style. Umbilical pipe is adjustable in length using the deploy limit slider.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical_tags = tower umbilical titan prometheus gemini leo cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem2_title = Titan II Umbilical Gemini - Droop Style
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem2_description = A special droop-style Gemini Spacecraft umbilical for the Titan II GLV Service Tower. It attaches to the top of the large angled arm style of the Titan II Tower Umbilical. Umbilical has an extension tube that is adjustable in length using the deploy limit slider.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem2_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilicalGem2_tags = tower umbilical titan prometheus gemini leo cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical2_title = Titan II Umbilical - Droop Style
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical2_description = A custom droop-style umbilical for the Titan II GLV Service Tower, with three switchable arm styles. For reference, from the top down, there were two large angled arms, then two large straight arms, then a small beam arm, then at the bottom another large straight arm. The separate Gemini Spacecraft umbilical attaches to the top of the large angled arm style. Umbilical has an extension tube that is adjustable in length using the deploy limit slider.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical2_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIServiceTowerUmbilical2_tags = tower umbilical titan prometheus gemini leo cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_TitanIIITowerMast_title = Titan III Mast
		#LOC_ModularLaunchPads_AM_MLP_TitanIIITowerMast_description = The auxiliary structure used for the Titan II and IV, mounted on the mobile launch platform and positioned to be directly in front of the main fixed tower. The mast has multiple height variants and 8 color options. The top portion can be swutched between the older solid structure type, the later open-truss type, and the open-truss with a small plate on the front. The center trusses have attach nodes for attaching umbilicals and swing arms if desired.
		#LOC_ModularLaunchPads_AM_MLP_TitanIIITowerMast_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_TitanIIITowerMast_tags = general prometheus titan cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_VanguardLaunchStand_title = Vanguard Launch Stand / 0.9375m
		#LOC_ModularLaunchPads_AM_MLP_VanguardLaunchStand_description = A specialty square node-attached launch clamp designed for the Vanguard and Scout rockets from Bluedog Design Bureau. The hold-down structure in the center has configurations for the BDB Vanguard shrouded engine (2 types), bare engine/0.9375m tank and 1.25m tank; the structure can also be turned off so other hold-downs can be used instead. Optional nodes for the separate Redstone Umbilical Pole can be turned on. The stand has two manual generators that output electric charge and fuel resources. Use with the Vanguard Service Tower for the full LC-18A recreation.
		#LOC_ModularLaunchPads_AM_MLP_VanguardLaunchStand_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_VanguardLaunchStand_tags = clamp pad base vanguard viklun scout cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_VanguardServiceTower_title = Vanguard Service Tower
		#LOC_ModularLaunchPads_AM_MLP_VanguardServiceTower_description = The companion service tower for the Vanguard Launch Stand, attaching to one of the outer nodes. The tower is sized for the BDB Vanguard rocket with the stand placed at ground level, with half-height (9m) and full-height (18m) variants. The base frame and top beam can be toggled off to allow stacking of multiple tower sections. The front detail structure can also be turned off. 9 color options are also available. Uses separate umbilicals which are node-attached.
		#LOC_ModularLaunchPads_AM_MLP_VanguardServiceTower_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_VanguardServiceTower_tags = tower vanguard viklun scout cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnIB_title = Saturn Launcher Hold-Down - Saturn IB
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnIB_description = Saturn IB animated retracting hold-down arm. Eight were used on the Milkstool, with the arm positioned at the base of the fin. Retraction can be done manually or by staging with Animated Decouplers.
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnIB_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnIB_tags = launch stand pad base sarnus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnV_title = Saturn Launcher Hold-Down - Saturn V
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnV_description = Saturn V animated retracting hold-down arm. Four were used on the Saturn Launcher Base, placed in between the F-1 engine fairings. Retraction can be done manually or by staging with Animated Decouplers.
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnV_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_HoldArmSaturnV_tags = launch stand pad base cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerLOXArm_title = SLC-6 Shuttle Tower Arm: LOX Vent
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerLOXArm_description = The "beanie cap" Liquid Oxygen Vent Arm for the SLC-6 shuttle tower. Has 3 color variants; the IRL arm was still mostly gray with some red beams at the rear. The arm is attached to a node on the front of top section, not on the square-sided mast base, with the cap centered over the top of the shuttle's External Tank and almost touching the tank. The arm was retracted at around the T-2 minute point in the countdown.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerLOXArm_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerLOXArm_tags = pad base launcher sts buran cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrewArm_title = SLC-6 Shuttle Tower Crew Access Arm
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrewArm_description = Crew access arm for the SLC-6 Shuttle tower, allowing for crew boarding of the orbiter. It is attached to a node on the front of SLC-6 tower crew section, with the walkway lining up with the orbiter's hatch. The arm retracts backwards into the tower, it does not swing.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrewArm_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrewArm_tags = pad base launcher sts buran cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6LaunchMount_title = SLC-6 Shuttle Launch Mount
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6LaunchMount_description = Small size launch base for the Space Shuttle, made for smaller flat launch pads, and inspired by the launch mount for the shuttle at Vandenberg's SLC-6 pad. The base attaches to the shuttle's External Tank via the large node in the center, and requires a free attach node below the center of the shuttle's External Tank in order to be attached.  Service towers are attached to the nodes around the outside of the mount. SRB hold-downs are integrated into the base and are adjusted with the deploy limit sliders. The shuttle tail service masts attach on the sides of the square main engine exhaust hole, either with the two nodes or by surface attach. The whole base can be rotated via the switcher to keep the support legs in the right place.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6LaunchMount_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6LaunchMount_tags = pad clamp sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_title = SLC-6 Shuttle Tower Core Section
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_description = The core (lower) section for the SLC6 Shuttle tower. It ataches to a large node off to the side of the SLC6 Shuttle Launch Mount. Has multiple height variants, and two color options. A node on the side is for attaching the SLC-6 Shuttle Intertank Structure. Has one crew elevator, which has to be brought down first, then can be raised. Adjust the maximum stopping height with the deploy limit slider. A hatch on the elevator car allows an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCore_tags = pad sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_title = SLC-6 Shuttle Tower Crew Section
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_description = The crew (middle) section for the SLC6 Shuttle tower. It ataches to the top of the core section. Has two crew access height variants plus optional extra core levels on top. Includes an adjustable integrated floor to align with the SLC6 crew arm and the orbiter. The crew arm attaces to the node on the front. A node on the side is for attaching the SLC-6 Shuttle Intertank Structure.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrew_tags = pad sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_title = SLC-6 Shuttle Tower Intertank Structure
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_description = The Intertank Structure for the SLC-6 shuttle tower. It attaches to one of the nodes on the side of the tower opposite the crew arm. The main structure can be adjusted sideways with the deploy limit slider. The one thing that was mounted on this structure was the Hydrogen Vent Arm, which attaches to the node at the end of the main structure.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerIntertank_tags = pad sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_title = SLC-6 Shuttle Tower Top Mast
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_description = This is the SLC-6 Shuttle tower mast. It attaches to the node on the SLC-6 Tower Top Section's Mast Base. Has 2 color options.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_manufacturer = Alphadyne Crane Systems
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerMast_tags = tower general launcher sls fss cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_title = SLC-6 Shuttle Tower Top
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_description = The top (upper) section for the SLC6 Shuttle tower. It attaches to the top of the crew section. Has 3 height variants, though the default height matches the IRL tower. The mast base has 6 height variants, with 4x matching the IRL one. The LOX Vent Arm attaches to the node in the top front, while the mast attaches to the node on top of the square-sided mast base.
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerTop_tags = pad sts platform cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_title = Saturn Tower Crew Access Arm
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_description = Saturn Tower Crew Access arm, allowing for crew boarding of the command pod. This arm's length is sized for 2.5m command pods.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewArm_tags = base pad launcher sarnus sls cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_title = Saturn Tower Hammerhead Crane
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_description = A distinctive feature of the Saturn tower was this hammerhead crane that sat on the very top.  This crane has no hoist capability, but it can be rotated up to 180 degrees via an animation; set the rotation limit to 50 to rotate only 90 degrees to the launch position. For launches, the crane was rotated 90 degree in the clockwise direction. A gray variant is also available. The lightning mast on top can be switched between the original Saturn tower mast or the new Shuttle mast, which was first used for the ASTP Saturn IB launch, or can be turned off.
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_manufacturer = Alphadyne Crane Systems
		#LOC_ModularLaunchPads_AM_MLP_SaturnHammerheadCrane_tags = shuttle launcher fss cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_title = Saturn Launcher Milkstool
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_description = The "Milkstool", as it was nicknamed, was a stand created to allow the Saturn IB-Apollo to use the Saturn V's Launch Umbilical Tower on LC 39. The three Skylab crews and the Apollo CSM for the Apollo-Soyuz Test Project were launched from LC 39 with the milkstool.  In reality it was a gray color, but a red variant is also available as an alternative. Attach the milkstool to a bottom center node of a rocket, then attach the launcher base to the bottom node of the milkstool. The center ring at top has switchable hold-down arm support and node arrangements. There is a built-in decoupler for separating the milkstool from a rocket for liftoff.
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherMilkstool_tags = base apollo sarnus sls cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_title = Saturn Launcher Tail Service Mast
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_description = Three of these tail service masts were located on the launcher base, connected to the lower part of the S-IC stage of the Saturn V, and were retracted at liftoff. These have to be placed separately, and attach to nodes right outside the flame hole, two on one side, and one on the other side. Rotate them 5 degrees to have them properly aligned with the S-IC.
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnLauncherTSM_tags = launch stand pad base hold cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_title = Saturn Tower Lightning Mast
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_description = A separate version of the original Saturn tower lightning mast that was mounted on the hammerhead crane, for use with other towers. Red and gray versions can be selected, and the mounting plate can be turned off.
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_manufacturer = Alphadyne Crane Systems
		#LOC_ModularLaunchPads_AM_MLP_SaturnLightningMast_tags = sarnus cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_title = Saturn Milkstool Launch Stand
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_description = A standalone launch clamp version of the Saturn "Milkstool", with two height variants: the regular tall version and an alternate short one, both with two color options. The center ring at top has switchable hold-down arm support pads, which can be adjusted horizontally with the deploy limit slider. The railings on the ring can also be turned off.
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnMilkstoolClamp_tags = base clamp apollo sarnus sls gojira tundra cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherClampBase_title = Saturn Launcher Base
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherClampBase_description = This is the base for the Saturn Mobile Launcher. The base attaches to a free node in the center of a rocket's lower or core stage using the size 5 node at the top of the exhaust hole opening. The tower base section attaches to the size 5 node on the other end of the launcher base.  Includes an elevator for crew access from the ground to the top deck. For best results, put the front legs so that they are inside the white part of the big circle on the VAB floor. Includes manually-activated generators for electric charge and fuel resources. The base's exhaust hole can be configured for three sizes of rockets: Saturn V (6.4/5.625m), SLS (5m) and the Saturn IB (4.25/3.75m), with various square and rectangular shapes for either single-core or tri-core rockets.  A variety of switchable hold-down arm support configurations are available, along with optional Saturn V tail service mast attach nodes.
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherClampBase_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnMobileLauncherClampBase_tags = pad clamp apollo sarnus sls cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBase_title = Saturn Modular Tower Base - Angled, with Hatches
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBase_description = Angled base section of the modular Saturn launch tower, with two color options: classic red and new gray. The base has two independent crew elevators, each with four switchable maximum height options; elevators can also be turned off. Adjust the deploy limit of the elevators to make them stop at a lower height than the maximum.  Elevators start at the highest point and have to be brought down first. Hatches on the elevator cars allow an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBase_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBase_tags = launcher sarnus sls pad cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBaseSquare_title = Saturn Modular Tower Base - Square, with Hatches
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBaseSquare_description = Square base section of the modular Saturn launch tower, with two color options: classic red and new gray. The base has two independent crew elevators, each with four switchable maximum height options; elevators can also be turned off. Adjust the deploy limit of the elevators to make them stop at a lower height than the maximum.  Elevators start at the highest point and have to be brought down first. Hatches on the elevator cars allow an alternate method of travel.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBaseSquare_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerBaseSquare_tags = launcher sarnus sls pad cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerMultiSection_title = Saturn Modular Tower Core Section
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerMultiSection_description = Modular multi-height core section of the Saturn launch tower. Seven heights of the section are available, each with two color options: default Saturn red and alternate new gray. Nodes for attaching the swing arms are located on the mount rail on the front side of the sections.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerMultiSection_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerMultiSection_tags = pad base launcher sarnus sls cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewFloor_title = Saturn Tower Crew Section Floor
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewFloor_description = A separate crew access floor for the crew access tower section of the Saturn tower, used to provide access from the tower elevator to the crew access arm when a command pod's hatch does not align with the bottom of the crew access section. Attach the floor to the node in the elevator shaft of the crew access section, and adjust its height with the offset gizmo. The floor has two configurations: Saturn Crew Arm access from the back with the walkway or Milkstool access from the front. The floor also has two color options, default red and alternate gray.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewFloor_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewFloor_tags = pad base launcher sts buran spacex falcon cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewSection_title = Saturn Modular Tower Crew Section
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewSection_description = Modular crew access section of the Shuttle Launcher's FSS tower, used to allow boarding of spacecraft via a crew access arm and the separate crew access floor. Section has two height options for greater room to align the arm and floor, and two color otions: default gray and alternate black and white. A separate crew access floor is attached to the node inside the section, which then can be moved up and down to align the floor with the elevator exit and the crew arm. There are also optional side panels, with each side separately toggleable.
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewSection_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerCrewSection_tags = pad base launcher sts buran spacex falcon cck-modularlaunchpads
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerDamperArm_title = Saturn Tower Damper Arm
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerDamperArm_description = Saturn V tower damper arm. This V-shaped arm connected to the Apollo LES tower, and was used to stabilize the Saturn V during rollout and times of high winds. Two color options are available from the right-click menu. Arm was retracted before launch. ** Disable staging if retracting manually **
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerDamperArm_manufacturer = Alphadyne Construction Group
		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerDamperArm_tags = pad base sarnus launcher cck-modularlaunchpads
