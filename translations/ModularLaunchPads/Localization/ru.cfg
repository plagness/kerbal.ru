		#LOC_ModularLaunchPads_AM_MLP_ThorServiceTowerFallback_description = Анимированная откидная башня для ракет «Тор-Эйбл/Дельта», хотя чаще использовалась со ступенями семейства «Эйбл» (Able, Ablestar и Delta). Есть три встроенных анимированных сбрасываемых кабеля, у каждого свой цвет, каждый можно отключить. Каждый кабель регулируется по вертикали и горизонтали своими ползунками. У башни также 9 цветов. Отвод — вручную или по ступеням. Лучше всего использовать со стендом «Тор/Дельта».
