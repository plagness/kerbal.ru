		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerSwingArm6_description = Saturn Tower swing arm #6 for the Saturn V. This is the S-IVB Aft arm. Two sizes for 3.75m and 4.25m tanks, and two color options are available from the right-click menu.
