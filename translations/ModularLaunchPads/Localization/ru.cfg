		#LOC_ModularLaunchPads_AM_MLP_SaturnTowerSwingArmGen_description = Saturn Tower general swing arm for use with non-Saturn rockets. The arm's length can be adjusted with the deploy limit slider. 7 different umbilical connector types,  15 pipe styles and 2 color options are available from the right-click menu.
