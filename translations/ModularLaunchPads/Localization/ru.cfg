		#LOC_ModularLaunchPads_AM_MLP_Atlas2UmbilicalArm3_description = Animated retracting wind damper arm for the Atlas-Centaur I/II Service Tower. This is the lower arm, and the end connector is placed just above the bottom of the Atlas I/II interstage. This arm retracts downwards at launch. The arm beam has 8 color options. The arm can be retracted either by manual toggling the animation or by staging.
