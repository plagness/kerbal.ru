		#LOC_ModularLaunchPads_AM_MLP_ShuttleLaunchMount_title = Стартовое крепление «Шаттл»
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLaunchMount_description = Малая стартовая база для «Шаттла», для небольших плоских площадок. База крепится к внешнему баку шаттла через большой центральный узел, требует свободного узла под центром бака для крепления. Обслуживающие башни крепятся к узлам по периметру крепления. Прижимы ускорителей встроены в базу и регулируются ползунками. Хвостовые мачты шаттла крепятся по бокам квадратного выреза сопла — узлами или поверхностно. Вся база поворачивается переключателем, чтобы опоры стояли правильно.
