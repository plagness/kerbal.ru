		#LOC_ModularLaunchPads_AM_MLP_VanguardServiceTower_description = Парная обслуживающая башня для стенда «Авангард», крепится к одному из внешних узлов. Башня рассчитана под ракету BDB «Авангард» со стендом на уровне земли, с вариантами половинной (9м) и полной (18м) высоты. Рама основания и верхняя балка отключаются для составления нескольких секций башни. Переднюю деталь-конструкцию тоже можно отключить. Также доступно 9 цветов. Использует отдельные узловые кабель-мачты.
