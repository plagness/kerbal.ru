		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherBaseClamp_title = База пусковой платформы «Шаттл»
		#LOC_ModularLaunchPads_AM_MLP_ShuttleLauncherBaseClamp_description = База стартовой платформы «Шаттл», также подходит для точной реконструкции SLS. Крепится к внешнему баку шаттла через большой центральный узел, требует свободного узла под центром бака. К SLS крепится через большой узел на палубе в районе выреза SSME. Основание башни FSS крепится к большому узлу сбоку от базы. Основание башни SLS крепится к 3-му большому узлу напротив выреза SSME. Есть 3 варианта палубы для разных сборок шаттла и 4-й для SLS. Прижимы ускорителей встроены в базу и регулируются ползунками. Хвостовые мачты шаттла крепятся по бокам квадратного выреза сопла — узлами или поверхностно. Вся база поворачивается переключателем, чтобы опоры стояли правильно.
