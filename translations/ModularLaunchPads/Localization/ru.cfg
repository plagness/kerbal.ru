		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerLOXArm_title = Рука башни SLC-6 Shuttle: стравливание LOX
		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerLOXArm_description = Рука стравливания жидкого кислорода («шапочка») для башни SLC-6 Shuttle. 3 варианта цвета; в реальности рука была в основном серой с красными балками сзади. Крепится к узлу на передней стороне верхней секции, не на квадратном основании мачты, «шапочка» центрируется над верхом внешнего бака и почти касается его. Рука отводилась примерно на отметке Т-2 минуты обратного отсчёта.
