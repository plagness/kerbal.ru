		#LOC_ModularLaunchPads_AM_MLP_ShuttleSLC6TowerCrewArm_description = Рука доступа экипажа для башни SLC-6 Shuttle, для посадки экипажа в орбитальный корабль. Крепится к узлу на передней стороне секции экипажа башни SLC-6, мостик совмещается с люком орбитального корабля. Рука отводится назад в башню, без поворота.
