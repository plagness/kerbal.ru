		#LOC_ModularLaunchPads_AM_MLP_ScissorArmUmbilical_title = Ariane V Scissor Arm Umbilical
		#LOC_ModularLaunchPads_AM_MLP_ScissorArmUmbilical_description = Multi-configurable twin-arm umbilical that retracts in a folding motion, styled after the one used for the Ariane V rocket. Deploy limit sliders are used to adjust the arm spread, inner and outer arm lengths, and the rotation of the arms. The arms havr 8 color options, and each of the arm pipes have 5 color options. The umbilical retraction can be done manually or by staging.
		#LOC_ModularLaunchPads_AM_MLP_ScissorArmUmbilical_manufacturer = Alphadyne Construction Group
