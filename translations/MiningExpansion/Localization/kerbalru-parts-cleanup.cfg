// MiningExpansion — добор русификации part-титулов (сборка «Оператор»)
// Метод mm-title: @PART матчится по полю name узла PART (дословно), @title перекрывает литерал/ссылку #LOC.
// Деталей: 3.
//   1) SMX_Size2AtmCondenser — title захардкожен латиницей в part.cfg мимо готового ключа
//      #LOC_SMX_Size2Condenser_title; берём тот же перевод, что у брата Size1 («… криогенный атмосферный конденсатор»).
//      tags детали тоже были латиницей — ставим русские (как в #LOC_SMX_Size2Condenser_tags).
//   2,3) Refinery Mk2/Mk3 — ключи #LOC_SMX_MK*Refinery_Name в ru.cfg были оставлены как «Convert-O-Tron Mk*».
//      Стоковый KSP переводит Convert-O-Tron как «Конвертотрон» (autoLOC_500652 = «Конвертотрон 250») — приводим к нему.
// desc/manufacturer (и tags рефайнери) идут через #LOC (уже переведены в ru.cfg) — не трогаем.
// Латиницей: коды HD-RS7, Mk2, Mk3; ресурсы (Oxidizer, XenonGas) как в игре.

@PART[SMX_Size2AtmCondenser]:FINAL
{
	@title = HD-RS7 криогенный атмосферный конденсатор
	@tags = SMX аэро (воздух самолёт дыхание топливо впуск забор реактивный кислород самолёт всасывание сверхзвук экстрактор сбор isru
}

@PART[SMX_Mk2ISRURefinery]:FINAL
{
	@title = Конвертотрон Mk2
}

@PART[SMX_Mk3ISRURefinery]:FINAL
{
	@title = Конвертотрон Mk3
}
