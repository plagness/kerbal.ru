// kerbal.ru — точечная правка русской локализации Contract Configurator.
// Апстримный ContractConfigurator/Localization/ru.cfg НЕ трогаем.
//
// Что чиним:
//   #cc.param.ParameterDelegate.MatchExtension.none
//     en-us.cfg: "None have"   (en-us.cfg, стр. 210)
//     ru.cfg:    "Никто"        (ru.cfg, стр. 152)  ← неверно
//
// Ключ подставляется как <<1>> в шаблоны PartValidation.* и формирует текст
// целей/требований контрактов (тройка With / All have / None have):
//     #cc.param.PartValidation.module       = <<1>> модуль: <<2>>
//     #cc.param.PartValidation.type         = <<1>> тип: <<2>>
//     #cc.param.PartValidation.moduleType   = <<1>> тип модуля: <<2>>
//     #cc.param.PartValidation.category     = <<1>> категория: <<2>>
//     #cc.param.PartValidation.manufacturer = <<1>> производитель: <<2>>
// «Никто» = «nobody» — здесь смысл иной: «ни у одной детали нет <модуля X>»,
// т.е. модуль/тип/категория ДОЛЖНЫ ОТСУТСТВОВАТЬ. Игрок видел бессмыслицу
// «Никто модуль: EnginesRF».
//
// Почему «Отсутствует», а не «Нет»/«Не должно быть» (как первая мысль):
// шаблон дописывает существительное в ИМЕНИТЕЛЬНОМ падеже («модуль:», «тип:»),
// а «нет»/«без»/«не должно быть» требуют РОДИТЕЛЬНОГО («нет модуля») — вышло бы
// рассогласование «Нет модуль: X». Глагол «Отсутствует» берёт подлежащее в
// именительном и читается корректно во всех пяти шаблонах:
//     «Отсутствует модуль: EnginesRF», «Отсутствует тип: X»,
//     «Отсутствует категория: X», «Отсутствует производитель: X».
// Пара сохраняет смысловую тройку: С / Все имеют / Отсутствует.
//
// Почему MM-патч блока Localization, а не plain-файл, грузящийся позже:
// переопределение уже объявленного тега вторым Localization{ ru{ #key=… } }
// зависит от недокументированного порядка загрузки .cfg и правила «первый/
// последний выигрывает» в Localizer (см. docs/MAINTAINING.md §6). :FINAL —
// детерминированно, после всех прочих проходов. Так делает и сам RP-1
// (RP-1/Localization/LocPatches.cfg), и наш zzz-kerbalru-rp0-fix.cfg.
//
// Селектор: единственный Localization-узел, чей ru{} содержит именно этот CC-ключ
// (значит, узел ContractConfigurator, а не чужой мод — namespace Localizer глобален).
@Localization:HAS[@ru:HAS[#cc.param.ParameterDelegate.MatchExtension.none]]:FINAL
{
	@ru
	{
		@#cc.param.ParameterDelegate.MatchExtension.none = Отсутствует
	}
}
