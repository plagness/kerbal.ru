// kerbal.ru — русификатор Strategia (стратегии в здании Администрации)
//   Мод не использует систему локализации: title/desc зашиты в .cfg.
//   Перевод — ModuleManager-патч по дословному полю name, проход :FINAL
//   (применяется последним, поверх любых ретрофит-патчей от других модов).
//
//   Узлы мода — НЕ голый STRATEGY, а кастомные типы, которые DLL Strategia
//   разворачивает по телам/уровням. Патчим реальные типы узлов:
//     STRATEGY_BODY_EXPAND  — программы по телам ($body-подстановка)
//     STRATEGY_LEVEL_EXPAND — стратегии с уровнями I/II/III
//     STRATEGY              — ImpactorProbes, FlyByProbes
//     STRATEGY_DEPARTMENT   — отделы (Пилотируемые / Беспилотные миссии)
//
//   ВАЖНО: имена MoonProgram и PlanetaryProgram встречаются ДВАЖДЫ
//   (Crewed + Uncrewed) — различаем через :HAS[#department[...]].
//   Плейсхолдеры $body/$theBody/$theBodies/$childBodies/$childBodyCount/
//   $homeWorld сохранены дословно (их подставляет DLL).

// ============================================================
//  ОТДЕЛЫ (STRATEGY_DEPARTMENT) — отображается title/desc/headName,
//  поле name — внутренний ключ (на него ссылаются стратегии), не трогаем.
// ============================================================

@STRATEGY_DEPARTMENT[Crewed?Missions]:FINAL
{
    @title = Пилотируемые миссии
    @desc = Джин, руководитель полётов, курирует все пилотируемые миссии.
    @headName = Джин Керман
}

@STRATEGY_DEPARTMENT[Uncrewed?Missions]:FINAL
{
    @title = Беспилотные миссии
    @desc = Вернер, глава НИОКР, определяет цели всех беспилотных миссий.
    @headName = Вернер фон Керман
}

// ============================================================
//  ПИЛОТИРУЕМЫЕ МИССИИ (STRATEGY_BODY_EXPAND, department Crewed Missions)
// ============================================================

@STRATEGY_BODY_EXPAND[MoonProgram]:HAS[#department[Crewed?Missions]]:FINAL
{
    @title = Программа «$body»
    @desc = Мы доказали, что можем вывести кербонавта на орбиту и вернуть его — пора брать новые рубежи. Перед нами несколько близких тел на выбор. Мы летим к $theBody не потому что это легко, а потому что это трудно.
    @title
    {
        @Moon = Программа «Аполлон»
    }
    @EFFECT:HAS[#name[IncompatibleGroupRequirement]]
    {
        @text = Одновременно активна лишь одна пилотируемая или беспилотная стратегия
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for $theBody]]
    {
        @effectDescription = к наградам за рубежи у $theBody
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for other bodies]]
    {
        @effectDescription = к наградам за рубежи у прочих тел
    }
    @EFFECT:HAS[#name[ContractEffect]]
    {
        @synopsis = Установите флаг на $theBody.
        @completedMessage = Первый кербонавт успешно высадился на $theBody!
        @failureMessage = Космическая программа не смогла высадить кербонавта на $theBody!
    }
}

@STRATEGY_BODY_EXPAND[PlanetaryProgram]:HAS[#department[Crewed?Missions]]:FINAL
{
    @title = Программа «$body»
    @desc = Следующий шаг нашей программы — высадить кербонавта на другую планету. Что может быть лучше, чем $theBody?
    @title
    {
        @Mercury = Программа «Гермес»
        @Venus = Программа «Афродита»
        @Mars = Программа «Арес»
        @Pluto = Программа «Аид»
    }
    @EFFECT:HAS[#name[IncompatibleGroupRequirement]]
    {
        @text = Одновременно активна лишь одна пилотируемая или беспилотная стратегия
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for $theBodies]]
    {
        @effectDescription = к наградам за рубежи у $theBodies
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for other bodies]]
    {
        @effectDescription = к наградам за рубежи у прочих тел
    }
    @EFFECT:HAS[#name[ContractEffect]]
    {
        @synopsis = Установите флаг на $theBody.
        @completedMessage = Первый кербонавт успешно высадился на $theBody!
        @failureMessage = Космическая программа не смогла высадить кербонавта на $theBody!
    }
}

@STRATEGY_BODY_EXPAND[GasGiantProgram]:FINAL
{
    @title = Программа «$body $childBodyCount»
    @desc = Пора доказать, что кербалы сделаны из нужного теста. Престиж от высадки кербонавта на каждую из лун $theBody был бы астрономическим!
    @title
    {
        @Jupiter = Программа «Зевс»
        @Saturn = Программа «Хронос»
    }
    @EFFECT:HAS[#name[IncompatibleGroupRequirement]]
    {
        @text = Одновременно активна лишь одна пилотируемая или беспилотная стратегия
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for $theBodies]]
    {
        @effectDescription = к наградам за рубежи у $theBodies
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for other bodies]]
    {
        @effectDescription = к наградам за рубежи у прочих тел
    }
    @EFFECT:HAS[#name[ContractEffect]]
    {
        @synopsis = Установите флаги на $childBodies.
        @completedMessage = Первые кербонавты успешно высадились на $childBodies!
        @failureMessage = Космическая программа не смогла высадить кербонавта на $childBodies!
    }
}

// ============================================================
//  БЕСПИЛОТНЫЕ МИССИИ (STRATEGY_BODY_EXPAND, department Uncrewed Missions)
// ============================================================

@STRATEGY_BODY_EXPAND[MoonProgram]:HAS[#department[Uncrewed?Missions]]:FINAL
{
    @title = Зонды к $body
    @desc = Зачем слать кербонавтов к другим планетам, если науку эффективнее собирать беспилотными зондами? Отправим зонд для экспериментов на $theBody?
    @EFFECT:HAS[#name[IncompatibleGroupRequirement]]
    {
        @text = Одновременно активна лишь одна пилотируемая или беспилотная стратегия
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for $theBody]]
    {
        @effectDescription = к наградам за рубежи у $theBody
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for other bodies]]
    {
        @effectDescription = к наградам за рубежи у прочих тел
    }
    @EFFECT:HAS[#name[ContractEffect]]
    {
        @synopsis = Посадите зонды в трёх разных биомах на $theBody.
        @completedMessage = Автоматическое исследование $theBody успешно выполнено!
        @failureMessage = Космическая программа не смогла доставить достаточно зондов на $theBody!
    }
}

@STRATEGY_BODY_EXPAND[PlanetaryProgram]:HAS[#department[Uncrewed?Missions]]:FINAL
{
    @title = Зонды к $body
    @desc = Отправка кербонавта к другой планете стоит астрономических сумм по сравнению с зондом, который можно оставить там. Может, пошлём зонд к $theBody, чтобы он автономно собирал для нас науку?
    @EFFECT:HAS[#name[IncompatibleGroupRequirement]]
    {
        @text = Одновременно активна лишь одна пилотируемая или беспилотная стратегия
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for $theBody]]
    {
        @effectDescription = к наградам за рубежи у $theBody
    }
    @EFFECT:HAS[#effectDescription[to milestone gains for other bodies]]
    {
        @effectDescription = к наградам за рубежи у прочих тел
    }
    @EFFECT:HAS[#name[ContractEffect]]
    {
        @synopsis = Посадите зонды в трёх разных биомах на $theBody.
        @completedMessage = Автоматическое исследование $theBody успешно выполнено!
        @failureMessage = Космическая программа не смогла доставить достаточно зондов на $theBody!
    }
}

@STRATEGY[ImpactorProbes]:FINAL
{
    @title = Ударные зонды
    @desc = На заре времён кербалы расширяли знания, стуча камнями друг о друга. С развитием цивилизации росли и масштабы того, что мы сталкивали. Мы достигли вершины технологии столкновений и готовы перейти к столкновению зондов с другими планетами. Только представьте, сколько науки мы соберём!
    @EFFECT:HAS[#name[IncompatibleGroupRequirement]]
    {
        @text = Одновременно активна лишь одна пилотируемая или беспилотная стратегия
    }
    @EFFECT:HAS[#name[ContractEffect]]
    {
        @synopsis = Столкните зонды с тремя разными небесными телами.
        @completedMessage = Вы успешно разбили несколько зондов и попутно добыли науку!
        @failureMessage = Космическая программа не смогла разбить достаточно зондов!
    }
}

@STRATEGY[FlyByProbes]:FINAL
{
    @title = Пролёты у планет
    @desc = Один из способов выжать максимум науки из зондов — посетить как можно больше планет. Используем гравитационные манёвры и отправим один зонд через всю Солнечную систему.
    @EFFECT:HAS[#name[IncompatibleGroupRequirement]]
    {
        @text = Одновременно активна лишь одна пилотируемая или беспилотная стратегия
    }
    @EFFECT:HAS[#name[ContractEffect]]
    {
        @synopsis = Выполните пролёт мимо трёх планет и как можно большего числа лун.
        @completedMessage = Вы успешно выполнили необходимые пролёты!
        @failureMessage = Космическая программа не смогла выполнить достаточно пролётов!
    }
}

// ============================================================
//  ФИНАНСЫ (STRATEGY_LEVEL_EXPAND, department Finances)
// ============================================================

@STRATEGY_LEVEL_EXPAND[AstronautTrainingProgram]:FINAL
{
    @title = Подготовка астронавтов
    @desc = Наша стандартная методика — считать новичков-астронавтов расходным материалом, чтобы резко снизить издержки от внеплановой разборки на части. И всё же кое-кто уверяет: подготовка астронавтов, прежде чем усадить их на тонну взрывчатки, снизит аварийность. Запуск программы обойдётся дорого, не говоря о стоимости самой подготовки. Так что решаем: нам нужны настоящие профи или сойдёт-и-так?
    @EFFECT:HAS[#effectDescription[to hiring costs]]
    {
        @effectDescription = к стоимости найма
    }
}

@STRATEGY_LEVEL_EXPAND[MassiveLaunches]:FINAL
{
    @title = Сверхтяжёлые запуски
    @desc = Мы нашли инвесторов, готовых спонсировать нас, если мы сможем выводить в космос колоссальные конструкции за один запуск. Чтобы поднять такое на орбиту, придётся освоить поистине безумные инженерные приёмы.
    @EFFECT:HAS[#name[CurrencyOperationTextOverride]]
    {
        @description = Ремонт объектов бесплатен (простите за стартовый стол).
    }
}

@STRATEGY_LEVEL_EXPAND[SlotMachine]:FINAL
{
    @title = Контрактная рулетка
    @desc = Агентства словно делают нам одолжение, подсовывая эти нелепые контракты. С чего нам страдать за разборчивость? Закроем свою отчётность — и агентства понятия не будут иметь, на что мы согласны. Да, контракты станут чуть хаотичнее, но если мы берём только лучшие из них — кого это волнует?!?
    @EFFECT:HAS[#effectDescription[contract rewards/penalties]]
    {
        @effectDescription = к наградам и штрафам по контрактам
    }
}

// ============================================================
//  ОПЕРАЦИИ (STRATEGY_LEVEL_EXPAND, department Operations)
//  ВНИМАНИЕ: IncompatibleRequirement ссылается на стратегию по Title
//  (Title.StartsWith) — переведённые названия обязаны совпадать.
// ============================================================

@STRATEGY_LEVEL_EXPAND[PilotFocus]:FINAL
{
    @title = Ставка на пилотов
    @desc = Очевидно, важнейшая роль среди наших астронавтов — пилот. Без умелого пилота сегодня (да и в любой другой день) в космос никто не полетит. Построим ли мы программу вокруг наших отважных пилотов?
    @EFFECT:HAS[#strategy[Engineer?Focus]]
    {
        @strategy = Ставка на инженеров
    }
    @EFFECT:HAS[#strategy[Scientist?Focus]]
    {
        @strategy = Ставка на учёных
    }
    @EFFECT:HAS[#effectDescription[to rewards]]
    {
        @effectDescription = к наградам
    }
}

@STRATEGY_LEVEL_EXPAND[EngineerFocus]:FINAL
{
    @title = Ставка на инженеров
    @desc = Где бы мы были без наших инженеров? Они следят, чтобы всё было в порядке и остальные астронавты благополучно взлетали и садились. Построим ли мы программу вокруг умелого инженера?
    @EFFECT:HAS[#strategy[Pilot?Focus]]
    {
        @strategy = Ставка на пилотов
    }
    @EFFECT:HAS[#strategy[Scientist?Focus]]
    {
        @strategy = Ставка на учёных
    }
    @EFFECT:HAS[#effectDescription[to rewards]]
    {
        @effectDescription = к наградам
    }
}

@STRATEGY_LEVEL_EXPAND[ScientistFocus]:FINAL
{
    @title = Ставка на учёных
    @desc = Учёный — ключевая роль, на которой стоит сосредоточиться. Умелый учёный точно знает, какой образец отправить назад ради максимума науки (в капсулу влезает не так много лунных камней). Построим ли мы программу вокруг наших блестящих учёных?
    @EFFECT:HAS[#strategy[Pilot?Focus]]
    {
        @strategy = Ставка на пилотов
    }
    @EFFECT:HAS[#strategy[Engineer?Focus]]
    {
        @strategy = Ставка на инженеров
    }
    @EFFECT:HAS[#effectDescription[to rewards]]
    {
        @effectDescription = к наградам
    }
    @EFFECT:HAS[#effectDescription[to field work]]
    {
        @effectDescription = к полевым исследованиям
    }
}

// ============================================================
//  СВЯЗИ С ОБЩЕСТВЕННОСТЬЮ (STRATEGY_LEVEL_EXPAND, Public Relations)
// ============================================================

@STRATEGY_LEVEL_EXPAND[TechStagnation]:FINAL
{
    @title = Застой в исследованиях
    @desc = На Кербине есть консервативные группы, считающие, что мы зашли слишком далеко и слишком быстро. Закрывать программу мы не собираемся, но, может, замедлив разработку новых технологий, мы задобрим этих людей и не дадим им спалить КЦК?
    @EFFECT:HAS[#effectDescription[to contract rewards]]
    {
        @effectDescription = к наградам по контрактам
    }
    @EFFECT:HAS[#effectDescription[to research costs]]
    {
        @effectDescription = к стоимости исследований
    }
}

@STRATEGY_LEVEL_EXPAND[FreeIceCream]:FINAL
{
    @title = Бесплатное мороженое
    @desc = Нам пришла в голову безумная идея — раздавать бесплатное мороженое в космоцентре. Публика будет от нас без ума. Если раскрутить программу, мы получим больше наград за спасение кербалов (после посадки им дадут мороженое!), а то и скидку на найм новых астронавтов. БЕСПЛАТНОЕ. МОРОЖЕНОЕ.
    @EFFECT:HAS[#effectDescription[to rewards]]
    {
        @effectDescription = к наградам
    }
    @EFFECT:HAS[#name[CurrencyOperationTextOverride]]
    {
        @description = Наём кербалов за 25 % обычной цены.
    }
}

@STRATEGY_LEVEL_EXPAND[MediaCircus]:FINAL
{
    @title = Медиацирк
    @desc = Чтобы сделать программу авторитетной, нужно усилить работу со СМИ. Камеры повсюду, эфир по 6 часов в день, 426 дней в году. Разумеется, это легко может обернуться против нас, если у нас случатся какие-нибудь... аварии.
    @EFFECT:HAS[#effectDescription[to launch costs]]
    {
        @effectDescription = к стоимости запуска
    }
    @EFFECT:HAS[#effectDescription[on vessel loss]]
    {
        @effectDescription = при потере корабля
    }
    @EFFECT:HAS[#effectDescription[on facility destruction]]
    {
        @effectDescription = при разрушении объекта
    }
}

// ============================================================
//  НАУКА (STRATEGY_LEVEL_EXPAND, department Science)
// ============================================================

@STRATEGY_LEVEL_EXPAND[BoldlyGo]:FINAL
{
    @title = Смело идти вперёд
    @desc = Если мы хотим провести как можно больше исследований, нужно изучить как можно больше новых биомов. Государственные гранты за исследовательские программы в итоге помогут финансировать дальнейшие экспедиции и науку.
    @EFFECT:HAS[#effectDescription[to milestone gains for bodies other than $homeWorld]]
    {
        @effectDescription = к наградам за рубежи у тел, кроме $homeWorld
    }
}

@STRATEGY_LEVEL_EXPAND[ProbeFrenzy]:FINAL
{
    @title = Зондовая лихорадка
    @desc = Если мы хотим заниматься наукой, зонды — самый верный путь. Сэкономленное на отправке кербалов можно пустить на огромный флот автономных зондов.
    @EFFECT:HAS[#effectDescription[from probe transmissions]]
    {
        @effectDescription = с передач данных зондами
    }
    @EFFECT:HAS[#effectDescription[to probe recovery]]
    {
        @effectDescription = к возврату зондов
    }
    @EFFECT:HAS[#effectDescription[to uncrewed milestones] , #currency[Funds]]
    {
        @effectDescription = к беспилотным рубежам
    }
    @EFFECT:HAS[#effectDescription[to uncrewed milestones] , #currency[Science]]
    {
        @effectDescription = к беспилотным рубежам
    }
}

@STRATEGY_LEVEL_EXPAND[LocalScience]:FINAL
{
    @title = Местная наука
    @desc = Прямо у нас под боком столько возможностей для исследований. Стоит сосредоточиться на местной науке, чтобы дать программе толчок. Тогда, добравшись до дальних рубежей, мы отправим туда самую лучшую технику.
    @EFFECT:HAS[#effectDescription[costs for research]]
    {
        @effectDescription = к стоимости исследований
    }
}
