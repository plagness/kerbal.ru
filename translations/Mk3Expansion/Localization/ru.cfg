		#LOC_M3X_AARE_desc = Стремясь повысить атмосферную эффективность ракетных двигателей, наши инженеры позаимствовали принципы реактивных двигателей. Ракета размещена внутри камеры сгорания, сквозь которую прогоняется забортный воздух, — получается устройство, по сути подобное ПВРД, что резко повышает эффективность в атмосфере. Двигатель тяжелее и слабее обычной ракеты того же размера, зато куда экономичнее в атмосфере. К тому же с ростом скорости растут тяга и удельный импульс, достигая около 4500 кН и 800 с на скорости 3 Маха. <color="yellow">Удельный импульс зависит от скорости.</color>
