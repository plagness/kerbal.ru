		#LOC_M3X_Sievert_desc = Крайне экспериментальный ядерный двигатель прямого цикла, создающий тягу за счёт бесконечной мощи атома, а не более прозаичного сжигания жидкого топлива. Наземным командам придётся мириться с не-сразу-смертельным уровнем радиации от выхлопа, зато экипажи могут наслаждаться временем полёта, измеряемым годами, а не часами. Поскольку сгорания не происходит, двигатель работает и в бескислородных атмосферах.

