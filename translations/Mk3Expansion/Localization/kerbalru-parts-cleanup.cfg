// Mk3Expansion — добор русификации part-титулов (сборка «Оператор»)
// Метод mm-title: @PART матчится по полю name узла PART (дословно), @title перекрывает литерал/ссылку #LOC.
// Деталей: 1. Причина: у M3X_ShortSegment title захардкожен латиницей «Mk3 Short Saddletank (4 Varaints)»
//   в part.cfg (Short.cfg), мимо готового ключа #LOC_M3X_SaddleTankShort_Name. Ставим тот же перевод,
//   что у братьев (M3X_LongSegment = «Седельный бак Mk3, длинный»). «(4 варианта)» уже вынесено в desc.
// desc/tags/manufacturer детали идут через #LOC (уже переведены в ru.cfg) — не трогаем.
// Латиницей: код Mk3.

@PART[M3X_ShortSegment]:FINAL
{
	@title = Седельный бак Mk3, короткий
}
