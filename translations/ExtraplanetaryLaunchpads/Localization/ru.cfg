		#EL_ELLandingPad_title = Посадочная площадка KS-LP
		#EL_ELLandingPad_desc = Дайте новым кораблям куда садиться. Годится и для постройки кораблей.

		#EL_ELLathe_title = Фрезерный станок KS-ML
		#EL_ELLathe_desc = Увеличивает выработку металлолома. Ах да, заодно может выдать немного деталей ракет.

		#EL_ELLaunchpad_title = Стартовая площадка
		#EL_ELLaunchpad_desc = Стройте ракеты вне планеты!

		#EL_Magnetometer_title = Магнитометр BG-MGN
		#EL_Magnetometer_desc = Удобный прибор улавливает магнитные поля поблизости — например, вокруг рудных залежей. Внимание: держите подальше от магнитов!

		#EL_ELMallet_title = Киянка KS
		#EL_ELMallet_desc = Возьмите её, чтобы забивать колышки разметки в грунт. Берегите пальцы.

		#EL_ELMicroPad_title = Одноразовая площадка KS-MP
		#EL_ELMicroPad_desc = Отмечает, где построенные модули будут навсегда пристыкованы к строящему аппарату. Постройка заменяет собой площадку. У построенного модуля должен быть свободный стыковочный узел на корневой детали (сверху или снизу; при наличии обоих приоритет у верхнего).

		#EL_OMD_title = Орбитальный детектор массы BG-OMD2
		#EL_OMD_desc = Кербальские астрофизики огорчились, обнаружив, что неоднородности массы у поверхности заставляют корабли расходиться или сближаться. Bagel не упустил случая обратить это на пользу и создал OMD для поиска концентраций массы — например, от рудных залежей.

		#EL_ELOrbitalDock_title = Орбитальный строительный док KS-OCD
		#EL_ELOrbitalDock_desc = Крохотная стартовая площадка, заточенная под работу на орбите. Несмотря на малый размер, ей по плечу даже самые крупные орбитальные стройки.

		#EL_ELRecycleBin_title = Приёмник переработки KCC
		#EL_ELRecycleBin_desc = Перерабатывает всё, что попадает внутрь. Не для использования в качестве детской площадки.

		#EL_ELRecycleBin_Large_title = Приёмник переработки KCC, большой
		#EL_ELRecycleBin_Large_desc = Перерабатывает всё, что попадает внутрь. Не для использования в качестве детской площадки.

		#EL_RocketBuilder_title = Кербальский ракетный верстак
		#EL_RocketBuilder_desc = Пора на смену!.. Ты глянь, какой вид!

		#EL_ELRunway_title = Взлётная полоса
		#EL_ELRunway_desc = Стройте космопланы вне планеты!

		#EL_Smelter_title = Плавильня KS-S-10
		#EL_Smelter_desc = Эта радикальная технология — огромный шаг вперёд по сравнению с «костровым» способом добычи металла из руды; благодаря ей Bagel заслужил заветный титул «больше не самые смертоносные изготовители деталей».

		#EL_SmallSmelter_title = Плавильня KS-S-05
		#EL_SmallSmelter_desc = Уменьшенная плавильня, созданная, чтобы удобнее было устраивать домашние пожары при постройке ракет дома.

		#EL_TinySmelter_title = Плавильня KS-S-01
		#EL_TinySmelter_desc = Крохотная плавильня, созданная, чтобы удобнее было устраивать домашние пожары при постройке ракет дома.

		#EL_ELSurveyStake_title = Колышек разметки KS-BBQ
		#EL_ELSurveyStake_desc = Служит для разметки мест под наземные стройки. Острым концом в грунт, а не в глаз.

		#EL_ELSurveyStation_title = Станция разметки EL
		#EL_ELSurveyStation_desc = Стройте объекты на размеченных участках.

		#EL_ELWorkshop_title = Строительная верфь KS-WS-10-5
		#EL_ELWorkshop_desc = Соберите кучку кербалов и, глядишь, даже добейтесь от них какой-то работы.

