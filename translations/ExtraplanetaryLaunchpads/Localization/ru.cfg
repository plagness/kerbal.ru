		#EL_Auger_title = Бур KS-A-66
		#EL_Auger_desc = Отличный бур для развёрнутых горных работ. Громоздкий, зато руду гребёт по-настоящему.

		#EL_SmallAuger_title = Малый бур KS-A-33
		#EL_SmallAuger_desc = Бур, отлично подходящий для полумобильной добычи.

		#EL_TinyAuger_title = Мини-бур KS-A-08
		#EL_TinyAuger_desc = Идеальный бур, чтобы развернуть добычу при ограниченных запасах. Достаточно мал и лёгок, чтобы собрать его на месте из завезённых материалов, и достаточно быстр, чтобы за разумное время построить агрегат покрупнее.

		#EL_ELConstructionDrone_title = Строительный дрон
		#EL_ELConstructionDrone_desc = Строительный дрон Von Keumann выполняет те же функции, что и строительная верфь KS-WS-10-5. Производительность пониже, зато экономится масса — не нужно думать об экипаже. Никаких перекуров! Никаких профсоюзных склок!

		#EL_ELControlReference_title = Опорная точка управления KS-CR
		#EL_ELControlReference_desc = Для случаев, когда нужно быстро сменить опорную точку управления — например, при посадке на брюхо. По нажатию кнопки действия устройство перехватывает управление авионикой и становится новым «нос — корма», а индикаторы подсвечивают активный режим. По повторному нажатию перехват снимается, и снова действует прежняя опорная точка управления.

