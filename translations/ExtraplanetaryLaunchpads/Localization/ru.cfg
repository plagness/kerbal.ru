		#EL_Agency_title = Kairyuu Shipping
		#EL_Agency_desc = Kairyuu Shipping начиналась с кербала-разносчика пиццы, полного мании величия. Втихаря от всех он умудрился сколотить парк велосипедов и нанять кербалов крутить педали. Слово за слово — и бывший разносчик пиццы дорвался до добычи ресурсов и строительства. Теперь он мечтает подмять под себя рынок космических грузоперевозок, став фундаментом каждой орбитальной станции и базы.

