// ExtraplanetaryLaunchpads — добор русификации part-титулов (HexCan-семейство)
// Метод mm-title: @PART матчится по полю name узла PART (дословно), @title перекрывает ссылку #LOC.
// Деталей: 16. Причина: у HexCan-контейнеров title-ключи (#EL_HexCan*_title) в ru.cfg были оставлены
//   латиницей («HexCan-Metal-Small» и т.п.), хотя desc уже переведены. Приводим всё семейство к единому
//   русскому виду «Гекс-контейнер (<ресурс>)[, размер]»; сварные 7× — «7× гекс-контейнеров (<ресурс>)[, размер]».
//   3 сварных 7× ранее имели лишь русское слово размера при латинском «HexCan RocketParts» — тоже приведены к единому виду.
// desc деталей идут через #LOC (уже переведены в ru.cfg) — не трогаем.
// Латиницей: ресурсы EPL как в игре — Metal / MetalOre / RocketParts (единый стиль со всеми контейнерами MSV в ru.cfg).
// manufacturer оставлен латиницей — это бренды-производители («PanSpace Manufacturing Inc. Ltd. LLC. Co.», «UbioZur Welding Ltd»).

// ---- Metal ----
@PART[HexCanMetalSmall]:FINAL
{
	@title = Гекс-контейнер (Metal), малый
}
@PART[HexCanMetal]:FINAL
{
	@title = Гекс-контейнер (Metal)
}
@PART[HexCanMetalLarge]:FINAL
{
	@title = Гекс-контейнер (Metal), большой
}
@PART[HexCanMetalHuge]:FINAL
{
	@title = Гекс-контейнер (Metal), огромный
}

// ---- MetalOre ----
@PART[HexCanOreSmall]:FINAL
{
	@title = Гекс-контейнер (MetalOre), малый
}
@PART[HexCanOre]:FINAL
{
	@title = Гекс-контейнер (MetalOre)
}
@PART[HexCanOreLarge]:FINAL
{
	@title = Гекс-контейнер (MetalOre), большой
}
@PART[HexCanOreHuge]:FINAL
{
	@title = Гекс-контейнер (MetalOre), огромный
}

// ---- RocketParts ----
@PART[HexCanRocketPartsSmall]:FINAL
{
	@title = Гекс-контейнер (RocketParts), малый
}
@PART[HexCanRocketParts]:FINAL
{
	@title = Гекс-контейнер (RocketParts)
}
@PART[HexCanRocketPartsLarge]:FINAL
{
	@title = Гекс-контейнер (RocketParts), большой
}
@PART[HexCanRocketPartsHuge]:FINAL
{
	@title = Гекс-контейнер (RocketParts), огромный
}

// ---- сварные 7× (RocketParts) ----
@PART[RocketpartsSmall7x]:FINAL
{
	@title = 7× гекс-контейнеров (RocketParts), малые
}
@PART[Rocketparts7x]:FINAL
{
	@title = 7× гекс-контейнеров (RocketParts)
}
@PART[RocketpartsLarge7x]:FINAL
{
	@title = 7× гекс-контейнеров (RocketParts), большие
}
@PART[RocketpartsHuge7x]:FINAL
{
	@title = 7× гекс-контейнеров (RocketParts), огромные
}
