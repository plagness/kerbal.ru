// Русификация кастомной категории редактора (VAB) мода NearFutureLaunchVehicles.
// Источник: NearFutureLaunchVehicles/Patches/NFLaunchVehicles_Subcats.cfg —
// стоковый узел CUSTOM_PARTLIST_CATEGORY (работает без VABOrganizer/FilterExtensions).
// Отображаемая строка = поле categoryName (не #LOC-ключ), поэтому правим MM-патчем по значению.
// Грузится из zzz-kerbalru-translations (после всех), :FINAL — гарантированно поверх оригинала.

@CUSTOM_PARTLIST_CATEGORY:HAS[#categoryName[NF Launch Vehicles Parts]]:FINAL
{
	@categoryName = Near Future — носители

	@SUBCATEGORY:HAS[#categoryName[Command]]                { @categoryName = Управление }
	@SUBCATEGORY:HAS[#categoryName[Decouplers & Separators]] { @categoryName = Расцепители и сепараторы }
	@SUBCATEGORY:HAS[#categoryName[Docking]]                { @categoryName = Стыковка }
	@SUBCATEGORY:HAS[#categoryName[Electric Batteries]]     { @categoryName = Аккумуляторы }
	@SUBCATEGORY:HAS[#categoryName[Small Engines]]          { @categoryName = Малые двигатели }
	@SUBCATEGORY:HAS[#categoryName[Medium Engines]]         { @categoryName = Средние двигатели }
	@SUBCATEGORY:HAS[#categoryName[Large Engines]]          { @categoryName = Большие двигатели }
	@SUBCATEGORY:HAS[#categoryName[5m Fuel Tanks]]          { @categoryName = Баки 5m }
	@SUBCATEGORY:HAS[#categoryName[7.5m Fuel Tanks]]        { @categoryName = Баки 7.5m }
	@SUBCATEGORY:HAS[#categoryName[Payload]]                { @categoryName = Полезная нагрузка }
	@SUBCATEGORY:HAS[#categoryName[Integrated RCS]]         { @categoryName = Встроенные RCS }
	@SUBCATEGORY:HAS[#categoryName[Heavy RCS]]              { @categoryName = Тяжёлые RCS }
	@SUBCATEGORY:HAS[#categoryName[Cargo Tubes]]            { @categoryName = Грузовые тубусы }
	@SUBCATEGORY:HAS[#categoryName[Cluster Mounts]]         { @categoryName = Крепления для связок }
}
