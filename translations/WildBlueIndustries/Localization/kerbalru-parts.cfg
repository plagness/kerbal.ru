// WildBlueIndustries (KerbalActuators + Snacks) — русификация деталей (сборка «Оператор»)
// Метод mm-title: title/description/manufacturer/tags заданы литералом в part.cfg → патчим ModuleManager по имени детали (поле name узла PART).
// Деталей: 7. Матчинг по полю name — регистр/дефисы/цифры сохранены дословно. WBI/бренды латиницей.
// manufacturer у wbiSampleArm/wbiSampleCrane = #autoLOC_501646 (стоковый локализационный ключ, в ru-локали игры сам резолвится в «Конструкторская фирма „Керман и сыновья"») — не переопределяем.

@PART[wbiSampleArm]:FINAL
{
	@title = Манипулятор станции Mk1
	@description = Этот манипулятор отлично подходит для перемещения грузов. Можно создать серию снимков положения манипулятора и собрать из них последовательность. Последовательности позволяют запрограммировать манипулятор на анимацию для рутинных задач — например, заранее выставлять его в разные позиции.
}

