		// *** Helptips: подсказки настроек ***
		#autoLOC_SCANsat_settingsHelpScanningToggle			= Включить/выключить всё сканирование SCANsat.
		#autoLOC_SCANsat_settingsHelpBackground				= Включить/выключить фоновое сканирование\nна выбранных небесных телах.
		#autoLOC_SCANsat_settingsHelpTimeWarp				= Настройка частоты сканирования при ускорении времени.\nБолее высокие значения дают меньше пропусков на картах,\nно могут снижать производительность при сильном ускорении.
		#autoLOC_SCANsat_settingsHelpGroundTracks			= Показывать наглядный индикатор\nактивности сканирования в режиме карты.
		#autoLOC_SCANsat_settingsHelpGroundTracksActive			= Индикатор наземного трека можно ограничить\nтак, чтобы он отображался только для активного судна.
		#autoLOC_SCANsat_settingsHelpStockUIStyle			= Переключение между элементами интерфейса в штатном стиле KSP и в стиле Unity.
		#autoLOC_SCANsat_settingsHelpOverlayTooltips			= Показывает подсказки для текущего положения мыши, когда включено планетарное наложение карты.\nВ подсказках указаны координаты курсора, высота рельефа, уклон, название биома\nи содержание ресурсов — в зависимости от охвата сканирования.
		#autoLOC_SCANsat_settingsHelpWindowTooltips			= Показывать подсказки на некоторых кнопках окон карты.\nВ первую очередь они помогают распознавать кнопки-значки.
		#autoLOC_SCANsat_settingsHelpLegendTooltips			= Показывать подсказки на легенде карты.\nОтключение также отключит легенды карт биомов.
		#autoLOC_SCANsat_settingsHelpWindowTooltips 		= Для некоторых типов сканеров требуется,\nчтобы поверхность была освещена.
		#autoLOC_SCANsat_settingsHelpDaylightCheck 			= Некоторым сканерам для правильной работы\nтребуется, чтобы участок был освещён.
		#autoLOC_SCANsat_settingsHelpStockToolbar			= Использовать штатную панель инструментов.\nМожно применять одновременно с панелью Blizzy78.
		#autoLOC_SCANsat_settingsHelpToolbarMenu			= Использовать всплывающее меню штатной панели для показа всех доступных окон.
		#autoLOC_SCANsat_settingsHelpMechJeb				= Режимы выбора путевой точки на карте с увеличением и большой карте SCANsat\nможно использовать для выбора места посадки MechJeb.
		#autoLOC_SCANsat_settingsHelpMechJebLoad			= Загрузить сохранённую цель посадки MechJeb.\nРаботает только в полётной сцене при наличии подходящего судна с MechJeb.
		#autoLOC_SCANsat_settingsHelpMapGenSpeed			= Настройка скорости генерации всех карт SCANsat.\nМеньшие значения экономят ресурсы процессора и могут снизить\nвлияние генерации карт на производительность.
		#autoLOC_SCANsat_settingsHelpResetWindows			= Сбросить положение и масштаб всех окон.\nПрименяйте, если окно было полностью вытащено\nза пределы экрана или какие-то окна не видны.
		#autoLOC_SCANsat_settingsHelpResetPlanetData			= Сбрасывает выбранные данные SCANsat для текущего небесного тела.\nПеред применением откроется окно подтверждения.\nОтменить нельзя.
		#autoLOC_SCANsat_settingsHelpResetAllData			= Сбрасывает выбранные данные SCANsat для всех небесных тел.\nПеред применением откроется окно подтверждения.\nОтменить нельзя.
		#autoLOC_SCANsat_settingsHelpVesselsSensorsPasses		= Сведения о датчиках SCANsat, активных в данный момент.\n«Суда» — количество судов с активными датчиками.\n«Датчики» — общее число датчиков;\nу приборов с несколькими типами датчиков каждый датчик считается отдельно.\n«Проходы» — количество обновлений датчиков в секунду.\nНа это значение влияет настройка разрешения при ускорении времени.
		#autoLOC_SCANsat_settingsHelpGreyScale				= Использовать честные оттенки серого для чёрно-белых карт SCANsat.\nПиксели карты высот интерполируются между чёрным и белым;\nпределы задаются минимальной и максимальной высотой рельефа каждого небесного тела.
		#autoLOC_SCANsat_settingsHelpExportCSV				= Экспортировать CSV-файл вместе с текстурой карты при нажатии кнопки «Экспорт» на большой карте.\nФайл содержит координаты и высоту рельефа для каждого пикселя.\nПиксели нумеруются слева направо и сверху вниз.
		#autoLOC_SCANsat_settingsHelpSetMapWidth			= Введите точное значение ширины текстуры большой карты SCANsat.\nДопустимы значения от 550 до 8192 пикселей.\nНажмите кнопку «Задать», чтобы применить значение.
		#autoLOC_SCANsat_settingsHelpWindowScale			= Настройка масштаба всех окон SCANsat.
		#autoLOC_SCANsat_settingsHelpFillPlanet				= Заполнить выбранные данные SCANsat для текущего небесного тела.
		#autoLOC_SCANsat_settingsHelpOverlayHideZero	= Скрывать ресурсы из интерфейса, если их нет на текущем небесном теле.\nИначе ресурсы будут скрыты после достижения порога штатного сканирования.
		#autoLOC_SCANsat_settingsHelpFillAll				= Заполнить выбранные данные SCANsat для всех небесных тел.
		#autoLOC_SCANsat_resourceSettingsHelpBiomeLock			= Обходит требование штатного наземного сканирования биомов.\nПоказатели SCANsat будут отображать содержание ресурсов\nс полной точностью независимо от наличия наземных сканов биомов.
		#autoLOC_SCANsat_resourceSettingsHelpInstant			= По умолчанию орбитальный обзор штатного сканера ресурсов M700 заполняет все карты ресурсов SCANsat.\nЭто можно отключить, тогда для всего сканирования ресурсов потребуются стандартные методы SCANsat.\nОтключается автоматически, когда отключено штатное сканирование ресурсов.
		#autoLOC_SCANsat_resourceSettingsHelpNarrowBand			= Многие функции SCANsat для полностью точных данных о содержании ресурсов требуют узкополосного сканера ресурсов\nна борту текущего судна или на орбите небесного тела.\nОтключите этот параметр, чтобы обойти эти ограничения.
		#autoLOC_SCANsat_resourceSettingsHelpDisableStock		= Отключает все штатные функции сканирования ресурсов.\nДля всех данных о ресурсах потребуются методы сканирования SCANsat.\nЗаменяет несколько штатных функций ресурсов инструментами SCANsat.\nСреди них — показания по правому клику и карты планетарного наложения.
		#autoLOC_SCANsat_resourceSettingsHelpResetStockResource		= Сбрасывает охват штатного сканирования ресурсов для текущего небесного тела.\nДля вступления всех изменений в силу может потребоваться перезагрузка или смена сцены.\nПеред применением откроется окно подтверждения.\nОтменить нельзя.
		#autoLOC_SCANsat_resourceSettingsHelpResetAllStockResource	= Сбрасывает охват штатного сканирования ресурсов для всех небесных тел.\nДля вступления всех изменений в силу может потребоваться перезагрузка или смена сцены.\nПеред применением откроется окно подтверждения.\nОтменить нельзя.
		#autoLOC_SCANsat_resourceSettingsHelpOverlayInterpolation	= Изменяет число измерений содержания ресурсов, используемых при построении\nпланетарного наложения и наложения ресурсов на большой карте.\nУменьшайте значение, чтобы повысить точность карты.\nМеньшие значения замедляют генерацию карты.
		#autoLOC_SCANsat_resourceSettingsHelpOverlayHeight		= Изменяет размер текстуры (ширина карты равна 2×высоте), используемой при построении\nпланетарного наложения и наложения ресурсов на большой карте.\nУвеличивайте значение, чтобы повысить качество и точность карты.\nБольшие значения замедляют генерацию карты.
		#autoLOC_SCANsat_resourceSettingsHelpOverlayBiomeHeight		= Изменяет размер текстуры (ширина карты равна 2×высоте), используемой при построении\nкарты биомов планетарного наложения. Увеличивайте значение, чтобы повысить\nкачество и точность карты.\nБольшие значения замедляют генерацию карты.
		#autoLOC_SCANsat_resourceSettingsHelpOverlayTransparency	= Создаёт серый фон для карт ресурсов планетарного наложения.\nПомогает понять, какие участки небесного тела\nбыли просканированы, но не содержат ресурсов.
		#autoLOC_SCANsat_resourceSettingsHelpScanThreshold		= Пороговый уровень, при котором к небесному телу применяется штатное сканирование ресурсов после сканирования датчиками SCANsat.\nПолезно, когда контракты или другие дополнения требуют проведения штатного сканирования ресурсов.\nВведите значение от 0 до 100 в поле и нажмите кнопку «Задать».\nВсе небесные тела будут проверены немедленно;\nтакже они проверяются при загрузке или смене сцены.\nДля вступления изменений в силу может потребоваться перезагрузка.
		#autoLOC_SCANsat_colorTerrainHelpMin				= Задаёт нижний порог высоты для палитры рельефа.\nВсё, что ниже этой высоты, отображается самым нижним цветом.
		#autoLOC_SCANsat_colorTerrainHelpMax				= Задаёт верхний порог высоты для палитры рельефа.\nВсё, что выше этой высоты, отображается самым верхним цветом.
		#autoLOC_SCANsat_colorTerrainHelpClampToggle			= Позволяет задать границу между низкими и высокими значениями высоты.\nОсобенно полезно для планет с океанами, где помогает\nчётко разграничить сушу и океан.
		#autoLOC_SCANsat_colorTerrainHelpClamp				= Задаёт высоту границы отсечения.\nВсё, что ниже границы, отображается первыми двумя цветами выбранной палитры.\nВсё, что выше границы, отображается остальными цветами.
		#autoLOC_SCANsat_colorTerrainHelpReverse			= Обращает порядок текущей\nвыбранной палитры.
		#autoLOC_SCANsat_colorTerrainHelpDiscrete			= Рисует карту только конкретными цветами, заданными палитрой,\nвместо плавной интерполяции между ними.
		#autoLOC_SCANsat_colorTerrainHelpPaletteSize			= Настройка числа цветов, доступных\nв текущей выбранной палитре.
		#autoLOC_SCANsat_colorBiomeHelpStock				= Использовать штатную цветовую схему биомов для\nкарт биомов SCANsat.
		#autoLOC_SCANsat_colorBiomeHelpWhiteBorder			= Рисовать белую границу между биомами.\nНе применяется к картам биомов планетарного наложения.
		#autoLOC_SCANsat_colorBiomeHelpTransparency			= Настройка прозрачности карт биомов.\nЗа картами биомов отображается рельеф.\nУстановите 0%, чтобы отключить отрисовку рельефа.
		#autoLOC_SCANsat_colorPickerHelpLow				= Верхний образец показывает обновлённый\nвыбор цвета для нижнего края этого спектра.\nНижний образец показывает текущий активный цвет.
		#autoLOC_SCANsat_colorPickerHelpHigh				= Верхний образец показывает обновлённый\nвыбор цвета для верхнего края этого спектра.\nНижний образец показывает текущий активный цвет.
		#autoLOC_SCANsat_colorResourceHelpMin				= Нижний порог концентрации ресурса на выбранном небесном теле.\nЗалежи ресурса на этом уровне отображаются\nнижним краем текущего цветового спектра наложения ресурсов.\nЗалежи ниже этого значения не показываются.
		#autoLOC_SCANsat_colorResourceHelpMax				= Верхний порог концентрации ресурса на выбранном небесном теле.\nЗалежи ресурса выше этого значения отображаются\nверхним краем текущего цветового спектра наложения ресурсов.
		#autoLOC_SCANsat_colorResourceHelpTransparency			= Задаёт уровень прозрачности наложений ресурсов.\nУвеличьте, чтобы сквозь них было лучше видно карту рельефа, уклона или биомов.\nТакже влияет на прозрачность залежей ресурсов на карте ресурсов планетарного наложения.
		#autoLOC_SCANsat_colorResourceHelpApply				= Применяет текущие значения только для\nвыбранного ресурса и небесного тела.
		#autoLOC_SCANsat_colorResourceHelpApplyAll			= Применяет текущие значения для\nвыбранного ресурса на всех небесных телах.
		#autoLOC_SCANsat_colorResourceHelpDefault			= Возвращает значения по умолчанию только для\nвыбранного ресурса и небесного тела.
		#autoLOC_SCANsat_colorResourceHelpDefaultAll			= Возвращает значения по умолчанию для\nвыбранного ресурса на всех небесных телах.
		#autoLOC_SCANsat_colorHelpSaveToConfig				= Сохранить все значения настройки цвета в\nфайл конфигурации в папке SCANsat/Resources.\nЭти значения служат значениями по умолчанию для новых сохранений\nи для всех кнопок «Вернуть к умолчанию».\nЧтобы значения применялись к текущему сохранению, записывать их в файл не обязательно.
		#autoLOC_SCANsat_colorSlopeHelpCutoff				= Настройка уровня границы между\nдвумя выбранными парами цветов уклона.

