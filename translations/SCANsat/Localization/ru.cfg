		// *** Parts: названия и описания деталей ***
		#autoLOC_SCANsat_BTDT_Title			= SCAN «Бывал и видал»®
		#autoLOC_SCANsat_BTDT_Description		= Этот небольшой датчик способен автоматически распознавать аномалии поблизости. Поскольку он работает лишь на очень малых расстояниях и очень низких высотах, он в первую очередь полезен для отслеживания уже обнаруженных аномалий, которые были посещены.

		#autoLOC_SCANsat_BTDT_Exo_Description 		= Эта модель сканирующего устройства содержит набор пассивных и активных датчиков, предназначенных для быстрого наведения на интересные объекты поблизости.

		#autoLOC_SCANsat_Multi_Title			= Мультиспектральный датчик SCAN
		#autoLOC_SCANsat_Multi_Description		= Этот многоканальный датчик улавливает излучение в нескольких инфракрасных, видимых и радарных диапазонах. Это позволяет ему различать типы рельефа и биомы. Он также способен обнаруживать аномалии — например, сооружения на поверхности.

		#autoLOC_SCANsat_Radar_Title			= Радарный высотомер SCAN
		#autoLOC_SCANsat_Radar_Description		= SCAN представляет высокопроизводительный радарный высотомер. Это начальная модель в семействе датчиков, обычно продаётся в комплекте с игрушечными ракетами и радиоуправляемыми моделями самолётов. После того как фокус-группы показали, что 95% целевой аудитории пытались примотать его скотчем к выхлопной трубе ракетного двигателя, эту новую, улучшенную модель сделали ещё проще в использовании.

		#autoLOC_SCANsat_SAR_Title			= Высотомер SCAN SAR
		#autoLOC_SCANsat_SAR_Description		= Этот радар с синтезированной апертурой использует траекторию полёта, чтобы имитировать гораздо более крупную антенну. Это позволяет определять высоту рельефа с куда большим разрешением. Обратная сторона — сравнительно узкое поле зрения, и лучше он работает на больших высотах.

		#autoLOC_SCANsat_Radar3B_Title				= Радарный высотомер R-3B
		#autoLOC_SCANsat_Radar3B_Description	= Высокоточный радарный высотомер позволяет собирать базовые данные о высотах в очень узкой полосе под спутником. Потребляет умеренное количество энергии и работает как на свету, так и в темноте.

		#autoLOC_SCANsat_RadarEO_Title				= Радарная антенна R-EO-1
		#autoLOC_SCANsat_RadarEO_Description	= Этот начальный радарный высотомер L-диапазона собирает данные о высотах низкого разрешения в средней полосе с низких орбит. Потребляет умеренное количество энергии и работает как на свету, так и в темноте.

		#autoLOC_SCANsat_SARX_Title				= Антенна SAR-X
		#autoLOC_SCANsat_SARX_Description	= Простой радар с синтезированной апертурой: он излучает радиосигналы и использует движение спутника за время импульса, чтобы имитировать их приём куда более крупной антенной. Эффективно собирает данные о высотах высокого разрешения в очень узкой полосе с низких орбит. Потребляет много энергии, но работает как на свету, так и в темноте.

		#autoLOC_SCANsat_SARC_Title				= Антенна SAR-C
		#autoLOC_SCANsat_SARC_Description	= Продвинутый радар с синтезированной апертурой, который тратит больше энергии ради работы в широких полосах и с больших высот. Эффективно собирает данные о высотах высокого разрешения со средних орбит, но ограничен очень узким диапазоном работы. Потребляет много энергии и работает как на свету, так и в темноте.

		#autoLOC_SCANsat_SARL_Title				= Антенна SAR-L
		#autoLOC_SCANsat_SARL_Description	= Самый совершенный радар с синтезированной апертурой: он использует громадную антенну для излучения и приёма радиосигналов нескольких поляризаций. Способен картографировать широкие полосы рельефа с высоких орбит, а благодаря богатству получаемых данных — ещё и биомы. Потребляет очень много энергии и работает как на свету, так и в темноте.

		#autoLOC_SCANsat_Multi_MS1_Title					= Мультиспектральный сканер MS-1
		#autoLOC_SCANsat_Multi_MS1_Description		= Этот мультиспектральный сканер пониженного разрешения наблюдает свет, отражённый от поверхности цели, и выдаёт малодетальные цветные карты и карты биомов. Из-за начальных компонентов этой модели для эффективной работы его нужно размещать на низких орбитах, и он не способен обнаруживать ресурсы. Потребляет мало энергии и работает только при дневном свете.

		#autoLOC_SCANsat_Multi_MSR_Title					= Улучшенный мультиспектральный сканер MS-R
		#autoLOC_SCANsat_Multi_MSR_Description		= Улучшенный мультиспектральный сканер — настоящий мастер на все руки: он наблюдает свет, отражённый от поверхности планеты, и выдаёт малодетальные цветные снимки и карты биомов. Он даже способен обнаруживать ресурсы на поверхности. Улучшенная оптика и электроника позволяют эффективно работать на более высоких орбитах, чем у начальных моделей, но лишь в узкой полосе. Потребляет мало энергии и работает только при дневном свете.

		#autoLOC_SCANsat_Multi_MS2A_Title				= Продвинутый мультиспектральный сканер MS-2A
		#autoLOC_SCANsat_Multi_MS2A_Description	= Исследуя оптические длины волн в нескольких спектральных каналах, эта продвинутая модель сканера выдаёт малодетальные цветные снимки, карты биомов и распределение ресурсов. Потребляет мало энергии и работает только при дневном свете.

		#autoLOC_SCANsat_VS1_Title			= Камера высокого разрешения VS-1
		#autoLOC_SCANsat_VS1_Description	= Этот начальный обзорный телескоп выдаёт красивые, детальные цветные снимки — но только с низкой орбиты. Потребляет мало энергии и работает только на свету.

		#autoLOC_SCANsat_VS3_Title			= Продвинутая камера высокого разрешения VS-3
		#autoLOC_SCANsat_VS3_Description = Вершина негосударственных кербальских наблюдений высокого разрешения: эта крупная и дорогая камера выдаёт детальные цветные снимки и способна распознавать уникальные объекты на поверхности. Потребляет мало энергии и работает только на свету.

		#autoLOC_SCANsat_VS11_Title			= Засекреченная разведывательная камера VS-11
		#autoLOC_SCANsat_VS11_Description = *ЗАСЕКРЕЧЕНО* способен наблюдать *ЗАСЕКРЕЧЕНО* цели каждые *ЗАСЕКРЕЧЕНО* с высот от *ЗАСЕКРЕЧЕНО* до *ЗАСЕКРЕЧЕНО*. Столь поразительные *ЗАСЕКРЕЧЕНО* заставили *ЗАСЕКРЕЧЕНО* предположить, что *ЗАСЕКРЕЧЕНО* *ЗАСЕКРЕЧЕНО*. Потребляет среднее количество энергии и работает только на свету.

		#autoLOC_SCANsat_R_Title					= Картограф ресурсов SCAN-R
		#autoLOC_SCANsat_R_Description		= Начальный прибор для картографирования ресурсов, хорошо работающий на низких орбитах, но сканирующий лишь в очень узкой полосе. Потребляет умеренное количество энергии и работает только на свету.

		#autoLOC_SCANsat_R2_Title				= Продвинутый картограф ресурсов SCAN-R2
		#autoLOC_SCANsat_R2_Description 	= Картограф ресурсов среднего уровня, способный оценивать полезные ресурсы с более высоких орбит. Потребляет умеренное количество энергии и работает только на свету.

		#autoLOC_SCANsat_RX_Title				= Гиперспектральный картограф ресурсов SCAN-RX
		#autoLOC_SCANsat_RX_Description	= Высокотехнологичный картограф ресурсов, снимающий данные в сотнях каналов ради оценки распределения полезных ресурсов с более высоких орбит. Потребляет мало энергии и работает только на свету.

