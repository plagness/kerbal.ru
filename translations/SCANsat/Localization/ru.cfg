		#autoLOC_SCANsat_Science_Visual_Bop		= Что ж, выглядит всё это довольно жутко. Пожалуй, ограничимся составлением карт с орбиты — незачем подбираться слишком близко.
		#autoLOC_SCANsat_Science_Visual_Pol		= Новые данные визуального сканирования показывают, что Пол и правда похож на пыльцу.
		#autoLOC_SCANsat_Science_Visual_Eeloo		= Все эти полосы и трещины на поверхности Илу складываются в по-настоящему интересную карту.

