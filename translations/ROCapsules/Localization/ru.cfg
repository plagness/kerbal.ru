Localization
{
	ru
	{
		#rocAPAS8995ATitle = Активный стыковочный узел APAS 89/95
		#rocAPAS8995ADesc = Андрогинная периферийная система стыковки, разработанная для «Шаттл-Мир» и МКС. Активный вариант с выдвижным кольцом захвата для выравнивания портов и гашения удара.
		#rocAPAS8995PTitle = Пассивный стыковочный узел APAS 89/95
		#rocAPAS8995PDesc = Андрогинная периферийная система стыковки, разработанная для «Шаттл-Мир» и МКС. Пассивный вариант для стационарных узлов, не требующих активной части — например, причальных портов станционных модулей.
		#rocApolloRCSTitle = Блок РСУ служебного модуля Аполлон
		#rocApolloRCSDesc = Блоки двигателей ориентации служебного модуля (СМ) Аполлон. Четыре блока обеспечивают полную трёхосную ориентацию и поступательное движение CSM.
		#rocApolloCMBDBTitle = Командный модуль (КМ) Аполлон
		#rocApolloCMBDBDesc = Командный модуль корабля «Аполлон», доставлявшего людей на Луну в 1960-70-х годах. Рассчитан на экипаж из трёх человек.
		#rocApolloDecouplerBDBTitle = Разделитель командного/служебного модуля Аполлон
		#rocApolloDecouplerBDBDesc = Отделяет командный модуль от служебного перед спуском.
		#rocApolloDockingLightBDBTitle = Прожектор стыковки Аполлон
		#rocApolloDockingLightBDBDesc = Прожектор для освещения при стыковке/причаливании. Крепится к разделителю служебного модуля Аполлон.
		#rocApolloDrogueDockPortBDBTitle = Стыковочный конус Аполлон
		#rocApolloDrogueDockPortBDBDesc = Приёмная часть (конус) стыковочной системы Аполлон. Работает только со штырём командного модуля Аполлон.
		#rocApolloDrogueParachuteBDBTitle = Блок тормозного парашюта КМ Аполлон
		#rocApolloDrogueParachuteBDBDesc = Тормозной парашют гасит скорость Аполлона на большой высоте перед раскрытием основного парашюта. Крепится к переднему узлу до установки переднего теплозащитного экрана.
		#rocApolloEngineMountBDBTitle = Двигательная рама служебного модуля Аполлон
		#rocApolloEngineMountBDBDesc = Двигательная рама СМ Аполлон с точками крепления SPS, ОНА и прочего оборудования.
		#rocApolloEVALightBDBTitle = Прожектор ВКД Аполлон
		#rocApolloEVALightBDBDesc = Прожектор для освещения при ВКД. Крепится к разделителю служебного модуля Аполлон.
		#rocApolloForwardHSBDBTitle = Передний теплозащитный экран КМ Аполлон
		#rocApolloForwardHSBDBDesc = Передний теплозащитный экран КМ Аполлон. Крепится сверху КМ после установки тормозного и основного парашютов.
		#rocApolloHGABDBTitle = Остронаправленная антенна (ОНА) Аполлон
		#rocApolloHGABDBDesc = Основная ОНА корабля Аполлон. Крепится к узлу на двигательной раме служебного модуля.
		#rocApolloHSBDBTitle = Теплозащита КМ Аполлон
		#rocApolloHSBDBDesc = Теплозащита капсулы Аполлон для лунных миссий.
		#rocApolloLESBDBTitle = Система аварийного спасения (САС) Аполлон
		#rocApolloLESBDBDesc = Двигатель увода САС — мощный твердотопливный мотор, уносящий КМ Аполлон при аварии на старте или на малой высоте. Тангажный двигатель САС слегка меняет ориентацию КМ во время увода, обеспечивая безопасный отход от носителя после выгорания двигателя увода. Первый модуль — двигатель увода, второй — двигатель сброса, третий — тангажный. Для аварийного увода включите двигатели увода и тангажа, затем сбросьте башню двигателем сброса.
		#rocApolloLESBDBEscape = Двигатель увода
		#rocApolloLESBDBJettison = Двигатель сброса
		#rocApolloLESBDBPitch = Тангажный двигатель
		#rocApolloLESBDBCanardStart = Выпустить рули САС
		#rocApolloLESBDBCanardEnd = Убрать рули САС
		#rocApolloLESBDBCanardToggle = Переключить рули САС
		#rocApolloNoseconeBDBTitle = Обтекатель Аполлон Блок I
		#rocApolloNoseconeBDBDesc = Аэродинамический обтекатель Блока I — стыковка на нём не планировалась, в отличие от Блока II.
		#rocApolloParachuteBDBTitle = Блок основного парашюта КМ Аполлон
		#rocApolloParachuteBDBDesc = Основной парашют КМ Аполлон. Крепится к переднему узлу до установки переднего теплозащитного экрана.
		#rocApolloProbeDockPortBDBTitle = Стыковочный штырь Аполлон
		#rocApolloProbeDockPortBDBDesc = Активная часть (штырь) стыковочной системы Аполлон. Работает только со стыковочным конусом Аполлон.
		#rocApolloScimitarBDBTitle = Антенна-сабля Аполлон
		#rocApolloScimitarBDBDesc = УКВ антенна-сабля для связи между кораблями, резерв основной ОНА. Ставится по две на противоположных сторонах СМ и ЛМ.
		#ApolloSMB2BDBTitle = Служебный модуль (СМ) Аполлон
		#ApolloSMB2BDBDesc = СМ Аполлон содержит основные топливные баки, топливные элементы, системы жизнеобеспечения и всё необходимое для полёта к Луне.
		#ApolloSMB2BDBBayToggle = Переключить люк SIM
		#ApolloSMB2BDBBayJettison = Сбросить люк SIM
		#rocApolloDipoleBDBTitle = ВЧ дипольная радарная антенна Аполлон-17
		#rocApolloDipoleBDBDesc = Выдвижная дипольная антенна для сбора данных ВЧ-радарного зондирования. В крайнем случае годится и для связи. Крепится парой к узлам двигательной плиты Аполлона.
		#rocApolloVHFBDBTitle = УКВ антенна «Яги» Аполлон-17
		#rocApolloVHFBDBDesc = Складная антенна «Яги» для улучшения сбора данных УКВ-радарного зондирования. В крайнем случае годится и для связи. Крепится к узлу на двигательной раме Аполлона под научным отсеком.
		#rocApolloCADSActiveTitle = Активный узел стыковки CADS, Аполлон Блок IV
		#rocApolloCADSActiveDesc = Универсальный андрогинный узел стыковки CADS. Устраняет ограничения гендерной системы Аполлона и даёт больший проход для грузов. Оснащён выдвижным кольцом захвата для гашения удара. На постоянных портах станции можно ставить более простой и лёгкий пассивный вариант.
		#rocApolloCADSPassiveTitle = Пассивный узел стыковки CADS, Аполлон Блок IV
		#rocApolloCADSPassiveDesc = Универсальный андрогинный узел стыковки CADS. Устраняет ограничения гендерной системы Аполлона и даёт больший проход для грузов. Оснащён выдвижным кольцом захвата для гашения удара. На постоянных портах станции можно ставить более простой и лёгкий пассивный вариант.
		#rocApolloCMBDBBlockIIIDesc = Существенно доработан под новую роль челнока НОО: внутренний объём рассчитан на 5 членов экипажа при спуске. Для дополнительного жилого объёма пристыкуйте после выхода на орбиту жилой модуль. Используя только КМ, ресурсов хватит на 5 человек на 72 часа. ВЫМЫСЕЛ (Eyes Turned Skyward)
		#rocApolloCMBDBBlockIIITitle = Командный модуль Аполлон Блок III+ (КМ)
		#rocApolloHGABlockIIITitle = ОНА Аполлон Блок III
		#rocApolloHGABlockIIIDesc = Складная ретрансляционная антенна. Устанавливается на кронштейн двигателя СМ Аполлон Блок III. ВЫМЫСЕЛ (Eyes Turned Skyward)
		#rocApolloHGABlockVTitle = ОНА Аполлон Блок V
		#rocApolloHGABlockVDesc = Складная ретрансляционная антенна с тарелкой большого усиления для передачи ваших находок. Устанавливается на кронштейн двигателя СМ Аполлон Блок V. ВЫМЫСЕЛ (Eyes Turned Skyward)
		#rocApolloHSBDBBlockIIITitle = Теплозащита Аполлон Блок III+
		#rocApolloHSBDBBlockIIIDesc = Облегчённая теплозащита для капсулы Аполлон Блок III+, для операций на НОО.
		#rocApolloMissionModuleTitle = Жилой модуль Аполлон Блок III+
		#rocApolloMissionModuleDesc = Увеличивает жилой объём и длительность миссии CSM Аполлон Блок III. По сути, несколько лишних кубометров жилого пространства для экипажа. Устанавливается вверх ногами вместо лунного модуля, со стыковочными узлами на обоих концах. Отстыковывается вместе с CSM после выхода на круговую орбиту. ВЫМЫСЕЛ (Eyes Turned Skyward)
		#rocApolloMissionModule4Title = Жилой модуль Аполлон Блок IV
		#rocApolloMissionModule4Desc = С появлением более мощных носителей для пилотируемых миссий на НОО, прежний жилой модуль Блока III+ заменили на больший. Верхний узел увеличен под крупные андрогинные стыковочные порты. Устанавливается вверх ногами вместо лунного модуля, со стыковочными узлами на обоих концах. Отстыковывается вместе с CSM после выхода на круговую орбиту.
		#rocApolloSMBlockIIITitle = СМ Аполлон Блок III+
		#rocApolloSMBlockIIIDesc = Существенно доработан под роль челнока НОО — СМ уменьшили в размере и массе. ВЫМЫСЕЛ (Eyes Turned Skyward)
		#rocApolloSMBlockIVTitle = СМ Аполлон Блок IV
		#rocApolloSMBlockIVDesc = Увеличенный СМ для роста грузоподъёмности Аполлон Блок 4. ВЫМЫСЕЛ (Eyes Turned Skyward)
		#rocApolloSolarBlockVTitle = Батарея Аполлон Блок V
		#rocApolloSolarBlockVDesc = Выдвижная следящая солнечная панель 3-го уровня для CSM Аполлон Блок V. 8.05 м². ВЫМЫСЕЛ (Eyes Turned Skyward)
		#rocLEMAscentBDBTitle = Взлётная ступень ЛМ Аполлон
		#rocLEMAscentBDBDesc = Взлётная ступень и кабина экипажа лунного модуля Аполлон.
		#rocLEMDecouplerBDBTitle = Разделитель ЛМ Аполлон
		#rocLEMDecouplerBDBDesc = Пирозамок между взлётной и посадочной ступенями лунного модуля Аполлон.
		#rocLEMDescentBDBTitle = Посадочная ступень ЛМ Аполлон
		#rocLEMDescentBDBDesc = Посадочная ступень лунного модуля Аполлон. Оснащена ящиками для хранения оборудования.
		#rocLEMLegsBDBTitle = Опоры ЛМ Аполлон
		#rocLEMLegsBDBDesc = Прочная убирающаяся посадочная опора — отлично подходит для посадки на другие тела. Есть несколько вариантов дизайна опор.
		#rocLEMMESABDBTitle = Отсек MESA ЛМ Аполлон
		#rocLEMMESABDBDesc = Отсек с оборудованием для ВКД и камерами для съёмки первых шагов на Луне. Крепится слева от лестницы ЛМ.
		#rocLEMAscentTaxiBDBTitle = Взлётная ступень AES LM Taxi
		#rocLEMAscentTaxiBDBDesc = Кабина взлётной ступени LM Taxi рассчитана на трёх человек для спуска на поверхность Луны поверх посадочной ступени, длительного пребывания и возврата на орбиту. Во время работы на поверхности Taxi отключается и переводится в спящий режим для экономии ресурсов, а экипаж работает из отдельно посаженного укрытия. Включает радиаторы и раскладную теплоизоляцию на период спячки. Перед стартом убедитесь, что весь экипаж на борту. Из-за низкой тяговооружённости с 3 членами экипажа перед стартом рекомендуется оставить всё оборудование.
		#rocLEMFoldingSNAP27BDBTitle = РИТЭГ серии SNAP-27
		#rocLEMFoldingSNAP27BDBDesc = Складное крепление SNAP-27. Для улучшенных лунных миссий, которым нужны дежурное питание и тепло на время спячки при долгом выходе.
		#rocLEMRackSNAP9BDBTitle = Счетверённый РИТЭГ серии SNAP-9
		#rocLEMRackSNAP9BDBDesc = Радиальная счетверённая версия РИТЭГ SNAP-9. Для улучшенных лунных миссий, которым нужны дежурное питание и тепло на время спячки при долгом выходе.
		#rocLEMShelterBDBTitle = Укрытие AES LM
		#rocLEMShelterBDBDesc = Долгие пребывания на поверхности требуют больше ресурсов, чем вмещает один посадочный модуль ЛМ. Это выделенный модуль-укрытие. Включает топливные элементы, раскладную теплоизоляцию и раздвижной шлюз — убедитесь, что передняя опора без «крыльца». Требует доп. баков кислорода в посадочном модуле для питания экипажа и элементов.
		#rocLEMTruckPlatformBDBTitle = Грузовая платформа AES LM Truck
		#rocLEMTruckPlatformBDBDesc = Платформа устанавливается сверху посадочной ступени ЛМ. Включает выдвижные пандусы для спуска ровера на поверхность Луны. Ровер и его детали не входят.
		#rocLEMTruckRCS3BDBTitle = Блок РСУ ×3 AES LM Truck
		#rocLEMTruckRCS3BDBDesc = Доработанный блок РСУ CSM/ЛМ для установки на LM-Truck — обеспечивает независимую ориентацию при автономной посадке.
		#rocLEMTruckRCS4BDBTitle = Блок РСУ ×4 AES LM Truck
		#rocLEMTruckRCS4BDBDesc = Доработанный блок РСУ CSM/ЛМ для установки на LM-Truck — обеспечивает независимую ориентацию при автономной посадке.
		#rocApolloAPAS75DBTitle = Андрогинный узел стыковки APAS-75
		#rocApolloAPAS75DBDesc = Андрогинная периферийная система стыковки 75. Первый полностью андрогинный узел, созданный для программы «Союз — Аполлон».
		#rocApolloASTPAdapterBDBTitle = Стыковочный модуль «Союз — Аполлон»
		#rocApolloASTPAdapterBDBDesc = Специальный модуль для стыковки двух кораблей с обоих концов. Помимо соединения кораблей, даёт дополнительное жилое/рабочее пространство и площадку для экспериментов.
		#rocApolloASTPUVXBDBTitle = Эксперимент по УФ-поглощению «Союз — Аполлон»
		#rocApolloASTPUVXBDBDesc = Доработанная версия дальнего ультрафиолетового спектрометра. Измеряет излучение небесных тел, зодиакальный свет, свечение солнечной атмосферы, звёзд и галактик.
		#rocApolloASTPVHFBDBTitle = УКВ-ЧМ антенна «Союз — Аполлон»
		#rocApolloASTPVHFBDBDesc = Маленькая штыревая УКВ-ЧМ антенна для стыковочного модуля «Союз — Аполлон».
		#rocGeminiAntennaBDBTitle = Штыревая УВЧ антенна Джемини
		#rocGeminiAntennaBDBDesc = Небольшая выдвижная антенна связи Джемини с землёй. Крепится к отсеку оборудования.
		#rocGeminiCMBDBTitle = Кабина Джемини
		#rocGeminiCMBDBDesc = Кабина Джемини на двух астронавтов. С топливными элементами и служебным модулем способна на сложные долгие миссии.
		#rocGeminiEquipmentSectionBDBTitle = Отсек оборудования Джемини
		#rocGeminiEquipmentSectionBDBDesc = Отсек оборудования адаптера Джемини. Содержит O2 и H2 для топливных элементов и жизнеобеспечения, а также топливо для двигателей ориентации и манёвра. Конфигурация Джемини 10+. Соотношение О/Г РСУ 1.223:1.
		#rocGeminiHSBDBTitle = Теплозащита Джемини
		#rocGeminiHSBDBDesc = Теплозащита капсулы Джемини для спуска с НОО. Можно переключить в конфигурацию Джемини B с люком.
		#rocGeminiHSLunarBDBTitle = Лунная теплозащита Джемини
		#rocGeminiHSLunarBDBDesc = Улучшенная теплозащита капсулы Джемини для лунных траекторий. Можно переключить в конфигурацию Джемини B с люком. <b><color=red>У Джемини нет радиационной теплозащиты продвинутых капсул. Только очень плавный лунный спуск.</color></b>
		#rocGeminiLCMBDBTitle = Кабина Джемини L
		#rocGeminiLCMBDBDesc = Джемини L — проект капсулы для спуска с окололунной траектории, с доработанной теплозащитой по типу Аполлона.
		#rocGeminiNoseCapBDBTitle = Аэродинамический носовой кожух Джемини
		#rocGeminiNoseCapBDBDesc = Закрывает нос стыковочного механизма Джемини на этапе выведения. Сбросьте по выходе из атмосферы.
		#rocGeminiNoseconeBDBTitle = Носовой стыковочный механизм Джемини
		#rocGeminiNoseconeBDBDesc = Одно из ключевых умений, которое отрабатывает программа Джемини — сближение и стыковка в космосе. Этот простой механизм не передаёт экипаж и ресурсы, но соединяет два корабля в полёте. Это активный «штыревой» узел, работающий с пассивным адаптером Agena. Есть направляющий ключ, входящий в V-паз адаптера Agena для точной центровки кораблей.
		#roGeminiNoseconeAeroBDBTitle = Носовой обтекатель Джемини
		#roGeminiNoseconeAeroBDBDesc = Облегчённый обтекатель Джемини без стыковочного узла.
		#roGeminiOAMSRCSBDBTitle = Система ориентации и манёвра Джемини (SE-7-100) (РСУ)
		#roGeminiOAMSRCSBDBDesc = Крошечный двигатель, но его достаточно для манёвров капсулы Джемини на низкой орбите. Настроен как РСУ.
		#roGeminiOAMSBDBTitle = Система ориентации и манёвра Джемини (SE-7-100)
		#roGeminiOAMSBDBDesc = Крошечный двигатель, но его достаточно для манёвров капсулы Джемини на низкой орбите. Настроен как двигатель.
		#roGeminiParachuteBDBTitle = Посадочная парашютная система Джемини
		#roGeminiParachuteBDBDesc = Основной парашют Джемини. Крепится сверху блока управления спуском Джемини.
		#roGeminiParachuteDrogueBDBTitle = Тормозной парашют Джемини
		#roGeminiParachuteDrogueBDBDesc = Тормозной парашют капсулы Джемини. Крепится к узлу в носовой секции.
		#roReentryControlSystemBDBTitle = Блок управления спуском Джемини
		#roReentryControlSystemBDBDesc = Содержит топливо и двигатели для трёхосной ориентации Джемини после отделения секции адаптера. Соотношение О/Г РСУ 1.25:1.
		#roGeminiRetroBDBTitle = Тормозная ракета Джемини (Star-13E)
		#roGeminiRetroBDBDesc = Твердотопливный тормозной двигатель Джемини на базе Star 13. Ставится в 4х симметрии в пазах крестовины тормозного модуля.
		#roRetrogradeDecouplerBDBTitle = Разделитель тормозной секции Джемини
		#roRetrogradeDecouplerBDBDesc = Низкопрофильный разделитель для отделения капсулы Джемини от тормозной секции адаптера.
		#roGeminiRetrogradeSectionBDBTitle = Тормозная секция Джемини
		#roGeminiRetrogradeSectionBDBDesc = Полый силовой адаптер поверх отсека оборудования Джемини, вмещает четыре тормозных двигателя для спуска. Также содержит шесть двигателей поступательного управления.
		#roBigGeminiCabinBDBTitle = Кабина экипажа Big G
		#roBigGeminiCabinBDBDesc = По мере усложнения космических операций растёт потребность в экипаже. Этот расширенный модуль заменяет стандартный СМ Джемини, добавляя семь мест. Используется с доработанным СМ Аполлон для дальнего космоса или со служебным модулем Big Gemini для операций на НОО.
		#roBigGeminiDecouplerTitle = Разделитель служебного модуля Big G
		#roBigGeminiDecouplerDesc = Разделитель между теплозащитой капсулы и служебным модулем. Включает кабель-мачту для связи капсулы с системами модуля.
		#roBigGeminiDockingAdapterTitle = Стыковочный адаптер Big G
		#roBigGeminiDockingAdapterDesc = Силовой стыковочный адаптер для Big Gemini. Идеально подходит под активный узел Аполлон.
		#roBigGeminiHSTitle = Теплозащитный экран Big G
		#roBigGeminiHSDesc = Теплозащита капсулы Big Gemini
		#roBigGeminiHSLunarTitle = Лунный теплозащитный экран Big G
		#roBigGeminiHSLunarDesc = Лунная теплозащита капсулы Big Gemini. <b><color=red>У Джемини нет радиационной теплозащиты продвинутых капсул. Только очень плавный лунный спуск.</color></b>
		#roBigGeminiLESTitle = Система аварийного спасения Big G
		#roBigGeminiLESDesc = Твердотопливная башня для увода командного отсека от аварийной ракеты. Только для экстренных случаев. ВНИМАНИЕ: ступень САС также отделяется от нижнего узла для утилизации после старта. Назначьте двигатель на группу ABORT для экстренного использования.
		#roBigGeminiMOLPortTitle = Стыковочный механизм MOL
		#roBigGeminiMOLPortDesc = Крупный стыковочный модуль для соединения сегментов MOL. Выполняет мягкую стыковку для центровки сегментов перед стягиванием и фиксацией.
		#roBigGeminiNoseTitle = Носовой обтекатель Big G
		#roBigGeminiNoseDesc = Увеличенный носовой обтекатель Джемини для установки более крупных парашютов Big Gemini. Оборудование сближения и стыковки снято для экономии массы.
		#roBigGeminiParachuteTitle = Посадочная парашютная система Big G
		#roBigGeminiParachuteDesc = Увеличенный основной парашют Big Gemini. Крепится сверху блока управления спуском Джемини.
		#roBigGeminiParachuteDrogueTitle = Тормозной парашют Big G
		#roBigGeminiParachuteDrogueDesc = Увеличенный тормозной парашют Big Gemini. Крепится к узлу в носовой секции.
		#roBigGeminiSMTitle = Служебный модуль Big G
		#roBigGeminiSMDesc = Крупный служебный модуль 2.5м+ концепта Big Gemini 1969 года. Большой гермоотсек в корме для груза и экипажа. Совместим с Аполлоном (нужен свой адаптер, отсек будет недоступен — у теплозащиты Аполлона нет люка), а СМ Аполлон совместим с Big Gemini (адаптер не входит). ПРИМЕЧАНИЕ: без двигателей — добавьте РСУ.
	}
}
