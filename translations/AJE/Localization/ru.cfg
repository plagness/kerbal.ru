		#LOC_aje_part_aje_nene_title = Rolls-Royce Nene Mk.102
		#LOC_aje_part_aje_nene_description = Крупный центробежный ТРД, по сути увеличенный Derwent — улучшенная и увеличенная версия исходного двигателя Уиттла в «прямоточной» схеме. Использовал двусторонний компрессор для роста степени сжатия. Уменьшенный Nene (как Derwent V) стоял на поздних Gloster Meteor; сам Nene — на многих брит. самолётах 1940-х и нач. 1950-х, а в США как лицензионный Pratt & Whitney J42 — на F9F Panther. После передачи Nene в СССР в кон. 1940-х реверс-инженерная копия пошла на МиГ-15. Модель Mk102 кон. 1940-х стояла на Attacker FB.2, Sea Hawk F.1-4 и франц. Ouragan A. 22.24кН, SFC 1.09 фунт/фунт·ч статич. Предел по темп.: M1.8.
