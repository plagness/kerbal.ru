// Русификация фильтр-категорий редактора (VAB) от Community Category Kit (CCK).
// Источник: CommunityCategoryKit/common-filters.cfg — узлы CCKCommonFilterConfig/Item.
// CCK показывает поле name (пропускает через Localizer.Format, литерал проходит как есть),
// поэтому подменяем name на русский литерал. Матчим по tag (стабильный id), не по name.
// Бренд-фильтры (SCANsat, KAS, NFLV, Extraplanetary Launchpads) — латиница, не трогаем.
// Категория появляется в редакторе, только если установлена хотя бы одна деталь с её тегом.

@CCKCommonFilterConfig:FINAL
{
	@Item:HAS[#tag[cck-containers]]  { @name = Контейнеры }
	@Item:HAS[#tag[cck-lifesupport]] { @name = Жизнеобеспечение }
	@Item:HAS[#tag[cck-rovers]]      { @name = Планетоходы }
	@Item:HAS[#tag[cck-lights]]      { @name = Освещение }
}
