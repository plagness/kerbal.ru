// kerbal.ru — русификация РЕЗУЛЬТАТОВ экспериментов (ScienceDefs)
// Мод: CoatlAerospace / ProbesPlus
// Эксперимент: ca_UVspec — «Ultraviolet and Atmospheric Analysis» (УФ-спектрометр LUV)
// Метод: MM-патч по #id, полная замена блока RESULTS. Бренды/тела/коды — латиницей.
// Строк RESULTS: 123 (совпадает с источником)

@EXPERIMENT_DEFINITION:HAS[#id[ca_UVspec]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Вы делаете снимки в ультрафиолетовом диапазоне
	default = Вы делаете серию УФ-снимков
	default = УФ-спектрометр собирает данные, стремясь завершить атмосферный обзор

	SunInSpace = На таком расстоянии от Kerbol, при мощном излучении, жаре и электромагнитных помехах, LUV с трудом снимает хоть какие-то показания. Нам сообщают, что гарантия аннулирована
	SunInSpaceLow = УФ-показания ненадолго зашкаливают, после чего прибор уходит в безопасный режим, чтобы избежать поломки
	SunInSpaceLow = Несмотря на невероятно высокий уровень зафиксированного УФ-излучения, Центр управления отказывается переименовывать «ультрафиолетовое» в «ультра-фиолетово-жестокое»
	SunInSpaceHigh = Зафиксировано мощное УФ-излучение, исходящее от Kerbol
	SunInSpaceHigh = Невольно задумываешься, хватило ли инженерам солнцезащитного крема, чтобы покрыть весь корабль
	SunInSpaceHigh = LUV делает снимки короны Kerbol

	MohoInSpace = С орбиты Moho сделаны УФ-снимки
	MohoInSpaceLow = УФ-отражения указывают на присутствие льда в глубоких кратерах у полюсов
	MohoInSpaceHigh = Атмосферы у Moho не обнаружено
	MohoInSpaceHigh = На таком расстоянии от Kerbol УФ-излучение особенно заметно

	EveInSpace = Спектрометр начинает атмосферный обзор Eve
	EveInSpaceLow = В УФ-спектре над полюсами обнаружены тёмные, зловещие пятна
	EveInSpaceLow = Обнаружено, что в отдельных точках облачного слоя УФ-свет поглощается сильнее, чем в остальных
	EveInSpaceHigh = Атмосфера Eve оказывается очень плотной и отражающей
	EveInSpaceHigh = Похоже, атмосфера Eve состоит в основном из углекислого газа и газообразного йода. Есть ли у неё виноградный вкус — остаётся неясным

		GillyInSpace = Измерены УФ-отражения Gilly
		GillyInSpaceLow = Поверхность Gilly, судя по всему, каменистая по составу
		GillyInSpaceHigh = У крошечной луны атмосферы не обнаружено

	KerbinInSpaceLow = Атмосфера Kerbin поглощает значительную часть УФ-излучения
	KerbinInSpaceLow = УФ-индекс высокий. Центр управления отменяет сегодняшний пикник
	KerbinInSpaceHigh = Облачные слои Kerbin картографируются в УФ-диапазоне в поисках погодных закономерностей
	KerbinInSpaceHigh = Органические соединения Kerbin поглощают значительную долю УФ-излучения

		MunInSpace = Записан УФ-спектр Mun
		MunInSpaceLow = Анализ расположения и распределения водяного льда указывает на то, что он был занесён ударами астероидов или комет
		MunInSpaceLow = Уровни отражательной способности в глубоких кратерах совпадают с характерными для водяного льда
		MunInSpaceHigh = Анализ поверхности некоторых кратеров выявляет лучи, расходящиеся от их центров, — след выбросов вещества после удара

		MinmusInSpace = С Minmus записаны показания УФ-спектрометрии
		MinmusInSpace = УФ-анализ поверхности завершён: мята перечная
		MinmusInSpaceHigh = Поверхность Minmus отражает много УФ-света, но меньше, чем ожидалось

	DunaInSpace = Спектрометр делает ультрафиолетовые снимки Duna
	DunaInSpace = Анализ отражения и поглощения подтверждает: полярные шапки содержат большое количество замёрзшего углекислого газа
	DunaInSpaceLow = У полюсов обнаружено небольшое количество водяного льда
	DunaInSpaceLow = Атмосферные данные указывают на разреженную атмосферу, состоящую в основном из углекислого газа
	DunaInSpaceLow = В отдельных областях вокруг планеты зафиксированы полярные сияния Duna
	DunaInSpaceHigh = Похоже, атмосфера Duna слабо испаряется, вытягиваясь за планетой

		IkeInSpace = Слабые отражения у полюсов могут указывать на присутствие льда
		IkeInSpace = Построены УФ-карты Ike
		IkeInSpaceLow = Поверхность Ike отражает слабо и сложена весьма каменистым материалом
		IkeInSpaceHigh = Атмосферные приборы LUV не находят её и следа у Ike

	DresInSpace = С орбиты Dres сняты УФ-показания
	DresInSpace = Анализ отражательной способности показывает возможное присутствие льда на её поверхности
	DresInSpaceLow = Анализ рассеяния на поверхности выявляет очень заметный каньон
	DresInSpaceHigh = Серии УФ-съёмок подтверждают отсутствие атмосферы у Dres
	DresInSpaceHigh = Вблизи Dres обнаружены и другие отражающие объекты. Центр управления начинает спорить, не пора ли поднять уровень DEFCON

	JoolInSpace = Сделано множество снимков, чтобы картографировать УФ-излучение Jool
	JoolInSpace = Полярные сияния Jool легко различимы в ультрафиолетовом диапазоне
	JoolInSpaceLow = Атмосферный анализ выявляет водяной пар в грозовых облаках нижнего слоя
	JoolInSpaceLow = Анализ состава атмосферы обнаруживает в ней водород и гелий

		LaytheInSpace = LUV делает УФ-снимки Laythe
		LaytheInSpaceLow = Атмосфера: есть. Экзотические острова: есть. «Волны — отпад, чувак»: есть. Отпуск за счёт KSC: отказано
		LaytheInSpaceLow = УФ-снимки показывают крупные водоёмы с жидкой водой и едва различимые далёкие архипелаги
		LaytheInSpaceHigh = УФ-спектроскопия подтверждает наличие воды и здоровой атмосферы с благоприятными условиями для полётов
		LaytheInSpaceHigh = Анализ отражательной способности подтверждает наличие атмосферы и больших запасов воды

		VallInSpace = Свежие УФ-снимки Vall готовы к анализу
		VallInSpaceLow = У Vall очень ледяная поверхность, вероятно, содержащая филлосиликаты
		VallInSpaceLow = LUV засекает слабый шлейф водяного пара — а может, это небольшой криовулкан
		VallInSpaceHigh = Атмосферы у Vall не обнаружено

		TyloInSpace = Атмосферы у Tylo не обнаружено
		TyloInSpaceLow = В кратерах обнаружены карманы льда. Скорее всего, он занесён ударами комет и астероидов, отклонённых гравитацией Jool
		TyloInSpaceHigh = Пятна сильно отражающего материала вполне могут оказаться залежами льда
		TyloInSpaceHigh = Тщательное исследование подтверждает отсутствие атмосферы у Tylo

		BopInSpace = Проверка Bop на атмосферу: отрицательно
		BopInSpaceLow = Снимки поверхности указывают на каменистый и, возможно, металлический состав, как у астероидов
		BopInSpaceHigh = Телеметрия зонда сообщает: «Боюсь, я не могу этого сделать»

		PolInSpace = Ещё один УФ-анализ — и по-прежнему ни следа атмосферы
		PolInSpaceLow = УФ-снимки получены. Из Pol с LUV
		PolInSpaceHigh = Похоже, льда на поверхности совсем немного
		PolInSpaceHigh = Атмосферы не обнаружено. Обрабатываем снимки поверхности

	EelooInSpace = УФ-считывание с Eeloo: ЗАВЕРШЕНО
	EelooInSpaceLow = УФ-уровни записаны. Центр управления разрешает обойтись без солнцезащитного крема
	EelooInSpaceLow = На поверхности определённо много льда, возможно, метанового
	EelooInSpaceHigh = Надо было отправить поэта

	//Outer Planets Mod

	SarnusInSpace = С Sarnus получены снимки УФ-спектра
	SarnusInSpaceLow = Анализ атмосферных снимков намекает, что верхний облачный слой состоит из аммиачного льда
	SarnusInSpaceLow = Похоже, облака формируются на разных высотах и различаются по элементному составу
	SarnusInSpaceHigh = Снимки подтверждают, что кольца состоят преимущественно из ледяных частиц разного размера
	SarnusInSpaceHigh = У частиц внешних колец, похоже, открытого льда больше, чем у частиц внутренних

		TektoInSpaceHigh = Анализ рассеяния света в верхней атмосфере указывает на состав, преимущественно азотный
		TektoInSpaceLow = Атмосфера Tekto оказывается очень плотной смесью азота с прочими органическими соединениями
		TektoInSpaceLow = В атмосфере обнаружены органические соединения. Наличие хлора могло бы объяснить её зеленоватый оттенок
		TektoInSpaceHigh = Некоторые облака, снятые сквозь дымку, оказываются гораздо выше остальных, что указывает на иной химический состав
		TektoInSpaceHigh = Более детальный анализ показывает очень плотную атмосферу. Значительная часть её верхнего слоя взаимодействует с УФ-светом Kerbol

		SlateInSpace = С Slate записаны показания УФ-спектрометрии
		SlateInSpaceHigh = С орбиты Slate сделаны УФ-снимки
		SlateInSpaceLow = Ведущий исследователь расстроен: без атмосферы отчёт выйдет скучным
		SlateInSpaceLow = Альбедо поверхности подтверждает каменистый состав почти без ледяных материалов

		HaleInSpace = Анализ отражательной способности показывает много льда на поверхности
		HaleInSpaceHigh = На поверхности определённо много льда, вероятно, того же, что и в кольцах
		HaleInSpaceLow = Обнаружены тёмные, зловещие пятна, разбивающие в остальном ледяную поверхность

		OvokInSpaceHigh = Атмосферы не обнаружено. Обрабатываем снимки поверхности
		OvokInSpaceHigh = По всей поверхности луны обнаружен сильно отражающий материал
		OvokInSpaceLow = УФ-спектрометр не находит существенных различий между разными формами рельефа Ovok
		OvokInSpaceLow = По УФ-снимкам невозможно различить биомы — если они у неё вообще есть...

	UrlumInSpace = Свежие УФ-снимки Urlum готовы к анализу!
	UrlumInSpaceLow = УФ-спектры показывают присутствие кристаллов аммиачного льда в облачных слоях
	UrlumInSpaceLow = Спектрометр фиксирует переменный состав облаков
	UrlumInSpaceHigh = В УФ-диапазоне получены некоторые данные о составе облаков, но между поясами планеты почти нет различий
	UrlumInSpaceHigh = Пояса планеты начинают хоть немного различаться лишь после долгой подстройки параметров спектрометра

		WalInSpaceHigh = Wal предстаёт в основном каменистым телом, хотя есть и признаки минералов или металлов
		WalInSpaceHigh = Анализ отражательной способности показывает возможное присутствие крошечных карманов льда на поверхности Wal
		WalInSpaceLow = На поверхности есть признаки некоторого химического разнообразия
		WalInSpaceLow = Похоже, поверхность луны покрыта льдом лишь местами, что довольно неожиданно, учитывая её удалённость от Kerbol

			TalInSpace = Спектрометр делает ультрафиолетовые снимки Tal
			TalInSpace = УФ-спектрометр показывает много льда на поверхности
			TalInSpace = Очень высокое альбедо поверхности подтверждает ледяную и гладкую поверхность

		PriaxInSpaceHigh = Снимки показывают относительно тёмную, похожую на астероид луну
		PriaxInSpaceLow = Priax выглядит каменистой редкостью для внешней части системы, где полно ледяных тел
		PriaxInSpace = Priax не выдаёт заметных УФ-излучений или отражений. Просто скучный камень

		PoltaInSpaceHigh = Спектрометр фиксирует высокое альбедо, неизменно сопутствующее очень ледяной поверхности
		PoltaInSpaceHigh = Над горизонтом обнаружен водяной пар, который мог быть выброшен либо криовулканом, либо гейзером
		PoltaInSpaceLow = Прибор фиксирует УФ-сигнатуру, которая может указывать на присутствие на поверхности как хлора, так и силикатов
		PoltaInSpaceLow = У Polta и правда полно льда

	NeidonInSpace = Некоторые пояса светятся в ультрафиолете, давая подсказки об их химическом составе
	NeidonInSpaceHigh = УФ-снимки показывают, что метан преобладает на бо́льших высотах в южном полушарии
	NeidonInSpaceHigh = Пояса Neidon чуть ниже каждого полюса, похоже, излучают больше УФ-света
	NeidonInSpaceLow = Близкие измерения УФ-излучения используются для создания улучшенных цветных снимков Neidon

		ThatmoInSpaceHigh = Атмосфера Thatmo оказывается очень разреженной — слабее даже, чем у Duna
		ThatmoInSpaceHigh = Прибор фиксирует состав, преимущественно азотный
		ThatmoInSpaceLow = Вблизи УФ-анализ менее эффективен из-за очень яркой и отражающей поверхности из азотного льда
		ThatmoInSpaceLow = Thatmo продолжает поражать ярким льдом и активной геологией. У криовулканических жерл также фиксируются спектры метана
	}
}
