// Русификация результатов экспериментов CoatlAerospace ProbesPlus
// Эксперимент: ca_rpws — Данные радиоплазменных волн (Radio Plasma Wave Data)
// Источник: GameData/CoatlAerospace/ProbesPlus/Resources/ScienceDefs.cfg
// Метод: ModuleManager :FINAL — полная замена блока RESULTS.

@EXPERIMENT_DEFINITION:HAS[#id[ca_rpws]]:FINAL
{
    !RESULTS {}
    RESULTS
    {
        default = Вы измеряете фоновые радио- и плазменные помехи
        default = Сняты замеры локализованных плазменных волн
        default = Зафиксированы радиоволны и ионизированные частицы
        default = Зафиксированы радиоволны и ионизированные частицы. Выйдет убойный микстейп

        SunInSpace = Звезда заливает космос фоновым излучением, различимым в радиодиапазоне
        SunInSpaceLow = Звезда испускает крайне мощные радиоволны
        SunInSpaceHigh = Заряженные частицы регистрируются даже на таком расстоянии

        MohoInSpace = С Мохо получены данные о радиоплазменных волнах
        MohoInSpace = От Мохо не исходит никаких атмосферных помех
        MohoInSpace = *Громкий треск помех и вой*

        EveInSpace = Мощное магнитное поле Ив, судя по всему, отклоняет массу ионизированных частиц
        EveInSpaceLow = Анализ записанных данных намекает, что причина радиопомех — молнии
        EveInSpaceHigh = Заряженные частицы регистрируются по всей длине магнитного хвоста Ив

        GillyInSpace = Записанные радиопомехи оказались частицами, отклонёнными Ив

        KerbinInSpace = Радиопомехи вызваны отклонениями от атмосферы
        KerbinInSpaceLow = Вы ловите радиотрансляцию жаркого научного спора. Неудивительно, что побеждает Кракен
        KerbinInSpaceLow = Выяснилось, что атмосфера Кербина отклоняет массу частиц и длинноволновых радиоволн
        KerbinInSpaceHigh = Регистрируются радиосигналы вперемешку с отклонёнными заряженными частицами
        KerbinInSpaceHigh = *помехи* Освободите эту частоту... *помехи*
        KerbinInSpaceHigh = Зарегистрирована мощная несущая волна от антенны DSN

        MunInSpace = Записи радиоплазмы с орбиты Муны лишний раз подтверждают отсутствие атмосферы
        MunInSpaceLow = С тёмной стороны Муны поймана странная передача *помехи* солнце *помехи* та же *помехи* относительно *помехи* ты старше *помехи*...

        MinmusInSpace = Обнаружены ионизированные частицы вместе с фоновыми радиосигналами от Кербина
        MinmusInSpace = Выяснилось, что отклонённые радиоволны от Кербина достигают аж Минмуса

        DunaInSpace = Данные показывают локальные радиоотклонения или излучение в северном полушарии
        DunaInSpace = Антенны улавливают слабые помехи с прерывистыми отражениями, вероятно, от редких ионизированных частиц
        DunaInSpaceLow = Похоже, в нижних слоях атмосферы происходит некая ионизация, несмотря на её разрежённость

        IkeInSpace = Анализ радиодиапазона показывает ионизированные помехи, исходящие не от Айка и не от Дуны
        IkeInSpace = Записи содержат лишь фоновые волны от Джула или Кербола

        DresInSpace = Электромагнитное излучение Кербола и на таком расстоянии регистрируется отчётливо
        DresInSpace = Волновой анализ указывает на рассеяние от поверхности, ничем не сдерживаемое атмосферой

        JoolInSpace = Сильное магнитное поле отклоняет огромную долю солнечного излучения звезды
        JoolInSpaceLow = Внутри магнитосферы планеты регистрируются волновые узоры, совсем не похожие на те, что снаружи
        JoolInSpaceHigh = Магнитное поле Джула порождает уникальные радиоволновые возмущения, которые должны намекнуть на его внутренний состав

        LaytheInSpace = Похоже, магнитные поля Джула удерживают массу плазмы на орбите Лейта
        LaytheInSpace = Антенны записывают симфонию радиосигналов, порождённых мощным магнитным взаимодействием планеты и Лейта
        LaytheInSpaceLow = 4, 8, 15, 16, 23, 42...  4, 8, 15, 16...

        VallInSpace = Возбуждённые ионосферой планеты частицы продолжают отдаваться эхом даже на этой высоте
        VallInSpace = Данные о радиоволнах записаны с орбиты Валла. Планета по-прежнему сильно влияет на всю активность в этом спектре

        TyloInSpace = Выяснилось, что Тайло тоже во многом защищён магнитным полем планеты
        TyloInSpace = За Тайло зафиксированы слабые ионизированные частицы, отдающиеся эхом, — вероятно, отклонённые за время его обращения

        PolInSpace = Похоже, Пол почти не взаимодействует с заряженными частицами планеты
        PolInSpace = Фоновые отголоски планеты, записанные на этой высоте, стали хитом в соцсетях, но научной ценности почти не имеют

        BopInSpace = Зарегистрирован сигнал, отдалённо напоминающий азбуку Морзе, но не подчиняющийся ни одному различимому электронному или природному узору
        BopInSpace = Обнаруженные радиосигналы похожи на сильно искажённое отражение собственного сигнала аппарата — вероятно, отклонённого головной ударной волной магнитного поля планеты

        EelooInSpace = В фоновых волнах, зафиксированных у Ило, не различить никаких признаков ионизации
        EelooInSpace = Зарегистрирован очень слабый сигнал от кербинской сети DSN

        AsteroidInSpaceMettalic = Возмущение радиоволн намекает на некое магнитное взаимодействие с астероидом
        AsteroidInSpaceStony = Похоже, астероид никак магнитно не взаимодействует с проходящими волнами

        //Outer Planets Mod

        SarnusInSpace = Замеры радиоизлучения в диапазоне примерно 50–500 kHz анализируют, чтобы точнее определить скорость вращения планеты по её периодическому влиянию на заряженные частицы
        SarnusInSpace = Антенны записывают крайне жутковатые звуки: радиоисточники движутся вместе с магнитным полем
        SarnusInSpace = Выяснилось, что у Сарнуса невероятно сложный набор мощнейших радиоизлучений
        SarnusInSpace = Замеры скорости вращения плазмы планеты дают хорошее представление о скорости вращения магнитных линий, ведь плазма напрямую подвержена влиянию магнитного поля

        TektoInSpace = Записи показывают, что структура и динамика ионосферы сильно зависят от магнитосферы Сарнуса
        TektoInSpace = Похоже, атомы и молекулы в верхних слоях атмосферы луны ионизируются высокоэнергичными частицами — как от Кербола, так и от бомбардировки магнитосферой Сарнуса

        SlateInSpaceHigh = Прибор записывает фоновый шум от планеты
        SlateInSpace = Часть уловленного шума оказалась излучением плазмы, отклонённой или порождённой Сарнусом
        SlateInSpaceLow = От луны внизу зафиксировано очень слабое взаимодействие. Вероятно, из-за отсутствия и атмосферы, и активного магнетизма

        HaleInSpaceHigh = Записанные возмущения резонируют в узоре, схожем с кольцами планеты
        HaleInSpaceLow = Замеры едва отличают луну от колец, в которых она находится
        HaleInSpace = Прибор записывает фоновый шум от планеты

        OvokInSpaceHigh = Записанные возмущения резонируют в узоре, схожем с кольцами планеты
        OvokInSpace = Записанные радиопомехи оказались всего лишь кольцами на фоне

        UrlumInSpace = Записаны невероятно сложные радиосигнатуры, не похожие ни на одно другое тело в системе
        UrlumInSpace = Радиосигнатуры подтверждают, что у Урлума очень мощное и активное магнитное поле — судя по его влиянию на солнечную плазму

        WalInSpaceLow = Прибор регистрирует радиовозмущения, пока луна взаимодействует с магнитосферой Урлума
        WalInSpaceHigh = Обнаружен вихрь ионизированных частиц, взбаламученный движением спутника Вала — Тала

        TalInSpace = Радиопомехи соответствуют металлическому материалу, возмущающему магнитное поле Вала
        TalInSpace = Похоже, плазменные взаимодействия совпадают по времени с обращением Тала вокруг родительской луны

        PriaxInSpaceHigh = На этой высоте регистрируются очень малые колебания, но, похоже, вызваны они не Приаксом
        PriaxInSpaceLow = Ещё один заход радиоплазменных исследований снова улавливает лишь фоновое излучение Урлума

        PoltaInSpaceHigh = Прибор регистрирует эффекты орбитального резонанса Полты и Приакса
        PoltaInSpaceLow = Изменчивые замеры намекают, что Полта либо скрывает под корой жидкость, либо геологически активна

        NeidonInSpace = У Нейдона довольно сильные радиоплазменные показания, особенно на высоких магнитных широтах, у северного полюса
        NeidonInSpace = Замеры возмущённой солнечной плазмы согласуются с переменным влиянием недипольных компонент его магнитного поля

        ThatmoInSpaceHigh = Зарегистрированы помехи, которые могут быть неким процессом ионизации в верхних слоях атмосферы Татмо
        ThatmoInSpaceLow = Радиоантенны улавливают заметное возмущение фонового радиоизлучения Нейдона, когда луна проходит мимо
    }
}
