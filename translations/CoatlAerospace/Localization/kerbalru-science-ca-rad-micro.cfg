// kerbal.ru — русификатор Coatl Aerospace ProbesPlus
// Перевод РЕЗУЛЬТАТОВ экспериментов (ScienceDefs → RESULTS): ca_radsci, ca_micrometeoroid
// Метод: @EXPERIMENT_DEFINITION:HAS[#id[...]]:FINAL — снос старого RESULTS + новый переведённый.
// Ключи ситуаций не трогаем, дубли сохраняем. Бренды/коды латиницей (Kerbol, RTG).

@EXPERIMENT_DEFINITION:HAS[#id[ca_micrometeoroid]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		default = Всё тихо. Похоже, ничего не... ПИНЬ!
		default = Кажется, удар недавно был, но вы прозевали.
		default = Дырка рядом с датчиком МОГЛА БЫ стать результатом опыта, но вам сейчас не до неё — вы затыкаете взрывную разгерметизацию.

		KerbinInSpaceLow = УДАР... к счастью, всё вроде цело. Похоже, корабли переживают попадания обломков, но стоит убедиться, что наши аппараты защищены.
		KerbinInSpaceLow = Когда Муна летит тебе в глаз, как большая пицца... это удар!
		KerbinInSpaceHigh = С выходом на более высокую орбиту детектор фиксирует меньше ударов.

		MunInSpaceLow = Похоже, у Муны была своя маленькая луна — ой. Уже нет.
		MunInSpaceHigh = Эти тихие «пиньк-пиньк»? Ага, это ваш научный результат оповещал о своём прибытии.

		MinmusInSpaceLow = Судя по последним ударам, вы уверены: Минмус вызывает вас на игру в снежки.
		MinmusInSpaceHigh = Все эти крошечные частицы чем-то напоминают посыпку на рожке мороженого...

		MohoInSpaceLow = Должно быть, Kerbol отколол от Мохо кусок породы.
		MohoInSpaceHigh = Мы открыли новое тело на орбите Мохо и назвали его Мохотеор... э-э... ну, оно тут было. Мгновение.

		EveInSpaceLow = Ого! Похоже, детектор только что прошёл сквозь метеорный поток!
		EveInSpaceHigh = Фиолетовые планеты, фиолетовые облака, фиолетовая пыль... что они, чёрт возьми, кладут в еду?

		GillyInSpaceLow = Возможно, это был ещё более мелкий братишка Гилли...
		GillyInSpaceHigh = Камень, что в вас только что врезался, был меньше Гилли или больше? Непонятно...

		DunaInSpaceLow = Ой! Кажется, вы не ждали этого удара... или ждали?
		DunaInSpaceHigh = Похоже, дунароиды ничем не отличаются от прочих метеороидов. Твёрдые как камень и жаждут вас прикончить при любой возможности.

		IkeInSpaceLow = Вы спрашиваете Вернера, не тот ли это легендарный волшебный валун... Ну или хотя бы его кусочек.
		IkeInSpaceHigh = Айк на месте, а вот Майка нигде не видать. Что это за клякса на детекторе?

		DresInSpaceLow = Вы бросили считать удары вскоре после прибытия к Дресу.
		DresInSpaceHigh = Если Дрес не пытается вас убить, откуда 42 заплатки на корпусе и ни одного попадания в детектор?

		JoolInSpaceLow = Похоже, орбиты всякого мелкого мусора давным-давно упали в газовый гигант... ПИНЬ!
		JoolInSpaceHigh = Судя по всему, у Джула даже частицы крупнее...

		LaytheInSpaceLow = Этот удар был какой-то определённо... влажный.
		LaytheInSpaceHigh = Похоже, Лейт официально чихнул на ваш детектор. Поздравляем: вы первыми открыли космические козявки!

		VallInSpaceLow = Ещё один удар... и что с того?
		VallInSpaceHigh = В секторе 637-K частицы были мелкие и зернистые, а тут покрупнее. Кажется, мы нашли... грязь!

		TyloInSpaceLow = Прибор фиксирует крупный удар, а следом множество мелких.
		TyloInSpaceHigh = Тот звук был не от удара, а прямым следствием космической еды. КЛАНГ! А вот ЭТО был удар!

		BopInSpaceLow = Полёт, это ЦУП. Нет, вы только что НЕ столкнулись с Бопом.
		BopInSpaceHigh = ЦУП, это Полёт. Мы что, только что столкнулись с Бопом?

		PolInSpaceLow = Судя по удару, мы врезались во что-то кристаллическое по природе.
		PolInSpaceHigh = Пол при пытливом подходе попросту предоставил правильные, предсказанные принципы попаданий.

		EelooInSpaceLow = Похоже, даже в такой дали кораблям приходится иметь дело с космическим мусором.
		EelooInSpaceHigh = Пришли, увидели, получили ещё камней по корпусу.

		AsteroidInSpaceLow = Похоже, куски астероида откололись из-за возни вокруг него...
		AsteroidInSpaceHigh = СТОП! Никто ничего не говорил про камни вокруг камня.
		AsteroidSrfLanded = Детектор сердито пиньчит, осыпаемый обломками от нашей посадки.

		//Outer planets Mod

		SarnusInSpace = Зафиксированы удары — возможно, отклонённые частицы колец
		SarnusInSpaceLow = Ага, у Сарнуса есть кольца

			TektoInSpace = Прибор регистрирует удар, который затем оказался зевком самого корабля
			TektoInSpace = Те немногие удары, что фиксируются на этой высоте, крошечные. Похоже, сюда отклоняется совсем мало частиц колец

			SlateInSpaceHigh = Зафиксированы удары — возможно, отклонённые частицы колец
			SlateInSpaceLow = Слейт сонно сыплет скользкой слякотью, которая, скользя, сползает в слот эксперимента

			HaleInSpaceHigh = Зафиксированы удары — возможно, отклонённые частицы колец
			HaleInSpaceLow = Удары, записанные у Хейла, здорово напоминают град у нас дома
			HaleInSpaceLow = По мере приближения корабля к плоскости колец прибор записывает нечто вроде того, как в микроволновке лопается мелкий попкорн

			OvokInSpace = Ещё один удар... и что с того?
			OvokInSpace = Похоже, даже в такой дали кораблям приходится иметь дело с космическим мусором

		UrlumInSpace = Похоже, орбиты всякого мелкого мусора давным-давно упали в газовый гигант... ПИНЬ!
		UrlumInSpace = Этот удар был какой-то холодноватый

			WalInSpace = Записан крошечный ледяной удар
			WalInSpace = Всё тихо. Похоже, ничего не прилетит

				TalInSpace = Записан крошечный ледяной удар
				TalInSpace = Нулевые данные — тоже данные, верно?

			PriaxInSpace = Ещё один удар... и что с того?
			PriaxInSpace = Либо детектор только что прошёл сквозь метеорный поток, либо в комнате отдыха доспел попкорн

			PoltaInSpace = Записан крошечный ледяной удар
			PoltaInSpace = Детектор записывает несколько крошечных крупинок, но в целом полёт спокойный

		NeidonInSpace = Похоже, орбиты всякого мелкого мусора давным-давно упали в газовый гигант... ПИНЬ!
		NeidonInSpace = Судя по удару, мы врезались во что-то кристаллическое по природе

			ThatmoInSpaceHigh = Возможно, детектор поймал удар ледяных кристаллов у Татмо
			ThatmoInSpaceLow = Похоже, в этой области микрометеоритов для регистрации нет
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[ca_radsci]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		default = Уровень радиации записан
		default = Прибор фиксирует любую обнаруженную низкоэнергетическую ионизацию или радиацию

		SunInSpace = Прибор измеряет радиационное излучение звезды
		SunInSpaceLow = Обнаружены очень сильные уровни радиации, идущие нерегулярными «волнами»
		SunInSpaceLow = Зафиксированные уровни наверняка будут опасны для любого экипажа так близко к звезде
		SunInSpaceHigh = Даже на таком расстоянии у Kerbol заметное радиационное излучение
		SunInSpaceHigh = Прибор обнаруживает какие-то ионизированные частицы — может, солнечный ветер?

		MohoInSpace = Обнаружено, что Мохо окружён волнами ионизированных частиц
		MohoSrfLanded = ВНИМАНИЕ: обнаружены высокие дозы радиации. Рекомендуется не покидать помещение
		MohoSrfLanded = Хотя измерения подтверждают, что Мохо бомбардируется солнечной радиацией, у него, похоже, есть некоторая защита, которую можно приписать магнитосфере
		MohoInSpaceLow = Повышенный уровень радиации может быть достаточно силён, чтобы вызывать клеточные мутации
		MohoInSpaceHigh = Зафиксированные уровни более чем в шесть раз выше измеренных у Кербина

		EveSrfLanded = Поверхность, судя по всему, от радиации в основном безопасна, так что это наименьшая из наших забот
		EveFlying = Планета, похоже, по большей части защищена от радиации сильным магнитным полем
		EveFlying = В некоторых слоях облаков, похоже, есть карманы неизвестного радиоактивного вещества
		EveInSpaceLow = Прибор фиксирует рост уровня радиации, а затем довольно резкое падение по мере снижения высоты
		EveInSpaceLow = Низкая орбита Евы оказалась неплохо защищена от радиации звезды
		EveInSpaceHigh = В верхних слоях атмосферы обнаруживаются области сильной ионизации

			GillySrfLanded = Крошечная луна не даёт никакой защиты от солнечной радиации
			GillyInSpace = Обнаружен слегка повышенный уровень радиации

		KerbinSrfLandedKSC = По мере приближения к лаборатории уровень радиации растёт. Наверное, они там возятся с одним из прототипов RTG
		KerbinSrfLandedRunway = Странная лужа зелёной слизи на удивление радиоактивна и яростно осуждает
		KerbinInSpace = Уровень радиации то растёт, то падает на определённых высотах — значит, некий процесс удерживает её там
		KerbinInSpaceLow = Низкая орбита Кербина хорошо защищена от солнечной радиации
		KerbinInSpaceHigh = Дальнейшие измерения подтверждают наличие радиационных поясов, удерживаемых магнитными полями планеты
		KerbinInSpaceHigh = На очень высоких орбитах фиксируется повышенный уровень радиации, что подтверждает потерю защиты магнитосферой планеты

			MunSrfLanded = Уровень радиации достаточно низкий, чтобы почти не мешать выходам в открытый космос, если не задерживаться
			MunInSpace = Уровень радиации вполне обычный
			MunInSpaceLow = Зафиксированный уровень радиации падает и растёт нерегулярно, совсем не как в радиационных поясах Кербина
			MunInSpaceHigh = Уровень радиации, похоже, слегка повышен

			MinmusSrfLanded = Детектор неопределённо колеблется между «Лаймовым щербетом» и «Зелёным яблоком»
			MinmusInSpace = Уровень радиации неожиданно низок для такой дали от планеты
			MinmusInSpaceLow = Прибор фиксирует мало отличий от показаний на больших высотах
			MinmusInSpaceHigh = Записанный уровень радиации довольно низок

		DunaSrfLanded = На расстоянии обнаружена локальная радиация прямо над поверхностью. Кто-то забыл закопать RTG?
		DunaSrfLanded = Радиация на поверхности чуть выше, чем на Кербине. Придётся строго соблюдать график выходов наружу
		DunaFlying = Планета даёт слабую защиту от солнечной радиации, но уровни пока не смертельны
		DunaInSpace = Уровень радиации записан
		DunaInSpaceLow = Обнаружена более высокая доза радиации, чем на такой же высоте у Кербина
		DunaInSpaceHigh = На подлёте суммарная доза радиации ниже, но сильной защиты у планеты нет

		DresSrfLanded = Уровень радиации повышен, но для кербонавтов всё ещё не смертелен
		DresInSpace = Дрес напрямую открыт солнечной радиации
		DresInSpaceLow = Повышенные уровни показывают, что Дрес по-прежнему напрямую подвержен солнечной радиации
		DresInSpaceHigh = Внезапный драматичный всплеск радиации записан и номинирован на «Оскар» за лучшее доказательство второго плана

		JoolSrfLanded = Удали меня прямо сейчас, братан
		JoolInSpace = Высокий уровень радиации, похоже, создаёт некоторые электромагнитные помехи
		JoolInSpaceLow = Джул фонит будь здоров
		JoolInSpaceLow = Пережив путь сквозь радиационные пояса, команда инженеров умоляет планировщиков миссий прокладывать будущие орбиты так, чтобы корабль проводил там как можно меньше времени
		JoolInSpaceHigh = Огромные и мощные радиационные пояса Джула посрамляют кербинские
		JoolInSpaceHigh = Зафиксированные уровни поразительно похожи на кербинские, только в несколько раз выше

			LaytheSrfLanded = Лейт — это рай, всего-то втрое больше радиации, чем на Кербине! Бронируйте сейчас!
			LaytheInSpaceLow = Похоже, спутник всё ещё получает от Джула некоторую защиту от солнечной радиации
			LaytheInSpaceHigh = Уровень радиации слегка повышен

			//Continue below to finish

			VallInSpace = Взаимодействия с плазмой нет — это говорит об отсутствии атмосферы у Валла
			VallInSpaceLow = ЦУП выкрутил ручку на 11. Солнечный ветер снова засечён
			VallInSpaceHigh = Солнечный ветер не обнаружен. Мы что, покинули систему Kerbol?

			PolInSpace = Получен анализ от Пола
			PolInSpaceLow = Анализ обнаруженного здесь солнечного ветра говорит, что его отклонил сюда Джул
			PolInSpaceHigh = По мере приближения к Полу система фиксирует усиление ветровой активности

			TyloInSpace = Результаты заставляют учёных гадать, что случилось с атмосферой Тайло
			TyloInSpaceLow = Несмотря на магнитослой Тайло, ни взаимодействия с солнечным ветром, ни атмосферы, похоже, нет
			TyloInSpaceHigh = Похоже, частицы солнечного ветра отклоняются гравитацией Тайло

			BopInSpace = Данные подтверждают, что у Джула большая магнитосфера, влияющая на характер ветра вокруг него
			BopInSpaceLow = Мощная гравитация Джула отклоняет частицы солнечного ветра на путь Бопа и вокруг него
			BopInSpaceHigh = Солнечный ветер, засечённый на этой широте над Бопом, ведёт себя крайне нерегулярно

		EelooInSpace = Собраны данные с Илу
		EelooInSpaceLow = Здесь солнечный ветер, похоже, движется вдвое быстрее, чем у Кербина
		EelooInSpaceHigh = Тот скудный солнечный ветер, что удаётся засечь, несётся реально быстро!

		//Outer Planets Mod

		SarnusInSpaceLow = Измерения солнечного ветра подтверждают, что Сарнус в значительной мере защищён от солнечных частиц
		SarnusInSpaceHigh = Солнечные частицы отклоняются и рассеиваются, вероятно, мощным магнитным полем планеты
		SarnusInSpaceHigh = Обнаружено, что солнечный ветер взаимодействует с внешней магнитосферой Сарнуса

			TektoInSpace = Текто неплохо защищён от солнечных частиц своей родительской планетой
			TektoInSpace = Обнаруженные частицы, похоже, отклоняются магнитным полем Сарнуса

			SlateInSpaceHigh = Результаты заставляют учёных гадать, что случилось с атмосферой Слейта
			SlateInSpaceHigh = Излучение Kerbol и на такой дали ещё отчётливо фиксируется
			SlateInSpaceLow = Похоже, частицы с поверхности выбрасываются в космос

			HaleInSpace = Помехи от колец Сарнуса не дают получить однозначные результаты
			HaleInSpaceLow = Спутник глубоко укрыт мощной магнитосферой газового гиганта

			OvokInSpace = Собраны данные близ Овока
			OvokInSpace = Здесь солнечный ветер, похоже, движется вдвое быстрее, чем у Кербина

		UrlumInSpaceLow = Магнитосфера Урлума достаточно мощна, чтобы прикрывать планету от большей части солнечной плазмы
		UrlumInSpaceHigh = Солнечные частицы определённо отклоняются магнитным полем планеты
		UrlumInSpaceHigh = Измеренные отклонения солнечной плазмы, похоже, указывают на закрученное вращение вдоль магнитного хвоста Урлума

			WalInSpaceHigh = По измерениям, Урлум даёт некоторую защиту от солнечного ветра
			WalInSpaceLow = Анализ солнечного ветра завершён: банан

				TalInSpace = Анализ солнечного ветра завершён: тапиока
				TalInSpace = Даже на таком расстоянии прибор всё ещё ощущает следы выброса солнечных частиц Kerbol

			PriaxInSpace = Измерения дали более ясную картину магнитосферы Урлума, но не показывают заметного взаимодействия с маленьким спутником
			PriaxInSpaceLow = Несмотря на магнитную защиту Урлума, Приакс, похоже, подвержен некоторому выветриванию солнечным ветром

			PoltaInSpace = Несмотря на магнитную защиту Урлума, Полта, похоже, подвержена некоторому выветриванию солнечным ветром
			PoltaInSpace = Здесь солнечный ветер, похоже, движется вдвое быстрее, чем у Кербина

		NeidonInSpaceLow = Сложное магнитное поле Нейдона любопытно влияет на набегающий солнечный ветер, хотя тот всё равно хорошо отклоняется
		NeidonInSpaceHigh = Обнаружено взаимодействие солнечного ветра с верхней магнитосферой Нейдона

			ThatmoInSpaceHigh = Измеренный солнечный ветер, похоже, сдувает крошечную долю верхней атмосферы Татмо
			ThatmoInSpaceLow = Обратная орбита Татмо прокладывает любопытный путь сквозь солнечный ветер, гуляющий внутри магнитосферы Нейдона
	}
}
