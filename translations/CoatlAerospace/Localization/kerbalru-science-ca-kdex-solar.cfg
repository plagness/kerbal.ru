// kerbal.ru — русификатор результатов экспериментов (ScienceDefs)
// Мод: CoatlAerospace / ProbesPlus
// Эксперименты: ca_solarWind (Solar Wind Measurement), ca_kdex (Dust Analysis)
// Метод: @EXPERIMENT_DEFINITION:HAS[#id[...]]:FINAL — сброс RESULTS и пересборка с переводом.
// Ключи ситуаций (default, KerbinSrfLanded... и т.п.) не трогаем, дубли сохраняем, порядок исходный.

@EXPERIMENT_DEFINITION:HAS[#id[ca_solarWind]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		default = Вы измеряете силу и направление частиц солнечного ветра.
		default = Солнечный ветер Kerbol измерен на этой высоте.
		default = Компьютеры записывают данные о солнечном ветре.

		SunInSpace = Солнечный ветер расходится от Kerbol спиралями — вероятно, вдоль силовых линий его магнитного поля.
		SunInSpace = Прибор записывает колеблющиеся показания и уходит в безопасный режим.
		SunInSpaceLow = Мощные струи солнечного ветра бьют из корональных дыр.
		SunInSpaceLow = Замеры показывают, что здесь скорость ветра ниже, чем у Kerbin.
		SunInSpaceHigh = Показания солнечного ветра записаны.
		SunInSpaceHigh = Данные о солнечном ветре пишутся, пока учёные KSC ожесточённо спорят, называть это «скоростью солнечного ветра» или «вектором скорости солнечного ветра».

		MohoInSpace = Солнечный ветер методично бомбардирует открытую поверхность Moho.
		MohoInSpaceLow = Несмотря на меньшую скорость, солнечный ветер сильно влияет на Moho.
		MohoInSpaceHigh = Вблизи Moho наблюдается заметная нерегулярная активность солнечного ветра.

		EveInSpace = Eve определённо сильно влияет на направление солнечного ветра.
		EveInSpaceLow = Несмотря на хаотичное поведение, Eve, похоже, отклоняет немалую часть солнечного ветра.
		EveInSpaceHigh = Ближе к Kerbol направление солнечного ветра становится всё более беспорядочным.

		GillyInSpace = Отклонённый и прямой солнечный ветер явно достигает поверхности Gilly.
		GillyInSpaceLow = Обнаружено, что Gilly обдувается солнечным ветром, отклонённым Eve.
		GillyInSpaceHigh = На этой высоте замеры Gilly не дают убедительных данных.

		KerbinInSpace = Скорость и сила солнечного ветра записаны в окрестностях Kerbin.
		KerbinInSpaceLow = Выбросы солнечного ветра Kerbol определённо взаимодействуют с атмосферой Kerbin.
		KerbinInSpaceHigh = Скорость ветра записана для сравнения с другими планетами.
		KerbinInSpaceHigh = Kerbin каким-то образом отклоняет солнечный ветер. Учёные предлагают сверить данные с магнитометром.

		MunInSpace = Уровень солнечного ветра фиксируется в окрестностях Mun.
		MunInSpaceLow = Отклонения ветра не заметно, так что Mun принимает солнечный ветер напрямую.
		MunInSpaceHigh = Похоже, частицы с поверхности выбивает в космос.

		MinmusInSpace = Прибор снимает замеры в окрестностях Minmus.
		MinmusInSpaceLow = Датчики солнечного ветра показывают, что Minmus тоже обдувается напрямую.
		MinmusInSpaceHigh = Анализ солнечного ветра завершён: Лайм.

		DunaInSpace = Прибор снимает показания в окрестностях Duna.
		DunaInSpaceLow = Отслеживание направления солнечного ветра показало, что часть его отклоняется и достигает нижних слоёв атмосферы.
		DunaInSpaceHigh = Измеренный солнечный ветер достаточно силён, чтобы сдувать более лёгкие частицы с верхушки поверхности Duna.

		DresInSpace = Результаты записаны. Солнечный ветер бьёт по поверхности Dres напрямую.
		DresInSpaceLow = Замеры скорости показывают, что вдали от Kerbol ветер, оказывается, разгоняется.
		DresInSpaceHigh = *помехи*
		DresInSpaceHigh = Выбросы Kerbol всё ещё отчётливо ловятся у Dres.

		JoolInSpace = Помехи от Jool не дают получить убедительных результатов.
		JoolInSpaceLow = Похоже, солнечный ветер не влияет на глубинные слои магнитосферы Jool.
		JoolInSpaceHigh = Зафиксировано взаимодействие солнечного ветра с верхней магнитосферой Jool.
		JoolInSpaceHigh = Обнаружено, что Jool сильно влияет на направление солнечного ветра.

		LaytheInSpace = Обнаружено, что у Laythe есть магнитослой, отклоняющий плазму солнечного ветра; на неё также влияет гравитация Jool.
		LaytheInSpaceLow = Замечена ионизация плазмы — у Laythe должна быть ионосфера.
		LaytheInSpaceHigh = Из-за близости Laythe взаимодействует с массой солнечных частиц, отклонённых Jool.

		VallInSpace = Взаимодействия с плазмой нет — видимо, у Vall нет атмосферы.
		VallInSpaceLow = KSC выкрутил ручку на 11. Солнечный ветер снова обнаружен.
		VallInSpaceHigh = Солнечного ветра не обнаружено. Мы что, покинули систему Kerbol?

		PolInSpace = Получен анализ с Pol.
		PolInSpaceLow = Анализ обнаруженного здесь солнечного ветра говорит, что его сюда отклонил Jool.
		PolInSpaceHigh = По мере приближения к Pol система фиксирует усиление ветровой активности.

		TyloInSpace = Результаты заставляют учёных гадать, что же случилось с атмосферой Tylo.
		TyloInSpaceLow = Несмотря на магнитослой Tylo, не видно ни взаимодействия с солнечным ветром, ни атмосферы.
		TyloInSpaceHigh = Похоже, частицы солнечного ветра отклоняются гравитацией Tylo.

		BopInSpace = Данные подтверждают: у Jool есть большая магнитосфера, влияющая на картину ветра вокруг него.
		BopInSpaceLow = Огромная гравитация Jool отклоняет частицы солнечного ветра на пути Bop и вокруг него.
		BopInSpaceHigh = Солнечный ветер, зафиксированный на этой широте над Bop, ведёт себя крайне беспорядочно.

		EelooInSpace = Данные собраны у Eeloo.
		EelooInSpaceLow = Похоже, солнечный ветер летит здесь вдвое быстрее, чем у Kerbin.
		EelooInSpaceHigh = Тот скудный солнечный ветер, что удаётся уловить, несётся по-настоящему быстро!

		//Outer Planets Mod

		SarnusInSpaceLow = Замеры солнечного ветра подтверждают, что Sarnus в основном защищён от солнечных частиц.
		SarnusInSpaceHigh = Солнечные частицы отклоняются и возмущаются — вероятно, мощным магнитным полем планеты.
		SarnusInSpaceHigh = Зафиксировано взаимодействие солнечного ветра с внешней магнитосферой Sarnus.

		TektoInSpace = Tekto неплохо защищён от солнечных частиц своей планетой-хозяином.
		TektoInSpace = Похоже, обнаруженные частицы отклоняются магнитным полем Sarnus.

		SlateInSpaceHigh = Результаты заставляют учёных гадать, что же случилось с атмосферой Slate.
		SlateInSpaceHigh = Выбросы Kerbol всё ещё отчётливо ловятся даже так далеко.
		SlateInSpaceLow = Похоже, частицы с поверхности выбивает в космос.

		HaleInSpace = Помехи от колец Sarnus не дают получить убедительных результатов.
		HaleInSpaceLow = Луна надёжно укрыта мощной магнитосферой газового гиганта.

		OvokInSpace = Данные собраны вблизи Ovok.
		OvokInSpace = Похоже, солнечный ветер летит здесь вдвое быстрее, чем у Kerbin.

		UrlumInSpaceLow = Магнитосфера Urlum достаточно мощна, чтобы защитить планету от большей части солнечной плазмы.
		UrlumInSpaceHigh = Солнечные частицы определённо отклоняются магнитным полем планеты.
		UrlumInSpaceHigh = Измеренные отклонения солнечной плазмы, похоже, указывают на закрученное вращение вдоль магнитного хвоста Urlum.

		WalInSpaceHigh = Замеры показывают, что Urlum обеспечивает некоторую защиту от солнечного ветра.
		WalInSpaceLow = Анализ солнечного ветра завершён: Банан.

		TalInSpace = Анализ солнечного ветра завершён: Тапиока.
		TalInSpace = Даже на таком расстоянии прибор всё ещё ощущает выбросы солнечных частиц Kerbol.

		PriaxInSpace = Замеры дали более чёткую картину магнитосферы Urlum, но не показывают заметного взаимодействия с маленькой луной.
		PriaxInSpaceLow = Несмотря на магнитную защиту Urlum, Priax, похоже, подвержена некоторому выветриванию солнечным ветром.

		PoltaInSpace = Несмотря на магнитную защиту Urlum, Polta, похоже, подвержена некоторому выветриванию солнечным ветром.
		PoltaInSpace = Похоже, солнечный ветер летит здесь вдвое быстрее, чем у Kerbin.

		NeidonInSpaceLow = Сложное магнитное поле Neidon интересно влияет на набегающий солнечный ветер, хотя тот всё равно хорошо отклоняется.
		NeidonInSpaceHigh = Зафиксировано взаимодействие солнечного ветра с верхней магнитосферой Neidon.

		ThatmoInSpaceHigh = Измеренный солнечный ветер, похоже, сдувает крошечную долю верхней атмосферы Thatmo.
		ThatmoInSpaceLow = Обратная орбита Thatmo прочерчивает любопытный путь сквозь солнечный ветер, гуляющий внутри магнитосферы Neidon.
	}
}

//KDEX-эксперимент и определения от mastertorch, правки орфографии и доп. определения от Akron
@EXPERIMENT_DEFINITION:HAS[#id[ca_kdex]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		default = Столкнувшиеся с прибором крупинки, похоже, довольно мелкие.
		InSpace = Пыль собирается в облако в форме блина. Это может вызвать противосияние.

		KerbinSrfLandedLaunchpad = Влетающие крупинки состоят из частиц сгоревшего ракетного топлива.
		KerbinSrfLandedRunway = Пыль, похоже, состоит из частиц загрязнений.
		KerbinSrfLandedKSC = Есть свидетельства, что пыль состоит из пыльцы, кербальских волос и волокон скафандров.
		KerbinFlyingLowGrasslands = Плотность крупинок, похоже, как у пыльцы. Апчхи..
		KerbinFlyingLowDeserts = Куча столкновений — весьма пыльное местечко.
		KerbinFlyingLowBadlands = Та самая пыль, что оседает на наших книжных полках.
		KerbinFlyingLowShores = Сыпучий гранулированный материал. Наверное, тот же, что укрывает пляжи, русла рек и пустыни Kerbin.
		KerbinFlyingLowIceCaps = Приближается пыль со сложной спектральной сигнатурой.
		KerbinInSpaceLow = Найдены свидетельства крайне мелких частиц минеральной пыли.
		KerbinInSpaceLow = Здесь, наверху, пыль другая. Она, похоже, складывается в некую форму.
		//KerbinFlyingLowWater =
		//KerbinFlyingLowTundra =

		MunInSpaceHigh = Эта пыль совсем не как тальк. Она какая-то зловредная: тянется вдоль силовых линий поля, пролезает в оборудование.
		MunInSpaceLow = Высокая плотность! Хороший темп столкновений. На малой высоте пыль должна отбрасывать свечение на закате.
		MunInSpaceLowTwinCraters = После каждого столкновения с крупинкой следует столкновение с тем же зарядом.
		MunInSpaceLowEastFarsideCrater = Темп столкновений ниже, зато удары мощные.
		MunInSpaceLowMidlandCraters = Темп столкновений ниже, и удары слабые.
		MunInSpaceLowMidlands = Темп столкновений и удары на среднем уровне.
		MunInSpaceLowHighlands = У крупинок высокий заряд.
		MunInSpaceLowPolarLowlands = В датчик не влетает ни одной крупинки. Возможно, здесь слишком холодно.
		MunInSpaceLowFarsideCrater = Почти никаких столкновений, удары слабые.
		MunSrfLanded = Подтверждено! В экзосфере Mun есть пыль — благодаря электростатической левитации.

		MinmusInSpaceHigh = Почти нет ударов. Плотность ниже, чем у воды. Но выше, чем у мятного мороженого из нашей столовой.
		MinmusInSpaceLowHighlands = Мы обнаружили сульфатные корочки на ионизированных частицах пыли.
		MinmusInSpaceLowMidlands = Стакан нашего прибора похож на мятный сандей.
		MinmusInSpaceLowLowlands = Результаты говорят, что оседающие частицы по составу отличаются от тех, что всё ещё висят выше.
		MinmusInSpaceLowSlopes = Пыль низкого уровня.
		MinmusInSpaceLowGreatFlats = Примечательно, что в собранной пыли нет сульфатных частиц. Это указывает на отсутствие антропогенного загрязнения.
		MinmusInSpaceLowGreaterFlats = Следы пыли из гипса, кварца, NaCl (это может быть морская соль или минерал галит), богатых кальцием частиц и карбонатов кальция.
		MinmusInSpaceLowLesserFlats = Умеренная пыльная буря.
		MinmusInSpaceLowFlats = Состав частиц диаметром более 1 мкм.
		MinmusInSpaceLowPoles = На ионизированных частицах пыли не хватает корочек.

		GillyInSpaceLow = Пыль с силикатными ядрами бьётся в задней стенке прибора.
		GillySrfLanded = У этих крупинок сажистая мантия из аморфного углерода.

		MohoInSpaceLow = Плотность почти как у летучей золы.
		MohoSrfLanded = Тонкий порошок из стеклянных сфер размером от субмикронных до более чем 100 микрон. Удельный вес 1,9-2,4, насыпная плотность 0,8-1 тонны на кубометр.

		EveInSpaceLow = Пыль похожа на стекло. Приближаются сильные удары.
		EveFlying = Мощные удары и высокий темп столкновений — настоящий стресс-тест.

		DunaInSpaceLow = Влетающие крупинки различаются по размеру от нескольких десятых нанометра до нескольких микрон.
		DunaSrfLanded = Пыль довольно зернистая и даёт столкновения, как у песка.

		IkeInSpaceLow = Частиц пыли мало, и они редки.
		IkeSrfLanded = В датчик влетает лишь несколько пылинок. Надо было взять лопату.

		DresInSpaceLow = Пыль, похоже, состоит из углеродистых, силикатных и металлических крупинок.
		DresSrfLanded = Пыль так плотна, что поглощает и рассеивает солнечный свет.

		JoolInSpaceLow = Пыли нет, или крупинки слишком малы, чтобы прибор их распознал.

		LaytheInSpaceLow = Пыль пытается сложиться в форму. То же поведение мы наблюдали у Kerbin.
		LaytheSrfLanded = Сыпучий гранулированный материал. Вероятно, это карбонат кальция.
		LaytheSrfSplashed = В датчик не влетает ни одной крупинки.

		VallInSpaceLow = Пыль пытается сложиться в форму. Плотность ниже, чем у воды.
		VallSrfLanded = Похоже, холод удерживает частицы пыли на поверхности.

		TyloInSpaceLow = Пропусти это — тут просто куча пыли и сопротивления, и в итоге всё это ничего не значит.
		TyloSrfLanded = Из-за высокой гравитации пыль слипается в шарики.

		BopInSpaceLow = Пыль скучивается в плотные ядра.
		BopSrfLanded = В датчике слишком много пыли.

		PolInSpaceLow = Здесь стоило бы начать с влажной уборки.
		PolSrfLanded = Слабые удары. Вероятно, фосфорного или серного происхождения.

		EelooInSpaceLow = Частиц пыли мало, и они редки.
		EelooSrfLanded = Пыль состоит из CO, карбида кремния, аморфного силиката и уймы льда.

		//Outer Planets Mod

		SarnusInSpaceLow = Обнаружены очень мелкие частицы, похоже, отклонённые от плоскости колец.
		SarnusInSpaceHigh = Судя по всему, вокруг Sarnus есть кольцо из частиц пыли.

		TektoInSpace = Обнаружено лишь небольшое количество частиц.
		TektoInSpace = Наклон орбиты Tekto, похоже, не даёт ему захватывать много частиц колец.

		SlateInSpace = Влетающие крупинки различаются по размеру от нескольких десятых нанометра до нескольких микрон.
		SlateLanded = Похоже, холод удерживает частицы пыли на поверхности.
		SlateLanded = Плотность почти как у летучей золы.

		HaleInSpace = Влетающие крупинки различаются по размеру от нескольких десятых нанометра до нескольких микрон.
		HaleInSpacelow = Частота обнаруженных частиц стремительно растёт по мере приближения к плоскости колец планеты.
		HaleLanded = Обнаруженные крупинки — определённо материал из колец, судя по их близости.

		OvokInSpace = Пыль пытается сложиться в форму. Плотность ниже, чем у воды.
		OvokLanded = Пыль, похоже, очень тонкий и пушистый материал. А может, это просто снег...

		UrlumInSpace = Пыли нет, или крупинки слишком малы, чтобы прибор их распознал.
		UrlumInSpaceHigh = Обнаружено несколько частиц — возможно, часть слабого кольца вокруг планеты.

		WalInSpace = Пыль пытается сложиться в форму. То же поведение мы наблюдали у Kerbin.
		WalInSpace = Слабые удары. Вероятно, фосфорного или серного происхождения.

		TalInSpace = Очень тонкие удары — возможно, снежинки.
		TalInSpace = На максимальной чувствительности зафиксированы тонкие, порошкообразные удары.

		PriaxInSpace = Обнаружено немного частиц пыли — вероятно, отклонённых резонансом Priax-Polta.
		PriaxInSpaceLow = Замеры пыли похожи на то, что мы ожидаем у каменистых астероидов.

		PoltaInSpace = Обнаружено немного частиц пыли — вероятно, отклонённых резонансом Priax-Polta.
		PoltaInSpaceLow = Очень тонкие удары — возможно, снежинки.

		NeidonInSpace = Пыли нет, или крупинки слишком малы, чтобы прибор их распознал.
		NeidonInSpace = Частиц пыли мало, и они редки.

		ThatmoInSpaceHigh = Обнаружены слабые снежные частицы — возможно, это сдувается атмосфера Thatmo.
		ThatmoInSpaceLow = Ice, ice, baby! Только это вряд ли со вкусом ванили. Мы ставим на азот.
	}
}
