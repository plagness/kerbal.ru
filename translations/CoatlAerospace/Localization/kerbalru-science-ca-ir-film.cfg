// kerbal.ru — русификация результатов экспериментов CoatlAerospace ProbesPlus
// Эксперименты: ca_IRspec (ИК-спектрометр), ca_filmCamera (плёночная камера)
// Патчи RESULTS (флейвор-текст сбора науки). Ключи ситуаций и порядок строк не изменяются.

@EXPERIMENT_DEFINITION:HAS[#id[ca_IRspec]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Вы измеряете ИК-спектр в поле зрения прибора
	default = Спектрометр снимает локальные замеры в инфракрасном диапазоне
	default = Зафиксированы разные уровни теплового излучения и отражения

	SunInSpace = Записаны инфракрасные данные с окрестностей Kerbol
	SunInSpaceLow = ЦУП передаёт сообщение: «НЕ СМОТРИТЕ ПРЯМО НА СОЛНЦЕ»
	SunInSpaceLow = ИК-замеры на миг зашкаливают, после чего прибор уходит в безопасный режим, чтобы не сгореть
	SunInSpaceHigh = Корону Kerbol измеряют с помощью коронографа — температуры оказываются крайне высокими

	MohoInSpace = ИК-спектрометр снимает тепловое излучение Moho
	MohoInSpaceLow = Анализ поглощения ИК поверхностью указывает на наличие железа и других металлов
	MohoInSpaceLow = На ИК-снимках Moho отчётливо виден контраст между раскалённой дневной и прохладной ночной стороной
	MohoInSpaceHigh = Обращённая к Kerbol сторона Moho выглядит яркой и очень горячей
	MohoInSpaceHigh = ИК-уровни записаны. Пусть лаборанты-стажёры разбираются, от Moho они или от Kerbol

	EveInSpace = Сделаны инфракрасные снимки в окрестностях Eve
	EveInSpaceLow = Атмосфера Eve поглощает изрядную долю инфракрасного излучения
	EveInSpaceHigh = Расчёты ИК-излучения показывают, что под облачным слоем должно быть заперто много инфракрасной радиации
	EveInSpaceHigh = ИК-снимки открывают мир, совсем не похожий на Kerbin

		GillyInSpace = Прибор делает инфракрасные снимки в окрестностях Gilly
		GillyInSpaceLow = Спектральный анализ выявляет на поверхности залежи металлов и руды
		GillyInSpaceHigh = Тепловые показания говорят об отсутствии какой-либо вулканической активности

	KerbinInSpace = Записаны данные теплового излучения с окрестностей Kerbin
	KerbinInSpaceLow = Инфракрасные карты сельхозугодий сняты по заказу Sean's Cannery
	KerbinInSpaceLow = У поверхности крупный тепловой всплеск. А, это же запуск ракеты с KSC!
	KerbinInSpaceLow = Спектрометр замечает очень странную аномалию в океане внизу — в самом центре тайфуна. ЦУП присваивает ей кодовое имя «Инфракрасный Октябрь»
	KerbinInSpaceHigh = Прибор настроен на съёмку инфракрасных карт текущего облачного покрова
	KerbinInSpaceHigh = ИК-излучение фиксируют вокруг населённых районов — чтобы потом легче было искать биологическую активность на других планетах
	KerbinInSpaceHigh = Инфракрасные снимки пробивают облачные слои Kerbin и подсвечивают разные детали рельефа

		MunInSpace = Луна выглядит холодной
		MunInSpaceLow = В глубоких кратерах достаточно холодно, чтобы в затенённых участках удерживался водяной лёд
		MunInSpaceHigh = Кратеры выглядят гораздо холоднее возвышенностей
		MunInSpaceHigh = По тепловым снимкам гораздо проще различать особенности рельефа

		MinmusInSpace = Записаны ИК-карты поверхности
		MinmusInSpaceLow = ИК-данные говорят, что Minmus очень холоден
		MinmusInSpaceLow = Инфракрасная спектрометрия завершена: гуакамоле
		MinmusInSpaceHigh = Возвышенности оказываются теплее низин
		MinmusInSpaceHigh = Разные уровни рельефа излучают или отражают разное количество ИК-света

	DunaInSpace = Сделаны снимки Duna в инфракрасном диапазоне
	DunaInSpaceLow = На ИК-снимках легко разглядеть геологические образования
	DunaInSpaceLow = Полюса очень холодные и содержат водяной лёд
	DunaInSpaceHigh = ИК-данные показывают, что Duna гораздо холоднее, чем предполагалось
	DunaInSpaceHigh = Несмотря на пустынный вид, Duna оказывается довольно холодной

		IkeInSpace = ИК-спектрометр измеряет поглощение тепла
		IkeInSpaceLow = ИК-данные указывают на наличие металлов и руды в поверхности Ike
		IkeInSpaceHigh = Похоже, у Ike очень тёмная и слабо отражающая каменистая поверхность

	JoolInSpace = Времени уходит немало, но ИК-карты Jool всё-таки сняты
	JoolInSpace = Полярные сияния Jool ярко светятся на этой длине волны
	JoolInSpaceLow = В облаках Jool много летучих веществ при очень высоких температурах
	JoolInSpaceHigh = Облачные зоны и пояса Jool чётко различимы на разных ИК-длинах волн
	JoolInSpaceHigh = Jool излучает больше тепла, чем получает, — значит, у него есть какой-то внутренний источник энергии

		LaytheInSpace = Консоль пищит, пока снимаются инфракрасные показания Laythe
		LaytheInSpace = Сканирование показывает, что на полюсах нет льда
		LaytheInSpaceLow = На ИК-снимках видно множество мелких каменистых островов
		LaytheInSpaceLow = Анализ показывает, что атмосфера состоит в основном из азота, метана, этана и ацетилена
		LaytheInSpaceHigh = Laythe, как и Jool, излучает больше тепла, чем получает

		VallInSpace = Сняты ИК-показания поверхности
		VallInSpaceLow = Сканы показывают ледяную поверхность Vall
		VallInSpaceLow = Спектроскопический анализ выявляет на луне воду, аммиак и метан
		VallInSpaceHigh = Тепловые снимки показывают очень неровный рельеф. Посадка не рекомендуется
		VallInSpaceHigh = Сканы рельефа фиксируют нечто, похожее на множество вулканов. Статус неизвестен

		BopInSpace = Сделаны инфракрасные сканы Bop
		BopInSpaceLow = Сканы показывают на поверхности образования, похожие на щупальца
		BopInSpaceHigh = Не имея атмосферы, луна поглощает много тепла

		TyloInSpace = Консоль пищит, пока идёт сканирование
		TyloInSpaceLow = Показания говорят, что поверхность содержит кобальт, никель и лёд
		TyloInSpaceHigh = Сканы показывают лёд на поверхности
		TyloInSpaceHigh = А тут горячо. Кто бы мог подумать?

		PolInSpace = ИК-консоль пищит без умолку. Она вообще исправна?
		PolInSpaceLow = Сканы настроены на nelop. Результат отрицательный
		PolInSpaceHigh = ИК-сканы выявляют неровный рельеф

	EelooInSpace = Eeloo покоряется мощи инфракрасной съёмки
	EelooInSpace = ИК-данные собраны высоко над поверхностью Eeloo
	EelooInSpaceLow = Обнаружено, что нижние слои ледяной поверхности Eeloo сложены водяным льдом
	EelooInSpaceLow = Спектрометр обнаруживает лёд из метана, угарного газа и азота
	EelooInSpaceHigh = Ледяные сублиматы высоко над поверхностью намекают, что когда-то у Eeloo могла быть разрежённая атмосфера
	EelooInSpaceHigh = Поверхность Eeloo покрыта льдом!

	//Outer Planets Mod

	SarnusInSpace = ИК-спектральные снимки сняты в окрестностях Sarnus
	SarnusInSpace = Снимки показывают характерные полосы и облачные слои в атмосфере, которые не так заметны в обычные телескопы
	SarnusInSpaceLow = Атмосферные снимки показывают, что полосы движутся с разной скоростью
	SarnusInSpaceLow = Снимки колец с близкого расстояния доказывают, что внешние кольца отражают лучше и более ледяные, чем внутренние
	SarnusInSpaceHigh = Выясняется, что Sarnus излучает примерно в 2,5 раза больше тепловой энергии, чем получает от Kerbol, причём основная часть исходит от южного полюса
	SarnusInSpaceHigh = Обнаружено пылевое кольцо, вращающееся куда выше остальных и едва заметное!

		TektoInSpaceLow = Многочисленные облака высоко в атмосфере легче обнаружить на этой инфракрасной длине волны
		TektoInSpaceLow = Инфракрасные снимки под малым углом фиксируют зеркальные блики на поверхности, подтверждая наличие жидкостей
		TektoInSpaceHigh = Более длинная волна прибора пробивает мутную атмосферу, и на снимках проступает крайне разнообразный рельеф
		TektoInSpaceHigh = На поверхности видны светлые и тёмные пятна. Научная группа хотела бы совместить снимки с картой высот для более полного анализа поверхности

		SlateInSpaceHigh = Поверхность Slate — это в основном остывшая порода без ледяных залежей
		SlateInSpaceHigh = Луна хранит следы богатого геологического прошлого, включая, возможно, действующие вулканы
		SlateInSpaceLow = У кратеров найдены совсем небольшие количества льда — возможно, недавно занесённого самими ударами
		SlateInSpaceLow = Slate покрыт множеством вулканических пород и других материалов, повествующих о богатом геологическом прошлом
		SlateInSpaceLow = Приборы обнаруживают крупные залежи базальтовых пород

		HaleInSpace = Прибор делает инфракрасные снимки в окрестностях Hale
		HaleInSpaceHigh = По тепловым снимкам гораздо проще различать особенности рельефа
		HaleInSpacelow = Тепловая съёмка подтверждает наличие больших запасов водяного льда

		OvokInSpaceHigh = Ovok кажется равномерно холодным по всей своей поверхности
		OvokInSpaceLow = Тепловые снимки не выявляют заметных колебаний между разными областями поверхности, что говорит об одинаковом составе
		OvokInSpace = ИК-снимки показывают, что поверхность Ovok сплошь ледяная

	UrlumInSpaceLow = Выясняется, что Urlum излучает гораздо меньше тепла, чем ожидалось
	UrlumInSpaceLow = ИК-съёмка обнаруживает облачные полосы из метана, плывущие в углеводородном смоге с примесью гелиевой ледяной каши
	UrlumInSpaceHigh = Полосы и детали атмосферы Urlum ярко видны на инфракрасных длинах волн
	UrlumInSpaceHigh = Анализ выявляет атмосферу из водорода, гелия и метана. Последний и объясняет цвет планеты
	UrlumInSpaceHigh = Кольца Urlum легче снимать в инфракрасном диапазоне; похоже, они состоят из каменистого углеродистого материала

		WalInSpace = Записаны ИК-карты поверхности
		WalInSpaceHigh = Несмотря на сильный холод, луна проявляет признаки внутреннего нагрева, что говорит о какой-то геологической активности
		WalInSpaceLow = ИК-спектры открывают крайне разнообразную поверхность из разных типов пород, местами обнажённых металлов и карманов льда

			TalInSpace = Консоль пищит, пока инфракрасные снимки идут потоком с Tal
			TalInSpace = Маленькая луна сильно отражает свет, выдавая обилие льда на поверхности
			TalInSpaceLow = Дальнейший анализ поверхности показывает смесь льда и металлов
			TalInSpaceHigh = У Tal зафиксирован внутренний нагрев, который может быть вызван приливным воздействием Wal

		PriaxInSpace = ИК-профиль Priax совпадает с профилем других астероидов системы
		PriaxInSpace = Снимки показывают очень каменистую луну, на которой в этом диапазоне нет ничего по-настоящему интересного
		PriaxInSpaceLow = Тщательный анализ исключает сколько-нибудь значимые залежи льда на поверхности

		PoltaInSpace = ИК-снимки Polta показывают крайне разнообразную поверхность. Научная группа начинает планировать сбор образцов
		PoltaInSpace = Несмотря на сходство с Minmus, у Polta более своеобразный ИК-профиль, выдающий активную геологию
		PoltaInSpaceHigh = ИК-замеры показывают признаки внутреннего нагрева. Возможно, недра разогревают приливные силы
		PoltaInSpaceLow = Снимки ловят характерную примету криовулкана
		PoltaInSpaceLow = Polta содержит много льда и породы с богатой химией. Учёные полагают, что там присутствует хлор

	NeidonInSpaceLow = Тепловое излучение указывает на крайне динамичную погодную систему, питаемую резко различными полосами вещества с разной скоростью и составом
	NeidonInSpaceLow = ИК-снимки намекают на глубокий атмосферный слой из аммиака, метана, йода и водяного пара
	NeidonInSpaceLow = Верхние облака Neidon, похоже, содержат много угарного и углекислого газа
	NeidonInSpaceHigh = Neidon даёт больший тепловой след, чем ожидалось. Это и объясняет его очень активную погоду
	NeidonInSpaceHigh = Южное полушарие Neidon гораздо теплее северного. Из-за этого метан, нагреваясь у южного полюса, поднимается на бо́льшие высоты

		ThatmoInSpaceHigh = Кругом лёд, но прибор всё же находит участки потеплее — скорее всего, действующие гейзеры и криовулканы
		ThatmoInSpaceHigh = Снимки под малым углом показывают, что атмосфера гораздо теплее поверхности, — похоже, она поглощает солнечное излучение
		ThatmoInSpaceLow = ИК-камера обнаруживает явные признаки более тёплых, геологически активных областей
		ThatmoInSpaceLow = Спектральный анализ приводит научную группу к выводу о наличии углекислого газа и большого количества азота на поверхности и в атмосфере Thatmo
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[ca_filmCamera]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Камера делает мутный снимок
	default = Отснятые кадры сканируются и готовятся к передаче или возврату
	default = Пока грузится картинка, научная группа затевает спор: снимать надо было вертикально или горизонтально

	SunInSpace = Kerbol слишком яркий. Он засвечивает весь кадр
	SunInSpaceLow = ...FBD7y4897FD43sofhq8yfUhqwefr8Por1que649845djhUH...
	SunInSpaceLow = Группа получает снимок заявления камеры об увольнении по причине невыносимых условий труда
	SunInSpaceHigh = На фоне черноты неба виднеется яркая точка

	MohoInSpace = Размытые тёмные пятна на поверхности — это точно кратеры
	MohoInSpaceLow = На снимке есть небольшие помехи, но у Moho виден разнообразный рельеф и множество кратеров
	MohoInSpaceHigh = Из-за яркого солнечного света детали поверхности Moho едва различимы
	MohoSrfLanded = Поверхность Moho выглядит очень каменистой и побитой

	EveInSpace = Камера ловит прекрасное свечение атмосферы Eve
	EveInSpaceLow = Атмосфера планеты сильно отражает свет, и камера не может уловить ни одной детали поверхности
	EveFlyingLow = Даже низкого разрешения камере хватает, чтобы разглядеть внизу кое-какой рельеф и перепады высот
	EveFlyingHigh = Сквозь плотные облачные слои камера мало что видит
	EveFlyingHigh = Научная группа спорит: то ли камера настолько плоха, то ли она сейчас просто в облаке
	EveSrfLanded = Куда ни глянь — серость. Научная группа принимается раскрашивать чёрно-белый снимок
	EveSrfLandedLowlands = Пологий рельеф в кадре не так уж отличается от домашнего
	}
}
