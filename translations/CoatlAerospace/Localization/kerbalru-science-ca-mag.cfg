// Русификация результатов экспериментов CoatlAerospace ProbesPlus
// Эксперимент: ca_mag — Магнитометр (Magnetometer Data)
// Источник: GameData/CoatlAerospace/ProbesPlus/Resources/ScienceDefs.cfg
// Метод: ModuleManager :FINAL — полная замена блока RESULTS.

@EXPERIMENT_DEFINITION:HAS[#id[ca_mag]]:FINAL
{
    !RESULTS {}
    RESULTS
    {
        default = Вы измеряете силу и направление магнитного поля
        default = Данные о магнитном поле записаны
        default = Магнитометр сканирует изменения магнитного поля

        SunInSpace = Звезда испускает некое давление, мягко подталкивающее магнитометр
        SunInSpaceLow = По мере приближения к звезде прибор фиксирует сильные магнитные волны
        SunInSpaceLow = Магнитное поле звезды внезапно нарушено. Неужели солнечная вспышка?
        SunInSpaceLow = Ого! Полюса что, только что поменялись местами?
        SunInSpaceHigh = Измерения показывают, что магнитное поле звезды коррелирует с активностью солнечных частиц
        SunInSpaceHigh = Магнитные показания от звезды улавливаются даже на окраинах системы

        MohoInSpace = Аппарат сигнализирует об обнаружении магнитных показаний
        MohoInSpaceLow = Резкий скачок показаний, похоже, указывает, что у Moho есть магнитная головная ударная волна и магнитосфера
        MohoInSpaceLow = Магнитное поле Moho слабее, чем у Kerbin
        MohoInSpaceHigh = Магнитное поле Moho сильнее ожидаемого, но не обладает свойствами, чтобы удерживать и защищать атмосферу
        MohoInSpaceHigh = Обнаружено, что у Moho наклонённый магнитный полюс, как у Kerbin

        EveInSpace = Прибор измеряет магнитные поля Eve
        EveInSpaceLow = Магнитный щит Eve, судя по всему, очень мощно отклоняет солнечные частицы
        EveInSpaceLow = Если на Eve когда-то и было много воды, она давным-давно выкипела
        EveInSpaceHigh = Снятые измерения указывают на очень сильное и активное магнитное поле, способное удерживать плотные атмосферные частицы
        EveInSpaceHigh = Мощное магнитное поле Eve улавливается даже на таком расстоянии

        GillyInSpace = Жалкое магнитное поле Gilly «измерено»
        GillyInSpaceLow = Даже вплотную к Gilly его магнитное притяжение едва регистрируется чувствительным магнитометром
        GillyInSpaceHigh = Прибор едва отличает влияние Gilly от влияния Eve

        KerbinInSpace = В окрестностях Kerbin собраны измерения магнитного поля
        KerbinInSpaceLow = Подтверждено, что магнитное поле Kerbin и отклоняет, и удерживает солнечные частицы
        KerbinInSpaceLow = Данные о магнитном поле вокруг Kerbin, похоже, указывают, что часть его ядра расплавлена
        KerbinInSpaceLow = Картирование магнитного поля показывает, что полюс Kerbin не совпадает с географическим севером. Уже планируется экспедиция, чтобы отыскать его и водрузить там флаг
        KerbinInSpaceHigh = Магнитное поле Kerbin достаёт даже далеко от планеты
        KerbinInSpaceHigh = Прибор снимает данные сквозь магнитослой Kerbin
        KerbinInSpaceHigh = Далеко позади Kerbin относительно Kerbol обнаружен длинный извивающийся магнитный хвост

        MunInSpace = Магнитометр снимает измерения в окрестностях Mun
        MunInSpaceLow = Данные указывают, что у Mun нет работающего геодинамо
        MunInSpaceLow = Вблизи ударных кратеров обнаружены кратковременные локальные магнитные поля
        MunInSpaceHigh = Пусть и слабое, но у Mun всё же есть различимое магнитное поле
        MunInSpaceHigh = Измерения подтверждают, что у Mun нет дипольного магнитного поля

        MinmusInSpace = Магнитные измерения с Minmus занесены в журнал
        MinmusInSpaceLow = У Minmus нет заметного магнитного поля, что намекает на крайне скучную геологию
        MinmusInSpaceHigh = У Minmus вообще нет магнитного поля. Ой, стоп, вот же оно! А, нет, показалось — наверное, птица пролетела

        DunaInSpace = Возле Duna записаны магнитные данные
        DunaInSpaceLow = Обнаружено, что магнитные поля коры создают мини-магнитосферы, поднимающиеся над поверхностью
        DunaInSpaceLow = Магнитные поля коры Duna подозрительно сильнее, чем у Kerbin
        DunaInSpaceHigh = У Duna магнитосфера куда слабее и меньше, чем у Kerbin
        DunaInSpaceHigh = Данные магнитометра, похоже, указывают, что когда-то у Duna было активное внутреннее динамо

        IkeInSpace = Магнитные измерения с Ike занесены в журнал и записаны
        IkeInSpaceLow = Очень слабое магнитное поле Ike ведёт себя как дипольное, прямо как у Kerbin!
        IkeInSpaceHigh = Как ни удивительно, у Ike, похоже, есть слабое магнитное поле

        DresInSpace = KSC удивлён получению магнитных данных с Dres примерно так же сильно, как и тому, что миссию к Dres вообще кто-то профинансировал
        DresInSpaceLow = Джаз резко смолкает: у Dres обнаружены довольно любопытные магнитные аномалии
        DresInSpaceHigh = В KSC вспыхивают яростные споры: данные указывают, что магнитометр буквально зевнул. Похоже, в дело уже пошла еда. Только что вызвали пожарных

        JoolInSpace = Магнитосфера Jool, судя по всему, формируется исключительно его вращением, а не солнечным ветром от Kerbol. Jool, похоже, вообще всё равно
        JoolInSpaceLow = Измеренное магнитное поле, похоже, способно удерживать колоссальные количества плазмы и радиации
        JoolInSpaceHigh = Вокруг Jool обнаружен огромный магнитодиск, возможно, с удержанной плазмой
        JoolInSpaceHigh = Измерено, что магнитное поле Jool на порядок сильнее, чем у Kerbin

        LaytheInSpace = Возле Laythe сняты показания магнитометра
        LaytheInSpaceLow = Подтверждено, что на магнитную активность Laythe сильно влияет мощная магнитосфера его материнской планеты
        LaytheInSpaceLow = У Laythe, возможно, активная геология, о чём свидетельствует слабое, но активное магнитное поле
        LaytheInSpaceHigh = Магнитосфера Jool, судя по всему, укрывает Laythe от солнечного ветра
        LaytheInSpaceHigh = Датчики фиксируют крайне сложное взаимодействие магнитных полей Laythe и Jool

        VallInSpace = С Vall собраны магнитные данные
        VallInSpace = Модели на основе собранных данных намекают на любопытные подповерхностные процессы, которые могут указывать на жидкие океаны
        VallInSpaceLow = Взаимодействие с материнской планетой, похоже, индуцирует магнитное поле спутника
        VallInSpaceHigh = Вокруг Vall обнаружено переменное магнитное поле

        TyloInSpace = На магнитное поле Tylo, похоже, влияет некоторое количество солёной воды под его корой
        TyloInSpace = У Tylo есть различимое магнитное поле, но оно глубоко погружено в поле планеты
        TyloInSpaceLow = Магнитное поле, похоже, порождается железным ядром
        TyloInSpaceHigh = Обнаружено, что Tylo создаёт магнитосферу внутри магнитосферы планеты. Измерения указывают на наклонённое дипольное магнитное поле

        PolInSpace = В окрестностях Pol записаны магнитные измерения
        PolInSpaceLow = Pol, судя по всему, не генерирует магнитного поля. Вся его магнитная активность целиком проистекает из влияния планеты
        PolInSpaceHigh = Обнаружено мощное магнитное поле планеты, но не самого Pol

        BopInSpace = Магнитное поле Bop буйно вьётся щупальцами в его магнитном хвосте
        BopInSpaceLow = У Bop у поверхности есть различимые магнитные аномалии
        BopInSpaceHigh = Магнитные показания обнаружены, но ни одно, похоже, не вызвано внутренней динамо-активностью

        EelooInSpace = От Eeloo улавливается совсем незначительная магнитная активность
        EelooInSpace = У Eeloo, похоже, металлическое ядро, но сам он в основном камень и лёд без выраженной магнитной активности
        EelooInSpaceLow = Обнаружены крохотные магнитные колебания, которые, что поразительно, могут указывать на подповерхностную жидкость
        EelooInSpaceHigh = Магнитное поле Kerbol улавливается даже на такой дали

        AsteroidInSpaceMettalic = Магнитные измерения обнаруживают металлы в астероиде
        AsteroidInSpaceStony = Отсутствие магнитных показаний подтверждает, что этот камень — в основном... камень

        //Outer Planets Mod

        SarnusInSpace = У Sarnus, похоже, тоже есть очень чёткая и выраженная магнитосфера
        SarnusInSpaceLow = Измерения магнитного поля указывают на присутствие внутри планеты каких-то высокопроводящих слоёв
        SarnusInSpaceHigh = Измерения поля Sarnus указывают на наклон его магнитной оси

        TektoInSpace = Tekto сильно подвержен влиянию очень мощного магнитного поля Sarnus
        TektoInSpace = Обнаружено, что у Tekto индуцированное магнитное поле, возникающее, когда атмосфера отклоняет заряженные частицы, загнанные на его орбиту Sarnus

        SlateInSpaceLow = Дополнительные измерения подтверждают, что у Slate нет магнитосферы
        SlateInSpaceHigh = У Slate, похоже, нет собственного магнитного поля

        HaleInSpaceHigh = У этой луны нет собственного магнитного поля
        HaleInSpaceLow = Даже на таком близком расстоянии не обнаружено магнитного поля, исходящего от Hale

        OvokInSpaceHigh = С Ovok собраны магнитные данные
        OvokInSpaceLow = Аппарат сигнализирует об обнаружении магнитных показаний, которые затем оказываются всё тем же Sarnus

        UrlumInSpace = Измерения показывают мощное, но необычное магнитное поле, наклонённое куда сильнее, чем у Kerbin
        UrlumInSpaceLow = Магнитосфера планеты, похоже, смещается, что объясняет её наклон относительно оси вращения
        UrlumInSpaceHigh = Первые измерения показывают резкий наклон магнитного поля планеты

        WalInSpace = Колебания указывают, что у Wal есть некоторая магнитная сила — достаточная, чтобы возмущать магнитосферу Urlum
        WalInSpace = У Wal относительно слабое, но устойчивое магнитное поле
        WalInSpace = Измерения магнитного поля Wal указывают на железо-никелевое ядро, способное питать некоторую геологическую активность

        TalInSpaceHigh = Возмущения магнитного поля Wal выдают, что у Tal всё-таки есть некоторое собственное магнитное поле
        TalInSpaceLow = Обнаружено, что у Tal магнитное поле достаточно мощное, чтобы оказывать заметный приливный эффект на Wal
        TalInSpace = Анализ силовых линий магнитного поля Tal показывает очень плотный состав с высоким содержанием металла

        PriaxInSpace = У Priax нет значимого магнитного присутствия, хотя, похоже, в нём есть какой-то металлический материал
        PriaxInSpace = Резонанс Priax с Polta любопытно влияет на магнитное поле Urlum, пока они обращаются вокруг планеты
        PriaxInSpaceLow = Показания вблизи на максимальной чувствительности дают новые свидетельства присутствия в спутнике какой-то металлической руды

        PoltaInSpace = Резонанс Priax с Polta любопытно влияет на магнитное поле Urlum, пока они обращаются вокруг планеты
        PoltaInSpace = У Polta, похоже, есть некоторое влияние магнитного поля, но это может быть просто её резонанс с Priax

        NeidonInSpace = Neidon поддерживает традицию мощных магнитных полей наших газовых гигантов
        NeidonInSpaceLow = У планеты зафиксировано смещающееся магнитное поле, где локальные аномалии способны перекрывать дипольную систему, создавая квадрупольный момент
        NeidonInSpaceHigh = Измерено, что магнитное поле планеты наклонено куда сильнее, чем у нас дома

        ThatmoInSpaceHigh = Хотя у Thatmo, похоже, нет значимого магнитного поля, прибор всё же улавливает его воздействие на магнитосферу Neidon
        ThatmoInSpaceLow = Результаты довольно неоднозначны в вопросе, есть ли у луны магнитное поле, но на Neidon оно всё же воздействует
        ThatmoInSpaceLow = «Магнитометр хочет спуститься и устроить игру в снежки с системой терморегуляции аппарата.» Научная команда дома теперь лихорадочно названивает инженерам
    }
}
