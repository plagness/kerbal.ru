// kerbal.ru — русификация результатов науки (ScienceDefs)
// Мод: CoatlAerospace / ProbesPlus
// Эксперимент: ca_orbitalScope (Orbital Images — орбитальный телескоп)
// Метод: MM-патч по #id, полная замена блока RESULTS.
// Все значения — чистый текст (без #LOC), дубли ключей сохранены и переведены по-разному.

@EXPERIMENT_DEFINITION:HAS[#id[ca_orbitalScope]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		default = Снимки поверхности делаются мозаикой для последующей цифровой склейки
