		PoltaInSpaceHigh = Polta являет свою причудливую серовато-зелёную поверхность с завитками, напоминающими пустынные дюны
		PoltaInSpaceLow = Снимки показывают очень замысловатый и неповторимый рельеф, вероятно, сложенный кратерами, приливными силами и гейзерами водяного пара

		NeidonInSpace = Потрясающие снимки Neidon наверняка станут хитом в соцсетях
		NeidonInSpaceLow = Облачные и газовые полосы на Neidon куда эффектнее, чем у прочих газовых гигантов
		NeidonInSpaceLow = Очень тщательный анализ серии снимков позволил измерить скорость облаков Neidon — до 500 m/s!!!
		NeidonInSpaceHigh = Фиолетовый цвет Neidon может намекать на некое химическое сходство с Eve
		NeidonInSpaceHigh = У полюсов видны яростные бури. Что их порождает — неясно, но они выдают богатую погодную систему

		ThatmoInSpaceHigh = Выдержку телескопа приходится резко снижать, чтобы снимки поверхности не засветились
		ThatmoInSpaceHigh = В поле зрения вплывает очень яркий мир, похожий на снежок, а слабая дымка над горизонтом — явное доказательство наличия атмосферы у этой луны
		ThatmoInSpaceLow = Огромные яркие мёрзлые пустоши тянутся по всей крупнейшей луне Neidon
		ThatmoInSpaceLow = Ловко подстроив телескоп, удаётся заснять гейзеры, выбрасывающие материал в атмосферу Thatmo
		ThatmoInSpace = Ух ты! Thatmo и вправду очень яркий!
	}
}
