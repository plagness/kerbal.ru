// kerbal.ru — CoatlAerospace / ProbesPlus
// Русский перевод РЕЗУЛЬТАТОВ экспериментов (ScienceDefs)
// Эксперимент: ca_gammaRay — Gamma Ray Spectrometry (гамма-спектрометр)
// Метод: @EXPERIMENT_DEFINITION:HAS[#id[...]]:FINAL, полная замена блока RESULTS.
// Ключи ситуаций (default, *InSpace, *InSpaceLow, *InSpaceHigh) не трогаем.

@EXPERIMENT_DEFINITION:HAS[#id[ca_gammaRay]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Ты замеряешь гамма-излучение.
	default = Ты сканируешь характерный гамма-спектр водорода
	default = Спектрометр начинает поиск залежей элементов

	SunInSpace = Датчики подтверждают: Kerbol испускает гамма-излучение
	SunInSpaceLow = Корональные выбросы сопровождаются резким всплеском гамма-лучей
	SunInSpaceLow = Зафиксирован мощный гамма-всплеск — возможно, от солнечной вспышки
	SunInSpaceHigh = Гамма-излучение Kerbol заметно даже на больших расстояниях
	SunInSpaceHigh = Прибор фиксирует уровень гамма-излучения на этой высоте

	MohoInSpace = Замеры уровня гамма-излучения у Moho завершены!
	MohoInSpaceLow = На поверхности Moho обнаружены залежи железа
	MohoInSpaceLow = Детальное сканирование выявило замёрзшую воду в тени приполярных кратеров
	MohoInSpaceHigh = У полюсов зафиксированы следовые количества замёрзшей воды
	MohoInSpaceHigh = GRS замеряет уровень излучения. Лаборантам ещё предстоит выяснить, от Moho оно или от Kerbol

	EveInSpace = Уровень гамма-излучения у Eve зафиксирован
	EveInSpaceLow = Гамма-излучение озёр внизу указывает, что в них есть какая-то летучая жидкость
	EveInSpaceLow = Если на Eve и было много воды, то она давно выкипела
	EveInSpaceHigh = Разные слои облаков по-разному поглощают и отражают гамма-лучи, испускаемые Kerbol
	EveInSpaceHigh = Где-то в облачных слоях обнаружены следы природных радиоактивных элементов

	GillyInSpace = GRS замеряет облучённость Gilly гамма-лучами
	GillyInSpaceLow = На поверхности обнаружены следы железа и силикатов
	GillyInSpaceHigh = Уровень гамма-излучения Gilly похож на тот, что фиксируют у астероидов

	KerbinInSpace = Замеры гамма-спектра сняты с орбиты Kerbin
	KerbinInSpaceLow = Подтверждено: атмосфера Kerbin экранирует поверхность от изрядной доли гамма-излучения
	KerbinInSpaceLow = Обнаружены океаны, озёра и реки Kerbin
	KerbinInSpaceLow = Едва ли нужен был такой навороченный прибор, чтобы подтвердить, что на Kerbin полно воды, а?
	KerbinInSpaceHigh = Гамма-картирование поверхности Kerbin затруднено из-за защиты, которую даёт атмосфера
	KerbinInSpaceHigh = Уровни гамма-излучения фиксируются, чтобы составить эталон условий, необходимых для жизни

	MunInSpace = Спектрометр замеряет уровень гамма-излучения на поверхности Mun
	MunInSpaceLow = На поверхности обнаружены следы железа
	MunInSpaceLow = У полюсов обнаружены концентрации водорода, соответствующие наличию воды
	MunInSpaceHigh = По сравнению с Kerbin замеры поверхности даются легче — сказывается отсутствие атмосферы

	MinmusInSpace = Замеры GRS по Minmus записаны
	MinmusInSpaceLow = Отсутствие атмосферы у Minmus тоже упрощает картирование поверхности
	MinmusInSpaceLow = Похоже, у Minmus тоже есть связанные с водой концентрации водорода у полюсов
	MinmusInSpaceHigh = Гамма-спектрометрический анализ завершён: фисташка

	DunaInSpace = Уровень гамма-излучения у Duna зафиксирован
	DunaInSpaceLow = У полюсов обнаружены молекулы воды, скованные в виде льда
	DunaInSpaceLow = У старых вулканических гор уровень кремния заметно ниже
	DunaInSpaceLow = В низменностях уловлены остатки хлора — намёк на древние, давно исчезнувшие озёра
	DunaInSpaceHigh = По всей Duna обнаружены большие количества оксида железа
	DunaInSpaceHigh = Данные GRS позволяют картировать сразу несколько элементов на поверхности
	DunaInSpaceLow = На поверхности Duna обнаружены залежи кремния

	IkeInSpace = Данные GRS по Ike записаны
	IkeInSpaceLow = На поверхности обнаружены следы кремния
	IkeInSpaceHigh = Тенденция находить водяной лёд в приполярных областях сохраняется

	DresInSpace = Система записывает гамма-спектрометрические данные с поверхности Dres
	DresInSpaceLow = Похоже, состав Dres схож с составом Mun
	DresInSpaceLow = На поверхности найдены следы железа и кремния
	DresInSpaceHigh = Результаты гамма-анализа мало что делают, чтобы унять недоверие научного сообщества

	JoolInSpace = Из-за размеров это занимает время, но данные GRS по Jool получены
	JoolInSpaceLow = В атмосфере Jool определённо немало радиоактивного вещества
	JoolInSpaceLow = Замеры GRS показывают некое взаимодействие мощного излучения Kerbol с верхними слоями атмосферы Jool
	JoolInSpaceHigh = Похоже, Jool отражает или испускает изрядное количество гамма-лучей
	JoolInSpaceHigh = Похоже, в атмосфере Jool большие количества водорода

	LaytheInSpace = Данные GRS собраны с орбиты Laythe
	LaytheInSpaceLow = На Laythe большие количества воды и хлора
	LaytheInSpaceLow = Уровень хлора может указывать на присутствие соли в воздухе и воде
	LaytheInSpaceHigh = На поверхности обнаружено немало связанного с водой водорода
	LaytheInSpaceHigh = Собранные здесь данные отражают условия, очень похожие на Kerbin

	VallInSpace = Данные GRS собраны с орбиты Vall
	VallInSpaceLow = Показания по водороду происходят от криовулканической активности на поверхности
	VallInSpaceHigh = На Vall водород есть и в атмосфере, и на суше

	TyloInSpace = Гамма-спектр Tylo собран
	TyloInSpaceLow = Воды, похоже, не обнаружено. Поверхность довольно каменистая
	TyloInSpaceHigh = Сканы показывают разбросанные залежи ресурсов у ударных кратеров

	PolInSpace = Данные GRS получены с луны Pol
	PolInSpaceLow = Сильные перепады высот затрудняют сканирование, но воды, похоже, нет
	PolInSpaceHigh = Ожидайте результатов — на мониторах какое-то пятно

	BopInSpace = Гамма-спектрометр сканирует Bop
	BopInSpaceLow = Показания говорят, что поверхность состоит из углерода и железа
	BopInSpaceHigh = Сканы GRS указывают, что Bop содержит углерод, железо и...

	EelooInSpace = Гамма-излучение Eeloo замерено
	EelooInSpaceLow = Обнаружены большие количества кремния
	EelooInSpaceLow = Слабое фоновое гамма-излучение оказалось излучением нашей родной звезды, Kerbol
	EelooInSpaceHigh = Похоже, Eeloo покрыт толстым слоем льда
	EelooInSpaceHigh = Спектрометр на миг ослеплён тем, что могло быть лишь высокоэнергетическим гамма-всплеском

	//Outer Planets Mod

	SarnusInSpace = Прибор фиксирует гамма-излучение с орбиты газового гиганта
	SarnusInSpaceLow = Показания намекают на присутствие воды — вероятно, в виде льда — в нижних слоях атмосферы
	SarnusInSpaceLow = Замеры помогают уточнить модели содержания водорода на Sarnus. Выходит, гигант менее плотный, чем вода!
	SarnusInSpaceHigh = Похоже, Sarnus состоит из больших количеств водорода

	TektoInSpace = У Tekto записан превосходный набор гамма-замеров
	TektoInSpaceLow = Анализ показал, что обнаруженный водород — не из воды, а из других водородсодержащих молекул
	TektoInSpaceLow = Подтверждено: источник обнаруженного водорода — простые углеводороды, сосредоточенные в основном на поверхности
	TektoInSpaceLow = С поверхности зафиксированы выбросы простых углеводородов, вероятно этана
	TektoInSpaceLow = Зафиксированы приповерхностные выбросы алкановых углеводородов. Уровни, похоже, указывают на присутствие этана
	TektoInSpaceHigh = Результаты показывают, что обнаружены обнадёживающие уровни водорода
	TektoInSpaceHigh = Выбросы указывают на присутствие водорода на Tekto

	SlateInSpace = GRS не фиксирует никакого присутствия водорода
	SlateInSpace = Нет никаких признаков воды ни над поверхностью, ни под ней

	HaleInSpace = Уровни водорода соответствуют присутствию водяного льда
	HaleInSpace = Композиционный анализ указывает, что большая доля этой луны состоит из водяного льда
	HaleInSpaceHigh = Замеры GRS указывают, что состав луны очень похож на состав колец

	OvokInSpace = Уровни водорода соответствуют присутствию водяного льда
	OvokInSpace = Композиционный анализ указывает, что большая доля этой луны состоит из водяного льда
	OvokInSpaceHigh = Замеры GRS указывают, что состав луны очень похож на состав

	UrlumInSpace = Прибор фиксирует гамма-излучение с орбиты газового гиганта
	UrlumInSpaceHigh = Гамма-излучение соответствует большому присутствию водорода в атмосфере и облаках газового гиганта
	UrlumInSpaceLow = Показания говорят, что Urlum состоит в основном из водорода

	WalInSpaceLow = На поверхности найдены следы железа и кремния
	WalInSpaceHigh = Прибор фиксирует лишь небольшие карманы ледяного водорода — возможно, замёрзшую воду в глубоких кратерах

	TalInSpaceLow = Данные GRS соответствуют большим количествам льда
	TalInSpaceHigh = Прибор фиксирует много льда и металла

	PriaxInSpaceHigh = Первичные гамма-замеры не показывают присутствия воды или водородсодержащих молекул
	PriaxInSpaceLow = Дальнейшие исследования по-прежнему не дают однозначных признаков водяного льда

	PoltaInSpaceHigh = GRS фиксирует выбросы водорода, указывающие на присутствие воды в разных агрегатных состояниях
	PoltaInSpaceLow = Спектрометр фиксирует колебания, намекающие на жидкий океан под поверхностью!
	PoltaInSpace = Вода обнаружена в виде льда и, возможно, солёной жидкости

	NeidonInSpace = С газового гиганта Neidon записан превосходный набор гамма-замеров
	NeidonInSpaceHigh = Прибор фиксирует разные атомарные сигнатуры, намекающие на присутствие водорода и метана
	NeidonInSpaceLow = Neidon примерно на 80% состоит из водорода, вместе с другими углеводородами и водой

	ThatmoInSpaceHigh = Прибор не регистрирует сколько-нибудь значимого присутствия водородсодержащих молекул
	ThatmoInSpaceLow = Более близкие замеры фиксируют лишь ничтожное количество метана и других углеводородов у поверхности
	}
}
