// Coatl Aerospace (ProbesPlus) — GroundOps: результаты экспериментов (ScienceDefs)
// Русификатор kerbal.ru. Патчи RESULTS для съёмки места посадки и забора грунта.
// Эксперименты: ca_SiteSurvey (35 строк), ca_soilScoop (36 строк).

@EXPERIMENT_DEFINITION:HAS[#id[ca_SiteSurvey]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Съёмка места посадки завершена
	default = Фотосъёмка места посадки закончена
	default = Отправляем снимки места посадки на анализ

	MohoSrfLanded = Это ведь не посадочная опора плавится, правда?
	MohoSrfLanded = На Moho меньше ударных кратеров, чем мы ожидали. Относительно ровная поверхность должна быть безопасна для будущих посадок
	MohoSrfLandedNorthPole = Ого! Это что, дыра в поверхности? Выглядит небезопасно

	EveSrfLanded = Рельеф Eve выглядит достаточно безопасным для посадки, но не для повторного взлёта
	EveSrfLanded = Шлём снимки с Eve, с любовью
	EveSrfSplashed = Прежде чем судить о безопасности этой жидкости, понадобится её химический анализ
	EveSrfSplashed = Посадка здесь может обернуться ещё большей проблемой, если вы вообще захотите отсюда улететь

		GillySrfLanded = Поверхность Gilly в основном гладкая, лишь мелкие камни разбросаны тут и там
		GillySrfLanded = Кажется, одного пристального взгляда на камни на снимках хватит, чтобы отправить их на траекторию отлёта

	KerbinSrfLanded = Kerbin выглядит достаточно безопасным, чтобы высадить экипаж даже без скафандров
	KerbinSrfSplashed = Чтобы сесть здесь, аппарат должен быть и плавучим, и водонепроницаемым
	KerbinSrfLandedKSC = Камера ловит толпу любопытных стажёров и подопытных, что собрались поглазеть на аппарат

		MunSrfLanded = Многочисленные кратеры Mun создают перепады высот, опасные для пилотируемой посадки, и отбрасывают тени на солнечные панели, когда солнце низко над горизонтом
		MunSrfLanded = Эта мозаика снимков с поверхности соберёт кучу лайков в соцсетях

		MinmusSrfLanded = Учёные смотрят на серую поверхность и думают, что мы сели не на ту луну. Инженеры напоминают им, что камера не снимает в цвете
		MinmusSrfLanded = На снимках множество больших холмов с неудобными для посадки углами, но есть и обширные ровные гладкие участки

	DunaSrfLanded = Инопланетян не видать. Так кто же прорыл эти каналы?
	DunaSrfLanded = Поверхность выглядит очень пыльной, но рельеф безопасен для высадки кербонавтов

		IkeSrfLanded = Нам нравится Ike. Очень каменистая поверхность с кучей мелких камней, разбросанных как раз под пробы

	DresSrfLanded = Место посадки очень напоминает луну, только менее пыльное. KSC признаёт его безопасным, но скучным для миссий кербонавтов
	DresSrfLanded = На снимках множество холмов, что могут помешать безопасной пилотируемой посадке. Val всё равно вызывается сесть там

	JoolSrfLanded = Раз уж съёмочный посадочный модуль долетел целым, то и кербонавты справятся, верно?

		LaytheSrfLanded = Сколько же тут воды! Понадобятся точные траектории, чтобы гарантированно сесть на сушу
		LaytheSrfLanded = Laythe выглядит идеальным местом для отпуска! #Лето #Пляжи #СвойВоздухПриноси
		LaytheSrfSplashed = Сколько же тут воды! Будущим миссиям стоит быть водонепроницаемыми и плавучими

		VallSrfLanded = Рельеф очень неровный, с высокими соединёнными хребтами, что могут быть признаками тектонической активности
		VallSrfLanded = Неровный рельеф осложнит пилотируемую посадку. Непременно отправьте опытного пилота

		TyloSrfLanded = Поверхность очень каменистая, с неровным рельефом и большими перепадами высот

		BopSrfLanded = Анализ любопытного и весьма неровного рельефа Bop подпорчен тем, что кто-то божится, будто видел щупальце
		BopSrfLanded = Какие-то ребята в чёрных костюмах, шляпах и тёмных очках забрали один из съёмочных снимков раньше, чем мы успели его изучить, и что-то бормотали про планетарную безопасность

		PolSrfLanded = Поверхность очень неровная и вся в шипах. Кругом множество гор и кривых долин. Захватите кербонавтам топлива с запасом, чтобы было где искать безопасное место

	EeelooSrfLanded = Поверхность Eeloo относительно гладкая. Высокая отражательная способность материала подтверждает ледяной покров. Экипажу стоит прихватить коньки
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[ca_soilScoop]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Манипулятор вскрывает немного материала из-под поверхности
	default = Ковш соскребает поверхностный слой для анализа
	default = Сделаны снимки обнажившегося реголита

	MohoSrfLanded = А это ковш начинает плавиться
	MohoSrfLanded = В KSC куда больше радуются тому, что манипулятор ещё не расплавился
	MohoSrfLandedNorthPole = Ковшовому манипулятору будет непросто дотянуться до Mohole

	EveSrfLanded = Грунт по составу хорош для отбора проб — при условии, что вы сумеете взлететь и доставить хоть одну
	EveSrfSplashed = Плюх!
	EveSrfSplashed = Манипулятор плюхается в океан. Вода начинает шипеть и парить

		GillySrfLanded = Ковш тревожит крохотную порцию материала, и та тут же уплывает прочь на скорости отрыва

	KerbinSrf = ЦУП отмечает, что в следующий раз дешевле будет просто отправить стажёров с лопатами
	KerbinSrfSplashed = Плюх!
	KerbinSrfSplashed = Инженерная команда на миг задумывается, не приспособить ли ковш под весло
	KerbinSrfLandedKSC = Выдвинутый манипулятор спотыкается об одного из ассистентов д-ра Kerman
	KerbinSrfLandedKSC = Полиция KSC штрафует ЦУП за порчу газонов и построек вокруг космического центра
	KerbinSrfLandedDeserts = Под песком, похоже, ещё больше песка
	KerbinSrfLandedShores = О, смотрите, показались блестящие сезонные ракушки!
	KerbinSrfLandedGrasslands = Манипулятор едва не запутался в траве
	KerbinSrfLandedMountains = Ковш царапает каменистую поверхность
	KerbinSrfLandedTundra = Под слоем мелкого снега лежит толстый лёд
	KerbinSrfLandedRunway = Манипулятор зачерпывает клочья изодранной резины и какой-то странный зелёный материал

		MunSrfLanded = Реголит Mun пыльный, с вкраплениями частиц покрупнее
		MunSrfLanded = Пыльный верхний слой достигает нескольких сантиметров и может осложнить как ходьбу, так и езду

		MinmusSrfLanded = ЦУП осознаёт, что это всего лишь ОЧЕНЬ дорогая ложка для мороженого
		MinmusSrfLanded = Учёные вглядываются в снимки обнажившегося материала и выносят вердикт: лаймовый щербет

	DunaSrfLanded = Поверхностный слой — это очень, очень мелкая пыль
	DunaSrfLanded = Всего в паре сантиметров под верхним слоем ковш вскрывает пыль потемнее
	DunaSrfLanded = Под верхним слоем обнажился какой-то светлый материал — неужели лёд?

		IkeSrfLanded = Грунт Ike менее пыльный и более каменистый
		IkeSrfLanded = Ковш скребёт по каменистому материалу. Чтобы взять пробу глубже, понадобится мощный бур

	DresSrfLanded = Между реголитом Dres и Mun поразительно много общего

	JoolSrfLanded = Инженерная команда получает главный приз за систему, способную зачерпнуть материал с поверхности газового гиганта!

		LaytheSrfLanded = Слои грунта по свойствам схожи с кербинскими
		LaytheSrfLanded = При таком количестве воды на Laythe добраться до какого-никакого грунта — это ещё редкая удача

	EeelooSrfLanded = Скребущий звук ковша подтверждает, что поверхность ледяная
	EeelooSrfLanded = На поверхности есть мелкие снежные частицы, но в основном это сплошная глыба льда
	}
}
