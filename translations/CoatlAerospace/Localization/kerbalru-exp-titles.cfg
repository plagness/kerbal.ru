// Русификация ТИТУЛОВ научных экспериментов CoatlAerospace (ProbesPlus + GroundOps)
// Переводится только title эксперимента; блоки RESULTS уже переведены в kerbalru-science-ca-*.cfg
// Источники: GameData/CoatlAerospace/ProbesPlus/Resources/ScienceDefs.cfg
//            GameData/CoatlAerospace/GroundOps/Resources/GO-ScienceDefs.cfg
// Метод: ModuleManager :FINAL — @title подменяется после загрузки мода.

// --- GroundOps ---
@EXPERIMENT_DEFINITION:HAS[#id[ca_SiteSurvey]]:FINAL { @title = Обзорная съёмка местности }         // Site Survey Imagery
@EXPERIMENT_DEFINITION:HAS[#id[ca_soilScoop]]:FINAL { @title = Проба поверхностного материала }      // Surface Material Exposure

// --- ProbesPlus ---
@EXPERIMENT_DEFINITION:HAS[#id[ca_gammaRay]]:FINAL { @title = Гамма-спектрометрия }                  // Gamma Ray Spectrometry
@EXPERIMENT_DEFINITION:HAS[#id[ca_rpws]]:FINAL { @title = Данные радиоплазменных волн }              // Radio Plasma Wave Data
@EXPERIMENT_DEFINITION:HAS[#id[ca_orbitalScope]]:FINAL { @title = Орбитальные снимки }               // Orbital Images
@EXPERIMENT_DEFINITION:HAS[#id[ca_mag]]:FINAL { @title = Данные магнитометра }                       // Magnetometer Data
@EXPERIMENT_DEFINITION:HAS[#id[ca_IRspec]]:FINAL { @title = Инфракрасная спектрометрия }             // Infrared Spectrometry
@EXPERIMENT_DEFINITION:HAS[#id[ca_ionElec]]:FINAL { @title = Ионизационный и электростатический анализ } // Ionization and Electrostatic Analysis
@EXPERIMENT_DEFINITION:HAS[#id[ca_UVspec]]:FINAL { @title = Ультрафиолетовый и атмосферный анализ }  // Ultraviolet and Atmospheric Analysis
@EXPERIMENT_DEFINITION:HAS[#id[ca_solarWind]]:FINAL { @title = Замер солнечного ветра }              // Solar Wind Measurement
@EXPERIMENT_DEFINITION:HAS[#id[ca_kdex]]:FINAL { @title = Анализ пыли }                              // Dust Analysis
@EXPERIMENT_DEFINITION:HAS[#id[ca_micrometeoroid]]:FINAL { @title = Данные ударов микрометеороидов } // Micrometeoroid Impact Data
@EXPERIMENT_DEFINITION:HAS[#id[ca_radsci]]:FINAL { @title = Данные радиации }                        // Radiation Data
@EXPERIMENT_DEFINITION:HAS[#id[ca_filmCamera]]:FINAL { @title = Снимки камеры }                      // Camera images
