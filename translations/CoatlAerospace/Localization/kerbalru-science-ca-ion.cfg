// CoatlAerospace ProbesPlus — перевод РЕЗУЛЬТАТОВ экспериментов (ScienceDefs)
// Эксперимент: ca_ionElec — «Ионизационный и электростатический анализ» (детектор ионов/электронов ELIX)
// Метод: :FINAL-патч, полностью заменяющий блок RESULTS. Ключи ситуаций — дословно из оригинала, дубли сохранены.
// Русификатор kerbal.ru

@EXPERIMENT_DEFINITION:HAS[#id[ca_ionElec]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Вы измеряете электрические свойства атмосферы в поисках ионизированных атомов и молекул
	default = Прибор ищет ионизированные частицы в атмосфере
	default = Данные по ионизации и электростатике записаны

	SunInSpace = Регистрируется колоссальный поток заряженных частиц, испускаемых Керболом
	SunFlyingHigh = Вот так выглядят поджаренные микросхемы
	SunInSpaceLow = Вблизи Кербола фиксируется очень высокий уровень заряженных частиц
	SunInSpaceLow = Из-за сильных электромагнитных помех прибор уходит в безопасный режим, чтобы уберечься от повреждений
	SunInSpaceHigh = Обнаружены заряженные частицы — возможно, их несёт солнечный ветер в потоках солнечной плазмы
	SunInSpaceHigh = Анализ данных о частицах наводит на мысль, что без излучения Кербола ионизация атмосфер попросту невозможна

	MohoInSpace = Замеры заряженных частиц записаны с окрестностей Мохо
	MohoInSpaceLow = Ионизации атмосферы не обнаружено, зато видны следы заряженных частиц, сдуваемых с поверхности солнечным ветром
	MohoInSpaceLow = Собранные данные выявляют нехватку заряженных частиц, обычных для планет с атмосферой
	MohoInSpaceHigh = Единственные заряженные частицы, что здесь удалось поймать, похоже, прилетают от самого Кербола

	EveFlyingHigh = Внезапные всплески электростатики намекают на возможность молний в атмосфере Евы
	EveInSpace = Замеры заряженных частиц записаны с окрестностей Евы
	EveInSpaceLow = Вдоль магнитослоя Евы фиксируется высокий поток энергии частиц — ещё один довод в пользу очень сильного магнитного поля планеты
	EveInSpaceHigh = Заряженные частицы обнаружены и нанесены на карту вдоль магнитного хвоста Евы

	GillyInSpace = Замеры ионизации частиц сняты с окрестностей Гилли
	GillyFlyingHigh = Дальнейший анализ подтверждает отсутствие атмосферы
	GillyInSpaceLow = Никакого взаимодействия с солнечными частицами — что говорит об отсутствии атмосферы
	GillyInspaceHigh = На датчиках ничего интересного

	KerbinFlyingHigh = Ионизированные молекулы в верхних слоях атмосферы, похоже, отражают радиоволны обратно к поверхности
	KerbinFlyingHigh = Датчик фиксирует электрические грозы внизу
	KerbinInSpace = Замеры заряженных частиц сняты с окрестностей Кербина
	KerbinInSpaceLow = Ионизированные частицы взаимодействуют с ионосферой, порождая яркие полярные сияния
	KerbinInSpaceLow = Глубоко внутри магнитосферы Кербина обнаружены пояса некой энергии
	KerbinInSpaceHigh = По мере удаления от магнитослоя планеты уровень ионизации падает

	MunFlyingHigh = Ноль данных — тоже данные, верно?
	MunInSpace = Показания заряженных частиц собраны с окрестностей Муны
	MunInSpaceLow = Несмотря на отсутствие электрической активности, Центр управления отмечает: будущие образцы мунского грунта следует укладывать в антистатические пакеты
	MunInSpaceHigh = Похоже, для ненастья нужна атмосфера, которой у Муны нет

	MinmusFlyingHigh = Никаких осмысленных данных. Стажёры ликуют: прочёсывать эти результаты не придётся
	MinmusInSpace = Электростатические данные собраны из космоса над Минмусом
	MinmusInSpaceLow = Электростатический анализ завершён: киви
	MinmusInSpaceHigh = Раз атмосферной активности не обнаружено, Центр управления отменяет все минмусские миссии с участием метеорологов
	MinmusInSpaceHigh = За Минмусом, похоже, тянется едва заметный след заряженных частиц

	DunaFlyingHigh = Пусть и слабая, но атмосфера Дюны определённо способна на электростатическое взаимодействие
	DunaInSpace = С системы Дюны сняты базовые замеры заряженных частиц
	DunaInSpaceLow = Замеры показывают: полярные сияния рождаются, когда солнечные частицы взаимодействуют с отдельными участками нижней атмосферы
	DunaInSpaceHigh = На малых высотах в разреженной атмосфере Дюны слабо улавливаются заряженные частицы

	IkeFlyingHigh = Атмосферных данных нет, зато с поверхности улавливается слабый электрический сигнал
	IkeInSpace = Прибор фиксирует уровень частиц близ Айка
	IkeInSpaceLow = Электростатика подтверждает отсутствие атмосферы вокруг Айка
	IkeInSpaceHigh = Похоже, Айк заметно влияет на солнечные частицы, проходящие сквозь систему Дюны

	DresFlyingHigh = Электростатические данные неубедительны. Центр управления что-то бормочет о наборе космонавтов-электриков
	DresInSpace = Данные по заряженным частицам записаны в окрестностях Дреса
	DresInSpaceLow = Заряженные частицы от Кербола, похоже, бомбардируют поверхность напрямую — результат неубедителен
	DresInSpaceHigh = Отсутствие данных высоко над Дресом указывает на отсутствие атмосферы

	JoolFlyingHigh = В глубине атмосферы жидкие вещества проявляют электропроводность, словно металлы
	JoolInSpace = Записаны данные по заряженным частицам системы Джула
	JoolInSpaceLow = Считается, что у Джула тоже есть полярные сияния — ионизированные частицы обнаружены и здесь, во взаимодействии с верхней атмосферой
	JoolInSpaceLow = Облачные слои и пояса Джула имеют разный уровень электростатики, что говорит о разных скоростях и высотах
	JoolInSpaceHigh = Зафиксировано, что Джул сильно отклоняет солнечные частицы
	JoolInSpaceHigh = Гигантский газовый шар выдаёт столько причудливой электростатики, что лаборантам хватит бумажной волокиты на месяцы вперёд

	LaytheFlyingHigh = Верхняя атмосфера содержит множество особенно активных заряженных ионов
	LaytheInSpace = Электростатическое сканирование над Лейтом завершено
	LaytheInSpaceLow = Обнаружены ионизированные частицы. Порождают ли они полярные сияния — неясно
	LaytheInSpaceHigh = Обнаружено взаимодействие заряженных частиц. У Лейта, определённо, очень активная атмосфера

	VallFlyingHigh = ELIX не фиксирует никаких электростатических взаимодействий
	VallInSpace = Сканирование ELIX завершено. Стажёры ликуют!
	VallInSpaceLow = Учёные перебирают настройки и наконец объявляют об отсутствии атмосферы
	VallInSpaceHigh = Первичные сканы ловят заряженные частицы, но, возможно, они от Джула

	TyloFlyingHigh = Пролетая над множеством ударных кратеров, прибор ловит очень слабые сигналы
	TyloInSpace = Получены результаты сканирования данных ELIX
	TyloInSpaceLow = У Тайло тоже нет атмосферы, с которой могла бы взаимодействовать плазма Кербола
	TyloInSpaceHigh = Похоже, и у Тайло атмосферы нет

	BopFlyingHigh = Из-под поверхности идут необъяснимые электрические аномалии
	BopInSpace = Электростатические данные записаны. Атмосфера не обнаружена
	BopInSpaceLow = ELIX ловит нерегулярные электрические импульсы. Это что, простые числа?
	BopInSpaceHigh = Первичное скани- *помехи* обнаруж...о никакой *помехи* -осферы

	PolFlyingHigh = Над участком P013-N уловлены слабые сигналы
	PolInSpace = Поток данных получен. Данные ELIX с Пола записаны
	PolInSpaceLow = Атмосферы вокруг луны не обнаружено
	PolInSpaceHigh = Обнаружена пара «поясов» заряженных частиц, порождённых Джулом, но при подлёте к Полу они сошли на нет

	EelooFlyingHigh = ELIX выставили на максимальную чувствительность, но так ничего и не поймали
	EelooInSpace = Электростатические данные собраны из космоса над Ило
	EelooInSpaceLow = Ило, похоже, лишена всякого электростатического заряда
	EelooInSpaceLow = А не реагирует ли солнечный ветер с выброшенным кораблём топливом?
	EelooInSpaceHigh = Улавливаются очень слабые сигналы, но, похоже, они не с Ило

	SarnusInSpace = Электростатические данные с окрестностей Сарнуса получены
	SarnusInSpaceLow = Внизу зафиксированы мощнейшие грозовые разряды — в несколько тысяч раз сильнее, чем дома!
	SarnusInSpaceLow = Электростатические замеры намекают на присутствие сильно проводящего металлического слоя
	SarnusInSpaceHigh = Похоже, в атмосфере бушуют мощные электрические грозы
	SarnusInSpaceHigh = Обнаружены захваченные частицы: они скапливаются у полюсов и должны порождать яркие полярные сияния

	TektoFlyingHigh = Прибор фиксирует признаки трибоэлектрического эффекта на поверхности: часть песка Текто способна электризоваться от трения
	TektoInSpaceLow = Обнаруженные сгустки ионизированных частиц могут указывать на полярные сияния в атмосфере
	TektoInSpaceHigh = Прибор регистрирует некоторую активность — возможно, это взаимодействия с магнитосферой Сарнуса

	SlateInSpaceHigh = Ноль данных — тоже данные, верно?
	SlateInSpaceHigh = На датчиках ничего интересного
	SlateInSpaceLow = Сканирование ELIX завершено. Стажёры ликуют! А потом их всех увольняют — атмосферы-то так и не нашли
	SlateInSpaceLow = Электростатика подтверждает отсутствие атмосферы

	HaleInSpaceHigh = Ноль данных — тоже данные, верно?
	HaleInSpaceHigh = Отсутствие данных высоко над Хейлом указывает на отсутствие атмосферы
	HaleInSpaceLow = Электростатика подтверждает отсутствие атмосферы

	OvokInSpaceHigh = На датчиках ничего интересного
	OvokInSpaceLow = Учёные перебирают настройки и наконец объявляют об отсутствии атмосферы

	UrlumInSpace = Данные по заряженным частицам с окрестностей Урлума записаны
	UrlumInSpaceLow = Данные по заряженным частицам показывают больше активности ближе к южному полюсу магнитного поля Урлума
	UrlumInSpaceLow = Облачные слои и пояса Урлума имеют разный уровень электростатики, что говорит о разных скоростях и высотах
	UrlumInSpaceHigh = Планета демонстрирует любопытное взаимодействие с солнечной плазмой, включая отдельные локальные всплески

	WalInSpaceHigh = Записи прибора подтверждают отсутствие атмосферной ионизации
	WalInSpaceHigh = У Вала, похоже, вообще нет атмосферы
	WalInSpaceLow = Фоновые показания намекают, что на поверхности Вала есть какой-то проводящий металлический материал

	TalInSpaceHigh = Прибор не улавливает никакой атмосферы вокруг луны
	TalInSpaceLow = Данные прибора допускают, что на луне есть очень проводящие металлы
	TalInSpace = Атмосферы не обнаружено, зато у Тала любопытные показания проводимости

	PriaxInSpaceHigh = Влияние орбиты Приакса заметно сказывается на верхней атмосфере Урлума
	PriaxInSpaceLow = Возможно, внутри Приакса есть проводящие металлы — а может, это просто всплеск от Урлума. Трудно сказать

	PoltaInSpaceHigh = Прибор улавливает признаки выброса частиц с луны. Неужели криовулкан?
	PoltaInSpaceLow = Полта, похоже, лишена и электростатического заряда, и атмосферы

	NeidonInSpace = У Нейдона очень характерная электростатическая подпись — вероятно, из-за его уникальной атмосферной химии
	NeidonInSpaceHigh = Замеры выявляют присутствие сильного электростатического поля в атмосфере
	NeidonInSpaceLow = Данные прибора указывают на присутствие электропроводящих жидкостей, которые за счёт конвективного движения создают магнитное динамо

	ThatmoInSpaceHigh = У Татмо обнаружена очень слабая активность в верхней атмосфере, но идущие в ней процессы неизвестны
	ThatmoInSpaceLow = Электростатический эксперимент продолжает ловить показания, намекающие на электростатическую активность вокруг сублимирующего азота, что бьёт из гейзеров Татмо
	}
}
