		//parts
		#LOC_BeamedPower_Parts_PhotonSail_Title = BP-541L «Starshot» фотонный парус
		#LOC_BeamedPower_Parts_PhotonSail_Description = Когда инженеры Ionic Symphonic Protonic Electronics впервые увидели чертёж этой детали, они наотрез отказались верить, что это не шутка. Тогда учёные прочитали им долгую лекцию о том, что, хотя в космосе нет ветра, парус можно толкать потоком фотонов из лучевой энергии. Этой детали не нужно нести рабочее тело, поэтому она способна разгоняться до заметной доли скорости света. Её главный недостаток — крайне малая тяга даже при большой переданной мощности.
		#LOC_BeamedPower_Parts_PhotonSail_Extend = Развернуть парус
		#LOC_BeamedPower_Parts_PhotonSail_Retract = Свернуть парус
		#LOC_BeamedPower_Parts_PhotonSail_tags = фотон, парус, луч, энерг, движ, свет, двигат

		#LOC_BeamedPower_Parts_ThermalEngine_Title = BP-TE «Unradioactive» термический двигатель
		#LOC_BeamedPower_Parts_ThermalEngine_Desc = Нечто вроде ядерного двигателя: он нагревает рабочее тело термически, а не химической реакцией. Вот только тепло здесь берётся из лучевой энергии. Больше не нужно таскать с собой тяжёлый ядерный реактор! У этого двигателя тяговооружённость намного выше, чем у его атомных собратьев. С другой стороны, сам по себе он бесполезен — ему нужна лучевая энергия. Помните об этом!
		#LOC_BeamedPower_Parts_ThermalEngine_tags = терм, тепл, приёмник, двигат, движ, луч, энерг

		#LOC_BeamedPower_Parts_AblativeEngine_title = BP-AE «Sublimation» абляционный двигатель
		#LOC_BeamedPower_Parts_AblativeEngine_desc = Просто гигантский тяжёлый металлический купол с какой-то электроникой по бокам. Ничего необычного. Разумеется, это не оружие на 8000 K, мы бы ни за что не стали его так использовать, верно? Осторожно: выхлоп при работе способен вскипятить что угодно, держите кербонавтов подальше. Ах да, без лучевой энергии он ничего не делает.
		#LOC_BeamedPower_Parts_AblativeEngine_tags = абляц, двигат, движ, луч, энерг, плазм, импульс

		#LOC_BeamedPower_Parts_TransmitterDish_title = BP-T1 «Microwaving» передатчик энергии
		#LOC_BeamedPower_Parts_TransmitterDish_desc = Большая параболическая тарелка 5 m в поперечнике, способная передавать энергию, выработанную вашим аппаратом, на другой аппарат. Из-за большого диаметра луч получается более сфокусированным, а энергия передаётся на большей длине волны, что повышает эффективность. Тарелка заодно служит дальней антенной — по ней можно связаться с Джебедаей, которого «случайно» отправили в дальний космос без запаса еды. Правда, она неудобно огромная: удачи запихнуть её в обтекатель!
		#LOC_BeamedPower_Parts_TransmitterDish_tags = передат, тарелк, парабол, источник, микровол, луч, энерг

