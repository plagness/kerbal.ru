// KAX (Kerbal Aircraft Expansion) — русификация деталей (сборка «Оператор»)
// Метод mm-title: title/description/manufacturer заданы через #LOC в part.cfg → патчим ModuleManager по полю name узла PART литеральным русским текстом (перекрывает ссылку #LOC).
// Деталей: 16. Матчинг по полю name, регистр/дефисы/цифры сохранены дословно. Скрытых (category=-1) нет.
// tags детали KAXmedCockpit ссылается на сток-ключ #autoLOC_500336 (уже русифицирован игрой) — не трогаем.

@PART[KAXVintagePropelator]:FINAL
{
	@title = Винтажный пропеллятор B
	@description = Винтажный пропеллятор B — базовая модель: крохотный моторчик и едва работающий пропеллер в одном флаконе, крохотный толчок для вашего крохотного самолётика. Осторожно: пропеллер вырезан вручную из плавника, пожалуйста, не мочите пропеллер.
	@manufacturer = Кербальские авиастроители-первопроходцы
}

@PART[KAXVintagePropelatorExtra]:FINAL
{
	@title = Тяжёлый винтажный пропеллятор
	@description = Тяжёлый винтажный пропеллятор, идеален для небольших грузовых самолётов: 4 лопасти и ещё один цилиндр. Сколько же их можно добавить? Покажет только будущее. Инженеры предсказывают, что в будущем станет возможно целых ШЕСТЬ цилиндров. Летит быстрее, чуть тяжелее модели S и почти вдвое прожорливее. Крохотный моторчик и почти работающий пропеллер в одном флаконе — крохотный толчок для вашего спортивного самолётика. Осторожно: пропеллер вырезан вручную из плавника, пожалуйста, не мочите пропеллер.
	@manufacturer = Кербальские авиастроители-первопроходцы
}

@PART[KAXVintagePropelatorS]:FINAL
{
	@title = Спортивный винтажный пропеллятор
	@description = Винтажный пропеллятор S для спорта: ещё один цилиндр, летит быстрее, чуть тяжелее модели B и почти вдвое прожорливее. Крохотный моторчик и едва работающий пропеллер в одном флаконе — крохотный толчок для вашего крохотного самолётика. Осторожно: пропеллер вырезан вручную из плавника, пожалуйста, не мочите пропеллер.
