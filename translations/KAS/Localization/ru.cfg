		#KAS_CH1_Part_tags = KIS KAS трос верёвка крюк стяжка cck-kas

		// ********** Part: KAS.GrapplingHook

		#KAS_GrapplingHook_Part_title = HG-02 Захватный крюк
		#KAS_GrapplingHook_Part_manufacturer = KAS
		#KAS_GrapplingHook_Part_description = Идея «загарпунить» объекты в космосе всем понравилась. Но гарпун не справлялся с модулями станций — они же из металла. Джин предложил решение: заменить гарпун присоской. Сработало, только это уже не гарпун.
		#KAS_GrapplingHook_Part_tags = KIS KAS крюк гарпун крепление лебёдка выброс cck-kas
		#KAS_GrapplingHook_Part_DetachDartEventText = Отсоединить захват

		// ********** Part: KAS.Harpoon

		#KAS_Harpoon_Part_title = HP-01 Гарпун
		#KAS_Harpoon_Part_manufacturer = KAS
		#KAS_Harpoon_Part_description = Эту идею предложил Билл, вернувшись из отпуска. Он охотился в море с гарпунным ружьём. Ничего, конечно, не подстрелил, но желание что-нибудь «загарпунить» осталось. Почему бы не какой-нибудь астероид в космосе? Так и появился этот космический гарпун. Кстати, им можно загарпунить даже планету.
		#KAS_Harpoon_Part_tags = KIS KAS крюк гарпун крепление лебёдка выброс cck-kas
		#KAS_Harpoon_Part_DetachDartEventText = Отсоединить гарпун

		// ********** Part: KAS.JS1

		#KAS_JS1_Part_title = JS-1 Соединительный разъём
		#KAS_JS1_Part_manufacturer = KAS Labs, Inc.
		#KAS_JS1_Part_description = У этого универсального разъёма масса возможностей: он обеспечивает прочное соединение и передачу ресурсов! Для установки разъёма нужен сертифицированный инженер с многолетним опытом, но, будучи прикреплён, он позволяет соединять аппараты даже уборщику.
		#KAS_JS1_Part_tags = KIS KAS труба пайп разъём cck-kas

		// ********** Part: KAS.PCB1

		#KAS_PCB1_Part_title = PCB-1 Портативная тросовая растяжка
		#KAS_PCB1_Part_manufacturer = KAS Labs, Inc.
		#KAS_PCB1_Part_description = Простая ручная лебёдка с небольшой катушкой стального троса — позволяет соединять предметы, если они не слишком далеко. Правда, на другом аппарате должен быть крюк, к которому крепится трос, так что эта лебёдка решает лишь половину задачи.
		#KAS_PCB1_Part_tags = KIS KAS трос верёвка стяжка лебёдка cck-kas
		#KAS_PCB1_Part_LinkBreak = Разъединить
		#KAS_PCB1_Part_LinkStart = Соединить

		// ********** Part: KAS.PortPylon

		#KAS_PortPylon_Part_title = GP-20 Пилон
		#KAS_PortPylon_Part_manufacturer = KAS Labs, Inc.
		#KAS_PortPylon_Part_description = Наша линейка RTS-1 имела огромный успех! Но были и жалобы: оказалось, иногда трубы просто не хватает! Чтобы решить эту проблему, разработали новую деталь — лёгкий пилон со встроенным гнездом для трубы, работающий как удлинитель. Так можно тянуть цепочку ресурсных соединений на большие расстояния, хотя для этого могут понадобиться дополнительные пилоны. Джеб очень хотел встроить в полый корпус холодильник Kerba-Cola, но отделу разработки пришлось отклонить его предложение из-за строгого лимита массы в 20 кг.
		#KAS_PortPylon_Part_tags = KAS ресурс топливо передача пилон cck-kas

		// ********** Part: KAS.PortPylonPwr

		#KAS_PortPylonPwr_Part_title = BGP-400 Пилон на стероидах
		#KAS_PortPylonPwr_Part_manufacturer = KAS Labs, Inc.
		#KAS_PortPylonPwr_Part_description = Дизайн этой детали навеян GP-20. Нашим инженерам нужно было выяснить: можно ли и правда использовать внутренний объём пилона? Оказалось, можно! Поэтому они решили набить его батареями Z-100 и простым модулем управления. Не так круто, как холодильник Kerba-Cola, о котором просил Джеб, но всё равно очень практично. Будьте уверены: батареи высшего качества, а не просто вытащены из мусорки.
		#KAS_PortPylonPwr_Part_tags = KAS ресурс топливо передача пилон cck-kas

		// ********** Part: KAS.RTS1

		#KAS_RTS1_Part_title = RTS-1 Станция передачи ресурсов
		#KAS_RTS1_Part_manufacturer = KAS Labs, Inc.
		#KAS_RTS1_Part_description = Эта труба позволяет передавать ресурсы между аппаратами. Диаметр не особо впечатляет, но, как сказал однажды один маленький зелёный товарищ: «Размер значения не имеет». Наша запатентованная технология позволяет передавать через неё что угодно, включая, но не ограничиваясь: камни, топливо, закуски и даже кербалов. В последнем случае гарантия аннулируется.
		#KAS_RTS1_Part_tags = KIS KAS ресурс топливо передача труба cck-kas

