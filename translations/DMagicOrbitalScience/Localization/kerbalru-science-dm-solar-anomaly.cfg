// kerbal.ru — русификация результатов экспериментов DMagicOrbitalScience
// Эксперименты: dmSolarParticles (Solar Particle Analysis), AnomalyScan (Anomaly Scan)
// Только @EXPERIMENT_DEFINITION-патчи RESULTS. Ключи ситуаций не изменены.
// Источник: GameData/DMagicOrbitalScience/Resources/ScienceDefs.cfg

@EXPERIMENT_DEFINITION:HAS[#id[dmSolarParticles]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Зафиксирован небольшой рост концентрации тяжёлых частиц; вероятно, это пыль, сорванная с близлежащей планеты.
	default = Несколько частиц застряли в пластинах коллектора; дальнейшее изучение даст более полное представление об их составе и прочих свойствах.
	default = Эти солнечные частицы позволят точнее оценить состав внешней атмосферы Солнца.
	KerbinInSpaceLow = Под защитой мощной магнитосферы Kerbin в коллектор попадают почти исключительно лёгкие частицы водорода и гелия.
	KerbinInSpaceLow = Относительно высокая концентрация кислорода и азота в пластинах коллектора — это, скорее всего, атмосфера Kerbin, а не солнечный ветер.
	KerbinInSpaceHigh = Некоторое количество более тяжёлых элементов пробивается сквозь защитную магнитосферу Kerbin и оседает в высокочистых пластинах коллектора.
	KerbinInSpaceHigh = Собрано достаточно тяжёлых частиц солнечного ветра, чтобы начать базовый анализ изотопного состава солнечных элементов.
	MunInSpaceLow = В пластинах коллектора оседают тяжёлые силикатные частицы; их состав соответствует мунному реголиту.
	MunInSpaceHigh = На таком расстоянии Mun почти не влияет на состав собираемых частиц солнечного ветра.
	MinmusInSpaceLow = В пластинах коллектора оседает несколько тяжёлых металлов; вероятно, солнечный ветер сорвал их с поверхности Minmus.
	MinmusInSpaceHigh = Вдали от защитной магнитосферы Kerbin по собранным прибором частицам можно провести более точный анализ состава солнечного ветра.
	SunInSpaceLow = Крайне высокая концентрация частиц вынуждает отключить активный ионный концентратор и едва не перегружает пластины пассивных коллекторов.
	SunInSpaceHigh = Вдали от любых посторонних влияний можно провести очень тщательный анализ изотопных соотношений азота, кислорода и благородных газов в солнечном ветре.
	MohoInSpaceLow = Коллектор фиксирует довольно высокий уровень тяжёлых силикатных частиц, сорванных с поверхности Moho интенсивным солнечным ветром.
	MohoInSpaceHigh = В такой близости к Солнцу плотность солнечного ветра очень высока, что позволяет собрать множество частиц за очень короткое время.
	EveInSpaceLow = Под защитой мощной магнитосферы Eve основным источником частиц в пластинах коллектора становится её бурная атмосфера.
	EveInSpaceHigh = Даже вдали от Eve её огромное магнитное поле блокирует большую часть тяжёлых заряженных частиц солнечного ветра, оставляя мало работы концентратору отрицательных ионов.
	GillyInSpace = У дальних границ магнитосферы Eve собранные в пластинах частицы показывают состав солнечного ветра, почти неотличимый от межпланетного пространства.
	DunaInSpaceLow = В пластинах коллектора оседает немало частиц оксида железа; вероятно, недавняя буря подняла их высоко в атмосферу Duna, а часть унесло в космос.
	DunaInSpaceHigh = Сравнение изотопных соотношений кислорода даёт значения, немного отличные от межпланетного пространства; возможно, виновата слабо удерживаемая атмосфера Duna.
	IkeInSpace = Здесь фиксируется чуть более высокая концентрация тяжёлых частиц солнечного ветра — вероятно, из-за притяжения Duna и Ike.
	DresInSpace = Всё точно так же, как в межпланетном пространстве...
	JoolInSpaceLow = Глубоко внутри мощной магнитосферы Jool коллекторы фиксируют в основном высокий уровень водорода и гелия, но обнаружено и несколько соединений хлора — скорее всего, из атмосферы Jool.
	JoolInSpaceHigh = Под защитой громадной магнитосферы Jool местная плазменная среда заметно отличается от межпланетного пространства. Предварительный анализ показывает расхождения в изотопных соотношениях нескольких элементов.
	JoolInSpaceHigh = В пластинах коллектора оседает любопытная смесь частиц: молекулы воды, несколько соединений аммиака, соединения хлора и прочее — и всё это, похоже, циркулирует в сложной местной среде Jool.
	LaytheInSpaceLow = Пролетая у самой атмосферы Laythe, удаётся собрать несколько соединений аммиака.
	LaytheInSpaceHigh = В полосах, тянущихся от Laythe к Jool, обнаружен ряд тяжёлых элементов — вероятно, их несут магнитные потоки, порождённые магнитосферами Laythe и Jool.
	VallInSpaceLow = В пластинах коллектора оседает много молекул воды; вероятный источник — криовулканизм Vall.
	VallInSpaceHigh = Криовулканизм Vall, похоже, создаёт эфемерный пояс из молекул воды и других лёгких частиц вдоль её орбиты вокруг Jool, и многие из них улавливает ионный коллектор.
	TyloInSpace = Местные плазменные условия у Tylo мало отличаются от обычных для этого расстояния от Jool: собираются в основном лёгкие частицы водорода и гелия.
	BopInSpaceHigh = Обнаружены небольшие отклонения от ожидаемого изотопного соотношения кислорода и азота; любопытно, что они совпадают с тем, что наблюдается в зонах активной биологической деятельности.
	BopInSpaceLow = В пластинах коллектора найден ряд органических соединений, а ионный концентратор фиксирует несколько крупных сложных молекул, обычно в космосе не встречающихся; здесь стоит изучить всё подробнее...
	PolInSpace = На таком большом удалении от Jool защита её магнитосферы ослабевает, и коллекторы фиксируют состав солнечных частиц, схожий с межпланетным пространством.
	EelooInSpace = На таком огромном удалении от Солнца удаётся собрать лишь горстку частиц, и крошечная Eeloo, похоже, почти не влияет на их изотопный состав.
	AblateInSpace = Немало тяжёлых металлических частиц срывается с поверхности Ablate и оседает в пластинах коллектора вместе с чрезвычайно обильным солнечным ветром.
	AscensionInSpace = С ночной стороны этой планеты фиксируется высокая концентрация молекул воды — вероятно, они выделяются из недр и уносятся солнечным ветром.
	ErinInSpace = Концентратор заряженных ионов улавливает немало высокоэнергетических частиц, кружащих в пространстве близ Erin.
	InaccessableInSpace = Малый размер и слабая гравитация Inaccessable не позволяют ей сколько-нибудь заметно повлиять на состав солнечного ветра на её орбите.
	JokerInSpace = Поток солнечного ветра от Serious перекрывает почти всю сигнатуру Kerbol.
	PockInSpace = Заметных изменений в составе солнечного ветра у этой крошечной луны не обнаружено.
	RingleInSpace = Ионный концентратор добывает несколько интересных образцов из кольцевой системы Ringle.
	SentarInSpace = Мощное магнитное поле Sentar блокирует большую часть и без того разрежённого солнечного ветра, оставляя коллекторам в основном лёгкие элементы вроде водорода и гелия.
	SeriousInSpace = Общий состав солнечного ветра от Serious похож на исходящий от Kerbol, но изотопные соотношения нескольких элементов заметно различаются.
	SkeltonInSpace = Плотная атмосфера Skelton, похоже, теряет несколько тяжёлых соединений железа — вероятно, из-за гравитационных взаимодействий на её необычной орбите.
	ThudInSpace = В пластинах коллектора оседают очень высокие концентрации сравнительно тяжёлых частиц, будто пойманных мощным притяжением Thud.
	SarnusInSpaceLow = Пластины коллектора быстро переполняются тяжёлыми пылинками из колец Sarnus, давая обилие данных об их составе.
	SarnusInSpaceHigh = Частицы из сложной среды Sarnus оседают в пластинах коллектора, добавляя данных о планете и её лунах.
	HaleInSpace = Пространство вокруг Hale относительно чистое: в пластины коллектора попадают лишь следы водяного льда и силикатных частиц.
	OvokInSpace = Частицы заряженного водяного льда оседают в пластинах коллектора, стекая с поверхности Ovok.
	SlateInSpace = Пластины коллектора наводняются частицами заряженной планетарной пыли, слетающей с поверхности Slate.
	TektoInSpace = В пластины коллектора бьются частицы разнообразных мелких минералов, богатых углеводородами, срываясь с атмосферы Tekto.
	UrlumInSpace = На орбите над Urlum в пластины коллектора попадают следы воды и аммиака.
	PoltaInSpace = Среда вокруг Polta довольно свободна от пыли и солнечной плазмы, так что детекторам почти нечего собрать.
	PriaxInSpace = В пластинах коллектора застревает немного каменистой пыли — вероятно, сорванной с поверхности Priax.
	WalInSpace = Детектор заряженных ионов улавливает очень высокие концентрации пыли из окрестностей Wal.
	TalInSpace = Прибор собирает высокие концентрации частиц водяного льда.
	NeidonInSpace = Коллектор фиксирует частицы, содержащие несколько лёгких углеводородов.
	ThatmoInSpace = На орбите вокруг Thatmo собираются частицы льда.
	NisseeInSpace = У Nissee коллектор фиксирует лишь пылевидные силикатные частицы.
	PlockInSpace = Изотопные соотношения в ледяных частицах, собранных у Plock, заметно отличаются от ожидаемых.
	KarenInSpace = На таком расстоянии от Солнца коллекторы улавливают лишь слабый уровень солнечных частиц.
	MercuryInSpaceLow = Коллектор фиксирует довольно высокий уровень тяжёлых силикатных частиц, сорванных с поверхности Mercury интенсивным солнечным ветром.
	MercuryInSpaceHigh = В такой близости к Солнцу плотность солнечного ветра очень высока, что позволяет собрать множество частиц за очень короткое время.
	VenusInSpaceLow = Ионный коллектор фиксирует очень высокие концентрации заряженных частиц.
	VenusInSpaceHigh = В пластинах коллектора застревают разнообразные сульфатные соединения, сдуваемые с верхних слоёв атмосферы Venus.
	MoonInSpaceLow = В пластинах коллектора оседают тяжёлые силикатные частицы; их состав соответствует лунному реголиту.
	MoonInSpaceHigh = На таком расстоянии Moon почти не влияет на состав собираемых частиц солнечного ветра.
	MarsInSpaceLow = В пластинах коллектора оседает немало частиц оксида железа; вероятно, недавняя буря подняла их высоко в атмосферу Mars, а часть унесло в космос.
	MarsInSpaceHigh = Сравнение изотопных соотношений кислорода даёт значения, немного отличные от межпланетного пространства; возможно, виновата слабо удерживаемая атмосфера Mars.
	DeimosInSpace = Здесь фиксируется чуть более высокая концентрация тяжёлых частиц солнечного ветра — вероятно, из-за притяжения Mars и Deimos.
	PhobosInSpace = В пластинах коллектора оседает несколько тяжёлых металлов; вероятно, солнечный ветер сорвал их с поверхности Phobos.
	JupiterInSpaceLow = Глубоко внутри мощной магнитосферы Jupiter коллекторы фиксируют в основном высокий уровень водорода и гелия, но обнаружено и несколько соединений аммиака — скорее всего, из атмосферы Jupiter.
	JupiterInSpaceHigh = Под защитой громадной магнитосферы Jupiter местная плазменная среда заметно отличается от межпланетного пространства. Предварительный анализ показывает расхождения в изотопных соотношениях нескольких элементов.
	IoInSpaceLow = Коллекторы наводняются тяжёлыми частицами серы, выброшенными в космос многочисленными вулканами Io.
	IoInSpaceHigh = Гравитация Jupiter вытягивает из тонкой атмосферы Io непрерывный поток ионизированной серной пыли.
	EuropaInSpaceLow = В пластинах коллектора оседает много молекул воды; вероятный источник — криовулканизм Europa.
	EuropaInSpaceHigh = Криовулканизм Europa, похоже, создаёт эфемерный пояс из молекул воды и других лёгких частиц, и многие из них улавливает ионный коллектор.
	GanymedeInSpace = В пластинах коллектора застревают следы частиц водяного льда; вероятно, они происходят с поверхности Ganymede.
	CallistoInSpace = Местные плазменные условия у Callisto мало отличаются от обычных для этого расстояния от Jupiter: собираются в основном лёгкие частицы водорода и гелия.
	SaturnInSpaceLow = Пластины коллектора быстро переполняются тяжёлыми пылинками из колец Saturn, давая обилие данных об их составе.
	SaturnInSpaceHigh = Частицы из сложной среды Saturn оседают в пластинах коллектора, добавляя данных о планете и её лунах.
	TitanInSpace = В пластины коллектора бьются частицы разнообразных мелких минералов, богатых углеводородами, срываясь с атмосферы Titan.
	UranusInSpace = На орбите над Uranus в пластины коллектора попадают следы воды и аммиака.
	PlutoInSpace = На таком огромном удалении от Солнца удаётся собрать лишь горстку частиц, и крошечный Pluto, похоже, почти не влияет на их изотопный состав.
	AsteroidInSpaceLowMetallic = Из пространства близ этого крошечного астероида собирается ряд силикатных частиц, богатых железом и алюминием.
	AsteroidInSpaceLowStony = Частицы в пластинах коллектора в основном отражают фоновый состав солнечного ветра, но обнаружен и небольшой уровень силикатных соединений.
	AsteroidInSpaceLowCarbonaceous = В пластинах коллектора оседает несколько лёгких органических соединений.
	AsteroidInSpaceLowComet = Пластины коллектора улавливают несколько богатых водой силикатных минералов.
	AsteroidInSpaceLowCarbonaceous = Обнаружены молекулы воды, слетающие с поверхности этого астероида.
	AsteroidInSpaceLowCarbonaceous = Состав органических соединений, пойманных детекторами, указывает на то, что это углеродистый астероид.
	AsteroidInSpaceLowStony = Этот среднеразмерный астероид, похоже, теряет несколько силикатных соединений, которые улавливают коллекторы.
	AsteroidInSpaceLowStony = Силикатный состав срывающихся с этого астероида частиц указывает на то, что он каменного типа.
	AsteroidInSpaceLowMetallic = Ионный концентратор собирает с этого крупного астероида немало заряженных частиц, многие из которых металлической природы.
	AsteroidInSpaceLowMetallic = В пластинах коллектора застревает несколько металлических частиц, что указывает на тяжёлый металлический астероид.
	AsteroidInSpaecLowMetallic = Коллекторы улавливают следы ценных тяжёлых металлов, что делает этот астероид заманчивой целью для добычи.
	AsteroidInSpaceLowIcy-Organic = Этот астероид теряет несколько органических соединений, часть которых несёт электрический заряд и улавливается ионным концентратором.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[AnomalyScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = А вот это уже интересно.
	default = Как это вообще сюда попало?
	KerbinSrfLandedKSC = Это же KSC!
	KerbinSrfLandedIslandAirfield = Похоже, это малоиспользуемый аэродром — возможно, построенный как площадка для аварийной посадки при запусках с KSC.
	KerbinSrfLandedKSC2 = Похоже, это какой-то прототип стартового комплекса — возможно, для тренировок или ранних испытаний.
	KerbinSrfLandedMonolith1 = Поговаривают, что Jeb нашёл один из таких чёрных монолитов на Mun и даже прикоснулся к нему. Не в этом ли причина его несокрушимой (а кто-то скажет — безрассудной) храбрости перед лицом умопомрачительных шансов?
	KerbinSrfLandedMonolith2 = Разглядеть эту странную чёрную плиту поближе будет непросто — уж больно крутой здесь рельеф.
	KerbinSrfLandedMonolith3 = Этот монолит кажется каким-то чужеродным для Kerbin, словно его поставила сюда некая незримая сила.
	KerbinSrfLandedUFO = Похоже, это какой-то странный летательный аппарат — возможно, исследовательский прототип. Кроме того, он испускает несколько видов излучения.
	KerbinSrfLandedPyramids = Эти пустынные пирамиды — один из немногих образцов кербальской наземной архитектуры эпохи до космических полётов.
	KerbinFlyingLowKSC = Это же KSC, с высоты птичьего полёта!
	KerbinFlyingLowIslandAirfield = С воздуха это выглядит неплохим местом для посадки — полезная альтернатива взлётной полосе KSC.
	KerbinFlyingLowKSC2 = С воздуха этот комплекс явно уступает KSC: ему не хватает многих важных зданий, и он, похоже, обеспечивает лишь самый минимум, необходимый для запуска.
	KerbinFlyingLowMonolith1 = После пролёта вплотную над этим объектом зафиксирован резкий всплеск радиоизлучения.
	KerbinFlyingLowMonolith2 = В склоне горы притаился ещё один из тех странных чёрных монолитов, о которых сообщали в разных точках поверхности Kerbin.
	KerbinFlyingLowMonolith3 = Ещё одна насмешливая рожица. Кто же, или что же, этот загадочный Squad?
	KerbinFlyingLowUFO = При пролёте над этим объектом уловлены странные радиосигналы. Может, это какой-то сигнал бедствия?
	KerbinFlyingLowPyramids = С высоты становится очевиден масштаб этого места. Однако о том, как и зачем построили эти сооружения, по-прежнему почти ничего не известно.
	MunSrfLandedMonolith1 = Эта загадочная чёрная плита совпадает с описанием нескольких объектов, найденных на Kerbin. Что же, или кто же, может быть источником таких сооружений?
	MunSrfLandedMonolith2 = Ещё одна насмешливая рожица. Кто же, или что же, этот загадочный Squad?
	MunSrfLandedMonolith3 = Загадочный Squad наносит новый удар — уж наверняка они являются сюда во благо всего кербальства
	MunSrfLandedUFO = Этот странной формы аппарат чем-то напоминает объекты из нескольких загадочных наблюдений над Kerbin.
	MunSrfLandedArmstrongMemorial = Похоже, это какой-то монумент — вероятно, посвящённый отважному первопроходцу в исследовании Вселенной.
	MunSrfLandedRockArch1 = Как такое любопытное скальное образование могло возникнуть на Mun, где нет ни воды, ни выветривания, — вопрос интригующий.
	MunSrfLandedRockArch2 = Ещё одно странное скальное образование, на этот раз почти на дне кратера. Возможно, оно возникло в результате какого-то удара.
	MunSrfLandedRockArch3 = При ближайшем рассмотрении перед нами необыкновенная структура из самой обыкновенной породы.
	MunFlyingLowMonolith1 = После пролёта вплотную над этим объектом зафиксирован резкий всплеск радиоизлучения.
	MunFlyingLowMonolith2 = Этот чёрный монолит почти невидим на тёмной поверхности Mun, и лишь слабый радиосигнал выдаёт его присутствие.
	MunFlyingLowMonolith3 = Поверхность этого объекта, похоже, представляет собой почти идеальный поглотитель абсолютно чёрного тела: она ничего не отражает и почти не оставляет следов своего существования ни на одном сканере.
	MunFlyingLowArmstrongMemorial = Этот каменный мемориал выделяется на фоне унылого мунского пейзажа.
	MunFlyingLowUFO = От этого объекта уловлен короткий повторяющийся радиосигнал.
	MunFlyingLowRockArch1 = Эта арка так и просит пролететь сквозь неё; наверняка на этом можно собрать немало ценной науки.
	MunFlyingLowRockArch2 = Возможно, эта структура была частью какой-то замысловатой полосы препятствий на поверхности Mun.
	MunFlyingLowRockArch3 = Сверху это образование выглядит так, будто его попросту уронили на поверхность.
	MinmusFlyingLowMonolith1 = Как этот объект удерживается в подвешенном состоянии над поверхностью Minmus — такая же загадка, как и его происхождение или смысл насмешливой рожицы, вырезанной на его боку.
	MinmusFlyingLowMonolith1 = Поверхность этого объекта, похоже, представляет собой почти идеальный поглотитель абсолютно чёрного тела: она ничего не отражает и почти не оставляет следов своего существования ни на одном сканере.
	DunaSrfLandedFace = Сбоку оптический сканер показывает всего лишь обычную скалу. Однако несколько любопытных излучений вызывают нарастающие искажения в остальных датчиках.
	DunaSrfLandedMastCamera = Этот любопытный на вид прибор, похоже, принадлежит какому-то давно заброшенному аппарату.
	DunaSrfLandedMastCamera = От этого объекта улавливаются слабые признаки излучения и электрической активности — знак того, что он, возможно, ещё не совсем мёртв.
	DunaSrfLandedPyramid = На первый взгляд эта завораживающая структура кажется всего лишь любопытной особенностью рельефа Duna.
	DunaSrfLandedPyramid = Детальное сканирование этой на вид природной структуры выявляет короткий повторяющийся узор радиоизлучения.
	DunaFlyingLowFace = С высоты значимость этой скалы становится очевидной. Невозможно не заметить явное сходство с кербальским лицом.
	DunaFlyingLowMastCamera = Здесь из поверхности торчит что-то похожее на прибор с космического аппарата. Признак того, что под ним скрыто ещё больше?
	DunaFlyingLowPyramid = Точная геометрия этой структуры становится заметнее, если смотреть сверху.
	DunaFlyingLowPyramid = Быть может, радиосигналы, исходящие от этой структуры, хранят какую-то подсказку о её происхождении.
	VallSrfLandedIcehenge = Визуальное наблюдение показывает нечто, что никак не может быть природным явлением; схема расположения указывает на работу некоего разума.
	VallSrfLandedIcehenge = От этих структур улавливаются мощные повторяющиеся всплески радиоизлучения.
	VallFlyingLowIcehenge = Кажущаяся продуманность расположения этих структур наводит на мысль о неком глубоком смысле или замысле; может, это своего рода послание?
	VallFlyingLowIcehenge = При пролёте над этим образованием фиксируются мощные всплески радиоволновой активности. Не передатчик ли это или ретранслятор?
	TyloSrfLandedCave = Пещера выглядит довольно уютной, будто приглашает зайти, устроиться поудобнее и, может, задержаться ненадолго...
	TyloSrfLandedCave = При приближении к этому образованию весь фоновый радиошум начинает стихать, словно что-то активно его глушит.
	TyloSrfLandedFace = В этом районе фиксируется сильное электромагнитное излучение, но оптический сканер не показывает ничего необычного.
	TyloFlyingLowCave = При визуальном осмотре это выглядит всего лишь обычным скальным образованием.
	TyloFlyingLowCave = При пролёте над пещерой всё радиоизлучение, похоже, падает до нуля — странно, если учесть обычно высокий фоновый радиошум у Jool.
	TyloFlyingLowFace = На поверхности здесь различимы слабые очертания чего-то похожего на лицо. Любопытно, что на кербальские лица оно, похоже, не слишком походит.
	BopSrfLandedDeadKraken = В первое визуальное наблюдение поначалу трудно поверить. Признаки внеземной биологической жизни? Объяснение той незримой затаившейся угрозы, что ощущают все кербонавты? Какая-то изощрённая мистификация? Стоит изучить всё поближе...
	BopSrfLandedDeadKraken = Круглая расщелина (не пасть ли это?) ярко светится в широкой полосе электромагнитного спектра. Остаётся лишь надеяться, что ничто и никогда не разомкнёт эту зловещую полость.
	BobFlyingLowDeadKraken = Наблюдения показывают нечто, что можно описать лишь как своего рода кракена — Космического Кракена, если угодно, — лежащего на поверхности Bop. Мёртвого, остаётся лишь надеяться...
	BopFlyingLowDeadKraken = Зафиксировано значительное УФ- и рентгеновское излучение. Соблюдайте осторожность при любом сближении с этой сущностью.
	}
}
