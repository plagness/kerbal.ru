@EXPERIMENT_DEFINITION:HAS[#id[dmRadiometerScan]]:FINAL { @title = Сканирование облучённости }       // Irradiance Scan
@EXPERIMENT_DEFINITION:HAS[#id[dmseismicHammer]]:FINAL { @title = Сейсмические данные }              // Seismic Data
@EXPERIMENT_DEFINITION:HAS[#id[dmbathymetryscan]]:FINAL { @title = Данные батиметрии }               // Bathymetry Data
