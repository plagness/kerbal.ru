// Русификация ТИТУЛОВ научных экспериментов DMagicOrbitalScience
// Переводится только title эксперимента; блоки RESULTS уже переведены в kerbalru-science-dm-*.cfg
// Источник: GameData/DMagicOrbitalScience/Resources/ScienceDefs.cfg
// Метод: ModuleManager :FINAL — @title подменяется после загрузки мода.

@EXPERIMENT_DEFINITION:HAS[#id[magScan]]:FINAL { @title = Сканирование магнитометром }               // Magnetometer Scan
@EXPERIMENT_DEFINITION:HAS[#id[rpwsScan]]:FINAL { @title = Сканирование радиоплазменных волн }       // Radio Plasma Wave Scan
@EXPERIMENT_DEFINITION:HAS[#id[scopeScan]]:FINAL { @title = Наблюдения орбитального телескопа }      // Orbital Telescope Observations
@EXPERIMENT_DEFINITION:HAS[#id[dmImagingPlatform]]:FINAL { @title = Мультиспектральный анализ }      // Multi Spectral Analysis
@EXPERIMENT_DEFINITION:HAS[#id[dmSIGINT]]:FINAL { @title = Радиоэлектронная разведка }               // SIGINT Scan
@EXPERIMENT_DEFINITION:HAS[#id[dmReconScan]]:FINAL { @title = Разведывательное сканирование }        // Recon Scan
@EXPERIMENT_DEFINITION:HAS[#id[dmNAlbedoScan]]:FINAL { @title = Сканирование водорода поверхности }  // Surface Hydrogen Scan
@EXPERIMENT_DEFINITION:HAS[#id[dmXRayDiffract]]:FINAL { @title = Рентгенодифракционное сканирование } // X-Ray Diffraction Scan
@EXPERIMENT_DEFINITION:HAS[#id[dmlaserblastscan]]:FINAL { @title = Лазерное сканирование поверхности } // Laser Surface Scan
