// DMagicOrbitalScience — русские РЕЗУЛЬТАТЫ экспериментов (ScienceDefs)
// Эксперименты: dmseismicHammer (сейсмо-ударник), dmSIGINT (радиоперехват)
// Источник: GameData/DMagicOrbitalScience/Resources/ScienceDefs.cfg
// Метод: :FINAL-патч, полная замена блока RESULTS. Ключи ситуаций не трогаем.

@EXPERIMENT_DEFINITION:HAS[#id[dmseismicHammer]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = В этом районе проведена сейсморазведка.
	default = Записаны сейсмические волны, проходящие сквозь эту местность.
	KerbinSrfLanded = Сейсмозаписи на поверхности Kerbin выявляют, судя по всему, обширные открытые подземные полости.
	KerbinSrfLandedGrasslands = Мягкие травянистые угодья Kerbin приглушают сейсмические волны, но всё же намекают на обширную сеть подземных пустот.
	KerbinSrfLandedTundra = Мёрзлая тундра Kerbin даёт сейсмозаписи, характерные для ледяного грунта.
	KerbinSrfLandedMountains = Горы Kerbin сложены в основном гранитом и другими твёрдыми породами — материалами, которые проводят сейсмические волны на большие расстояния.
	KerbinSrfLandedDeserts = В песчаных пустынях Kerbin сейсмические волны почти невозможно уловить даже на коротких дистанциях.
	KerbinSrfLandedHighlands = Сейсморазведка этого района приносит новые любопытные признаки крупных подземных пещер.
	KerbinSrfLandedShores = Рыхлый водонасыщенный грунт побережий Kerbin плохо проводит сейсмические волны, но под поверхностью проступают признаки какой-то системы тоннелей.
	MunSrfLanded = Сквозь рыхлый внешний слой реголита Mun сейсмические волны проходят плохо.
	MunSrfLandedCanyons = Сейсмические отражения в этих каньонах указывают на растрескавшиеся слои породы внизу.
	MunSrfLandedEastFarsideCrater = Удары сейсмомолота по дну этого кратера порождают отражённые сейсмоволны, которые кое-что подсказывают о внутреннем составе Mun.
	MunSrfLandedHighlands = В рыхлом пылевидном реголите этого района сейсмомолот порождает лишь недолговечные сейсмические волны.
	MunSrfLandedNorthernBasin = Отражённые от ударов молота сейсмоволны указывают, что жидких недр у Mun нет.
	MunSrfLandedPolarCrater = Удары сейсмомолота заставляют часть водяного льда в этом кратере трескаться.
	MunSrfLandedPoles = Сейсмопоказания указывают на значительные запасы водяного льда под полярным реголитом.
	MinmusSrfLanded = Малый размер Minmus позволяет записывать качественные сигналы от сейсмоволн, отражённых от противоположной стороны.
	MinmusSrfLandedMidlands = Сейсмические отражения из недр Minmus выявляют слабо дифференцированную матрицу из рыхлых силикатов и каких-то полужидких веществ.
	MinmusSrfLandedFlats = Удары сейсмомолота по равнинам Minmus грозят разжижить мягкий грунт.
	MinmusSrfLandedGreatFlats = Сквозь равнины Minmus сейсмические волны проходят так, будто грунт почти жидкий.
	MinmusSrfLandedLesserFlats = Удары сейсмомолота по равнинам Minmus грозят разжижить мягкий грунт.
	MohoSrfLanded = Уловлены слабые записи сейсмических отражений из недр Moho.
	MohoSrfLandedHighlands = Сейсмическая сигнатура нагорий Moho соответствует преимущественно низкоплотному базальту.
	MohoSrfLandedLowlands = Сейсмоволны от ударного молота выявляют признаки активных недр Moho.
	MohoSrfLandedSouthEasternLowlands = Поверхность этого кратера сложена очень рыхлым материалом, который гасит интенсивность сейсмических волн.
	EveSrfLanded = Сейсмические отражения из недр Eve выявляют признаки, возможно, огромных подземных океанов.
	EveSrfLandedPeaks = Признаки крупных подземных пещер намекают на бурное вулканическое прошлое этих гор.
	EveSrfLandedExplodiumSea = Сейсмические волны, идущие сквозь океаны Eve, говорят об очень высокой плотности жидкости.
	GillySrfLanded = Удары сейсмомолота грозят расколоть бедолагу Gilly пополам.
	DunaSrfLanded = Рыхлый поверхностный материал Duna гасит большую часть сейсмоволн от ударного молота.
	DunaSrfLandedPoles = Сейсмоудары по мёрзлым полюсам Duna выявляют сеть трещин во льду из воды и углекислоты.
	DunaSrfLandedLowlands = В сейсмических отражениях Duna обнаруживается мало признаков активности недр.
	IkeSrfLanded = Сейсмические волны, прошедшие сквозь недра Ike, показывают, что эта луна совершенно инертна.
	IkeSrfLandedMidlands = Сейсмические сигнатуры на Ike соответствуют рыхлому базальтовому грунту и намекают на сейсмическую активность в прошлом.
	DresSrfLanded = Если молот бьёт по поверхности планеты, о существовании которой никто не знает, порождает ли он сейсмическую волну?
	LaytheSrfLanded = Крайне рыхлая песчаная поверхность Laythe рассеивает все сейсмоволны ударного молота, затрудняя детальный анализ недр луны.
	LaytheSrfLandedDunes = Сейсмоудары по более плотным участкам грунта Laythe выявляют признаки огромного подповерхностного океана.
	VallSrfLanded = Сканы поверхности Vall выявляют признаки бурной подповерхностной сейсмической активности.
	VallSrfLandedLowlands = Отражённые сейсмоволны из недр Vall указывают на огромный подземный океан, охватывающий всю луну.
	VallSrfLandedHighlands = Сильные сейсмические сигналы из недр Vall — скорее всего, признак криовулканизма.
	TyloSrfLanded = Сильные отражённые сейсмоволны из недр Tylo позволяют детально проанализировать строение луны.
	TyloSrfLandedMara = Плотный грунт Tylo отлично проводит сейсмоволны, порождённые ударным молотом.
	TyloSrfLandedHighlands = Сейсмические отражения в этом районе выявляют признаки обильного подповерхностного водяного льда.
	BopSrfLanded = Крохотная луна Bop плохо проводит сейсмические волны сквозь свои рыхло скреплённые недра.
	BopSrfLandedRidges = Ударный сейсмомолот порождает любопытную двойную отражённую сейсмоволну — будто где-то ещё на крохотной луне работает второй молот…
	BopSrfLandedValley = На поверхности Bop улавливаются слабые признаки глубинной сейсмической активности; весьма любопытно…
	PolSrfLanded = Рыхлая поверхность Pol, похоже, скрывает сложное внутреннее строение — возможно, вылепленное мощными приливными силами Jool.
	PolSrfLandedHighlands = Сейсмическая сигнатура горных областей Pol напоминает ту, что встречается на геологически более активных планетах.
	EelooSrfLanded = Сейсмоволны ударного молота не дают того сигнала, какого ждёшь от покрытой льдом поверхности…
	EelooSrfLandedLowlands = На поверхности Eeloo ударный сейсмомолот поднимает крохотные облачка загадочного белого порошка.
	EelooSrfLandedGlaciers = Сейсмические волны быстро рассеиваются в этом рыхлом грунте на поверхности Eeloo.
	HaleSrfLanded = Удары сейсмомолота оставляют трещины на ледяной поверхности Hale.
	OvokSrfLanded = Сейсмические отражения из недр Ovok говорят о том, что толстый слой водяного льда покрывает большую часть поверхности.
	SlateSrfLanded = Сейсмические отражения из недр Slate выявляют, судя по всему, частично расплавленное ядро.
	SlateSrfLandedSomborMountains = Удары сейсмомолота легко проходят сквозь плотный скалистый грунт этого района.
	SlateSrfLandedSeabed = Рыхлый грунт этого древнего морского дна плохо проводит сейсмические волны.
	SlateSrfLandedArchipelagos = Сейсмосканы этого района указывают на грунт, богатый базальтовыми минералами, но не дают ни следа текущей тектонической активности.
	TektoSrfLandedMudflats = На этой топкой местности ударный сейсмомолот почти не даёт эффекта.
	TektoSrfLanded = Сейсмические отражения от Tekto выявляют геологически очень активные недра — возможно, следствие приливных сил.
	TektoSrfLandedGeologicalAnomaly = Сейсмосканы этой странной местности отчего-то сильно усиливаются — словно под землёй скрыта какая-то эхо-камера.
	PoltaSrfLanded = Сейсмические волны, гуляющие в недрах Polta, говорят о том, что эта луна — почти сплошной мёрзлый ледяной шар.
	PriaxSrfLandedLeadingSide = Ударный сейсмомолот порождает волны, похожие на те, что встречаются на крупных каменных астероидах.
	WalSrfLandedEquatorialRidge = На Wal нет и следа внутренней активности, которая могла бы породить столь внушительный горный хребет.
	WalSrfLanded = Отражённые сейсмоволны выявляют почти инертную каменную луну.
	TalSrfLanded = Ударный молот колотит по поверхности Tal, раскалывая верхний слой льда и позволяя детально изучить недра луны.
	ThatmoSrfLanded = Ударный молот раскалывает лёд на поверхности Thatmo, порождая гулкие сейсмические волны, что расходятся сквозь толщу льда.
	NisseeSrfLanded = Поверхность Nissee, похоже, очень твёрдая, но хрупкая: сейсмические волны проходят легко, но трещины на поверхности их сбивают.
	PlockSrfLanded = Сейсмическая сигнатура Plock соответствует преимущественно ледяной внешней оболочке.
	KarenSrfLanded = Сейсмические волны, идущие сквозь недра Karen, указывают на значительные запасы льда глубоко внутри луны, а также на очень странные признаки крупного твёрдого объекта.
	MercurySrfLanded = Уловлены слабые записи сейсмических отражений из недр Mercury.
	MercurySrfLandedHighlands = Сейсмическая сигнатура нагорий Mercury соответствует преимущественно низкоплотному базальту.
	MercurySrfLandedPlanitia = Сейсмоволны ударного молота выявляют признаки того, что в прошлом недра Mercury были активны.
	VenusSrfLanded = Сейсмические отражения из недр Venus выявляют, судя по всему, частично расплавленное ядро.
	VenusSrfLandedVolcanicRise = Признаки крупных подземных пещер намекают на бурное вулканическое прошлое этих гор.
	MoonSrfLanded = Сквозь рыхлый внешний слой реголита Moon сейсмические волны проходят плохо.
	MoonSrfLandedMidlands = В рыхлом пылевидном реголите этого района сейсмомолот порождает лишь недолговечные сейсмические волны.
	MoonSrfLandedMajorCraters = Удары сейсмомолота по дну этого кратера порождают отражённые сейсмоволны, которые кое-что подсказывают о внутреннем составе Moon.
	MoonSrfLandedFarSideBasin = Отражённые от ударов молота сейсмоволны указывают, что жидких недр у Moon нет.
	MoonSrfLandedNorthPole = Сейсмопоказания указывают на значительные запасы водяного льда под полярным реголитом.
	MoonSrfLandedSouthPole = Сейсмопоказания указывают на значительные запасы водяного льда под полярным реголитом.
	MarsSrfLanded = Рыхлый поверхностный материал Mars гасит большую часть сейсмоволн от ударного молота.
	MarsSrfLandedHighlands = В сейсмических отражениях Mars обнаруживается мало признаков активности недр.
	MarsSrfLandedOlympusMons = Сейсмосканы выявляют признаки крупных подземных пещер, раскинувшихся по всему этому району.
	MarsSrfLandedNorthIceCap = Сейсмоудары по мёрзлым полюсам Mars выявляют сеть трещин во льду из воды и углекислоты.
	MarsSrfLandedSouthIceCap = Сейсмоудары по мёрзлым полюсам Mars выявляют сеть трещин во льду из воды и углекислоты.
	DeimosSrfLanded = Сейсмические волны, прошедшие сквозь недра Deimos, показывают, что эта луна совершенно инертна.
	PhobosSrfLanded = Крохотная луна Phobos плохо проводит сейсмические волны сквозь свои рыхло скреплённые недра.
	IoSrfLanded = Рыхлая поверхность Io, похоже, скрывает сложное внутреннее строение — возможно, вылепленное мощными приливными силами Jupiter.
	IoSrfLandedVolcanicHotspots = Сканы поверхности Io выявляют признаки бурной подповерхностной сейсмической активности.
	EuropaSrfLanded = Отражённые сейсмоволны из недр Europa указывают на огромный подземный океан, охватывающий всю луну.
	EuropaSrfLandedArgadnelRegio = Сильные сейсмические сигналы из недр Europa — скорее всего, признак криовулканизма.
	EuropaSrfLandedChaoticPlains = Удары сейсмомолота оставляют трещины на ледяной поверхности Europa.
	GanymedeSrfLanded = Сильные отражённые сейсмоволны из недр Ganymede позволяют детально проанализировать строение луны.
	GanymedeSrfLandedTectonicDeformation = Сейсмические отражения в этом районе выявляют признаки обильного подповерхностного водяного льда.
	CallistoSrfLanded = Сейсмические отражения из недр Callisto говорят о том, что толстый слой водяного льда покрывает большую часть поверхности.
	CallistoSrfLandedLowlands = Сейсмические отражения в этом районе выявляют признаки обильного подповерхностного водяного льда.
	TitanSrfLandedLowlands = Крайне рыхлая песчаная поверхность Titan рассеивает все сейсмоволны ударного молота, затрудняя детальный анализ недр луны.
	TitanSrfLanded = Сейсмические отражения от Titan выявляют геологически очень активные недра — возможно, следствие приливных сил.
	TitanSrfLandedShores = На этой топкой местности ударный сейсмомолот почти не даёт эффекта.
	PlutoSrfLanded = Сейсмопоказания с Pluto дают детальную картину внутреннего состава крохотной карликовой планеты.
	AsteroidSrfLandedStony = В этом каменном астероиде сейсмические волны быстро рассеиваются.
	AsteroidSrfLandedMetallic = Сейсмические отражения из глубины этого астероида выявляют несколько карманов плотного вещества.
	AsteroidSrfLandedCarbonaceous = Ударные сейсмоволны намекают на множество карманов воды внутри этого астероида.
	AsteroidSrfLandedStony = Поверхность этого астероида сложена сравнительно рыхлым материалом, из-за чего сейсмические волны быстро рассеиваются.
	AsteroidSrfLandedCarbonaceous = Сейсмосканы этого астероида выявляют признаки мягких глиноподобных минералов.
	AsteroidSrfLandedMetallic = Сейсмомолот заставляет этот металлический астероид гудеть, точно гигантский колокол.
	AsteroidSrfLandedIcy-Organic = Внутри этого астероида обнаружены признаки крупных карманов водяного льда.
	AsteroidSrfLandedComet = Крайне рыхлое вещество этой кометы начинает крошиться под ударами сейсмомолота.
	AsteroidSrfLandedStony = У этого астероида, похоже, на редкость однородное внутреннее строение.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[dmSIGINT]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Проведён полный сеанс радиоразведки этой планеты.
	KerbinInSpaceLowNorthernHemisphere = Над Kerbin улавливается заметный уровень радиопереговоров, и удивительно большая их часть, похоже, посвящена связи с космическими аппаратами.
	KerbinInSpaceLowSouthernHemisphere = У южного полюса Kerbin зафиксированы странные прерывистые радиопередачи.
	MunInSpaceLowNorthernHemisphere = С множества точек на поверхности Mun ловится целый ряд коротких повторяющихся радиосигналов.
	MunInSpaceLowSouthernHemisphere = Радиоразведка южного полушария Mun записывает длинное повторяющееся сообщение, исходящее из вполне конкретной точки на поверхности.
	MinmusInSpaceLowNorthernHemisphere = Откуда-то у самой поверхности Minmus раздаётся одиночный радиочирп.
	MinmusInSpaceLowSouthernHemisphere = При сканировании Minmus улавливается лишь слабый фоновый радиошум с Kerbin.
	SunInSpaceLow = Солнце непрерывно излучает радиоволны в широком спектре, изредка выдавая всплески из-за локальных вспышек солнечной активности.
	MohoInSpaceLow = Радиоизлучение Солнца заглушает любые следы передач, идущих от Moho.
	EveInSpaceLow = Постоянный шквал радиоволновой активности в этих краях, похоже, вызван мощным взаимодействием солнечного ветра с плотной атмосферой Eve.
	GillyInSpaceLow = Радиоразведка крохотной луны Gilly встречает лишь равнодушное молчание.
	DunaInSpaceLowNorthernHemisphere = После многократного сканирования Duna проступают слабые узоры радиоизлучения.
	DunaInSpaceLowSouthernHemisphere = Из южной полярной области Duna записана поразительно сложная радиопередача.
	IkeInSpaceLow = Радиоразведка Ike не выявляет ничего интересного — просто большая мёртвая скала.
	DresInSpaceLow = Полное радиомолчание…
	JoolInSpaceLow = На низкой орбите Jool улавливается целая симфония радиоизлучения, рождённая как взаимодействием с солнечным ветром, так и внутренними процессами планеты.
	LaytheInSpaceLow = Атмосфера Laythe порождает довольно любопытное радиоволновое излучение.
	VallInSpaceLowNorthernHemisphere = Радиоразведка северного полушария Vall не выявляет ничего интересного.
	VallInSpaceLowSouthernHemisphere = В южной полярной области Vall зафиксирована поразительно стабильная радиопередача.
	TyloInSpaceLowNorthernHemisphere = Где-то в северном полушарии Tylo улавливается очень слабая, но любопытная радиопередача.
	TyloInSpaceLowSouthernHemisphere = Радиоразведка Tylo не находит ничего особо интересного — просто большая страшная скала.
	BopInSpaceLowNorthernHemisphere = Во время радиоразведки Bop случилось нечто очень странное: сначала засекли чудовищно мощную передачу, потом резко потеряли. Теперь датчики не улавливают вообще ничего.
	BopInSpaceLowSouthernHemisphere = Крохотной безжизненной луне Bop почти нечего предложить.
	PolInSpaceLow = Эта крохотная пёстрая луна не сулит радиоразведке ничего интересного.
	EelooInSpaceLow = Разведка одинокой Eeloo не выявляет ни одного интересного сигнала.
	SarnusInSpaceLow = Электрическая активность в атмосфере Sarnus порождает настоящую какофонию радиоволн.
	HaleInSpaceLow = Радиосканирование Hale не выдаёт ни одной тайны крохотной луны.
	OvokInSpaceLow = При разведке Ovok улавливается устойчивая радиоволновая активность — скорее всего, из-за взаимодействия с магнитным полем Sarnus.
	SlateInSpaceLow = На вид бесплодная луна Slate не порождает никакого интересного радиоизлучения.
	TektoInSpaceLow = Взаимодействие атмосферы Tekto с окружающим магнитным полем порождает отдельные сигналы во время сеансов радиоразведки.
	UrlumInSpaceLow = Радиоразведка ледяного гиганта Urlum выявляет любопытные повторяющиеся узоры, идущие из глубин атмосферы планеты.
	PoltaInSpaceLow = При радиоразведке Polta улавливается слабое радиоволновое излучение.
	PriaxInSpaceLow = На Priax радиосигналов не обнаружено — скорее всего, это захваченный астероид.
	WalInSpaceLow = При разведке Wal улавливаются слабые радиоволновые узоры, на вид совершенно случайные.
	TalInSpaceLow = Крохотная луна-спутник Tal порождает слабое радиоизлучение, которое легко ловит большая тарелка.
	NeidonInSpaceLow = Ледяной гигант Neidon порождает мощное хаотичное радиоволновое излучение.
	ThatmoInSpaceLow = Разреженная атмосфера Thatmo, похоже, взаимодействует с магнитным полем Neidon, порождая странные радиоволновые сигналы.
	NisseeInSpaceLow = Радиомёртвая луна Nissee — скорее всего, крупный захваченный астероид.
	PlockInSpaceLow = При сканировании Plock улавливаются лишь слабые фоновые радиоволны от Солнца.
	KarenInSpaceLow = При разведке Karen обнаружено на удивление интенсивное радиоизлучение — словно под поверхностью зарыта гигантская антенна…
	MercuryInSpaceLow = Радиоизлучение Солнца заглушает любые следы передач, идущих от Mercury.
	VenusInSpaceLow = Постоянный шквал радиоволновой активности в этих краях, похоже, вызван мощным взаимодействием солнечного ветра с плотной атмосферой Venus.
	MoonInSpaceLow = На поверхности Moon улавливаются слабые повторяющиеся радиопинги.
	MarsInSpaceLow = Из разрозненных точек на поверхности Mars улавливаются слабые радиосигналы.
	DeimosInSpaceLow = На Deimos радиосигналов не обнаружено — скорее всего, это захваченный астероид.
	PhobosInSpaceLow = Радиоразведка Phobos не выявляет ничего интересного — просто большая мёртвая скала.
	JupiterInSpaceLow = На низкой орбите Jupiter улавливается целая симфония радиоизлучения, рождённая как взаимодействием с солнечным ветром, так и внутренними процессами планеты.
	IoInSpaceLow = При радиоразведке Io улавливается слабое радиоволновое излучение.
	EuropaInSpaceLowNorthernHemisphere = Радиоразведка северного полушария Europa не выявляет ничего интересного.
	EuropaInSpaceLowSouthernHemisphere = Из южного полушария Europa улавливается любопытная простенькая радиопередача; вероятно, не более чем шум приборов…
	GanymedeInSpaceLow = Эта ледяная мёртвая луна не даёт ни одного измеримого признака радиоволновой активности.
	CallistoInSpaceLow = Разведка избитой кратерами луны Callisto не находит и следа радиоизлучения.
	SaturnInSpaceLow = Электрическая активность в атмосфере Saturn порождает настоящую какофонию радиоволн.
	TitanInSpaceLow = Взаимодействие атмосферы Titan с окружающим магнитным полем порождает отдельные сигналы во время сеансов радиоразведки.
	UranusInSpaceLow = Радиоразведка ледяного гиганта Uranus выявляет любопытные повторяющиеся узоры, идущие из глубин атмосферы планеты.
	PlutoInSpaceLow = При сканировании Pluto улавливаются лишь слабые фоновые радиоволны от Солнца.
	}
}
