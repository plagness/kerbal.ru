// DMagicOrbitalScience — русские РЕЗУЛЬТАТЫ экспериментов (ScienceDefs)
// Эксперимент: rpwsScan (сканирование радио- и плазменных волн, RPWS)
// Источник: GameData/DMagicOrbitalScience/Resources/ScienceDefs.cfg
// Метод: :FINAL-патч, полная замена блока RESULTS. Ключи ситуаций не трогаем.

@EXPERIMENT_DEFINITION:HAS[#id[rpwsScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Сделаны детальные записи локальных взаимодействий с солнечной плазмой.
	default = Отслеживаются локальные искажения в потоке солнечного ветра.
	default = Монопольные антенны принимают ровный поток фоновых радиоволн.
	KerbinInSpaceLow = Характерные картины плазменных волн подтверждают наличие сразу нескольких радиационных поясов Van Kerman.
	KerbinInSpaceHigh = От полюсов Kerbin исходят радиоволны типа «авроральный хор» — верный признак геомагнитных бурь.
	KerbinInSpaceHigh = Плазма солнечного ветра бомбардирует магнитосферу Kerbin, искажая её и порождая выраженную головную ударную волну. Записаны характерные для этого эффекта картины радиоволн.
	KerbinInSpaceHigh = Обнаружен слабый третий радиационный пояс Van Kerman. Скорее всего, его породил приток заряженных частиц, выброшенных Kerbol во время коронального выброса массы (CME).
	MunInSpaceLow = Над разными областями поверхности Mun зафиксировано несколько любопытных радиоволновых излучений.
	MunInSpaceHigh = Слабая магнитосфера Mun на протяжении орбиты принимает череду причудливых форм, искажаемая солнечным ветром и куда более мощной магнитосферой Kerbin.
	MinmusInSpaceLow = Над Minmus зафиксированы слабые радиоволновые излучения; странно, но исходят они, похоже, из точки чуть выше поверхности луны.
	MinmusInSpaceHigh = По ходу орбиты Minmus то ныряет в хвост магнитосферы Kerbin, то выходит из него — и оттого попеременно то защищён от солнечного ветра, то хлёстко им обдуваем.
	SunInSpaceLow = Радиоволновые излучения указали на несколько солнечных пятен на поверхности Kerbol.
	SunInSpaceHigh = По всей системе фиксируются радиоволны от взаимодействия заряженной плазмы солнечного ветра с магнитными полями планет.
	MohoInSpace = Ни атмосферы, ни сколь-нибудь заметного магнитного поля — солнечной плазме попросту не за что зацепиться, и она обтекает Moho стороной.
	EveInSpaceLow = Радиационных поясов вокруг Eve не обнаружено. Скорее всего, мощная магнитосфера планеты не подпускает большинство заряженных частиц достаточно близко, чтобы такие пояса могли образоваться.
	EveInSpaceHigh = При прохождении сквозь заметную головную ударную волну Eve зафиксировано несколько характерных картин радиоволн.
	GillyInSpace = Обширное магнитное поле Eve прикрывает Gilly от большей части солнечного ветра.
	DunaInSpaceLow = Раз за разом записываются радиоволны типа так называемых «свистящих атмосфериков», хотя ни молний, ни иных геомагнитных явлений на Duna нет.
	DunaInSpaceHigh = С обращённой к светилу стороны Duna обнаружена небольшая головная ударная волна — результат взаимодействия солнечного ветра со слабым магнитным полем Duna.
	IkeInSpace = Фиксируются искажения солнечного ветра, обтекающего немалую по площади Ike.
	DresInSpace = Изучать больше негде, что ли?
	JoolInSpaceLow = Часто записываются радиоволны типа «свистящих атмосфериков» — признак бурной геомагнитной активности в атмосфере Jool.
	JoolInSpaceLow = С малых высот над Jool приходят коротковолновые радиоизлучения, намекая на высокоэнергичные электроны, запертые в радиационных поясах.
	JoolInSpaceHigh = При прохождении сквозь головную ударную волну Jool зафиксированы сильные колебания плазменных волн, что позволяет грубо оценить её толщину.
	JoolInSpaceHigh = Заряженные частицы обтекают мощное магнитное поле Jool и разгоняются им, испуская радиоволны; их повторяющиеся картины помогают точнее оценить период вращения Jool.
	LaytheInSpaceLow = Зафиксированы плазменные волны, порождённые взаимодействием ионосферы Laythe с магнитосферой Jool.
	LaytheInSpaceHigh = По мере обращения Laythe внутри магнитного поля Jool накапливается поток заряженных частиц. Их перетекание между двумя телами порождает мощные радиосигналы, которые прибор RPWS ловит через равные промежутки.
	VallInSpace = Из южной области Vall улавливаются слабые радиосигналы; похоже, они повторяются с определённой периодичностью.
	TyloInSpace = На всём протяжении орбиты Tylo заметно искажает магнитное поле Jool, но с солнечным ветром и прочими заряженными частицами он, похоже, почти не взаимодействует.
	BopInSpaceHigh = Из северной полярной области фиксируются мощные всплески радиоволн; тут стоит копнуть глубже...
	BopInSpaceLow = Зонд Ленгмюра улавливает слабые электростатические волны, но их картины не совпадают ни с одной из известных, что порождаются взаимодействием с солнечной плазмой; тут стоит копнуть глубже...
	PolInSpace = Здесь, на отшибе, почти ничего не происходит.
	EelooInSpace = На такой окраине системы солнечный ветер довольно разрежён и, не находя с чем повзаимодействовать, безобидно проходит мимо Eeloo.
	AblateInSpace = Солнечная плазма омывает Ablate непрерывным потоком заряженных частиц, наводя сравнительно сильное магнитное поле.
	AscensionInSpace = В сильно заряженной пыли, сорванной с Ascension во время его тесного сближения со светилом, зафиксированы электростатические волны.
	ErinInSpace = Вокруг Erin обнаружены слабая магнитосфера и ионосфера, а вместе с ними несколько слоёв опасных заряженных частиц.
	InaccessableInSpace = Из-за крайне высокой скорости вращения у Inaccessable возникает слабое, но стремительно пульсирующее магнитное поле, порождающее несколько любопытных взаимодействий с потоком солнечной плазмы.
	JokerInSpace = Ровный поток заряженной солнечной плазмы от соседней звезды Serious наводит вокруг Joker слабое магнитное поле.
	PockInSpace = Вокруг Pock прибор RPWS не улавливает почти ничего интересного.
	RingleInSpace = Система колец Ringle содержит множество сильно заряженных слоёв с различимыми картинами электростатических волн.
	SentarInSpace = Пролетая сквозь мощное магнитное поле Sentar и заряженную пыль его колец, удаётся зафиксировать несколько любопытных картин электростатических волн.
	SeriousInSpace = Зафиксирован внушительный поток солнечной плазмы, срывающийся с внешних слоёв Serious.
	SkeltonInSpace = Skelton окутан плотной ионосферой, которая порождает различимые картины радиоволн даже в сравнительно слабом солнечном ветре.
	ThudInSpace = С орбиты вокруг Thud улавливается несколько мощных всплесков радиоволн — будто вся планета сложена из плотных, электропроводящих элементов.
	SarnusInSpaceHigh = Пролетая сквозь мощное магнитное поле Sarnus и заряженную пыль его колец, удаётся зафиксировать несколько любопытных картин электростатических волн.
	SarnusInSpaceLow = Из полярных областей Sarnus фиксируются радиоволновые излучения, порождённые бушующими там полярными сияниями.
	HaleInSpace = Зафиксированы небольшие искажения магнитосферы Sarnus, обтекающей эту крохотную луну.
	OvokInSpace = Радиоволновые излучения намекают, что задняя по ходу движения сторона Ovok поглощает изрядную долю плазмы, циркулирующей в магнитосфере Sarnus.
	SlateInSpaceHigh = Искажения магнитосферы Sarnus, вызванные Slate, напоминают те, что оставляют атмосферные луны, подпитывающие систему плазмой.
	SlateInSpaceLow = Вокруг экваториальной области Slate обнаружено разрежённое кольцо заряженных частиц.
	TektoInSpace = Заряженные частицы, выделяемые атмосферой Tekto, взаимодействуют с магнитосферой Sarnus, замедляя движение её коротирующей плазмы.
	UrlumInSpace = Радиоантенны улавливают электростатические волны, рождающиеся в магнитосфере Urlum.
	PriaxInSpace = Электрическое поле вокруг Priax почти неотличимо от общего фона окрестностей Urlum.
	PoltaInSpace = Искажения магнитосферы Urlum выдают себя характерными радиосигналами, рождающимися по соседству с Polta.
	WalInSpace = На орбите вокруг Wal зафиксированы необычно высокие концентрации заряженных частиц.
	TalInSpace = Этот крохотный субспутник собрал вокруг себя изрядное число заряженных частиц, которые выдают себя радиоволновыми излучениями, взаимодействуя с окружающим магнитным полем.
	NeidonInSpace = Необычное магнитное поле Neidon, взаимодействуя с солнечным ветром, порождает любопытные и неожиданные радиоволновые излучения.
	ThatmoInSpace = Обратное направление орбиты Thatmo приводит к сильному взаимодействию с обширным магнитным полем Neidon.
	NisseeInSpace = Взаимодействие крошечной Nissee с магнитным полем Neidon вызывает лишь незначительное возмущение.
	PlockInSpace = Plock и его сосед Karen образуют сложную электростатическую обстановку.
	KarenInSpace = Тесные орбиты Karen и Plock за счёт электростатических взаимодействий порождают заметную радиоволновую активность.
	MercuryInSpace = Ни атмосферы, ни сколь-нибудь заметного магнитного поля — солнечной плазме не за что зацепиться, и она обтекает Mercury стороной.
	VenusInSpaceLow = Вокруг экваториальной области Venus обнаружено разрежённое кольцо заряженных частиц.
	VenusInSpaceHigh = При прохождении сквозь слабую головную ударную волну Venus зафиксировано несколько характерных картин радиоволн.
	MoonInSpaceLow = Над разными областями поверхности Moon зафиксировано несколько любопытных радиоволновых излучений.
	MoonInSpaceHigh = Слабая магнитосфера Moon на протяжении орбиты принимает череду причудливых форм, искажаемая солнечным ветром и куда более мощной магнитосферой Earth.
	MarsInSpaceLow = Раз за разом записываются радиоволны типа так называемых «свистящих атмосфериков», хотя ни молний, ни иных геомагнитных явлений на Mars нет.
	MarsInSpaceHigh = С обращённой к светилу стороны Mars обнаружена небольшая головная ударная волна — результат взаимодействия солнечного ветра со слабым магнитным полем Mars.
	DeimosInSpace = Фиксируются искажения солнечного ветра, обтекающего Deimos.
	PhobosInSpace = Здесь, на отшибе, почти ничего не происходит.
	JupiterInSpaceLow = Часто записываются радиоволны типа «свистящих атмосфериков» — признак бурной геомагнитной активности в атмосфере Jupiter.
	JupiterInSpaceLow = С малых высот над Jupiter приходят коротковолновые радиоизлучения, намекая на высокоэнергичные электроны, запертые в радиационных поясах.
	JupiterInSpaceHigh = При прохождении сквозь головную ударную волну Jupiter зафиксированы сильные колебания плазменных волн, что позволяет грубо оценить её толщину.
	JupiterInSpaceHigh = Заряженные частицы обтекают мощное магнитное поле Jupiter и разгоняются им, испуская радиоволны; их повторяющиеся картины помогают точнее оценить период вращения Jupiter.
	IoInSpace = По мере обращения Io внутри магнитного поля Jupiter накапливается поток заряженных частиц. Их перетекание между двумя телами порождает мощные радиосигналы, которые прибор RPWS ловит через равные промежутки.
	EuropaInSpace = Радиоволновые излучения намекают, что задняя по ходу движения сторона Europa поглощает изрядную долю плазмы, циркулирующей в магнитосфере Jupiter.
	GanymedeInSpace = Зафиксированы слабые радиоволновые излучения, похожие на те, что дают полярные сияния.
	CallistoInSpace = На всём протяжении орбиты Callisto слегка искажает магнитное поле Jupiter, но с солнечным ветром и прочими заряженными частицами он, похоже, почти не взаимодействует.
	SaturnInSpaceLow = Из полярных областей Saturn фиксируются радиоволновые излучения, порождённые бушующими там полярными сияниями.
	SaturnInSpaceHigh = Пролетая сквозь мощное магнитное поле Saturn и заряженную пыль его колец, удаётся зафиксировать несколько любопытных картин электростатических волн.
	TitanInSpaceLow = Зафиксированы плазменные волны, порождённые взаимодействием ионосферы Titan с магнитосферой Saturn.
	TitanInSpaceHigh = Заряженные частицы, выделяемые атмосферой Titan, взаимодействуют с магнитосферой Saturn, замедляя движение её коротирующей плазмы.
	UranusInSpace = Радиоантенны улавливают электростатические волны, рождающиеся в магнитосфере Uranus.
	PlutoInSpace = На такой окраине системы солнечный ветер довольно разрежён и, не находя с чем повзаимодействовать, безобидно проходит мимо Pluto.
	}
}
