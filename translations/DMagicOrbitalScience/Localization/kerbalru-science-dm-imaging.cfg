// kerbal.ru — русификатор ScienceDefs (результаты экспериментов)
// Мод: DMagicOrbitalScience
// Эксперимент: dmImagingPlatform (Multi Spectral Analysis / платформа мультиспектральной съёмки)
// Метод: :FINAL-патч RESULTS — полная замена блока переведёнными строками.
// НЕ ТРОГАТЬ ключи ситуаций (default, KerbinInSpaceHigh, ...). Дубли сохранены.

@EXPERIMENT_DEFINITION:HAS[#id[dmImagingPlatform]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Широкоспектральный анализ, проведённый в этой точке.
	default = В инфракрасном спектре этого анализа замечено несколько любопытных особенностей.
	default = Детальный мультиспектральный анализ этого региона выявляет несколько интересных деталей.
	default = От этого небесного тела зафиксировано яркое УФ-излучение.
	default = Проведена первичная съёмка; более близкое сканирование даст детальный взгляд на поверхность.
	KerbinInSpaceHigh = УФ- и ИК-сканирование атмосферы Kerbin раскрывает множество деталей её состава. Она состоит преимущественно из кислорода и азота.
	KerbinInSpaceHigh = Состав верхних слоёв атмосферы Kerbin поглощает большую часть приходящего УФ-излучения, из-за чего уровень УФ-рассеяния крайне низок.
	KerbinInSpaceLow = В инфракрасном излучении поверхности Kerbin видно множество отчётливых геологических образований.
	KerbinInSpaceLow = В верхних слоях атмосферы Kerbin обнаружена подозрительно высокая концентрация опасных продуктов сгорания ракетного топлива — вероятно, признак запредельного числа космических запусков.
	KerbinInSpaceLowWater = Детальные тепловые снимки океанов Kerbin получены средневолновым инфракрасным сенсором прибора.
	KerbinInSpaceLowGrasslands = В атмосфере над этим регионом обнаружены различные следовые газы, указывающие на продолжающуюся биологическую активность.
	KerbinInSpaceLowMountains = Зафиксировано несколько инфракрасных горячих точек, часть из которых несёт признаки вулканической активности.
	KerbinInSpaceLowTundra = Поглощение на нескольких длинах волн видимого и ИК-диапазона указывает на высокий уровень разложения органики — возможно, результат недавно оттаявшей тундры.
	KerbinInSpaceLowIceCaps = Ледяные шапки Kerbin обладают очень высоким альбедо, отражая почти все измеренные длины волн.
	MunInSpaceLow = При ближайшем рассмотрении видимых и тепловых снимков поверхности Mun проступает ряд мелких, но отчётливых объектов.
	MunInSpaceLow = Мунский реголит обладает довольно высоким альбедо, отражая большую часть видимого и ИК-света Солнца.
	MunInSpaceHigh = Первичный широкоспектральный анализ поверхности Mun выявляет относительно однородный рельеф, нарушаемый лишь редкими кратерами.
	MunInSpaceLowMidlands = Записи излучения в ближнем ИК-диапазоне указывают на высокие концентрации силикатов.
	MunInSpaceLowPolarLowlands = УФ-снимки поверхности Mun намекают на присутствие воды в некоторых затенённых кратерах.
	MunInSpaceLowCanyons = В глубоких карманах этих каньонов, судя по УФ-сканированию поверхности, скрывается то, что похоже на замёрзшую воду.
	MunInSpaceLowPolarCrater = Длинноволновые УФ-отражения по краю этого кратера указывают на большие запасы водяного льда.
	MunInSpaceLowNorthernBasin = ИК-спектр этого района соответствует железу и другим металлическим соединениям, что позволяет предположить: здесь могут покоиться остатки древнего удара металлического астероида.
	MunInSpaceLowTwinCraters = Анализ УФ- и ИК-спектров этих двух кратеров показывает, что они порождены двумя совершенно разными типами метеоритов.
	MinmusInSpaceHigh = Minmus демонстрирует на удивление разнообразные УФ- и ИК-спектры.
	MinmusInSpaceLow = УФ- и ИК-спектры поверхности Minmus показывают резкие переходы от равнин к более гористому рельефу.
	MinmusInSpaceLowSlopes = Сканирование этого региона в видимом и ИК-свете выявляет рельеф, непригодный для посадки.
	MinmusInSpaceLowFlats = Равнины Minmus поглощают УФ-излучение крайне слабо.
	MinmusInSpaceLowGreatFlats = Тепловое излучение этих равнин указывает на очень холодную поверхность.
	MinmusInSpaceLowHighlands = Тепловое картирование этого региона не выявляет ничего интересного.
	MinmusInSpaceLowPoles = Измерения УФ-излучения указывают на присутствие незначительных следов водяного льда.
	SunInSpaceLow = Съёмочные сенсоры опасно перегружены при наведении на Солнце с такого близкого расстояния.
	SunInSpaceHigh = Яркое Солнце перегружает детекторы, не давая собрать сколько-нибудь полезных данных и, вероятно, повреждая приборы.
	MohoInSpaceHigh = Тепловые снимки отражают близость Moho к Солнцу: интенсивные ИК-показания на дневной стороне планеты.
	MohoInSpaceLow = Сканирование Moho в ближнем ИК-диапазоне указывает на высокие концентрации силикатов на поверхности.
	MohoInSpaceLowPolarCrater = УФ-отражения указывают на присутствие небольших количеств водяного льда в глубинных областях этого кратера.
	MohoInSpaceLowSouthEastCrater = Тепловое и визуальное сканирование выявляет чёткие очертания этого кратера.
	MohoInSpaceLowMidlands = УФ-сканирование указывает на присутствие очень разреженной атмосферы, льнущей к поверхности Moho.
	MohoInSpaceNorthernSinkhole = УФ-отражения указывают на присутствие небольших количеств водяного льда в глубинных областях этого кратера.
	MohoInSpaceSouthEasternLowlands = Тепловое и визуальное сканирование выявляет чёткие очертания этого кратера.
	EveInSpaceHigh = Eve демонстрирует сложные УФ- и ИК-спектры, намекая на любопытную смесь атмосферных соединений.
	EveInSpaceLow = УФ- и ИК-спектры, снятые при сканировании солнечного затмения, выявляют в атмосфере Eve высокие концентрации углекислого газа, метана, сероводорода и водяного пара.
	EveInSpaceLow = ИК-съёмка атмосферы Eve указывает на неуправляемый парниковый эффект: высокие концентрации углекислого газа и метана резко снижают уровень исходящего ИК-излучения.
	EveInSpaceLowPoles = В атмосфере над полярными областями Eve зафиксировано яркое УФ- и ИК-излучение, исходящее от полярных сияний.
	EveInSpaceLowCraterLake = Тепловое сканирование поверхности океана выявляет на удивление высокие температуры, намекая, что внизу происходит какая-то геологическая активность.
	EveInSpaceLowEasternSea = ИК-сканирование этого океана выявляет присутствие различных тяжёлых металлов и нескольких токсичных соединений лития.
	EveInSpaceLowIslands = Тепловое излучение этих островов указывает, что они — результат интенсивной геологической активности.
	EveInSpaceLowExplodiumSea = ИК-сканирование этого океана выявляет присутствие различных тяжёлых металлов и нескольких токсичных соединений лития.
	EveInSpaceLowPeaks = Тепловое излучение этих пиков указывает, что они — результат интенсивной геологической активности.
	GillyInSpaceHigh = Тепловое сканирование Gilly не выявляет ничего, кроме холодного, мёртвого камня.
	GillyInSpaceLow = На поверхности Gilly не обнаружено почти ничего, кроме силикатов и прочих каменистых материалов.
	GillyInSpaceLowLowlands = ИК-спектр низменных областей Gilly выявляет на поверхности то, что может быть разрозненными залежами железа.
	DunaInSpaceHigh = Снимки Duna в видимом и ИК-диапазоне показывают планету, покрытую оксидами железа, придающими ей ржаво-красный оттенок.
	DunaInSpaceLow = Во время солнечного затмения получены детальные вертикальные профили концентраций атмосферы Duna.
	DunaInSpaceLowNorthPole = УФ-сканирование северного полюса Duna показывает, что ледяная шапка состоит в основном из углекислого газа со следовыми количествами водяного льда.
	DunaInSpaceLowMountains = В горах Duna концентрация оксида железа ниже, а магматических пород больше, чем в низинах, что намекает на историю вулканической активности.
	DunaInSpaceLowSouthPole = УФ-сканирование южной полярной области Duna выявляет значительные запасы водяного льда.
	DunaInSpaceLowVallesJebbedius = ИК-сканирование атмосферы над этим районом фиксирует относительно высокие уровни метана — потенциальный признак продолжающейся геологической активности.
	DunaInSpaceLowPoles = УФ-сканирование полюсов Duna показывает, что ледяная шапка состоит в основном из углекислого газа со следовыми количествами водяного льда.
	DunaInSpaceLowHighlands = На возвышенностях Duna концентрация оксида железа ниже, а магматических пород больше, чем в низинах, что намекает на историю вулканической активности.
	DunaInSpaceLowMidlands = ИК-сканирование атмосферы над этим районом фиксирует относительно высокие уровни метана — потенциальный признак продолжающейся геологической активности.
	DunaInSpaceLowLowlands = УФ-отражения от поверхности Duna указывают на высокие концентрации оксида железа наряду с различными силикатами и следами водяного льда у полюсов.
	IkeInSpaceHigh = УФ-сканирование Ike не выявляет заметных признаков атмосферы.
	IkeInSpaceLow = Тепловые и визуальные снимки поверхности Ike показывают резкий контраст между более тёплыми тёмными участками и более прохладными светлыми областями.
	IkeInSpaceLowPolarDepression = В глубинных впадинах этой полярной области обнаружены слабые признаки того, что может быть водяным льдом.
	IkeInSpaceLowPolarLowlands = В глубинных впадинах этой полярной области обнаружены слабые признаки того, что может быть водяным льдом.
	DresInSpaceHigh = УФ-сенсор, похоже, сломан: он упорно сигналит о наличии какой-то планеты, хотя в этом участке космоса очевидно нет ничего интересного.
	DresInSpaceLow = Тут есть немного УФ-штук, немного ИК-штук и чуть-чуть визуальных штук.
	DresInSpaceLowDresTrench = Тепловые снимки показывают то, что похоже на аномально горячую полосу на поверхности, — вероятно, ещё один сломанный сенсор…
	DresInSpaceLowCanyons = Тепловые снимки показывают то, что похоже на аномально горячую полосу на поверхности, — вероятно, ещё один сломанный сенсор…
	JoolInSpaceHigh = Яркое УФ- и ИК-излучение у полюсов Jool указывает на присутствие обширных полярных сияний.
	JoolInSpaceLow = В атмосфере Jool обнаружены высокие концентрации соединений хлора, придающие ей насыщенный зелёный цвет.
	JoolInSpaceLow = При ближайшем рассмотрении джулианских сияний в полярном излучении проступают любопытные ИК-структуры спиральной формы.
	JoolInSpaceLowPolarBands = УФ-сенсоры раскрывают протяжённость аврорального овала, смещающегося и искажающегося в магнитном поле Jool.
	JoolInSpaceLowEquatorialBand = Чередующиеся ветровые потоки в атмосфере Jool создают отчётливые области, где хлор и аммиачные соединения смешиваются, образуя ярко окрашенные полосы.
	JoolInSpaceLowTemperateZone = Бурлящие конвекционные потоки выносят аммиачные облака из нижних слоёв атмосферы Jool, придавая этим полосам чуть более белый оттенок.
	LaytheInSpaceHigh = УФ-сканирование атмосферы Laythe указывает на присутствие нескольких аммиачных соединений наряду с высоким содержанием азота.
	LaytheInSpaceLow = Тепловые снимки океанов Laythe показывают весьма холодные жидкости, состоящие, вероятно, из аммиака и короткоцепочечных углеводородов, а не из воды.
	LaytheInSpaceLow = ИК-спектры, снятые во время солнечного затмения, выявляют следовые количества нескольких органических соединений в нижних слоях атмосферы Laythe.
	LaytheInSpaceLowIslands = Тепловое излучение некоторых островов Laythe указывает на геологическую активность под поверхностью.
	LaytheInSpaceLowOceans = УФ- и ИК-сканирование океанов Laythe выявляет следы нескольких органических соединений.
	LaytheInSpaceLowRingArchipelago = УФ-сканирование поверхности Laythe показывает изолированные участки водяного льда; лёд, вероятно, остаётся замёрзшим в холодной плотной атмосфере.
	LaytheInSpaceLowTheSagenSea = УФ- и ИК-сканирование океанов Laythe выявляет следы нескольких органических соединений.
	LaytheInSpaceLowDunes = Тепловое излучение некоторых островов Laythe указывает на геологическую активность под поверхностью.
	LaytheInSpaceLowCrescentBay = УФ-сканирование поверхности Laythe показывает изолированные участки водяного льда; лёд, вероятно, остаётся замёрзшим в холодной плотной атмосфере.
	VallInSpaceHigh = У поверхности Vall обнаружена разреженная атмосфера; ИК-сканирование указывает, что это в основном водяной пар.
	VallInSpaceLow = УФ-наблюдения во время звёздного затмения выявляют несколько шлейфов жидкости, вырывающихся с поверхности Vall.
	VallInSpaceLowSinks = Тепловая съёмка равнин Vall выявляет то, что похоже на обширный подповерхностный океан.
	VallInSpaceLowLowlands = Тепловая съёмка равнин Vall выявляет то, что похоже на обширный подповерхностный океан.
	TyloInSpaceHigh = Несмотря на высокую гравитацию Tylo, УФ- и ИК-сенсоры не улавливают признаков атмосферы.
	TyloInSpaceLow = Визуальное и тепловое сканирование Tylo выявляет резкие различия между тёмными кратерами и более светлыми возвышенностями.
	TyloInSpaceLowSouthernMesa = УФ-отражения от светлых возвышенностей Tylo выявляют присутствие некоторых соединений титана.
	TyloInSpaceLowHighlands = УФ-отражения от светлых возвышенностей Tylo выявляют присутствие некоторых соединений титана.
	BopInSpaceHigh = С расстояния сканирование этой крохотной луны не выявляет ничего особо примечательного.
	BopInSpaceLow = УФ-снимки поверхности Bop указывают лишь на присутствие различных силикатов; ничего, кроме нескольких артефактов съёмки, не видно…
	BopInSpaceLow = Из северной полярной области Bop исходит любопытно сильное ИК- и УФ-излучение; требуется дальнейшее изучение…
	BopInSpaceLowMidlands = По периферии снимков этих областей фиксируются частые, но, похоже, случайные всплески УФ-излучения; скорее всего, это не более чем блуждающая космическая радиация.
	BopInSpaceLowWesternDepression = Некоторые любопытные отражения указывают на присутствие на поверхности разнообразных органических соединений.
	BopInSpaceLowValley = По периферии снимков этих областей фиксируются частые, но, похоже, случайные всплески УФ-излучения; скорее всего, это не более чем блуждающая космическая радиация.
	BopInSpaceLowPeaks = Некоторые любопытные отражения указывают на присутствие на поверхности разнообразных органических соединений.
	PolInSpaceHigh = На УФ- и ИК-снимках Pol не видно заметной атмосферы.
	PolInSpaceLow = УФ-отражения от поверхности Pol выявляют плотные скопления соединений серы и фосфора; именно они отвечают за её характерную окраску.
	PolInSpaceLowPolHeights = Тепловая съёмка горных областей Pol допускает возможность продолжающейся геологической активности.
	PolInSpaceLowDepressions = Разноцветная поверхность Pol демонстрирует крайне сложный набор УФ- и ИК-спектров; чтобы определить точный состав этой крохотной луны, нужны дальнейшие исследования.
	PolInSpaceLowLowlands = Разноцветная поверхность Pol демонстрирует крайне сложный набор УФ- и ИК-спектров; чтобы определить точный состав этой крохотной луны, нужны дальнейшие исследования.
	PolInSpaceLowHighlands = Тепловая съёмка горных областей Pol допускает возможность продолжающейся геологической активности.
	EelooInSpaceHigh = Тепловое излучение Eeloo минимально на столь большом удалении от Солнца.
	EelooInSpaceLow = Белый материал, покрывающий поверхность Eeloo, не похож ни на водяной, ни на метановый лёд; он несёт признаки более сложной органической химической природы.
	EelooInSpaceLowScarring = Эти более тёмные полосы на поверхности Eeloo дают ИК-сигнатуры, характерные для обычных силикатов.
	EelooInSpaceLowIceCanyons = Эти более тёмные полосы на поверхности Eeloo дают ИК-сигнатуры, характерные для обычных силикатов.
	AblateInSpace = Сканирование поверхности Ablate показывает, что от этого крохотного планетоида не осталось почти ничего, кроме твёрдого металлического ядра.
	AscensionInSpace = УФ-снимки, сделанные во время звёздного затмения, указывают на обильное выделение воды с ночной стороны Ascension.
	ErinInSpaceHigh = УФ-сканирование Erin выявляет плотную атмосферу из метана, азота и аммиака.
	ErinInSpaceLow = На снимках поверхности Erin обнаружены признаки океанов жидкого метана.
	InaccessableInSpace = Получить чёткий снимок этого быстро вращающегося планетоида крайне трудно; с уверенностью удаётся установить немногим больше, чем факт отсутствия атмосферы.
	JokerInSpace = Снимки поверхности Joker являют сбивающий с толку набор разных соединений, создающих характерную окраску.
	PockInSpace = УФ- и ИК-спектры Pock схожи со спектрами металлических астероидов, что позволяет предположить: эту крохотную луну захватила высокая гравитация Sentar, и впоследствии она вышла на орбиту вокруг Erin.
	RingleInSpace = Снимки кольцевой системы Ringle, сделанные во время звёздных затмений, намекают, что она состоит из остатков разрушенной луны с высокими концентрациями тяжёлых элементов, обычно встречающихся в ядрах планет.
	SentarInSpace = Плотные полосы водяных и метановых облаков составляют большую часть верхних слоёв Sentar, придавая ему насыщенный синий цвет.
	SentarInSpaceLow = Конвекционные потоки — вероятный источник белых аммиачных облаков, образующих отчётливые полосы на Sentar.
	SeriousInSpace = Serious оказывается очень маленькой звездой главной последовательности со звёздными характеристиками, схожими с Kerbol.
	SkeltonInSpace = УФ-сканирование Skelton выявляет плотную атмосферу, состоящую преимущественно из углекислого газа и азота.
	ThudInSpace = УФ-отражения от поверхности Thud указывают на очень высокие концентрации различных тяжёлых металлов и других плотных элементов.
	SarnusInSpaceLow = Полосы водяных и аммиачных облаков составляют большую часть верхних слоёв Sarnus, придавая ему невыразительную окраску.
	SarnusInSpaceHigh = Снимки характерной кольцевой системы Sarnus выявляют полосы различного состава.
	HaleInSpaceHigh = Снимки Hale выявляют состав, схожий с составом окружающих колец.
	HaleInSpaceLowDarkRock = Более тёмная поверхность здесь, судя по всему, содержит меньше льда, чем более светлые участки.
	HaleInSpaceLowLightRock = Сильные полосы ИК-поглощения указали, что поверхность здесь состоит преимущественно из водяного льда.
	OvokInSpaceHigh = Первые спектрограммы Ovok показывают ИК-сигнатуру, характерную для чистого водяного льда.
	OvokInSpaceLowDarkSurface = Ведущая сторона Ovok даёт те же УФ- и ИК-спектры, что и остальная луна, — значит, состав одинаков по всей поверхности. Потемнение этой области должно иметь какое-то иное объяснение.
	OvokInSpaceLowPlains = Гладкие равнины, покрывающие большую часть поверхности Ovok, состоят, по-видимому, преимущественно из водяного льда лишь со следовыми признаками других соединений.
	OvokInSpaceLowScarring = Эти искажённые области на Ovok обладают теми же УФ- и ИК-свойствами, что и остальная луна.
	SlateInSpaceHigh = Первые снимки теплового излучения выявляют слабый внутренний разогрев Slate — любопытное наблюдение с учётом признаков недавней геологической активности на поверхности.
	SlateInSpaceLowSlateanSupercontinent = ИК-спектры этой относительно возвышенной области Slate обнаруживают признаки различных магматических минералов.
	SlateInSpaceLowYahelMountains = Тепловые снимки этих гор показывают холодную поверхность, что говорит о слабой недавней геологической активности.
	SlateInSpaceLowSomborMountains = Спектроскопия этих горных районов выявляет признаки нескольких метаморфических пород, включая, что вполне уместно, сланец.
	SlateInSpaceLowImpactCraters = ИК-снимки этих неглубоких кратеров точно очерчивают их границы.
	SlateInSpaceLowSeabed = Ровный рельеф, покрывающий большую часть поверхности Slate, состоит, по-видимому, преимущественно из мелкозернистых силикатов, скорее всего кварца.
	SlateInSpaceLowNorthernIslands = Несколько участков этих обособленных гор дают слабое тепловое излучение — возможно, признак относительно недавней вулканической активности.
	SlateInSpaceLowArchipelagos = ИК-спектры, снятые с этих небольших выступов, выявляют признаки базальтовой магмы.
	SlateInSpaceLowMountNehelennia = Эта огромная кальдера несёт признаки совсем недавней активности, но тепловое излучение говорит, что теперь она мертва.
	SlateInSpaceLowFloodplains = Эти плоские возвышенные области, по-видимому, покрыты слоем осадочных пород.
	SlateInSpaceLowPoles = Полярные области Slate сложены тем же мелкозернистым песчаным материалом, что и большая часть её поверхности.
	TektoInSpaceHigh = Плотный облачный покров Tekto непрозрачен для большей части видимого света, но УФ- и ИК-снимки раскрывают множество деталей поверхности.
	TektoInSpaceLow = УФ-спектроскопия атмосферы Tekto выявляет признаки ряда сложных органических соединений, образовавшихся, скорее всего, при взаимодействии метана атмосферы Tekto с солнечным ветром.
	TektoInSpaceLowLakes = Отражения в ближнем ИК-диапазоне от поверхности подтверждают присутствие устойчивых жидких океанов на Tekto.
	TektoInSpaceLowMudflats = ИК-снимки этих низменных участков выявляют то, что похоже на поймы, с плавно сглаженными формами, указывающими на то, что недавно они были покрыты жидкостью.
	TektoInSpaceLowCalderas = Тепловое излучение этих кратерных областей указывает на геологическую активность; возможно, они вулканического происхождения.
	TektoInSpaceLowPlateaus = Эти относительно высокие плато в ИК-сканировании почти лишены деталей, проявляя характеристики обычных силикатов и других базальтовых минералов.
	TektoInSpaceLowGeologicalAnomaly = Зафиксированы всплески ИК-излучения, исходящие от небольшого острова в этом районе.
	TektoInSpaceLowPolarRifts = ИК-спектроскопия полярных областей Tekto показывает, что поверхность сложена преимущественно базальтовыми минералами.
	UrlumInSpaceHigh = УФ-снимки атмосферы Urlum выявляют облака, состоящие в основном из водяного и аммиачного льда.
	UrlumInSpaceLow = Снимки, сделанные во время солнечных затмений, выявляют высокие концентрации воды, метана и аммиака в атмосфере Urlum.
	PoltaInSpaceHigh = Тепловое сканирование Polta показывает признаки возможного подповерхностного океана.
	PoltaInSpaceLow = УФ-спектры низменных областей Polta выявляют преимущественно водяной лёд.
	PoltaInSpaceLowHighlands = Ярко-зелёная поверхность в этом районе даёт сложный ИК-спектр, намекая на любопытный химический состав.
	PoltaInSpaceLowHighlandDepressions = Эти кратеры и впадины, по-видимому, покрыты сравнительно толстым слоем водяного льда.
	PriaxInSpaceHigh = Priax демонстрирует спектральные характеристики крупного каменистого астероида — возможно, того, что был захвачен Urlum и оказался на любопытной общей орбите с Polta.
	PriaxInSpaceLowLeadingSide = Относительно светлое ведущее полушарие Priax сложено преимущественно ярким каменистым материалом.
	PriaxInSpaceLowLeadingCraters = Эти кратеры выглядят относительно молодыми, со слабыми признаками выветривания под действием солнечного ветра.
	PriaxInSpaceLowTrailingSide = Более тёмное ведомое полушарие Priax содержит на поверхности умеренно высокий уровень углекислого газа.
	PriaxInSpaceLowTrailingCraters = Кратеры на ведомой стороне Priax выглядят намного старше, чем на ведущей.
	WalInSpaceHigh = Первые сканирования Wal выявляют сложный химический состав поверхности.
	WalInSpaceLowEquatorialRidge = Экваториальный хребет Wal по составу заметно отличается от остальной поверхности: концентрации каменистых силикатов и железосодержащих соединений здесь намного выше.
	WalInSpaceLowEquatorialCraters = УФ-сканирование кратеров Wal не выявляет признаков воды.
	WalInSpaceLow = На поверхности Wal обнаружены значительные концентрации серы, придающие ей желтоватый цвет.
	TalInSpaceHigh = Снимки поверхности Tal указывают на высокое содержание водяного льда и металлических элементов.
	TalInSpaceLow = Тепловое сканирование Tal не выявляет заметной геологической активности под поверхностью.
	NeidonInSpaceHigh = УФ-спектры верхних слоёв атмосферы Neidon выявляют присутствие нескольких простых углеводородов наряду со следами угарного и углекислого газа.
	NeidonInSpaceLow = Тепловое излучение выявляет неожиданно высокую температуру в самых верхних слоях атмосферы Neidon.
	ThatmoInSpaceLow = Поверхность Thatmo содержит относительно высокий уровень водяного льда, перемешанного с различными мафическими силикатами и замёрзшим углекислым газом.
	ThatmoInSpaceHigh = Вокруг Thatmo обнаружена очень разреженная атмосфера, богатая углекислым газом.
	NisseeInSpaceLow = УФ-сканирование меловидно-белой поверхности Nissee не выявляет признаков воды.
	NisseeInSpaceHigh = Сканирование Nissee с высокой орбиты не обнаруживает заметных признаков атмосферы.
	PlockInSpaceLow = Поверхность Plock, похоже, содержит значительные запасы водяного льда, хотя распределён он, судя по всему, неравномерно.
	PlockInSpaceHigh = У поверхности Plock наблюдается почти неуловимая атмосфера, богатая азотом.
	KarenInSpaceLow = УФ- и ИК-сканирование более тёмных пятен на поверхности Karen выявляет признаки азота, углекислого газа и метана — все они в процессе превращения в тёмные толины.
	KarenInSpaceHigh = Вокруг Karen не видно заметной атмосферы.
	MercuryInSpaceLow = Сканирование Mercury в ближнем ИК-диапазоне указывает на высокие концентрации силикатов на поверхности.
	MercuryInSpaceLowLowlands = УФ-спектры поверхности Mercury выявляют очень низкие концентрации железистых минералов; это может быть признаком интенсивного космического выветривания из-за близости к Солнцу.
	MercuryInSpaceLowMidlands = УФ-сканирование указывает на присутствие очень разреженной атмосферы, льнущей к поверхности Mercury.
	MercuryInSpaceLowPolarCraters = УФ-отражения указывают на присутствие небольших количеств водяного льда в глубинных областях этих кратеров.
	MercuryInSpaceLowOldCraters = Снимки дна этих крупных бассейнов показывают высокое содержание магматических минералов, характерное для лавовых потоков, — возможно, вызванных очень крупным ударным событием.
	MercuryInSpaceLowYoungCraters = Тепловое и визуальное сканирование выявляет чёткие очертания этих кратеров.
	MercuryInSpaceHigh = Тепловые снимки отражают близость Mercury к Солнцу: интенсивные ИК-показания на дневной стороне планеты.
	VenusInSpaceLow = УФ- и ИК-спектры, снятые при сканировании солнечного затмения, выявляют в атмосфере Venus высокие концентрации углекислого газа, метана, сероводорода и водяного пара.
	VenusInSpaceLowMidlands = ИК-съёмка атмосферы Venus указывает на неуправляемый парниковый эффект: высокие концентрации углекислого газа и метана резко снижают уровень исходящего ИК-излучения.
	VenusInSpaceLowHighlands = Venus демонстрирует сложные УФ- и ИК-спектры, намекая на любопытную смесь атмосферных соединений.
	VenusInSpaceLowMountains = Тепловое излучение этих пиков указывает, что они — результат интенсивной геологической активности.
	VenusInSpaceLowCanyons = УФ- и ИК-сканирование поверхности выявляет чёткие очертания длинных глубоких русел, возможно, прорезанных мощными лавовыми потоками.
	VenusInSpaceLowLakshmiPlanum = Этот регион покрыт толстым слоем гладкой магматической породы — вероятно, это огромное лавовое поле.
	VenusInSpaceHigh = В атмосфере над полярными областями Venus зафиксировано яркое УФ- и ИК-излучение, исходящее от полярных сияний.
	MoonInSpaceLow = Лунный реголит обладает довольно высоким альбедо, отражая большую часть видимого и ИК-света Солнца.
	MoonInSpaceLowMidlands = Записи излучения в ближнем ИК-диапазоне указывают на высокие концентрации силикатов.
	MoonInSpaceLowLunarSeas = Снимки этой тёмной гладкой области Moon показывают, что она сложена преимущественно железосодержащей базальтовой породой — вероятно, результат каких-то древних лавовых потоков.
	MoonInSpaceLowMajorCraters = Многие из крупнейших кратеров на Moon выглядят весьма древними.
	MoonInSpaceLowFarSideBasin = Эта тёмная низменная область на обратной стороне Moon покрыта базальтовой породой.
	MoonInSpaceLowNorthPole = УФ-снимки поверхности Moon намекают на присутствие воды в некоторых её затенённых кратерах.
	MoonInSpaceLowSouthPole = УФ-снимки поверхности Moon намекают на присутствие воды в некоторых её затенённых кратерах.
	MoonInSpaceHigh = Первичный широкоспектральный анализ поверхности Moon выявляет относительно однородный рельеф, нарушаемый редкими кратерами и несколькими крупномасштабными впадинами.
	MarsInSpaceLow = Во время солнечного затмения получены детальные вертикальные профили концентраций атмосферы Mars.
	MarsInSpaceLowLowlands = УФ-отражения от поверхности указывают на высокие концентрации оксида железа наряду с различными силикатами и следами водяного льда у полюсов.
	MarsInSpaceLowHighlands = На возвышенностях Mars концентрация оксида железа ниже, а магматических пород больше, чем в низинах, что намекает на историю вулканической активности.
	MarsInSpaceLowOlympusMons = Склоны этого вулкана образованы множеством слоёв лавовых потоков, отложившихся за долгие периоды, пока он ещё был активен.
	MarsInSpaceLowVallesMarineris = ИК-сканирование атмосферы над этим районом фиксирует относительно высокие уровни метана — потенциальный признак продолжающейся геологической активности.
	MarsInSpaceLowAreanMountains = ИК-сканирование этих гор не выявляет тепловой активности, что говорит: это давно потухшие вулканы.
	MarsInSpaceLowNorthIceCap = УФ-сканирование Северного полюса Mars показывает, что ледяная шапка состоит в основном из углекислого газа со следовыми количествами водяного льда.
	MarsInSpaceLowSouthIceCap = УФ-сканирование южной полярной области Mars выявляет значительные запасы водяного льда.
	MarsInSpaceHigh = Снимки Mars в видимом и ИК-диапазоне показывают планету, покрытую оксидами железа, придающими ей ржаво-красный оттенок.
	DeimosInSpaceLow = На поверхности Deimos не обнаружено почти ничего, кроме силикатов и прочих каменистых материалов.
	DeimosInSpaceLowCraters = ИК-спектр кратеров Deimos выявляет на поверхности то, что может быть разрозненными залежами железа.
	DeimosInSpaceHigh = Тепловое сканирование Deimos не выявляет ничего, кроме холодного, мёртвого камня.
	PhobosInSpaceLow = ИК- и УФ-сканирование Phobos выявляет признаки нескольких безводных и богатых органикой силикатов, указывая на крайне малое количество приповерхностной воды.
	PhobosInSpaceLowMinorCraters = ИК-снимки чётко очерчивают контуры бесчисленных мелких кратеров, покрывающих поверхность Phobos.
	PhobosInSpaceLowStickneyCrater = Материалы, отложившиеся в этом огромном ударном бассейне, соответствуют тяжёлому плотному телу — тому, что едва не разрушило Phobos.
	PhobosInSpaceLowGrooves = Борозды на Phobos дают УФ-сигнатуры, характерные для высокого содержания железа, — возможно, это материал, выброшенный с поверхности Mars.
	PhobosInSpaceHigh = Phobos — очень тёмная крохотная луна со слегка красноватым ИК-спектром, похожим на астероид D-типа.
	JupiterInSpaceLowGreatRedSpot = Эта гигантская бурлящая штормовая система в ИК-сканировании выглядит холоднее окружающих областей, что намекает: возможно, это очень высотные облака.
	JupiterInSpaceLowEquatorialBands = Спокойные экваториальные полосы Jupiter состоят преимущественно из высотных облаков водяного льда.
	JupiterInSpaceLowSouthTemperateBands = Чередующиеся ветровые потоки в атмосфере Jupiter создают отчётливые области, где сложные неорганические соединения и аммиачный лёд смешиваются, образуя ярко окрашенные полосы.
	JupiterInSpaceLowSouthPolarBands = При ближайшем рассмотрении юпитерианских сияний в полярном излучении проступают любопытные ИК-структуры спиральной формы.
	JupiterInSpaceLowNorthTemperateBands = Бурлящие конвекционные потоки выносят аммиачные облака из нижних слоёв атмосферы Jupiter, придавая этим полосам чуть более белый оттенок.
	JupiterInSpaceLowNorthPolarBands = УФ-сенсоры раскрывают протяжённость аврорального овала, смещающегося и искажающегося в магнитном поле Jupiter.
	JupiterInSpaceHigh = Яркое УФ- и ИК-излучение у полюсов Jupiter указывает на присутствие обширных полярных сияний.
	IoInSpaceLowLowlands = У поверхности Io обнаружена крайне разреженная атмосфера, богатая серой.
	IoInSpaceLowMidlands = На снимках Io зафиксировано слабое авроральное свечение, возникающее, вероятно, при взаимодействии атмосферы с магнитосферой Jupiter.
	IoInSpaceLowHighlands = Тепловая съёмка горных областей Io допускает возможность продолжающейся геологической активности.
	IoInSpaceLowPyroclasticWastes = Сканирование областей вокруг вулканических горячих точек Io показывает обширные поля свежей силикатной лавы.
	IoInSpaceLowVolcanicSnows = Светлые участки поверхности Io состоят преимущественно из инея диоксида серы; низкая температура кипения этого вещества намекает, что вулканической активности в этих областях сравнительно немного.
	IoInSpaceLowVolcanicFlows = ИК-сканирование тёмных лавовых потоков Io показывает высокие концентрации богатых магнием силикатных минералов при относительно малом количестве сульфатных соединений.
	IoInSpaceLowVolcanicHotspots = Вокруг отдельных участков поверхности Io зафиксировано очень яркое тепловое излучение, указывающее на некую тектоническую горячую точку или, возможно, активные лавовые потоки.
	IoInSpaceHigh = Разнообразный рельеф Io и его сильное тепловое излучение дают завораживающие мультиспектральные снимки.
	EuropaInSpaceLowRidgedPlains = Полосы УФ-поглощения ясно указывают на водяной лёд, покрывающий большую часть поверхности Europa.
	EuropaInSpaceLowArgadnelRegio = На снимках льда в этом районе видны резкие разделительные линии.
	EuropaInSpaceLowChaoticPlains = Тепловое излучение намекает, что лёд в этом районе может быть сравнительно тонким, а тёплый океан — совсем близко под поверхностью.
	EuropaInSpaceLowCrosscutPlains = Тепловая съёмка Europa выявляет то, что похоже на обширный подповерхностный океан.
	EuropaInSpaceLowLineaments = Вдоль этих относительно тёмных линий обнаружены признаки нескольких гидратированных солевых соединений.
	EuropaInSpaceLowCraters = В ИК-сканировании этого района отчётливо видны признаки ударного кратера и полосы выбросов.
	EuropaInSpaceHigh = У поверхности Europa обнаружена разреженная атмосфера; ИК-сканирование указывает, что это в основном водяной пар.
	GanymedeInSpaceLow = Визуальное и тепловое сканирование Ganymede выявляет резкие различия между тёмными кратерированными участками и более светлыми бороздчатыми областями.
	GanymedeInSpaceLowCryovolcanicIce = УФ- и ИК-сканирование этих бороздчатых областей выявляет высокие концентрации водяного льда.
	GanymedeInSpaceLowCraters = Некоторые из этих кратеров выглядят относительно молодыми и окружены яркими узорами выбросов.
	GanymedeInSpaceLowGilgameshBasin = Материал в этом крупном кратере несёт признаки каменистого, богатого силикатами астероида.
	GanymedeInSpaceHigh = Несмотря на высокую гравитацию Ganymede, УФ- и ИК-сенсоры улавливают лишь очень разреженную кислородную атмосферу.
	CallistoInSpaceLow = Поверхность Callisto содержит относительно высокий уровень водяного льда, перемешанного с различными мафическими силикатами и замёрзшим углекислым газом.
	CallistoInSpaceLow = Вокруг Callisto обнаружена очень разреженная атмосфера, богатая углекислым газом.
	CallistoInSpaceLowAsgardCrater = Ярко-белые ледяные выбросы от относительно молодых ударных событий покрывают большую часть поверхности этого бассейна.
	CallistoInSpaceLowValhallaCrater = Кольцевые структуры этого ударного бассейна отчётливо видны на картах поверхности в ближнем ИК-диапазоне.
	CallistoInSpaceLowYoungCraters = Яркий материал, окружающий эти кратеры, состоит преимущественно из почти чистого инея водяного льда.
	CallistoInSpaceHigh = Первые тепловые сканирования Callisto не показывают признаков какой-либо внутренней геологической активности или приливного разогрева.
	SaturnInSpaceLow = Полосы водяных и аммиачных облаков составляют большую часть верхних слоёв Saturn, придавая ему невыразительную окраску.
	SaturnInSpaceHigh = Снимки характерной кольцевой системы Saturn выявляют полосы различного состава.
	TitanInSpaceLow = УФ-спектроскопия атмосферы Titan выявляет признаки ряда сложных органических соединений, образовавшихся, скорее всего, при взаимодействии метана атмосферы Tekto с солнечным ветром.
	TitanInSpaceLowHighlands = Эти относительно возвышенные области в ИК-сканировании почти лишены деталей, проявляя характеристики обычных силикатов и других базальтовых минералов.
	TitanInSpaceLowShores = ИК-снимки этих низменных участков выявляют то, что похоже на поймы, с плавно сглаженными формами, указывающими на то, что недавно они были покрыты жидкостью.
	TitanInSpaceLowSeas = Отражения в ближнем ИК-диапазоне от поверхности подтверждают присутствие устойчивых океанов жидких углеводородов на Titan.
	TitanInSpaceHigh = Плотный облачный покров Titan непрозрачен для большей части видимого света, но УФ- и ИК-снимки раскрывают множество деталей поверхности.
	UranusInSpaceLow = Снимки, сделанные во время солнечных затмений, выявляют высокие концентрации воды, метана и аммиака в атмосфере.
	UranusInSpaceHigh = УФ-снимки атмосферы Uranus выявляют облака, состоящие в основном из водяного и аммиачного льда.
	PlutoInSpaceLow = Поверхность Pluto, судя по всему, состоит преимущественно из замёрзшего льда.
	PlutoInSpaceHigh = Тепловое излучение Pluto минимально на столь большом удалении от Солнца.
	AsteroidInSpaceLowStony = Выраженные полосы поглощения в спектре ближнего ИК-диапазона указывают, что это богатый оливином астероид.
	AsteroidInSpaceLowStony = Снимки этого астероида в ближнем ИК-диапазоне указывают на высокие концентрации соединений железа и никеля; вероятно, это железистый каменистый астероид.
	AsteroidInSpaceLowCarbonaceous = УФ-поглощение около 400 nm и очень низкое общее альбедо указывают, что это углеродистый астероид.
	AsteroidInSpaceLowCarbonaceous = Плоский ИК-спектр и УФ-поглощение около 300 nm указывают, что это богатый водой углеродистый астероид.
	AsteroidInSpaceLowIcy-Organic = Очень низкое альбедо и следы летучих органических соединений указывают, что это богатый органикой астероид.
	AsteroidInSpaceLowStony = Спектр ИК-поглощения, характерный для железо- и магний-силикатов, указывает, что это каменистый астероид.
	AsteroidInSpaceLow = Слабое ИК-поглощение около 750 nm и 1000 nm указывает на присутствие оливина и других силикатов в этом относительно ярком астероиде.
	AsteroidInSpaceLowMetallic = Умеренное альбедо около 0.2 и относительно плоские спектры в видимом и ближнем ИК-диапазоне указывают, что это металлический астероид, состоящий преимущественно из железа и никеля.
	AsteroidInSpaceLowMetallic = Этот астероид демонстрирует практически лишённый деталей спектр со слегка красноватым спектральным наклоном и умеренно высоким альбедо 0.3.
	AsteroidInSpaecLowMetallic = При лёгком красном наклоне в спектре ближнего ИК-диапазона и умеренном альбедо это, скорее всего, металлический астероид.
	AsteroidInSpaceLowCarbonaceous = Очень низкое альбедо около 0.05 и ИК-характеристики этого астероида соответствуют тяжёлому углеродистому астероиду.
	}
}
