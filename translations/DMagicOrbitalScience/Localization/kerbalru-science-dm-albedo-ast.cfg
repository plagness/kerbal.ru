// kerbal.ru — русификация результатов науки DMagicOrbitalScience (сборка «Оператор»)
// Метод: @EXPERIMENT_DEFINITION:HAS[#id[...]]:FINAL — сносим !RESULTS{} и задаём блок заново литералом.
// Ключи ситуаций (default, KerbinSrfLanded, AsteroidSrfLandedStony и т.п.) не трогаем — переведён только текст.
// Дубли ключей сохранены (несколько default/AsteroidSrfLanded... = случайные варианты флейвора).
// Эксперименты: dmNAlbedoScan (сканер водорода/нейтронное альбедо, 166 строк), dmAsteroidScan (скан недр астероида, 14 строк).
// Латиницей: бренды/модели/коды. Тела KSP транслитерированы (Кербин, Мун, Мохо...), реальные — по-русски (Меркурий, Луна, Марс, Ио...).

@EXPERIMENT_DEFINITION:HAS[#id[dmNAlbedoScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Выполнена точная регистрация нейтронных отражений из подповерхностных слоёв.
	default = Слабые сигналы низкоэнергетических нейтронов указывают, что здесь присутствуют лишь следовые количества воды.
	KerbinSrfLanded = Сканирование поверхности Кербина выявляет очень высокое содержание водорода, преимущественно в виде воды.
	KerbinSrfLandedLaunchPad = Металлическая решётка стартового стола и ядовитая химическая жижа вокруг сбивают датчик с толку.
	KerbinSrfLandedRunway = Бетон взлётной полосы — не лучшая поверхность для нейтронного сканирования.
	KerbinSrfLandedKSC = Болотистая местность вокруг КЦК даёт при сканировании поверхности очень высокий уровень низкоэнергетических нейтронов.
	KerbinSrfLandedGrasslands = Сканирование почвы Кербина, как и ожидалось, выявляет высокую концентрацию водородных соединений.
	KerbinSrfLandedTundra = Сканирование этой промёрзшей местности показывает лишь тонкий слой льда у поверхности и чуть более сухой слой под ним.
	KerbinSrfLandedMountains = В этих высокогорных районах содержатся лишь низкие концентрации водородных соединений.
	KerbinSrfLandedBadlands = Сканирование этого района фиксирует очень высокий уровень водорода — скорее всего, из-за смеси воды и органических соединений.
	KerbinSrfLandedDeserts = Рыхлый песок пропускает нейтроны глубже и выявляет очень низкое содержание подповерхностного водорода.
	KerbinSrfLandedHighlands = Как и прочие участки поверхности Кербина, эта местность богата подповерхностным водородом.
	KerbinSrfLandedIceCaps = Судя по водородным сканам, сплошной ледяной покров уходит вглубь как минимум на несколько метров.
	KerbinSrfLandedShores = Этот дорогущий детектор нейтронов явно пригодился бы больше там, где не так очевидно сыро.
	KerbinSrfLandedWater = Эта насыщенная водой среда поглощает почти все высокоэнергетические нейтроны, оставляя для регистрации лишь низкоэнергетические частицы.
	KerbinSrfLandedVABTanks = Сканирование этих топливных баков показывает крайне высокое содержание водорода внутри — что, в общем-то, не удивляет.
	KerbinSrfLandedR&D = Тесты показывают, что сканер всё ещё работает...
	KerbinSrfLandedAdministration = Несомненно, мудрое расходование средств КЦК...
	KerbinSrfLandedMissionControl = Всё та же пустая трата времени...
	MunSrfLanded = Сканирование Муна не выявляет заметного содержания подповерхностного водорода.
	MunSrfLandedCanyons = Эти глубокие каньоны хранят значительные запасы водорода — скорее всего, залежи замёрзшей воды.
	MunSrfLandedEastFarsideCrater = Сканирование этого кратера фиксирует лишь быстрые высокоэнергетические нейтроны, что указывает на почти полное отсутствие водорода под поверхностью.
	MunSrfLandedFarsideCrater = В этом кратере обнаружены следовые количества подповерхностного водорода; они могут быть связаны с различными водородными соединениями, привнесёнными тем, что создало эту зону удара.
	MunSrfLandedHighland = Нейтронное сканирование поверхности здесь почти не выявляет водорода.
	MunSrfLandedMidlands = Рыхлый мунский реголит, вероятно, богатый силикатами, содержит мало заметного водорода.
	MunSrfLandedPolarCrater = В этом кратере зафиксированы всплески низкоэнергетических нейтронов, скорее всего вызванные подповерхностными залежами воды.
	MunSrfLandedPolarLowlands = Сканирование указывает на присутствие водорода прямо под поверхностью в этом районе.
	MunSrfLandedPoles = В полярных областях Муна фиксируется низкий, но устойчивый уровень водорода.
	MunSrfLandedSouthwestCrater = В этом кратере обнаружено немало низкоэнергетических нейтронов, что намекает на значительные запасы воды под поверхностью.
	MinmusSrfLanded = Нейтронное сканирование Минмуса выявляет мало заметного водорода.
	MinmusSrfLandedFlats = Кристаллическая поверхность порождает при сканировании низкоэнергетические нейтроны; это намекает на возможное присутствие замёрзшей воды или иного водородсодержащего соединения.
	MinmusSrfLandedGreatFlats = Водородные сканы этой поверхности намекают на присутствие значительных запасов воды.
	MinmusSrfLandedGreaterFlats = Низкоэнергетические нейтроны, зарегистрированные в этом районе, указывают на высокую концентрацию водорода под поверхностью.
	MinmusSrfLandedLesserFlats = Сканирование этой ровной местности выявляет высокую концентрацию водорода под поверхностью.
	MinmusSrfLandedPoles = Близ полюсов Минмуса обнаружено несколько залежей подповерхностного водорода — скорее всего, замёрзшая вода.
	MohoSrfLanded = Сканирование поверхности Мохо фиксирует умеренный уровень водорода; вероятнее всего, он занесён свирепым солнечным ветром.
	MohoSrfLanded = Так близко к Солнцу фоновый уровень нейтронов очень высок, из-за чего получить точные показания непросто.
	MohoSrfLandedPolarCrater = В этом глубоком кратере уловлены слабые сигналы от возможных мельчайших залежей льда.
	MohoSrfLandedHighlands = Похоже, у поверхности есть тонкий слой водорода, но глубже — ничего.
	MohoSrfLandedNorthernSinkhole = В этом глубоком кратере уловлены слабые сигналы от возможных мельчайших залежей льда.
	EveSrfLanded = По всей поверхности Евы фиксируется высокий уровень низкоэнергетических нейтронов, что говорит о том, что её океаны — это в основном вода, а почва тоже ею насыщена.
	EveSrfLandedPlains = Сканирование этих низменных участков поверхности Евы указывает на значительное количество подповерхностного водорода.
	EveSrfLandedMountains = В этих гористых районах фиксируется сравнительно низкий уровень водорода; возможно, из-за нехватки осадков вода остаётся запертой в низинах.
	EveSrfLandedIslands = Почва в этом районе насыщена водой, порождая очень высокий уровень низкоэнергетических нейтронов.
	EveSrfLandedMidlands = Сканирование этих низменных участков поверхности Евы указывает на значительное количество подповерхностного водорода.
	EveSrfLandedPeaks = В этих гористых районах фиксируется сравнительно низкий уровень водорода; возможно, из-за нехватки осадков вода остаётся запертой в низинах.
	EveSrfLandedExplodiumSea = Почва в этом районе насыщена водой, порождая очень высокий уровень низкоэнергетических нейтронов.
	GillySrfLanded = Сканирование каменистой поверхности Гилли не выявляет ничего особо интересного.
	DunaSrfLanded = Сканирование поверхности Дюны фиксирует умеренный уровень водорода; это почти наверняка признак подповерхностных залежей воды.
	DunaSrfLanded = Повторные сканы дают очень точную оценку количества воды под поверхностью.
	DunaSrfLandedNorthPole = Грунт здесь, похоже, состоит в основном из водяного льда под тонким слоем, скорее всего, замёрзшего углекислого газа.
	DunaSrfLandedSouthPole = Уровень водорода у поверхности ниже ожидаемого — значит, покрывающий слой сухого льда может быть очень толстым, не меньше нескольких метров.
	DunaSrfLandedDepressions = Признаки геологической активности в этом районе позволяют предположить, что обнаруженный при сканировании водород может быть связан с сероводородом, метаном или каким-то иным соединением.
	DunaSrfLandedVallesJebbedius = В этом районе фиксируется высокий уровень подповерхностного водорода; рыхлая сухая местность намекает, что дело тут не в воде, а, возможно, в запертом под землёй метане.
	DunaSrfLandedPoles = Грунт здесь, похоже, состоит в основном из водяного льда под тонким слоем, скорее всего, замёрзшего углекислого газа.
	DunaSrfLandedLowlands = Признаки геологической активности в этом районе позволяют предположить, что обнаруженный при сканировании водород может быть связан с сероводородом, метаном или каким-то иным соединением.
	DunaSrfLandedMidlands = В этом районе фиксируется высокий уровень подповерхностного водорода; рыхлая сухая местность намекает, что дело тут не в воде, а, возможно, в запертом под землёй метане.
	IkeSrfLanded = Сканирование этой безжизненной луны не выявляет подповерхностного водорода.
	IkeSrfLandedPolarDepression = При сканировании затенённых участков этой полярной области улавливаются слабые сигналы низкоэнергетических нейтронов; скорее всего, это залежи замёрзшей воды, укрытые от Солнца.
	IkeSrfLandedPolarLowlands = При сканировании затенённых участков этой полярной области улавливаются слабые сигналы низкоэнергетических нейтронов; скорее всего, это залежи замёрзшей воды, укрытые от Солнца.
	DresSrfLanded = Планета? Какая планета? Проведённые здесь сканы не намекают на существование чего-либо подобного.
	JoolSrfLanded = Эй. Тебе это видеть не полагалось!
	LaytheSrfLanded = Сканирование поверхности выявляет очень высокий уровень водорода, но незначительные вариации сигнала намекают, что дело не в воде — возможно, это аммиак и какие-то органические соединения.
	LaytheSrfLandedIslands = Почва в этом районе насыщена различными водородными соединениями, что выявляет нейтронное сканирование поверхности.
	LaytheSrfLanderRingArchipelago = Уловленный здесь нейтронный сигнал намекает на любопытную смесь водородных соединений в верхних слоях почвы.
	LaytheSrfLandedDunes = Почва в этом районе насыщена различными водородными соединениями, что выявляет нейтронное сканирование поверхности.
	LaytheSrfLandedShores = Уловленный здесь нейтронный сигнал намекает на любопытную смесь водородных соединений в верхних слоях почвы.
	VallSrfLanded = Сканирование поверхности выявляет то, что похоже на сплошной водяной лёд, порождающий очень сильный низкоэнергетический нейтронный сигнал.
	VallSrfLanded = Водородные сигналы из-под поверхности указывают на жидкую воду, текущую под тонким слоем льда.
	VallSrfLandedMountains = Тонкий слой льда покрывает поверхность здесь; под этим богатым водородом слоем, похоже, лежит более каменистая область, лишённая водородных соединений.
	VallSrfLandedSinks = Водородные сигналы из-под поверхности указывают на жидкую воду, текущую под тонким слоем льда.
	VallSrfLandedlowlands = Водородные сигналы из-под поверхности указывают на жидкую воду, текущую под тонким слоем льда.
	VallSrfLandedHighlands = Тонкий слой льда покрывает поверхность здесь; под этим богатым водородом слоем, похоже, лежит более каменистая область, лишённая водородных соединений.
	TyloSrfLanded = Водородные сканы поверхности Тайло не выявляют ничего особо интересного; она, похоже, состоит в основном из каменистых силикатов и, возможно, металлических соединений.
	TyloSrfLandedCraters = В этом районе зафиксировано несколько низкоэнергетических нейтронов, возможно, из-за водяного льда, запертого в затенённых участках кратера.
	TyloSrfLandedMinorCraters = В этом районе зафиксировано несколько низкоэнергетических нейтронов, возможно, из-за водяного льда, запертого в затенённых участках кратера.
	BopSrfLanded = Вопреки всему своему облику Боп, похоже, хранит немало водородсодержащих соединений, что выявляет нейтронное сканирование поверхности.
	BopSrfLandedWesternDepression = Неясно, что может быть источником низкоэнергетических нейтронов, обнаруженных при сканировании этого района: никаких признаков воды или иных ожидаемых водородных соединений здесь нет.
	BopSrfLandedValley = Неясно, что может быть источником низкоэнергетических нейтронов, обнаруженных при сканировании этого района: никаких признаков воды или иных ожидаемых водородных соединений здесь нет.
	BopSrfLandedPeaks = Сильные водородные сигналы, выявленные при сканировании поверхности Бопа, любопытны; это требует дальнейшего изучения...
	PolSrfLanded = Сканирование поверхности Пола не выявляет водорода, что говорит о том, что его яркая окраска имеет преимущественно неорганическую природу.
	PolSrfLandedWastes = При сканировании поверхности здесь улавливаются лишь слабые следы низкоэнергетических нейтронов; возможно, из-за мельчайших количеств воды или ядер водорода, занесённых солнечным ветром.
	PolSrfLandedMidlands = При сканировании поверхности здесь улавливаются лишь слабые следы низкоэнергетических нейтронов; возможно, из-за мельчайших количеств воды или ядер водорода, занесённых солнечным ветром.
	EelooSrfLanded = Похоже, большую часть поверхности Ило покрывает очень тонкий, богатый водородом слой; в слоях под ним водород почти не обнаруживается.
	EelooSrfLandedScarring = Ничего интересного здесь не обнаружено, что, возможно, намекает: белое покрытие Ило — не водяной лёд, а нечто иное.
	EelooSrfLandedPromontories = Водородный скан этого района даёт любопытные результаты; первичный анализ показывает, что водород, похоже, входит в состав сложной органической молекулы.
	EelooSrfLandedIceCanyons = Ничего интересного здесь не обнаружено, что, возможно, намекает: белое покрытие Ило — не водяной лёд, а нечто иное.
	EelooSrfLandedGlaciers = Водородный скан этого района даёт любопытные результаты; первичный анализ показывает, что водород, похоже, входит в состав сложной органической молекулы.
	HaleSrfLandedDarkRock = Слои прямо под тёмной поверхностью в этом районе богаты водородом; скорее всего, в виде водяного льда.
	HaleSrfLandedLightRock = Поверхность в этом районе имеет очень высокое содержание водорода.
	OvokSrfLandedDarkSurface = Водородные сканы тёмной поверхности Овока указывают в основном на водяной лёд.
	OvokSrfLandedPlains = Нейтронное рассеяние выявляет поверхность, состоящую почти целиком из водяного льда.
	OvokSrfLandedScarring = Водородные сканы этого искажённого участка поверхности Овока согласуются с высокой концентрацией водяного льда.
	SlateSrfLanded = По нейтронным отражениям прямо под поверхностью фиксируется умеренный уровень водорода.
	SlateSrfLandedSlateanSupercontinent = Нейтронные отражения из-под поверхности выявляют признаки умеренной концентрации водорода, возможно, в виде воды.
	SlateSrfLandedYahelMountains = Под поверхностью обнаружены изолированные карманы водорода.
	SlateSrfLandedImpactCraters = Плотно спрессованное дно этого кратера мешает получить точные показания по нейтронным отражениям из-под поверхности.
	SlateSrfLandedSeabed = Под рыхлой песчаной почвой этого района обнаружено мало водорода.
	SlateSrfLandedMountNehelennia = Очень высокий уровень водорода, зафиксированный при сканировании поверхности здесь, вряд ли связан с водой; признаки недавней вулканической активности, похоже, это исключают.
	SlateSrfLandedFloodplains = Под осадочной поверхностью этого района — сравнительно высокая концентрация водорода.
	TektoSrfLanded = Водородные сканы поверхности Текто выявляют очень высокий уровень того, что, скорее всего, является замёрзшими углеводородами.
	TektoSrfLandedLakes = Сканирование океана Текто выявляет высокое содержание водорода; учитывая низкую температуру, это, скорее всего, простые углеводороды вроде метана и этана.
	TektoSrfLandedMudflats = Нейтронные отражения прямо из-под поверхности намекают на высокое содержание углеводородов внизу.
	TektoSrfLandedOutcrops = В этих высокогорных районах поверхности Текто фиксируется сравнительно низкое содержание водорода.
	TektoSrfLandedGeologicalAnomaly = Водородные сканы этого района не выявляют ничего необычного: поверхность, похоже, имеет ту же богатую углеводородами почву, что и остальной Текто.
	PoltaSrfLanded = Нейтронное сканирование поверхности Полты выявляет очень высокий уровень подповерхностного водорода, скорее всего, в виде водяного льда.
	PriaxSrfLanded = Прайакс, похоже, в основном сухая луна: сканирование этого района выявляет мало подповерхностного водорода.
	WalSrfLanded = Водородные сканы Вала показывают лишь следовые количества воды под поверхностью.
	TalSrfLanded = Сканирование поверхности этой крошечной субспутниковой луны выявляет очень высокий уровень поверхностного льда.
	ThatmoSrfLanded = На поверхности Татмо имеется значительное количество водяного льда.
	NisseeSrfLanded = Сканирование этой пыльной луны не выявляет подповерхностного водорода.
	PlockSrfLanded = Нейтронное рассеяние выявляет, что местами поверхность состоит почти целиком из водяного льда.
	KarenSrfLanded = Тонкий слой менее богатых водородом соединений покрывает поверхность Карен здесь; под ним, похоже, лежит более ледяная, богатая водородными соединениями область.
	MercurySrfLanded = Сканирование поверхности Меркурия фиксирует умеренный уровень водорода; вероятнее всего, он занесён свирепым солнечным ветром.
	MercurySrfLandedMidlands = Так близко к Солнцу фоновый уровень нейтронов очень высок, из-за чего получить точные показания непросто.
	MercurySrfLandedPolarCraters = В этом глубоком кратере уловлены слабые сигналы от возможных мельчайших залежей льда.
	MercurySrfLandedPlanitia = Похоже, у поверхности есть тонкий слой водорода, но глубже — ничего.
	VenusSrfLanded = Нейтронное рассеяние не выявляет заметного количества воды на венерианской поверхности.
	VenusSrfLandedMidlands = Водород, обнаруженный при сканировании этого района, скорее всего, входит в состав каменистых минералов лавовых потоков, покрывающих большую часть поверхности.
	VenusSrfLandedLakshmiPlanum = Венера, похоже, совершенно сухая планета; никакого измеримого количества воды не обнаружено.
	MoonSrfLanded = Сканирование Луны не выявляет заметного содержания подповерхностного водорода.
	MoonSrfLandedMidlands = Рыхлый лунный реголит, вероятно, богатый силикатами, содержит мало заметного водорода.
	MoonSrfLandedMajorCraters = В этом кратере обнаружены следовые количества подповерхностного водорода; они могут быть связаны с различными водородными соединениями, привнесёнными тем, что создало эту зону удара.
	MoonSrfLandedFarSideBasin = Сканирование этого бассейна фиксирует лишь быстрые высокоэнергетические нейтроны, что указывает на почти полное отсутствие водорода под поверхностью.
	MoonSrfLandedNorthPole = В полярных областях Луны фиксируется низкий, но устойчивый уровень водорода.
	MoonSrfLandedSouthPole = Сканирование указывает на присутствие водорода прямо под поверхностью в этом районе.
	MarsSrfLanded = Сканирование поверхности Марса фиксирует умеренный уровень водорода; это почти наверняка признак подповерхностных залежей воды.
	MarsSrfLandedVallesMarineris = В этом районе фиксируется высокий уровень подповерхностного водорода; рыхлая сухая местность намекает, что дело тут не в воде, а, возможно, в запертом под землёй метане.
	MarsSrfLandedAreanMountains = Признаки геологической активности в этом районе позволяют предположить, что обнаруженный при сканировании водород может быть связан с сероводородом, метаном или каким-то иным соединением.
	MarsSrfLandedNorthIceCap = Грунт здесь, похоже, состоит в основном из водяного льда под тонким слоем, скорее всего, замёрзшего углекислого газа.
	MarsSrfLandedSouthIceCap = Уровень водорода у поверхности ниже ожидаемого — значит, покрывающий слой сухого льда может быть очень толстым, не меньше нескольких метров.
	DeimosSrfLanded = Сканирование каменистой поверхности Деймоса не выявляет ничего особо интересного.
	PhobosSrfLanded = Сканирование этой безжизненной луны не выявляет подповерхностного водорода.
	PhobosSrfLandedStickneyCrater = При сканировании затенённых участков этого исполинского кратера улавливаются слабые сигналы низкоэнергетических нейтронов; скорее всего, это залежи замёрзшей воды, укрытые от Солнца.
	IoSrfLanded = Сканирование поверхности Ио не выявляет признаков воды, что говорит о том, что её яркая окраска имеет преимущественно неорганическую природу.
	IoSrfLandedMidlands = Всё указывает на то, что Ио — очень сухая луна; её сильный внутренний жар и близость к Юпитеру, вероятно, испарили большую часть воды с поверхности.
	IoSrfLandedVolcanicSnows = Водород, обнаруженный при сканировании этого района, скорее всего, входит в состав каменистых силикатных минералов.
	IoSrfLandedVolcanicHotspots = При сканировании этого района обнаружено несколько скудных следов поверхностной воды — возможно, признак того, что немного воды есть в мантийном слое Ио.
	EuropaSrfLanded = Сканирование поверхности выявляет то, что похоже на сплошной водяной лёд, порождающий очень сильный низкоэнергетический нейтронный сигнал.
	EuropaSrfLandedChaoticPlains = Водородные сигналы из-под поверхности указывают на жидкую воду, текущую под тонким слоем льда.
	EuropaSrfLandedLineaments = Тонкий слой менее богатых водородом соединений покрывает поверхность здесь; под ним, похоже, лежит более ледяная, богатая водородными соединениями область.
	GanymedeSrfLanded = Большая часть поверхности Ганимеда, похоже, состоит из водяного льда, смешанного с каменистыми силикатами.
	GanymedeSrfLandedMidlands = Сканирование поверхности Ганимеда фиксирует значительный уровень водяного льда.
	GanymedeSrfLandedCryovolcanicIce = Нейтронные сканы поверхности здесь выявляют высокий уровень водяного льда.
	GanymedeSrfLandedTectonicDeformation = Тонкий слой каменистого материала покрывает значительный объём водяного льда.
	CallistoSrfLanded = Поверхность в этом районе имеет очень высокое содержание водорода.
	CallistoSrfLandedCrateredMidlands = Тонкие слои каменистого материала, возможно, образованные ударными событиями, покрывают богатую водой поверхность внизу.
	CallistoSrfLandedCrateredHighlands = На поверхности Каллисто имеется значительное количество водяного льда.
	CallistoSrfLandedAsgardCrater = В этом исполинском кратере фиксируется очень высокий уровень водяного льда.
	CallistoSrfLandedOldCraters = Нейтронное сканирование этого кратера выявляет высокую концентрацию водорода, скорее всего, в виде водяного льда.
	TitanSrfLanded = Водородные сканы поверхности Титана выявляют очень высокий уровень того, что, скорее всего, является замёрзшими углеводородами.
	TitanSrfLandedHighlands = В этих высокогорных районах поверхности Титана фиксируется сравнительно низкое содержание водорода.
	TitanSrfLandedShores = Нейтронные отражения прямо из-под поверхности намекают на высокое содержание углеводородов внизу.
	TitanSrfLandedSeas = Сканирование океанов Титана выявляет высокое содержание водорода; учитывая низкую температуру, это, скорее всего, простые углеводороды вроде метана и этана.
	TitanSrfLandedPoles = Водородные сканы этого района не выявляют ничего необычного: поверхность, похоже, имеет ту же богатую углеводородами почву, что и остальной Титан.
	PlutoSrfLanded = Нейтронное рассеяние выявляет поверхность, состоящую почти целиком из водяного льда.
	AsteroidSrfLandedStony = У этого каменного астероида нет заметных признаков воды или иных водородных соединений.
	AsteroidSrfLanded = При сканировании этого астероида улавливаются слабые водородные сигналы — возможно, признак воды, замёрзшей под поверхностью.
	AsteroidSrfLandedCarbonaceous = Водородные соединения, возможно вода или органика, судя по сканам этого астероида, присутствуют в изобилии.
	AsteroidSrfLandedCarbonaceous = В нейтронных сканах этого астероида обнаружен ряд водородных соединений.
	AsteroidSrfLandedStony = В сканах этого астероида водород почти не обнаружен; он, похоже, имеет преимущественно каменную природу.
	AsteroidSrfLandedCarbonaceous = При сканировании этого астероида улавливаются слабые сигналы низкоэнергетических нейтронов; возможно, из-за присутствия различных органических соединений.
	AsteroidSrfLandedIcy-Organic = Слабые сигналы низкоэнергетических нейтронов улавливаются отдельными пятнами вдоль поверхности этого астероида — возможно, признак залежей замёрзшей воды.
	AsteroidSrfLandedMettalic = Сканы этого плотного астероида, похоже, проникают лишь в самые внешние его слои и не выявляют признаков водорода; это говорит о том, что перед нами, скорее всего, металлический астероид.
	AsteroidSrfLandedStony = Нейтронные сканы выявляют мало водорода в поверхности этого астероида.
	AsteroidSrfLandedIcy-Organic = В сканах этого астероида обнаружено значительное количество водорода.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[dmAsteroidScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Проведено детальное внутреннее сканирование этого астероида.
	default = Сигнал проходит сквозь астероид, давая данные об электрических характеристиках его внутренней структуры.
	AsteroidInSpaceLowStony = Особенности, выявленные при прохождении сигнала сквозь недра этого астероида, говорят о том, что это каменный объект.
	AsteroidInSpaceLowIcy-Organic = Значительная задержка прохождения сигнала указывает на то, что недра этого астероида сложены сильно диэлектрическими материалами.
	AsteroidInSpaceLowCarbonaceous = Сложная внутренняя структура этого астероида порождает интересную картину после многократного прохождения сигнала.
	AsteroidInSpaceLowCarbonaceous = Искажения прошедшего сигнала согласуются с высокой концентрацией гидратированных силикатов.
	AsteroidInSpaceLowMetallic = Этот плотный астероид поглощает большую часть радиосигнала, не давая детально проанализировать его внутренний состав.
	AsteroidInSpaceLowComet = По отражениям сигнала внутри этой кометы различимы крупные внутренние структуры. Вместе с данными о её электрических свойствах это говорит о том, что комета держится вместе лишь очень непрочно.
	AsteroidInSpaceLowMetallic = Разные пути прохождения сигнала сквозь этот астероид выявляют несколько крупномасштабных внутренних особенностей.
	AsteroidInSpaecLowMetallic = Сила радиосигнала сильно падает после прохождения сквозь этот астероид, указывая на то, что он сложен очень плотным материалом.
	AsteroidInSpaceLowIcy-Organic = При сканировании обнаружено несколько внутренних структур, согласующихся с крупными залежами водяного льда.
	AsteroidInSpaceLowStony = Сигнал сильно рассеивается рыхлыми недрами этого астероида.
	AsteroidInSpaceLowStony = После нескольких прохождений сигнала во внутренней структуре этого астероида выявлено мало вариаций.
	AsteroidInSpaceLowStony = Электрические свойства недр этого астероида согласуются с лёгкими, рыхло уложенными силикатами.
	}
}
