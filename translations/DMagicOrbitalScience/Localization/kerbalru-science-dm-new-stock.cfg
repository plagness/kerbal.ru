// kerbal.ru — перевод результатов экспериментов (ScienceDefs)
// Мод: DMagicOrbitalScience — Resources/NewScienceDefs.cfg
// DMagic патчит СТОКОВЫЕ эксперименты для астероидов: seismicScan, gravityScan, mysteryGoo.
// Только @EXPERIMENT_DEFINITION-патчи, без обёртки Localization.

@EXPERIMENT_DEFINITION:HAS[#id[seismicScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		AsteroidSrfLandedStony = С нескольких направлений приходит множество слабых сейсмических отражений — судя по всему, астероид сложен рыхло упакованным каменистым материалом.
		AsteroidSrfLandedStony = От астероида приходят лишь размытые, рассеянные сейсмические волны.
		AsteroidSrfLandedCarbonaceous = Вибрации от самого корабля до сих пор улавливаются на поверхности этого астероида.
		AsteroidSrfLandedComet = Обнаружено несколько сильных, но крайне локализованных сейсмических отражений, что наводит на мысль о…
		AsteroidSrfLandedStony = Сейсмические волны быстро рассеиваются в недрах астероида — а значит, он сложен в основном рыхло упакованным материалом.
		AsteroidSrfLandedIcy-Organic = От возмущения, вызванного захватом астероида кораблём, улавливаются слабые сейсмические отражения.
		AsteroidSrfLandedMetallic = Регистрируются очень сильные сейсмические волны вкупе с несколькими слабыми сигналами — похоже, под рыхлой поверхностью у астероида плотное металлическое ядро.
		AsteroidSrfLandedMetallic = Локализованные сильные сейсмические отражения указывают на плотные металлические недра астероида.
		AsteroidSrfLandedCarbonaceous = Из недр астероида отражается несколько отчётливых сейсмических волн.
		AsteroidSrfLandedMetallic = Сильные сейсмические отражения из глубины астероида, скорее всего, порождены жилами металлических минералов.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[gravityScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		AsteroidInSpaceLow = Вблизи астероида не удаётся зафиксировать сколько-нибудь заметного гравитационного поля.
		AsteroidInSpaceLow = В окрестностях астероида регистрируются заметные колебания гравитационного поля.
		AsteroidInSpaceLow = При близком пролёте мимо астероида зафиксирован слабый гравитационный сигнал.

		AsteroidSrfLanded = От астероида улавливаются слабые гравитационные колебания.
		AsteroidSrfLanded = От астероида исходит слабое, равномерно распределённое гравитационное поле.
		AsteroidSrfLandedCarbonaceous = Сильные колебания гравитационного поля наводят на мысль, что недра астероида сложены минералами самой разной плотности.
		AsteroidSrfLandedMetallic = Мощное однородное гравитационное поле указывает на то, что астероид состоит преимущественно из плотных металлических минералов.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[mysteryGoo]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		AsteroidInSpaceLow = Слизь ведёт себя как обычно — очевидно, соседства астероида она не чует.
		AsteroidInSpaceLow = На поверхности контейнера улавливаются слабые электрические токи — похоже, за это как-то отвечает слизь внутри.
		AsteroidInSpaceLow = Слизь собралась в медленно пульсирующий шар, зависший посреди контейнера, и чем ближе астероид, тем этот шар крупнее.
		AsteroidInSpaceLow = Слизь обрела гладкий металлический блеск — может, и соседний астероид металлический?
		AsteroidInSpaceLow = Слизь принялась часто вибрировать — вероятно, чует астероид поблизости.

		AsteroidSrfLanded = Слизь начинает буреть до песочного цвета, подражая поверхности астероида.
		AsteroidSrfLanded = Слизь сползает к той стенке контейнера, что обращена к астероиду, — явно её к нему что-то тянет.
		AsteroidSrfLanded = Слизь издаёт любопытные попискивания, будто пытается о чём-то договориться с кем-то внутри астероида.
		AsteroidSrfLanded = Слизь принимает бугристую, почти шарообразную форму, до жути похожую на сам астероид.
		AsteroidSrfLanded = Контейнер ходит ходуном: слизь внутри принялась бешено то раздуваться, то сжиматься.
	}
}
