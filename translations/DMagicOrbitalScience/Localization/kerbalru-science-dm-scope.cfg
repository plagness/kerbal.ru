	TektoInSpaceHigh = Плотные зелёные облака скрывают большую часть поверхности в видимой части спектра, оставляя мало полезных данных.
	TektoInSpaceLow = При внимательном изучении снимков с низкой орбиты Tekto удаётся различить крупные детали поверхности.
	TektoInSpaceLowLakes = Сквозь плотный облачный покров Tekto проступает то, что похоже на крупные жидкие образования на поверхности.
	TektoInSpaceLowPlateaus = На телескопических снимках этого района видны участки высокой плоской местности.
	TektoInSpaceLowGeologicalAnomaly = Сквозь облачный покров едва различима местность необычных очертаний.
	TektoInSpaceLowPolarRifts = На снимках этого полярного района заметны следы каких-то странных геологических образований.
	UrlumInSpaceHigh = На телескопических снимках атмосферы Urlum предстаёт почти лишённым деталей диском.
	UrlumInSpaceLow = Светло-голубые и белые облака Urlum укрывают всю планету, не давая заглянуть в её недра.
	PoltaInSpaceHigh = Издалека Polta поразительно напоминает Minmus.
	PoltaInSpaceLowMidlands = На поверхности Polta сравнительно мало кратеров — возможно, признак того, что её перекраивает какой-то криовулканизм.
	PoltaInSpaceLowLowlands = Яркие низины Polta, скорее всего, богаты водяным льдом.
	PoltaInSpaceLowHighlands = Возвышенности Polta отличаются ярким, насыщенным зелёным цветом.
	PoltaInSpaceLowHighlandDepressions = Эти впадины, скорее всего, оставлены падениями астероидов.
	PriaxInSpaceHigh= Поверхность Priax изрыта множеством крупных ударных кратеров.
	PriaxInSpaceLowLeadingSide = Этот участок Priax отличается сравнительно ярким цветом — возможно, это связано с приливным захватом спутника со стороны Urlum и Polta.
	PriaxInSpaceLowLeadingCraters = Ведущая сторона Priax густо усеяна кратерами, удары по виду совсем свежие.
	PriaxInSpaceLowTrailingSide = Чуть более тёмная сторона Priax вечно тянется за Polta по орбите.
	PriaxInSpaceLowTrailingCraters = Кратеров на ведомом полушарии Priax сравнительно немного по сравнению с ведущей стороной.
	WalInSpaceHigh = Броская окраска и экваториальный хребет делают Wal уникальным спутником в системе Kerbol.
	WalInSpaceLow = Необычная окраска поверхности Wal намекает на любопытный геологический состав.
	WalInSpaceLowEquatorialRidge = Этот исполинский хребет опоясывает весь спутник; вопрос интригующий — тектонической ли он природы или, быть может, остаток исчезнувшего спутника-компаньона.
	WalInSpaceLowEquatorialCraters = Кратеры на Wal обнажают куда более светлый слой поверхности — вероятно, они относительно свежие и солнечный ветер ещё не успел их выветрить.
	TalInSpaceHigh = С такого расстояния Tal — всего лишь крошечный бурый комок.
	TalInSpaceLow = На блестящей бурой поверхности Tal мало интересного — даже ударных кратеров почти не видно.
	NeidonInSpaceHigh = Насыщенный фиолетовый цвет Neidon издали напоминает Eve, но его большие размеры и состав указывают на совсем иной тип планеты.
	NeidonInSpaceLow = В атмосфере Neidon различимы отчётливые полосы высотных облаков.
	ThatmoInSpaceLow = На снимках поверхности Thatmo видно несколько любопытных трещин.
	ThatmoInSpaceHigh = С высокой орбиты тонкая атмосфера Thatmo придаёт всему спутнику слегка размытый вид.
	NisseeInSpaceLow = На орбитальных снимках у Nissee странная, будто меловая поверхность.
	NisseeInSpaceHigh = На снимках с высокой орбиты Nissee выглядит непривычно гладкой, словно отполированной.
	PlockInSpaceLow = На поверхности Plock видно несколько на удивление гладких равнин.
	PlockInSpaceHigh = У Plock, похоже, немало контрастных форм рельефа.
	KarenInSpaceLow = На снимках Karen видна любопытная местность, намекающая на удивительно активную геологию этого крошечного спутника.
	KarenInSpaceHigh = С такого расстояния на буроватой поверхности Karen мало что интересного видно.
	MercuryInSpaceLow = Поверхность Mercury покрыта кратерами разного возраста; выбросы вокруг некоторых свежих кратеров отчётливо видны в телескоп.
	MercuryInSpaceLowLowlands = Поверхность Mercury покрыта бурым и серым реголитом, испещрённым сотнями крошечных ударных кратеров.
	MercuryInSpaceLowPolarCraters = В некоторых затенённых участках этих кратеров различимы слабые следы того, что может оказаться водяным льдом.
	MercuryInSpaceLowPlanitia = Эту область гладкой местности нарушает сравнительно немного кратеров.
	MercuryInSpaceLowOldCraters = На дне этих больших древних кратеров видны многочисленные вторичные кратеры.
	MercuryInSpaceLowYoungCraters = Этот кратер окружён светлым веществом, выброшенным при ударе.
	MercuryInSpaceHigh = На тускло-серой поверхности Mercury видно несколько очень крупных ударных кратеров.
	VenusInSpaceLow = Даже вблизи облака Venus укрывают всю поверхность; зато заметна нешуточная грозовая активность и вспышки молний.
	VenusInSpaceLowVolcanicRise = Едва заметные изменения в облачном покрове намекают на присутствие в этом районе высоких гор или вулканов.
	VenusInSpaceHigh = Плотные буроватые облака окутывают всю планету; чтобы узнать хоть что-то о поверхности, потребуются дальнейшие исследования.
	MoonInSpaceLow = Большая часть яркой поверхности Moon покрыта налегающими друг на друга кратерами.
	MoonInSpaceLowLunarSeas = Этот тёмный, сравнительно гладкий участок Moon контрастирует с густо изрытой кратерами местностью, покрывающей большую часть поверхности.
	MoonInSpaceLowMajorCraters = Крупные ударные кратеры испещряют значительную часть поверхности Moon.
	MoonInSpaceLowFarSideBasin = Эта низменная область густо усеяна кратерами.
	MoonInSpaceLowNorthPole = Изрытый кратерами северный полюс Moon, возможно, скрывает залежи водяного льда.
	MoonInSpaceLowSouthPole = У южного полюса видно несколько глубоких кратеров, которые могли бы давать постоянную тень, где способен образовываться водяной лёд.
	MoonInSpaceHigh = Всё какое-то сероватое и сплошь в кратерах.
	MarsInSpaceLowLowlands = Низкие плоские северные равнины Mars покрыты тёмной красновато-бурой почвой.
	MarsInSpaceLowMidlands = Среднегорья Mars изрыты кратерами куда сильнее большинства других районов — возможно, это геологически более древняя местность.
	MarsInSpaceLowHighlands = С этой высоты на поверхности различимы мелкие детали, в том числе борозды, намекающие на недавние потоки воды по поверхности.
	MarsInSpaceLowOlympusMons = С орбиты видны остатки исполинского вулкана. Геологическое прошлое Mars, должно быть, было весьма бурным.
	MarsInSpaceLowVallesMarineris = Края этого глубокого разлома несут следы геологических нарушений — возможно, он образовался в результате тектонической активности.
	MarsInSpaceLowAreanMountains = На поверхности этого горного района видна цепочка сравнительно небольших вулканов.
	MarsInSpaceLowAreanCanyons = Здесь видны небольшие каньоны — возможно, остатки древних речных русел.
	MarsInSpaceLowNorthIceCap = Вблизи видно, что полюса Mars полностью укрыты, судя по всему, замёрзшим углекислым газом.
	MarsInSpaceLowSouthIceCap = Вблизи видно, что полюса Mars полностью укрыты, судя по всему, замёрзшим углекислым газом.
	MarsInSpaceLowMajorCraters = Разбросанные по этим районам валуны намекают, что перед нами выветрившиеся следы падений крупных астероидов.
	MarsInSpaceHigh = На Duna, похоже, полно всего красного — стоит рассмотреть поближе.
	DeimosInSpaceLow = С такой высоты, пожалуй, проще просто сесть на поверхность и рассмотреть всё вблизи.
	DeimosInSpaceLowCraters = На поверхности Deimos видно несколько небольших ударных кратеров.
	DeimosInSpaceLowLowlands = Один участок поверхности Deimos мало чем отличается от любого другого.
	DeimosInSpaceHigh = Вблизи эта штука похожа скорее на крупный астероид, чем на луну
	PhobosInSpaceLow = Вблизи Phobos — вылитый крупный, очень тёмный астероид.
	PhobosInSpaceLowMidlands = Изрытая кратерами, неровная местность Phobos выглядит не особо гостеприимно.
	PhobosInSpaceLowMinorCraters = Многочисленные мелкие кратеры испещряют поверхность Phobos.
	PhobosInSpaceLowStickneyCrater = Этот единственный исполинский кратер занимает большую часть одной стороны Phobos; удар едва не разнёс весь спутник в клочья.
	PhobosInSpaceLowGrooves = На значительной части поверхности Phobos видно несколько удивительных систем борозд; возможно, это следы ударов вещества, выброшенного с Mars.
	PhobosInSpaceHigh = Этот кособокий спутник Mars, судя по всему, слишком мал, чтобы округлиться под собственной гравитацией, — оттого и форма у него картофелины.
	JupiterInSpaceLow = В атмосфере Jupiter видны полосы разноцветных облаков; каждую полосу свирепые ветры гонят в свою сторону.
	JupiterInSpaceLowGreatRedSpot = Эта красноватая буря, возникшая на стыке двух облачных полос, безостановочно бурлит и не думает утихать.
	JupiterInSpaceLowEquatorialBands = Устойчивые облачные полосы у экватора постоянно дуют в противоположные стороны, порождая на стыках исполинские вихри.
	JupiterInSpaceHigh = Газовый гигант Jupiter предстаёт закрученным шаром из белых и бурых облаков.
	IoInSpaceLow = Рельеф Io — это смесь ярко-жёлтой, красной, зелёной и бурой почвы; сверху занятно, но на поверхности, вероятно, всё это ядовито.
	IoInSpaceLowPyroclasticWastes = Яркие жёлтые, красные, а порой и зелёные вещества покрывают участки поверхности Io, нередко сосредоточенные вокруг действующих вулканов.
	IoInSpaceLowVolcanicSnows = На значительной части поверхности Io видны ярко-белые и серые участки — вероятно, это отражающий иней из диоксида серы.
	IoInSpaceLowVolcanicFlows = На поверхности видны тёмно-зелёные и чёрные лавовые потоки, обычно связанные с вулканическими кратерами.
	IoInSpaceLowVolcanicHotspots = На поверхности видно несколько вулканических горячих точек: одни вздымаются над многочисленными горами Io, другие — широкие впадины на ровной земле; время от времени они выбрасывают в космос шлейфы пирокластики.
	IoInSpaceHigh = Даже издалека Io являет собой завораживающее зрелище: спутник покрыт исполинскими горами и слоем ярко окрашенной местности.
	EuropaInSpaceLowRidgedPlains = Сравнительно гладкая, ярко-белая местность покрывает большую часть поверхности Europa.
	EuropaInSpaceLowArgadnelRegio = Эта растрескавшаяся местность производит впечатление разбитых ледяных щитов.
	EuropaInSpaceLowChaoticPlains = Местность в этих районах заметно темнее окружающих участков.
	EuropaInSpaceLowCrosscutPlains = В этом районе видны странные тёмные пятна, рассечённые длинными трещинами и линеаментами.
	EuropaInSpaceLowLineaments = Тёмные полосы крест-накрест пересекают большую часть поверхности Europa.
	EuropaInSpaceLowCraters = На поверхности видно несколько крошечных кратеров — вероятно, совсем свежие удары.
	EuropaInSpaceHigh = Этот ярко-белый спутник с такого расстояния кажется невероятно гладким: ни гор, ни крупных кратеров не видно.
	GanymedeInSpaceLow = Рельеф Ganymede в большинстве районов густо изрыт кратерами и, судя по всему, состоит в основном из водяного льда, укрытого тонким слоем тёмного реголита.
	GanymedeInSpaceLowCryovolcanicIce = На поверхности Ganymede видны любопытные бороздчатые образования.
	GanymedeInSpaceLowCraters = Внутри огромных кратеров, испещряющих поверхность Ganymede, замечено несколько интересных деталей.
	GanymedeInSpaceLowGilgameshBasin = Здесь виден крупный ударный кратер с относительно небольшим числом вторичных кратеров внутри.
	GanymedeInSpaceHigh = Ganymede — исполинский, коварный на вид спутник, полный любопытных форм рельефа.
	CallistoInSpaceLow = Поверхность Callisto почти насыщена ударными кратерами: почти каждый новый удар накладывается на более старые.
	CallistoInSpaceLowAsgardCrater = Похоже, это древний ударный кратер, поверх которого наложилось несколько кратеров помоложе.
	CallistoInSpaceLowValhallaCrater = Этот исполинский ударный кратер окружён несколькими концентрическими кольцевыми образованиями, возникшими, скорее всего, вскоре после удара.
	CallistoInSpaceLowYoungCraters = Светлое вещество вокруг некоторых из этих кратеров говорит о том, что образовались они относительно недавно.
	CallistoInSpaceHigh = Callisto выглядит ни дать ни взять как гигантская мишень для астероидов.
	SaturnInSpaceLow = Закручивающиеся бурые облака Saturn в непрерывном движении — их, вероятно, гонят свирепые, нескончаемые бури.
	SaturnInSpaceHigh = Плотный облачный покров Saturn скрывает всё, кроме самых верхних слоёв его атмосферы.
	TitanInSpaceLow = При внимательном изучении снимков с низкой орбиты Titan удаётся различить крупные детали поверхности.
	TitanInSpaceLowSeas = Сквозь плотный облачный покров Titan проступает то, что похоже на крупные жидкие образования на поверхности.
	TitanInSpaceHigh = Плотные облака скрывают большую часть поверхности в видимой части спектра, оставляя мало полезных данных.
	UranusInSpaceLow = Светло-голубые и белые облака Uranus укрывают всю планету, не давая заглянуть в её недра.
	UranusInSpaceHigh = На телескопических снимках атмосферы Uranus предстаёт почти лишённым деталей диском.
	PlutoInSpace = С такого расстояния Pluto выглядит тускловатым и размытым — чтобы разглядеть детали, нужно подобраться поближе.
	}
}
