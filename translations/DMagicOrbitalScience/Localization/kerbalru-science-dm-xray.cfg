	TektoSrfLandedLakes = Анализ океанов Текто показывает, что они состоят преимущественно из этана, с меньшими концентрациями метана и следами пропана, бутана, азота и бензола.
	TektoSrfLandedMudflats = Влажная почва этих регионов сложена обычными силикатами, пропитанными жидким этаном и метаном.
	TektoSrfLandedCalderas = В этом образце присутствуют различные базальтовые минералы — признак возможной вулканической активности.
	TektoSrfLandedOutcrops = Рентгеновский анализ этого образца наводит на мысль, что это часть обнажённой коренной породы Текто, со сравнительно малым количеством углеводородов, присутствующих на большей части поверхности.
	TektoSrfLandedPlateaus = Зеленоватый цвет почвы в этом образце вызван сравнительно высоким содержанием богатого железом хлорита и магматического минерала оливина.
	TektoSrfLandedStrands = Вперемешку с различными замёрзшими углеводородами присутствует несколько силикатных минералов.
	TektoSrfLandedSlopes = Рыхлая почва в этом образце — это преимущественно мелкозернистые силикаты, скорее всего выветренные жидкими углеводородами.
	TektoSrfLandedGeologicalAnomaly = Рентгеновский анализ образца с этого странной формы острова выявляет несколько необъяснимых дифракционных картин...
	TektoSrfLandedPolarRifts = Анализ образца из странной полярной области Текто выявляет несколько базальтовых силикатных минералов, вероятно, результат какой-то тектонической активности.
	PoltaSrfLanded = Рентгеновский анализ Полты показывает, что поверхность сложена в основном водяным льдом, смешанным с различными силикатными минералами.
	PoltaSrfLandedHighlands = Поверхность здесь сложена в основном водяным льдом со следами нескольких соединений серы, придающих ей слабый зелёный оттенок.
	PoltaSrfLandedHighlandDepressions = В этом образце обнаружено несколько интересных компонентов, включая сине-зелёный фосфатный минерал апатит, богатый натрием силикат содалит и соединения серы — гипс и пирит.
	PriaxSrfLandedLeadingSide = Ведущее полушарие Приакса содержит высокие концентрации сравнительно светлых, богатых алюминием минералов плагиоклазового полевого шпата, из-за чего эта область несколько светлее остальных участков поверхности.
	PriaxSrfLandedLeadingCraters = Рентгеновский анализ сильно кратерированного рельефа Приакса выявляет в основном силикатные минералы, а также ряд интересных соединений серы.
	PriaxSrfLandedTrailingSide = Рыхлая поверхность в этой области состоит преимущественно из мелко измельчённых полевошпатовых минералов.
	PriaxSrfLandedTrailingCraters = Богатые алюминием силикаты в этом образце также содержат ряд примесей тяжёлых металлов, возможно занесённых сюда при падении астероида.
	WalSrfLandedEquatorialRidge = При анализе экваториального хребта Вала обнаружено несколько мафических магматических минералов из тех, что обычно находят в мантийном слое планеты.
	WalSrfLanded = Яркая окраска Вала обусловлена рядом интересных минералов в его поверхности, включая многочисленные соединения серы, кальцит, оксид железа и оливин.
	WalSrfLandedEquatorialCraters = Тонкий слой яркого желтоватого диоксида серы покрывает лежащий ниже каменистый рельеф, сложенный в основном обычными планетарными силикатами.
	WalSrfLandedPolarCraters = Рентгеновский анализ выявляет многочисленные солевые соединения вместе с несколькими гидратированными силикатами и небольшими количествами чистого водяного льда.
	TalSrfLanded = В рентгеновском анализе этого образца обнаружены высокие уровни водяного льда и следы различных гидратированных силикатов.
	ThatmoSrfLanded = Поверхность Татмо отличается очень высокими концентрациями воды — как в виде сравнительно чистого льда, так и в различных гидратированных минералах.
	NisseeSrfLanded = В анализе поверхности Ниссее обнаружен ряд обычных силикатных минералов. Отсутствие каких-либо гидратированных минералов наводит на мысль, что подповерхностной воды на луне почти или совсем нет.
	PlockSrfLanded = Анализ образца с поверхности Плока выявляет высокие концентрации водяного льда вперемешку с различными силикатами.
	KarenSrfLanded = На поверхности Карен в изобилии обнаружены гидратированные силикаты и тёмные толиновые соединения.
	MercurySrfLanded = Рентгеновский анализ поверхности Меркурия выявляет ряд бедных железом базальтовых минералов, которые, по-видимому, образовались в крайне восстановительных условиях.
	MercurySrfLandedLowlands = Рентгеновская дифракционная картина, полученная при анализе этого образца, выявляет высокую концентрацию богатого магнием базальта и ряд минералов, обычно встречающихся в верхних слоях мантии, таких как энстатит и каноит.
	MercurySrfLandedHighlands = Этот рельеф сложен преимущественно плагиоклазовым полевым шпатом и крайне бедным железом базальтом, что придаёт Меркурию тусклую коричневато-серую окраску.
	MercurySrfLandedPolarCraters = Глубокие полярные кратеры Меркурия содержат ряд базальтовых минералов, насыщенных различными тяжёлыми металлами.
	MercurySrfLandedPlanitia = Высокие равнины Меркурия сложены магматическим материалом, богатым бедным железом базальтом и восстановленным серным минералом ольдгамитом.
	MercurySrfLandedOldCraters = Дно этого огромного кратера, судя по всему, было залито древними лавовыми потоками; эта лава богата магнием и, скорее всего, образовалась при очень высоких температурах и обладала очень низкой вязкостью.
	MercurySrfLandedYoungCraters = Поверхность этого неглубокого кратера содержит выше ожидаемого уровни железа и других тяжёлых металлов; эти элементы, скорее всего, занёс астероид, ударивший здесь.
	VenusSrfLanded = Минеральный состав Венеры в целом схож с другими планетами земной группы; она сложена преимущественно каменистыми силикатами и богатыми магнием и железом магматическими породами.
	VenusSrfLandedLowlands = Поверхность здесь — это в основном остатки старых лавовых потоков, сложенные преимущественно богатой железом базальтовой породой.
	VenusSrfLandedHighlands = В рентгеновском анализе этой возвышенной области обнаружен слой железных минералов — пирита и магнетита, придающих поверхности сравнительно светлый цвет.
	VenusSrfLandedCanyons = Каньоны здесь, возможно, были прорезаны лавовыми потоками очень высокой вязкости, состоящими из богатой магнием вулканической породы — коматиита.
	VenusSrfLandedFortunaTessera = Поверхность здесь несёт следы древних потоков жидкой серной лавы.
	VenusSrfLandedVolcanicRise = В этой области найдены высококалиевые базальтовые породы; они — признак дифференциации в недрах планеты.
	MoonSrfLandedLowlands = В рентгеновском анализе этого образца обнаружено несколько соединений тяжёлых металлов, часть из которых радиоактивна.
	MoonSrfLandedHighlands = Анализ показывает, что светлые лунные возвышенности сложены богатыми алюминием и кальцием кристаллами полевого шпата с очень низким содержанием железа и титана.
	MoonSrfLandedMidlands = Этот образец содержит разнообразные стекловидные брекчиевые минералы, образующиеся, когда яростный удар астероида сплавляет несколько минералов воедино.
	MoonSrfLandedLunarSeas = Лунная поверхность в этих низменных областях несёт следы древней вулканической активности, а также гораздо более высокие концентрации оливина и пироксена, которые обычно ожидаешь встретить лишь глубоко в мантийном слое.
	MoonSrfLandedMajorCraters = Минералы в этом кратере несут следы быстрого плавления, характерного для удара астероида или кометы.
	MoonSrfLandedFarSideBasin = В рентгеновском анализе образцов из этого бассейна обнаружен ряд соединений иридия, большая часть которых, вероятно, была занесена сюда при падении астероида.
	MoonSrfLandedNorthPole = В анализе этого образца обнаружены следы почти чистого водяного льда. Эта область большую часть времени укрыта от солнца, что позволяет водяному льду сохраняться.
	MoonSrfLandedSouthPole = В этом образце обнаружен ряд гидратированных силикатов — верный признак того, что на лунной поверхности есть сравнительно большие запасы воды.
	MarsSrfLanded = Рентгеновский анализ поверхности выявляет присутствие различных так называемых вторичных минералов, или минералов изменения — тех, что образуются в присутствии воды, — намекая, что здесь могло быть дно древнего озера.
	MarsSrfLandedMidlands = Первичный анализ поверхности Марса выявляет в основном базальтовую породу вместе с несколькими гидратированными силикатами, сульфатами и слоем оксида железа, придающим поверхности ржавую окраску.
	MarsSrfLandedHighlands = В рентгеновском анализе этого образца обнаружен ряд интересных примесных минералов, включая гематит и гётит — оксиды железа, которые, как известно, образуются в присутствии воды.
	MarsSrfLandedOlympusMons = При анализе вулкана обнаружен толстый слой базальтовой лавы.
	MarsSrfLandedVallesMarineris = Анализ этого образца выявляет сравнительно мало гидратированных минералов, он сложен преимущественно базальтовой породой; возможно, это указывает на то, что эта глубокая расщелина образовалась из древней рифтовой долины — признак более геологически активного прошлого Марса.
	MarsSrfLandedAreanMountains = Горные области Марса богаты базальтовыми минералами — возможный признак вулканического происхождения.
	MarsSrfLandedAreanCanyons = В анализе этой области каньонов найдены очень высокие концентрации гидратированных богатых серой минералов, прежде всего гипса и кизерита — признак древнего водоёма на поверхности.
	MarsSrfLandedNorthIceCap = Северный полюс Марса состоит в основном из чистого водяного льда со слоем замёрзшего углекислого газа сверху
	MarsSrfLandedSouthIceCap = Южная полярная область Марса покрыта толстым слоем водяного льда и льда из углекислого газа, что делает невозможным анализ почвы под ним.
	DeimosSrfLanded = В анализе поверхности Деймоса обнаружен ряд обычных силикатных минералов. Отсутствие каких-либо магматических пород свидетельствует о полном отсутствии внутренних процессов нагрева и наводит на мысль, что это может быть захваченный астероид.
	DeimosSrfLandedHighlands = Возвышенные районы Деймоса содержат более высокие концентрации сравнительно светлых, богатых алюминием минералов плагиоклазового полевого шпата, из-за чего эта область несколько светлее остальных участков поверхности.
	DeimosSrfLandedLowlands = В этом образце присутствует ряд щелочных полевошпатовых силикатов; эти минералы придают низменным областям Деймоса тёмно-коричневую окраску.
	PhobosSrfLanded = Рыхлая поверхность в этой области состоит преимущественно из мелко измельчённых полевошпатовых минералов.
	PhobosSrfLandedMajorCraters = Богатые алюминием силикаты в этом образце также содержат ряд примесей тяжёлых металлов, возможно занесённых сюда при падении астероида.
	PhobosSrfLandedStickneyCrater = Рентгеновская дифракционная картина этого образца выявляет несколько гидратированных силикатных минералов вместе с немногочисленными следами чистого водяного льда.
	PhobosSrfLandedGrooves = Изборождённый рельеф этой области сложен преимущественно полевошпатовыми минералами, но содержит и сравнительно высокие концентрации пироксена, обычно встречающегося в более глубоких слоях мантии.
	IoSrfLanded = Яркая окраска Ио обусловлена рядом интересных минералов в её поверхности, включая многочисленные соединения серы, кальцит, оксид железа и оливин.
	IoSrfLandedMidlands = Рентгеновский анализ этого образца показывает, что большая часть этой области покрыта остатками потоков жидкой серной лавы.
	IoSrfLandedHighlands = Анализ образцов из горных районов Ио выявляет присутствие зелёных и жёлтых кальцитовых минералов вместе со следами кварца.
	IoSrfLandedPyroclasticWastes = Тонкий слой диоксида серы покрывает лежащий ниже каменистый рельеф, сложенный в основном обычными планетарными силикатами.
	IoSrfLandedVolcanicFlows = В этом образце обнаружено несколько интересных компонентов, включая сине-зелёный фосфатный минерал апатит, богатый натрием силикат содалит и соединения серы — гипс и пирит.
	IoSrfLandedVolcanicHotspots = В рентгеновском анализе этого образца, взятого близ вулканов Ио, обнаружены базальтовые лавовые потоки.
	EuropaSrfLanded = Рентгеновский анализ этого образца с Европы выявляет в основном водяной лёд со следовыми уровнями различных солей.
	EuropaSrfLandedRidgedPlains = Поверхность Европы отличается очень высокими концентрациями воды — как в виде сравнительно чистого льда, так и в различных гидратированных минералах.
	EuropaSrfLandedArgadnelRegio = Рентгеновский дифракционный анализ показывает, что поверхность здесь содержит несколько соединений сернокислых солей, из-за чего появляются участки чуть более тёмного цвета.
	EuropaSrfLandedChaoticPlains = Вперемешку с водяным льдом присутствуют фрагменты силикатных минералов, типичных для планетарных кор.
	EuropaSrfLandedLineaments = Анализ образцов из этих тёмных линий на поверхности Европы выявляет высокие концентрации нескольких солей и каменистых силикатов.
	GanymedeSrfLanded = Состав поверхности Ганимеда — это преимущественно обычные каменистые силикаты и водяной лёд.
	GanymedeSrfLandedMidlands = Рентгеновский анализ этого образца выявляет в основном водяной лёд; обнаружены также следы многочисленных соединений серы.
	GanymedeSrfLandedTectonicDeformation = В рентгеновском анализе этого образца обнаружены богатые серой силикатные минералы.
	GanymedeSrfLandedPoles = Полюса Ганимеда покрыты сравнительно чистым инеем из водяного льда на значительную глубину.
	GanymedeSrfLandedGilgameshBasin = Этот крупный бассейн отличается высокими концентрациями нескольких органических соединений.
	CallistoSrfLanded = Анализ поверхности Каллисто выявляет смесь в основном из водяного льда и обычных планетарных силикатных минералов.
	CallistoSrfLandedLowlands = В образце найдено несколько гидратированных силикатов, хотя концентрация водяного льда сравнительно низкая, возможно из-за сублимации.
	CallistoSrfLandedCrateredHighlands = Рентгеновский анализ сильно кратерированного рельефа Каллисто выявляет в основном силикатные минералы и водяной лёд, а также ряд интересных соединений серы.
	CallistoSrfLandedValhallaCrater = Образец из этого крупного бассейна содержит следы нескольких летучих льдов, включая метан, угарный газ и аммиачный лёд.
	CallistoSrfLandedYoungCraters = Этот образец из-под поверхности одного из кратеров Каллисто — это в основном водяной лёд, по-видимому прикрытый тонким слоем каменистого материала.
	TitanSrfLandedLowlands = Рыхлая почва в этом образце — это преимущественно мелкозернистые силикаты, скорее всего выветренные жидкими углеводородами.
	TitanSrfLandedMidlands = В этом образце присутствуют различные базальтовые минералы — признак возможной вулканической активности.
	TitanSrfLandedHighlands = Рентгеновский анализ этого образца наводит на мысль, что это часть обнажённой коренной породы Титана, со сравнительно малым количеством углеводородов, присутствующих на большей части поверхности.
	TitanSrfLandedShores = Влажная почва этих регионов сложена обычными силикатами, пропитанными жидким этаном и метаном.
	TitanSrfLandedSeas = Анализ океанов Титана показывает, что они состоят преимущественно из этана, с меньшими концентрациями метана и следами пропана, бутана, азота и бензола.
	TitanSrfLandedCanyons = Анализ образца из глубоких каньонов Титана выявляет несколько базальтовых силикатных минералов, вероятно, результат какой-то тектонической активности.
	TitanSrfLandedPoles = Вперемешку с различными замёрзшими углеводородами присутствует несколько силикатных минералов.
	PlutoSrfLanded = Анализ образца с поверхности Плутона выявляет высокие концентрации водяного льда вперемешку с различными силикатами.
	AsteroidSrfLandedStony = Рентгеновский анализ этого астероида выявляет преимущественно каменистые силикатные минералы вместе со сравнительно высокими концентрациями оливина.
	AsteroidSrfLandedCarbonaceous = В анализе этого астероида обнаружено обилие летучих органических полимеров, а также следы магнетита и нескольких сульфидных минералов.
	AsteroidSrfLandedIcy-Organic = Рентгеновский анализ этого астероида выявляет ряд гидратированных силикатных минералов, а также несколько органических соединений.
	AsteroidSrfLandedCarbonaceous = Смесь воды, молекул углерода, сульфидов и железа в этом астероиде говорит о том, что он углистый.
	AsteroidSrfLandedComet = Эта комета богата кристаллическим магниевым силикатом энстатитом, а также несколькими другими сильно восстановленными минералами. Считается, что эти минералы отражают условия ранней Солнечной системы.
	AsteroidSrfLandedIcy-Organic = Анализ выявляет ряд глиноподобных силикатных минералов в поверхности этого богатого водой астероида.
	AsteroidSrfLandedMetallic = Этот астероид сложен почти целиком из металлического железа и никеля вместе с различными другими тяжёлыми металлами и следами нескольких магматических пород.
	AsteroidSrfLandedMetallic = Поверхность этого астероида сложена преимущественно сплавами железа и никеля, что наводит на мысль, что он, скорее всего, металлический.
	AsteroidSrfLandedStony = Внешние слои поверхности этого астероида — это преимущественно безводные силикаты вместе с некоторой органикой; более глубокие слои содержат кое-какие следы гидратированных минералов, что говорит о более высокой концентрации подповерхностной воды.
	AsteroidSrfLandedCarbonaceous = Этот каменистый астероид отличается необычно высоким содержанием нескольких магматических минералов.
	AsteroidSrfLandedStony = Этот астероид сложен различными богатыми железом и магнием силикатами, что придаёт ему сравнительно светлую поверхность.
	AsteroidSrfLandedStony = Анализ этого астероида выявляет преимущественно каменистые силикаты, с малым количеством металлических или гидратированных минералов в поверхности.
	}
}
