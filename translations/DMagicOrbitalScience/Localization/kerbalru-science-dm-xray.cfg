// kerbal.ru — русификатор результатов науки DMagicOrbitalScience
// Эксперимент: dmXRayDiffract (X-Ray Diffraction Scan — рентген-дифрактометр)
// Источник: DMagicOrbitalScience/Resources/ScienceDefs.cfg
// Метод: MM-патч RESULTS целиком (!RESULTS {} + новый RESULTS), дубли ключей сохранены.
// Переведено строк RESULTS: 284

@EXPERIMENT_DEFINITION:HAS[#id[dmXRayDiffract]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = В этой точке проведён детальный анализ состава поверхности.
	default = Порошковая рентгеновская дифрактометрия этого образца поверхности раскрывает его точный минеральный состав.
	KerbinSrfLanded = Возможно, это не самое эффективное применение дорогого специализированного дифрактометра, но анализ и правда даёт очень подробную раскладку минерального состава почвы Кербина.
	KerbinSrfLandedLaunchPad = Дифракционный анализ показывает в основном бетон, металл и странную смесь из чего-то похожего на застывшую органику.
	KerbinSrfLandedRunway = Анализ поверхности предсказуемо показывает в основном бетон и длинные углеводородные структуры асфальта.
	KerbinSrfLandedKSC = В этом образце обнаружена любопытная коллекция хорошо структурированных соединений железа, обычных для почвы силикатов и ряда органических соединений на разных стадиях разложения.
	KerbinSrfLandedGrasslands = Анализ кербинских лугов показывает лишь ожидаемую смесь различных силикатных минералов и нескольких видов органических соединений.
	KerbinSrfLandedTundra = Дифракционный анализ этого образца выявляет сложную смесь силикатных минералов, органических соединений и водяного льда.
	KerbinSrfLandedMountains = Образцы из горных районов Кербина содержат несколько магматических минералов, в первую очередь гранит с его разнообразными силикатными компонентами.
	KerbinSrfLandedBadlands = Этот образец состоит преимущественно из чего-то похожего на разнообразную органику, дающую очень шумную рентгеновскую дифракционную картину.
	KerbinSrfLandedDeserts = Пески пустынь Кербина состоят почти целиком из мелкозернистых кристаллов кварца, дающих несколько чётких колец на рентгеновской дифракционной картине.
	KerbinSrfLandedHighlands = Возвышенности Кербина продолжают демонстрировать поразительное сходство с низменностями Кербина.
	KerbinSrfLandedIceCaps = В анализе этого образца не обнаружено ничего, кроме чёткого кольца водяного льда.
	KerbinSrfLandedShores = Рыхлая песчаная почва оказывается в основном диоксидом кремния и кристаллами карбоната кальция.
	KerbinSrfLandedWater = Образец оказывается почти целиком водой и даёт крайне мало полезного сигнала в рентгеновском дифракционном анализе.
	KerbinSrfLandedTrackingStation = Детальный анализ минерального состава станции слежения подтверждает, что вы и правда тратите своё время впустую...
	KerbinSrfLandedVAB = Вряд ли это лучшее применение столь дорогого прибора.
	KerbinSrfLandedR&D = Серьёзно? Возвращайтесь к работе.
	KerbinSrfLandedAdministration = Проводить детальный анализ этого образца тяжело из-за криков, доносящихся от администрации KSC.
	KerbinSrfLandedSPHTanks = Пробурив поверхность, прибор теперь покрыт мелкой взвесью чего-то похожего на простые углеводороды, отличная работа...
	KerbinSrfLandedMissionControl = Полегчало на душе после того, как вы спустили драгоценные кербальские средства и время?
	MunSrfLanded = Проведён детальный рентгеновский дифракционный анализ поверхности Муны.
	MunSrfLandedCanyons = Магматические породы, найденные в этих глубоких каньонах, наводят на мысль, что они могут быть остатками древних мунарских рифтовых долин — геологических образований из ранней истории Муны.
	MunSrfLandedEastCrater = В анализе этого образца обнаружен ряд минералов, насыщенных тяжёлыми металлами; астероид, создавший этот кратер, должно быть, был богат этими металлами.
	MunSrfLandedEastFarsideCrater = В рентгеновском анализе образцов из этого кратера обнаружен ряд соединений иридия, большая часть которых, вероятно, была занесена сюда при падении астероида.
	MunSrfLandedFarsideCrater = Поверхность здесь состоит преимущественно из богатых железом базальтовых минералов, каких и ожидаешь в столь древних кратерах.
	MunSrfLandedHighlandCraters = Этот образец содержит разнообразные стекловидные брекчиевые минералы, образующиеся, когда яростный удар астероида сплавляет несколько минералов воедино.
	MunSrfLandedHighlands = Анализ показывает, что светлые мунарские возвышенности сложены богатыми алюминием и кальцием кристаллами полевого шпата с очень низким содержанием железа и титана.
	MunSrfLandedMidlandCraters = Минералы в этом кратере несут следы быстрого плавления, характерного для удара астероида или кометы.
	MunSrfLandedMidlands = Поверхность Муны в этих сравнительно низменных областях несёт следы древней вулканической активности, а также гораздо более высокие концентрации оливина и пироксена, которые обычно ожидаешь встретить лишь глубоко в мантийном слое.
	MunSrfLandedNorthernBasin = Этот крупный бассейн несёт следы магматических пород, вероятно оставшихся от древних лавовых потоков. Высокие уровни оливина и пироксена наводят на мысль, что причиной мог быть вулканизм, а не удар астероида.
	MunSrfLandedNorthwestCrater = Тёмная поверхность этого кратера сложена разнообразными богатыми железом и магнием базальтовыми минералами, а также сравнительно высокими концентрациями магнетита и оливина.
	MunSrfLandedPolarCrater = В анализе этого образца обнаружены следы почти чистого водяного льда. Высокие стены кратера укрывают эту воду от солнца, позволяя ей сохраняться.
	MunSrfLandedPolarLowlands = В этом образце обнаружен ряд гидратированных силикатов — верный признак того, что на поверхности Муны есть сравнительно большие запасы воды.
	MunSrfLandedPoles = Мелкие, но отчётливые крупинки водяного льда обнаружены среди светлых анортозитовых силикатов, обычных для мунарского реголита.
	MunSrfLandedSouthwestCrater = В рентгеновском анализе этого образца обнаружено несколько соединений тяжёлых металлов, часть из которых радиоактивна.
	MunSrfLandedTwinCraters = Несмотря на название, состав поверхности этих двух кратеров говорит о том, что они созданы двумя совершенно разными ударами астероидов. Больший кратер кажется гораздо древнее и содержит куда больше базальтовых минералов, чем меньший.
	MinmusSrfLanded = Проведён детальный рентгеновский дифракционный анализ поверхности Минмуса.
	MinmusSrfLandedHighlands = Сравнительно тёмная поверхность возвышенных областей Минмуса содержит ряд базальтовых минералов вперемешку с хлоритовыми и кальцитовыми минералами, встречающимися по всей луне.
	MinmusSrfLandedMidlands = Отчётливая зелёная окраска этого образца вызвана главным образом присутствием хлоритовых минералов, преимущественно богатой железом разновидности — шамозита.
	MinmusSrfLandedLowLands = Ярко-белая поверхность низменных областей Минмуса отличается высокими концентрациями богатого кальцием и алюминием полевого шпата вместе с кальцитовыми минералами.
	MinmusSrfLandedSlopes = Крутые склоны по составу схожи с окружающими областями; это подводит к любопытному наблюдению, что геология поверхности Минмуса почти целиком зависит от высоты, будто со временем один за другим наносились слои разных материалов.
	MinmusSrfLandedFlats = В этой ровной области поверхности Минмуса присутствуют гидратированные минералы карбоната кальция, напоминающие рыхло схваченный цемент.
	MinmusSrfLandedGreatFlats = В рентгеновском анализе этого образца обнаружена смесь кальцита и его полиморфов — арагонита и ватерита, придающая поверхности слегка искристый вид.
	MinmusSrfLandedGreaterFlats = Зелёная окраска здесь вызвана смесью некоторых хлоритовых минералов и магматических оливиновых силикатов — признак того, что эти равнины могут быть остатками какой-то древней вулканической активности.
	MinmusSrfLandedLesserFlats = Помимо обычных для поверхности Минмуса кальцитовых минералов, в рентгеновском анализе этого образца обнаружено небольшое количество кристаллов кварца.
	MinmusSrfLandedPoles = Анализ этого полярного образца выявляет ряд гидратированных силикатных минералов, но почти или совсем не содержит чистого водяного льда.
	MohoSrfLanded = Рентгеновский анализ поверхности Мохо выявляет ряд бедных железом базальтовых минералов, которые, по-видимому, образовались в крайне восстановительных условиях.
	MohoSrfLanded = Базальтовые и другие магматические минералы покрывают поверхность Мохо; в прошлом планеты, должно быть, была бурная вулканическая активность.
	MohoSrfLandedPolarCrater = Глубокий полярный кратер Мохо содержит ряд базальтовых минералов, насыщенных различными тяжёлыми металлами.
	MohoSrfLandedCentralCrater = Рентгеновская дифракционная картина, полученная при анализе этого образца, выявляет высокую концентрацию богатого магнием базальта и ряд минералов, обычно встречающихся в верхних слоях мантии, таких как энстатит и каноит.
	MohoSrfLandedDeepCrater = Анализ состава этого кратера выявляет ряд минералов, образующихся только в сильно восстановительных условиях.
	MohoSrfLandedSouthernCrater = Дно этого огромного кратера, судя по всему, было залито древними лавовыми потоками; эта лава богата магнием и, скорее всего, образовалась при очень высоких температурах и обладала очень низкой вязкостью.
	MohoSrfLandedMidlandCraters = Анализ этого образца, найденного в одном из средних по размеру кратеров Мохо, говорит о том, что он — продукт сравнительно недавнего удара.
	MohoSrfLandedMidlands = Восстановленное железо и серосодержащие минералы в этом образце напоминают те, что находят в редких энстатитовых астероидах.
	MohoSrfLandedHighlandCraters = Поверхность этого неглубокого кратера содержит выше ожидаемого уровни железа и других тяжёлых металлов; эти элементы, скорее всего, занёс астероид, ударивший здесь.
	MohoSrfLandedHighlands = Этот рельеф сложен преимущественно плагиоклазовым полевым шпатом и крайне бедным железом базальтом, что придаёт Мохо коричневатую окраску.
	MohoSrfLandedLowlands = Огромная южная полярная равнина Мохо сложена магматическим материалом, богатым бедным железом базальтом и восстановленным серным минералом ольдгамитом.
	MohoSrfLandedNorthernSinkhole = Глубокий полярный кратер Мохо содержит ряд базальтовых минералов, насыщенных различными тяжёлыми металлами.
	MohoSrfLandedCentralLowlands = Рентгеновская дифракционная картина, полученная при анализе этого образца, выявляет высокую концентрацию богатого магнием базальта и ряд минералов, обычно встречающихся в верхних слоях мантии, таких как энстатит и каноит.
	MohoSrfLandedSouthEasternLowlands = Дно этого огромного кратера, судя по всему, было залито древними лавовыми потоками; эта лава богата магнием и, скорее всего, образовалась при очень высоких температурах и обладала очень низкой вязкостью.
	MohoSrfLandedMinorCraters = Анализ этого образца, найденного в одном из средних по размеру кратеров Мохо, говорит о том, что он — продукт сравнительно недавнего удара.
	MohoSrfLandedSouthWesternLowlands = Анализ состава этого кратера выявляет ряд минералов, образующихся только в сильно восстановительных условиях.
	EveSrfLanded = Рентгеновский анализ поверхности Ив выявляет редкие литиевые силикаты — нептунит и сугилит, оба из которых придают Ив фиолетовый оттенок.
	EveSrfLandedPlains = Рентгеновский анализ поверхности Ив выявляет редкие литиевые силикаты — нептунит и сугилит, оба из которых придают Ив фиолетовый оттенок.
	EveSrfLandedMountains = Более тёмная почва горных вершин Ив отличается сравнительно высоким содержанием богатых железом базальтовых минералов, а также ряда литиево-силикатных соединений.
	EveSrfLandedIslands = В этом образце наблюдается высокое содержание литиево-силикатного минерала лепидолита. Такой минерал может служить превосходным источником нескольких редких щелочных металлов.
	EveSrfLandedPoles = Рентгеновская дифракционная картина, полученная при анализе этого образца, показывает ряд чётких сигналов, характерных для крупных, хорошо упорядоченных кристаллов аметиста.
	EveSrfLandedImpactSites = Анализ образца из одного из ударных кратеров Ив выявляет невероятно редкий минерал путнисит, известный своим уникальным элементным составом. Присутствие столь сильно гидратированного минерала говорит о том, что у поверхности есть значительные запасы воды.
	EveSrfLandedCraterLake = Этот образец содержит ряд силикатов, обычных для образцов Ив, но со сравнительно высоким уровнем примесей тяжёлых металлов, что наводит на мысль о том, что озеро и прилегающая местность довольно токсичны.
	EveSrfLandedMidlands = Рентгеновский анализ поверхности Ив выявляет редкие литиевые силикаты — нептунит и сугилит, оба из которых придают Ив фиолетовый оттенок.
	EveSrfLandedPeaks = Более тёмная почва горных вершин Ив отличается сравнительно высоким содержанием богатых железом базальтовых минералов, а также ряда литиево-силикатных соединений.
	EveSrfLandedImpactEjecta = Анализ образца из одного из ударных кратеров Ив выявляет невероятно редкий минерал путнисит, известный своим уникальным элементным составом. Присутствие столь сильно гидратированного минерала говорит о том, что у поверхности есть значительные запасы воды.
	EveSrfLandedExplodiumSea = Этот образец содержит ряд силикатов, обычных для образцов Ив, но со сравнительно высоким уровнем примесей тяжёлых металлов, что наводит на мысль о том, что озеро и прилегающая местность довольно токсичны.
	EveSrfLandedLowlands = Рентгеновский анализ поверхности Ив выявляет редкие литиевые силикаты — нептунит и сугилит, оба из которых придают Ив фиолетовый оттенок.
	EveSrfLandedHighlands = Поверхность здесь сложена рядом силикатов вместе с некоторыми следами кристаллов аметиста.
	GillySrfLanded = В анализе поверхности Гилли обнаружен ряд обычных силикатных минералов. Отсутствие каких-либо магматических пород свидетельствует о полном отсутствии у Гилли внутренних процессов нагрева и наводит на мысль, что это может быть захваченный астероид.
	GillySrfLandedHighlands = Возвышенные районы Гилли содержат более высокие концентрации сравнительно светлых, богатых алюминием минералов плагиоклазового полевого шпата, из-за чего эта область несколько светлее остальных участков поверхности.
	GillySrfLandedLowlands = В этом образце присутствует ряд щелочных полевошпатовых силикатов; эти минералы придают низменным областям Гилли тёмно-коричневую окраску.
	GillySrfLandedMidlands = В анализе поверхности Гилли обнаружен ряд обычных силикатных минералов. Отсутствие каких-либо магматических пород свидетельствует о полном отсутствии у Гилли внутренних процессов нагрева и наводит на мысль, что это может быть захваченный астероид.
	DunaSrfLanded = В рентгеновском анализе этого образца обнаружен ряд интересных примесных минералов, включая гематит и гётит — оксиды железа, которые, как известно, образуются в присутствии воды.
	DunaSrfLandedNorthPole = Северный полюс Дюны состоит в основном из чистого водяного льда со слоем замёрзшего углекислого газа сверху.
	DunaSrfLandedSouthPole = Южная полярная область Дюны покрыта толстым слоем водяного льда и льда из углекислого газа, что делает невозможным анализ почвы под ним.
	DunaSrfLandedKerinerValley = В анализе поверхности долины Керинер найдены очень высокие концентрации гидратированных богатых серой минералов, прежде всего гипса и кизерита — признак древнего водоёма на поверхности в этой области.
	DunaSrfLandedMaria = Рентгеновский анализ поверхности выявляет присутствие различных так называемых вторичных минералов, или минералов изменения — тех, что образуются в присутствии воды, — намекая, что здесь могло быть дно древнего озера.
	DunaSrfLandedDepressions = Поверхность этой низменной области покрыта различными магматическими породами и содержит высокие концентрации оливина и высококальциевого пироксена — признак того, что эту область покрывали древние лавовые потоки.
	DunaSrfLandedMountains = Возвышенные области Дюны богаты базальтовыми минералами — возможный признак вулканического происхождения.
