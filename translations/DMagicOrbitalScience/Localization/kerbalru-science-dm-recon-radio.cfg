// kerbal.ru — русификатор ScienceDefs (результаты экспериментов)
// Мод: DMagicOrbitalScience
// Эксперименты: dmReconScan (Recon Scan / разведка), dmRadiometerScan (Irradiance Scan / радиометр)
// Метод: :FINAL-патч RESULTS — полная замена блока переведёнными строками.
// НЕ ТРОГАТЬ ключи ситуаций (default, KerbinInSpaceLow..., KerbinInSpaceHigh, ...). Дубли сохранены.

@EXPERIMENT_DEFINITION:HAS[#id[dmReconScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Получены крайне детальные разведывательные снимки поверхности.
	KerbinInSpaceLowNorthernHemisphere = На орбитальных снимках поверхности Kerbin замечено несколько любопытных визуальных аномалий.
	KerbinInSpaceLowNorthernHemisphere = Детальнейшие снимки с захватывающей чёткостью показывают безликий рельеф Kerbin.
	KerbinInSpaceLowSouthernHemisphere = Внимательный осмотр южного полушария Kerbin выявляет на удивление мало интересного.
	KerbinInSpaceLowSouthernHemisphere = Тщательный анализ стереоснимков южного полушария Kerbin обнаруживает на поверхности ряд аномальных структур.
	MunInSpaceLowNorthernHemisphere = Во время разведки северного полушария Mun сфотографировано несколько странных, неестественно выглядящих объектов.
	MunInSpaceLowNorthernHemisphere = Орбитальные снимки поверхности Mun показывают наслаивающиеся кратеры разных размеров, но в основном — пыль и камни.
	MunInSpaceLowSouthernHemisphere = Пристальный осмотр снимка, сделанного при наблюдении южного полушария Mun, обнаруживает несомненно искусственный объект.
	MunInSpaceLowSouthernHemisphere = Разведывательный облёт поверхности Mun не выявил ничего интересного; несколько любопытных визуальных аномалий — скорее всего, артефакты самих камер.
	MinmusInSpaceLowNorthernHemisphere = Детальные снимки Minmus не показывают ничего интересного, хотя над одним участком северного полушария луны раз за разом появляется какой-то размытый артефакт.
	MinmusInSpaceLowNorthernHemisphere = Странные плоские просторы Minmus выглядят как некие безликие замёрзшие озёра — довольно необычно для луны таких скромных размеров.
	MinmusInSpaceLowSouthernHemisphere = Тщательный анализ предельно детальных снимков Minmus выявляет области, которые поразительно... плоские.
	MinmusInSpaceLowSouthernHemisphere = Единственное, что здесь представляет интерес, — любопытные зелёные равнины Minmus.
	SunInSpaceLow = Что ж, возможно, это не самая лучшая идея...
	SunInSpaceLow = К счастью, конструкторы этого прибора предусмотрели, что им будут пользоваться и не самые сообразительные пользователи...
	MohoInSpaceLowNorthernHemisphere = Снимки в видимом свете гористого северного полушария Moho показывают негостеприимный рельеф.
	MohoInSpaceLowNorthernHemisphere = Детальные снимки поверхности Moho раскрывают тонкие подробности строения многочисленных ударных кратеров планеты.
	MohoInSpaceLowSouthernHemisphere = Анализ снимков южных областей Moho выявляет тонкие очертания в породе, намекающие на историю древних лавовых потоков.
	MohoInSpaceLowSouthernHemisphere = Несколько очень крупных кратеров разрывают обширные, судя по всему, поля древних лавовых потоков в южном полушарии Moho.
	EveInSpaceLowNorthernHemisphere = Плотная атмосфера скрывает большую часть поверхности Eve, но снимки выдают присутствие нескольких очень высоких обособленных пиков в северном полушарии планеты.
	EveInSpaceLowNorthernHemisphere = Плотная атмосфера Eve затрудняет орбитальную разведку поверхности, но всё же удаётся различить несколько интересных деталей.
	EveInSpaceLowSouthernHemisphere = Значительная часть поверхности Eve покрыта обширными океанами; детальные снимки береговых линий выявляют следы продолжающейся эрозии и выветривания.
	EveInSpaceLowSouthernHemisphere = Снимки сквозь толстую атмосферу Eve обнаруживают большое озеро, покрывающее значительную часть южного полушария.
	GillyInSpaceLow = Крохотная луна Gilly не показывает ничего интересного при орбитальных облётах поверхности.
	GillyInSpaceLow = Кажется, тонко настроенные возможности разведывательного телескопа тратятся впустую на бедную, безликую Gilly.
	DunaInSpaceLowNorthernHemisphere = Разведснимки поверхности Duna подтверждают наличие невероятного подобия кербальского лица, высеченного в грунте.
	DunaInSpaceLowNorthernHemisphere = Большие полярные ледяные шапки покрывают значительную часть поверхности Duna; в более экваториальных областях планеты видно множество интересных геологических образований.
	DunaInSpaceLowSouthernHemisphere = На снимках южного полушария Duna заметны очертания объекта любопытной формы.
	DunaInSpaceLowSouthernHemisphere = Небольшая деталь на снимке южного полушария Duna показывает нечто похожее на крохотный искусственный объект, торчащий из поверхности.
	IkeInSpaceLowNorthernHemisphere = Единственная огромная луна Duna не показывает ничего интересного на орбитальных снимках своей поверхности.
	IkeInSpaceLowSouthernHemisphere = Детальные снимки Ike показывают поверхность, судя по всему, покрытую древними лавовыми потоками.
	DresInSpaceLowNorthernHemisphere = На некоторых снимках, сделанных при испытаниях камер, замечены признаки планеты; вот так сюрприз!
	DresInSpaceLowSouthernHemisphere = Не-а... это просто пыль на зеркале, на обоих зеркалах... в одном и том же месте.
	JoolInSpaceLowNorthernHemisphere = На снимках газового гиганта видны лишь верхушки клубящихся зелёных облаков Jool.
	JoolInSpaceLowSouthernHemisphere = Клубящиеся зелёные облака Jool дают интересные снимки, но скрывают любые детали того, что лежит под ними.
	LaytheInSpaceLowNorthernHemisphere = Повторные снимки песчаных островов Laythe показывают, что они постоянно смещаются в огромных океанах.
	LaytheInSpaceLowNorthernHemisphere = Крохотные, безликие острова усеивают поверхность северного полушария Laythe.
	LaytheInSpaceLowSouthernHemisphere = Огромный океан Laythe покрывает большую часть луны и скрывает лежащую под ним поверхность от изучения по орбитальным снимкам.
	LaytheInSpaceLowSouthernHemisphere = Во время наблюдения за луной получено очень, очень много снимков волнистого океана Laythe.
	VallInSpaceLowNorthernHemisphere = На высококачественных снимках, полученных при разведывательном облёте луны, видны трещины и разломы поверхности Vall.
	VallInSpaceLowNorthernHemisphere = Ледяная поверхность Vall покрыта странным повторяющимся узором, снова и снова проступающим на снимках луны.
	VallInSpaceLowSouthernHemisphere = В южном полушарии Vall замечен любопытный визуальный артефакт — это требует дальнейшего изучения.
	VallInSpaceLowSouthernHemisphere = В южной полярной области Vall наблюдается любопытная группа структур искусственного вида.
	TyloInSpaceLowNorthernHemisphere = Тщательный анализ снимков северного полушария Tylo показывает любопытную структуру с чем-то вроде небольшого отверстия в боку.
	TyloInSpaceLowNorthernHemisphere = Северное полушарие Tylo густо покрыто кратерами, и снимки выявляют следы каких-то странных аномалий.
	TyloInSpaceLowSouthernHemisphere = Яркая гористая поверхность Tylo не выглядит слишком гостеприимной на крупных планах через камеру.
	TyloInSpaceLowSouthernHemisphere = Детальные снимки каменистой поверхности Tylo не показывают ничего интересного.
	BopInSpaceLowNorthernHemisphere = На снимках поверхности Bop как будто проступают очертания странного объекта органического вида, но сам объект полностью засвечен...
	BopInSpaceLowNorthernHemisphere = Северное полушарие Bop состоит из сплошного каменистого рельефа; впрочем, снимки одного участка почему-то раз за разом выходят с испорченной плёнкой, любопытно...
	BopInSpaceLowSouthernHemisphere = Орбитальная разведка бугристой поверхности Bop не выявляет ничего интересного.
	BopInSpaceLowSouthernHemisphere = Крохотная луна Bop не являет ничего интересного при повторных облётах её южного полушария.
	PolInSpaceLowNorthernHemisphere = Наблюдение за крохотной луной Pol не выявляет ничего, кроме скальных образований любопытной формы, покрывающих большую часть поверхности.
	PolInSpaceLowNorthernHemisphere = Орбитальные снимки показывают, что гористая поверхность Pol складывается из множества интересных красок.
	PolInSpaceLowSouthernHemisphere = Снимки красочного рельефа Pol выявляют следы интересной геологии поверхности и опасные условия для посадки.
	PolInSpaceLowSouthernHemisphere = Стереоснимки поверхности Pol показывают, насколько эта луна непригодна для посадки.
	EelooInSpaceLowNorthernHemisphere = Поверхность Eeloo испещрена множеством низменных полос; детальные снимки показывают, что окружающий белый рельеф — это тонкое порошкообразное вещество.
	EelooInSpaceLowNorthernHemisphere = Ярко-белая поверхность Eeloo странно выглядит на орбитальных снимках — почти как порошковое покрытие, а не ледяной панцирь.
	EelooInSpaceLowSouthernHemisphere = Орбитальная разведка Eeloo показывает множество тёмно-коричневых полос, разрывающих странное белое вещество, покрывающее остальную поверхность.
	EelooInSpaceLowSouthernHemisphere = Детальные снимки поверхности Eeloo выявляют не ожидаемые ледяные щиты, а нечто похожее на тонкий белый порошок, покрывающий большую часть планеты.
	SarnusInSpaceLowNorthernHemisphere = Светло-коричневые облачные полосы в атмосфере Sarnus запечатлены с изысканной детальностью.
	SarnusInSpaceLowSouthernHemisphere = Густые коричневатые облака Sarnus господствуют на всех орбитальных снимках этого газового гиганта.
	HaleInSpaceLow = Орбитальная разведка Hale не выявляет ничего интересного.
	OvokInSpaceLow = Даже при пристальном изучении снимки показывают, что поверхность Ovok на удивление гладкая.
	SlateInSpaceLowNorthernHemisphere = Снимки обширных низменностей Slate показывают нечто похожее на песчаное дно древнего океана.
	SlateInSpaceLowNorthernHemisphere = Разведывательные облёты Slate выявляют завораживающий рельеф с множеством признаков того, что когда-то луну покрывал большой океан.
	SlateInSpaceLowSouthernHemisphere = У некоторых гор Slate есть скальные образования со следами относительно недавней вулканической активности.
	TektoInSpaceLowNorthernHemisphere = Снимки сквозь мглистую атмосферу Tekto показывают рельеф со следами постоянного выветривания и эрозии.
	TektoInSpaceLowSouthernHemisphere = Толстая атмосфера Tekto не даёт орбитальной камере как следует разглядеть поверхность; впрочем, под облаками угадываются признаки множества интересных образований.
	TektoInSpaceLowSouthernHemisphere = Большие озёра и реки Tekto выглядят весьма буйными, со следами экстремального волнения.
	UrlumInSpaceLow = Густые облака в атмосфере ледяного гиганта Urlum скрывают любые черты его недр.
	PoltaInSpaceLow = Детальные снимки клубящихся зелёных образований на поверхности Polta выявляют признаки активной геологической деятельности.
	PriaxInSpaceLow = Орбитальная разведка густо покрытой кратерами луны Priax наводит на мысль, что это может быть крупный захваченный астероид.
	WalInSpaceLow = Разведывательные облёты Wal выявляют несколько завораживающих деталей рельефа; впрочем, его экваториальный хребет не показывает признаков продолжающейся геологической активности.
	TalInSpaceLow = Снимки блестящей поверхности Tal не показывают ничего особо интересного.
	NeidonInSpaceLowNorthernHemisphere = На снимках атмосферы Neidon видны лишь фиолетовые облачные полосы.
	NeidonInSpaceLowSouthernHemisphere = Тёмно-фиолетовые облака Neidon скрывают поверхность от орбитальных камер, но всё равно дают потрясающий кадр.
	ThatmoInSpaceLowNorthernHemisphere = Видно, что глубокие разломы и каньоны покрывают большую часть поверхности Thatmo.
	ThatmoInSpaceLowSouthernHemisphere = Разреженная атмосфера Thatmo почти не мешает разглядеть разнообразные интересные детали его поверхности.
	NisseeInSpaceLowNorthernHemisphere = Снимки меловой каменистой поверхности Nissee почти не выявляют интересных деталей.
	NisseeInSpaceLowSouthernHemisphere = Орбитальный разведывательный облёт Nissee выявляет несколько интересных крупных кратеров, но ничего сверхъестественного.
	PlockInSpaceLowNorthernHemisphere = Орбитальные снимки Plock выявляют множество интересных деталей рельефа, которые так и просятся на дальнейшее изучение.
	PlockInSpaceLowSouthernHemisphere = На детальных снимках, сделанных с орбиты, видны любопытные следы продолжающегося выветривания поверхности Plock.
	KarenInSpaceLowNorthernHemisphere = На поверхности Karen, похоже, относительно немного ударных кратеров; возможно, это следствие её удалённости от плотной внутренней части солнечной системы.
	KarenInSpaceLowSouthernHemisphere = Снимки крохотной луны Karen выявляют несколько интересных деталей в видимом диапазоне.
	MercuryInSpaceLowNorthernHemisphere = Анализ снимков поверхности Mercury выявляет тонкие очертания в породе, намекающие на историю древних лавовых потоков.
	MercuryInSpaceLowSouthernHemisphere = Несколько очень крупных кратеров разрывают обширные, судя по всему, поля древних лавовых потоков на поверхности Mercury.
	VenusInSpaceLowSouthernHemisphere = Плотная атмосфера скрывает большую часть поверхности Venus, но снимки выдают присутствие нескольких очень высоких обособленных пиков на планете.
	VenusInSpaceLowNorthernHemisphere = Плотная атмосфера Venus затрудняет орбитальную разведку поверхности, но всё же удаётся различить несколько интересных деталей.
	MoonInSpaceLowNorthernHemisphere = На детальных снимках низменностей Moon видно множество следов древних лавовых потоков.
	MoonInSpaceLowSouthernHemisphere = На снимках видимой и обратной стороны южного полушария Moon заметны интересные различия.
	MarsInSpaceLowNorthernHemisphere = Небольшие полярные ледяные шапки покрывают северные пределы поверхности Mars; в более экваториальных областях планеты также видно множество интересных геологических образований.
	MarsInSpaceLowSouthernHemisphere = Чуть южнее экватора на Mars видна колоссальная система каньонов.
	DeimosInSpaceLow = Крохотная луна Deimos не являет ничего интересного при повторных облётах её поверхности.
	PhobosInSpaceLow = Если не считать единственного крупного кратера, господствующего на одной стороне Phobos, снимки поверхности не показывают ничего интересного.
	JupiterInSpaceLow = Клубящиеся красно-коричневые облака Jupiter дают интересные снимки, но скрывают любые детали того, что лежит под ними.
	IoInSpaceLowNorthernHemisphere = Разведснимки поверхности Io показывают, насколько эта луна непригодна для посадки.
	IoInSpaceLowSouthernHemisphere = Близкие орбитальные снимки луны Io выявляют колоссальную геологическую активность, непрерывно перекраивающую поверхность.
	EuropaInSpaceLowNorthernHemisphere = На высококачественных снимках, полученных при разведывательном облёте луны, видны трещины и разломы поверхности Europa.
	EuropaInSpaceLowSouthernHemisphere = Орбитальные снимки ледяной луны Europa выявляют обширную сеть сложных трещин и разломов.
	GanymedeInSpaceLowNorthernHemisphere = Детальные снимки каменисто-ледяной поверхности Ganymede не показывают ничего интересного.
	GanymedeInSpaceLowSouthernHemisphere = Разведывательные облёты Ganymede выявляют множество относительно молодых на вид кратеров, что говорит о частой бомбардировке луны ударами.
	CallistoInSpaceLowNorthernHemisphere = Высокодетальные снимки густо покрытой кратерами поверхности Callisto помогут определить возраст и происхождение её многочисленных ударных мест.
	CallistoInSpaceLowSouthernHemisphere = Орбитальные снимки Callisto показывают, что почти нет ни клочка рельефа, не покрытого наслаивающимися кратерами.
	SaturnInSpaceLowNorthernHemisphere = Светло-коричневые облачные полосы в атмосфере Saturn запечатлены с изысканной детальностью.
	SaturnInSpaceLowSouthernHemisphere = Полярные штормы Saturn непрерывно видны на повторных орбитальных снимках облачной атмосферы газового гиганта.
	TitanInSpaceLowNorthernHemisphere = Снимки сквозь мглистую атмосферу Titan показывают рельеф со следами постоянного выветривания и эрозии.
	TitanInSpaceLowSouthernHemisphere = При внимательном изучении снимков с низкой орбиты Titan удаётся различить множество крупных поверхностных озёр.
	UranusInSpaceLow = Густые облака в атмосфере ледяного гиганта Uranus скрывают любые черты его недр.
	PlutoInSpaceLowNorthernHemisphere = Огромная, гладкая и свободная от кратеров область покрывает значительную часть северной приэкваториальной зоны Pluto.
	PlutoInSpaceLowSouthernHemisphere = Орбитальные снимки Pluto выявляют множество интересных деталей рельефа, которые так и просятся на дальнейшее изучение.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[dmRadiometerScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Собрана точная запись отражённого солнечного излучения этой планеты.
	default = Измерения в широком диапазоне длин волн от УФ до ИК дают подробности о составе и характеристиках этой планеты.
	KerbinInSpaceHigh = Покрытая океанами поверхность Kerbin даёт довольно низкое альбедо в видимом свете, а плотная атмосфера поглощает большую часть УФ- и ближнего ИК-излучения.
	KerbinInSpaceHigh = Проведены полные измерения отражённого солнечного излучения Kerbin; возможно, долговременные записи таких данных покажут, как на климат Kerbin влияют почти непрерывные ракетные запуски с поверхности планеты...
	MunInSpaceHigh = Отражающий реголит на поверхности Mun придаёт луне очень высокое альбедо на большей части диапазона от УФ до ближнего ИК.
	MinmusInSpaceHigh = Яркая поверхность Minmus отражает большую часть видимого и ИК-света; впрочем, канал дальнего ИК фиксирует лишь слабый сигнал, что указывает на отсутствие внутренней геологической активности, способной породить такое тепловое излучение.
	SunInSpaceHigh = Солнце непрерывно излучает свет на всех регистрируемых длинах волн, едва не перегружая датчики.
	MohoInSpaceHigh = Близость к солнцу приводит к высоким абсолютным уровням излучения, несмотря на относительно тёмную и поглощающую ИК поверхность Moho.
	EveInSpaceHigh = Толстая атмосфера Eve поглощает большинство длин волн в спектре от УФ до дальнего ИК; лишь канал видимого света фиксирует сколько-нибудь значимые уровни отражённого света.
	GillyInSpaceHigh = Безликая поверхность Gilly отражает мало видимого и ИК-света — следствие её тёмной, богатой силикатами и поглощающей ИК поверхности.
	DunaInSpaceHigh = Сильное поглощение УФ и коротковолнового ИК атмосферой Duna говорит о высоком содержании углекислого газа и, возможно, озона.
	DunaInSpaceHigh = Яркие полярные области Duna отражают большую часть видимого света, придавая планете высокое общее альбедо.
	IkeInSpaceHigh = Яркая поверхность Ike сильно отражает видимый и УФ-свет; ИК-каналы фиксируют куда меньшую отдачу.
	DresInSpaceHigh = Кратковременное дрожание температурных показаний радиометров намекает на присутствие некоего объекта поблизости; вероятно, просто ошибка калибровки.
	JoolInSpaceHigh = Сильные тепловые показания УФ- и ИК-радиометров, снятые при сканировании Jool, скорее всего вызваны внутренним излучением — возможно, от полярных сияний или иных электрических бурь, — а не отражённым солнечным излучением.
	LaytheInSpaceHigh = При сканировании Laythe обнаружены значимые длинноволновые ИК-сигналы; обычно это признак внутреннего теплового излучения из-за геологической активности.
	VallInSpaceHigh = Яркая поверхность Vall и отсутствие плотной атмосферы позволяют отражать большую часть падающего излучения; лишь в УФ-каналах есть несколько провалов, указывающих на присутствие поглощающего УФ водяного льда на поверхности.
	TyloInSpaceHigh = Очень яркая поверхность Tylo отражает большую часть видимого и УФ-света, придавая луне очень высокое общее альбедо.
	BopInSpaceHigh = Bop являет любопытно высокий уровень прерывистого излучения в ближнем и дальнем ИК; её удалённость от солнца и отсутствие какой-либо геологической активности, казалось бы, исключают простые объяснения таких явлений...
	PolInSpaceHigh = Канал видимого света улавливает лишь скромный сигнал, зато УФ- и ИК-радиометры измеряют очень высокие уровни света, отражённого поверхностью Pol.
	EelooInSpaceHigh = Почти белая поверхность Eeloo отражает почти весь УФ-, видимый и ИК-свет, исключая возможность водяного льда. Возможно, поверхность покрыта чем-то поинтереснее...
	SarnusInSpaceHigh = Яркие краски атмосферы Sarnus отражают значительное количество видимого света.
	HaleInSpaceHigh = У этой крохотной луны умеренное альбедо в видимом свете: примерно половина поверхности крайне яркая, тогда как другая половина очень тёмная.
	OvokInSpaceHigh = Во всём видимом спектре Ovok отражает почти весь свет; её УФ- и ИК-сигналы лишь немного ниже.
	SlateInSpaceHigh = Яркая поверхность Slate и отсутствие атмосферы приводят к тому, что отражается большая часть света в диапазоне от УФ до ИК.
	TektoInSpaceHigh = В отражениях УФ и видимого света Tekto выглядит очень тёмной, но чувствительные к ИК радиометры улавливают высокие уровни отражённого света.
	UrlumInSpaceHigh = Яркий верхний облачный слой Urlum отражает почти весь видимый свет.
	PoltaInSpaceHigh = Яркая зеленоватая поверхность Polta отражает значительное количество видимого света, что намекает на возможное высокое содержание водяного льда на её поверхности.
	PriaxInSpaceHigh = Светлый каменистый вид Priax наводит на мысль, что это может быть захваченный каменный астероид — нечто не вполне ожидаемое так далеко в солнечной системе.
	WalInSpaceHigh = Красочная поверхность Wal отражает значительное количество видимого и УФ-света, хотя её ИК-излучение чуть ниже.
	TalInSpaceHigh = Тёмная поверхность Tal выглядит будто отполированной, отражая значительные уровни видимого света.
	NeidonInSpaceHigh = Показания с Neidon демонстрируют очень высокие уровни излучения в дальнем ИК; скорее всего, они возникают из-за некоего внутреннего нагрева, а не отражённого света.
	ThatmoInSpaceHigh = Яркий цвет Thatmo отражает значительное количество видимого света на большинстве длин волн.
	NisseeInSpaceHigh = Отполированный, будто мраморный, вид Nissee сильно отражает как в видимых, так и в УФ-длинах волн.
	PlockInSpaceHigh = У Plock чередуются области высокого и низкого альбедо, что говорит о значительной дифференциации поверхности.
	KarenInSpaceHigh = Тёмная поверхность Karen отражает мало видимого света, но обладает относительно высоким уровнем УФ-отражений.
	MercuryInSpaceHigh = Близость к солнцу приводит к высоким абсолютным уровням излучения, несмотря на относительно тёмную и поглощающую ИК поверхность Mercury.
	VenusInSpaceHigh = Толстая атмосфера Venus поглощает большинство длин волн в спектре от УФ до дальнего ИК; лишь канал видимого света фиксирует сколько-нибудь значимые уровни отражённого света.
	MoonInSpaceHigh = Отражающий реголит на поверхности Moon придаёт ей очень высокое альбедо на большей части диапазона от УФ до ближнего ИК.
	MarsInSpaceHigh = Сильное поглощение УФ и коротковолнового ИК атмосферой Mars говорит о высоком содержании углекислого газа и, возможно, озона.
	DeimosInSpaceHigh = Безликая поверхность Deimos отражает мало видимого и ИК-света — следствие её тёмной, богатой силикатами и поглощающей ИК поверхности.
	PhobosInSpaceHigh = Тёмная поверхность Phobos слабо отражает видимый и УФ-свет; ИК-каналы фиксируют куда меньшую отдачу.
	JupiterInSpaceHigh = Сильные тепловые показания УФ- и ИК-радиометров, снятые при сканировании Jupiter, скорее всего вызваны внутренним излучением — возможно, от полярных сияний или иных электрических бурь, — а не отражённым солнечным излучением.
	IoInSpaceHigh = Канал видимого света улавливает умеренный сигнал, зато УФ- и ИК-радиометры измеряют очень высокие уровни света, отражённого поверхностью Io.
	EuropaInSpaceHigh = Яркая поверхность Europa и отсутствие плотной атмосферы позволяют отражать большую часть падающего излучения; лишь в УФ-каналах есть несколько провалов, указывающих на присутствие поглощающего УФ водяного льда на поверхности.
	GanymedeInSpaceHigh = Очень яркая поверхность Ganymede отражает большую часть видимого и УФ-света, придавая луне очень высокое общее альбедо.
	CallistoInSpaceHigh = Яркая поверхность Callisto и отсутствие атмосферы приводят к тому, что отражается большая часть света в диапазоне от УФ до ИК.
	SaturnInSpaceHigh = Яркие краски атмосферы Saturn отражают значительное количество видимого света.
	TitanInSpaceHigh = В отражениях УФ и видимого света Titan выглядит очень тёмным, но чувствительные к ИК радиометры улавливают высокие уровни отражённого света.
	UranusInSpaceHigh = Яркий верхний облачный слой Uranus отражает почти весь видимый свет.
	PlutoInSpaceHigh = Во всём видимом спектре у Pluto очень высокое альбедо; его УФ- и ИК-сигналы лишь немного ниже.
	}
}
