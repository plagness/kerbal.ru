		MunSrfLandedSouthwestCrater = В этом кратере зафиксированы высокие концентрации тяжёлых металлов; длительное пребывание в этой зоне не рекомендуется.
		MunSrfLandedTwinCraters = Поверхность этого кратера покрыта лишь тонким слоем мунарского реголита. Лазерный анализ породы под ним указывает на высокие концентрации нескольких тяжёлых металлов.
		MinmusSrfLanded = Высокие концентрации неорганических материалов разбивают всякую надежду открыть внеземной рудник по добыче мороженого.
		MinmusSrfLandedHighlands = Поверхностная порода здесь показывает высокие концентрации магния, алюминия, железа, никеля, марганца и кремния — элементов, из которых состоит зелёный минерал хлорит.
		MinmusSrfLandedMidlands = Здесь обнаружена любопытная смесь металлических элементов, отличающая Minmus от его довольно скучного соседа.
