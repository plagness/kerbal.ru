// DMagicOrbitalScience — русский перевод RESULTS (флейвор сбора науки)
// Эксперимент: dmlaserblastscan (Laser Surface Scan / Лазерный анализ поверхности)
// Метод: @EXPERIMENT_DEFINITION:HAS[#id[...]]:FINAL — !RESULTS{} + новый RESULTS
// Ключи ситуаций не трогаем; дубли ключей сохранены; бренды/модели латиницей.

@EXPERIMENT_DEFINITION:HAS[#id[dmlaserblastscan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
		default = Рыхлый порошок, покрывающий поверхность, легко выжигается лазером, но ничего интересного под ним не обнаружено.
		default = Здесь на поверхности зафиксированы значительные концентрации тяжёлых металлов.
		default = В поверхностной породе найдены следовые концентрации тяжёлых металлов — признак древней вулканической активности, поднявшей минералы из недр планеты.
		default = Сканирование этого участка поверхности планеты выявляет лишь обилие силикатов.
		default = Испарённая лазером жидкость содержит шокирующе высокую концентрацию токсичных соединений.
		KerbinSrfLanded = Изучать поверхность Kerbin лазером на вездеходе — так себе затея; может, лучше выйти и покопать лопатой.
		KerbinSrfLandedLaunchPad = Лазерный луч поджигает несколько лужиц несгоревшего ракетного топлива... пожалуй, не лучшее место для испытаний.
		KerbinSrfLandedRunway = DMagic Orbital Science не одобряет использование мощных лазеров на действующих ВПП и рядом с ними. Просьба немедленно прекратить.
		KerbinSrfLandedKSC = Химический анализ показывает наличие нескольких соединений железа, тяжёлых металлов и коротких углеводородных цепей. Прямо будто этот участок нарочно засеяли ценными материалами, необходимыми для космических полётов.
		KerbinSrfLandedGrasslands = Клуб дыма говорит о том, что поверхность здесь покрыта горючими соединениями; рекомендуется дальнейшее изучение.
		KerbinSrfLandedTundra = Несколько выстрелов лазера выжигают мёрзлую поверхность этого грунта, обнажая нижние слои с высокими концентрациями органических соединений.
		KerbinSrfLandedMountains = Зафиксированы высокие концентрации силикатов, кислорода и алюминия — иными словами, много гранита.
		KerbinSrfLandedBadlands = Многократное облучение лазером доказывает, что эта земля вовсе не так «дурна», как о себе заявляет.
		KerbinSrfLandedDeserts = Лазер стёсывает несколько внешних слоёв силикатов с поверхности, обнажая... ещё силикаты.
		KerbinSrfLandedHighlands = Пристальное изучение показывает, что нагорья Kerbin состоят почти из того же материала, что и низменности Kerbin.
		KerbinSrfLandedIceCaps = В пробуренных лазером отверстиях образуются крошечные лужицы воды.
		KerbinSrfLandedShores = Клуб пара указывает на наличие воды поблизости.
		KerbinSrfLandedWater = Вода быстро испаряется лазером. При нескольких десятилетиях непрерывного облучения всю воду можно было бы выпарить, открыв поверхность дна для более пристального изучения.
		KerbinSrfSplashedShores = Вода здесь содержит несколько соединений, указывающих на близость суши.
		KerbinSrfSplashedWater = Тут нечего испарять, кроме воды.
		KerbinSrfLandedFlagPole = Флагшток оказался на удивление устойчив к лазеру.
		KerbinSrfLandedTrackingStation = Сотрудники Станции слежения, похоже, в полном восторге от лазерного шоу.
		KerbinSrfLandedVAB = Не разумнее ли было снять показания в VAB ещё до старта?
		KerbinSrfLandedVABTanks = Пожалуй, палить лазером по топливным бакам — не лучшая идея.
		KerbinSrfLandedR&D = Учёные в R&D-центре начинают потихоньку подталкивать аппарат обратно к стартовой площадке в надежде, что кто-нибудь наконец поймёт намёк...
		KerbinSrfLandedAdministration = Будь лазер помощнее, это сочли бы агрессивным выражением недовольства; а так выходит скорее пассивно-агрессивно...
		KerbinSrfLandedAstronautComplex = Спасайтесь кто может, жалкие кербонавты.
