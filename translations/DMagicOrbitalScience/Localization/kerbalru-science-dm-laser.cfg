		MohoSrfLandedMidlands = В поверхностной породе найдены следовые концентрации тяжёлых металлов — признак древней вулканической активности, поднявшей минералы из внутренних областей мантии Moho.
		MohoSrfLandedSouthWesternLowlands = Испарённый лазером поверхностный слой содержит удивительно высокую концентрацию соединений железа — скорее всего, остатки ударника, создавшего этот кратер.
		EveSrfLanded = В испарённых поверхностных материалах обнаружены сравнительно высокие концентрации лития. Вероятно, это и есть источник фиолетового цвета Eve.
