		EveSrfLandedPlains = В испарённых поверхностных материалах обнаружены сравнительно высокие концентрации лития. Вероятно, это и есть источник фиолетового цвета Eve.
		EveSrfLandedMountains = Этот горный регион Eve состоит преимущественно из базальта и других магматических пород — признак былой вулканической активности.
