		MunSrfLandedHighlands = Рыхлый порошок, покрывающий поверхность, легко выжигается лазером, но ничего интересного под ним не обнаружено.
		MunSrfLandedMidlandCraters = Лазер оставляет рваное отверстие, пробуренное в поверхности, — почти крошечный кратер внутри кратера побольше.
		MunSrfLandedMidlandCraters = По этому кратеру разбросаны обломки твёрдой породы; химический анализ указывает на наличие иридия и урана.
		MunSrfLandedMidlands = Здесь зафиксированы высокие концентрации силикатов. В этом отношении Mun начинает казаться очень похожей на Kerbin.
		MunSrfLandedMidlands = Непрерывные выстрелы лазера испаряют поверхностные слои мунарского реголита, но под ними обнаруживается лишь ещё реголит.
