		MunSrfLandedEastCrater = Высокие концентрации некоторых тяжёлых металлов указывают, что это ударный кратер того или иного рода.
		MunSrfLandedEastFarsideCrater = Лазер выжигает несколько внешних слоёв мунарской пыли, обнажая породы с высокими концентрациями иридия.
		MunSrfLandedFarsideCrater = Лазер выжигает лишь очень тонкий слой мунарской пыли — значит, это относительно недавняя зона удара.
		MunSrfLandedHighlandCraters = Обнаружены сравнительно высокие концентрации некоторых соединений углерода, натрия и других лёгких металлов. Скорее всего, эти материалы занесены сюда чередой метеоритных ударов.
		MunSrfLandedHighlandCraters = Химический состав этих кратеров схож с составом окружающих регионов.
