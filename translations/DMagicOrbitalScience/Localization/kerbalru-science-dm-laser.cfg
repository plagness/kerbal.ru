		MarsSrfLandedOlympusMons = В лазерном анализе этого рельефа обнаружены признаки интенсивной вулканической активности.
		MarsSrfLandedVallesMarineris = Сканы этого участка показали высокие концентрации оксида железа со следами газообразного метана.
		MarsSrfLandedAreanCanyons = В сканах поверхности здесь обнаружены следы перхлората. Это имеет интересные последствия для возможности колонизации Mars.
		MarsSrfLandedNorthIceCap = Лазер бьёт по мёрзлой поверхности Северного полюса Mars, возгоняя значительное количество углекислого газа.
		MarsSrfLandedSouthIceCap = В сканах мёрзлого южного полюса Mars, среди более обильных концентраций углекислого газа, обнаружены следы водяного пара.
		DeimosSrfLanded = Рыхло сложенную поверхность Deimos лазерный луч едва не разносит в клочья. В испарённых остатках обнаружены лишь обычные силикаты.
		DeimosSrfLandedCraters = Испарение породы в этом кратере выявляет значительные концентрации железа и урана. Может, Deimos не так уж и скучен, в конце концов.
		DeimosSrfLandedHighlands = Сканы этого горного региона поверхности Deimos выявляют лишь обилие силикатов.
		PhobosSrfLanded = Сканы поверхности Phobos выявляют силикатные минералы, обычные для многих типов астероидов.
		PhobosSrfLandedHighlands = Испарённые слои поверхности с этого участка содержат в основном силикаты и алюминий — вероятно, из минерала, известного как полевой шпат, придающего этому участку яркую окраску.
		PhobosSrfLandedStickneyCrater = В сканах этого участка зафиксированы значительные концентрации тяжёлых металлов — вероятно, регион образован огромным металлическим астероидом.
		IoSrfLanded = В сканах поверхности Io обнаружены следы различных соединений серы.
		IoSrfLandedLowlands = После лазерной абляции поверхности Io органических соединений не обнаружено.
		IoSrfLandedHighlands = Нагорья и горные области Io сложены в основном силикатными минералами.
		IoSrfLandedVolcanicSnows = Яркая поверхность этого участка сложена преимущественно сильно отражающим диоксидом серы.
		IoSrfLandedVolcanicHotspots = В сканах близ этого вулканического очага обнаружены признаки как силикатного, так и серного вулканизма.
		EuropaSrfLanded = Лазер пробуривает на удивление глубокое отверстие в поверхности Europa, высвобождая значительное количество пара.
		EuropaSrfLandedCrosscutPlains = В сканах этого участка обнаружены следы многочисленных соединений серы, возможно, придающих ему чуть более тёмный цвет.
		EuropaSrfLandedLineaments = Анализ тёмных линий Europa выявляет в основном водяной лёд с чуть более высокими концентрациями солей и силикатов, чем в других местах поверхности.
		EuropaSrfLandedCraters = Здесь обнаружено высокое содержание силикатных минералов — скорее всего, остатки астероида, создавшего этот кратер.
		GanymedeSrfLanded = Сканы поверхности Ganymede выявляют смесь водяного льда, силикатных соединений, а также следы некоторых органических соединений.
		GanymedeSrfLandedLowlands = В сканах этого участка обнаружен ряд органических соединений, скорее всего, занесённых сюда ударами астероидов.
		GanymedeSrfLandedCryovolcanicIce = Яркая поверхность Ganymede — в основном водяной лёд, но также обнаружены значительные количества углекислого газа.
		GanymedeSrfLandedTectonicDeformation = В сканах этого участка обнаружен ряд любопытных сульфатных солей — возможно, они сформировались в подповерхностном океане Ganymede.
		GanymedeSrfLandedPoles = Поверхность здесь, по всей видимости, состоит в основном из инея водяного льда, легко испаряемого лазером.
		GanymedeSrfLandedCraters = В сканах этих кратеров зафиксированы очень высокие концентрации железа, никеля и титана — вероятно, они результат ударов очень плотных астероидов.
		CallistoSrfLanded = Признаки водяного льда обнаружены на большей части поверхности Callisto.
		CallistoSrfLandedCrateredMidlands = Поверхность здесь имеет участки почти чистого водяного льда, перемешанные с более каменистым, богатым силикатами рельефом.
		CallistoSrfLandedAsgardCrater = Лазерные сканы поверхности в этом громадном бассейне показывают очень высокие концентрации водяного льда.
		CallistoSrfLandedOldCraters = Наряду с водяным льдом, обычным для поверхности Callisto, обнаружены также признаки аммиачного и метанового льда.
		TitanSrfLanded = Лазер испаряет образец поверхности Titan, поднимая буроватое облако энергичной пыли.
		TitanSrfLandedMidlands = Лазерная абляция грунта в этом регионе выявляет сравнительно низкие концентрации углеводородов, обычных для большей части поверхности Titan.
		TitanSrfLandedHighlands = В сканах рельефа с высокогорных плато Titan обнаружены различные силикаты, богатые железом и алюминием.
		TitanSrfLandedShores = Грунт на этом участке насыщен простыми углеводородами.
		TitanSrfLandedSeas = Лазер испаряет влажный рельеф здесь, выявляя очень высокое содержание углеводородных соединений.
		TitanSrfSplashed = Жидкость здесь легко испаряется лазером; её состав — в основном низкокипящие углеводороды.
		PlutoSrfLanded = Сканы поверхности здесь выявляют в основном кислород и водород, вероятно, в форме водяного льда.
		AsteroidSrfLandedStony = Этот лёгкий каменный астероид сложен преимущественно силикатами; железа и никеля обнаружено лишь на следовом уровне.
		AsteroidSrfLandedIcy-Organic = Обнаружено несколько всплесков содержания кальция и алюминия. Это указывает на наличие крошечных хондр, которые могут восходить к рождению системы Kerbol.
		AsteroidSrfLandedCarbonaceous = В этом астероиде, среди силикатов и сульфидов, обнаружено высокое содержание воды. Эти признаки указывают, что это, вероятно, астероид типа углистого хондрита.
		AsteroidSrfLandedCarbonaceous = Лазер испаряет ряд органических соединений — вероятно, это углистый астероид.
		AsteroidSrfLandedCarbonaceous = Наличие нескольких типов органических полимеров наряду с соединением железа магнетитом позволяет предположить, что это сравнительно редкий углистый астероид B-типа.
		AsteroidSrfLandedIcy-Organic = В сканах этого астероида обнаружено высокое содержание воды и силикатных минералов.
		AsteroidSrfLandedComet = Состав поверхности этой кометы позволяет предположить, что её недра почти целиком состоят из водяного льда.
		AsteroidSrfLandedStony = Поверхность этого астероида, по всей видимости, сложена преимущественно различными силикатами.
		AsteroidSrfLandedStony = Сканы указывают, что это каменный астероид, судя по высоким концентрациям железо- и магний-силикатов.
		AsteroidSrfLandedCarbonaceous = В этом тёмном астероиде обнаружены высокие концентрации различных органических соединений.
		AsteroidSrfLandedMetallic = Сканы поверхности показали в основном базальтовые минералы, но следы некоторых более тяжёлых металлов указали, что у этого астероида может быть небольшое, но отчётливое металлическое ядро.
		AsteroidSrfLandedMetallic = Высокие концентрации железа, никеля и кобальта указывают, что это металлический астероид, возможно, образовавшийся при распаде некоего древнего планетоида.
		AsteroidSrfLandedMetallic = Среди высоких концентраций железа и никеля в этом металлическом астероиде — несколько указаний на различные тяжёлые металлы, что делает его заманчивой целью для орбитальной открытой добычи.
	}
}
