	KerbinSrfSplashedShoresDeep = В более глубоких приливных водах Kerbin найдены признаки развитой жизни; подводные камеры то и дело выхватывают быстрые зелёные объекты, всё время ускользающие из фокуса.
	KerbinSrfSplashedWaterShallow = В мелких открытых водах Kerbin интересного мало — лишь кое-какие микроорганизмы да многочисленные обрывки металлолома.
	KerbinSrfSplashedWaterDeep = При сканировании глубоких вод Kerbin обнаружены следы останков какого-то, похоже, огромного подводного животного.
	EveSrfSplashedExplodiumSeaShallow = В мелководье океана Eve очень мало ила и никаких признаков жизни; плотность жидкости заметно выше, чем у воды.
	EveSrfSplashedExplodiumSeaDeep = Сканы глубоких океанов Eve выявляют множество токсичных соединений и лишь следовые количества воды.
	LaytheSrfSplashedTheSagenSeaShallow = Открытый океан Laythe, похоже, состоит в основном из лёгких углеводородов и жидкого аммиака при очень низкой температуре поверхности.
	LaytheSrfSplashedTheSagenSeaDeep = В более глубоких океанах Laythe температура довольно высока — вероятно, работает какой-то механизм внутреннего или приливного разогрева.
	LaytheSrfSplashedShores = В приливных зонах океана Laythe много ила, но никаких признаков жизни.
	TektoSrfSplashedLakes = Сканирование океана Tekto выявляет в основном короткоцепочечные углеводороды при очень низкой температуре и плотности.
	TektoSrfSplashedMudflats = Илистая жидкость грязевых отмелей Tekto содержит на удивление много сложных органических молекул.
	TitanSrfSplashedSeas = Малоплотный океан Titan состоит в основном из жидкого метана и этана, никаких признаков жизни.
	TitanSrfSplashedShores = Илистый океан у берегов Titan содержит любопытные силикаты и органические молекулы, но признаков жизни нет.
	}
}
