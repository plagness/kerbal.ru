// DMagicOrbitalScience — русские РЕЗУЛЬТАТЫ экспериментов (ScienceDefs)
// Эксперименты: magScan (магнитометр), dmbathymetryscan (батиметрия)
// Источник: GameData/DMagicOrbitalScience/Resources/ScienceDefs.cfg
// Метод: :FINAL-патч, полная замена блока RESULTS. Ключи ситуаций не трогаем.

@EXPERIMENT_DEFINITION:HAS[#id[magScan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Записаны точные показания локального магнитного поля.
	default = Обнаружены локальные вариации магнитного поля.
	KerbinInSpaceLow = Первые сканы указывают на мощное магнитное поле, окружающее Kerbin; его напряжённость падает с ростом высоты.
	KerbinInSpaceHigh = Магнитное поле Kerbin простирается на несколько планетарных радиусов, защищая атмосферу от солнечного ветра и космической радиации.
	KerbinInSpaceHigh = Взаимодействие с солнечным ветром сильно искажает магнитное поле Kerbin: со стороны светила оно сжато, а с противоположной вытянуто в длинный хвост.
	KerbinSrfLandedLaunchPad = Магнитометр откалиброван как надо и записывает магнитное поле Kerbin на уровне поверхности.
	KerbinSrfLanded = Магнитометр записывает точные показания приповерхностного магнитного поля Kerbin.
	KerbinSrfLandedIceCaps = Линии магнитного поля у полюса почти вертикальны относительно поверхности — значит, магнитные полюса Kerbin хорошо совпадают с географическими.
	KerbinSrfLandedMountains = Сильное магнитное поле намекает, что вы, похоже, набрели на одну из легендарных «магнитных гор» Kerbin.
	KerbinSrfLandedBadlands = В этих краях зарегистрированы сильные локальные магнитные поля — вероятно, тут высокая концентрация магнитно активных элементов.
	KerbinSrfLandedRunway = Линии магнитного поля почему-то постоянно меняют направление; такое чувство, будто кто-то бегает кругами по взлётной полосе с огромным магнитом.
	KerbinSrfLandedFlagPole = Магнитометр выдаёт неплохое приближение к этому флагштоку; осталось лишь взобраться на верхушку и повесить флаг.
	KerbinSrfLandedTrackingStation = Гигантские радиотарелки заглушают естественное магнитное поле Kerbin.
	KerbinSrfLandedVAB = А не разумнее ли было снять показания у VAB ещё до запуска?
	KerbinSrfLandedVABMainBuilding = Ну и зачем это, серьёзно?
	KerbinSrfLandedR&D = Может, показания у R&D-центра стоит снимать кому-то другому...
	KerbinSrfLandedR&DTanks = Так, ну правда, давайте отправимся куда-нибудь поинтереснее снимать показания магнитометра...
	KerbinSrfLandedAdministration = Направлять магнитометр на здание администрации — начальство вряд ли обрадуется.
	KerbinSrfLandedAstronautComplex = Эти астронавты явно пропускают грандиозное приключение...
	KerbinSrfLandedSPH = Диспетчерам вышки совсем не смешно...
	KerbinSrfLandedSPHRoundTank = Заняться больше нечем?
	KerbinSrfLandedMissionControl = Центр управления полётами подтверждает: это и правда пустая трата времени.
	MunInSpaceHigh = Слабое магнитное поле указывает, что у Mun когда-то могло быть расплавленное железное ядро.
	MunInSpaceLow = Над несколькими областями поверхности Mun обнаружены локальные магнитные поля.
	MunSrfLanded = На поверхности Mun зарегистрировано очень слабое магнитное поле.
	MunSrfLandedNorthernBasin = В этом районе зафиксировано слабое магнитное поле. Отсутствие крупных кратеров поблизости говорит о том, что намагниченность коры осталась от некогда расплавленного ядра Mun.
	MunSrfLandedPolarCrater = У дна кратера зарегистрированы сильные магнитные поля — вероятно, от магнитно упорядоченных выбросов крупного ударника.
	MunSrfLandedHighlandCraters = В более глубоких частях этого кратера обнаружено сильное магнитное поле.
	MunSrfLandedEastFarsideCrater = В этом кратере зафиксировано интенсивное магнитное поле — возможно, оно связано с веществом метеорита, ударившего здесь.
	MunSrfLandedPoles = Напряжённость магнитного поля держится на фоновом для поверхности Mun уровне — значит, геодинамо в ядре Mun больше не работает.
	MinmusInSpace = Замороженное мороженое не излучает магнитного поля, балда.
	MinmusSrfLanded = Более пристальное изучение подтверждает: Minmus и вправду не создаёт магнитного поля.
	MinmusSrfLandedGreaterFlats = Даже мятная на вид мёрзлая поверхность Minmus магнитно мертва.
	MinmusSrfLandedLesserFlats = Показания плоские — прямо как сама мёрзлая равнина.
	SunInSpaceLow = Датчики перегружаются... ох, кажется, штанга плавится.
	SunInSpaceHigh = Огромная магнитосфера Kerbol простирается далеко за орбиту Eeloo, влияя на все планеты системы.
	MohoInSpace = Сканы показывают лишь слабое наведённое магнитное поле — скорее всего, его создаёт поток заряженных частиц солнечного ветра, обтекающий Moho.
	MohoSrfLanded = Слабые приповерхностные поля говорят о том, что собственной магнитосферы у Moho нет.
	EveInSpaceLow = Интенсивные магнитные поля чуть не перегружают датчики.
	EveInSpaceHigh = Сильное магнитное поле надёжно защищает атмосферу Eve от излучения Kerbol.
	EveSrfLanded = У поверхности магнетизм чуть слабее, чем на орбите; возможно, мощный кольцевой ток Eve частично экранирует поверхность от её же магнитного поля.
	GillyInSpace = Gilly, похоже, не более чем кое-как слипшаяся груда камней без сколь-нибудь заметного магнитного поля.
	GillySrfLanded = На поверхности Gilly магнитного поля не обнаружено.
	DunaInSpaceLow = Отдельные участки атмосферы Duna, похоже, прикрыты небольшими магнитосферами.
	DunaInSpaceHigh = Очень слабое магнитное поле указывает, что ядро Duna застыло давным-давно; из-за этого её атмосферу почти сдуло, а поверхность нещадно бомбит солнечная радиация.
	DunaSrfLanded = Приповерхностные линии поля намекают на несколько небольших, но мощных магнитных аномалий.
	IkeInSpace = Холодно, мертво, безжизненно — ничего интересного тут не намерить.
	IkeSrfLanded = На поверхности Ike магнитно так же скучен, как и с орбиты.
	DresInSpace = Да кто вообще прилетает на Dres?
	DresSrfLanded = А вы ожидали на поверхности чего-то другого?
	JoolInSpaceLow = Сильное магнитное поле Jool удерживает пояса мощной радиации; на низких орбитах будьте осторожны. Условия могут оказаться опасными для пилотируемых аппаратов.
	JoolInSpaceHigh = Огромная магнитосфера Jool во все стороны простирается далеко за орбиты всех его лун.
	LaytheInSpace = Laythe создаёт собственное магнитное поле — признак расплавленного ядра и активной геологии. На поле сильно влияет куда более крупная магнитосфера Jool.
	LaytheSrfLanded = У поверхности Laythe зарегистрировано магнитное поле; по линиям видно, что магнитные полюса далеко отстоят от географических.
	VallInSpaceHigh = Здесь улавливается только поле Jool — похоже, геодинамо у Vall не работает.
	VallInSpaceLow = На низкой орбите Vall зафиксировано очень слабое магнитное поле. Возможно, дело в загадочных жидких подповерхностных океанах Vall.
	VallSrfLanded = У поверхности зарегистрированы слабые магнитные поля — возможно, их порождает подповерхностное течение воды.
	TyloInSpace = Собственного магнитного поля у Tylo, похоже, нет, но поле Jool он сильно искажает — признак высокой концентрации плотных магнитных элементов.
	TyloSrfLanded = У поверхности зарегистрированы сильные магнитные поля, но их направление почти беспорядочно.
	BopInSpaceHigh = Bop порождает необычайно мощную магнитосферу; это стоит изучить куда подробнее...
	BopInSpaceLow = Магнитное поле Bop крайне неоднородно и сосредоточено в основном в северной полярной области; нужны дальнейшие исследования...
	BopSrfLanded = Все линии поля указывают на север — значит, где-то у северного полюса скрыт небольшой, но крайне мощный источник магнетизма.
	PolInSpace = Словно пылинка пыльцы на магнитном ветру Jool.
	PolSrfLanded = На поверхности Pol улавливается только магнитное поле Jool.
	EelooInSpace = Eeloo выглядит холодным и безжизненным. Отсюда улавливается лишь слабое магнитное поле Kerbol.
	EelooSrfLanded = На поверхности Eeloo сколь-нибудь заметного магнитного поля не обнаружено.
	AblateInSpace = Ощутимая наведённая магнитосфера заметно искажает куда более крупное поле Kerbol.
	AscensionInSpace = Здесь магнитного поля выше фонового почти или совсем не улавливается.
	ErinInSpace = Слабое магнитное поле, зарегистрированное здесь, вероятно, создают ионосфера Erin и пояс заряженных частиц.
	InaccessableInSpace = Быстрое вращение этого планетоида порождает постоянно смещающееся магнитное поле.
	JokerInSpace = Вокруг Joker зафиксировано слабое магнитное поле — вероятно, наведённое соседним Serious.
	PockInSpace = Кроме магнитного поля Erin, здесь ничего не улавливается.
	RingleInSpace = Сама луна, похоже, магнитного поля не создаёт, но у самой системы колец улавливается слабый сигнал.
	SentarInSpace = Sentar создаёт интенсивное магнитное поле — вероятно, в его кольцах заперты несколько поясов опасных заряженных частиц.
	SeriousInSpace = Serious создаёт ощутимое магнитное поле, которое взаимодействует с остатками куда более крупного поля Kerbol.
	SkeltonInSpace = Из-за большого наклонения орбиты Skelton, проходя то выше, то ниже сильного магнитного поля Sentar, любопытно с ним взаимодействует.
	ThudInSpace = Вокруг Thud зарегистрировано довольно сильное магнитное поле — возможно, у него плотное, богатое железом ядро.
	SarnusInSpaceLow = Магнитное поле вокруг Sarnus искажается частицами колец, обращающимися вдоль его экваториального пояса.
	SarnusInSpaceHigh = Искажения магнитосферы Sarnus заметны у некоторых его лун, особенно у Eeloo и Tekto, которые подпитывают систему плазмой.
	HaleInSpace = Эта крохотная луна порождает лишь едва заметную рябь в большом магнитном поле Sarnus.
	HaleSrfLanded = Измерения магнитного поля с поверхности Hale мало чем отличаются от орбитальных.
	OvokInSpace = Собственного магнитного поля у Ovok, похоже, нет, зато поле Sarnus он сильно искажает.
	OvokSrfLanded = У поверхности Ovok показания магнитного поля минимальны: он искажает и перенаправляет поле Sarnus, но собственного не создаёт.
	SlateInSpaceHigh = Slate искажает магнитное поле Sarnus, но собственного, похоже, не создаёт.
	SlateInSpaceLow = Возмущения магнитного поля на низкой орбите Slate похожи на те, что создаёт кольцевой ток в ионосфере планеты с атмосферой.
	SlateSrfLanded = Магнитные элементы в грунте очень чётко выстроены вдоль направления север — юг.
	TektoInSpaceHigh = У Tekto, похоже, сильное наведённое магнитное поле; оно возникает, когда луна проходит сквозь плазму быстро вращающейся магнитосферы Sarnus.
	TektoInSpaceLow = Tekto искажает магнитное поле Sarnus, вызывая спад его напряжённости в своём следе.
	TektoSrfLanded = Приповерхностное магнитное поле крайне слабое; наведённое поле Tekto во многом экранирует поверхность от более крупного поля Sarnus.
	UrlumInSpaceHigh = Вокруг Urlum обнаружена сильная магнитосфера, заметно наклонённая относительно оси вращения планеты.
	UrlumInSpaceLow = Ближе к атмосфере магнитосфера Urlum образует отдельные области с очень сильным магнитным дипольным моментом.
	PriaxInSpace = Общая орбита Priax и Polta оставляет след в большой магнитосфере Urlum.
	PriaxSrfLanded = На отдельных участках поверхности Priax заметны магнитные аномалии — вероятно, следы ударов богатых железом астероидов.
	PoltaInSpace = На орбите вокруг Polta улавливается лишь лёгкое возмущение магнитного поля Urlum.
	PoltaSrfLanded = На приповерхностные показания магнитного поля Polta сама эта крохотная луна, похоже, никак не влияет.
	WalInSpace = На орбите вокруг Wal зафиксировано слабое магнитное поле — возможно, признак какого-то продолжающегося внутреннего разогрева.
	WalSrfLanded = На отдельных участках поверхности Wal показания магнитного поля высоки.
	TalInSpace = На орбите вокруг этой крохотной подлуны зарегистрировано очень слабое магнитное поле.
	TalSrfLanded = По показаниям магнитного поля в поверхности Tal обнаруживаются металлические элементы.
	NeidonInSpaceHigh = Магнитосфера Neidon, похоже, заметно смещена от его центра — вероятно, она порождается конвективными токами где-то в мантии планеты.
	NeidonInSpaceLow = Измерения вблизи Neidon выявляют сильный квадрупольный магнитный момент — заметное отступление от дипольного, который преобладает в магнитосферах большинства планет.
	ThatmoInSpace = В окрестностях Thatmo господствует магнитное поле Neidon, хотя обратное направление орбиты вносит заметное искажение в магнитосферу.
	ThatmoSrfLanded = На поверхности Thatmo регистрируется лишь слабое магнитное поле.
	NisseeInSpace = Путь Nissee сквозь магнитосферу Neidon мягко возмущает направление и силу этого поля.
	NisseeSrfLanded = Собственного магнитного поля у Nissee, похоже, нет; все показания, судя по всему, исходят от Neidon.
	PlockInSpace = Plock возмущает магнитное поле Karen, пока эти два крохотных тела кружат друг вокруг друга.
	PlockSrfLanded = С поверхности Plock сколь-нибудь заметных показаний магнитного поля нет; улавливается лишь слабый сигнал от Karen.
	KarenInSpace = На орбите вокруг Karen зафиксировано слабое магнитное поле; соседний Plock, похоже, заметно влияет на его напряжённость.
	KarenSrfLanded = У Karen есть признаки внутреннего магнитного поля; механизм его возникновения остаётся загадкой.
	MercuryInSpace = Сканы показывают лишь слабое наведённое магнитное поле — скорее всего, его создаёт поток заряженных частиц солнечного ветра, обтекающий Mercury.
	MercurySrfLanded = Слабые приповерхностные поля говорят о том, что собственной магнитосферы у Mercury нет.
	VenusInSpaceLow = На низкой орбите вокруг Venus зафиксировано слабое наведённое магнитное поле.
	VenusInSpaceHigh = Верхняя атмосфера Venus, похоже, открыта солнечному ветру, и лишь слабое наведённое магнитное поле даёт какую-то защиту.
	VenusSrfLanded = У поверхности магнетизм чуть слабее орбитального; возможно, сильный наведённый кольцевой ток Venus частично экранирует поверхность от её магнитного поля.
	MoonInSpaceLow = Над несколькими областями поверхности Moon обнаружены локальные магнитные поля.
	MoonInSpaceHigh = Слабое магнитное поле указывает, что у Moon когда-то могло быть расплавленное железное ядро.
	MoonSrfLanded = На поверхности Moon зарегистрировано очень слабое магнитное поле.
	MarsInSpaceLow = Отдельные участки атмосферы Mars, похоже, прикрыты небольшими магнитосферами.
	MarsInSpaceHigh = Очень слабое магнитное поле указывает, что ядро Mars застыло давным-давно; из-за этого его атмосферу почти сдуло, а поверхность нещадно бомбит солнечная радиация.
	MarsSrfLanded = Приповерхностные линии поля намекают на несколько небольших, но мощных магнитных аномалий.
	DeimosInSpaceLow = Deimos, похоже, не более чем кое-как слипшаяся груда камней без заметного магнитного поля.
	DeimosSrfLanded = На поверхности Deimos магнитного поля не обнаружено.
	PhobosInSpace = Показания магнитного поля выявляют у Phobos, похоже, собственную магнитосферу — любопытный результат, если учесть малый размер луны и её вероятное происхождение как захваченного астероида.
	PhobosSrfLanded = На поверхности Phobos зафиксировано слабое дипольное магнитное поле.
	JupiterInSpaceLow = Сильное магнитное поле Jupiter удерживает пояса мощной радиации; на низких орбитах будьте осторожны. Условия могут оказаться опасными для пилотируемых аппаратов.
	JupiterInSpaceHigh = Огромная магнитосфера Jupiter во все стороны простирается далеко за орбиты всех его лун.
	IoInSpaceLow = Собственного магнитного поля у Io, похоже, нет; значит, его бурная геологическая активность вызвана скорее приливными силами, а не расплавленным ядром.
	IoInSpaceHigh = По мере того как разрежённая атмосфера Io теряет заряженные частицы, фиксируется сильное взаимодействие с магнитным полем Jupiter.
	IoSrfLanded = На поверхности Io улавливается лишь слабое магнитное поле.
	EuropaInSpaceLow = На низкой орбите вокруг Europa зафиксировано сильное наведённое магнитное поле; его может порождать взаимодействие магнитосферы Jupiter с подповерхностным океаном Europa.
	EuropaInSpaceHigh = Проходя сквозь магнитосферу Jupiter, Europa вносит в неё искажения.
	EuropaSrfLanded = На поверхности Europa зафиксировано слабое магнитное поле — возможно, результат подповерхностных водных течений.
	GanymedeInSpaceLow = Ganymede, похоже, создаёт собственное магнитное поле, искажающее более крупное поле Jupiter, — признак высокой концентрации плотных магнитных элементов.
	GanymedeInSpaceHigh = На высокой орбите Ganymede фиксируется локальное искажение магнитного поля Jupiter.
	GanymedeSrfLanded = У поверхности зарегистрированы сильные магнитные поля — признак собственной, внутренне создаваемой магнитосферы.
	CallistoInSpace = Холодно, мертво, безжизненно — ничего интересного тут не намерить.
	CallistoSrfLanded = На поверхности Callisto магнитно так же скучен, как и с орбиты.
	SaturnInSpaceLow = Магнитное поле вокруг Saturn искажается частицами колец, обращающимися вдоль его экваториального пояса.
	SaturnInSpaceHigh = Искажения магнитосферы Saturn заметны у Titan, который подпитывает систему плазмой.
	TitanInSpace = У Titan, похоже, наведённое магнитное поле, порождённое куда более крупной магнитосферой Saturn.
	TitanSrfLanded = У поверхности зафиксировано очень слабое магнитное поле; вероятно, наведённая магнитосфера Titan защищает поверхность от более сильного поля Saturn.
	UranusInSpaceLow = Ближе к поверхности магнитосфера Uranus образует отдельные области с очень сильным магнитным дипольным моментом.
	UranusInSpaceHigh = Вокруг Uranus обнаружена сильная магнитосфера, заметно наклонённая относительно оси вращения планеты.
	PlutoInSpace = Pluto выглядит холодным и безжизненным. Отсюда улавливается лишь слабое магнитное поле Солнца.
	PlutoSrfLanded = На поверхности Pluto сколь-нибудь заметного магнитного поля не обнаружено.
	AsteroidInSpaceLow = Вокруг этого астероида улавливается лишь фоновое магнитное поле.
	AsteroidInSpaceLowMettalic = Вокруг этого астероида уловлены слабые магнитные сигналы — возможно, в нём высокое содержание металла.
	AsteroidInSpaceLow = Слабое магнитное поле, исходящее от астероида, возмущает поле окружающей магнитосферы.
	AsteroidSrfLanded = У поверхности этого астероида зафиксировано слабое, но устойчивое магнитное поле.
	AsteroidSrfLanded = Локальные колебания магнитного поля этого астероида намекают на сложный внутренний состав.
	AsteroidSrfLandedStony = Этот астероид не создаёт заметного магнитного поля — значит, железа в нём почти или совсем нет.
	AsteroidSrfLandedCarbonaceous = Очень слабые, кратковременные магнитные сигналы намекают на присутствие в этом астероиде каких-то электропроводящих материалов.
	AsteroidSrfLandedCarbonaceous = От этого астероида улавливается лишь очень слабый магнитный сигнал — значит, железа и никеля в нём немного.
	AsteroidSrfLandedMetallic = У поверхности этого астероида зафиксировано довольно сильное магнитное поле — признак того, что он преимущественно металлический.
	AsteroidSrfLandedMettalic = Этот астероид создаёт ощутимое магнитное поле — похоже, он металлический, богатый соединениями железа и никеля.
	}
}

