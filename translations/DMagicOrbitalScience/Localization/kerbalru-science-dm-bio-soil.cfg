// kerbal.ru — русские РЕЗУЛЬТАТЫ экспериментов (ScienceDefs) DMagicOrbitalScience (сборка «Оператор»)
// Метод: @EXPERIMENT_DEFINITION:HAS[#id[...]]:FINAL — сносим !RESULTS{} и задаём блок заново литералом.
// Ключи ситуаций (default, KerbinSrfLanded, AsteroidInSpaceLowIcy-Organic и т.п.) не трогаем — переведён только текст.
// Дубли ключей сохранены в исходном порядке (несколько default/...SrfLanded = случайные варианты флейвора).
// Эксперименты: dmSoilMoisture (влажность почвы, 56 строк), dmbiodrillscan (био-бур, 117 строк).
// Латиницей: бренды/модели/коды/единицы (L-диапазон). Тела KSP/OPM — латиницей (Kerbin, Jool, Laythe, Slate...),
// как в соседнем kerbalru-science-dm-mag-bath.cfg; реальные тела RSS — по-русски (Марс, Венера, Луна, Ио, Титан...).
// Источник: GameData/DMagicOrbitalScience/Resources/ScienceDefs.cfg

@EXPERIMENT_DEFINITION:HAS[#id[dmSoilMoisture]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = Микроволновое излучение в L-диапазоне даёт чёткую картину содержания воды в верхних слоях поверхности.
	KerbinInSpaceLow = Микроволновое излучение в L-диапазоне указывает на высокое содержание воды почти по всей поверхности Kerbin.
	KerbinInSpaceLow = Измерения океанов Kerbin выявляют участки очень высокой солёности в тёплых тропических водах.
	MunInSpaceLow = Заметное содержание воды обнаружено в нескольких глубоких кратерах Mun и в его полярных областях.
	MinmusInSpaceLow = Микроволновое излучение указывает, что промёрзшая поверхность Minmus хотя бы отчасти состоит из воды.
	SunInSpaceLow = Микроволновые антенны, похоже, плавятся и не дают ни капли пригодных данных.
	MohoInSpaceLow = На орбите вокруг Moho улавливается лишь фоновое микроволновое излучение Солнца.
	EveInSpaceLow = Океаны Eve отличаются очень высокой солёностью — скорее всего, из-за целого набора разных солевых соединений.
	EveInSpaceLow = В низменных районах поверхность Eve хранит заметную влажность почвы.
	GillyInSpaceLow = На орбите вокруг Gilly не удаётся уловить никаких признаков воды.
	DunaInSpaceLow = По большей части верхнего слоя Duna фиксируются следовые количества воды; ближе к полюсам её уровень выше.
	IkeInSpaceLow = Слабое микроволновое излучение намекает, что вода есть лишь в отдельных районах поверхности Ike.
	DresInSpaceLow = Суше кербинских пустынь; более того, от Dres, похоже, не идёт вообще никакого сигнала — даже фонового.
	JoolInSpaceLow = У Jool нет заметной поверхности, так что уловленное здесь микроволновое излучение, судя по всему, порождено чем-то иным.
	LaytheInSpaceLow = От поверхности Laythe идёт на удивление слабое микроволновое излучение — похоже, воды в её океанах немного.
	LaytheInSpaceLow = Из-за низкого содержания воды в океанах Laythe провести сколько-нибудь осмысленные измерения солёности не выходит.
	VallInSpaceLow = Внешняя поверхность Vall, похоже, состоит почти из одной воды; более низкие концентрации отмечаются лишь в её гористых районах.
	TyloInSpaceLow = Микроволновое излучение из некоторых ударных кратеров Tylo намекает, что его поверхность когда-то молотили богатые водой астероиды и кометы.
	BopInSpaceLow = Над поверхностью Bop фиксируется мало микроволновых сигналов; впрочем, из северной полярной области Bop идут любопытно сильные сигналы в L-диапазоне — дело стоит изучить подробнее...
	PolInSpaceLow = Едва уловимое микроволновое излучение намекает, что у поверхности Pol почти нет влаги.
	EelooInSpaceLow = Над морозно-белой поверхностью Eeloo не фиксируется никаких микроволновых сигналов — а значит, это не водяной лёд, а что-то другое.
	SarnusInSpaceLow = От Sarnus идут интенсивные микроволновые сигналы — скорее всего, их источник вода в его атмосфере.
	HaleInSpaceLow = Сканирование поверхности показывает, что она состоит в основном из водяного льда.
	OvokInSpaceLow = Излучение поверхности указывает, что она состоит почти из одной воды.
	SlateInSpaceLow = Сканирование Slate с низкой орбиты выявляет очень высокую подповерхностную влажность.
	TektoInSpaceLow = От поверхности Tekto идёт лишь слабое микроволновое излучение — признак того, что воды в её океанах и грунте немного.
	UrlumInSpaceLow = От Urlum идёт сильное микроволновое излучение — признак высокой концентрации воды.
	PoltaInSpaceLow = Поверхность Polta, похоже, содержит очень много воды — скорее всего, в виде грязных подповерхностных залежей льда.
	PriaxInSpaceLow = Поверхность Priax, похоже, по большей части сухая; возможно, это какой-то захваченный астероид.
	WalInSpaceLow = Показания с поверхности Wal говорят о заметных подповерхностных залежах воды.
	TalInSpaceLow = Поверхность Tal содержит заметное количество воды.
	NeidonInSpaceLow = Микроволновое излучение идёт, судя по всему, от ледяных недр Neidon.
	ThatmoInSpaceLow = Микроволновое сканирование Thatmo выявляет заметное количество воды.
	NisseeInSpaceLow = Судя по микроволновому сканированию, меловая луна Nissee по большей части суха.
	PlockInSpaceLow = Сильное микроволновое излучение намекает на подповерхностные запасы воды у Plock.
	KarenInSpaceLow = На орбите вокруг Karen сколько-нибудь заметного микроволнового излучения не обнаружено.
	MercuryInSpaceLow = На орбите вокруг Меркурия улавливается лишь фоновое микроволновое излучение Солнца.
	VenusInSpaceLow = В низменных районах поверхность Венеры не содержит уловимой влажности почвы.
	MoonInSpaceLow = Заметное содержание воды обнаружено в нескольких глубоких кратерах Луны и в её полярных областях.
	MarsInSpaceLow = По большей части верхнего слоя Марса фиксируются следовые количества воды; ближе к полюсам её уровень выше.
	DeimosInSpaceLow = На орбите вокруг Деймоса не удаётся уловить никаких признаков воды.
	PhobosInSpaceLow = Слабое микроволновое излучение намекает, что вода есть лишь в отдельных районах поверхности Фобоса.
	JupiterInSpaceLow = У Юпитера нет заметной поверхности, так что уловленное здесь микроволновое излучение, судя по всему, порождено чем-то иным.
	IoInSpaceLow = Едва уловимое микроволновое излучение намекает, что у поверхности Ио почти нет влаги.
	EuropaInSpaceLow = Внешняя поверхность Европы, похоже, состоит почти из одной воды, а под ней — признаки очень высокой солёности.
	GanymedeInSpaceLow = Сканирование Ганимеда с низкой орбиты выявляет очень высокую подповерхностную влажность.
	CallistoInSpaceLow = Микроволновое излучение из некоторых ударных кратеров Каллисто намекает, что его поверхность когда-то молотили богатые водой астероиды и кометы.
	SaturnInSpaceLow = От Сатурна идут интенсивные микроволновые сигналы — скорее всего, их источник вода в его атмосфере.
	TitanInSpaceLow = От поверхности Титана идёт лишь слабое микроволновое излучение — признак того, что воды в его океанах и грунте немного.
	UranusInSpaceLow = От Урана идёт сильное микроволновое излучение — признак высокой концентрации воды.
	PlutoInSpaceLow = Сканирование поверхности показывает в ней очень высокую концентрацию водяного льда.
	AsteroidInSpaceLowStony = Микроволновое сканирование этого астероида не выявляет ничего — воды здесь нет.
	AsteroidInSpaceLowStony = Микроволновое излучение этого астероида говорит о том, что воды в нём нет совсем.
	AsteroidInSpaceLowIcy-Organic = В микроволновом излучении этого астероида фиксируется заметное количество воды.
	AsteroidInSpaceLowCarbonaceous = В поверхности этого астероида фиксируются следовые количества воды.
	AsteroidInSpaceLowComet = Сканирование поверхности этой кометы выявляет высокое содержание воды.
	}
}

@EXPERIMENT_DEFINITION:HAS[#id[dmbiodrillscan]]:FINAL
{
	!RESULTS {}
	RESULTS
	{
	default = В этом образце обнаружены следы метана и сероводорода — возможно, оставленные телами, что выбили соседние кратеры.
	default = В этом керне обнаружены незначительные концентрации сероводорода — возможный признак геологической активности.
	default = В этом керне сравнительно высок уровень метана, диоксида азота, этилена и цианистого водорода — любопытная химическая смесь.
	default = В этом керне обнаружено несколько токсичных тяжёлых металлов.
	default = В этом керне сравнительно высока концентрация метана — возможный признак продолжающейся органической активности.
	KerbinSrfLanded = Керн выглядит многообещающе на предмет следов жизни — правда, это же Kerbin, так что...
	KerbinSrfLandedLaunchPad = Этот участок, похоже, начисто лишён жизни.
	KerbinSrfLandedRunway = Полученный керн состоит, судя по всему, почти сплошь из цемента, асфальта и кучи ядовитых веществ, которые не дают образцу расти в инкубаторе.
	KerbinSrfLandedKSC = В этом керне поразительно высока концентрация разлагающейся органики — будто этот участок какое-то кладбище...
	KerbinSrfLandedGrasslands = Дай срок — и инкубатор наверняка будет ломиться от растительности, выросшей из этого образца.
	KerbinSrfLandedTundra = Этот керн, взятый у самой поверхности, содержит много замёрзшей воды с высокой концентрацией метана — вероятно, запертого при разложении органики.
	KerbinSrfLandedMountains = Этот образец состоит в основном из твёрдой каменистой породы, но в инкубаторе должен дать хоть какой-то рост.
	KerbinSrfLandedBadlands = Высокий уровень сероводорода намекает, что этот район гипоксичен и кишит серовосстанавливающими бактериями. Инкубатор будет пахнуть просто прелестно.
	KerbinSrfLandedDeserts = Этот песчаный рыхлый керн содержит мало органики, но, как и большинство образцов с Kerbin, должен дать в инкубаторе хоть какой-то рост.
	KerbinSrfLandedHighlands = Если хотите хранить этот керн подольше, понадобится инкубатор побольше — расти он будет явно бурно.
	KerbinSrfLandedIceCaps = Этот керн промёрз насквозь; может, оттает, если положить его в инкубатор.
	KerbinSrfLandedShores = Этот илистый керн, похоже, буквально кишит жизнью. Обнаружены заметные концентрации метана и сероводорода — признак активного разложения органики.
	KerbinSrfLandedWater = Образец состоит в основном из жижи песка и грязи, кишащей микроскопической жизнью. В инкубаторе она должна процветать.
	EveSrfLanded = В этом керне обнаружены следовые количества метана, диоксида серы и воды.
	EveSrfLandedMountains = Ни следовых газов, ни иных признаков органической активности в этом образце не обнаружено.
	EveSrfLandedPoles = Этот керн из тёплой полярной области Eve показывает всё тот же низкий уровень метана, что и другие районы поверхности.
	EveSrfLandedImpactSites = В этом керне обнаружено несколько токсичных тяжёлых металлов.
	EveSrfLandedImpactSites = В этом образце обнаружены следы метана и сероводорода — возможно, оставленные телом, что выбило этот кратер.
	EveSrfLandedPlains = В этом керне обнаружены следовые количества метана и диоксида серы. Возможно, они геологического происхождения — рекомендуется дальнейшее изучение.
	EveSrfLandedPlains = Хранение в инкубационной камере может показать, вырабатывается ли метан в этом образце прямо сейчас.
	EveSrfLandedIslands = В этом образце обнаружены малые количества воды и сероводорода — возможно, восстановленного из диоксида серы, обычного для Eve.
	EveSrfLandedIslands = Длительная инкубация поможет установить источник сероводорода в этом образце.
	EveSrfLandedImpactEjecta = В этом керне обнаружено несколько токсичных тяжёлых металлов.
	EveSrfLandedPeaks = Ни следовых газов, ни иных признаков органической активности в этом образце не обнаружено.
	EveSrfLandedMidlands = В этом керне обнаружены следовые количества метана и диоксида серы. Возможно, они геологического происхождения — рекомендуется дальнейшее изучение.
	EveSrfLandedImpactEjecta = В этом образце обнаружены следы метана и сероводорода — возможно, оставленные телом, что выбило этот кратер.
	EveSrfLandedExplodiumSea = В этом образце обнаружены малые количества воды и сероводорода — возможно, восстановленного из диоксида серы, обычного для Eve.
	EveSrfLandedExplodiumSea = Длительная инкубация поможет установить источник сероводорода в этом образце.
	EveSrfLandedLowlands = Хранение в инкубационной камере может показать, вырабатывается ли метан в этом образце прямо сейчас.
	DunaSrfLanded = В этом керне обнаружены следы метана и воды.
	DunaSrfLandedNorthPole = Керн из ледяной шапки Duna содержит очень много углекислого газа и следовые количества воды.
	DunaSrfLandedSouthPole = Этот керн из сухого льда наводит на мысль, что большая часть углекислого газа Duna заперта в полярных шапках.
	DunaSrfLandedKerinerValley = В этом керне есть следовые количества перхлората — вещества, потенциально полезного как окислитель ракетного топлива.
	DunaSrfLandedKerinerValley = Следы перхлората в этом образце, скорее всего, будут токсичны для любых будущих пилотируемых экспедиций в этот район.
	DunaSrfLandedMaria = В этом керне сравнительно высока концентрация метана — возможный признак продолжающейся органической активности.
	DunaSrfLandedDepressions = В этом керне обнаружены незначительные концентрации сероводорода — возможный признак геологической активности.
	DunaSrfLandedMountains = В этом керне обнаружены сравнительно высокие концентрации воды и сероводорода. Скорее всего, это следствие вулканизма, но может указывать и на биологическую активность.
	DunaSrfLandedVallesJebbedius = В этом керне обнаружены следы метана и воды.
	DunaSrfLandedVallesJebbedius = Рекомендуется хранение в инкубаторе, чтобы подробнее изучить следовые количества метана в этом керне.
	DunaSrfLandedMidlands = Этот керн, похоже, содержит одни неорганические молекулы; интересных следовых газов не обнаружено.
	DunaSrfLandedMidlands = Среди оксида железа и силикатов, обычных для поверхности Duna, обнаружены следы метана и угарного газа.
	DunaSrfLandedLowlands = Рекомендуется хранение в инкубаторе, чтобы подробнее изучить следовые количества метана в этом керне.
	DunaSrfLandedPoles = Керн из ледяной шапки Duna содержит очень много углекислого газа и следовые количества воды.
	DunaSrfLandedPoles = Этот керн из сухого льда наводит на мысль, что большая часть углекислого газа Duna заперта в полярных шапках.
	DunaSrfLandedMidlands = В этом керне есть следовые количества перхлората — вещества, потенциально полезного как окислитель ракетного топлива.
	DunaSrfLandedMidlands = В этом керне обнаружены незначительные концентрации сероводорода — возможный признак геологической активности.
	DunaSrfLandedHighlands = В этом керне обнаружены сравнительно высокие концентрации воды и сероводорода. Скорее всего, это следствие вулканизма, но может указывать и на биологическую активность.
	DunaSrfLandedHighlands = Среди оксида железа и силикатов, обычных для поверхности Duna, обнаружены кое-какие следы метана и угарного газа.
	LaytheSrfLanded = Среди преобладающих аммиака и углекислого газа обнаружены следовые концентрации метана, сероводорода и цианистого водорода.
	LaytheSrfLandedNorthPole = Необъяснимо высокие температуры Laythe не дают образоваться ледяным шапкам. Поэтому взятый здесь керн похож на образцы из более экваториальных широт.
	LaytheSrfLandedSouthPole = Признаков биологической активности в этом образце не видно, зато обнаружено несколько органических и азотистых соединений — а это вселяет надежду отыскать на Laythe какую-нибудь форму жизни.
	LaytheSrfLandedIslands = В песчаном керне высока концентрация соли и аммиака — и встаёт вопрос, образуются ли в почве Laythe какие-нибудь органические азотистые соединения.
	LaytheSrfLandedIslands = Продержав образец в инкубаторе подольше, можно проверить, окисляется ли аммиак с образованием аминокислот.
	LaytheSrfLandedRingArchipelago = В этом керне обнаружены совсем слабые концентрации аминокислот.
	LaytheSrfLandedRingArchipelago = Инкубация в контейнере для образцов поможет понять, геологической или биологической природы разнообразные газы, найденные в этом керне.
	LaytheSrfLandedPoles = Необъяснимо высокие температуры Laythe не дают образоваться ледяным шапкам. Поэтому взятый здесь керн похож на образцы из более экваториальных широт.
	LaytheSrfLandedPoles = Признаков биологической активности в этом образце не видно, зато обнаружено несколько органических и азотистых соединений — а это вселяет надежду отыскать на Laythe какую-нибудь форму жизни.
	LaytheSrfLandedShores = В песчаном керне высока концентрация соли и аммиака — и встаёт вопрос, образуются ли в почве Laythe какие-нибудь органические азотистые соединения.
	LaytheSrfLandedDunes = Инкубация в контейнере для образцов поможет понять, геологической или биологической природы разнообразные газы, найденные в этом керне.
	LaytheSrfLandedTheSagenSea = Продержав образец в инкубаторе подольше, можно проверить, окисляется ли аммиак с образованием аминокислот.
	LaytheSrfLandedDunes = В этом керне обнаружены совсем слабые концентрации аминокислот.
	ErinSrfLanded = Керн пропитан жидкими углеводородами из океанов Erin.
	ErinSrfLanded = Этот рыхлый песчаный керн содержит высокие концентрации разных углеводородов и несколько азотистых соединений.
	SkeltonSrfLanded = В этом керне обнаружено несколько любопытных следовых газовых соединений. Скорее всего, они возникают из-за химических реакций в плотной атмосфере Skelton.
	SkeltonSrfLanded = Сокрушительная атмосфера представляет собой суп из любопытных соединений; рекомендуется полный анализ в инкубационной камере.
	TektoSrfLandedLakes = В керне, взятом у океана Tekto, чрезвычайно высоки концентрации разных углеводородов.
	TektoSrfLandedMudflats = При хранении этого образца в инкубационной камере обнаружен ряд любопытных сложных органических соединений. Образованы ли они в результате биологической активности или какого-то неорганического процесса — потребует дальнейшего анализа.
	TektoSrfLandedCalderas = После некоторого времени в инкубационной камере в этом образце обнаружено заметное количество воды; возможно, это признак внутренних залежей воды, вынесенных к поверхности вулканической активностью.
	TektoSrfLandedOutcrops = Керн из этой плотной породы выявляет ряд любопытных следовых газов — вероятно, возникших при взаимодействии с углеводородами атмосферы Tekto.
	TektoSrfLandedPlateaus = Анализ керна с высокогорных плато Tekto не выявляет признаков биологической активности, зато обнаруживает несколько любопытных следовых газовых компонентов, включая ряд сложных органических молекул.
	TektoSrfLandedStrands = Керн из выветренной почвы этого района выделяет много углеводородов вместе со следами сероводорода и аммиака.
	TektoSrfLandedSlopes = Образец рыхлой почвы со склонов Tekto не выявляет признаков биологической активности — только высокое содержание углеводородов.
	TektoSrfLandedPolarRifts = Образцы из странной полярной области Tekto мало что интересного показывают в инкубационной камере; те же высокие концентрации углеводородов, что и повсюду на поверхности.
	VenusSrfLandedLowlands = В этом образце обнаружены следы воды и сероводорода — возможно, восстановленного из диоксида серы, обычного для Венеры.
	VenusSrfLandedMidlands = Хранение в инкубационной камере может показать, вырабатывается ли метан в этом образце прямо сейчас.
	VenusSrfLandedHighlands = В этом керне обнаружены следовые количества метана, диоксида серы и воды.
	VenusSrfLandedMountains = Ни следовых газов, ни иных признаков органической активности в этом образце не обнаружено.
	VenusSrfLandedCanyons = В этом керне обнаружено несколько токсичных тяжёлых металлов.
	VenusSrfLandedLakshmiPlanum = Этот керн с тёплых северных равнин Венеры показывает всё тот же низкий уровень метана, что и другие районы поверхности.
	VenusSrfLandedFortunaTessera = Ни следовых газов, ни иных признаков органической активности в этом образце не обнаружено.
	VenusSrfLandedVolcanicRise = В этом керне обнаружены следовые количества метана и диоксида серы. Возможно, они геологического происхождения — рекомендуется дальнейшее изучение.
	MarsSrfLanded = В этом керне обнаружены следы метана и воды.
	MarsSrfLandedLowlands = В этом керне сравнительно высока концентрация метана — возможный признак продолжающейся органической активности.
	MarsSrfLandedMidlands = Этот керн, похоже, содержит одни неорганические молекулы; интересных следовых газов не обнаружено.
	MarsSrfLandedHighlands = В этом керне обнаружены незначительные концентрации сероводорода — возможный признак геологической активности.
	MarsSrfLandedOlympusMons = В этом керне обнаружены сравнительно высокие концентрации воды и сероводорода. Скорее всего, это следствие вулканизма, но может указывать и на биологическую активность.
	MarsSrfLandedVallesMarineris = Рекомендуется хранение в инкубаторе, чтобы подробнее изучить следовые количества метана в этом керне.
	MarsSrfLandedAreanMountains = Среди оксида железа и силикатов, обычных для поверхности Марса, обнаружены кое-какие следы метана и угарного газа.
	MarsSrfLandedAreanCanyons = В этом керне есть следовые количества перхлората — вещества, потенциально полезного как окислитель ракетного топлива.
	MarsSrfLandedNorthIceCap = Керн из ледяной шапки Марса содержит очень много углекислого газа и следовые количества воды.
	MarsSrfLandedSouthIceCap = Этот керн из сухого льда наводит на мысль, что большая часть углекислого газа Марса заперта в полярных шапках.
	MarsSrfLandedMajorCrater = Следы перхлората в этом образце, скорее всего, будут токсичны для любых будущих пилотируемых экспедиций в этот район.
	TitanSrfLandedLowlands = Образец рыхлой почвы Титана не выявляет признаков биологической активности — только высокое содержание углеводородов.
	TitanSrfLandedMidlands = Керн из этой плотной породы выявляет ряд любопытных следовых газов — вероятно, возникших при взаимодействии с углеводородами атмосферы Титана.
	TitanSrfLandedHighlands = Анализ керна с высокогорных плато Титана не выявляет признаков биологической активности, зато обнаруживает несколько любопытных следовых газовых компонентов, включая ряд сложных органических молекул.
	TitanSrfLandedShores = При хранении этого образца в инкубационной камере обнаружен ряд любопытных сложных органических соединений. Образованы ли они в результате биологической активности или какого-то неорганического процесса — потребует дальнейшего анализа.
	TitanSrfLandedSeas = В керне, взятом у океана Титана, чрезвычайно высоки концентрации разных углеводородов.
	TitanSrfLandedCanyons = Керн из выветренной почвы этого района выделяет много углеводородов вместе со следами сероводорода и аммиака.
	TitanSrfLandedPoles = Образцы из полярной области Титана мало что интересного показывают в инкубационной камере; те же высокие концентрации углеводородов, что и повсюду на поверхности.
	SlateSrfLanded = В керне, добытом на Slate, содержится несколько любопытных органических соединений; дальнейший анализ следует провести в инкубационной камере.
	SlateSrfLandedSlateanSupercontinent = В этом керне обнаружен ряд сложных органических молекул, хотя продолжающейся метаболической активности, похоже, нет.
	SlateSrfLandedSeabed = Этот образец содержит некоторые сложные неорганические соединения, обычно связанные с карбонатно-кальциевыми раковинами океанических форм жизни, хотя метаболической активности не обнаружено.
	SlateSrfLandedMountNehelennia = Отслеживая выделение радиоактивно меченных газов из этого образца, удалось уловить несколько намёков на метаболическую активность!
	SlateSrfLandedFloodplains = Керн из-под осадочного слоя в этом районе показывает слабые признаки метаболической активности; какие-то давно уснувшие организмы, возможно, ещё живы в этой почве.
	TektoSrfLandedGeologicalAnomaly = Керн с этого странного острова со временем выделяет следы нескольких сложных органических соединений; ни один известный неорганический процесс не мог бы за это отвечать...
	VallSrfLanded = Керн, добытый у самой ледяной поверхности Vall, — это в основном вода с несколькими любопытными газами и соединениями.
	VallSrfLanded = В этом керне сравнительно высок уровень метана, диоксида азота, этилена и цианистого водорода — любопытная химическая смесь.
	VallSrfLanded = На миг показалось, будто внутри образца что-то сверкнуло; наверное, просто игра света...
	VallSrfLandedLowlands = Керн, добытый у самой ледяной поверхности Vall, — это в основном вода с несколькими любопытными газами и соединениями.
	VallSrfLandedHighlands = В этом керне сравнительно высок уровень метана, диоксида азота, этилена и цианистого водорода — любопытная химическая смесь.
	BopSrfLanded = Уж на этой-то безжизненной скале точно не найти ничего интересного... стоп, в керне что-то шевельнулось?
	BopSrfLanded = В керне обнаружены следы сероводорода — скорее всего, следствие геологической активности... а чем же ещё это могло бы быть?
	}
