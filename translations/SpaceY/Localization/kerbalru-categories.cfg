// Русификация кастомной категории редактора (VAB) модов SpaceY (Lifters + Expanded).
// Источник: SpaceY/SpaceYLifters/Category/CustomCategory.cfg —
// стоковый узел CUSTOM_PARTLIST_CATEGORY (активен без FilterExtensions).
// Отображаемая строка = поле categoryName (не #LOC-ключ) → правим MM-патчем по значению.
// Само имя категории «SpaceY» — бренд, оставлено латиницей.
//
// ПРИМ.: если у пользователя установлен FilterExtensions, SpaceY поднимает вместо этого
// узлы MODCAT/CATEGORY (Category.cfg) со своим списком SUBCATEGORIES — их здесь НЕ трогаем
// (иной формат, FE в сборках operator/rp1 не используется).

@CUSTOM_PARTLIST_CATEGORY:HAS[#categoryName[SpaceY]]:FINAL
{
	@SUBCATEGORY:HAS[#categoryName[Probe Cores]]   { @categoryName = Зонды }
	@SUBCATEGORY:HAS[#categoryName[Fuel Tanks]]    { @categoryName = Топливные баки }
	@SUBCATEGORY:HAS[#categoryName[Engines]]       { @categoryName = Двигатели }
	@SUBCATEGORY:HAS[#categoryName[SRBs]]          { @categoryName = Твердотопливные ускорители }
	@SUBCATEGORY:HAS[#categoryName[Control]]       { @categoryName = Управление }
	@SUBCATEGORY:HAS[#categoryName[Launch Clamps]] { @categoryName = Стартовые опоры }
	@SUBCATEGORY:HAS[#categoryName[Adapters]]      { @categoryName = Переходники }
	@SUBCATEGORY:HAS[#categoryName[Decouplers]]    { @categoryName = Расцепители }
	@SUBCATEGORY:HAS[#categoryName[Aerodynamic]]   { @categoryName = Аэродинамика }
	@SUBCATEGORY:HAS[#categoryName[Landing Legs]]  { @categoryName = Посадочные опоры }
	@SUBCATEGORY:HAS[#categoryName[Utility]]       { @categoryName = Служебное }
}
