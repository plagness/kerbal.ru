		#SYX-adapt-750-375-X4-desc = Массивный четырёхлучевой переходник для огромных ракет. Может хранить топливо (в комплект не входит).

		#SYX-adapt-750-500-titl = SpaceY A7-5 — силовой переходник
		#SYX-adapt-750-500-desc = Относительно лёгкий переходник — облегчённая альтернатива полностью заправленному переходнику. Пользуйтесь осторожно: он куда менее взрывоопасен!

		#SYX-plate-1000-125-X37-titl = SpaceY BFR-37 «Дунарианец» — межступенчатая упорная плита
		#SYX-plate-1000-125-X37-desc = (10 м → 37× 1,25 м) В рамках системы колониального транспорта Дюны серия упорных плит BFR позволяет задействовать сразу огромное число двигателей.

		#SYX-plate-1000-125-X43-titl = SpaceY BFR-43 «Рой» — межступенчатая упорная плита
		#SYX-plate-1000-125-X43-desc = (10 м → 43× 1,25 м) В рамках системы колониального транспорта Дюны серия упорных плит BFR позволяет задействовать сразу огромное число двигателей. Улучшенная модель включает «бонусное» 43-е посадочное место под двигатель.

		#SYX-plate-1000-375-X4-titl = SpaceY BFR-4 — межступенчатая упорная плита
		#SYX-plate-1000-375-X4-desc = (10 м → 4× 3,75 м) В рамках системы колониального транспорта Дюны серия упорных плит BFR позволяет задействовать несколько крупных двигателей.

		#SYX-plate-1000-750-X1-titl = SpaceY BFR-1 — межступенчатая упорная плита
		#SYX-plate-1000-750-X1-desc = (10 м → 7,5 м) В рамках системы колониального транспорта Дюны эта упорная плита BFR допускает установку очень крупных связок двигателей.

		#SYX-plate-1000-X0-titl = SpaceY BFR-0 — межступенчатая упорная плита
		#SYX-plate-1000-X0-desc = (10 м) В рамках системы колониального транспорта Дюны эта пустая упорная плита предназначена для полностью произвольного размещения двигателей на поверхности.

		#SYX-plate-750-250-X7-titl = SpaceY A7-2-VII «Улей» — межступенчатая упорная плита
		#SYX-plate-750-250-X7-desc = (7,5 м → 7× 2,5 м) Собирайте связки двигателей по своему вкусу — как для верхней, так и для нижней ступени.

		#SYX-plate-750-375-X2-titl = SpaceY A7-3-II — межступенчатая упорная плита
		#SYX-plate-750-375-X2-desc = (7,5 м → 2× 3,75 м) Собирайте связки двигателей по своему вкусу — как для верхней, так и для нижней ступени.

		#SYX-plate-750-500-X1-titl = SpaceY A7-5 — межступенчатый переходник
		#SYX-plate-750-500-X1-desc = (7,5 м → 5 м) Собирайте связки двигателей по своему вкусу — для верхней ступени (с обтекателем) или для нижней ступени.

