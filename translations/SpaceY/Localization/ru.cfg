		#SYX-adapt-1000-375-X5-titl = SpaceY SV5 — переходник для двигателей
		#SYX-adapt-1000-375-X5-desc = (10 м → 5× 3,75 м) Переходник для первой ступени, позволяющий собирать связки из очень крупных двигателей.

