	// Parts\CargoBays
		#SYL-bay3m2m-titl = SY-P3X2 — конический грузовой отсек 3,75 м → 2,5 м
		#SYL-bay3m2m-desc = Исследуйте космос в стиле Saturn-V! Конический грузовой отсек с работающими створками. ВАЖНЫЕ ЗАМЕЧАНИЯ: если вы собираетесь установить двигатель над обтекателем (в стиле Apollo), вы ОБЯЗАНЫ использовать СТЕКОВЫЙ РАЗДЕЛИТЕЛЬ. Стековый расцепитель вместо него застрянет там, где закрываются створки, и перекроет доступ к грузу. ЕЩЁ: не забудьте про стыковочный узел или расцепитель для полезной нагрузки!

		#SYL-bay5m3m-titl = SY-P5X3 — конический грузовой отсек 5 м → 3,75 м
		#SYL-bay5m3m-desc = Исследуйте космос в стиле Saturn-V! Конический грузовой отсек с работающими створками. ВАЖНЫЕ ЗАМЕЧАНИЯ: если вы собираетесь установить двигатель над обтекателем (в стиле Apollo), вы ОБЯЗАНЫ использовать СТЕКОВЫЙ РАЗДЕЛИТЕЛЬ. Стековый расцепитель вместо него застрянет там, где закрываются створки, и перекроет доступ к грузу. ЕЩЁ: не забудьте про стыковочный узел или расцепитель для полезной нагрузки!

	// Parts\Command
		#SYL-probe3m-titl = Kerbodyne/SpaceY — стековая система наведения
		#SYL-probe3m-desc = Уменьшенная (и потому менее совершенная) версия SpaceY SGS, разработанная совместно с Kerbodyne. Теперь с внутренней отделкой в фирменном оранжевом цвете Kerbodyne! Подходит для стандартных стеков Kerbodyne 3,75 м.

		#SYL-probe5m-titl = SpaceY — стековая система наведения, 5 м
		#SYL-probe5m-desc = Один из самых совершенных компьютеров наведения на рынке. Этот зонд-ядро большого диаметра позволит сажать крупные секции ускорителей и вообще управлять большими аппаратами.

	// Parts\Control
		#SYL-sasR3m-titl = SY-RWR3 — внешние маховики 3,75 м
		#SYL-sasR3m-desc = Внешние маховики 3,75 м, рассчитанные на работу в парах-тандемах. При установке не забудьте включить «привязку» и использовать симметрию 2×. Также добавьте их в группу действий SAS, чтобы индикатор загорался вместе с SAS.

		#SYL-sasR5m-titl = SY-RWR5 — внешние маховики 5 м
		#SYL-sasR5m-desc = Внешние маховики 5 м, рассчитанные на работу в парах-тандемах. При установке не забудьте включить «привязку» и использовать симметрию 2×. Также добавьте их в группу действий SAS, чтобы индикатор загорался вместе с SAS.

	// Parts\Decouplers
		#SYL-decoupler5m-titl = SY-SD5 — стековый расцепитель 5 м
		#SYL-decoupler5m-desc = Поначалу тяжёлые ракеты SpaceY переживали несколько случаев «стремительной незапланированной разборки». Вскоре инженеры SpaceY придумали способ «плановой разборки» прямо в полёте, тем самым опередив проблему.

		#SYL-decouplerRadial1-titl = SY-RD1 — большой аэродинамический радиальный расцепитель
		#SYL-decouplerRadial1-desc = По мере того как детали ракет растут в размерах благодаря развитию технологий, должны расти и системы расцепления. Этот большой радиальный расцепитель рассчитан на работу с крупнейшими доступными SRB и оснащён активным двигательным элементом для чистого отделения. При необходимости двигатели можно отключить в редакторе, слив топливо.

		#SYL-decouplerRadial2-titl = SY-RD3 — строенный радиальный расцепитель
		#SYL-decouplerRadial2-desc = По мере того как детали ракет растут в размерах благодаря развитию технологий, должны расти и системы расцепления. Этот большой радиальный расцепитель рассчитан на работу с крупнейшими доступными SRB и оснащён активным двигательным элементом для чистого отделения. При необходимости двигатели можно отключить в редакторе, слив топливо.

		#SYL-separator3m-titl = SY-SS3 — стековый разделитель 3,75 м
		#SYL-separator3m-desc = Поначалу тяжёлые ракеты SpaceY переживали несколько случаев «стремительной незапланированной разборки». Вскоре инженеры SpaceY придумали способ «плановой разборки» прямо в полёте, тем самым опередив проблему.

		#SYL-separator5m-titl = SY-SS5 — стековый разделитель 5 м
		#SYL-separator5m-desc = Поначалу тяжёлые ракеты SpaceY переживали несколько случаев «стремительной незапланированной разборки». Вскоре инженеры SpaceY придумали способ «плановой разборки» прямо в полёте, тем самым опередив проблему.

	// Parts\Docking
		#SYL-docking3m-titl = SY-DP3 — стыковочный узел 3,75 м
		#SYL-docking3m-desc = Очень быстро выяснилось, что иногда крупные части ракеты нужно снова собрать вместе после разборки. С большими стыковочными узлами это становится возможным!

		#SYL-docking5m-titl = SY-DP5 — стыковочный узел 5 м
		#SYL-docking5m-desc = Очень быстро выяснилось, что иногда крупные части ракеты нужно снова собрать вместе после разборки. С большими стыковочными узлами это становится возможным!

		#SYL-docking7m-titl = SY-DP7 — стыковочный узел 7,5 м
		#SYL-docking7m-desc = Очень быстро выяснилось, что иногда крупные части ракеты нужно снова собрать вместе после разборки. С большими стыковочными узлами это становится возможным!

	// Parts\Engines
		#SYL-eng-125-K1-titl = SpaceY K1 «Киви» — двигатель
		#SYL-eng-125-K1-desc = Задуманный как гигантский скачок в области малых ускорителей, K1 «Киви» похож на LV-T45, но вдвое мощнее благодаря усовершенствованным турбонасосам. Правда, за это приходится платить: он дороже и менее эффективен. Теперь с технологией «крепления где угодно».

		#SYL-eng-250-M1-titl = SpaceY M1 «Моа» — двигатель
		#SYL-eng-250-M1-desc = Одиночный двигатель M1 «Моа», аналогичный моделям в более крупных связках M5 и M9; компромисс между эффективностью и общей тягой. Поставляется с коническими переходниками-обтекателями 2,5–3,75 м и 3,75–5 м (выбираются одним из двух нижних узлов крепления).

		#SYL-eng-250-R1-titl = SpaceY R1 «Ратит» — двигатель
		#SYL-eng-250-R1-desc = Двигатели серии «Ратит» созданы ради чистой подъёмной силы: у них низкая эффективность, но высокая тяга. Рассчитаны на работу в связках для крупных грузов.

		#SYL-eng-500-M5-titl = SpaceY M5 «Мульти-моа» — связка двигателей
		#SYL-eng-500-M5-desc = Как и её старший брат (связка M9), связка M5 несёт лишь пять прославленных двигателей «Моа» (M1). Однако они слегка перенастроены в пользу эффективности и меньшей массы. Подходит для верхней ступени.

		#SYL-eng-500-M9-titl = SpaceY M9 «Тяжёлый моа» — связка двигателей
		#SYL-eng-500-M9-desc = Очень мощная связка двигателей для тяжёлых носителей, из девяти двигателей SpaceY M1 «Моа». Примечание: годится только для нижних ступеней. Используйте переключатель режима, чтобы задействовать только центральный двигатель для посадки.

		#SYL-eng-500-R5-titl = SpaceY R5 «Мульти-ратит» — связка двигателей
		#SYL-eng-500-R5-desc = Создана исключительно ради подъёмной силы: эта связка из пяти R1 «Ратит» обеспечивает одно из лучших соотношений тяги к массе полезной нагрузки, доступных на текущем уровне технологий. Однако платить придётся эффективностью расхода топлива, да и сам двигатель довольно массивен. Годится только для нижней ступени.

		#SYL-eng-500-R7-titl = SpaceY R7 «Супер-ратит» — связка двигателей
		#SYL-eng-500-R7-desc = Создана исключительно ради подъёмной силы: эта связка из семи R1 «Ратит» обеспечивает одно из лучших соотношений тяги к массе полезной нагрузки, доступных на текущем уровне технологий. Однако платить придётся эффективностью расхода топлива, да и сам двигатель довольно массивен. Годится только для нижней ступени. Имеет встроенный запас топлива.

	// Parts\Fairings
		#SYL-fairingBase5mP-titl = SpaceY FB5P — защитный обтекатель (5 м)
		#SYL-fairingBase5mP-desc = Основание обтекателя полезной нагрузки диаметром 5 м — на случай, когда у вас есть крупный груз, который по какой-то причине нужно защитить от воздействия атмосферы.

	// Parts\FuelTanks
		#SYL-tank-375-cone-2-titl = SpaceY F03C — топливный носовой конус 3,75 м
		#SYL-tank-375-cone-2-desc = Заправленный носовой конус 3,75 м. Разве аэродинамические носовые конусы не должны быть бесполезным пространством? Кому пришло в голову залить сюда топливо? Что за бред.

		#SYL-tank-375-cone-titl = SpaceY F02C — топливный носовой конус 3,75 м
		#SYL-tank-375-cone-desc = Заправленный носовой конус 3,75 м. Разве аэродинамические носовые конусы не должны быть бесполезным пространством? Кому пришло в голову залить сюда топливо? Что за бред.

		#SYL-tank-500-adapt-375-titl = SpaceY F9A5-3 — топливный бак-переходник 5 м
		#SYL-tank-500-adapt-375-desc = Инженеры SpaceY Technologies всегда недоумевали, почему эти крупные конические переходники обычно пусты. Наше решение — заполнить их топливом!

		#SYL-tank-500-cone-titl = SpaceY F05C — топливный носовой конус 5 м
		#SYL-tank-500-cone-desc = Заправленный носовой конус 5 м. Разве аэродинамические носовые конусы не должны быть бесполезным пространством? Кому пришло в голову залить сюда топливо? Что за бред.

		#SYL-tank-500-L1125-titl = SpaceY F38 — топливный бак 5 м
		#SYL-tank-500-L1125-desc = Весьма увесистый топливный бак для ваших крупных тяжёлых носителей.

		#SYL-tank-500-L1500-titl = SpaceY F51 — топливный бак 5 м
		#SYL-tank-500-L1500-desc = Этот гигантский топливный бак займёт ваших кербонавтов хотя бы на несколько минут подъёма.

		#SYL-tank-500-L1875-titl = SpaceY F06 — топливный бак 5 м
		#SYL-tank-500-L1875-desc = Топливный бак, очень широкий, но «крошечный» по меркам SpaceY.

		#SYL-tank-500-L375-titl = SpaceY F12 — топливный бак 5 м
		#SYL-tank-500-L375-desc = Топливный бак, очень большой, но «маленький» по меркам SpaceY.

		#SYL-tank-500-L750-titl = SpaceY F26 — топливный бак 5 м
		#SYL-tank-500-L750-desc = Топливный бак, очень большой, но «маленький» по меркам SpaceY.

	// Parts\Ground
		#SYL-clamp-1-titl = SY-LC1 — усиленный стартовый захват
		#SYL-clamp-1-desc = Рассчитанные на сверхкрупные аппараты, эти усиленные стартовые захваты должны помочь предотвратить самопроизвольную разборку стартового стола (а также, предположительно, ракеты-носителя).

		#SYL-clamp-2-titl = SY-LC2 — стартовый захват с длинным отводом
		#SYL-clamp-2-desc = Рассчитанные на сверхкрупные аппараты, эти сверхдлинные стартовые захваты дотягиваются поверх крупных боковых ускорителей, чтобы стабилизировать верхние части носителя. Вмещают боковые ускорители до 3,75 м. Не гарантируют защиту от чрезмерного заваливания во всех случаях.

		#SYL-leg-1-titl = SpaceY — жёсткая посадочная система для возврата, 5 м
		#SYL-leg-1-desc = Кольцо жёстких посадочных опор 5 м для возврата тяжёлых секций ускорителей. У этой модели нет подвески, поэтому рекомендуется посадка на малой скорости. Не реагирует автоматически на группу действий «Шасси». Рекомендуются мягкие посадки, так как эта модель лишена амортизаторов.

		#SYL-leg-2-titl = SpaceY — посадочная опора для возврата ступеней
		#SYL-leg-2-desc = Очень большая посадочная опора для возврата тяжёлых секций ускорителей.

	// Parts\HeatShield
		#SYL-heatShield5m-titl = SpaceY HS5 — теплозащитный экран (5 м)
		#SYL-heatShield5m-desc = Очень большой силовой теплозащитный экран со встроенным обтекателем.

	// Parts\RCS-OMS
		#SYL-rcs-1-titl = SpaceY RCS-5x7 — блок двигателей
		#SYL-rcs-1-desc = Простой 5-осевой блок двигателей реактивной системы управления, эквивалентный семи двигателям RCS RV-105.

		#SYL-rcs-2-titl = SpaceY RCS-1x14 — линейный порт RCS
		#SYL-rcs-2-desc = Простой линейный двигатель — для случаев, когда крупным грузам нужно поступательное управление.

		#SYL-rcs-oms-1-titl = SpaceY «Дибамус» — блок двигателей RCS/OMS
		#SYL-rcs-oms-1-desc = Настоящая система орбитального маневрирования: этот блок сочетает 5-осевые двигатели реактивной системы управления с управляемым по тяге двигателем на Monopropellant. Также вполне эффективен как посадочный двигатель.

		#SYL-rcs-oms-2-titl = SpaceY «Супер-дибамус» — блок двигателей RCS/OMS
		#SYL-rcs-oms-2-desc = Настоящая система орбитального маневрирования: этот блок сочетает 5-осевые двигатели реактивной системы управления с управляемым по тяге двигателем на Monopropellant. Также вполне эффективен как посадочный двигатель.

	// Parts\SRB
		#SYL-ejectatron-titl = SpaceY S01 «Эжектатрон» — твердотопливный ускоритель
		#SYL-ejectatron-desc = Крупным ракетам нужны крупные системы отделения. Заметно увеличенный вариант конкурентного изделия. Внимание: несъедобно.

		#SYL-srb-0625-1R-titl = SpaceY 10R — радиальный SRB
		#SYL-srb-0625-1R-desc = Изначально созданные, чтобы пробивать дыры в укреплённых бункерах, они оказались столь же хороши и в пробивании дыр в небе. Ура НАУКЕ! Эта модель имеет аэродинамический наконечник с небольшим дополнительным запасом топлива.

		#syl-srb-0625-L5-titl = SpaceY 05S — SRB (0,625 м × 5 м)
		#syl-srb-0625-L5-desc = Изначально созданные, чтобы пробивать дыры в укреплённых бункерах, они оказались столь же хороши и в пробивании дыр в небе. Ура НАУКЕ! Эта модель монтируется в стек.

		#SYL-srb-0625-6R-titl = SpaceY 06R — радиальный SRB (0,625 м × 6 м)
		#SYL-srb-0625-6R-desc = Изначально созданные, чтобы пробивать дыры в укреплённых бункерах, они оказались столь же хороши и в пробивании дыр в небе. Ура НАУКЕ! Эта модель имеет аэродинамический наконечник с небольшим дополнительным запасом топлива.

		#SYL-srb-0625-L9-titl = SpaceY 09S — SRB (0,625 м × 9 м)
		#SYL-srb-0625-L9-desc = Изначально созданные, чтобы пробивать дыры в укреплённых бункерах, они оказались столь же хороши и в пробивании дыр в небе. Ура НАУКЕ! Эта модель монтируется в стек.

		#SYL-srb-125-cone-s-titl = SpaceY SNC1S — скошенный носовой конус с сепаратроном (1,25 м)
		#SYL-srb-125-cone-s-desc = Чтобы облегчить быструю плановую разборку носителей, этот носовой конус не только аэродинамичен и вполне стилен, но ещё и с сюрпризом. По крайней мере, так считают наши инженеры.

		#SYL-srb-125-cone-titl = SpaceY SNC1 — носовой конус с сепаратроном (1,25 м)
		#SYL-srb-125-cone-desc = Чтобы облегчить быструю плановую разборку носителей, этот носовой конус не только аэродинамичен и вполне стилен, но ещё и с сюрпризом. По крайней мере, так считают наши инженеры.

		#SYL-srb-1875-L-titl = SpaceY S115 — тяжёлый SRB
		#SYL-srb-1875-L-desc = Когда ускорителей Kerbodyne просто мало — выбирайте конструкцию пошире! Этот SRB рассчитан на более быстрое горение, чем у большинства других моделей, обеспечивая короткий, но мощный подъём при необходимости. Если нужно более длительное горение, воспользуйтесь ограничителем тяги. По умолчанию: TWR у стола 51,09, время горения ~40 с.

		#SYL-srb-1875-S-titl = SpaceY S109 — тяжёлый SRB
		#SYL-srb-1875-S-desc = Когда ускорителей Kerbodyne просто мало — выбирайте конструкцию пошире! Этот SRB рассчитан на более быстрое горение, чем у большинства других моделей, обеспечивая короткий, но мощный подъём при необходимости. Если нужно более длительное горение, воспользуйтесь ограничителем тяги. По умолчанию: TWR у стола 68,23, время горения ~30 с.

		#SYL-srb-1875-X-titl = SpaceY S121 — тяжёлый SRB
		#SYL-srb-1875-X-desc = Когда ускорителей Kerbodyne просто мало — выбирайте конструкцию пошире! Этот SRB рассчитан на более быстрое горение, чем у большинства других моделей, обеспечивая короткий, но мощный подъём при необходимости. Если нужно более длительное горение, воспользуйтесь ограничителем тяги. По умолчанию: TWR у стола 51,09, время горения ~40 с.

		#SYL-srb-250-cone-s-titl = SpaceY SNC2S — скошенный носовой конус с сепаратроном (2,5 м)
		#SYL-srb-250-cone-s-desc = Чтобы облегчить быструю плановую разборку носителей, этот носовой конус не только аэродинамичен и вполне стилен, но ещё и с сюрпризом. По крайней мере, так считают наши инженеры.

		#SYL-srb-250-cone-titl = SpaceY SNC2 — носовой конус с сепаратроном (2,5 м)
