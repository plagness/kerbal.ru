	// Parts\Command
		#SYX-probe-750-titl = SpaceY — стековая система наведения, 7,5 м
		#SYX-probe-750-desc = Один из самых совершенных компьютеров наведения на рынке. Этот зонд-ядро большого диаметра позволит сажать крупные секции ускорителей и вообще управлять большими аппаратами.

	// Parts\Control
		#SYX-vernier1-titl = SpaceY V1 — верньерный двигатель
		#SYX-vernier1-desc = Двигатель ориентации, немного крупнее, чем у ведущего конкурента. Эти двигатели управляются через RCS, но работают на смеси LiquidFuel и Oxidizer, что делает их заметно мощнее RCS-двигателей на Monopropellant. Правда, в сравнении они куда громоздче и имеют лишь одно сопло, направленное наружу, — но большинство сходится во мнении, что это приемлемая плата за дополнительную тягу.

	// Parts\Engines
		#SYX-eng-375-E1-titl = SpaceY E1 «Эму» — двигатель
		#SYX-eng-375-E1-desc = Размах или ничего! Этот тяжёлый двигатель поможет оттолкнуть от вас стартовый стол — обычно.

		#SYX-eng-375-P1-titl = SpaceY P1 «Пингвин» — вакуумный двигатель
		#SYX-eng-375-P1-desc = Путешествовать по космосу ещё никогда не было так просто. Зачем ждать чудовищно долгих включений ядерного или ионного двигателя, если можно разогнаться быстрее? (ПРИМЕЧАНИЕ: если установлены плагины Firespitter или Interstellar Fuel Switch, можно включать и отключать топливную крышку.)

		#SYX-eng-500-P2-titl = SpaceY P2 «Двойной пингвин» — вакуумный двигатель
		#SYX-eng-500-P2-desc = Путешествовать по космосу ещё никогда не было так просто. Зачем ждать чудовищно долгих включений ядерного или ионного двигателя, если можно разогнаться быстрее?

		#SYX-eng-750-E2-titl = SpaceY E2 «Двойной эму» — двигатель
		#SYX-eng-750-E2-desc = Версия связки «Эму» для верхней ступени: этот двигатель допускает многократный перезапуск и имеет собственный обтекатель. Гарантированно иногда снижает число взрывов на верхней ступени.

		#SYX-eng-750-E4-titl = SpaceY E4 «Счетверённый эму» — двигатель
		#SYX-eng-750-E4-desc = Размах или ничего! Этот тяжёлый двигатель поможет оттолкнуть от вас стартовый стол — обычно.

		#SYX-eng-750-P4-titl = SpaceY P4 «Счетверённый пингвин» — вакуумный двигатель
		#SYX-eng-750-P4-desc = Путешествовать по космосу ещё никогда не было так просто. Зачем ждать чудовищно долгих включений ядерного или ионного двигателя, если можно разогнаться быстрее?

		#SYX-eng-750-R9-titl = SpaceY BFR9 «Омега-ратит» — связка двигателей
		#SYX-eng-750-R9-desc = Создана исключительно ради подъёмной силы: эта связка из девяти R1 «Ратит» обеспечивает одно из лучших соотношений тяги к массе полезной нагрузки, доступных на текущем уровне технологий. Однако платить придётся эффективностью расхода топлива, да и сам двигатель довольно массивен. Годится только для нижней ступени.

