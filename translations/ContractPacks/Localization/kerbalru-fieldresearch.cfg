@AGENT[Field?Research?Team]:FINAL
{
    @title = Полевая исследовательская группа
    @description = Полевая исследовательская группа входит в состав отдела исследований и разработок и подчиняется Вернеру фон Керману.
}

@CONTRACT_GROUP[FieldResearch]:FINAL
{
    @displayName = Полевые исследования
}

@CONTRACT_TYPE[FS_KSC]:FINAL
{
    @title = Проведите эксперименты в окрестностях КЦК
    @description = В окрестностях Космического центра Кербалов полно возможностей для науки. Вернеру нужно, чтобы мы провели несколько тестов в разных местах в качестве контрольных для наших экспериментов.
    @synopsis = Проведите требуемые тесты в окрестностях Космического центра Кербалов и верните данные.
    @completedMessage = С этими экспериментами всё выглядит отлично, пора отправлять их в космос!
}

@CONTRACT_TYPE[FS_Experiment]:FINAL
{
    @genericTitle = Проведите эксперимент в разных местах
    @genericDescription = Проведите эксперимент в различных ситуациях.
    @title = Проведите эксперименты @experiment.Name().ToLower().FirstCap() на @targetBody
    @description = Вернер особенно рад опробовать эксперименты @experiment.Name().ToLower() в разных местах на @targetBody. Сомневаемся, что результаты будут сильно отличаться от прошлого исследования, которое заказывал Вернер... но он же начальник!
    @synopsis = Проведите эксперименты @experiment.Name().ToLower() на @targetBody.
    @completedMessage = Ага, это определённо куча результатов @experiment.Name().ToLower(). Просто занесите данные в таблицу, а мы посмотрим их позже.
}

@CONTRACT_TYPE[FS_BiomeStudy]:FINAL
{
    @genericTitle = Проведите исследование конкретного биома
    @genericDescription = Проведите ряд экспериментов в разных ситуациях в одном биоме.
    @title = Исследование биома @biome
    @description = Общеизвестный факт: @biome.FullName() — одно из самых интересных мест в округе! Хотим узнать о нём больше, так что проведём исследование!
    @synopsis = Проведите требуемые эксперименты в @biome.FullName().
    @completedMessage = Одно из важнейших наших открытий о @biome.FullName() состоит в том, что это место не такое интересное, как нам казалось поначалу.
}

@CONTRACT_TYPE[FS_Scientist]:FINAL
{
    @genericTitle = Помогите учёному провести эксперименты
    @genericDescription = Помогите знаменитому учёному провести эксперименты в конкретном месте.
    @title = Помогите учёному провести эксперименты в @/biome.
    @description = Знаменитый учёный @scientist хотел бы провести ряд экспериментов у конкретного места в @/biome. Вернер настоятельно рекомендовал относиться к этому учёному с величайшим уважением, ведь он видный член Общества ракетологов.
    @synopsis = Доставьте @scientist для проведения экспериментов рядом с @/waypoint.Name() в @/biome.
    @completedMessage = Вернер очень доволен: если бы что-то пошло не так, он не смог бы попасть на гала-вечер ракетологов!
}

@CONTRACT_TYPE[FS_Scraps]:FINAL
{
    @genericTitle = Проведите повторные эксперименты
    @genericDescription = Повторяйте один и тот же эксперимент снова и снова!
    @title = Проведите ещё раз @scienceSubject
    @description = У нас есть неплохие данные @scienceSubject.Experiment().Name().ToLower() @scienceSubject.SituationString(), но Вернер считает, что мы можем узнать больше. Повторите эксперимент и доставьте данные домой.
    @synopsis = Соберите науку по @scienceSubject.
    @completedMessage = Отлично, будем надеяться, что это дополнит наши знания по теме.
}

@CONTRACT_TYPE[FS_HardScience]:FINAL
{
    @genericTitle = Соберите редкие научные результаты
    @genericDescription = Проводите эксперименты, приводнившись в океане или оказавшись на воде посреди пустыни. Нужные места где-то там!
    @title = Соберите редкие научные результаты в @biome.FullName()
    @synopsis = Проведите требуемые эксперименты в положении @situation.ToString().ToLower() в @biome.FullName().
    @completedMessage = Мы накопили просто отличные данные!
}

@CONTRACT_TYPE[FS_ClimateStudy]:FINAL
{
    @genericTitle = Климатическое исследование
    @genericDescription = Проведите климатическое исследование планеты или луны.
    @title = Климатическое исследование @targetBody
    @synopsis = Проведите исследование климата @targetBody.
    @completedMessage = Отличная работа, уверен, мы сможем подогнать эти данные под нужную нам версию!
}

@CONTRACT_TYPE[FS_GeologicalStudy]:FINAL
{
    @genericTitle = Геологическое исследование
    @genericDescription = Проведите геологическое исследование планеты или луны.
    @title = Геологическое исследование @targetBody
    @description = С геологической точки зрения мы знаем о @targetBody очень мало. Поэтому мы подали заявку на исследовательский грант, чтобы провести геологическое исследование @targetBody. Грант мы, честно говоря, ещё не получили, но я уверен, что всё сложится удачно.
    @synopsis = Проведите исследование геологии @targetBody.
    @completedMessage = Отличная работа, надеюсь, Лайнус не забыл подать документы на грант!
}
