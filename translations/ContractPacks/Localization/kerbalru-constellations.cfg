	@genericDescription = Сведите с орбиты старый ретранслятор и поставьте на его место новый, помощнее.
	@synopsis = Сведите с орбиты старый ретранслятор @/targetBody и поставьте на его место новый, помощнее.
	@notes = Целевой период: @/ogPeriod
	@completedMessage = Ретранслятор на позиции и работает!
}

