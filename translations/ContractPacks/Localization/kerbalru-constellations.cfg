// kerbal.ru — русификация контракт-пака Constellations (Contract Configurator)
// Безопасные MM-патчи по имени узла. Только верхнеуровневые текстовые поля.
// ПРАВИЛО БЕЗОПАСНОСТИ: каждое CC-выражение (переменные вида "собака слэш x" / "собака x",
//   вызовы .Method() и HomeWorld(), конкатенации со знаком плюс) отделено ASCII-пробелом,
//   и сразу за ним идёт РУССКОЕ СЛОВО — никогда не : , . ! ? тире « » " ) или цифра.
// Все токены (переменные, .Print(), .ElementAt(...), обратный слэш n, конкатенации) сохранены дословно.

// ============================ АГЕНТСТВА ============================

@AGENT[CommTech]:FINAL
{
	@description = Мировой гигант медиа и телекоммуникаций. Без лишних хлопот соединяет кербалов всеми возможными способами — от вещательных сетей до мобильной связи.
}

@AGENT[Frontier?Link]:FINAL
{
	@description = Международный кооператив, нацеленный на расширение радиопокрытия кербалов по всей системе Кербола.
}

@AGENT[KPS]:FINAL
{
	@description = Kerbstar Kerbal Positioning System — проект навигационной спутниковой системы.
}

@AGENT[Kerbal?Society?for?Science]:FINAL
{
	@description = Некоммерческое научное агентство.
}

