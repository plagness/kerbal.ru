@CONTRACT_TYPE[KsoRelayAlt]:FINAL
{
	@title = Разместите кеостационарный ретранслятор
	@genericTitle = Разместите кеостационарный ретранслятор (не сток-Кербин)
	@description = Как ни хороша станция слежения, её расположение почти на уровне моря ограничивает обзор. Мы уже присматривали место для тарелки в ближайших горах, когда в комнату ворвался Вернер фон Керман: «Недостаточно высоко, мы всё-таки космическое агентство, чёрт возьми!».\nВыходит, кеостационарная орбита — это предел, если нужна постоянная прямая видимость с КЦ. Нам удалось раздобыть немного средств, так что разместите мощный ретранслятор на КСО.
	@synopsis = Разместите ретранслятор-спутник на кеостационарной орбите
	@notes = Требуемая ΔV с низкой орбиты @/targetBody составляет @/deltaV.Print() м/с \nНе забудьте оставить топливо для удержания позиции!
	@completedMessage = Ретранслятор на позиции и работает!
}

