@CONTRACT_TYPE[KPSPrototype]:FINAL
{
	@title = Прототип навигационной спутниковой системы
	@description = CommTech совместно с несколькими государственными ведомствами обратилась к нам с очень амбициозным проектом: спутниковой системой навигации.\nИдея в том, чтобы построить группировку радиомаяков на средней орбите. Поскольку положение маяков будет известно в любой момент, местоположение можно будет вычислять трилатерацией с помощью простого радиоприёмника.\nПроект получил название «Kerbstar Kerbal Positioning System», и из-за большого числа необходимых спутников на его завершение уйдёт несколько этапов и контрактов. Пока же вам предстоит построить и запустить прототип спутника.
	@synopsis = Разместите прототип навигационного спутника на средней орбите
	@notes = Требуемая ΔV с низкой орбиты @/targetBody составляет @/deltaV.Print() м/с \nНе забудьте оставить топливо для удержания позиции!
	@completedMessage = Спутник на позиции и работает!
}

// ============================ ТИПЫ КОНТРАКТОВ: StationKeep ============================

@CONTRACT_TYPE[ConstellationsMoonRelayLagrangeStationKeep]:FINAL
{
	@title = Удержание позиции лагранжевых ретрансляторов @/targetBody
	@genericTitle = Удержание позиции ретрансляторов спутника в точках Лагранжа
	@description = Прошло некоторое время с тех пор, как мы в последний раз проверяли положение лагранжевых ретрансляторов @targetBody и хотим убедиться, что они на месте. Со временем спутник закономерно уходит от целевой позиции, поэтому просим вернуть ретрансляторы в допустимые пределы. Если аппарат уже на правильной позиции, достаточно просто выбрать его фокусом.
	@genericDescription = При необходимости скорректируйте орбиты лагранжевых ретрансляторов тела
	@synopsis = При необходимости скорректируйте орбиты лагранжевых ретрансляторов @targetBody
	@completedMessage = Ретрансляторы на позиции и работают!
}

