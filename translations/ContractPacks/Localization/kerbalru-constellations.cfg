@CONTRACT_TYPE[PlanetRelayFollowUp]:FINAL
{
	@title = Улучшите покрытие связи для @/targetBody
	@genericTitle = Улучшите покрытие связи планеты
	@description = Мы пришли к выводу, что нынешнее покрытие связи @/targetBody оставляет желать лучшего. Ещё два ретранслятора обеспечат постоянное покрытие большей части поверхности.
	@genericDescription = Образуйте равносторонний треугольник ретрансляторов на орбите планеты
	@synopsis = "Добавьте ещё два ретранслятора и образуйте равносторонний треугольник ретрансляторов на орбите "+@/targetBody
	@notes = Целевой период: @/ogPeriod
	@completedMessage = Ретрансляторы на позиции и работают!
}

