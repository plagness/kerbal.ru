// kerbal.ru — русификация контракт-пака CleverSat (Contract Configurator)
// Безопасные MM-патчи по имени узла. Только верхнеуровневые текстовые поля.

@AGENT[Astronomical?Survey?Society]:FINAL
{
	@description = Мы отправляем зонды туда, куда не сунется никто другой.
}

@CONTRACT_TYPE[CleverSatConstellation]:FINAL
{
	@title = Работа над спутниковой группировкой
	@description = Бедняга @/targetSat совсем заскучал в одиночестве. Хотелось бы, чтобы вы синхронизировали его орбиту с @/groupSat — глядишь, и подружатся?
	@genericDescription = Один из наших спутников скучает в одиночестве. Введите его в группировку.
	@synopsis = Переведите @/targetSat на заданную орбиту
	@completedMessage = Что ж, на какое-то время их это устроит. Пока они, конечно, снова не попросят это передвинуть.
}

@CONTRACT_TYPE[CleverSatConstellationShift]:FINAL
{
	@title = Перемещение спутниковой группировки
	@description = Немного неловко вышло, но, похоже, мы запустили группировку @/firstTarget не на ту орбиту. Так что вам придётся её переместить.
	@genericDescription = Одна из наших группировок развёрнута не там, где нужно. Её необходимо переместить.
	@synopsis = Переведите группировку @/firstTarget на правильную орбиту
	@completedMessage = Что ж, на какое-то время их это устроит. Пока они, конечно, снова не попросят их передвинуть.
}

@CONTRACT_TYPE[CleverSatCore]:FINAL
{
	@title = Выведите новый спутник на орбиту @/targetBody1
	@genericTitle = Выведите новый спутник на орбиту.
	@description = Кое-кто готов отвалить нам приличные деньги за вывод их спутника на орбиту. Конечно, мы могли бы исследовать галактику, но зато в столовой не переведутся закуски!
	@synopsis = Выведите спутник на заданную орбиту.
	@completedMessage = Что ж, на какое-то время их это устроит. Пока они, конечно, не попросят это передвинуть.
}

@CONTRACT_TYPE[CleverSatProbeMalfunction]:FINAL
{
	@title = Расследуйте неисправность спутника
	@description = Похоже, @/malSat перестал отвечать на наши запросы. Пожалуй, стоит отправить инженера, чтобы всё проверить.
	@genericDescription = Один из наших спутников перестал отвечать на запросы. Пожалуй, стоит отправить инженера, чтобы всё проверить.
	@synopsis = Расследуйте неисправность на борту @/malSat
	@completedMessage = Ну хотя бы с этим покончено. Пока что.
}

@CONTRACT_TYPE[CleverSatRandomShift]:FINAL
{
	@title = Перемещение спутника
	@description = Агентство попросило нас перевести @/targetSat на новую орбиту. Что ж, приступим.
	@genericDescription = Агентство попросило нас перевести спутник на новую орбиту. Что ж, приступим.
	@synopsis = Переведите @/targetSat на правильную орбиту
	@completedMessage = Что ж, на какое-то время их это устроит. Пока они, конечно, снова не попросят их передвинуть.
}

@CONTRACT_TYPE[CleverSatRogueAI]:FINAL
{
	@title = Уничтожьте вышедший из-под контроля спутник
	@description = Похоже, @/Sat вышел из-под контроля. Его нужно ликвидировать.
	@genericDescription = Один из наших спутников вышел из-под контроля. Его нужно ликвидировать.
	@synopsis = Уничтожьте взбунтовавшийся спутник.
	@completedMessage = Кризис предотвращён. Отличная работа.
}
