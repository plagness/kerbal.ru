// Русификация ТИТУЛОВ научных экспериментов UniversalStorage2
// Переводится только title эксперимента; блоки RESULTS уже переведены.
// Источник: GameData/UniversalStorage2/ScienceDefs.cfg
// Метод: ModuleManager :FINAL — @title подменяется после загрузки мода.
// Прим.: USmagnetometer (#autoLOC_US_Magnetometer) и USCameraPicture (#autoLOC_US_Camera)
//        уже переведены keyed-методом в Localization/ru.cfg — здесь не трогаем.

@EXPERIMENT_DEFINITION:HAS[#id[USmapCam]]:FINAL { @title = Широкоугольная визуальная съёмка }        // Wide Field Visual Camera Observation
@EXPERIMENT_DEFINITION:HAS[#id[USlaserAltimeter]]:FINAL { @title = Лазерный высотомер }              // Laser Altimeter
@EXPERIMENT_DEFINITION:HAS[#id[UStemperatureScan]]:FINAL { @title = Простое сканирование температуры } // Simple Temperature Scan
@EXPERIMENT_DEFINITION:HAS[#id[USbarometerScan]]:FINAL { @title = Сканирование атмосферного давления } // Simple Atmospheric Pressure Scan
