{
	@title = Широкоугольное визуальное наблюдение камерой
}

@EXPERIMENT_DEFINITION[USlaserAltimeter]:FINAL
{
	@title = Лазерный высотомер
}

@EXPERIMENT_DEFINITION[UStemperatureScan]:FINAL
{
	@title = Простое сканирование температуры
}

@EXPERIMENT_DEFINITION[USbarometerScan]:FINAL
{
	@title = Простое сканирование атмосферного давления
}
