			#autoLOC_US_AdaptorShroud1875_Title = Universal Storage: конический обтекатель (1.875 м → 2.5 м)
			#autoLOC_US_AdaptorShroud1875_Tags = Universal Storage обтекатель полезная нагрузка Gemini служебный модуль отсек
			#autoLOC_US_AdaptorShroud1875_Description = Крупный служебный обтекатель фиксированной высоты, сужающийся с 1.875 м до 2.5 м. В паре с Universal Storage: шестисекционным служебным ядром (1.875 м) он даёт полезное место под полезную нагрузку для крупных многодиаметровых ракетных сборок. В качестве альтернативы его можно использовать отдельно для большого объёма под полезную нагрузку. Четыре крупные створки обеспечивают отличный доступ к содержимому.

