			#autoLOC_US_CarbonDioxideWedge_Description = Хранилище отходов углекислого газа в клиновидном формате для установки на ядра Universal Storage. CO2 хранится сжатым, и этот клин содержит компрессионное оборудование и системы безопасности. Баллон можно опорожнять по линиям, либо весь клин можно снять при выходе в открытый космос и заменить новым оборудованием или хранилищем. Доступны четыре варианта размера.

