			#autoLOC_US_AdaptorShroud1250Soyuz_Title = Universal Storage: обтекатель «Союз» (1.25 м → 1.5 м)
			#autoLOC_US_AdaptorShroud1250Soyuz_Tags = Союз Soyuz Universal Storage Tantares
			#autoLOC_US_AdaptorShroud1250Soyuz_Description = Небольшой служебный обтекатель регулируемой высоты, сужающийся от 1.25-м переходника до 1.5 м. Предназначен для стыковки с набором командных деталей в стиле «Союза» от Tantares. В паре с четырёхсекционным ядром он даёт достаточно места для простейших систем жизнеобеспечения или научных комплектов, а встроенные баки позволяют выполнять орбитальные манёвры без отдельных топливных баков. Четыре крупные лепестковые створки обеспечивают отличный доступ к содержимому, а также служат площадкой для солнечных панелей.

			// AdaptorShroud1250Vostok
			#autoLOC_US_AdaptorShroud1250Vostok_Title = Universal Storage: обтекатель «Восток» (1.25 м → 1.5 м)
			#autoLOC_US_AdaptorShroud1250Vostok_Tags = Universal Storage обтекатель полезная нагрузка Восток Vostok Tantares служебный отсек Monoprop
			#autoLOC_US_AdaptorShroud1250Vostok_Description = Небольшой служебный обтекатель фиксированной высоты, сужающийся с 1.25 м до 1.5 м. Спрофилирован для стыковки с малым 0.625-м ACD и командным модулем Tantares «Andromeda 1CS Rullendemann». Он даёт достаточно места под полезную нагрузку для простейших систем жизнеобеспечения или научных комплектов, а встроенные баки позволяют выполнять орбитальные манёвры без отдельных топливных баков. Четыре небольшие створки обеспечивают отличный доступ к внутреннему четырёхсекционному служебному ядру, а опциональное тороидальное или радиаторное оборудование может расширить возможности служебного отсека.

			// AdaptorShroud1500
			#autoLOC_US_AdaptorShroud1500_Title = Universal Storage: конический обтекатель (1.5 м → 1.875 м)
			#autoLOC_US_AdaptorShroud1500_Tags = Universal Storage обтекатель полезная нагрузка Gemini служебный модуль отсек Bluedog Design BDB
			#autoLOC_US_AdaptorShroud1500_Description = Крупный служебный обтекатель фиксированной высоты, сужающийся с 1.5 м до 1.875 м. В паре с Universal Storage: пятисекционным служебным ядром (1.5 м) он даёт место под полезную нагрузку специально для капсул Gemini от Bluedog. В качестве альтернативы его можно использовать отдельно, чтобы получить большой объём под полезную нагрузку. Четыре крупные створки обеспечивают отличный доступ к содержимому, а также служат площадкой для солнечных панелей.

