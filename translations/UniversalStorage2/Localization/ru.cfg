			#autoLOC_US_SolidWasteWedge_Tags = Universal Storage клин твёрдые отходы TAC Life Support
			#autoLOC_US_SolidWasteWedge_Description = Бак для шламовых отходов в клиновидном формате для установки на ядра Universal Storage. Весь клин можно снять при выходе в открытый космос и заменить новым оборудованием или хранилищем. Доступны четыре варианта размера.

				// SolidWasteWedge [USI]
				#autoLOC_US_SolidWasteWedgeUSI_Title = Universal Storage: бак мульчи
				#autoLOC_US_SolidWasteWedgeUSI_Tags = Universal Storage клин припасы мульча Mulch USI Life Support
				#autoLOC_US_SolidWasteWedgeUSI_Description = Ёмкость для мульчи в клиновидном формате для установки на ядра Universal Storage. Весь клин можно снять при выходе в открытый космос и заменить новым оборудованием или хранилищем. Доступны четыре варианта размера.

