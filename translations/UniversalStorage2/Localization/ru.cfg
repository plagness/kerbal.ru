			#autoLOC_US_DoubleProbeCore_Description =  Версия MK-I «iE» системы дистанционного управления — это двойной по высоте, полностью автономный искусственный мозг. Способный к гироскопической стабилизации, дистанционному наведению и выполнению роли достаточно опытного пилота, эта система представляет собой продвинутое ядро зонда в удобном клиновидном формате.

