			#autoLOC_US_ThermoBaroWedge_Description = Блок атмосферных исследований (ASU) объединяет эксперименты по измерению температуры и давления в едином блоке клиновидного формата.


		// Shrouds
			// AdaptorShroud0625
			#autoLOC_US_AdaptorShroud0625_Title = Universal Storage: конический обтекатель (0.625 м → 1.25 м)
			#autoLOC_US_AdaptorShroud0625_Tags = Universal Storage обтекатель капсула колпак
			#autoLOC_US_AdaptorShroud0625_Description = Небольшая автономная система полезной нагрузки для использования с командными модулями. Четыре небольших грузовых отсека закрыты убирающимися створками обтекателя. Доступен в цветовых схемах Apollo Silver, Gemini Black, Restock и Tantares, с тремя вариантами внутреннего крепления оборудования и площадкой для солнечных панелей.

			// AdaptorShroud1250
			#autoLOC_US_AdaptorShroud1250_Title = Universal Storage: конический обтекатель (1.25 м → 1.875 м)
			#autoLOC_US_AdaptorShroud1250_Tags = Universal Storage обтекатель полезная нагрузка Gemini Mercury служебный модуль отсек
			#autoLOC_US_AdaptorShroud1250_Description = Небольшой служебный обтекатель фиксированной высоты, сужающийся с 1.25 м до 1.875 м. Углублённый для размещения 1.25-м ACD под капсулой Restock MK-I, он образует аккуратный переходный служебный отсек с минимальными аэродинамическими потерями. В паре с Universal Storage: пятисекционным служебным ядром (1.5 м) он даёт место для небольшого кольца оборудования одинарной высоты — или, если оно низкопрофильное, блоков двойной высоты. Оснащён креплениями как для полезной нагрузки, так и для клиньев, а также опциональными солнечными элементами на внутренней стороне створок.

