				#autoLOC_US_GreyWaterWedgeUSI_Description = Бак Super-Gro в клиновидном формате для установки на ядра Universal Storage. Весь клин можно снять при выходе в открытый космос и заменить новым оборудованием или хранилищем. Доступны четыре варианта размера.

