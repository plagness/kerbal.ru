			#autoLOC_US_Elektron_Description = Этот сложный электролизёр расщепляет воду на кислород и водород, потребляя большое количество электроэнергии. Оснащённый корпусом, изначально созданным для оборудования высокого давления для фумигации, «Электрон» отлично зарекомендовал себя как в поддержании жизни, так и в уничтожении маленьких зелёных ползающих тварей.

