			#autoLOC_US_CylindricalShroud125_Title = Universal Storage: цилиндрический обтекатель (1.25 м)
			#autoLOC_US_CylindricalShroud125_Tags = Universal Storage обтекатель полезная нагрузка
			#autoLOC_US_CylindricalShroud125_Description = Расширяющийся кверху обтекатель, предназначенный для аэродинамической защиты четырёхсекционных служебных модулей. Установите его в основании собранного ядра и подберите высоту. Низкопрофильные служебные люки обеспечивают аэродинамически гладкий доступ в миссиях, например в атмосферных полётах. Доступен в цветовых схемах Apollo Silver, Gemini Black, Restock White, Saturn Corrugation и Tantares.

			// CylindricalShroud250
			#autoLOC_US_CylindricalShroud250_Title = Universal Storage: цилиндрический обтекатель (2.5 м)
			#autoLOC_US_CylindricalShroud250_Tags = Universal Storage обтекатель полезная нагрузка
			#autoLOC_US_CylindricalShroud250_Description = Крупный расширяющийся кверху обтекатель, предназначенный для аэродинамической защиты восьмисекционных служебных модулей. Установите его в основании собранного ядра и подберите высоту. Служебные люки обеспечивают доступ в миссии, а более крупные створки отсеков дают опциональную площадку для солнечных элементов. Доступен в цветовых схемах Apollo Silver, Gemini Black, Restock White, Saturn Corrugation и Tantares.

			// CylindricalShroud0625
			#autoLOC_US_CylindricalShroud0625_Title = Universal Storage: цилиндрический служебный модуль (0.625 м)
			#autoLOC_US_CylindricalShroud0625_Tags = Universal Storage обтекатель полезная нагрузка
			#autoLOC_US_CylindricalShroud0625_Description = Небольшой служебный отсек, подходящий для крошечных научных деталей и парашютных модулей. Доступен в цветовых схемах в стиле Apollo, Gemini и Porkjet.

			// CylindricalShroud1500
			#autoLOC_US_CylindricalShroud1500_Title = Universal Storage: цилиндрический обтекатель (1.5 м)
			#autoLOC_US_CylindricalShroud1500_Tags = Universal Storage обтекатель полезная нагрузка Восток Vostok служебный модуль
			#autoLOC_US_CylindricalShroud1500_Description = Расширяющийся кверху обтекатель, предназначенный для аэродинамической защиты пятисекционных служебных модулей. Установите его в основании собранного ядра и подберите высоту. Один комплект небольших служебных люков обеспечивает быстрый доступ в миссии, а более крупные створки отсеков дают опциональную площадку для солнечных элементов. Доступны тороидальные баки, а также вариант с крупной заправляемой переборкой, предназначенный для стыковки с обтекателем-переходником «Восток» с радиаторами.


		// Structural
			// US_Hex
			#autoLOC_US_Hex_Title = Universal Storage: шестисекционное служебное ядро (1.875 м)
			#autoLOC_US_Hex_Tags = Universal Storage ядро
			#autoLOC_US_Hex_Description = Центральное ядро для шести отсеков клиньев. Расширяется до четырёхкратной исходной высоты. Может размещаться внутри 1.875-м обтекателя для аэродинамического служебного модуля. Настраивается в вариантах топливного бака или коридора для перехода экипажа.

			// US_Octo
			#autoLOC_US_Octo_Title = Universal Storage: восьмисекционное служебное ядро (2.5 м)
			#autoLOC_US_Octo_Tags = Universal Storage ядро
			#autoLOC_US_Octo_Description = Центральное ядро для восьми отсеков клиньев. Расширяется до четырёхкратной исходной высоты и может размещаться внутри 2.5-м обтекателя для аэродинамического служебного модуля. Настраивается в вариантах топливного бака или коридора для перехода экипажа.

			// US_Penti
			#autoLOC_US_Penti_Title = Universal Storage: пятисекционное служебное ядро (1.5 м)
			#autoLOC_US_Penti_Tags = Universal Storage ядро
			#autoLOC_US_Penti_Description = Центральное ядро для пяти отсеков клиньев. Расширяется до четырёхкратной исходной высоты. Идеально сочетается с обтекателем 1.5 м → 1.875 м для аэродинамического служебного модуля масштаба BDB. Настраивается в вариантах топливного бака или коридора для перехода экипажа.

