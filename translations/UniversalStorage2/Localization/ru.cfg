			#autoLOC_US_MatBayWedge_Tags = Universal Storage наука отсек материалов
			#autoLOC_US_MatBayWedge_Description = Улучшенный отсек материалов содержит те же датчики и эксперименты, что и стандартный отсек материалов, в клиновидном формате. В отличие от более простого блока, улучшенный отсек оснащён оборудованием для проведения и хранения двух экспериментов, используя общие компоненты для снижения стоимости и массы.

