			#autoLOC_US_EVAExtender_Description = Полноценный ранец-расширитель для внекорабельной деятельности, предоставляющий дополнительные ресурсы для работы в открытом космосе. Рассчитан на работу с рядом систем жизнеобеспечения. EVA-X можно переносить в контейнере и надевать в слот ранца кербала.

