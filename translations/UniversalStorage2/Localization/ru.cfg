			// AccelGravWedge
			#autoLOC_US_AccelGravWedge_Title = Universal Storage: блок физических исследований
			#autoLOC_US_AccelGravWedge_Tags = Universal Storage наука гравиоли акселерометр
			#autoLOC_US_AccelGravWedge_Description = БФИ объединяет детектор гравиоли и акселерометр в едином блоке, используя общие компоненты для снижения стоимости и массы системы.

			// AdvancedMicroSatWedge
			#autoLOC_US_AdvancedMicroSatWedge_Title = Universal Storage: улучшенный субспутник
			#autoLOC_US_AdvancedMicroSatWedge_Tags = Universal Storage Apollo 15 субспутник зонд микроспутник
			#autoLOC_US_AdvancedMicroSatWedge_Description = Предназначенный для развёртывания на орбите вокруг лунного тела, субспутник S2-Apollo — это полностью автономный научный центр, построенный вокруг новейшего миниатюрного ядра зонда. Оснащённый магнитометром, коллектором солнечных частиц, медленно сканирующей камерой видеонаблюдения, солнечными панелями и выделенной антенной дальней связи, он также может быть заправлен гидразином и укомплектован небольшим двигателем для самостоятельных коррекционных манёвров. Хотя для космических программ с ограниченным бюджетом он непозволительно дорог, устройство может работать практически бесконечно и многократно окупить себя. Примечание: не подвергайте воздействию вакуума, влаги, тепла, перхоти и мелких ящериц. Гарантия аннулируется при нарушении пломбы развёртывания.

			// BasicMicroSatWedge
			#autoLOC_US_BasicMicroSatWedge_Title = Universal Storage: базовый субспутник
			#autoLOC_US_BasicMicroSatWedge_Tags = Universal Storage Спутник Sputnik микроспутник субспутник Zeus
			#autoLOC_US_BasicMicroSatWedge_Description = Предназначенный для развёртывания с корабля-носителя на стабильной орбите, S1-Zeus — это микроспутник для взыскательных и экономных научных команд. Качественный 12-В свинцово-кислотный аккумулятор поддерживает работу внутреннего охлаждающего вентилятора на оглушительных 45 об/мин, обеспечивая охлаждение радиопередатчиков в палящем вакууме космоса. Его многополюсные антенны легко передают данные на наземные станции с минимальным электрическим искрением, а отполированный сферический корпус сохраняет аэродинамичность аппарата, пока он проносится сквозь космические облака. Оставьте конкурентов в пыли с ещё одним качественным продуктом от ваших товарищей из Nox Industrial — zagreb ebnom zlotdik diev! (Nox Industrial ни прямо, ни косвенно не гарантирует качество своей продукции при использовании в неподходящих условиях. Полированное покрытие корродирует при воздействии атмосферного азота. Аккумулятор рассчитан на 45 минут работы при стандартной температуре окружающей среды -13 °C. Поставляется заряженным наполовину, соединительные кабели в комплект не входят. Nox Industrial не несёт ответственности за смещение оптики при развёртывании антенны.)

