			// DataStorageWedge
			#autoLOC_US_DataStorageWedge_Title = Universal Storage: терминал ввода данных
			#autoLOC_US_DataStorageWedge_Tags = Universal Storage наука ящик хранилище данные
			#autoLOC_US_DataStorageWedge_Description = D.I.T — продвинутый компактный терминал ввода, предназначенный для хранения нескольких килобайтов полевых научных отчётов. Оснащённый полноценной эргономичной раскладкой клавиатуры DVORAK, опытный учёный может вводить наблюдения с ошеломляющей скоростью 20 слов в минуту.

