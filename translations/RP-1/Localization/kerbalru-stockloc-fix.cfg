// Русский перевод для ключей #autoLOC_.../rp0_... которые RP-1 переопределяет
// собственным (не стоковым) английским текстом в GameData/RP-1/Localization/en-us.cfg,
// но для которых апстримный GameData/RP-1/Localization/ru.cfg перевод не предоставил
// (рассинхронизация en-us.cfg/ru.cfg внутри самого RP-1 — см. docs/ROADMAP.md).
// Оригинальные файлы мода не трогаем (см. MAINTAINING.md §2, тип FULL) — только
// добавляем ru{} блок с теми же ключами, что уже объявлены в en-us.cfg мода.
Localization
{
	ru
	{
		#autoLOC_rp0_FacilityContextMenu_AC_TrainingRate = Скорость подготовки: <<1>>
		#autoLOC_rp0_FacilityContextMenu_TS_lvl10 = Поддерживает кодеки до уровня: 10\nАнтенна Ka-band, мощн. 135 Вт, КУ 82.3 дБи\nАнтенна X-band, мощн. 20 кВт, КУ 74.3 дБи\nАнтенна S-band, мощн. 20 кВт, КУ 63.6 дБи\nАнтенна UHF, мощн. 100 Вт, КУ 34 дБи\nАнтенна VHF, мощн. 100 Вт, КУ 20 дБи
		#rp0_CC_HasExperimentParam = Возьмите эксперимент <<1>>, либо включающий его эксперимент более высокого уровня
		#rp0_CC_HasSamplesParam = Возьмите образцы с <<1>>
	}
}
