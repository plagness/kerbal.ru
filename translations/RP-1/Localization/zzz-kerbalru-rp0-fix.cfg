// kerbal.ru — доперевод карьерного текста RP-1 (группа B).
// Три ключа объявлены в RP-1/Localization/ru.cfg, но со значениями на английском
// (рассинхрон en-us.cfg/ru.cfg внутри самого мода). Оригинальный ru.cfg не трогаем.
//
// Почему ModuleManager-патч, а НЕ «plain-файл, грузящийся позже ru.cfg»:
// переопределение уже объявленного тега вторым блоком Localization{ ru{ #key=… } }
// зависит от (1) порядка загрузки .cfg игрой и (2) того, «первый или последний
// выигрывает» в словаре Localizer — оба недокументированы и ненадёжны (см. риск в
// docs/MAINTAINING.md §6, гонка проходов). Детерминированный способ, который
// использует сам RP-1 (RP-1/Localization/LocPatches.cfg), — MM-патч блока
// Localization. :FINAL гарантирует применение после всех прочих проходов.
//
// Термины по апстримному ru.cfg: EC → электроэнергия (стр. 313), integration →
// сборка (стр. 84/87/159), Δv оставляем как есть, «войти» — как в стр. 225.
@Localization:HAS[#RP0conf[True],@ru]:FINAL
{
	@ru
	{
		@#rp0_Crew_TransferFail_Title = Не удалось войти
		@#rp0_GameplayTip_ExcessEC_Title = Проверьте запас энергии
		@#rp0_GameplayTip_ExcessEC_Text = У текущего аппарата, похоже, избыточный запас электроэнергии.\nБатареи низкого уровня тяжёлые и дорогие, что даёт большой штраф к Δv и увеличивает время сборки.
	}
}
