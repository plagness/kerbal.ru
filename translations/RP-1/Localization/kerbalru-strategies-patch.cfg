// kerbal.ru — MM-патч, применяющий ключи из kerbalru-strategies-fix.cfg
// к полям title/desc/effectTitle/effectDescription/headName в
// RP-1/Strategies/Departments.cfg и RP-1/Strategies/Leaders/*.cfg.
// :FINAL — чтобы более поздние проходы (RealismOverhaul и т.п.) не затёрли перевод обратно на английский.
// @EFFECT,N — позиционный индекс EFFECT-блока внутри STRATEGY (у EFFECT нет уникального имени,
// поле "name" — это тип эффекта, а не идентификатор; синтаксис ",N" уже используется в этом
// моде для @MODEL,N, см. RealismOverhaul/RO_SuggestedMods/**).

