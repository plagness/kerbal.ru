// proceduralTankLiquid is renamed to proceduralTankRealFuels by
// ProceduralParts/ModuleManager/RealFuels.cfg when RealFuels is installed, but that renamed
// part never reaches the player: RealismOverhaul/RO_RecommendedMods/Procedurals/RO_ProceduralParts.cfg
// clones it into the 5 variants below (+PART[proceduralTankRealFuels]:FOR[RealismOverhaul]),
// and RP-1/Parts/RFProcTanks.cfg marks the proceduralTankRealFuels base itself as an orphan
// (category=-1, techRequired=ORPHANS, no RP0conf), so RP-1/NonRP0's HardRemoveNonRP0 pass
// deletes it outright. Confirmed via KSP.log: "Applying delete RP-1/NonRP0/...HardRemoveNonRP0...
// to ProceduralParts/Parts/Tanks/1TankLiquid.cfg/PART[proceduralTankRealFuels]", while the 5
// clones below are absent from that delete and do survive into ModuleManager.ConfigCache.
// A @PART[proceduralTankRealFuels]:FINAL patch would therefore be a no-op (node is gone before
// :FINAL runs) — the fix has to target the surviving clone names instead.
@PART[RO-RFTank-SM]:FINAL
{
	%title = #LOC_kerbalru_ProceduralParts_RO-RFTank-SM_title
	%description = #LOC_kerbalru_ProceduralParts_RO-RFTank-SM_description
