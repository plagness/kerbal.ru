Localization
{
	en-us
	{
		#LOC_kerbalru_ProceduralParts_proceduralStackDecoupler_title = Decoupler [Procedural]

		// RealismOverhaul clones proceduralTankRealFuels (itself a RealFuels-rename of
		// proceduralTankLiquid) into these 5 named variants, then RP-1's HardRemoveNonRP0
		// deletes the proceduralTankRealFuels base part. Only the variants below actually
		// survive into the game, so they need their own localization entries.
		#LOC_kerbalru_ProceduralParts_RO-RFTank-SM_title = Procedural Tank (Service Module)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-SM_description = <b><color=red>Not intended to hold fuel</color></b> and far heavier and more expensive than standard fuel tanks, these specialized tanks are for batteries, payloads and life support. There are different levels of service modules that you can unlock. Each tank type has a different base mass, different cost, and different amounts of utilization it can have. These are the only types of tanks that can have life support resources added to them. <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-RFTank-BalloonNew_title = Procedural Tank (Balloon)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-BalloonNew_description = A very expensive and fragile, but also very light tank. Balloon tanks are expensive and complex as they need to be pressurized at all times, but they are much lighter than regular tanks. These are similar to tanks used on the Atlas and Centaur stages. The first balloon tanks are 73% lighter than Al stringer conventional structure tanks while costing 150% more to tool and 60% more once tooled. <b><color=green>Min Utilization: 99% - Max Utilization: 100%</color></b> <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Integral_title = Procedural Tank (Isogrid Structure)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Integral_description = A more complex, but lightweight tank. Isogrid structure tanks use machined walls that are also load-bearing and form the entire structure of the tank, so no additional structure is needed to maintain rigidity. Manufacturing them can be difficult, however. The first level of isogrid tanks are 40% (standard) or 55% (HP) lighter than Al stringer conventional structure tanks while costing 50% more to tool and 40% more once tooled. <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Separate_title = Procedural Tank (Conventional Structure)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Separate_description = The most basic form of fuel tank. Conventional structure tanks consist of two parts, a support structure (also known as stringers) and a fuel tank. Earlier iterations also had a separate skin surrounding them, but later tanks moved the structure inside the fuel tanks, making the tanks integral to the vehicle structure. This makes them cheap and easy to produce. <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-ProcTankSpaceplane_title = Tank [Procedural, Shielded]
		#LOC_kerbalru_ProceduralParts_RO-ProcTankSpaceplane_description = Heat-resistant switchable procedural tank. Includes normal (Structural) and highly pressurized (Fuselage) options. Rated for LEO reentries on a spaceplane. <b><color=green>From Procedural Parts mod</color></b>
	}
	ru
	{
		#LOC_kerbalru_ProceduralParts_proceduralStackDecoupler_title = Разделитель [Процедурный]

		#LOC_kerbalru_ProceduralParts_RO-RFTank-SM_title = Процедурный бак (Служебный модуль)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-SM_description = <b><color=red>Не предназначен для хранения топлива</color></b> — гораздо тяжелее и дороже стандартных топливных баков. Такие специализированные баки используются для батарей, полезной нагрузки и систем жизнеобеспечения. Доступно несколько уровней служебных модулей: у каждого своя базовая масса, стоимость и предельная степень использования объёма. Только в баки этого типа можно добавлять ресурсы жизнеобеспечения. <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-RFTank-BalloonNew_title = Процедурный бак (Баллонный)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-BalloonNew_description = Очень дорогой и хрупкий, но при этом очень лёгкий бак. Баллонные баки сложны и дороги в производстве, так как должны постоянно находиться под давлением, зато они намного легче обычных баков — по типу баков ступеней Atlas и Centaur. Баки баллонного типа первого уровня на 73% легче баков с обычным силовым набором из алюминия, но их разработка обходится на 150% дороже, а серийное производство — на 60% дороже. <b><color=green>Мин. использование: 99% — Макс. использование: 100%</color></b> <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Integral_title = Процедурный бак (Вафельная обшивка)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Integral_description = Более сложный, но лёгкий бак. Баки с вафельной (изогридной) обшивкой изготавливаются из фрезерованных силовых панелей, которые одновременно несут нагрузку и формируют всю конструкцию бака — дополнительный силовой набор для жёсткости не требуется. Однако такие баки сложны в производстве. Баки с вафельной обшивкой первого уровня на 40% (стандартные) или 55% (HP) легче баков с обычным силовым набором из алюминия, но их разработка обходится на 50% дороже, а серийное производство — на 40% дороже. <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Separate_title = Процедурный бак (Обычная конструкция)
		#LOC_kerbalru_ProceduralParts_RO-RFTank-Separate_description = Самый простой тип топливного бака. Баки обычной конструкции состоят из двух частей — силового набора (стрингеров) и топливной ёмкости. В ранних версиях вокруг них также была отдельная обшивка, но позже силовой набор перенесли внутрь топливной ёмкости, сделав бак несущей частью конструкции корабля. Это делает такие баки дешёвыми и простыми в производстве. <b><color=green>From RealFuels mod</color></b>
		#LOC_kerbalru_ProceduralParts_RO-ProcTankSpaceplane_title = Бак [Процедурный, экранированный]
		#LOC_kerbalru_ProceduralParts_RO-ProcTankSpaceplane_description = Термостойкий переключаемый процедурный бак. Доступны обычный (силовой) и высокого давления (фюзеляжный) варианты. Рассчитан на прохождение через реентри LEO на космоплане. <b><color=green>From Procedural Parts mod</color></b>
	}
}
